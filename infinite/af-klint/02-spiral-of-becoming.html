<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Spiral of Becoming — Symbolic Pastel Abstraction. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Spiral of Becoming</title>
<style>
  html,body{margin:0;height:100%;background:#ece4d4;overflow:hidden}
  #afk02-stage{position:fixed;inset:0;width:100%;height:100%}
  #afk02-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .afk02-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#2a2730;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/af-klint/02-spiral-of-becoming.html",
 "title": "Spiral of Becoming",
 "description": "Logarithmic spiral slowly rotates and breathes while pastel nodes pulse with radial glows along its arm — generative geometry in symbolic-abstract's theosophical idiom.",
 "useWhen": "Ambient hero backgrounds, spiritual or art-themed UIs, generative art galleries, loading screens needing calm motion.",
 "avoidWhen": "Light-background UIs clashing with the warm linen (#ece4d4) background. Contexts requiring legible text over the center.",
 "agentPrompt": "Change PASTELS to warm earth tones (['#d4a96a','#c47c5a','#e8d4a0','#b07840','#d4b896']), slow rotation by setting rot=t*0.10, increase turns to 6.",
 "editableAreas": [
  "pastel node colors (PASTELS array)",
  "spiral turn count (turns=4.4)",
  "rotation speed (t*0.25 in rot)",
  "growth breathing speed (t*0.45)",
  "node spacing along spiral (th+=0.55)"
 ],
 "preserveElements": [
  "DPR-aware fitCanvas sizing",
  "IIFE wrapper",
  "prefers-reduced-motion guard (REDUCED)",
  "visibilitychange stop/start"
 ],
 "knownLimitations": [
  "Background color hardcoded in CSS (#ece4d4) — must edit to change from warm linen",
  "No pointer interactivity wired",
  "Spiral growth breathing may feel slow before sine completes first cycle"
 ],
 "tier": "curated",
 "labels": [
  "accessible",
  "copy-paste-safe",
  "minimal-deps",
  "mobile-ready",
  "agent-ready"
 ],
 "tags": [
  "spiral",
  "generative",
  "canvas",
  "logarithmic",
  "pastel",
  "ambient",
  "geometric"
 ]
}
</script>
</head>
<body>
<div id="afk02-stage" role="img" aria-label="A logarithmic spiral unwinds from a single seed, pastel nodes alighting along its arm — generative geometry in the theosophical idiom, growth made visible and endlessly renewed.">
  <canvas id="afk02-cv"></canvas>
</div>
<div class="afk02-cap">Spiral of Becoming</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv=document.getElementById('afk02-cv'); if(!cv) return;
  const PAL={ink:'#2a2730',rose:'#e3a9bd'};
  const PASTELS=['#a9c8e0','#e3a9bd','#ecd58a','#c3b3da','#a9c4a0'];
  function rgba(hex,a){const n=parseInt(hex.slice(1),16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}
  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width),h=Math.max(2,r.height);
    c.width=Math.round(w*dpr);c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }
  let S=fitCanvas(cv), last=performance.now(), t=0;
  function draw(now){
    const dt=Math.min(0.05,(now-last)/1000);last=now;
    if(!REDUCED) t+=dt;
    const ctx=S.ctx,W=S.w,H=S.h, cx=W*0.5, cy=H*0.52;
    ctx.clearRect(0,0,W,H);
    const maxR=Math.min(W,H)*0.44, b=0.18, turns=4.4;
    const grow=REDUCED?1:(Math.sin(t*0.45)*0.5+0.5)*0.55+0.45;
    const thetaMax=turns*Math.PI*2*grow, rot=t*0.25;
    ctx.lineWidth=2;ctx.beginPath();
    let first=true;
    for(let th=0; th<=thetaMax; th+=0.08){
      const r=2.4*Math.exp(b*th); if(r>maxR) break;
      const x=cx+Math.cos(th+rot)*r, y=cy+Math.sin(th+rot)*r;
      if(first){ctx.moveTo(x,y);first=false;}else ctx.lineTo(x,y);
    }
    ctx.strokeStyle=rgba(PAL.ink,0.5);ctx.stroke();
    let idx=0;
    for(let th=0.6; th<=thetaMax; th+=0.55){
      const r=2.4*Math.exp(b*th); if(r>maxR) break;
      const x=cx+Math.cos(th+rot)*r, y=cy+Math.sin(th+rot)*r;
      const col=PASTELS[idx%PASTELS.length];
      const pulse=0.6+0.4*Math.sin(t*1.6-idx*0.5);
      const nr=(3+r*0.05)*(0.7+0.3*pulse);
      const g=ctx.createRadialGradient(x,y,0,x,y,nr*2.6);
      g.addColorStop(0,rgba(col,0.55));g.addColorStop(1,rgba(col,0));
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,nr*2.6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=rgba(col,0.95);
      ctx.beginPath();ctx.arc(x,y,nr,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=rgba(PAL.ink,0.4);ctx.lineWidth=1;ctx.stroke();
      idx++;
    }
    ctx.fillStyle=rgba(PAL.rose,0.95);
    ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=rgba(PAL.ink,0.5);ctx.lineWidth=1;ctx.stroke();
  }
  let raf=0,running=false;
  function loop(){ if(!running) return; draw(performance.now()); raf=requestAnimationFrame(loop); }
  function start(){ if(running) return; running=true; last=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
  let _rt;
  window.addEventListener('resize',()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ S=fitCanvas(cv); if(REDUCED) draw(performance.now()); },150); },{passive:true});
  document.addEventListener('visibilitychange',()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });
  if(REDUCED){ draw(performance.now()); } else start();
})();
</script>
</body>
</html>
