<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="The Series — Hilma af Klint. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Series</title>
<style>
  html,body{margin:0;height:100%;background:#ece4d4;overflow:hidden}
  #afk06-stage{position:fixed;inset:0;width:100%;height:100%}
  .afk06-card{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 1.1s ease;}
  .afk06-card.on{opacity:1;}
  .afk06-card svg{width:72%;height:72%;}
  .afk06-dots{position:absolute;left:0;right:0;bottom:30px;display:flex;justify-content:center;gap:9px;z-index:3;}
  .afk06-dot{width:9px;height:9px;border-radius:50%;border:1px solid rgba(42,39,48,.45);background:transparent;transition:background .5s, transform .5s;}
  .afk06-dot.on{transform:scale(1.25);background:#e3a9bd;}
  .afk06-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#2a2730;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none;z-index:4}
  @media (prefers-reduced-motion: reduce){ .afk06-card{transition:opacity .4s ease;} }
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/af-klint/06-the-series.html",
 "title": "The Series",
 "description": "Five SVG diagrams — spiral, nested ovals, petals, vesica piscis, concentric circles — cross-fade on a 3.4s loop with dot indicators, in pastel af Klint palette.",
 "useWhen": "Art-inspired ambient displays, gallery intros, spiritual/geometric theme backgrounds, or wherever a slow meditative loop fits.",
 "avoidWhen": "Contexts requiring immediate user interaction; viewers sensitive to slow cross-fades on reduced-motion setups (loop halts entirely).",
 "agentPrompt": "Change the auto-advance interval from 3.4 to 5 seconds by editing the `autoT>3.4` threshold in the tick function, and swap the first palette color C[0] from '#a9c8e0' to '#b0d4c8'.",
 "editableAreas": [
  "color palette (C array, 5 hex values)",
  "slide interval (autoT > 3.4)",
  "cross-fade duration (transition: opacity 1.1s)",
  "SVG shape parameters (spiral turns, oval counts, petal count N=8)",
  "dot indicator active color (#e3a9bd)"
 ],
 "preserveElements": [
  "visibilitychange pause/resume guard",
  "IIFE wrapper",
  "prefers-reduced-motion check (stops auto-loop)",
  "aria-label on stage for screen readers"
 ],
 "knownLimitations": [
  "Auto-loop stops entirely under prefers-reduced-motion — no manual navigation fallback for those users",
  "No touch/swipe or keyboard navigation between slides"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "slideshow",
  "svg",
  "generative",
  "geometric",
  "pastel",
  "loop",
  "art-inspired"
 ]
}
</script>
</head>
<body>
<div id="afk06-stage" role="img" aria-label="Soft organic forms — spiral, oval, petals, vesica and concentric circles — dissolve one into the next on a slow loop, a sequence of seriated pastel diagrams after af Klint.">
  <div class="afk06-card on" id="afk06-stack"></div>
  <div class="afk06-dots" id="afk06-dots"></div>
</div>
<div class="afk06-cap">The Series</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const stack=document.getElementById('afk06-stack');
  const dotsWrap=document.getElementById('afk06-dots');
  const stage=document.getElementById('afk06-stage');
  if(!stack||!dotsWrap||!stage) return;
  stack.classList.remove('on');
  function rgbaHex(hex,a){const n=parseInt(hex.slice(1),16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}
  const C=['#a9c8e0','#e3a9bd','#ecd58a','#c3b3da','#a9c4a0'];
  function spiralSVG(){
    let d='M150 150';
    for(let th=0;th<6.5*Math.PI;th+=0.25){
      const r=4+th*9;
      d+=` L${(150+Math.cos(th)*r).toFixed(1)} ${(150+Math.sin(th)*r).toFixed(1)}`;
    }
    return `<path d="${d}" fill="none" stroke="${C[0]}" stroke-width="3" stroke-linecap="round"/>`;
  }
  function ovalSVG(){
    let s='';
    for(let i=5;i>=1;i--){
      const rx=30+i*22, ry=44+i*30;
      s+=`<ellipse cx="150" cy="150" rx="${rx}" ry="${ry}" fill="none" stroke="${i%2?C[1]:C[3]}" stroke-width="2" opacity="${0.4+i*0.1}"/>`;
    }
    s+=`<circle cx="150" cy="150" r="14" fill="${C[1]}"/>`; return s;
  }
  function petalSVG(){
    let s=''; const N=8;
    for(let i=0;i<N;i++){
      const a=(i/N)*Math.PI*2;
      const x=150+Math.cos(a)*60, y=150+Math.sin(a)*60;
      s+=`<ellipse cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" rx="20" ry="46" fill="${rgbaHex(i%2?C[4]:C[2],0.55)}" stroke="${C[2]}" stroke-width="1" transform="rotate(${(a*180/Math.PI+90).toFixed(1)} ${x.toFixed(1)} ${y.toFixed(1)})"/>`;
    }
    s+=`<circle cx="150" cy="150" r="20" fill="${C[4]}"/>`; return s;
  }
  function vesicaSVG(){
    return `<circle cx="118" cy="150" r="70" fill="${rgbaHex(C[0],0.4)}" stroke="${C[0]}" stroke-width="2"/>
            <circle cx="182" cy="150" r="70" fill="${rgbaHex(C[1],0.4)}" stroke="${C[1]}" stroke-width="2"/>
            <circle cx="150" cy="150" r="8" fill="#2a2730"/>`;
  }
  function concSVG(){
    let s='';
    for(let i=6;i>=1;i--){ s+=`<circle cx="150" cy="150" r="${i*20}" fill="none" stroke="${i%2?C[3]:C[2]}" stroke-width="2" opacity="${0.35+i*0.1}"/>`; }
    return s;
  }
  const builders=[spiralSVG,ovalSVG,petalSVG,vesicaSVG,concSVG];
  const cards=[];
  builders.forEach((b,i)=>{
    const card=document.createElement('div');card.className='afk06-card'+(i===0?' on':'');
    card.innerHTML=`<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">${b()}</svg>`;
    stage.insertBefore(card,dotsWrap);cards.push(card);
    const dot=document.createElement('div');dot.className='afk06-dot'+(i===0?' on':'');
    dotsWrap.appendChild(dot);
  });
  stack.remove();
  const dots=Array.from(dotsWrap.children);
  let cur=0, autoT=0, last=performance.now();
  function go(i){
    if(i===cur) return;
    cards[cur].classList.remove('on');dots[cur].classList.remove('on');
    cur=i;
    cards[cur].classList.add('on');dots[cur].classList.add('on');
  }
  let raf=0,running=false;
  function tick(now){
    if(!running) return;
    const dt=(now-last)/1000;last=now;
    autoT+=dt; if(autoT>3.4){autoT=0; go((cur+1)%cards.length);}
    raf=requestAnimationFrame(tick);
  }
  function start(){ if(running||REDUCED) return; running=true; last=performance.now(); raf=requestAnimationFrame(tick); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
  document.addEventListener('visibilitychange',()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });
  if(!REDUCED) start();
})();
</script>
</body>
</html>
