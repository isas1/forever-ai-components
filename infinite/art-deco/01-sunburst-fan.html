<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A symmetric fan of tapered gold rays opens and closes from a glowing core medallion over a ziggurat plinth and emerald-tinted black.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sunburst Fan</title>
<style>
  :root{
    --ad01-bg:#0c0b08; --ad01-gold:#d4af37; --ad01-gold-lt:#f1d98a;
    --ad01-gold-dk:#8a6d1f; --ad01-emerald:#10362c;
  }
  html,body{margin:0;height:100%;background:var(--ad01-bg);overflow:hidden}
  .ad01-stage{position:fixed;inset:0;display:grid;place-items:center;
    background:
      radial-gradient(120% 90% at 50% 116%, var(--ad01-emerald) 0%, transparent 55%),
      radial-gradient(80% 60% at 50% 30%, rgba(212,175,55,.10) 0%, transparent 60%),
      var(--ad01-bg);
  }
  .ad01-svg{width:100%;height:100%;display:block}
  /* fan blades: rotate around the base pivot (50,86) set via transform-box */
  .ad01-blade{
    transform-box:fill-box;transform-origin:50% 100%;
    animation:ad01-fan 7s cubic-bezier(.45,0,.2,1) infinite both;
  }
  /* ray sweep highlight */
  .ad01-spark{transform-box:fill-box;transform-origin:50% 100%;
    animation:ad01-spin 7s cubic-bezier(.45,0,.2,1) infinite both}
  @keyframes ad01-fan{
    0%,100%{transform:rotate(var(--c)) scaleY(.34)}
    46%,54%{transform:rotate(var(--o)) scaleY(1)}
  }
  @keyframes ad01-spin{
    0%,100%{transform:rotate(-2deg);opacity:.0}
    46%,54%{transform:rotate(2deg);opacity:.9}
  }
  /* breathing core medallion — opacity only */
  .ad01-pulse{animation:ad01-pulse 7s ease-in-out infinite both}
  @keyframes ad01-pulse{0%,100%{opacity:.45}48%{opacity:1}}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
    .ad01-blade{transform:rotate(var(--o)) scaleY(1)!important}
    .ad01-spark{opacity:.6!important;transform:rotate(0)!important}
    .ad01-pulse{opacity:1!important}
  }
</style>
<script type="application/json" id="forever-agent-meta">

 "description": "13 tapered gold rays open and close in mirrored symmetry from a glowing core medallion above a ziggurat plinth, breathing with a 7-second CSS cycle.",
 "useWhen": "Art deco hero sections, luxury brand intros, ambient looping backgrounds with a vintage geometric aesthetic.",

</head>
<body>
<div class="ad01-stage">
  <svg class="ad01-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice"
       role="img" aria-label="Art Deco sunburst fan of radiating gold rays opening and closing in symmetry"
       id="ad01-c">
    <defs>
      <linearGradient id="ad01-bladeG" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0" stop-color="var(--ad01-gold-dk)"/>
        <stop offset="55" stop-color="var(--ad01-gold)" stop-opacity="1"/>
        <stop offset="100" stop-color="var(--ad01-gold-lt)"/>
      </linearGradient>
      <linearGradient id="ad01-bladeG2" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0" stop-color="#6e560f"/>
        <stop offset="100" stop-color="var(--ad01-gold)"/>
      </linearGradient>
      <radialGradient id="ad01-core" cx="50%" cy="50%" r="50%">
        <stop offset="0" stop-color="var(--ad01-gold-lt)"/>
        <stop offset="60" stop-color="var(--ad01-gold)"/>
        <stop offset="100" stop-color="var(--ad01-gold-dk)"/>
      </radialGradient>
    </defs>

    <!-- static base fountain arcs (fine gold linework) -->
    <g fill="none" stroke="var(--ad01-gold)" stroke-width=".4" opacity=".28">
      <path d="M14 86 A36 36 0 0 1 86 86"/>
      <path d="M22 86 A28 28 0 0 1 78 86"/>
      <path d="M30 86 A20 20 0 0 1 70 86"/>
    </g>

    <!-- the fan: symmetric blades opening/closing. Built by JS for exact symmetry. -->
    <g id="ad01-fan"></g>

    <!-- ziggurat plinth -->
    <g fill="var(--ad01-gold)">
      <rect x="40" y="86" width="20" height="3.2"/>
      <rect x="35" y="89" width="30" height="2.6" opacity=".82"/>
      <rect x="29" y="91.4" width="42" height="2.4" opacity=".64"/>
      <rect x="22" y="93.6" width="56" height="2.6" opacity=".5"/>
    </g>

    <!-- core medallion at pivot -->
    <g class="ad01-pulse">
      <circle cx="50" cy="86" r="6.6" fill="url(#ad01-core)"/>
      <circle cx="50" cy="86" r="6.6" fill="none" stroke="var(--ad01-bg)" stroke-width=".7"/>
      <circle cx="50" cy="86" r="3.4" fill="none" stroke="var(--ad01-bg)" stroke-width=".7"/>
    </g>
  </svg>
</div>
<div class="cap">Sunburst Fan</div>

<script>
(function(){
  "use strict";
  var fan=document.getElementById("ad01-fan");
  if(!fan)return;
  var N=13;                 // odd -> a true center blade, perfect mirror symmetry
  var mid=(N-1)/2;
  var spread=84;            // total open angle (deg)
  var step=spread/(N-1);
  var ns="http://www.w3.org/2000/svg";
  // a single tapered blade pointing straight up from pivot (50,86)
  var d="M50 86 L47.4 40 Q50 33 52.6 40 Z";
  for(var i=0;i<N;i++){
    var open=(i-mid)*step;          // fanned-out target angle
    var closed=open*0.07;           // nearly stacked when closed
    var b=document.createElementNS(ns,"path");
    b.setAttribute("d",d);
    b.setAttribute("class","ad01-blade");
    b.setAttribute("fill", i%2 ? "url(#ad01-bladeG2)" : "url(#ad01-bladeG)");
    b.setAttribute("stroke","var(--ad01-bg)");
    b.setAttribute("stroke-width",".35");
    b.style.setProperty("--o", open.toFixed(2)+"deg");
    b.style.setProperty("--c", closed.toFixed(2)+"deg");
    // symmetric phase: blades open from center outward, mirrored L/R
    b.style.animationDelay=(Math.abs(i-mid)*0.045).toFixed(3)+"s";
    fan.appendChild(b);
    // thin spark edge line riding each ray for fine deco detailing
    var s=document.createElementNS(ns,"line");
    s.setAttribute("x1","50");s.setAttribute("y1","86");
    s.setAttribute("x2","50");s.setAttribute("y2","34");
    s.setAttribute("class","ad01-spark");
    s.setAttribute("stroke","var(--ad01-gold-lt)");
    s.setAttribute("stroke-width",".25");
    s.style.setProperty("--o", open.toFixed(2)+"deg");
    s.style.setProperty("--c", closed.toFixed(2)+"deg");
    s.style.transformOrigin="50% 100%";
    s.style.animationDelay=(Math.abs(i-mid)*0.045).toFixed(3)+"s";
    s.style.setProperty("transform","rotate("+open.toFixed(2)+"deg)");
    fan.appendChild(s);
  }

  // honor reduced motion: settle to fully-open frame, no loop
  var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;

  // pause/resume CSS animations with the tab; no rAF, no layout reads
  function setState(p){
    var els=fan.children,i;
    for(i=0;i<els.length;i++) els[i].style.animationPlayState=p;
    var pulse=document.querySelector(".ad01-pulse");
    if(pulse) pulse.style.animationPlayState=p;
  }
  if(reduce){ setState("paused"); return; }
  document.addEventListener("visibilitychange",function(){
    setState(document.hidden?"paused":"running");
  });
})();
</script>
</body>
</html>
