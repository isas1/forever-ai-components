<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="An ornate gold frame self-draws in fourfold symmetry — ziggurat corners, sunburst fans, chevrons and a fountain medallion — blooms bright th">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gatsby Frame</title>
<style>
  html,body{margin:0;height:100%;background:#0c0b08;overflow:hidden}
  #ad06-stage{position:fixed;inset:0;display:block}
  #ad06-svg{position:absolute;inset:0;width:100%;height:100%;
    box-shadow:inset 0 0 110px 26px rgba(0,0,0,.78)}
  /* All strokes share the draw timeline. We mirror one authored quadrant with
     SVG <use> + transforms so the border is born in perfect 4-fold symmetry. */
  .ad06-ln{fill:none;stroke:#d4af37;stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:var(--ad06-L);stroke-dashoffset:var(--ad06-L);
    animation:ad06-draw 4.2s cubic-bezier(.55,.06,.2,1) infinite}
  .ad06-fine{stroke:#8a6d1f}
  .ad06-hi{stroke:#f3dd92}
  .ad06-d1{animation-delay:0s}
  .ad06-d2{animation-delay:.34s}
  .ad06-d3{animation-delay:.66s}
  .ad06-d4{animation-delay:.98s}
  .ad06-d5{animation-delay:1.28s}
  /* a held bloom: drawn lines settle bright, then the whole cycle fades and redraws */
  @keyframes ad06-draw{
    0%   {stroke-dashoffset:var(--ad06-L);opacity:0}
    7%   {opacity:1}
    46%  {stroke-dashoffset:0;opacity:1}
    82%  {stroke-dashoffset:0;opacity:1}
    100% {stroke-dashoffset:0;opacity:0}
  }
  /* corner fans pulse open with the draw (transform only) */
  .ad06-fan{transform-box:fill-box;transform-origin:0 0;
    animation:ad06-fan 4.2s cubic-bezier(.55,.06,.2,1) infinite;opacity:.0}
  @keyframes ad06-fan{
    0%{transform:scale(.2)}10%{opacity:0}
    18%{opacity:.9}48%{transform:scale(1)}
    82%{transform:scale(1);opacity:.9}100%{transform:scale(1);opacity:0}
  }
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
    .ad06-ln{stroke-dashoffset:0!important;opacity:1!important}
    .ad06-fan{opacity:.9!important;transform:none!important}
  }
</style>
</head>
<body>
<div id="ad06-stage" role="img" aria-label="Art Deco animation: an ornamental gold frame drawing itself in fourfold symmetry on deep black — stepped ziggurat corners, fanned sunbursts, a fountain medallion, and fine gold linework that blooms bright then resets.">
  <svg id="ad06-svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- ONE authored corner unit (top-left quadrant, anchored near 0,0).
           Lengths set per-path via --ad06-L so the dash draw completes cleanly. -->
      <g id="ad06-corner">
        <!-- outer double rule running in from the corner along both edges -->
        <path class="ad06-ln ad06-fine ad06-d1" style="--ad06-L:300" d="M22 22 H200"/>
        <path class="ad06-ln ad06-fine ad06-d1" style="--ad06-L:300" d="M22 22 V200"/>
        <path class="ad06-ln ad06-d2" style="--ad06-L:300" d="M30 30 H200"/>
        <path class="ad06-ln ad06-d2" style="--ad06-L:300" d="M30 30 V200"/>
        <!-- stepped ziggurat block nested in the corner -->
        <path class="ad06-ln ad06-hi ad06-d3" style="--ad06-L:200"
          d="M30 78 H58 V58 H78 V42 H94"/>
        <path class="ad06-ln ad06-hi ad06-d3" style="--ad06-L:200"
          d="M78 30 V58 H58 V78 H42 V94"/>
        <!-- chevron pair pointing toward center along the edge -->
        <path class="ad06-ln ad06-d4" style="--ad06-L:120" d="M120 30 L150 44 L180 30"/>
        <path class="ad06-ln ad06-d4" style="--ad06-L:120" d="M30 120 L44 150 L30 180"/>
        <!-- corner sunburst fan (rays from the corner anchor) -->
        <g class="ad06-fan">
          <line class="ad06-ln ad06-hi ad06-d2" style="--ad06-L:70" x1="40" y1="40" x2="40" y2="104"/>
          <line class="ad06-ln ad06-hi ad06-d2" style="--ad06-L:70" x1="40" y1="40" x2="62" y2="100"/>
          <line class="ad06-ln ad06-hi ad06-d2" style="--ad06-L:70" x1="40" y1="40" x2="82" y2="88"/>
          <line class="ad06-ln ad06-hi ad06-d2" style="--ad06-L:70" x1="40" y1="40" x2="96" y2="68"/>
          <line class="ad06-ln ad06-hi ad06-d2" style="--ad06-L:70" x1="40" y1="40" x2="100" y2="44"/>
          <path class="ad06-ln ad06-d3" style="--ad06-L:120" d="M40 104 A64 64 0 0 1 104 40"/>
        </g>
      </g>
      <!-- one edge-midpoint flourish (top edge), mirrored to all four sides -->
      <g id="ad06-edge">
        <path class="ad06-ln ad06-d4" style="--ad06-L:60" d="M180 30 L200 44 L220 30"/>
        <path class="ad06-ln ad06-hi ad06-d5" style="--ad06-L:60"
          d="M192 30 L200 38 L208 30"/>
        <circle class="ad06-ln ad06-hi ad06-d5" style="--ad06-L:38" cx="200" cy="50" r="6"/>
      </g>
    </defs>

    <!-- 4-fold symmetric frame: the authored corner reflected across both axes -->
    <use href="#ad06-corner"/>
    <use href="#ad06-corner" transform="translate(400,0) scale(-1,1)"/>
    <use href="#ad06-corner" transform="translate(0,400) scale(1,-1)"/>
    <use href="#ad06-corner" transform="translate(400,400) scale(-1,-1)"/>
    <!-- edge flourishes on all four sides -->
    <use href="#ad06-edge"/>
    <use href="#ad06-edge" transform="translate(0,400) scale(1,-1)"/>
    <use href="#ad06-edge" transform="rotate(-90 200 200)"/>
    <use href="#ad06-edge" transform="rotate(90 200 200)"/>

    <!-- central fountain medallion: stacked arcs rising, drawn last -->
    <g>
      <path class="ad06-ln ad06-hi ad06-d5" style="--ad06-L:130" d="M160 230 A40 40 0 0 1 240 230"/>
      <path class="ad06-ln ad06-d5" style="--ad06-L:110" d="M170 232 A30 30 0 0 1 230 232"/>
      <path class="ad06-ln ad06-fine ad06-d5" style="--ad06-L:90" d="M180 234 A20 20 0 0 1 220 234"/>
      <line class="ad06-ln ad06-hi ad06-d5" style="--ad06-L:60" x1="200" y1="232" x2="200" y2="176"/>
      <line class="ad06-ln ad06-d5" style="--ad06-L:60" x1="200" y1="232" x2="182" y2="182"/>
      <line class="ad06-ln ad06-d5" style="--ad06-L:60" x1="200" y1="232" x2="218" y2="182"/>
      <circle class="ad06-ln ad06-hi ad06-d4" style="--ad06-L:24" cx="200" cy="232" r="3.6"/>
    </g>
  </svg>
</div>
<div class="cap">Gatsby Frame</div>
<script>
(function(){
  "use strict";
  var reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
  var svg = document.getElementById('ad06-svg');
  // CSS-only animation; JS just governs lifecycle (pause when hidden / settle when reduced).
  function setState(play){
    var nodes = svg.querySelectorAll('.ad06-ln, .ad06-fan');
    for(var i=0;i<nodes.length;i++){
      nodes[i].style.animationPlayState = play ? 'running' : 'paused';
    }
  }
  if(reduce){
    // honored by CSS @media (settles to the fully drawn, bloomed frame); nothing to loop.
    return;
  }
  document.addEventListener('visibilitychange', function(){
    setState(!document.hidden);
  });
})();
</script>
</body>
</html>
