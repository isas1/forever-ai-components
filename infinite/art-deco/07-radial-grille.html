<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Concentric gold rings, radial spokes and stepped lozenges counter-rotate like a wrought-iron elevator grille on deep black.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Radial Grille</title>
<style>
  :root{
    --ad07-bg:#0c0b08; --ad07-gold:#d4af37; --ad07-gold-lt:#f1d98a;
    --ad07-gold-dk:#8a6d1f; --ad07-emerald:#10362c;
  }
  html,body{margin:0;height:100%;background:var(--ad07-bg);overflow:hidden}
  .ad07-stage{position:fixed;inset:0;display:grid;place-items:center;
    background:
      radial-gradient(60% 60% at 50% 50%, rgba(212,175,55,.13) 0%, transparent 60%),
      radial-gradient(120% 120% at 50% 50%, var(--ad07-emerald) 0%, transparent 62%),
      var(--ad07-bg);
  }
  .ad07-svg{width:100%;height:100%;display:block}
  /* whole layers rotate; opposite layers counter-rotate for a wrought-iron grille shimmer */
  .ad07-rot{transform-box:view-box;transform-origin:50% 50%;
    animation:ad07-spin 38s linear infinite both}
  .ad07-rev{transform-box:view-box;transform-origin:50% 50%;
    animation:ad07-spin 26s linear infinite reverse both}
  @keyframes ad07-spin{to{transform:rotate(360deg)}}
  /* slow medallion breathing — opacity only, never repaints glow */
  .ad07-breathe{animation:ad07-breathe 9s ease-in-out infinite both}
  @keyframes ad07-breathe{0%,100%{opacity:.5}50%{opacity:1}}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
    .ad07-rot,.ad07-rev{transform:none!important}
    .ad07-breathe{opacity:1!important}
  }
  /* var() resolves only inside CSS property values, never in SVG presentation
     attributes — so all gold/bg fills+strokes are themed here, not on the elements. */
  #ad07-coreG .ad07-s0{stop-color:var(--ad07-gold-lt)}
  #ad07-coreG .ad07-s1{stop-color:var(--ad07-gold)}
  #ad07-coreG .ad07-s2{stop-color:var(--ad07-gold-dk)}
  #ad07-spokeG .ad07-s0{stop-color:var(--ad07-gold-lt)}
  #ad07-spokeG .ad07-s1{stop-color:var(--ad07-gold-dk)}
  .ad07-frame{fill:none;stroke:var(--ad07-gold)}
  .ad07-tracery{fill:none;stroke:var(--ad07-gold)}
  .ad07-med-bg{stroke:var(--ad07-bg)}
  .ad07-med-fill{fill:var(--ad07-bg)}
  .ad07-fill-gold{fill:var(--ad07-gold)}
  .ad07-fill-gold-lt{fill:var(--ad07-gold-lt)}
  .ad07-stroke-gold{stroke:var(--ad07-gold)}
  .ad07-stroke-gold-lt{stroke:var(--ad07-gold-lt)}
  .ad07-stroke-bg{stroke:var(--ad07-bg)}
</style>
<script type="application/json" id="forever-agent-meta">

 "title": "Radial Grille",
 "description": "Concentric gold rings, 16 spokes, and stepped lozenge diamonds counter-rotate in two layers against deep black, evoking a wrought-iron Art Deco elevator grille.",
 "useWhen": "Ambient hero backgrounds, luxury brand splash screens, or decorative loaders needing a timeless geometric aesthetic.",
 "avoidWhen": "Contexts requiring legible text overlay — the spinning layers compete with content. Avoid on low-end devices if many instances run simultaneously.",

</head>
<body>
<div class="ad07-stage">
  <svg class="ad07-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice"
       role="img" aria-label="Art Deco elevator grille: concentric gold rings, radial spokes and stepped lozenges turning in slow symmetry against deep black"
       id="ad07-c">
    <defs>
      <radialGradient id="ad07-coreG" cx="50%" cy="50%" r="50%">
        <stop class="ad07-s0" offset="0"/>
        <stop class="ad07-s1" offset="0.58"/>
        <stop class="ad07-s2" offset="1"/>
      </radialGradient>
      <linearGradient id="ad07-spokeG" x1="0" y1="0" x2="0" y2="1">
        <stop class="ad07-s0" offset="0"/>
        <stop class="ad07-s1" offset="1"/>
      </linearGradient>
    </defs>

    <!-- fixed outer frame rings: fine gold linework, the grille's casing -->
    <g class="ad07-frame" stroke-width=".35">
      <circle cx="50" cy="50" r="47" opacity=".30"/>
      <circle cx="50" cy="50" r="44.4" opacity=".55"/>
      <circle cx="50" cy="50" r="43.2" opacity=".22"/>
    </g>

    <!-- primary grille layer: long spokes + lozenges, turns clockwise -->
    <g class="ad07-rot" id="ad07-spokes"></g>
    <!-- counter layer: shorter spokes + ring, turns the other way -->
    <g class="ad07-rev" id="ad07-rev"></g>

    <!-- static concentric ring tracery (does not spin) -->
    <g class="ad07-tracery" stroke-width=".3" opacity=".42">
      <circle cx="50" cy="50" r="33"/>
      <circle cx="50" cy="50" r="24" opacity=".7"/>
      <circle cx="50" cy="50" r="15"/>
    </g>

    <!-- center medallion: stepped ziggurat eye -->
    <g class="ad07-breathe">
      <circle cx="50" cy="50" r="8.4" fill="url(#ad07-coreG)"/>
      <circle class="ad07-med-bg" cx="50" cy="50" r="8.4" fill="none" stroke-width=".7"/>
      <circle class="ad07-med-bg" cx="50" cy="50" r="5.2" fill="none" stroke-width=".6"/>
      <circle class="ad07-med-fill" cx="50" cy="50" r="2.3"/>
    </g>
  </svg>
</div>
<div class="cap">Radial Grille</div>

<script>
(function(){
  "use strict";
  var ns="http://www.w3.org/2000/svg";
  var spokes=document.getElementById("ad07-spokes");
  var rev=document.getElementById("ad07-rev");
  if(!spokes||!rev) return;

  function add(p,tag,attrs){
    var e=document.createElementNS(ns,tag),k;
    for(k in attrs) e.setAttribute(k,attrs[k]);
    p.appendChild(e); return e;
  }

  // PRIMARY: 16 spokes radiating from r=15 to r=44, each capped by a stepped lozenge.
  var N=16, i, a, x1,y1,x2,y2, lx,ly;
  for(i=0;i<N;i++){
    a=(i/N)*Math.PI*2;
    var c=Math.cos(a), s=Math.sin(a);
    x1=50+15*c;  y1=50+15*s;
    x2=50+42*c;  y2=50+42*s;
    add(spokes,"line",{x1:x1.toFixed(2),y1:y1.toFixed(2),x2:x2.toFixed(2),y2:y2.toFixed(2),
      stroke:"url(#ad07-spokeG)","stroke-width": i%2?".9":".5", opacity: i%2?".95":".6"});
    // stepped lozenge (deco chevron diamond) at r=33 on even spokes
    if(i%2===0){
      lx=50+33*c; ly=50+33*s;
      var nx=-s, ny=c; // tangent
      var d="M"+(lx+2.6*c)+" "+(ly+2.6*s)+
            "L"+(lx+1.7*nx)+" "+(ly+1.7*ny)+
            "L"+(lx-2.6*c)+" "+(ly-2.6*s)+
            "L"+(lx-1.7*nx)+" "+(ly-1.7*ny)+"Z";
      add(spokes,"path",{d:d,"class":"ad07-fill-gold ad07-stroke-bg","stroke-width":".3",opacity:".9"});
    }
  }
  // a polygon ring linking the spoke tips (faceted deco rim)
  var pts="";
  for(i=0;i<N;i++){a=(i/N)*Math.PI*2; pts+=(50+42*Math.cos(a)).toFixed(2)+","+(50+42*Math.sin(a)).toFixed(2)+" ";}
  add(spokes,"polygon",{points:pts.trim(),fill:"none","class":"ad07-stroke-gold","stroke-width":".4",opacity:".5"});

  // COUNTER LAYER: 12 short inner spokes + small dots, opposite rotation.
  var M=12;
  for(i=0;i<M;i++){
    a=(i/M)*Math.PI*2 + Math.PI/M;
    var cc=Math.cos(a), ss=Math.sin(a);
    add(rev,"line",{x1:(50+15*cc).toFixed(2),y1:(50+15*ss).toFixed(2),
      x2:(50+24*cc).toFixed(2),y2:(50+24*ss).toFixed(2),
      "class":"ad07-stroke-gold-lt","stroke-width":".4",opacity:".75"});
    add(rev,"circle",{cx:(50+24*cc).toFixed(2),cy:(50+24*ss).toFixed(2),r:".9",
      "class":"ad07-fill-gold-lt",opacity:".85"});
  }
  add(rev,"polygon",{points:(function(){var p="";for(var j=0;j<M;j++){var t=(j/M)*Math.PI*2+Math.PI/M;
    p+=(50+24*Math.cos(t)).toFixed(2)+","+(50+24*Math.sin(t)).toFixed(2)+" ";}return p.trim();})(),
    fill:"none","class":"ad07-stroke-gold","stroke-width":".35",opacity:".45"});

  // reduced motion: leave the static composed frame, no loop
  var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
  function setState(p){
    spokes.style.animationPlayState=p;
    rev.style.animationPlayState=p;
    var b=document.querySelector(".ad07-breathe");
    if(b) b.style.animationPlayState=p;
  }
  if(reduce){ setState("paused"); return; }
  document.addEventListener("visibilitychange",function(){
    setState(document.hidden?"paused":"running");
  });
})();
</script>
</body>
</html>
