<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Nested ziggurat arches recede into golden depth under a sunburst crown, breathing with a slow parallax shimmer on black.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stepped Portal</title>
<style>
  html,body{margin:0;height:100%;background:#0c0b08;overflow:hidden}
  #ad08-stage{position:fixed;inset:0;display:grid;place-items:center;background:
    radial-gradient(120% 90% at 50% 8%,#1a160d 0%,#0c0b08 62%)}
  #ad08-svg{width:100%;height:100%;display:block}
  /* static glow — never repaints */
  #ad08-svg .ad08-glow{filter:drop-shadow(0 0 6px rgba(212,175,55,.45))}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important}}
</style>
</head>
<body>
<div id="ad08-stage" role="img" aria-label="Art Deco stepped portal: nested ziggurat arches receding into golden depth, crowned by a radiating sunburst over deep black.">
  <svg id="ad08-svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="ad08-gold" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#f4dd8a"/>
        <stop offset=".5" stop-color="#d4af37"/>
        <stop offset="1" stop-color="#8a6d1f"/>
      </linearGradient>
      <radialGradient id="ad08-depth" cx="50%" cy="36%" r="62%">
        <stop offset="0" stop-color="#2a2310"/>
        <stop offset="1" stop-color="#0c0b08"/>
      </radialGradient>
    </defs>

    <rect width="400" height="400" fill="url(#ad08-depth)"/>

    <!-- Sunburst crown: rays + concentric fans, static halo -->
    <g id="ad08-sun" class="ad08-glow" transform="translate(200,150)">
      <g id="ad08-rays" stroke="url(#ad08-gold)" stroke-width="2" opacity=".85"></g>
      <circle r="9" fill="none" stroke="#f4dd8a" stroke-width="2"/>
      <circle r="16" fill="none" stroke="#d4af37" stroke-width="1"/>
      <circle r="3.4" fill="#f4dd8a"/>
    </g>

    <!-- Nested stepped arches, drawn back-to-front by script -->
    <g id="ad08-arches" class="ad08-glow"></g>

    <!-- Fountain spray of fine gold lines rising at the base -->
    <g id="ad08-fountain" stroke="#d4af37" stroke-width="1" fill="none" opacity=".7"></g>
  </svg>
</div>
<div class="cap">Stepped Portal</div>

<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg";
  var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
  var sun=document.getElementById("ad08-sun");
  var rays=document.getElementById("ad08-rays");
  var arches=document.getElementById("ad08-arches");
  var fountain=document.getElementById("ad08-fountain");

  function el(t,a){var e=document.createElementNS(NS,t);for(var k in a)e.setAttribute(k,a[k]);return e;}

  // --- Sunburst rays (24 spokes, alternating length) ---
  var RN=24;
  for(var i=0;i<RN;i++){
    var ang=(i/RN)*Math.PI*2;
    var r0=18, r1=(i%2?52:38);
    rays.appendChild(el("line",{
      x1:(Math.cos(ang)*r0).toFixed(1), y1:(Math.sin(ang)*r0).toFixed(1),
      x2:(Math.cos(ang)*r1).toFixed(1), y2:(Math.sin(ang)*r1).toFixed(1)
    }));
  }

  // --- Stepped (ziggurat) arches. Each is a centered stepped silhouette outline. ---
  // Build one stepped-arch path of half-width hw, springline y=sy, step size s.
  function steppedArch(hw, sy, s, top){
    var d="M "+(200-hw)+" 400";
    var y=sy, x=hw;
    d+=" L "+(200-x)+" "+y;
    while(x>s && y>top){
      x-=s; y-=s;
      d+=" L "+(200-x)+" "+(y+s);   // horizontal in
      d+=" L "+(200-x)+" "+y;       // vertical up
    }
    // crown flat
    d+=" L "+(200+x)+" "+y;
    // mirror descent
    while(x<hw){
      d+=" L "+(200+x)+" "+(y+s);
      x+=s; y+=s;
      d+=" L "+(200+(x))+" "+(y);
    }
    d+=" L "+(200+hw)+" 400 Z";
    return d;
  }

  var LAYERS=7, paths=[];
  for(var L=0;L<LAYERS;L++){
    var t=L/(LAYERS-1);                 // 0 outer .. 1 inner
    var hw=160-t*118;                   // 160 -> 42
    var sy=360-t*150;                   // springline rises with depth
    var step=18-t*8;                    // smaller steps deeper in
    var top=150-t*4;
    var op=(0.30+t*0.62).toFixed(2);
    var p=el("path",{
      d:steppedArch(hw,sy,step,top),
      fill:"none", stroke:"url(#ad08-gold)",
      "stroke-width":(1.4-t*0.5).toFixed(2),
      "stroke-linejoin":"miter", opacity:op
    });
    arches.appendChild(p);
    paths.push(p);
  }
  // central keystone diamond at the throat
  arches.appendChild(el("path",{
    d:"M200 132 L214 150 L200 168 L186 150 Z",
    fill:"none", stroke:"#f4dd8a","stroke-width":"1.2", opacity:".9"
  }));

  // --- Fountain: symmetric fan of thin arcs rising from base center ---
  var FN=11;
  for(var f=0;f<FN;f++){
    var fr=(f/(FN-1))*2-1;              // -1..1
    var spread=fr*120;
    fountain.appendChild(el("path",{
      d:"M200 400 Q "+(200+spread*0.5)+" "+(300- (1-Math.abs(fr))*90)+" "+(200+spread)+" 250",
      opacity:(0.18+(1-Math.abs(fr))*0.45).toFixed(2)
    }));
  }

  // --- One static reduced-motion frame ---
  function frameStatic(){
    sun.setAttribute("transform","translate(200,150) scale(1)");
    for(var k=0;k<paths.length;k++) paths[k].setAttribute("transform","");
  }
  if(reduce){ frameStatic(); return; }

  // --- Animation: slow pulse of depth (parallax scale per layer) + sun breathe ---
  // Precompute per-layer phase + amplitude. Allocation-free loop.
  var amp=new Float32Array(LAYERS), pha=new Float32Array(LAYERS);
  for(var a=0;a<LAYERS;a++){ amp[a]=0.006+0.010*(a/(LAYERS-1)); pha[a]=a*0.5; }

  var running=true, raf=0, t0=performance.now();
  function tick(now){
    if(!running) return;
    var s=(now-t0)*0.001;
    // sun: gentle counter-rotation + tiny breathe (transform only)
    var sr=Math.sin(s*0.35)*6;
    var sc=1+Math.sin(s*0.7)*0.03;
    sun.setAttribute("transform","translate(200,150) rotate("+sr.toFixed(2)+") scale("+sc.toFixed(3)+")");
    // arches: each layer scales subtly about throat (200,150) -> receding shimmer
    for(var k=0;k<LAYERS;k++){
      var sk=1+Math.sin(s*0.8+pha[k])*amp[k];
      paths[k].setAttribute("transform","translate(200 150) scale("+sk.toFixed(4)+") translate(-200 -150)");
    }
    raf=requestAnimationFrame(tick);
  }
  raf=requestAnimationFrame(tick);

  document.addEventListener("visibilitychange",function(){
    if(document.hidden){ running=false; if(raf)cancelAnimationFrame(raf); }
    else if(!running){ running=true; t0=performance.now(); raf=requestAnimationFrame(tick); }
  });
})();
</script>
</body>
</html>
