<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Stepped Art Deco skyline of gold-corniced towers with window rows glowing in a slow symmetric wave under a sunburst crown.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Skyline Pulse</title>
<style>
  :root{
    --ad10-bg:#0c0b08;
    --ad10-gold:#d4af37;
    --ad10-gold-2:#f4d77b;
    --ad10-emerald:#0e3b32;
    --ad10-deep:#07140f;
  }
  html,body{margin:0;height:100%;background:var(--ad10-bg);overflow:hidden}
  #ad10-stage{
    position:fixed;inset:0;width:100%;height:100%;
    display:block;background:
      radial-gradient(120% 90% at 50% 110%, var(--ad10-emerald) 0%, var(--ad10-deep) 40%, var(--ad10-bg) 75%);
  }
  #ad10-svg{position:absolute;inset:0;width:100%;height:100%}
  /* sunburst rays — static, only opacity flickers via window groups */
  .ad10-win{opacity:.18}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important}}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/art-deco/10-skyline-pulse.html",
 "title": "Skyline Pulse",
 "description": "A symmetric stepped Art Deco skyline of 7 gold-corniced towers with window grids pulsing in a slow sine wave; sunburst halo crowns the central spire.",
 "useWhen": "Dark-mode hero backgrounds, architectural or luxury brand contexts, ambient looping displays needing elegant geometric motion.",
 "avoidWhen": "Light backgrounds (colors hardcoded for near-black). Contexts needing legible text overlay — window pulse competes for attention.",
 "agentPrompt": "Change the gold accent from #d4af37 to rose gold (#b76e79, update --ad10-gold), slow the pulse wave by changing 1.85 to 1.2 in the sine formula, and add a fourth outermost tower pair at cx:4/396.",
 "editableAreas": [
  "gold color (--ad10-gold, #d4af37)",
  "pulse speed (t*1.85 in frame loop)",
  "phase offsets array (phase=[0,1.4,1.4,2.6,2.6,3.6,3.6])",
  "tower definitions (towers array — cx, w, steps, cols)",
  "sunburst ray count (N=36)",
  "background emerald gradient (--ad10-emerald)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "visibilitychange pause/resume guard",
  "prefers-reduced-motion static fallback",
  "symmetric phase pairing (symmetric towers share phase for visual coherence)"
 ],
 "knownLimitations": [
  "All colors hardcoded for dark background — light theme requires significant rework",
  "Window opacity sine is clamped well below 3Hz but may still read as busy on very small tiles",
  "SVG procedurally generated at runtime — no static fallback image for crawlers"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "art-deco",
  "skyline",
  "svg",
  "cityscape",
  "ambient",
  "gold",
  "architecture"
 ]
}
</script>
</head>
<body>
<div id="ad10-stage" role="img" aria-label="Art Deco city skyline of stepped towers with rows of windows glowing in slow rhythm against a black and emerald night, crowned by a fine gold sunburst.">
  <svg id="ad10-svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <linearGradient id="ad10-sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#0c0b08"/>
        <stop offset="1" stop-color="#0a1f1a"/>
      </linearGradient>
      <linearGradient id="ad10-tower" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#15130d"/>
        <stop offset="1" stop-color="#060a08"/>
      </linearGradient>
      <radialGradient id="ad10-moon" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0" stop-color="#f4d77b"/>
        <stop offset=".55" stop-color="#d4af37"/>
        <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
      </radialGradient>
      <filter id="ad10-soft" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="2.2"/>
      </filter>
    </defs>

    <rect x="0" y="0" width="400" height="400" fill="url(#ad10-sky)"/>

    <!-- Sunburst halo behind the central spire (static glow) -->
    <g transform="translate(200 150)" opacity=".5">
      <g id="ad10-rays"></g>
      <circle r="34" fill="url(#ad10-moon)"/>
      <circle r="34" fill="none" stroke="#f4d77b" stroke-width="1" opacity=".5"/>
    </g>

    <!-- Decorative fan arcs framing the crown -->
    <g transform="translate(200 150)" fill="none" stroke="#d4af37" stroke-width="1">
      <path d="M -150 6 A 152 152 0 0 1 150 6" opacity=".22"/>
      <path d="M -118 4 A 120 120 0 0 1 118 4" opacity=".16"/>
    </g>

    <!-- Skyline groups injected by script -->
    <g id="ad10-city"></g>

    <!-- Ground baseline + chevron frieze -->
    <rect x="0" y="372" width="400" height="28" fill="#06100c"/>
    <g id="ad10-frieze" stroke="#d4af37" stroke-width="1.2" fill="none" opacity=".55"></g>
  </svg>
</div>
<div class="cap">Skyline Pulse</div>

<script>
(function(){
  "use strict";
  var svgns="http://www.w3.org/2000/svg";
  var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;

  function el(tag,attrs){
    var n=document.createElementNS(svgns,tag),k;
    for(k in attrs) n.setAttribute(k,attrs[k]);
    return n;
  }

  // --- Sunburst rays behind the spire ---
  var rays=document.getElementById("ad10-rays");
  var i,a,N=36;
  for(i=0;i<N;i++){
    a=(i/N)*Math.PI*2;
    var r1=40,r2=132+ (i%2?0:14);
    rays.appendChild(el("line",{
      x1:Math.cos(a)*r1, y1:Math.sin(a)*r1,
      x2:Math.cos(a)*r2, y2:Math.sin(a)*r2,
      stroke:"#d4af37","stroke-width": i%2?0.6:1.1,
      opacity: i%2?0.18:0.34
    }));
  }

  // --- Build symmetric stepped skyline ---
  // towers defined as half-widths/heights, mirrored about center x=200
  var city=document.getElementById("ad10-city");
  // {cx, baseW, ziggurat steps as [w,h], window cols/rows}
  var towers=[
    {cx:200, w:62, steps:[[1,150],[0.74,46],[0.46,40],[0.22,52]], cols:5, top:60},
    {cx:128, w:50, steps:[[1,118],[0.66,40],[0.34,34]], cols:4, top:118},
    {cx:272, w:50, steps:[[1,118],[0.66,40],[0.34,34]], cols:4, top:118},
    {cx:66,  w:44, steps:[[1,92],[0.6,30]], cols:3, top:170},
    {cx:334, w:44, steps:[[1,92],[0.6,30]], cols:3, top:170},
    {cx:18,  w:40, steps:[[1,70]], cols:3, top:226},
    {cx:382, w:40, steps:[[1,70]], cols:3, top:226}
  ];

  var groundY=372;
  var winGroups=[]; // collect window <g> for rAF rhythm

  function tower(t){
    var g=el("g",{});
    // body: stack steps from ground up
    var baseTop=groundY, halfBase=t.w/2;
    var s, topY=groundY, cumY=groundY;
    // draw from bottom; compute each step rectangle
    var y=groundY;
    for(s=0;s<t.steps.length;s++){
      var hw=halfBase*t.steps[s][0];
      var h=t.steps[s][1];
      g.appendChild(el("rect",{
        x:t.cx-hw, y:y-h, width:hw*2, height:h+2, fill:"url(#ad10-tower)"
      }));
      // gold cornice line at each setback
      g.appendChild(el("line",{
        x1:t.cx-hw, y1:y-h, x2:t.cx+hw, y2:y-h,
        stroke:"#d4af37","stroke-width":0.8, opacity:0.5
      }));
      y-=h;
    }
    // central vertical pilaster
    g.appendChild(el("line",{x1:t.cx,y1:t.top,x2:t.cx,y2:groundY,stroke:"#d4af37","stroke-width":0.6,opacity:0.22}));
    city.appendChild(g);

    // windows: rows down the main shaft, a grid of small gold rects
    var wg=el("g",{class:"ad10-win"});
    var cols=t.cols, mainH=t.steps[0][1];
    var shaftTopY=groundY-mainH;
    var rows=Math.max(3,Math.round(mainH/16));
    var pad=halfBase*0.30;
    var usableW=(halfBase-pad)*2;
    var cw=usableW/cols, ww=Math.min(3.4,cw*0.46);
    var ch=Math.min(7,(mainH-12)/rows), wh=ch*0.5;
    var c,rr;
    for(rr=0;rr<rows;rr++){
      for(c=0;c<cols;c++){
        var wx=t.cx-usableW/2 + c*cw + (cw-ww)/2;
        var wy=shaftTopY+8 + rr*ch;
        if(wy>groundY-6) continue;
        wg.appendChild(el("rect",{x:wx,y:wy,width:ww,height:wh,rx:0.4,fill:"#f4d77b"}));
      }
    }
    city.appendChild(wg);
    winGroups.push(wg);
  }
  towers.forEach(tower);

  // crown lantern on central spire
  city.appendChild(el("circle",{cx:200,cy:62,r:3.2,fill:"#f4d77b"}));
  city.appendChild(el("line",{x1:200,y1:58,x2:200,y2:44,stroke:"#d4af37","stroke-width":1}));

  // chevron frieze along the ground band
  var fr=document.getElementById("ad10-frieze");
  for(i=0;i<=400;i+=16){
    fr.appendChild(el("path",{d:"M "+i+" 388 L "+(i+8)+" 380 L "+(i+16)+" 388"}));
  }

  // --- Rhythm: light groups of windows in a slow symmetric wave ---
  // Reduced motion: leave a calm static lit frame and stop.
  if(reduce){
    for(i=0;i<winGroups.length;i++) winGroups[i].style.opacity=(i%2?0.34:0.62);
    return;
  }

  // Assign phase per group (symmetric pairs share phase for Deco symmetry)
  var phase=[0, 1.4,1.4, 2.6,2.6, 3.6,3.6];
  var running=true, raf=0, start=performance.now();

  function frame(now){
    if(!running) return;
    var t=(now-start)/1000;
    for(var k=0;k<winGroups.length;k++){
      // slow sine, clamped — no strobe (period ~3.4s, well under 3Hz)
      var v=0.16+0.84*(0.5+0.5*Math.sin(t*1.85 - phase[k]));
      winGroups[k].style.opacity=v;
    }
    raf=requestAnimationFrame(frame);
  }
  raf=requestAnimationFrame(frame);

  document.addEventListener("visibilitychange",function(){
    if(document.hidden){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
    else if(!running){ running=true; start=performance.now(); raf=requestAnimationFrame(frame); }
  });
})();
</script>
</body>
</html>
