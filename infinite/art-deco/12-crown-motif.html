<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Gold crown and sunrise emblem breathes open over a slowly rotating ray halo and flanking shimmer sparks on black.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crown Motif</title>
<style>
  :root{
    --ad12-bg:#0c0b08;
    --ad12-gold:#d4af37;
    --ad12-gold-hi:#f3e0a3;
    --ad12-gold-dim:#8a6f24;
    --ad12-emerald:#0f3a30;
  }
  html,body{margin:0;height:100%;background:var(--ad12-bg);overflow:hidden}
  .ad12-stage{
    position:fixed;inset:0;display:grid;place-items:center;
    background:
      radial-gradient(120% 90% at 50% 92%, var(--ad12-emerald) 0%, transparent 46%),
      radial-gradient(80% 60% at 50% 30%, #16130c 0%, var(--ad12-bg) 70%);
  }
  .ad12-svg{width:100%;height:100%;display:block}
  /* static glow — never repaints */
  #ad12-rays,#ad12-fan,#ad12-orb{filter:drop-shadow(0 0 6px rgba(212,175,55,.35))}

  @keyframes ad12-breathe{
    0%,100%{transform:scale(.965)}
    50%{transform:scale(1.035)}
  }
  @keyframes ad12-fanopen{
    0%,100%{transform:scaleY(.86) translateY(6px)}
    50%{transform:scaleY(1) translateY(0)}
  }
  @keyframes ad12-orbpulse{
    0%,100%{transform:scale(.9);opacity:.85}
    50%{transform:scale(1.06);opacity:1}
  }
  @keyframes ad12-spin{ to{transform:rotate(360deg)} }
  @keyframes ad12-shimmer{
    0%,100%{opacity:.30}
    50%{opacity:.85}
  }

  #ad12-rays{transform-box:fill-box;transform-origin:50% 100%;animation:ad12-spin 60s linear infinite}
  #ad12-fan{transform-box:fill-box;transform-origin:50% 100%;animation:ad12-fanopen 7s cubic-bezier(.45,0,.2,1) infinite}
  #ad12-crown{transform-box:fill-box;transform-origin:50% 78%;animation:ad12-breathe 7s cubic-bezier(.45,0,.2,1) infinite}
  #ad12-orb{transform-box:fill-box;transform-origin:50% 50%;animation:ad12-orbpulse 7s cubic-bezier(.45,0,.2,1) infinite}
  .ad12-spark{transform-box:fill-box;transform-origin:50% 100%;animation:ad12-shimmer 3.5s ease-in-out infinite}

  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
    #ad12-fan{transform:scaleY(1)}
    #ad12-crown{transform:scale(1)}
    #ad12-orb{transform:scale(1);opacity:1}
  }
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/art-deco/12-crown-motif.html",
 "title": "Crown Motif",
 "description": "Gold art-deco crown breathes open over a slow-spinning ray halo with alternating fan wedges and flanking shimmer sparks on black.",
 "useWhen": "Luxury brand hero backgrounds, title screens, dark-theme decorative headers needing regal ambient motion.",

  "fan spoke count (M=15)",
  "ray count (N=48)",
  "breathe scale range (.965 / 1.035)"
 ],

  "IIFE wrapper with DocumentFragment batch inserts",

</head>
<body>
  <div class="ad12-stage">
    <svg class="ad12-svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet"
         role="img" aria-label="Art Deco crown and sunrise motif breathing open in gold on black">
      <defs>
        <linearGradient id="ad12-gGold" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="var(--ad12-gold-hi)"/>
          <stop offset="1" stop-color="var(--ad12-gold-dim)"/>
        </linearGradient>
        <radialGradient id="ad12-gOrb" cx="50%" cy="50%" r="50%">
          <stop offset="0" stop-color="var(--ad12-gold-hi)"/>
          <stop offset="60%" stop-color="var(--ad12-gold)"/>
          <stop offset="100%" stop-color="var(--ad12-gold-dim)"/>
        </radialGradient>
      </defs>

      <!-- baseline plinth (stepped ziggurat) -->
      <g fill="none" stroke="var(--ad12-gold)" stroke-width="2" opacity=".9">
        <path d="M70 330 H330 M86 344 H314 M104 358 H296"/>
      </g>
      <rect x="150" y="316" width="100" height="10" fill="var(--ad12-gold-dim)" opacity=".5"/>

      <!-- rotating fine ray halo, anchored at crown base -->
      <g id="ad12-rays" stroke="var(--ad12-gold-dim)" stroke-width="1" opacity=".55">
        <!-- generated lines -->
      </g>

      <!-- breathing fan of sunburst spokes -->
      <g id="ad12-fan">
        <g id="ad12-fanspokes" fill="url(#ad12-gGold)"></g>
      </g>

      <!-- the crown / sunrise structure -->
      <g id="ad12-crown" fill="none" stroke="url(#ad12-gGold)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
        <!-- central stepped spire -->
        <path d="M200 96 L188 150 H212 Z"/>
        <path d="M176 160 L200 120 L224 160"/>
        <!-- chevrons climbing -->
        <path d="M160 210 L200 168 L240 210" stroke-width="2.4"/>
        <path d="M146 250 L200 196 L254 250" stroke-width="2.4"/>
        <!-- side wings -->
        <path d="M122 300 L122 252 L158 286" stroke-width="2.4"/>
        <path d="M278 300 L278 252 L242 286" stroke-width="2.4"/>
        <!-- inner accent peaks -->
        <path d="M180 250 L200 224 L220 250" stroke="var(--ad12-gold-hi)" stroke-width="1.6" opacity=".9"/>
      </g>

      <!-- crowning orb -->
      <circle id="ad12-orb" cx="200" cy="86" r="14" fill="url(#ad12-gOrb)"/>

      <!-- shimmer sparks flanking the spire -->
      <g fill="var(--ad12-gold-hi)">
        <path class="ad12-spark" style="animation-delay:0s"   d="M150 150 l4 10 l-4 10 l-4 -10 Z"/>
        <path class="ad12-spark" style="animation-delay:1.2s" d="M250 150 l4 10 l-4 10 l-4 -10 Z"/>
        <path class="ad12-spark" style="animation-delay:.6s"  d="M118 200 l3 8 l-3 8 l-3 -8 Z"/>
        <path class="ad12-spark" style="animation-delay:1.8s" d="M282 200 l3 8 l-3 8 l-3 -8 Z"/>
      </g>
    </svg>
  </div>
  <div class="cap">Crown Motif</div>

<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg";

  // build rotating ray halo (fine gold linework radiating from base 200,300)
  var rays=document.getElementById("ad12-rays");
  if(rays){
    var cx=200, cy=300, R=185, N=48, frag=document.createDocumentFragment();
    for(var i=0;i<N;i++){
      var a=(-Math.PI) + (Math.PI/(N-1))*i; // upper semicircle fan
      var ln=document.createElementNS(NS,"line");
      ln.setAttribute("x1",cx); ln.setAttribute("y1",cy);
      ln.setAttribute("x2",(cx+Math.cos(a)*R).toFixed(1));
      ln.setAttribute("y2",(cy+Math.sin(a)*R).toFixed(1));
      if(i%2) ln.setAttribute("opacity",".4");
      frag.appendChild(ln);
    }
    rays.appendChild(frag);
  }

  // build breathing fan: alternating wide gold wedges
  var fan=document.getElementById("ad12-fanspokes");
  if(fan){
    var fx=200, fy=300, fr=150, M=15, f2=document.createDocumentFragment();
    for(var k=0;k<M;k++){
      var t=(-Math.PI*0.92) + (Math.PI*0.84/(M-1))*k;
      var w=0.026;
      var p=document.createElementNS(NS,"path");
      var x1=fx+Math.cos(t-w)*fr, y1=fy+Math.sin(t-w)*fr;
      var x2=fx+Math.cos(t+w)*fr, y2=fy+Math.sin(t+w)*fr;
      p.setAttribute("d","M"+fx+" "+fy+" L"+x1.toFixed(1)+" "+y1.toFixed(1)+" L"+x2.toFixed(1)+" "+y2.toFixed(1)+" Z");
      p.setAttribute("opacity", (k%2)? ".16" : ".28");
      f2.appendChild(p);
    }
    fan.appendChild(f2);
  }

  // visibility: pause CSS animations when hidden, resume on return.
  function setPlay(state){
    var els=document.querySelectorAll('[style],[id^="ad12-"],.ad12-spark');
    var a=document.querySelectorAll('#ad12-rays,#ad12-fan,#ad12-crown,#ad12-orb,.ad12-spark');
    for(var i=0;i<a.length;i++){ a[i].style.animationPlayState=state; }
  }
  document.addEventListener("visibilitychange",function(){
    setPlay(document.hidden ? "paused" : "running");
  });
})();
</script>
</body>
</html>
