<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Whiplash Art Nouveau vine draws itself upward as gold buds and green leaves bloom in along its S-curves on dark green.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vine Grow</title>
<style>
  html,body{margin:0;height:100%;background:#0e1310;overflow:hidden}
  #an01-stage{position:fixed;inset:0;display:block}
  /* Vine line draws itself via dashoffset (transform/opacity-free but cheap, non-layout) */
  .an01-stem{
    fill:none;stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:var(--an01-len);stroke-dashoffset:var(--an01-len);
    animation:an01-draw 5.2s cubic-bezier(.5,.02,.34,1) infinite;
  }
  .an01-s1{--an01-len:980;stroke:#7e9c63;stroke-width:5.2;animation-delay:0s}
  .an01-s2{--an01-len:560;stroke:#8fae72;stroke-width:3.4;animation-delay:.9s}
  .an01-s3{--an01-len:520;stroke:#8fae72;stroke-width:3.4;animation-delay:1.5s}
  .an01-hi{--an01-len:980;stroke:#c9a24b;stroke-width:1.4;opacity:.55;animation-delay:.1s}
  @keyframes an01-draw{
    0%{stroke-dashoffset:var(--an01-len)}
    46%{stroke-dashoffset:0}
    84%{stroke-dashoffset:0;opacity:1}
    100%{stroke-dashoffset:0;opacity:1}
  }
  /* Leaves & buds bloom in: transform + opacity only */
  .an01-leaf{transform-box:fill-box;transform-origin:var(--ox,0) var(--oy,100%);
    opacity:0;transform:scale(.05) rotate(-8deg);
    animation:an01-bloom 5.2s cubic-bezier(.34,1.4,.5,1) infinite;animation-delay:var(--d,1s)}
  @keyframes an01-bloom{
    0%,8%{opacity:0;transform:scale(.05) rotate(-8deg)}
    24%{opacity:1;transform:scale(1) rotate(0)}
    84%{opacity:1;transform:scale(1) rotate(0)}
    100%{opacity:1;transform:scale(1) rotate(0)}
  }
  .an01-bud{transform-box:fill-box;transform-origin:50% 100%;opacity:0;transform:scale(.1);
    animation:an01-pop 5.2s cubic-bezier(.34,1.6,.5,1) infinite;animation-delay:var(--d,2s)}
  @keyframes an01-pop{0%,20%{opacity:0;transform:scale(.1)}40%{opacity:1;transform:scale(1)}100%{opacity:1;transform:scale(1)}}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
    .an01-stem{stroke-dashoffset:0!important}
    .an01-leaf,.an01-bud{opacity:1!important;transform:none!important}
  }
</style>

<body>
<svg id="an01-stage" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice"
     role="img" aria-label="An Art Nouveau whiplash vine drawing itself with budding leaves in muted green and gold.">
  <defs>
    <radialGradient id="an01-bg" cx="38%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#16201a"/>
      <stop offset="60%" stop-color="#0e1310"/>
      <stop offset="100%" stop-color="#080b09"/>
    </radialGradient>
    <radialGradient id="an01-petal" cx="50%" cy="20%" r="90%">
      <stop offset="0%" stop-color="#e7c98f"/>
      <stop offset="55%" stop-color="#c9a24b"/>
      <stop offset="100%" stop-color="#9c7a34"/>
    </radialGradient>
    <linearGradient id="an01-leafg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9bbd79"/>
      <stop offset="100%" stop-color="#5d7a48"/>
    </linearGradient>
    <!-- STATIC glow, never animated/repainted -->
    <filter id="an01-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="url(#an01-bg)"/>

  <!-- faint stained-glass cell arcs, static -->
  <g stroke="#c9a24b" stroke-width="1" fill="none" opacity=".1">
    <path d="M60,400 C60,250 150,220 200,150 C250,80 230,30 300,0"/>
    <path d="M340,400 C340,300 280,250 300,160"/>
  </g>

  <!-- main whiplash stem: from lower-left, S-curve up, asymmetric flourish -->
  <g filter="url(#an01-glow)">
    <path class="an01-stem an01-s1"
      d="M40,398 C 70,300 30,250 120,210 C 210,170 150,110 210,70 C 250,44 320,60 300,8"/>
    <path class="an01-stem an01-hi"
      d="M40,398 C 70,300 30,250 120,210 C 210,170 150,110 210,70 C 250,44 320,60 300,8"/>
    <!-- secondary tendrils -->
    <path class="an01-stem an01-s2" d="M120,210 C 60,200 30,150 70,110 C 95,84 70,60 110,55"/>
    <path class="an01-stem an01-s3" d="M210,70 C 290,90 330,140 330,210 C 330,250 300,280 320,330"/>
  </g>

  <!-- leaves (whiplash teardrop) placed along the curves -->
  <g fill="url(#an01-leafg)" stroke="#3f5733" stroke-width="1.1">
    <path class="an01-leaf" style="--d:1.5s;--ox:0;--oy:100%"
      d="M118,212 C 92,196 72,168 78,140 C 100,158 122,184 118,212 Z"/>
    <path class="an01-leaf" style="--d:2s;--ox:0;--oy:0"
      d="M210,72 C 244,60 280,68 304,92 C 270,98 232,96 210,72 Z"/>
    <path class="an01-leaf" style="--d:2.6s;--ox:0;--oy:100%"
      d="M330,210 C 356,194 380,206 388,236 C 360,236 336,234 330,210 Z"/>
    <path class="an01-leaf" style="--d:1.1s;--ox:100%;--oy:100%"
      d="M70,300 C 40,288 22,262 30,236 C 56,254 76,278 70,300 Z"/>
  </g>

  <!-- buds / blossoms in gold -->
  <g stroke="#7a5e28" stroke-width="1">
    <g class="an01-bud" style="--d:3s">
      <circle cx="300" cy="9" r="9" fill="url(#an01-petal)"/>
      <circle cx="300" cy="9" r="3.4" fill="#5d7a48" stroke="none"/>
    </g>
    <g class="an01-bud" style="--d:3.5s">
      <circle cx="110" cy="55" r="7" fill="url(#an01-petal)"/>
      <circle cx="110" cy="55" r="2.6" fill="#5d7a48" stroke="none"/>
    </g>
    <g class="an01-bud" style="--d:4s">
      <circle cx="320" cy="330" r="8" fill="url(#an01-petal)"/>
      <circle cx="320" cy="330" r="3" fill="#5d7a48" stroke="none"/>
    </g>
  </g>
</svg>
<div class="cap">Vine Grow</div>
<script>
(function(){
  "use strict";
  var svg=document.getElementById("an01-stage");
  if(!svg)return;
  var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
  if(reduce){
    // CSS already settles to a static, fully-grown frame; ensure no animation runs.
    return;
  }
  // Pause SMIL/CSS-driven motion when tab hidden to save the compositor.
  function setPlay(state){
    var i,els=svg.querySelectorAll(".an01-stem,.an01-leaf,.an01-bud");
    for(i=0;i<els.length;i++){els[i].style.animationPlayState=state;}
  }
  document.addEventListener("visibilitychange",function(){
    setPlay(document.hidden?"paused":"running");
  });
})();
</script>
