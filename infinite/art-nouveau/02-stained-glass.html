<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Art Nouveau stained-glass window of floral lead-came cells lighting up in organic sequence with glowing halos on dark glass.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stained Glass</title>
<style>
  :root{
    --an02-bg:#0e1310; --an02-lead:#070a08; --an02-gold:#c9a24b;
    --an02-rose:#b86b78; --an02-green:#6f8e5e; --an02-teal:#3f7d77;
    --an02-amber:#d8b35a; --an02-glow:#f3e2a8;
  }
  html,body{margin:0;height:100%;background:var(--an02-bg);overflow:hidden}
  .an02-stage{position:fixed;inset:0;display:grid;place-items:center}
  #an02-svg{width:100%;height:100%;display:block}
  /* lit cells: only opacity + transform animate */
  .an02-cell{opacity:.16;transform-box:fill-box;transform-origin:center;
    transform:scale(.985);will-change:opacity,transform;
    transition:opacity .9s ease,transform .9s ease}
  .an02-cell.an02-on{opacity:1;transform:scale(1)}
  /* static glow halos, never repaint */
  .an02-halo{opacity:0;transition:opacity 1.1s ease}
  .an02-halo.an02-on{opacity:.5}
  .an02-lead{fill:none;stroke:var(--an02-lead);stroke-linejoin:round;stroke-linecap:round}
  .an02-vine{fill:none;stroke:var(--an02-gold);stroke-linecap:round;opacity:.85}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
    .an02-cell{opacity:1;transform:scale(1);transition:none}
    .an02-halo{opacity:.42;transition:none}
  }
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/art-nouveau/02-stained-glass.html",
 "title": "Stained Glass",
 "description": "7 organic petal and leaf cells light up in sequence with glowing halos against dark glass, then fade and reblooom. CSS transitions on SVG paths.",
 "useWhen": "Dark-mode hero backgrounds, decorative panels, art or luxury brand aesthetic, ambient looping display.",
 "avoidWhen": "Light backgrounds (hardcoded dark palette). Contexts needing user interaction or text legibility over the animation.",
 "agentPrompt": "Change the bloom step interval from STEP=620 to STEP=400 and swap the crown blossom fill to url(#an02-gRose) for a rose-pink center.",
 "editableAreas": [
  "bloom step interval (STEP=620 ms)",
  "cell lighting order (order array)",
  "cell fill gradients (an02-gGold, an02-gRose, an02-gGreen, an02-gTeal)",
  "halo opacity (.an02-halo.an02-on opacity:.5)",
  "dark-hold pause after full bloom (last = t + 700)"
 ],
 "preserveElements": [
  "visibilitychange stop/start guard",
  "prefers-reduced-motion branch (lights all cells immediately)",
  "IIFE wrapper",
  "lead came paths layered on top of cells"
 ],
 "knownLimitations": [
  "No interactivity — purely ambient; cannot click individual cells to light them",
  "Dark background hardcoded in both CSS var and inline SVG rect — must change both to retheme"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "stained-glass",
  "art-nouveau",

  "sequential",
  "glow"
 ]
}
</script>
</head>
<body>
<div class="an02-stage">
  <svg id="an02-svg" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid slice"
       role="img" aria-label="Art Nouveau stained-glass window with floral cells lighting in sequence">
    <defs>
      <radialGradient id="an02-gGold" cx="50%" cy="38%" r="70%">
        <stop offset="0%" stop-color="#f3e2a8"/><stop offset="55%" stop-color="#c9a24b"/>
        <stop offset="100%" stop-color="#8a6c2c"/>
      </radialGradient>
      <radialGradient id="an02-gRose" cx="50%" cy="40%" r="70%">
        <stop offset="0%" stop-color="#e7b8be"/><stop offset="60%" stop-color="#b86b78"/>
        <stop offset="100%" stop-color="#7c4450"/>
      </radialGradient>
      <radialGradient id="an02-gGreen" cx="50%" cy="40%" r="72%">
        <stop offset="0%" stop-color="#bcd29a"/><stop offset="58%" stop-color="#6f8e5e"/>
        <stop offset="100%" stop-color="#3f5634"/>
      </radialGradient>
      <radialGradient id="an02-gTeal" cx="50%" cy="40%" r="72%">
        <stop offset="0%" stop-color="#9fd6cf"/><stop offset="58%" stop-color="#3f7d77"/>
        <stop offset="100%" stop-color="#1f4a46"/>
      </radialGradient>
      <radialGradient id="an02-haloG" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#f3e2a8" stop-opacity=".9"/>
        <stop offset="100%" stop-color="#f3e2a8" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <!-- dark glass base -->
    <rect x="0" y="0" width="200" height="200" fill="#0e1310"/>

    <!-- arched outer frame, Art Nouveau ogee -->
    <path d="M14 196 V70 C14 38 50 12 100 12 C150 12 186 38 186 70 V196 Z"
          fill="#11160f" stroke="var(--an02-gold)" stroke-width="2.4" opacity=".5"/>

    <!-- HALOS (static, drawn under cells) -->
    <g id="an02-halos">
      <circle class="an02-halo" data-i="0" cx="100" cy="44" r="34" fill="url(#an02-haloG)"/>
      <circle class="an02-halo" data-i="1" cx="60"  cy="92" r="30" fill="url(#an02-haloG)"/>
      <circle class="an02-halo" data-i="2" cx="140" cy="92" r="30" fill="url(#an02-haloG)"/>
      <circle class="an02-halo" data-i="3" cx="100" cy="120" r="30" fill="url(#an02-haloG)"/>
      <circle class="an02-halo" data-i="4" cx="56"  cy="158" r="28" fill="url(#an02-haloG)"/>
      <circle class="an02-halo" data-i="5" cx="144" cy="158" r="28" fill="url(#an02-haloG)"/>
      <circle class="an02-halo" data-i="6" cx="100" cy="176" r="26" fill="url(#an02-haloG)"/>
    </g>

    <!-- GLASS CELLS: organic petal/leaf shapes, whiplash curves -->
    <g id="an02-cells">
      <!-- crown blossom -->
      <path class="an02-cell" data-i="0" fill="url(#an02-gGold)"
        d="M100 18 C124 18 138 36 132 58 C128 74 112 80 100 80 C88 80 72 74 68 58 C62 36 76 18 100 18 Z"/>
      <!-- upper-left leaf -->
      <path class="an02-cell" data-i="1" fill="url(#an02-gGreen)"
        d="M40 70 C66 64 86 80 78 104 C72 122 48 124 36 112 C24 100 22 80 40 70 Z"/>
      <!-- upper-right leaf -->
      <path class="an02-cell" data-i="2" fill="url(#an02-gTeal)"
        d="M160 70 C134 64 114 80 122 104 C128 122 152 124 164 112 C176 100 178 80 160 70 Z"/>
      <!-- heart rose -->
      <path class="an02-cell" data-i="3" fill="url(#an02-gRose)"
        d="M100 96 C116 96 126 108 122 122 C118 134 108 142 100 146 C92 142 82 134 78 122 C74 108 84 96 100 96 Z"/>
      <!-- lower-left bud -->
      <path class="an02-cell" data-i="4" fill="url(#an02-gGreen)"

      <!-- lower-right bud -->
      <path class="an02-cell" data-i="5" fill="url(#an02-gTeal)"
        d="M160 138 C140 132 124 146 130 166 C134 180 154 184 164 174 C174 164 176 146 160 138 Z"/>
      <!-- base teardrop -->
      <path class="an02-cell" data-i="6" fill="url(#an02-gGold)"
        d="M100 154 C112 154 122 166 118 182 C115 192 108 198 100 198 C92 198 85 192 82 182 C78 166 88 154 100 154 Z"/>
    </g>

    <!-- LEAD CAMES over cell seams (static) -->
    <g class="an02-lead" stroke-width="3.1" opacity=".92">
      <path d="M100 18 C124 18 138 36 132 58 C128 74 112 80 100 80 C88 80 72 74 68 58 C62 36 76 18 100 18 Z"/>
      <path d="M40 70 C66 64 86 80 78 104 C72 122 48 124 36 112 C24 100 22 80 40 70 Z"/>
      <path d="M160 70 C134 64 114 80 122 104 C128 122 152 124 164 112 C176 100 178 80 160 70 Z"/>
      <path d="M100 96 C116 96 126 108 122 122 C118 134 108 142 100 146 C92 142 82 134 78 122 C74 108 84 96 100 96 Z"/>
      <path d="M40 138 C60 132 76 146 70 166 C66 180 46 184 36 174 C26 164 24 146 40 138 Z"/>
      <path d="M160 138 C140 132 124 146 130 166 C134 180 154 184 164 174 C174 164 176 146 160 138 Z"/>
      <path d="M100 154 C112 154 122 166 118 182 C115 192 108 198 100 198 C92 198 85 192 82 182 C78 166 88 154 100 154 Z"/>
    </g>

    <!-- whiplash vines connecting the cells -->
    <g class="an02-vine" stroke-width="1.5">
      <path d="M100 80 C92 86 100 92 100 96"/>
      <path d="M78 104 C86 108 92 112 84 120 C92 116 96 116 100 118"/>
      <path d="M122 104 C114 108 108 112 116 120 C108 116 104 116 100 118"/>
      <path d="M82 134 C72 140 64 142 56 142"/>
      <path d="M118 134 C128 140 136 142 144 142"/>
      <path d="M100 146 C100 150 100 152 100 154"/>
    </g>

    <!-- gold pistil dots (static accents) -->
    <g fill="var(--an02-gold)" opacity=".7">
      <circle cx="100" cy="50" r="2.4"/><circle cx="100" cy="120" r="2.2"/>
      <circle cx="50" cy="92" r="1.8"/><circle cx="150" cy="92" r="1.8"/>
    </g>
  </svg>
</div>
<div class="cap">Stained Glass</div>

<script>
(function(){
  "use strict";
  var reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
  var cells = Array.prototype.slice.call(document.querySelectorAll('.an02-cell'));
  var halos = document.querySelectorAll('.an02-halo');
  var N = cells.length;
  // lighting order: crown -> leaves -> heart -> buds -> base (organic asymmetry)
  var order = [0,1,2,3,4,5,6];

  function setOn(i, on){
    if(cells[i]) cells[i].classList.toggle('an02-on', on);
    if(halos[i]) halos[i].classList.toggle('an02-on', on);
  }

  if(reduce){
    for(var k=0;k<N;k++) setOn(k, true);
    return;
  }

  var lit = 0;              // how many are currently lit (grows then resets)
  var idx = 0;              // pointer into order
  var last = 0;
  var STEP = 620;           // ms between cells lighting
  var running = true, rafId = 0;

  function tick(t){
    if(!running) return;
    if(!last) last = t;
    if(t - last >= STEP){
      last = t;
      if(idx < N){
        setOn(order[idx], true);
        idx++;
      } else {
        // brief full-bloom hold then fade all and restart the bloom
        for(var j=0;j<N;j++) setOn(order[j], false);
        idx = 0;
        last = t + 700; // hold dark a touch before reblooming
      }
    }
    rafId = requestAnimationFrame(tick);
  }

  function start(){ if(!running){ running = true; last = 0; rafId = requestAnimationFrame(tick); } }
  function stop(){ running = false; if(rafId) cancelAnimationFrame(rafId); rafId = 0; }

  document.addEventListener('visibilitychange', function(){
    if(document.hidden) stop(); else start();
  });

  rafId = requestAnimationFrame(tick);
})();
</script>
</body>
</html>
