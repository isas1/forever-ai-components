<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A stained-glass Art Nouveau flower unfolds its rose and gold petals around a glowing core amid whiplash vines, then gently sways.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Floral Bloom</title>
<style>
  :root{
    --an04-bg:#0e1310; --an04-gold:#c9a24b; --an04-gold2:#e6c878;
    --an04-rose:#b06a72; --an04-green:#5f7a55; --an04-deep:#3a4a36;
  }
  html,body{margin:0;height:100%;background:var(--an04-bg)}
  .an04-stage{
    position:fixed;inset:0;display:grid;place-items:center;
    background:
      radial-gradient(120% 95% at 50% 42%, #16201a 0%, var(--an04-bg) 62%, #090d0b 100%);
    overflow:hidden;
  }
  .an04-svg{width:min(100vw,100vh);height:min(100vw,100vh);display:block}

  /* whiplash frame & vines settle in */
  .an04-frame{transform-origin:50% 50%;animation:an04-frameIn 1.6s cubic-bezier(.16,.84,.34,1) both}
  @keyframes an04-frameIn{from{opacity:0;transform:scale(.965)}to{opacity:1;transform:scale(1)}}

  /* each petal opens on a hinge near the centre */
  .an04-petal{transform-box:fill-box;transform-origin:50% 92%;opacity:0;
    animation:an04-open 2.2s cubic-bezier(.22,1,.32,1) both}
  @keyframes an04-open{
    0%{opacity:0;transform:rotate(var(--r)) scale(.18)}
    55%{opacity:1}
    100%{opacity:1;transform:rotate(var(--r)) scale(1)}
  }
  .an04-p0{--r:0deg;animation-delay:.45s}
  .an04-p1{--r:60deg;animation-delay:.6s}
  .an04-p2{--r:120deg;animation-delay:.75s}
  .an04-p3{--r:180deg;animation-delay:.9s}
  .an04-p4{--r:240deg;animation-delay:1.05s}
  .an04-p5{--r:300deg;animation-delay:1.2s}

  /* inner petals offset */
  .an04-inner .an04-petal{transform-origin:50% 88%}
  .an04-i0{--r:30deg;animation-delay:1.0s}
  .an04-i1{--r:90deg;animation-delay:1.1s}
  .an04-i2{--r:150deg;animation-delay:1.2s}
  .an04-i3{--r:210deg;animation-delay:1.3s}
  .an04-i4{--r:270deg;animation-delay:1.4s}
  .an04-i5{--r:330deg;animation-delay:1.5s}

  /* core breathes (transform only) */
  .an04-core{transform-box:fill-box;transform-origin:50% 50%;
    animation:an04-pulse 5.2s ease-in-out 2s infinite}
  @keyframes an04-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}

  /* gentle living sway of the whole bloom */
  .an04-bloom{transform-box:fill-box;transform-origin:50% 58%;
    animation:an04-sway 9s ease-in-out 2.4s infinite}
  @keyframes an04-sway{0%,100%{transform:rotate(-1.4deg)}50%{transform:rotate(1.4deg)}}

  .an04-tendril{stroke-dasharray:1 600;stroke-dashoffset:0;
    animation:an04-draw 2.4s ease-out .2s both}
  @keyframes an04-draw{from{stroke-dasharray:1 600}to{stroke-dasharray:600 0}}

  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
    .an04-petal,.an04-frame{opacity:1}
  }
</style>
<script type="application/json" id="forever-agent-meta">
{

 "title": "Floral Bloom",
 "description": "Rose and gold petals unfold in sequence around a glowing core; corner whiplash vines draw in. The whole bloom sways gently on a loop.",
 "useWhen": "Dark-theme hero sections, botanical or luxury brand intros, decorative loading screens needing an elegant entrance animation.",
 "avoidWhen": "Light backgrounds (hardcoded dark canvas). Contexts where continuous gentle motion competes with readable content.",
 "agentPrompt": "Change outer petal color to deep violet — set --an04-rose to #6b3fa0, update petalG gradient stops to match, then slow the sway from 9s to 14s.",

</head>
<body>
<div class="an04-stage">
  <svg class="an04-svg" viewBox="0 0 400 400" role="img"
       aria-label="An Art Nouveau stylised flower opening, its curved petals unfolding around a glowing gold core amid whiplash vines."
       xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="an04-glow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#f0d98c"/>
        <stop offset="45%" stop-color="var(--an04-gold)"/>
        <stop offset="100%" stop-color="#8a6d2c"/>
      </radialGradient>
      <linearGradient id="an04-petalG" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#caa9ad"/>
        <stop offset="55%" stop-color="var(--an04-rose)"/>
        <stop offset="100%" stop-color="#6d4147"/>
      </linearGradient>
      <linearGradient id="an04-petalI" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#e6c878"/>
        <stop offset="60%" stop-color="var(--an04-gold)"/>
        <stop offset="100%" stop-color="#7c5f28"/>
      </linearGradient>
      <linearGradient id="an04-leafG" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="var(--an04-green)"/>
        <stop offset="100%" stop-color="var(--an04-deep)"/>
      </linearGradient>
      <!-- static stained-glass leading shadow; never repaints -->
      <filter id="an04-soft" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="0" stdDeviation="3.2" flood-color="#000" flood-opacity="0.45"/>
      </filter>
    </defs>

    <g class="an04-frame">
      <!-- corner whiplash vines (stained-glass leading in gold) -->
      <g fill="none" stroke="var(--an04-gold)" stroke-width="2.2" stroke-linecap="round" opacity=".8">
        <path class="an04-tendril" d="M14 60 C 60 30 60 120 110 96 S 150 40 130 18"/>
        <path class="an04-tendril" d="M386 60 C 340 30 340 120 290 96 S 250 40 270 18"/>
        <path class="an04-tendril" d="M14 340 C 60 370 60 280 110 304 S 150 360 130 382"/>
        <path class="an04-tendril" d="M386 340 C 340 370 340 280 290 304 S 250 360 270 382"/>
      </g>
      <!-- small leaf accents -->
      <g fill="url(#an04-leafG)" stroke="var(--an04-deep)" stroke-width="1.2" opacity=".9">
        <path d="M118 92 C 132 70 120 52 100 58 C 110 76 104 92 118 92 Z"/>
        <path d="M282 92 C 268 70 280 52 300 58 C 290 76 296 92 282 92 Z"/>
        <path d="M118 308 C 132 330 120 348 100 342 C 110 324 104 308 118 308 Z"/>
        <path d="M282 308 C 268 330 280 348 300 342 C 290 324 296 308 282 308 Z"/>
      </g>

      <g class="an04-bloom" transform="translate(200 200)">
        <!-- back petals (rose, stained-glass cells) -->
        <g filter="url(#an04-soft)">
          <g class="an04-petal an04-p0"><use href="#an04-petalShape"/></g>
          <g class="an04-petal an04-p1"><use href="#an04-petalShape"/></g>
          <g class="an04-petal an04-p2"><use href="#an04-petalShape"/></g>
          <g class="an04-petal an04-p3"><use href="#an04-petalShape"/></g>
          <g class="an04-petal an04-p4"><use href="#an04-petalShape"/></g>
          <g class="an04-petal an04-p5"><use href="#an04-petalShape"/></g>
        </g>

        <!-- inner petals (gold) -->
        <g class="an04-inner" filter="url(#an04-soft)">
          <g class="an04-petal an04-i0"><use href="#an04-petalIn"/></g>
          <g class="an04-petal an04-i1"><use href="#an04-petalIn"/></g>
          <g class="an04-petal an04-i2"><use href="#an04-petalIn"/></g>
          <g class="an04-petal an04-i3"><use href="#an04-petalIn"/></g>
          <g class="an04-petal an04-i4"><use href="#an04-petalIn"/></g>
          <g class="an04-petal an04-i5"><use href="#an04-petalIn"/></g>
        </g>

        <!-- glowing core (static radial glow, transform-only pulse) -->
        <g class="an04-core">
          <circle r="26" fill="url(#an04-glow)" stroke="#6e5320" stroke-width="2"/>
          <circle r="14" fill="none" stroke="#fbe6ad" stroke-width="1.4" opacity=".8"/>
          <g fill="#5b441f">
            <circle cx="0" cy="-9" r="2.2"/><circle cx="8" cy="-3" r="2.2"/>
            <circle cx="5" cy="7" r="2.2"/><circle cx="-5" cy="7" r="2.2"/>
            <circle cx="-8" cy="-3" r="2.2"/><circle cx="0" cy="0" r="2.4"/>
          </g>
        </g>
      </g>
    </g>

    <!-- reusable original petal line-work -->
    <defs>
      <path id="an04-petalShape"
        d="M0 -8 C -34 -34 -40 -96 -16 -132 C -6 -148 6 -148 16 -132 C 40 -96 34 -34 0 -8 Z"
        fill="url(#an04-petalG)" stroke="#5a3a40" stroke-width="2.4"/>
      <path id="an04-petalIn"
        d="M0 -6 C -22 -28 -26 -74 -10 -104 C -3 -116 3 -116 10 -104 C 26 -74 22 -28 0 -6 Z"
        fill="url(#an04-petalI)" stroke="#6e5320" stroke-width="2"/>
    </defs>
  </svg>
  <div class="cap">Floral Bloom</div>
</div>

<script>
(function(){
  "use strict";
  var reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
  var svg = document.querySelector('.an04-svg');
  if(reduce){ if(svg && svg.pauseAnimations) svg.pauseAnimations(); return; }
  // single pause/resume controller on tab visibility — no rAF needed (CSS+SMIL-free, pure CSS anim)
  var stage = document.querySelector('.an04-stage');
  function setState(v){
    var nodes = stage.querySelectorAll('*');
    for(var i=0;i<nodes.length;i++){ nodes[i].style.animationPlayState = v; }
  }
  document.addEventListener('visibilitychange', function(){
    setState(document.hidden ? 'paused' : 'running');
  });
})();
</script>
</body>
</html>
