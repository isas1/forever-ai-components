<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A fan of curling peacock-feather plumes with jewel-toned eyes unfurls and drifts in gold and green whiplash lines.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Peacock Curl</title>
<style>
  html,body{margin:0;height:100%;background:#0e1310;overflow:hidden}
  #an05-stage{position:fixed;inset:0;display:block;width:100%;height:100%}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  /* settle on first frame of every animated value when motion is reduced */
  @media (prefers-reduced-motion:reduce){
    #an05-stage animate,#an05-stage animateTransform{display:none}
  }
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/art-nouveau/05-peacock-curl.html",
 "title": "Peacock Curl",
 "description": "Five peacock-feather plumes unfurl from a central fan, swaying gently in gold and green whiplash lines with jewel-toned iridescent eyes at each tip.",
 "useWhen": "Decorative hero backgrounds, luxury brand tiles, or art-nouveau-themed ambient displays needing organic, slow-motion elegance.",
 "avoidWhen": "Light-background layouts (background is hardcoded dark #0e1310). Contexts where constant looping scale animation would distract from foreground content.",
 "agentPrompt": "Change the plume spine color by editing the an05-vine gradient stops from #d8b860/#6f8a4e to #e07aff/#4a3f8a for a purple Art Nouveau palette.",
 "editableAreas": [
  "vine gradient colors (an05-vine stop-color values)",
  "eye gradient colors (an05-eye stop-color values)",
  "plume fan spread (rotate values on each g, currently -44/-22/0/22/44)",
  "unfurl duration (dur='7.5s' on animateTransform scale)",
  "sway amplitude (rotate values offsets, currently ±4–7 degrees)"
 ],
 "preserveElements": [
  "prefers-reduced-motion guard (setCurrentTime + pauseAnimations)",
  "visibilitychange pause/unpause handler",
  "IIFE wrapper",
  "SVG defs reuse pattern (#an05-plume via use href)"
 ],
 "knownLimitations": [
  "Background color is hardcoded dark green-black in CSS — must edit to change",
  "SVG animate/animateTransform display:none reduced-motion trick may not settle perfectly in all browsers; JS fallback handles it",
  "No touch or pointer interactivity — purely decorative"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "art-nouveau",
  "peacock",
  "feather",
  "svg",
  "unfurl",
  "organic",
  "decorative"
 ]
}
</script>
</head>
<body>
<svg id="an05-stage" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice"
     role="img" aria-label="Art Nouveau peacock feather forms unfurling in curling gold and green whiplash lines">
  <defs>
    <!-- static stained-glass radial bloom, never repaints -->
    <radialGradient id="an05-bloom" cx="50%" cy="46%" r="62%">
      <stop offset="0%" stop-color="#1b2a22"/>
      <stop offset="55%" stop-color="#12191400"/>
      <stop offset="100%" stop-color="#0e1310"/>
    </radialGradient>
    <radialGradient id="an05-eye" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c2b6b"/>
      <stop offset="38%" stop-color="#2f6f63"/>
      <stop offset="70%" stop-color="#c9a24b"/>
      <stop offset="100%" stop-color="#7d5a1f"/>
    </radialGradient>
    <linearGradient id="an05-vine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8b860"/>
      <stop offset="100%" stop-color="#6f8a4e"/>
    </linearGradient>
    <!-- single feather barb-curl unit, reused & rotated -->
    <g id="an05-plume">
      <!-- whiplash spine -->
      <path d="M0 0 C 6 -54 -10 -104 4 -150 C 12 -176 -8 -198 2 -222"
            fill="none" stroke="url(#an05-vine)" stroke-width="2.4" stroke-linecap="round"/>
      <!-- left barbs (organic asymmetry) -->
      <path d="M2 -40 C -26 -52 -40 -78 -34 -104 M3 -86 C -22 -96 -34 -120 -27 -146 M3 -132 C -18 -140 -28 -162 -21 -184"
            fill="none" stroke="#6f8a4e" stroke-width="1.5" stroke-linecap="round" opacity=".82"/>
      <!-- right barbs -->
      <path d="M2 -56 C 28 -66 42 -90 35 -116 M3 -102 C 24 -110 34 -134 27 -158 M3 -150 C 18 -158 26 -178 19 -198"
            fill="none" stroke="#a98a3c" stroke-width="1.5" stroke-linecap="round" opacity=".82"/>
      <!-- the eye, drop sits at the tip -->
      <g transform="translate(2 -232)">
        <circle r="22" fill="url(#an05-eye)"/>
        <circle r="22" fill="none" stroke="#0e1310" stroke-width="2.5"/>
        <circle r="10" fill="#11183f"/>
        <circle r="4" fill="#d8b860"/>
        <path d="M0 -22 C 14 -30 22 -16 17 -2" fill="none" stroke="#e7d28a" stroke-width="1.4" opacity=".7"/>
      </g>
    </g>
  </defs>

  <rect width="400" height="400" fill="url(#an05-bloom)"/>

  <!-- ground vine sweep, static frame anchor -->
  <path d="M40 392 C 120 360 150 300 130 250 C 112 206 150 170 200 178 C 252 186 286 154 270 250 C 260 312 300 360 360 392"
        fill="none" stroke="#2f4034" stroke-width="3" opacity=".55"/>

  <!-- fan of plumes; each unfurls via grouped transform animation -->
  <g transform="translate(200 300)">
    <!-- far left -->
    <g>
      <g transform="rotate(-44)">
        <use href="#an05-plume" transform="scale(0.78)">
          <animateTransform attributeName="transform" type="scale" additive="sum"
            values="0.04;0.78;0.7;0.78" keyTimes="0;0.55;0.8;1" dur="7.5s"
            calcMode="spline" keySplines="0.16 0.8 0.24 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
            repeatCount="indefinite"/>
        </use>
        <animateTransform attributeName="transform" type="rotate"
          values="-44;-40;-46;-44" dur="9s" calcMode="spline"
          keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
      </g>
    </g>
    <!-- mid left -->
    <g transform="rotate(-22)">
      <use href="#an05-plume" transform="scale(0.9)">
        <animateTransform attributeName="transform" type="scale" additive="sum"
          values="0.04;0.9;0.82;0.9" keyTimes="0;0.55;0.82;1" dur="7.5s" begin="0.5s"
          calcMode="spline" keySplines="0.16 0.8 0.24 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
          repeatCount="indefinite"/>
      </use>
      <animateTransform attributeName="transform" type="rotate"
        values="-22;-18;-25;-22" dur="9.6s" calcMode="spline"
        keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </g>
    <!-- center, tallest -->
    <g>
      <use href="#an05-plume">
        <animateTransform attributeName="transform" type="scale"
          values="0.04;1;0.92;1" keyTimes="0;0.55;0.82;1" dur="7.5s" begin="1s"
          calcMode="spline" keySplines="0.16 0.8 0.24 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
          repeatCount="indefinite"/>
      </use>
    </g>
    <!-- mid right -->
    <g transform="rotate(22)">
      <use href="#an05-plume" transform="scale(0.9)">
        <animateTransform attributeName="transform" type="scale" additive="sum"
          values="0.04;0.9;0.82;0.9" keyTimes="0;0.55;0.82;1" dur="7.5s" begin="0.5s"
          calcMode="spline" keySplines="0.16 0.8 0.24 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
          repeatCount="indefinite"/>
      </use>
      <animateTransform attributeName="transform" type="rotate"
        values="22;26;19;22" dur="9.6s" calcMode="spline"
        keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </g>
    <!-- far right -->
    <g transform="rotate(44)">
      <use href="#an05-plume" transform="scale(0.78)">
        <animateTransform attributeName="transform" type="scale" additive="sum"
          values="0.04;0.78;0.7;0.78" keyTimes="0;0.55;0.8;1" dur="7.5s"
          calcMode="spline" keySplines="0.16 0.8 0.24 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
          repeatCount="indefinite"/>
      </use>
      <animateTransform attributeName="transform" type="rotate"
        values="44;40;46;44" dur="9s" calcMode="spline"
        keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- crowning curl tendril, slow drift -->
  <g transform="translate(200 70)">
    <path d="M0 0 C 30 -8 38 -34 18 -44 C 2 -52 -2 -34 12 -30"
          fill="none" stroke="#c9a24b" stroke-width="2" stroke-linecap="round" opacity=".8"/>
    <animateTransform attributeName="transform" type="rotate" additive="sum"
      values="0;5;-5;0" dur="12s" calcMode="spline"
      keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
  </g>
</svg>
<div class="cap">Peacock Curl</div>
<script>
(function(){
  "use strict";
  var svg=document.getElementById("an05-stage");
  if(!svg)return;
  var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
  if(reduce){
    // settle to one static, on-brand unfurled frame and stop
    try{ svg.setCurrentTime(7.5); svg.pauseAnimations(); }catch(e){}
    return;
  }
  function onVis(){
    if(document.hidden){ try{svg.pauseAnimations();}catch(e){} }
    else { try{svg.unpauseAnimations();}catch(e){} }
  }
  document.addEventListener("visibilitychange",onVis);
})();
</script>
</body>
</html>
