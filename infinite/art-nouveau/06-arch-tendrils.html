<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A symmetric arch of floral whiplash tendrils with buds and leaves sways gently over a dark green stained-glass ground.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Arch Tendrils</title>
<style>
  html,body{margin:0;height:100%}
  body{background:#0e1310;overflow:hidden}
  .an06-stage{position:fixed;inset:0;display:block}
  #an06-svg{width:100%;height:100%;display:block}
  .an06-vine{fill:none;stroke-linecap:round}
  .an06-leaf{transform-box:fill-box;transform-origin:center}
  .an06-sway{transform-box:fill-box;transform-origin:bottom center}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important}}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/art-nouveau/06-arch-tendrils.html",
 "title": "Arch Tendrils",
 "description": "Seven symmetric whiplash tendrils with curled buds, leaves, and a crown rosette sway gently in a slow sine-wave rotation over a dark stained-glass arch ground.",
 "useWhen": "Ambient hero backgrounds for botanical, art-nouveau, or luxury themes. Dark-mode decorative panels or loading screens.",
 "avoidWhen": "Light backgrounds (hardcoded dark green). Contexts requiring interactivity or legible text overlaid on the animation.",
 "agentPrompt": "Change the palette array to warm rose tones (e.g. [\"#e07a8a\",\"#c94f6a\",\"#f2b8c2\",\"#e8a0b0\"]), increase sway amplitude by setting amp to (4+r.s*4) in the T.push call.",
 "editableAreas": [
  "palette array (4 accent colors)",
  "sway amplitude (amp: 2.6+r.s*2.4)",
  "sway speed per tendril (sp: 0.55+r.s*0.35)",
  "root x positions (roots array)",
  "vine stroke gradient (an06-stem stops)",
  "background radial gradient (an06-glow stops)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (reduce check + frame(0.6) static fallback)",
  "visibilitychange pause/resume handler",
  "transformOrigin set per-element in JS (critical for correct sway pivot)"
 ],
 "knownLimitations": [
  "Background color hardcoded as dark green — requires CSS and gradient edits to change theme",
  "Tendril shape parameters are tightly coupled to root positions; rebalancing symmetry requires coordinated edits to roots array and path math"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "art-nouveau",
  "botanical",
  "tendrils",
  "svg",
  "ambient",
  "floral",
  "loop"
 ]
}
</script>
</head>
<body>
<div class="an06-stage" role="img" aria-label="An Art Nouveau arch of symmetric floral tendrils swaying gently over a dark green ground.">
  <svg id="an06-svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <radialGradient id="an06-glow" cx="50%" cy="34%" r="62%">
        <stop offset="0%" stop-color="#1b2a22"/>
        <stop offset="60%" stop-color="#121a15"/>
        <stop offset="100%" stop-color="#0e1310"/>
      </radialGradient>
      <linearGradient id="an06-stem" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0%" stop-color="#5d7d52"/>
        <stop offset="100%" stop-color="#9bbf6e"/>
      </linearGradient>
    </defs>
    <rect x="0" y="0" width="400" height="400" fill="url(#an06-glow)"/>
    <!-- stained-glass arch cell -->
    <path d="M70 360 Q70 110 200 70 Q330 110 330 360" fill="none" stroke="#2c3a2c" stroke-width="2" opacity="0.55"/>
    <path d="M96 360 Q96 132 200 96 Q304 132 304 360" fill="none" stroke="#3a4d36" stroke-width="1" opacity="0.4"/>
    <!-- crown rosette -->
    <g id="an06-crown" transform="translate(200 70)">
      <circle r="13" fill="none" stroke="#c9a24b" stroke-width="2"/>
      <circle r="5" fill="#c9a24b"/>
      <g id="an06-petals"></g>
    </g>
    <g id="an06-field"></g>
  </svg>
</div>
<div class="cap">Arch Tendrils</div>
<script>
(function(){
  "use strict";
  var svg=document.getElementById("an06-svg");
  var SVGNS="http://www.w3.org/2000/svg";
  var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;

  function el(n,a){var e=document.createElementNS(SVGNS,n);for(var k in a)e.setAttribute(k,a[k]);return e;}

  // crown petals (static rosette)
  var petals=document.getElementById("an06-petals");
  for(var p=0;p<8;p++){
    var ang=(p/8)*Math.PI*2;
    petals.appendChild(el("path",{
      d:"M0 0 Q"+(Math.cos(ang)*9-Math.sin(ang)*7)+" "+(Math.sin(ang)*9+Math.cos(ang)*7)+" "+(Math.cos(ang)*22)+" "+(Math.sin(ang)*22)+
        " Q"+(Math.cos(ang)*9+Math.sin(ang)*7)+" "+(Math.sin(ang)*9-Math.cos(ang)*7)+" 0 0",
      fill:"none",stroke:"#b88e3e","stroke-width":"1.4",opacity:"0.85"}));
  }

  // Build symmetric tendrils rooted along the arch base.
  // Each tendril: a sway group <g> wrapping a whiplash vine path + a leaf.
  var field=document.getElementById("an06-field");
  var T=[];                       // tendril records
  var roots=[                     // base x positions (mirrored pairs + center)
    {x:118,h:1,s:1.00},{x:282,h:-1,s:1.00},
    {x:150,h:1,s:0.84},{x:250,h:-1,s:0.84},
    {x:182,h:1,s:0.66},{x:218,h:-1,s:0.66},
    {x:200,h:1,s:0.92}
  ];
  var palette=["#c9a24b","#9bbf6e","#cf7f8b","#d9b96a"];
  for(var i=0;i<roots.length;i++){
    var r=roots[i];
    var g=el("g",{class:"an06-sway"});
    g.style.transformOrigin=r.x+"px 360px";
    var topY=360-(150+ r.s*120);          // reach height
    var bend=r.h*(34+ r.s*22);            // whiplash horizontal throw
    var midY=(360+topY)/2;
    // whiplash double-curve stem
    var d="M"+r.x+" 360 "+
          "C"+(r.x+bend*0.4)+" "+(360-40)+" "+(r.x+bend)+" "+(midY+30)+" "+(r.x+bend*0.55)+" "+midY+" "+
          "S"+(r.x-bend*0.2)+" "+(topY+34)+" "+(r.x+bend*0.18)+" "+topY;
    var vine=el("path",{class:"an06-vine",d:d,stroke:"url(#an06-stem)","stroke-width":(2.2+r.s*1.4).toFixed(2),opacity:"0.95"});
    g.appendChild(vine);
    // curled bud at tip
    var tipx=r.x+bend*0.18, tipy=topY;
    var curl=el("path",{class:"an06-vine",
      d:"M"+tipx+" "+tipy+" q"+(r.h*-14)+" -10 "+(r.h*-6)+" -20 q6 -8 14 -3",
      stroke:palette[i%palette.length],"stroke-width":"2",opacity:"0.9"});
    g.appendChild(curl);
    // blossom dot at tip
    g.appendChild(el("circle",{cx:tipx+(r.h*4),cy:tipy-22,r:(3.4+r.s*2).toFixed(2),
      fill:palette[i%palette.length],opacity:"0.95"}));
    // mid leaf, mirrored
    var lx=r.x+bend*0.62, ly=midY+8;
    var leaf=el("path",{class:"an06-leaf",
      d:"M"+lx+" "+ly+" q"+(r.h*22)+" -8 "+(r.h*30)+" -22 q"+(r.h*-14)+" 3 "+(r.h*-30)+" 22 z",
      fill:"#3f6b3c",stroke:"#6f9a55","stroke-width":"0.8",opacity:"0.8"});
    leaf.style.transformOrigin=lx+"px "+ly+"px";
    g.appendChild(leaf);
    field.appendChild(g);
    T.push({g:g,leaf:leaf,phase:i*0.9,sp:0.55+r.s*0.35,amp:(2.6+r.s*2.4),lf:i*0.7});
  }

  function frame(t){
    for(var i=0;i<T.length;i++){
      var o=T[i];
      var s=Math.sin(t*o.sp+o.phase);
      // sway = small rotation about base (compositor transform only)
      o.g.style.transform="rotate("+(s*o.amp)+"deg)";
      o.leaf.style.transform="rotate("+(Math.sin(t*0.8+o.lf)*9)+"deg)";
    }
  }

  if(reduce){ frame(0.6); return; }

  var running=true, raf=0, t0=0;
  function loop(now){
    if(!running)return;
    if(!t0)t0=now;
    frame((now-t0)/1000);
    raf=requestAnimationFrame(loop);
  }
  raf=requestAnimationFrame(loop);
  document.addEventListener("visibilitychange",function(){
    if(document.hidden){ running=false; if(raf)cancelAnimationFrame(raf); }
    else if(!running){ running=true; t0=0; raf=requestAnimationFrame(loop); }
  });
})();
</script>
</body>
</html>
