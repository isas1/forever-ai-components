<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="An ornamental Art Nouveau floral border traces itself in gold, green and rose whiplash vines with blossoming buds and leaves.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Border Flourish</title>
<style>
  :root{
    --an08-bg:#0e1310; --an08-gold:#c9a24b; --an08-rose:#b9777f;
    --an08-green:#5f7a5a; --an08-cream:#e6d9b8; --an08-deep:#16201a;
  }
  html,body{margin:0;height:100%;background:var(--an08-bg)}
  .an08-stage{position:fixed;inset:0;display:grid;place-items:center;
    background:
      radial-gradient(120% 120% at 50% 42%, #15201a 0%, #0e1310 62%);
    overflow:hidden}
  .an08-frame{width:min(92vmin,640px);height:min(92vmin,640px);
    /* static glow — never repaints */
    filter:none}
  .an08-svg{width:100%;height:100%;display:block;
    /* static drop-shadow on the whole group via a stationary blur layer below */}
  /* tracing strokes */
  .an08-ink{fill:none;stroke:var(--an08-gold);stroke-linecap:round;
    stroke-linejoin:round}
  .an08-vine{stroke-width:2.1;
    stroke-dasharray:var(--d);stroke-dashoffset:var(--d);
    animation:an08-trace 6.2s cubic-bezier(.5,0,.2,1) infinite}
  .an08-vine.an08-v2{stroke:var(--an08-green);stroke-width:1.7;
    animation-delay:.5s;animation-duration:6.2s}
  .an08-vine.an08-v3{stroke:var(--an08-rose);stroke-width:1.5;
    animation-delay:1s}
  .an08-bud{transform-box:fill-box;transform-origin:center;
    transform:scale(0);opacity:0;
    animation:an08-bloom 6.2s cubic-bezier(.34,1.4,.5,1) infinite}
  .an08-petal{fill:var(--an08-rose);opacity:.9}
  .an08-petalIn{fill:var(--an08-gold)}
  .an08-leaf{fill:var(--an08-green);opacity:.85}
  .an08-dot{fill:var(--an08-cream)}
  @keyframes an08-trace{
    0%{stroke-dashoffset:var(--d)}
    46%{stroke-dashoffset:0}
    86%{stroke-dashoffset:0;opacity:1}
    100%{stroke-dashoffset:0;opacity:1}
  }
  @keyframes an08-bloom{
    0%,42%{transform:scale(0);opacity:0}
    60%{transform:scale(1.12);opacity:1}
    70%{transform:scale(1)}
    88%{transform:scale(1);opacity:1}
    100%{transform:scale(1);opacity:1}
  }
  /* corner spandrel fade-in keeps composition asymmetric */
  .an08-spandrel{opacity:0;animation:an08-fade 6.2s ease infinite;
    animation-delay:1.4s}
  @keyframes an08-fade{0%,30%{opacity:0}55%,100%{opacity:.9}}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
    .an08-vine{stroke-dashoffset:0!important}
    .an08-bud{transform:scale(1)!important;opacity:1!important}
    .an08-spandrel{opacity:.9!important}
  }
</style>
<script type="application/json" id="forever-agent-meta">

 "avoidWhen": "Content-heavy layouts where the border competes with inner text. Light backgrounds — the backdrop gradient is hardcoded dark.",

</head>
<body>
<div class="an08-stage">
  <div class="an08-frame">
    <svg class="an08-svg" id="an08-c" viewBox="0 0 400 400"
         role="img" aria-label="An ornamental Art Nouveau floral border drawing itself, with whiplash vines, buds and leaves in gold, green and rose.">
      <defs>
        <!-- static glow: a soft gold halo painted once, never animated -->
        <radialGradient id="an08-halo" cx="50%" cy="44%" r="58%">
          <stop offset="0%" stop-color="#c9a24b" stop-opacity=".18"/>
          <stop offset="55%" stop-color="#c9a24b" stop-opacity=".05"/>
          <stop offset="100%" stop-color="#c9a24b" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="an08-glass" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#22322a"/>
          <stop offset="100%" stop-color="#16201a"/>
        </linearGradient>
        <!-- reusable bud cluster -->
        <g id="an08-flower">
          <path class="an08-petal" d="M0,-14 C7,-13 11,-6 8,1 C4,6 -4,6 -8,1 C-11,-6 -7,-13 0,-14 Z"/>
          <path class="an08-petal" d="M0,-14 C7,-13 11,-6 8,1 C4,6 -4,6 -8,1 C-11,-6 -7,-13 0,-14 Z" transform="rotate(120)"/>
          <path class="an08-petal" d="M0,-14 C7,-13 11,-6 8,1 C4,6 -4,6 -8,1 C-11,-6 -7,-13 0,-14 Z" transform="rotate(240)"/>
          <circle class="an08-petalIn" r="4.4"/>
          <circle class="an08-dot" r="1.7"/>
        </g>
        <g id="an08-leafshape">
          <path class="an08-leaf" d="M0,0 C9,-5 17,-3 22,4 C15,5 6,5 0,0 Z"/>
          <path class="an08-ink an08-leaf" style="stroke:var(--an08-green);stroke-width:.8;fill:none"
                d="M2,1 C9,-1 15,0 20,3"/>
        </g>
      </defs>

      <!-- static backdrop layers -->
      <rect x="0" y="0" width="400" height="400" fill="url(#an08-glass)"/>
      <rect x="0" y="0" width="400" height="400" fill="url(#an08-halo)"/>

      <!-- inner stained-glass field -->
      <rect class="an08-spandrel" x="64" y="64" width="272" height="272" rx="6"
            fill="none" stroke="#c9a24b" stroke-opacity=".14" stroke-width="1"/>

      <!-- whiplash border vines: each path carries --d ≈ its length -->
      <g>
        <!-- top sweeping vine -->
        <path class="an08-ink an08-vine" style="--d:520"
          d="M40,70 C90,40 150,38 200,58 C250,78 312,76 360,46"/>
        <!-- bottom mirrored vine, different color -->
        <path class="an08-ink an08-vine an08-v2" style="--d:520"
          d="M360,330 C310,360 250,362 200,342 C150,322 88,324 40,354"/>
        <!-- left whiplash riser -->
        <path class="an08-ink an08-vine an08-v3" style="--d:430"
          d="M58,86 C30,150 36,250 58,314 C40,260 44,160 58,86"/>
        <!-- right whiplash riser -->
        <path class="an08-ink an08-vine an08-v3" style="--d:430"
          d="M342,86 C370,150 364,250 342,314 C360,260 356,160 342,86"/>
        <!-- top-left curling tendril (signature whiplash) -->
        <path class="an08-ink an08-vine an08-v2" style="--d:300"
          d="M70,72 C120,96 132,150 96,170 C70,184 60,150 84,142 C100,138 100,160 88,162"/>
        <!-- bottom-right counter tendril -->
        <path class="an08-ink an08-vine" style="--d:300"
          d="M330,328 C280,304 268,250 304,230 C330,216 340,250 316,258 C300,262 300,240 312,238"/>
      </g>

      <!-- blossoms anchored at vine terminals, asymmetric placement -->
      <g class="an08-bud" style="animation-delay:1.9s" transform="translate(200,58)"><use href="#an08-flower"/></g>
      <g class="an08-bud" style="animation-delay:2.2s" transform="translate(58,200) scale(.82)"><use href="#an08-flower"/></g>
      <g class="an08-bud" style="animation-delay:2.5s" transform="translate(342,200) scale(.7)"><use href="#an08-flower"/></g>
      <g class="an08-bud" style="animation-delay:2.0s" transform="translate(96,170) scale(.62)"><use href="#an08-flower"/></g>

      <!-- leaves spaced along vines -->
      <g class="an08-bud" style="animation-delay:2.6s" transform="translate(130,48) rotate(-22)"><use href="#an08-leafshape"/></g>
      <g class="an08-bud" style="animation-delay:2.8s" transform="translate(270,338) rotate(158)"><use href="#an08-leafshape"/></g>
      <g class="an08-bud" style="animation-delay:3.0s" transform="translate(66,128) rotate(64) scale(.8)"><use href="#an08-leafshape"/></g>
      <g class="an08-bud" style="animation-delay:3.0s" transform="translate(334,272) rotate(244) scale(.8)"><use href="#an08-leafshape"/></g>

      <!-- corner spandrel arcs: static frame accents -->
      <path class="an08-spandrel an08-ink" style="stroke:var(--an08-gold);stroke-width:1.4"
            d="M64,96 C64,78 78,64 96,64 M336,304 C336,322 322,336 304,336"/>
    </svg>
  </div>
</div>
<div class="cap">Border Flourish</div>
<script>
(function(){
  "use strict";
  // SVG/SMIL-free; CSS-driven. Honor reduced-motion + visibility for compositor work.
  var svg=document.getElementById("an08-c");
  var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
  if(reduce) return; // CSS @media already settles to one static, bloomed frame.
  // Pause CSS animations when tab hidden; resume on return. No rAF, no layout reads.
  function setState(p){
    var els=svg.querySelectorAll(
      ".an08-vine,.an08-bud,.an08-spandrel");
    for(var i=0;i<els.length;i++){ els[i].style.animationPlayState=p; }
  }
  document.addEventListener("visibilitychange",function(){
    setState(document.hidden?"paused":"running");
  });
})();
</script>
</body>
</html>
