<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A stained-glass-winged Art Nouveau dragonfly glides and flutters among vines as gold pollen motes rise on a dark ground.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dragonfly Glide</title>
<style>
  :root{
    --an09-bg:#0e1310; --an09-gold:#c9a24b; --an09-gold2:#e6c878;
    --an09-green:#5e7d5a; --an09-rose:#b5736f; --an09-teal:#3a5d52;
    --an09-line:#1f2a23;
  }
  html,body{margin:0;height:100%;background:var(--an09-bg)}
  .an09-stage{position:fixed;inset:0;overflow:hidden;background:
    radial-gradient(120% 95% at 50% 38%, #16201a 0%, var(--an09-bg) 62%, #0a0e0c 100%);}
  .an09-svg{position:absolute;inset:0;width:100%;height:100%;display:block}
  /* gliding drift: subtle whole-body sway on a long whiplash arc */
  #an09-body{transform-box:fill-box;transform-origin:50% 50%;
    animation:an09-glide 7.5s cubic-bezier(.45,0,.55,1) infinite}
  @keyframes an09-glide{
    0%{transform:translate(-2.2%, 1.6%) rotate(-2.4deg)}
    50%{transform:translate(2.4%,-1.8%) rotate(2.2deg)}
    100%{transform:translate(-2.2%,1.6%) rotate(-2.4deg)}
  }
  /* wings: gentle paired flutter, opposite phase top/bottom */
  .an09-wing{transform-box:fill-box;animation:an09-flut 2.6s cubic-bezier(.37,0,.63,1) infinite}
  #an09-wTL{transform-origin:62% 78%}
  #an09-wTR{transform-origin:38% 78%;animation-delay:-.13s}
  #an09-wBL{transform-origin:62% 22%;animation-delay:-1.3s}
  #an09-wBR{transform-origin:38% 22%;animation-delay:-1.17s}
  @keyframes an09-flut{0%,100%{transform:rotate(0deg)}50%{transform:rotate(3.4deg)}}
  #an09-wTR,#an09-wBR{animation-name:an09-flutR}
  @keyframes an09-flutR{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-3.4deg)}}
  /* floating pollen motes */
  .an09-mote{transform-box:fill-box;transform-origin:50% 50%;
    animation:an09-rise 9s ease-in-out infinite}
  .an09-m2{animation-duration:11s;animation-delay:-3s}
  .an09-m3{animation-duration:7.5s;animation-delay:-5s}
  .an09-m4{animation-duration:12s;animation-delay:-1.5s}
  @keyframes an09-rise{
    0%{transform:translateY(6px) translateX(0) scale(.9);opacity:0}
    20%{opacity:.7}
    80%{opacity:.55}
    100%{transform:translateY(-26px) translateX(7px) scale(1.05);opacity:0}
  }
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
    .an09-mote{opacity:.5!important}
  }
</style>
</head>
<body>
<div class="an09-stage">
  <svg class="an09-svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet"
       role="img" aria-label="An Art Nouveau dragonfly with stained-glass patterned wings gliding among vines">
    <defs>
      <!-- static glow filter is forbidden in keyframes; use static gradient halo instead -->
      <radialGradient id="an09-halo" cx="50%" cy="46%" r="42%">
        <stop offset="0%" stop-color="#caa24b" stop-opacity=".22"/>
        <stop offset="55%" stop-color="#caa24b" stop-opacity=".06"/>
        <stop offset="100%" stop-color="#caa24b" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="an09-wingG" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="var(--an09-teal)" stop-opacity=".55"/>
        <stop offset="50%" stop-color="var(--an09-green)" stop-opacity=".35"/>
        <stop offset="100%" stop-color="var(--an09-gold)" stop-opacity=".42"/>
      </linearGradient>
      <linearGradient id="an09-wingR" x1="1" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--an09-rose)" stop-opacity=".38"/>
        <stop offset="55%" stop-color="var(--an09-green)" stop-opacity=".3"/>
        <stop offset="100%" stop-color="var(--an09-gold)" stop-opacity=".42"/>
      </linearGradient>
      <linearGradient id="an09-bodyG" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--an09-gold2)"/>
        <stop offset="60%" stop-color="var(--an09-gold)"/>
        <stop offset="100%" stop-color="#8a6f33"/>
      </linearGradient>
      <!-- one stained-glass wing membrane, reused & mirrored -->
      <g id="an09-wingShape">
        <!-- whiplash wing outline -->
        <path d="M0,0 C40,-46 118,-58 168,-30 C206,-9 198,30 150,40
                 C96,51 30,34 0,0 Z"
              fill="url(#an09-wingG)" stroke="var(--an09-gold)" stroke-width="1.6"/>
        <!-- vein cells -->
        <path d="M6,2 C52,-30 120,-40 162,-22" fill="none" stroke="var(--an09-gold)" stroke-width="1" opacity=".7"/>
        <path d="M10,8 C58,-12 122,-14 156,-4" fill="none" stroke="var(--an09-gold)" stroke-width=".9" opacity=".55"/>
        <path d="M14,14 C60,6 120,12 150,18" fill="none" stroke="var(--an09-gold)" stroke-width=".9" opacity=".5"/>
        <path d="M40,-40 C46,-8 52,18 56,38" fill="none" stroke="var(--an09-gold)" stroke-width=".8" opacity=".5"/>
        <path d="M82,-50 C86,-14 90,16 92,40" fill="none" stroke="var(--an09-gold)" stroke-width=".8" opacity=".5"/>
        <path d="M124,-46 C126,-16 128,12 126,34" fill="none" stroke="var(--an09-gold)" stroke-width=".8" opacity=".45"/>
        <circle cx="150" cy="6" r="6" fill="var(--an09-rose)" opacity=".5" stroke="var(--an09-gold)" stroke-width=".8"/>
        <circle cx="116" cy="-2" r="4" fill="var(--an09-gold2)" opacity=".45"/>
      </g>
      <!-- a single decorative vine sprig, reused -->
      <g id="an09-vine">
        <path d="M0,0 C26,-22 14,-56 40,-72 C66,-88 52,-118 78,-130"
              fill="none" stroke="var(--an09-green)" stroke-width="2.2" opacity=".5"/>
        <path d="M40,-72 C30,-78 22,-74 24,-64 C30,-58 42,-62 40,-72 Z"
              fill="var(--an09-green)" opacity=".4"/>
        <path d="M78,-130 C70,-140 56,-138 58,-126 C66,-118 80,-122 78,-130 Z"
              fill="var(--an09-rose)" opacity=".45"/>
      </g>
    </defs>

    <!-- ambient halo (static, never repaints) -->
    <rect x="0" y="0" width="400" height="400" fill="url(#an09-halo)"/>

    <!-- framing vines, asymmetric Art Nouveau composition -->
    <use href="#an09-vine" x="58" y="372" transform="rotate(-6 58 372)" opacity=".9"/>
    <use href="#an09-vine" x="344" y="392" transform="scale(-1,1) translate(-688,0) rotate(8 344 392)" opacity=".75"/>

    <!-- THE DRAGONFLY -->
    <g id="an09-body">
      <!-- wings behind body -->
      <use class="an09-wing" id="an09-wTR" href="#an09-wingShape"
           transform="translate(200,168) scale(-1,1) rotate(8)" />
      <use class="an09-wing" id="an09-wTL" href="#an09-wingShape"
           transform="translate(200,168) rotate(8)" />
      <use class="an09-wing" id="an09-wBR" href="#an09-wingShape"
           transform="translate(200,176) scale(-1,1) rotate(-10) scale(.86)" />
      <use class="an09-wing" id="an09-wBL" href="#an09-wingShape"
           transform="translate(200,176) rotate(-10) scale(.86)" />

      <!-- abdomen: long whiplash taper with banding -->
      <path d="M200,150
               C190,176 188,210 192,250
               C194,288 198,320 200,338
               C202,320 206,288 208,250
               C212,210 210,176 200,150 Z"
            fill="url(#an09-bodyG)" stroke="#6f581f" stroke-width="1.2"/>
      <g stroke="#6f581f" stroke-width="1" opacity=".6">
        <path d="M191,200 C197,202 203,202 209,200" fill="none"/>
        <path d="M192,228 C197,230 203,230 208,228" fill="none"/>
        <path d="M193,256 C198,258 202,258 207,256" fill="none"/>
        <path d="M194,284 C198,286 202,286 206,284" fill="none"/>
        <path d="M195,310 C198,312 202,312 205,310" fill="none"/>
      </g>

      <!-- thorax -->
      <ellipse cx="200" cy="160" rx="15" ry="20" fill="url(#an09-bodyG)" stroke="#6f581f" stroke-width="1.2"/>
      <!-- head + eyes -->
      <circle cx="200" cy="133" r="13" fill="var(--an09-gold2)" stroke="#6f581f" stroke-width="1.2"/>
      <circle cx="194" cy="130" r="5.2" fill="var(--an09-teal)" stroke="#6f581f" stroke-width=".8"/>
      <circle cx="206" cy="130" r="5.2" fill="var(--an09-teal)" stroke="#6f581f" stroke-width=".8"/>
      <circle cx="195.4" cy="128.6" r="1.5" fill="#cfe0d6" opacity=".8"/>
      <circle cx="207.4" cy="128.6" r="1.5" fill="#cfe0d6" opacity=".8"/>
      <!-- antennae whiplash -->
      <path d="M196,124 C192,114 186,110 180,112" fill="none" stroke="var(--an09-gold)" stroke-width="1.2"/>
      <path d="M204,124 C208,114 214,110 220,112" fill="none" stroke="var(--an09-gold)" stroke-width="1.2"/>
    </g>

    <!-- pollen motes -->
    <g fill="var(--an09-gold2)">
      <circle class="an09-mote" cx="120" cy="150" r="2.4"/>
      <circle class="an09-mote an09-m2" cx="290" cy="120" r="3"/>
      <circle class="an09-mote an09-m3" cx="318" cy="240" r="2"/>
      <circle class="an09-mote an09-m4" cx="92" cy="270" r="2.6"/>
    </g>
  </svg>
  <div class="cap">Dragonfly Glide</div>
</div>
<script>
(function(){
  // CSS-only animation; just manage pause-on-hidden for politeness + battery.
  var stage=document.querySelector('.an09-stage');
  if(!stage) return;
  function setState(p){
    // toggle animationPlayState on the animated nodes
    var els=stage.querySelectorAll('#an09-body, .an09-wing, .an09-mote');
    for(var i=0;i<els.length;i++) els[i].style.animationPlayState=p;
  }
  document.addEventListener('visibilitychange',function(){
    setState(document.hidden?'paused':'running');
  });
})();
</script>
</body>
</html>
