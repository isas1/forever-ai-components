<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A gold whiplash S-curve ribbon banner reading Ribbon Script sways and breathes through floral vines with a shimmering serif title.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ribbon Script</title>
<style>
  :root{
    --an10-bg:#0e1310; --an10-gold:#c9a24b; --an10-gold-lo:#8f6f2e;
    --an10-rose:#b5708a; --an10-green:#5f7d5a; --an10-cream:#e7dcc0;
  }
  html,body{margin:0;height:100%;background:var(--an10-bg)}
  .an10-stage{position:fixed;inset:0;overflow:hidden;background:
    radial-gradient(120% 90% at 50% 38%,#16201a 0%,#0e1310 62%,#0a0d0b 100%)}
  .an10-svg{position:absolute;inset:0;width:100%;height:100%;display:block}
  /* static glow — never repaints */
  .an10-ribbon{filter:drop-shadow(0 0 6px rgba(201,162,75,.35))}
  .an10-edge{stroke:var(--an10-gold);stroke-width:2.4;fill:none;
    stroke-linecap:round;stroke-linejoin:round}
  .an10-core{stroke:var(--an10-cream);stroke-width:.9;fill:none;opacity:.55}
  .an10-vine{stroke:var(--an10-green);stroke-width:1.4;fill:none;
    stroke-linecap:round;opacity:.8}
  .an10-leaf{fill:var(--an10-green);opacity:.7}
  .an10-bud{fill:var(--an10-rose);opacity:.85}
  .an10-frameline{stroke:var(--an10-gold-lo);stroke-width:1.2;fill:none;opacity:.5}
  .an10-title{fill:var(--an10-cream);font-family:"Cormorant Garamond",Georgia,serif;
    font-style:italic;font-weight:600;letter-spacing:.04em}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&display=swap" rel="stylesheet">
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/art-nouveau/10-ribbon-script.html",
 "title": "Ribbon Script",
 "description": "Gold S-curve ribbon banner with italic serif title sways gently through floral vines via SMIL transforms on a dark background.",
 "useWhen": "Decorative hero or section divider for art nouveau, luxury, or editorial themes. Ambient looping display with no interaction required.",
 "avoidWhen": "UIs needing legible body text nearby — the motion and dark background dominate. Contexts where SMIL browser support is uncertain.",
 "agentPrompt": "Change the ribbon text to 'Belle Époque', set --an10-gold to #d4af37, and slow the ribbon sway from 11s to 18s.",
 "editableAreas": [

  "rotation range (-0.8 / 1.0 degrees)",

  "corner floret rotation period (17s)"
 ],
 "preserveElements": [

  "visibilitychange pause/unpause via svg.pauseAnimations()",
  "SMIL additive=sum on all animateTransform"
 ],
 "knownLimitations": [

  "Text position is absolute, not path-following — ribbon shape changes require manual text repositioning",

 ],
 "tier": "curated",

</head>
<body>
<div class="an10-stage">
  <svg class="an10-svg" id="an10-c" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice"
       role="img" aria-label="An Art Nouveau gold ribbon banner curling in a whiplash S-curve through floral vines, with the words Ribbon Script.">
    <defs>
      <linearGradient id="an10-gold-g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#e6c878"/>
        <stop offset="0.5" stop-color="#c9a24b"/>
        <stop offset="1" stop-color="#8f6f2e"/>
      </linearGradient>
      <radialGradient id="an10-cell" cx="0.5" cy="0.4" r="0.7">
        <stop offset="0" stop-color="#1c2a20"/>
        <stop offset="1" stop-color="#10160f"/>
      </radialGradient>
    </defs>

    <!-- stained-glass border cells (static) -->
    <g class="an10-frameline" opacity=".55">
      <path d="M30 30 C70 12 130 12 200 12 C270 12 330 12 370 30"/>
      <path d="M30 370 C70 388 130 388 200 388 C270 388 330 388 370 370"/>
      <path d="M22 60 C12 140 12 260 22 340"/>
      <path d="M378 60 C388 140 388 260 378 340"/>
    </g>
    <!-- corner whiplash florets -->
    <g class="an10-vine" id="an10-corners">
      <path d="M30 40 C60 50 66 80 50 96 C40 106 26 100 30 86 C33 76 46 78 44 88" fill="none"/>
      <circle class="an10-bud" cx="50" cy="96" r="3.4" stroke="none"/>
      <path d="M370 40 C340 50 334 80 350 96 C360 106 374 100 370 86 C367 76 354 78 356 88" fill="none"/>
      <circle class="an10-bud" cx="350" cy="96" r="3.4" stroke="none"/>
    </g>

    <!-- trailing vine that breathes behind the ribbon -->
    <g class="an10-vine" id="an10-vine">
      <path d="M70 300 C120 270 100 210 160 190 C210 173 200 120 250 110 C300 100 320 150 340 130"
            stroke-dasharray="6 9"/>
      <g class="an10-leaf" stroke="none">
        <path d="M150 196 q-14 -6 -20 -20 q16 0 22 16 z"/>
        <path d="M242 116 q14 -8 22 -22 q-16 -2 -24 14 z"/>
        <path d="M104 252 q-15 -2 -24 -14 q14 -6 24 6 z"/>
      </g>
    </g>

    <!-- THE RIBBON: an S-curve banner. Two parallel edges + core highlight. -->
    <g class="an10-ribbon" id="an10-rib">
      <!-- filled band between the two whiplash edges -->
      <path id="an10-band" fill="url(#an10-gold-g)" opacity=".9"
        d="M44 250
           C90 196 70 150 134 142
           C198 134 178 96 244 102
           C300 107 314 86 360 70
           L360 96
           C314 112 300 133 244 128
           C178 122 198 160 134 168
           C70 176 90 222 44 276 Z"/>
      <!-- the curling fold tail at the lower-left -->
      <path id="an10-tail" fill="url(#an10-gold-g)" opacity=".82"
        d="M44 250 C24 268 26 300 50 312 C66 320 84 312 86 294
           C88 280 76 272 66 280 C58 286 62 298 72 296
           L70 282 C58 282 52 296 60 304
           C44 300 40 280 52 268 C60 260 72 256 84 264 L60 268 Z"/>
      <!-- upper edge -->
      <path class="an10-edge"
        d="M44 250 C90 196 70 150 134 142 C198 134 178 96 244 102 C300 107 314 86 360 70"/>
      <!-- lower edge -->
      <path class="an10-edge"
        d="M44 276 C90 222 70 176 134 168 C198 160 178 122 244 128 C300 133 314 112 360 96"/>
      <!-- inner core thread -->
      <path class="an10-core"
        d="M50 262 C92 210 76 162 134 155 C194 147 178 109 244 115 C300 120 312 99 358 83"/>
    </g>

    <!-- title rides on the ribbon center, gently -->
    <g id="an10-text" opacity=".96">
      <text class="an10-title" x="200" y="142" font-size="30" text-anchor="middle">Ribbon Script</text>
    </g>

    <!-- SMIL: ribbon drifts/breathes; nothing layout-bound, only transform/opacity -->
    <g id="an10-anim"></g>
  </svg>
  <div class="cap">Ribbon Script</div>
</div>

<script>
(function(){
  "use strict";
  var svg = document.getElementById('an10-c');
  var reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
  var rib = document.getElementById('an10-rib');
  var vine = document.getElementById('an10-vine');
  var text = document.getElementById('an10-text');
  var corners = document.getElementById('an10-corners');

  // Helper: append a SMIL animateTransform (additive, transform-only).
  function anim(target, type, vals, dur, extra){
    var a = document.createElementNS('http://www.w3.org/2000/svg','animateTransform');
    a.setAttribute('attributeName','transform');
    a.setAttribute('type',type);
    a.setAttribute('values',vals);
    a.setAttribute('dur',dur);
    a.setAttribute('repeatCount','indefinite');
    a.setAttribute('additive','sum');
    a.setAttribute('calcMode','spline');
    if(extra){ for(var k in extra) a.setAttribute(k, extra[k]); }
    target.appendChild(a);
    return a;
  }
  var ease = {keyTimes:'0;0.5;1', keySplines:'.42 0 .58 1;.42 0 .58 1'};

  if(reduce){
    // Static, on-brand frame: settle ribbon centered, no motion.
    return;
  }

  // Ribbon: slow lateral whiplash sway + breathing scale about its center.
  rib.setAttribute('transform-origin','200 185');
  anim(rib,'translate','0 0; 6 -4; 0 0','11s',ease);
  anim(rib,'rotate','-0.8 200 185; 1.0 200 185; -0.8 200 185','13s',ease);

  // Title drifts with the ribbon but softer, plus a faint opacity shimmer (opacity only).
  anim(text,'translate','0 0; 3 -2; 0 0','11s',ease);
  var sh = document.createElementNS('http://www.w3.org/2000/svg','animate');
  sh.setAttribute('attributeName','opacity');
  sh.setAttribute('values','0.96;0.74;0.96');
  sh.setAttribute('dur','7s');
  sh.setAttribute('repeatCount','indefinite');
  sh.setAttribute('calcMode','spline');
  sh.setAttribute('keyTimes','0;0.5;1');
  sh.setAttribute('keySplines','.42 0 .58 1;.42 0 .58 1');
  text.appendChild(sh);

  // Vine breathes counter to the ribbon for organic asymmetry.
  vine.setAttribute('transform-origin','200 220');
  anim(vine,'translate','0 0; -4 3; 0 0','15s',ease);
  // Subtle dash drift via transform on the vine group would shift layout; instead
  // animate the dash offset (paint-only, cheap, not layout) on the dashed path:
  var dashPath = vine.querySelector('path[stroke-dasharray]');
  if(dashPath){
    var d = document.createElementNS('http://www.w3.org/2000/svg','animate');
    d.setAttribute('attributeName','stroke-dashoffset');
    d.setAttribute('values','0;-30');
    d.setAttribute('dur','6s');
    d.setAttribute('repeatCount','indefinite');
    dashPath.appendChild(d);
  }

  // Corner florets pulse gently (transform scale about their buds).
  anim(corners,'rotate','-1 200 200; 1 200 200; -1 200 200','17s',ease);

  // Pause when tab hidden; resume on return. SMIL-native control.
  function vis(){
    if(document.hidden) svg.pauseAnimations();
    else svg.unpauseAnimations();
  }
  document.addEventListener('visibilitychange', vis, false);
})();
</script>
</body>
</html>
