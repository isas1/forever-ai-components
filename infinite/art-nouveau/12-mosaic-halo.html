<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Concentric rings of stained-glass mosaic cells in gold, green and rose shimmer softly around a central floral medallion.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mosaic Halo</title>
<style>
  html,body{margin:0;height:100%;background:#0e1310;overflow:hidden}
  #an12-stage{position:fixed;inset:0;display:grid;place-items:center}
  #an12-svg{width:100%;height:100%}
  .an12-cell{transform-box:fill-box;transform-origin:center}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important}}
</style>
</head>
<body>
<div id="an12-stage" role="img" aria-label="Mosaic Halo: a radiant Art Nouveau halo of stained-glass cells in gold, green and rose, shimmering softly around a central floral medallion.">
  <svg id="an12-svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
    <defs>
      <radialGradient id="an12-glow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#c9a24b" stop-opacity="0.34"/>
        <stop offset="42%" stop-color="#6f7d4a" stop-opacity="0.14"/>
        <stop offset="100%" stop-color="#0e1310" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="an12-core" cx="50%" cy="42%" r="60%">
        <stop offset="0%" stop-color="#f0d590"/>
        <stop offset="55%" stop-color="#c9a24b"/>
        <stop offset="100%" stop-color="#8a6f2e"/>
      </radialGradient>
    </defs>
    <rect width="400" height="400" fill="#0e1310"/>
    <circle cx="200" cy="200" r="190" fill="url(#an12-glow)"/>
    <g id="an12-mosaic" fill="none"></g>
    <g id="an12-medallion" stroke="#0e1310" stroke-width="1.1" stroke-linejoin="round"></g>
    <g id="an12-vines" fill="none" stroke="#a9c08a" stroke-width="1.6" stroke-linecap="round" opacity="0.9"></g>
  </svg>
</div>
<div class="cap">Mosaic Halo</div>
<script>
(function(){
  "use strict";
  var svg=document.getElementById("an12-svg");
  var mosaic=document.getElementById("an12-mosaic");
  var med=document.getElementById("an12-medallion");
  var vines=document.getElementById("an12-vines");
  var SVGNS="http://www.w3.org/2000/svg";
  var CX=200, CY=200, TAU=Math.PI*2;
  var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;

  // Art Nouveau stained-glass palette (muted gold / green / rose)
  var PAL=["#c9a24b","#d9b65f","#8a9b56","#6f7d4a","#b06a6a","#c98a86","#9a8f5a","#e0cf8e"];

  function cell(d,fill){
    var p=document.createElementNS(SVGNS,"path");
    p.setAttribute("d",d);
    p.setAttribute("fill",fill);
    p.setAttribute("stroke","#0e1310");
    p.setAttribute("stroke-width","1.1");
    p.setAttribute("stroke-linejoin","round");
    p.setAttribute("class","an12-cell");
    mosaic.appendChild(p);
    return p;
  }
  // build an annular ring of trapezoid cells between r0 and r1, n segments, gap in radians
  function ring(r0,r1,n,gap,palShift){
    var step=TAU/n;
    for(var i=0;i<n;i++){
      var a0=i*step+gap, a1=(i+1)*step-gap;
      var c0=Math.cos(a0),s0=Math.sin(a0),c1=Math.cos(a1),s1=Math.sin(a1);
      var d="M"+(CX+c0*r0).toFixed(2)+","+(CY+s0*r0).toFixed(2)
        +"L"+(CX+c0*r1).toFixed(2)+","+(CY+s0*r1).toFixed(2)
        +"A"+r1+","+r1+" 0 0 1 "+(CX+c1*r1).toFixed(2)+","+(CY+s1*r1).toFixed(2)
        +"L"+(CX+c1*r0).toFixed(2)+","+(CY+s1*r0).toFixed(2)
        +"A"+r0+","+r0+" 0 0 0 "+(CX+c0*r0).toFixed(2)+","+(CY+s0*r0).toFixed(2)+"Z";
      cell(d,PAL[(i+palShift)%PAL.length]);
    }
  }
  // Three concentric rings of mosaic cells (24+30+30 = 84 cells, under 110 cap)
  ring(70,108,24,0.020,0);
  ring(110,150,30,0.016,3);
  ring(152,184,30,0.013,5);

  // collect cells + per-cell static phase/speed (allocation-free loop later)
  var cells=mosaic.childNodes, N=cells.length;
  var phase=new Float32Array(N), spd=new Float32Array(N);
  for(var i=0;i<N;i++){ phase[i]=(i*2.39996)%TAU; spd[i]=0.6+((i*7)%5)*0.12; }

  // Central floral medallion (original whiplash petals, not a copy)
  function petal(rot){
    var g=document.createElementNS(SVGNS,"path");
    var d="M0,0 C14,-18 12,-46 0,-58 C-12,-46 -14,-18 0,0 Z";
    g.setAttribute("d",d);
    g.setAttribute("fill","url(#an12-core)");
    g.setAttribute("transform","translate("+CX+","+CY+") rotate("+rot+")");
    g.setAttribute("opacity","0.92");
    med.appendChild(g);
  }
  for(var p=0;p<6;p++) petal(p*60);
  var disc=document.createElementNS(SVGNS,"circle");
  disc.setAttribute("cx",CX);disc.setAttribute("cy",CY);disc.setAttribute("r","16");
  disc.setAttribute("fill","#0e1310");disc.setAttribute("stroke","#c9a24b");disc.setAttribute("stroke-width","1.4");
  med.appendChild(disc);
  var seed=document.createElementNS(SVGNS,"circle");
  seed.setAttribute("cx",CX);seed.setAttribute("cy",CY);seed.setAttribute("r","6");
  seed.setAttribute("fill","#e0cf8e");
  med.appendChild(seed);

  // Whiplash vine flourishes sweeping out of the halo (static line work)
  for(var v=0;v<8;v++){
    var a=v*(TAU/8)+0.2;
    var ca=Math.cos(a),sa=Math.sin(a), na=Math.cos(a+0.5),nb=Math.sin(a+0.5);
    var x0=CX+ca*186, y0=CY+sa*186;
    var x1=CX+na*150, y1=CY+nb*150;
    var x2=CX+ca*210, y2=CY+sa*210;
    var x3=CX+na*196, y3=CY+nb*196;
    var pth=document.createElementNS(SVGNS,"path");
    pth.setAttribute("d","M"+x0.toFixed(1)+","+y0.toFixed(1)+" C"+x1.toFixed(1)+","+y1.toFixed(1)+" "+x2.toFixed(1)+","+y2.toFixed(1)+" "+x3.toFixed(1)+","+y3.toFixed(1));
    pth.setAttribute("opacity","0.55");
    vines.appendChild(pth);
  }

  function drawFrame(t){
    for(var k=0;k<N;k++){
      var o=0.58+0.40*Math.sin(t*spd[k]+phase[k]);
      cells[k].setAttribute("opacity",o.toFixed(3));
    }
  }

  if(reduce){ drawFrame(1.2); return; }

  var raf=0, running=true, start=0;
  function loop(now){
    if(!running) return;
    if(!start) start=now;
    drawFrame((now-start)/1000);
    raf=requestAnimationFrame(loop);
  }
  function go(){ if(!running){running=true; start=0; raf=requestAnimationFrame(loop);} }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
  document.addEventListener("visibilitychange",function(){ document.hidden?stop():go(); });
  raf=requestAnimationFrame(loop);
})();
</script>
</body>
</html>
