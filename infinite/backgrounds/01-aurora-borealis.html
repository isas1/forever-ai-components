<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Blurred iris-cyan-magenta light ribbons drift and skew over near-black, screen-blended like northern lights with a dark veil.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Borealis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-900:#08090d;
  --accent-iris:#7c5cff; --accent-cyan:#22d3ee; --accent-magenta:#ff5ca8;
  --text-2:#8a91a8;
  --font-display:"Space Grotesk",system-ui,sans-serif;
  --ease-in-out:cubic-bezier(0.65,0,0.35,1);
}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;height:100%;overflow:hidden;}
body{background:var(--bg-900);}
.frame{position:absolute;inset:0;display:grid;place-items:center;}
.stage{position:relative;width:100%;height:100%;overflow:hidden;background:var(--bg-900);}

.c01-aur{position:absolute;inset:0;overflow:hidden;}
.c01-aur__ribbon{
  position:absolute;left:-30%;width:160%;height:70%;border-radius:50%;
  filter:blur(34px);mix-blend-mode:screen;opacity:.85;will-change:transform;
}
.c01-aur__ribbon--a{top:-10%;
  background:linear-gradient(90deg,transparent,var(--accent-iris) 35%,var(--accent-cyan) 65%,transparent);
  animation:c01-aur-drift-a 9s var(--ease-in-out) infinite alternate;}
.c01-aur__ribbon--b{top:18%;
  background:linear-gradient(90deg,transparent,var(--accent-cyan) 40%,var(--accent-magenta) 70%,transparent);
  animation:c01-aur-drift-b 11s var(--ease-in-out) infinite alternate;opacity:.7;}
.c01-aur__ribbon--c{top:40%;
  background:linear-gradient(90deg,transparent,var(--accent-magenta) 30%,var(--accent-iris) 60%,transparent);
  animation:c01-aur-drift-c 13s var(--ease-in-out) infinite alternate;opacity:.55;}
.c01-aur__veil{position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 40%,rgba(8,9,13,.6) 100%);}
@keyframes c01-aur-drift-a{0%{transform:translateX(-8%) translateY(0) skewY(-4deg) scaleY(.9);}100%{transform:translateX(10%) translateY(8%) skewY(5deg) scaleY(1.15);}}
@keyframes c01-aur-drift-b{0%{transform:translateX(6%) translateY(4%) skewY(6deg) scaleY(1.1);}100%{transform:translateX(-12%) translateY(-6%) skewY(-5deg) scaleY(.85);}}
@keyframes c01-aur-drift-c{0%{transform:translateX(-5%) translateY(2%) skewY(-3deg) scaleY(1);}100%{transform:translateX(14%) translateY(10%) skewY(7deg) scaleY(1.25);}}

.caption{position:absolute;left:12px;bottom:10px;z-index:5;
  font-family:var(--font-display);font-size:11px;font-weight:500;letter-spacing:.14em;
  text-transform:uppercase;color:var(--text-2);opacity:.7;pointer-events:none;}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;}
}
</style>
</head>
<body>
<div class="frame">
  <div class="stage">
    <div class="c01-aur" aria-hidden="true">
      <div class="c01-aur__ribbon c01-aur__ribbon--a"></div>
      <div class="c01-aur__ribbon c01-aur__ribbon--b"></div>
      <div class="c01-aur__ribbon c01-aur__ribbon--c"></div>
      <div class="c01-aur__veil"></div>
    </div>
    <span class="caption">Aurora Borealis</span>
  </div>
</div>
<script>
(function(){
  "use strict";
  // CSS-only animation; pause when tab hidden to save cycles.
  document.addEventListener("visibilitychange",function(){
    var ribbons=document.querySelectorAll(".c01-aur__ribbon");
    var state=document.hidden?"paused":"running";
    for(var i=0;i<ribbons.length;i++) ribbons[i].style.animationPlayState=state;
  });
})();
</script>
</body>
</html>
