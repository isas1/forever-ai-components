<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Four heavily blurred iris-cyan-magenta radial blobs slowly float and scale, blending into a soft animated mesh gradient on dark.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mesh Gradient</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-900:#08090d;
  --accent-iris:#7c5cff; --accent-cyan:#22d3ee; --accent-magenta:#ff5ca8;
  --text-2:#8a91a8;
  --font-display:"Space Grotesk",system-ui,sans-serif;
  --ease-in-out:cubic-bezier(0.65,0,0.35,1);
}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;height:100%;overflow:hidden;}
body{background:var(--bg-900);}
.frame{position:absolute;inset:0;display:grid;place-items:center;}
.stage{position:relative;width:100%;height:100%;overflow:hidden;background:var(--bg-900);}

.c02-mesh{position:absolute;inset:0;overflow:hidden;}
.c02-mesh__field{position:absolute;inset:-20%;filter:blur(40px) saturate(1.3);}
.c02-mesh__blob{position:absolute;width:55%;height:55%;border-radius:50%;
  mix-blend-mode:screen;will-change:transform;}
.c02-mesh__blob--1{background:radial-gradient(circle,var(--accent-iris),transparent 65%);
  top:0;left:0;animation:c02-mesh-m1 7s var(--ease-in-out) infinite alternate;}
.c02-mesh__blob--2{background:radial-gradient(circle,var(--accent-cyan),transparent 65%);
  top:5%;right:0;animation:c02-mesh-m2 8.5s var(--ease-in-out) infinite alternate;}
.c02-mesh__blob--3{background:radial-gradient(circle,var(--accent-magenta),transparent 65%);
  bottom:0;left:15%;animation:c02-mesh-m3 6.5s var(--ease-in-out) infinite alternate;}
.c02-mesh__blob--4{background:radial-gradient(circle,var(--accent-iris),transparent 65%);
  bottom:5%;right:10%;animation:c02-mesh-m4 9.5s var(--ease-in-out) infinite alternate;opacity:.8;}
@keyframes c02-mesh-m1{0%{transform:translate(0,0) scale(1);}100%{transform:translate(40%,30%) scale(1.3);}}
@keyframes c02-mesh-m2{0%{transform:translate(0,0) scale(1.2);}100%{transform:translate(-35%,40%) scale(.9);}}
@keyframes c02-mesh-m3{0%{transform:translate(0,0) scale(1);}100%{transform:translate(50%,-30%) scale(1.25);}}
@keyframes c02-mesh-m4{0%{transform:translate(0,0) scale(1.1);}100%{transform:translate(-40%,-35%) scale(.95);}}

.caption{position:absolute;left:12px;bottom:10px;z-index:5;
  font-family:var(--font-display);font-size:11px;font-weight:500;letter-spacing:.14em;
  text-transform:uppercase;color:var(--text-2);opacity:.7;pointer-events:none;}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;}
}
</style>
</head>
<body>
<div class="frame">
  <div class="stage">
    <div class="c02-mesh" aria-hidden="true">
      <div class="c02-mesh__field">
        <div class="c02-mesh__blob c02-mesh__blob--1"></div>
        <div class="c02-mesh__blob c02-mesh__blob--2"></div>
        <div class="c02-mesh__blob c02-mesh__blob--3"></div>
        <div class="c02-mesh__blob c02-mesh__blob--4"></div>
      </div>
    </div>
    <span class="caption">Mesh Gradient</span>
  </div>
</div>
<script>
(function(){
  "use strict";
  document.addEventListener("visibilitychange",function(){
    var b=document.querySelectorAll(".c02-mesh__blob");
    var s=document.hidden?"paused":"running";
    for(var i=0;i<b.length;i++) b[i].style.animationPlayState=s;
  });
})();
</script>
</body>
</html>
