<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Animated SVG noise grain jitters over dim radial tints with scrolling scanlines and a blinking magenta REC dot for analog film vibe.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Film Grain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-700:#12141d;
  --accent-magenta:#ff5ca8;
  --accent-iris-dim:rgba(124,92,255,.16);
  --accent-cyan-dim:rgba(34,211,238,.16);
  --text-2:#8a91a8;
  --font-display:"Space Grotesk",system-ui,sans-serif;
  --ease-linear:linear;
}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;height:100%;overflow:hidden;}
body{background:#08090d;}
.frame{position:absolute;inset:0;display:grid;place-items:center;}
.stage{position:relative;width:100%;height:100%;overflow:hidden;background:#08090d;}

.c04-grain{position:absolute;inset:0;overflow:hidden;}
.c04-grain__base{position:absolute;inset:0;
  background:
    radial-gradient(80% 80% at 30% 20%,var(--accent-iris-dim),transparent 60%),
    radial-gradient(70% 70% at 80% 80%,var(--accent-cyan-dim),transparent 55%),
    var(--bg-700);}
.c04-grain__noise{position:absolute;inset:-10%;opacity:.55;mix-blend-mode:overlay;pointer-events:none;
  will-change:transform;animation:c04-grain-jitter .6s steps(4,end) infinite;}
.c04-grain__noise svg{width:100%;height:100%;}
.c04-grain__scan{position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,rgba(255,255,255,.035) 0 1px,transparent 1px 3px);
  mix-blend-mode:overlay;animation:c04-grain-scan 6s var(--ease-linear) infinite;}
.c04-grain__label{position:absolute;left:14px;bottom:12px;
  font-family:var(--font-display);font-size:11px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--text-2);z-index:2;}
.c04-grain__label::before{content:"";display:inline-block;width:7px;height:7px;border-radius:50%;
  background:var(--accent-magenta);margin-right:7px;vertical-align:middle;
  animation:c04-grain-rec 1.2s steps(2,end) infinite;}
@keyframes c04-grain-scan{0%{transform:translateY(0);}100%{transform:translateY(6px);}}
@keyframes c04-grain-rec{0%,49%{opacity:1;}50%,100%{opacity:.15;}}
@keyframes c04-grain-jitter{
  0%{transform:translate(0,0);}25%{transform:translate(-1.5%,1%);}
  50%{transform:translate(1%,-1.5%);}75%{transform:translate(-1%,-0.5%);}
  100%{transform:translate(0,0);}}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;}
}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/backgrounds/04-film-grain.html",
 "title": "Film Grain",
 "description": "SVG feTurbulence noise jitters over a dark radial-tinted base with scrolling scanlines and a blinking magenta REC dot for an analog film look.",
 "useWhen": "Dark hero backgrounds needing tactile film texture; retro/analog aesthetics; video-editing or media-app UIs.",
 "avoidWhen": "Light-background layouts (background hardcoded dark). Any context where motion overlays compete with readable text or form controls.",
 "agentPrompt": "Change accent from magenta to amber (#f59e0b), slow the grain jitter to 1s by editing animation-duration on .c04-grain__noise, and replace the iris/cyan dim tints with warm sepia tones.",
 "editableAreas": [
  "grain jitter speed (0.6s on .c04-grain__noise)",
  "scanline scroll speed (6s on .c04-grain__scan)",
  "noise baseFrequency (0.9)",
  "radial tint colors (--accent-iris-dim, --accent-cyan-dim)",
  "REC dot color (--accent-magenta)",
  "noise opacity (0.55)"
 ],
 "preserveElements": [
  "SVG feTurbulence filter (grain source)",
  "visibilitychange pause handler",
  "prefers-reduced-motion guard",
  "IIFE wrapper"
 ],
 "knownLimitations": [
  "Background color hardcoded to near-black — requires CSS edits for any light-mode use",
  "Static SVG noise texture; grain pattern never actually changes (only jitters position)",
  "No JS-driven randomization — seed is fixed at 3"
 ],
 "tier": "curated",
 "labels": [
  "accessible",
  "copy-paste-safe",
  "minimal-deps",
  "mobile-ready",
  "easy-to-modify"
 ],
 "tags": [
  "film-grain",
  "noise",
  "scanlines",
  "background",
  "analog",
  "retro",
  "svg-filter"
 ]
}
</script>
</head>
<body>
<div class="frame">
  <div class="stage">
    <div class="c04-grain" aria-hidden="true">
      <div class="c04-grain__base"></div>
      <div class="c04-grain__noise">
        <svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
          <filter id="c04-grain-turb">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" seed="3" result="n"/>
            <feColorMatrix type="saturate" values="0"/>
          </filter>
          <rect width="100%" height="100%" filter="url(#c04-grain-turb)"/>
        </svg>
      </div>
      <div class="c04-grain__scan"></div>
      <span class="c04-grain__label">REC · GRAIN</span>
    </div>
  </div>
</div>
<script>
(function(){
  "use strict";
  // Turbulence is now a static texture; pause the CSS jitter and scan when hidden.
  var noise=document.querySelector(".c04-grain__noise");
  var scan=document.querySelector(".c04-grain__scan");
  document.addEventListener("visibilitychange",function(){
    var s=document.hidden?"paused":"running";
    if(noise) noise.style.animationPlayState=s;
    if(scan) scan.style.animationPlayState=s;
  });
})();
</script>
</body>
</html>
