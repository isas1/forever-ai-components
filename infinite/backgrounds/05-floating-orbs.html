<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Soft glowing iris-cyan-magenta orbs with highlight and blur bloom gently float at varied sizes across a dark vignetted field.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Orbs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-900:#08090d;
  --accent-iris:#7c5cff; --accent-cyan:#22d3ee; --accent-magenta:#ff5ca8;
  --text-2:#8a91a8;
  --font-display:"Space Grotesk",system-ui,sans-serif;
  --ease-in-out:cubic-bezier(0.65,0,0.35,1);
}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;height:100%;overflow:hidden;}
body{background:var(--bg-900);}
.frame{position:absolute;inset:0;display:grid;place-items:center;}
.stage{position:relative;width:100%;height:100%;overflow:hidden;
  background:radial-gradient(120% 100% at 50% 0%,rgba(255,255,255,.03),transparent 60%),var(--bg-900);}

.c05-orbs{position:absolute;inset:0;overflow:hidden;}
.c05-orbs__orb{position:absolute;border-radius:50%;filter:blur(2px);will-change:transform;}
.c05-orbs__orb::after{content:"";position:absolute;inset:0;border-radius:50%;
  filter:blur(18px);opacity:.9;background:inherit;}
.c05-orbs__orb--1{width:90px;height:90px;top:18%;left:12%;
  background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.5),var(--accent-iris) 45%,transparent 72%);
  animation:c05-orbs-f1 12s var(--ease-in-out) infinite alternate;}
.c05-orbs__orb--2{width:62px;height:62px;top:52%;left:60%;
  background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.5),var(--accent-cyan) 45%,transparent 72%);
  animation:c05-orbs-f2 9s var(--ease-in-out) infinite alternate;}
.c05-orbs__orb--3{width:130px;height:130px;top:30%;left:64%;
  background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.35),var(--accent-magenta) 45%,transparent 72%);
  opacity:.7;animation:c05-orbs-f3 15s var(--ease-in-out) infinite alternate;}
.c05-orbs__orb--4{width:46px;height:46px;top:66%;left:24%;
  background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.5),var(--accent-iris) 45%,transparent 72%);
  animation:c05-orbs-f4 7.5s var(--ease-in-out) infinite alternate;}
@keyframes c05-orbs-f1{0%{transform:translate(0,0);}100%{transform:translate(26px,-22px);}}
@keyframes c05-orbs-f2{0%{transform:translate(0,0);}100%{transform:translate(-30px,18px);}}
@keyframes c05-orbs-f3{0%{transform:translate(0,0) scale(1);}100%{transform:translate(18px,24px) scale(1.08);}}
@keyframes c05-orbs-f4{0%{transform:translate(0,0);}100%{transform:translate(22px,-16px);}}

.caption{position:absolute;left:12px;bottom:10px;z-index:5;
  font-family:var(--font-display);font-size:11px;font-weight:500;letter-spacing:.14em;
  text-transform:uppercase;color:var(--text-2);opacity:.7;pointer-events:none;}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;}
}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/backgrounds/05-floating-orbs.html",

 "description": "4 glowing iris/cyan/magenta orbs with highlight and bloom drift slowly across a dark canvas via alternating CSS keyframe translations.",
 "useWhen": "Dark-mode hero backgrounds, ambient loading screens, glassmorphism UI backdrops needing soft color movement.",
 "avoidWhen": "Light backgrounds (hardcoded dark palette). Contexts requiring legible text overlays — blur bloom can compete with contrast.",
 "agentPrompt": "Add a fifth orb: set width/height to 75px, top:80%, left:45%, use --accent-cyan, and add a c05-orbs-f5 keyframe translating to (-20px, -28px) over 11s.",
 "editableAreas": [
  "orb sizes (width/height per --N class)",
  "accent colors (--accent-iris, --accent-cyan, --accent-magenta)",
  "animation durations (12s, 9s, 15s, 7.5s)",
  "translate distances in @keyframes",
  "bloom blur radius (blur(18px) on ::after)"
 ],
 "preserveElements": [
  "visibilitychange pause handler in IIFE",
  "prefers-reduced-motion guard",
  "c05- namespace prefix on all classes"
 ],
 "knownLimitations": [
  "Background color hardcoded — must change --bg-900 and stage gradient to use on light themes",
  "No JS — orb count changes require manual HTML + CSS additions",
  "Only 4 orbs; sparse on very large viewports"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"

 "tags": [
  "orbs",
  "glow",
  "background",

  "blur",

  "loop"
 ]
}
</script>
</head>
<body>
<div class="frame">
  <div class="stage">
    <div class="c05-orbs" aria-hidden="true">
      <div class="c05-orbs__orb c05-orbs__orb--3"></div>
      <div class="c05-orbs__orb c05-orbs__orb--1"></div>
      <div class="c05-orbs__orb c05-orbs__orb--2"></div>
      <div class="c05-orbs__orb c05-orbs__orb--4"></div>
    </div>
    <span class="caption">Floating Orbs</span>
  </div>
</div>
<script>
(function(){
  "use strict";
  document.addEventListener("visibilitychange",function(){
    var o=document.querySelectorAll(".c05-orbs__orb");
    var s=document.hidden?"paused":"running";
    for(var i=0;i<o.length;i++) o[i].style.animationPlayState=s;
  });
})();
</script>
</body>
</html>
