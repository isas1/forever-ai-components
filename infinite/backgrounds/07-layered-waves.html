<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Three parallax SVG wave layers in iris, cyan, and dark slide horizontally at different speeds over a deep blue-gradient sky.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layered Waves</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-700:#12141d;
  --text-2:#8a91a8;
  --font-display:"Space Grotesk",system-ui,sans-serif;
  --ease-linear:linear;
}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;height:100%;overflow:hidden;}
body{background:#08090d;}
.frame{position:absolute;inset:0;display:grid;place-items:center;}
.stage{position:relative;width:100%;height:100%;overflow:hidden;background:#08090d;}

.c07-wave{position:absolute;inset:0;overflow:hidden;}
.c07-wave__sky{position:absolute;inset:0;
  background:linear-gradient(180deg,var(--bg-700) 0%,#11192b 60%,#0c1422 100%);}
.c07-wave svg{position:absolute;left:0;bottom:0;width:200%;height:100%;}
.c07-wave__layer{will-change:transform;}
.c07-wave__layer--1{animation:c07-wave-slide 11s var(--ease-linear) infinite;opacity:.45;}
.c07-wave__layer--2{animation:c07-wave-slide 7.5s var(--ease-linear) infinite;opacity:.65;}
.c07-wave__layer--3{animation:c07-wave-slide 5s var(--ease-linear) infinite;opacity:.9;}
@keyframes c07-wave-slide{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}

.caption{position:absolute;left:12px;bottom:10px;z-index:5;
  font-family:var(--font-display);font-size:11px;font-weight:500;letter-spacing:.14em;
  text-transform:uppercase;color:var(--text-2);opacity:.7;pointer-events:none;}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;}
}
</style>
</head>
<body>
<div class="frame">
  <div class="stage">
    <div class="c07-wave" aria-hidden="true">
      <div class="c07-wave__sky"></div>
      <svg class="c07-wave__layer c07-wave__layer--1" viewBox="0 0 1440 320" preserveAspectRatio="none">
        <path fill="#7c5cff" d="M0,160 C180,210 360,90 720,150 C1080,210 1260,110 1440,160 L1440,320 L0,320 Z
                                 M1440,160 C1620,210 1800,90 2160,150 C2520,210 2700,110 2880,160 L2880,320 L1440,320 Z"/>
      </svg>
      <svg class="c07-wave__layer c07-wave__layer--2" viewBox="0 0 1440 320" preserveAspectRatio="none">
        <path fill="#22d3ee" d="M0,200 C200,150 400,250 720,200 C1040,150 1240,250 1440,200 L1440,320 L0,320 Z
                                 M1440,200 C1640,150 1840,250 2160,200 C2480,150 2680,250 2880,200 L2880,320 L1440,320 Z"/>
      </svg>
      <svg class="c07-wave__layer c07-wave__layer--3" viewBox="0 0 1440 320" preserveAspectRatio="none">
        <path fill="#181b27" d="M0,250 C220,290 420,210 720,250 C1020,290 1220,210 1440,250 L1440,320 L0,320 Z
                                 M1440,250 C1660,290 1860,210 2160,250 C2460,290 2660,210 2880,250 L2880,320 L1440,320 Z"/>
      </svg>
    </div>
    <span class="caption">Layered Waves</span>
  </div>
</div>
<script>
(function(){
  "use strict";
  document.addEventListener("visibilitychange",function(){
    var l=document.querySelectorAll(".c07-wave__layer");
    var s=document.hidden?"paused":"running";
    for(var i=0;i<l.length;i++) l[i].style.animationPlayState=s;
  });
})();
</script>
</body>
</html>
