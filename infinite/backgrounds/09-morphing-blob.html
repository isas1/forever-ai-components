<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Iris-magenta-cyan conic-gradient blob slowly morphs its border-radius and spins behind a soft pulsing halo on near-black.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morphing Blob</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-900:#08090d;
  --accent-iris:#7c5cff; --accent-cyan:#22d3ee; --accent-magenta:#ff5ca8;
  --accent-iris-dim:rgba(124,92,255,.16);
  --text-2:#8a91a8;
  --font-display:"Space Grotesk",system-ui,sans-serif;
  --ease-in-out:cubic-bezier(0.65,0,0.35,1);
  --ease-linear:linear;
}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;height:100%;overflow:hidden;}
body{background:var(--bg-900);}
.frame{position:absolute;inset:0;display:grid;place-items:center;}
.stage{position:relative;width:100%;height:100%;overflow:hidden;background:var(--bg-900);}

.c09-morph{position:absolute;inset:0;display:grid;place-items:center;overflow:hidden;}
.c09-morph__halo{position:absolute;width:70%;aspect-ratio:1;border-radius:50%;
  background:radial-gradient(circle,var(--accent-iris-dim),transparent 70%);
  filter:blur(20px);animation:c09-morph-pulse 6s var(--ease-in-out) infinite alternate;}
.c09-morph__blob{position:relative;width:52%;aspect-ratio:1;
  background:conic-gradient(from 0deg,var(--accent-iris),var(--accent-magenta),var(--accent-cyan),var(--accent-iris));
  filter:blur(3px) saturate(1.25);
  animation:c09-morph-shape 8s var(--ease-in-out) infinite,c09-morph-spin 14s var(--ease-linear) infinite;
  will-change:border-radius,transform;}
@keyframes c09-morph-shape{
  0%,100%{border-radius:42% 58% 63% 37% / 41% 44% 56% 59%;}
  33%{border-radius:67% 33% 38% 62% / 58% 63% 37% 42%;}
  66%{border-radius:38% 62% 55% 45% / 49% 38% 62% 51%;}}
@keyframes c09-morph-spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
@keyframes c09-morph-pulse{0%{transform:scale(.9);opacity:.6;}100%{transform:scale(1.15);opacity:1;}}

.caption{position:absolute;left:12px;bottom:10px;z-index:5;
  font-family:var(--font-display);font-size:11px;font-weight:500;letter-spacing:.14em;
  text-transform:uppercase;color:var(--text-2);opacity:.7;pointer-events:none;}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;}
}
</style>
</head>
<body>
<div class="frame">
  <div class="stage">
    <div class="c09-morph" aria-hidden="true">
      <div class="c09-morph__halo"></div>
      <div class="c09-morph__blob"></div>
    </div>
    <span class="caption">Morphing Blob</span>
  </div>
</div>
<script>
(function(){
  "use strict";
  document.addEventListener("visibilitychange",function(){
    var e=document.querySelectorAll(".c09-morph__blob,.c09-morph__halo");
    var s=document.hidden?"paused":"running";
    for(var i=0;i<e.length;i++) e[i].style.animationPlayState=s;
  });
})();
</script>
</body>
</html>
