<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Concentric red, blue and yellow arcs, scattered dots, a tilted bar and a breathing core counter-rotate in Kandinsky-style orbit on a dark fi">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kandinsky Orbit</title>
<style>
  html,body{margin:0;height:100%;background:#101012}
  #bh02-stage{position:fixed;inset:0;width:100%;height:100%;display:block;background:#101012}
  #bh02-svg{position:absolute;inset:0;width:100%;height:100%}
  /* rotating groups — compositor transform only */
  #bh02-arcs{animation:bh02-spin 26s linear infinite;transform-origin:200px 200px}
  #bh02-dots{animation:bh02-spinR 17s linear infinite;transform-origin:200px 200px}
  #bh02-bar{animation:bh02-spinB 11s cubic-bezier(.45,0,.55,1) infinite;transform-origin:200px 200px}
  #bh02-tri{animation:bh02-pulse 9s ease-in-out infinite;transform-origin:200px 200px}
  #bh02-core{animation:bh02-beat 5.5s ease-in-out infinite;transform-origin:200px 200px}
  @keyframes bh02-spin{to{transform:rotate(360deg)}}
  @keyframes bh02-spinR{to{transform:rotate(-360deg)}}
  @keyframes bh02-spinB{
    0%{transform:rotate(-18deg)}
    50%{transform:rotate(202deg)}
    100%{transform:rotate(342deg)}
  }
  @keyframes bh02-pulse{
    0%,100%{transform:rotate(0deg) scale(1)}
    50%{transform:rotate(15deg) scale(1.08)}
  }
  @keyframes bh02-beat{
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.14)}
  }
  .bh02-paused #bh02-arcs,.bh02-paused #bh02-dots,.bh02-paused #bh02-bar,
  .bh02-paused #bh02-tri,.bh02-paused #bh02-core{animation-play-state:paused}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important}}
</style>

<body>
<div id="bh02-stage">
  <svg id="bh02-svg" viewBox="0 0 400 400" role="img"
       aria-label="Kandinsky Orbit: concentric red, blue and yellow arcs, scattered dots and a tilted black bar rotating in counterpoint on a dark field, in the Bauhaus geometric style.">
    <defs>
      <radialGradient id="bh02-vig" cx="42%" cy="38%" r="75%">
        <stop offset="0%" stop-color="#1a1a1f"/>
        <stop offset="100%" stop-color="#0c0c0e"/>
      </radialGradient>
    </defs>

    <rect x="0" y="0" width="400" height="400" fill="url(#bh02-vig)"/>

    <!-- thin modular grid ticks, static rhythm -->
    <g stroke="#2a2a30" stroke-width="1">
      <line x1="200" y1="14" x2="200" y2="46"/>
      <line x1="200" y1="354" x2="200" y2="386"/>
      <line x1="14" y1="200" x2="46" y2="200"/>
      <line x1="354" y1="200" x2="386" y2="200"/>
    </g>

    <!-- concentric arcs in counter-rotation, primary palette -->
    <g id="bh02-arcs" fill="none" stroke-linecap="round">
      <circle cx="200" cy="200" r="160" stroke="#1f1f25" stroke-width="2"/>
      <path d="M200 60 A140 140 0 0 1 340 200" stroke="#e63329" stroke-width="14"/>
      <path d="M200 60 A140 140 0 0 0 60 200" stroke="#2a2a30" stroke-width="3"/>
      <path d="M88 312 A140 140 0 0 1 312 312" stroke="#f4c20d" stroke-width="9"/>
      <path d="M60 200 A140 140 0 0 0 200 340" stroke="#1f5fd1" stroke-width="22"/>
      <path d="M310 110 A155 155 0 0 1 360 230" stroke="#e63329" stroke-width="4"/>
    </g>

    <!-- mid arc ring, reverse spin -->
    <g id="bh02-dots">
      <circle cx="200" cy="200" r="104" fill="none" stroke="#2f2f36" stroke-width="1.5"/>
      <path d="M120 138 A104 104 0 0 1 280 138" fill="none" stroke="#1f5fd1" stroke-width="7"/>
      <circle cx="200" cy="96" r="9" fill="#f4c20d"/>
      <circle cx="293" cy="245" r="6" fill="#e63329"/>
      <circle cx="108" cy="245" r="13" fill="#1f5fd1"/>
      <circle cx="200" cy="304" r="4.5" fill="#f4f1ea"/>
      <circle cx="262" cy="138" r="5.5" fill="#e63329"/>
    </g>

    <!-- tilted bar — the counterpoint accent -->
    <g id="bh02-bar">
      <rect x="196" y="40" width="8" height="320" rx="4" fill="#0c0c0e"/>
      <rect x="196" y="40" width="8" height="118" rx="4" fill="#e63329"/>
      <rect x="196" y="246" width="8" height="74" rx="4" fill="#f4c20d"/>
      <circle cx="200" cy="40" r="11" fill="#1f5fd1"/>
    </g>

    <!-- pulsing triangle, Klee/Kandinsky energy -->
    <g id="bh02-tri">
      <path d="M200 150 L236 214 L164 214 Z" fill="none" stroke="#f4f1ea" stroke-width="2.5"/>
    </g>

    <!-- breathing core -->
    <g id="bh02-core">
      <circle cx="200" cy="200" r="26" fill="#e63329"/>
      <circle cx="200" cy="200" r="11" fill="#0c0c0e"/>
      <circle cx="200" cy="200" r="4.5" fill="#f4c20d"/>
    </g>
  </svg>
</div>
<div class="cap">Kandinsky Orbit</div>

<script>
(function(){
  "use strict";
  var svg=document.getElementById("bh02-svg");
  var stage=document.getElementById("bh02-stage");
  if(!svg||!stage)return;
  var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
  if(reduce){
    // settle to one static, balanced, on-brand frame
    stage.classList.add("bh02-paused");
    return;
  }
  // single pause/resume controller on visibility, CSS-only animations
  function onVis(){
    if(document.hidden) stage.classList.add("bh02-paused");
    else stage.classList.remove("bh02-paused");
  }
  document.addEventListener("visibilitychange",onVis,{passive:true});
})();
</script>
