<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Red circle, blue square and yellow triangle on a balance beam spin, pulse and tilt in rhythmic Bauhaus counterpoint over a dark field.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Form Trio</title>
<style>
  :root{
    --bh03-bg:#101012; --bh03-red:#e63329; --bh03-blue:#1f57c3;
    --bh03-yellow:#f4c01e; --bh03-ink:#0d0d0f; --bh03-paper:#e9e6df;
  }
  html,body{margin:0;height:100%;background:var(--bh03-bg);overflow:hidden}
  #bh03-stage{
    position:fixed;inset:0;display:grid;place-items:center;
    background:
      radial-gradient(120% 120% at 50% 42%, #18181c 0%, var(--bh03-bg) 70%);
  }
  /* paper-grain free, pure flat field with one ruled baseline */
  #bh03-grid{
    position:absolute;left:8%;right:8%;top:50%;height:0;
    border-top:2px solid #2a2a30;transform:translateY(-0.5px);
  }
  #bh03-svg{width:min(86vmin,640px);height:min(86vmin,640px);display:block}
  .bh03-shape{transform-box:fill-box;transform-origin:center}
  /* rhythmic morph sequence — three beats, staggered */
  @keyframes bh03-spin{to{transform:rotate(360deg)}}
  @keyframes bh03-pulse{
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.12)}
  }
  @keyframes bh03-rise{
    0%,100%{transform:translateY(0) rotate(0deg)}
    33%{transform:translateY(-7px) rotate(-8deg)}
    66%{transform:translateY(5px) rotate(6deg)}
  }
  #bh03-rot{transform-box:view-box;transform-origin:center;
    animation:bh03-spin 28s linear infinite}
  #bh03-circle{animation:bh03-pulse 4.4s ease-in-out infinite}
  #bh03-square{animation:bh03-rise 5.6s cubic-bezier(.65,0,.35,1) infinite}
  #bh03-tri{animation:bh03-spin 9s steps(8,end) infinite}
  /* the connector bar that tilts like a Bauhaus balance beam */
  #bh03-beam{transform-box:fill-box;transform-origin:center;
    animation:bh03-tilt 7s cubic-bezier(.65,0,.35,1) infinite}
  @keyframes bh03-tilt{
    0%,100%{transform:rotate(-9deg)}
    50%{transform:rotate(9deg)}
  }
  /* baked offset shadows live on a static layer (#bh03-shadows) — no animated
     node carries a filter, so nothing re-rasterizes per frame */
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
    #bh03-rot,#bh03-circle,#bh03-square,#bh03-tri,#bh03-beam{animation:none!important}
    #bh03-beam{transform:rotate(-9deg)}
  }
</style>
<script type="application/json" id="forever-agent-meta">
{

 "title": "Form Trio",
 "description": "Red circle, blue square, and yellow triangle orbit a slow-rotating armature while each shape independently spins, pulses, or tilts on a dark field.",
 "useWhen": "Art/design portfolios, Bauhaus or geometric-themed hero sections, ambient background loops needing primary-color energy.",
 "avoidWhen": "Contexts requiring legible text overlays — the rotating armature competes visually. Avoid where reduced-motion users need meaningful content.",
 "agentPrompt": "Change the outer armature rotation from 28s to 14s by editing `animation:bh03-spin 28s linear infinite` on `#bh03-rot`, and swap `--bh03-bg` to `#f5f0e8` for a light paper background.",
 "editableAreas": [
  "armature rotation speed (28s on #bh03-rot)",
  "shape fill colors (--bh03-red, --bh03-blue, --bh03-yellow CSS vars)",
  "triangle step count (steps(8,end) on #bh03-tri)",
  "beam tilt range (rotate(-9deg)/rotate(9deg) in bh03-tilt)",
  "circle pulse scale (1.12 in bh03-pulse)"
 ],
 "preserveElements": [
  "static bh03-shadows layer (never animate — cheap composite)",
  "IIFE wrapper with visibilitychange pause",
  "prefers-reduced-motion guard (animation:none block + JS setState paused)"

 "knownLimitations": [

  "No click/hover interactivity; purely decorative"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",

  "minimal-deps"

</head>
<body>
<div id="bh03-stage" role="img" aria-label="Bauhaus composition: a red circle, blue square, and yellow triangle rotating and morphing through a rhythmic geometric sequence on a dark field.">
  <div id="bh03-grid" aria-hidden="true"></div>
  <svg id="bh03-svg" viewBox="0 0 400 400" aria-hidden="true">
    <defs>
      <clipPath id="bh03-frame"><rect x="0" y="0" width="400" height="400"/></clipPath>
    </defs>
    <g clip-path="url(#bh03-frame)">
      <!-- black grounding bars: modular rhythm -->
      <rect x="0" y="316" width="400" height="10" fill="#000" opacity=".55"/>
      <rect x="54" y="0" width="6" height="400" fill="#000" opacity=".22"/>
      <rect x="340" y="0" width="6" height="400" fill="#000" opacity=".22"/>

      <!-- baked offset shadows: static dark copies at the shapes' rest
           positions, +6px in y. This layer never animates, so it paints
           once and is composited cheaply every frame. -->
      <g id="bh03-shadows" fill="#000" opacity=".28" aria-hidden="true">
        <polygon points="200,76 244,156 156,156"/>
        <rect x="96" y="178" width="60" height="60" transform="rotate(8 126 208)"/>
        <circle cx="278" cy="208" r="33"/>
      </g>

      <!-- slow rotating armature carrying the trio -->
      <g id="bh03-rot">
        <!-- balance beam connecting square and circle -->
        <rect id="bh03-beam" x="118" y="196" width="164" height="6" rx="3" fill="var(--bh03-paper)" opacity=".85"/>

        <!-- TRIANGLE — yellow, top apex -->
        <g id="bh03-tri">
          <polygon class="bh03-shape" points="200,70 244,150 156,150"
            fill="var(--bh03-yellow)"/>
        </g>

        <!-- SQUARE — blue, left mass -->
        <rect id="bh03-square" class="bh03-shape" x="96" y="172" width="60" height="60"
          fill="var(--bh03-blue)" transform="rotate(8 126 202)"/>

        <!-- CIRCLE — red, right counterweight -->
        <circle id="bh03-circle" class="bh03-shape" cx="278" cy="202" r="33"
          fill="var(--bh03-red)"/>

        <!-- inner white dot: abstract tension point -->
        <circle cx="278" cy="202" r="9" fill="var(--bh03-paper)" opacity=".9"/>

        <!-- thin red ring echoing the circle, off-axis -->
        <circle cx="200" cy="280" r="46" fill="none"
          stroke="var(--bh03-red)" stroke-width="4" opacity=".85"/>
        <!-- small black square accent inside ring -->
        <rect x="190" y="270" width="20" height="20" fill="#000" opacity=".8"/>
      </g>
    </g>
  </svg>
</div>
<div class="cap">Form Trio</div>
<script>
(function(){
  "use strict";
  var reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
  var stage = document.getElementById('bh03-stage');
  // CSS drives the motion; JS only manages play/pause for the visibility budget.
  function setState(s){
    var ids=['bh03-rot','bh03-circle','bh03-square','bh03-tri','bh03-beam'];
    for(var i=0;i<ids.length;i++){
      var el=document.getElementById(ids[i]);
      if(el) el.style.animationPlayState=s;
    }
  }
  if(reduce){
    setState('paused'); // settle to one static, balanced frame
    return;
  }
  document.addEventListener('visibilitychange',function(){
    setState(document.hidden ? 'paused' : 'running');
  });
})();
</script>
</body>
</html>
