<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Red and blue diagonal bars sweep and cross in counterpoint over a faint grid, with a pulsing yellow square node and rotating ring.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Diagonal Counterpoint</title>
<style>
  :root{
    --bh06-bg:#101012;
    --bh06-red:#e63329;
    --bh06-blue:#1d52a8;
    --bh06-yellow:#f2c12e;
    --bh06-ink:#0a0a0b;
    --bh06-paper:#e8e4d8;
  }
  html,body{margin:0;height:100%;background:var(--bh06-bg);overflow:hidden}
  .bh06-stage{
    position:fixed;inset:0;display:grid;place-items:center;
    background:var(--bh06-bg);
  }
  .bh06-frame{
    position:relative;width:100%;height:100%;
    /* keep a square-ish play area regardless of frame ratio */
    background:
      radial-gradient(120% 120% at 30% 18%, #16161a 0%, var(--bh06-bg) 62%);
  }
  .bh06-svg{position:absolute;inset:0;width:100%;height:100%;display:block}

  /* counterpoint motion: two opposed diagonal sweeps, no easing default */
  @keyframes bh06-slideA{
    0%{transform:translate(-34%,34%)}
    50%{transform:translate(30%,-30%)}
    100%{transform:translate(-34%,34%)}
  }
  @keyframes bh06-slideB{
    0%{transform:translate(34%,34%)}
    50%{transform:translate(-30%,-30%)}
    100%{transform:translate(34%,34%)}
  }
  @keyframes bh06-pulse{
    0%,100%{transform:rotate(45deg) scale(1)}
    50%{transform:rotate(45deg) scale(1.12)}
  }
  @keyframes bh06-spin{
    0%{transform:rotate(0deg)}
    100%{transform:rotate(360deg)}
  }
  /* custom cubic-bezier — deliberate, weighted, anti-default-ease */
  .bh06-a{animation:bh06-slideA 7.2s cubic-bezier(.62,.01,.38,1) infinite}
  .bh06-b{animation:bh06-slideB 7.2s cubic-bezier(.62,.01,.38,1) infinite}
  .bh06-c{animation:bh06-slideA 5.1s cubic-bezier(.5,0,.5,1) infinite;animation-delay:-1.4s}
  .bh06-node{animation:bh06-pulse 3.6s cubic-bezier(.45,0,.55,1) infinite;transform-origin:center}
  .bh06-ring{animation:bh06-spin 18s linear infinite;transform-origin:center}

  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
    /* settle to a composed static frame */
    .bh06-a{transform:translate(-6%,6%)}
    .bh06-b{transform:translate(6%,-4%)}
    .bh06-c{transform:translate(0,0)}
    .bh06-node{transform:rotate(45deg) scale(1.05)}
  }
</style>
<script type="application/json" id="forever-agent-meta">

 "title": "Diagonal Counterpoint",

 "useWhen": "Dark-background hero sections, art/design portfolio tiles, Bauhaus or geometric-modernism themed displays.",
 "avoidWhen": "Light backgrounds (hardcoded dark palette). Contexts requiring readable text overlays — the crossing bars dominate the visual field.",

</head>
<body>
  <div class="bh06-stage">
    <div class="bh06-frame">
      <svg class="bh06-svg" id="bh06-c" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice"
           role="img" aria-label="Bauhaus geometric composition: red and blue diagonal bars crossing in constructive counterpoint over a dark field, with a yellow square node and concentric ring.">
        <defs>
          <!-- static glow: drawn once, never repainted -->
          <radialGradient id="bh06-glow" cx="50%" cy="42%" r="62%">
            <stop offset="0%" stop-color="#2a2a30"/>
            <stop offset="100%" stop-color="#101012"/>
          </radialGradient>
          <clipPath id="bh06-clip"><rect x="0" y="0" width="400" height="400"/></clipPath>
        </defs>

        <g clip-path="url(#bh06-clip)">
          <rect x="0" y="0" width="400" height="400" fill="url(#bh06-glow)"/>

          <!-- faint modular grid: structure beneath the rhythm -->
          <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
            <line x1="100" y1="0" x2="100" y2="400"/>
            <line x1="200" y1="0" x2="200" y2="400"/>
            <line x1="300" y1="0" x2="300" y2="400"/>
            <line x1="0" y1="100" x2="400" y2="100"/>
            <line x1="0" y1="200" x2="400" y2="200"/>
            <line x1="0" y1="300" x2="400" y2="300"/>
          </g>

          <!-- counterpoint: blue bar descends, red bar rises, crossing at center -->
          <g class="bh06-b">
            <g transform="rotate(45 200 200)">
              <rect x="-260" y="178" width="920" height="30" fill="var(--bh06-blue)"/>
            </g>
          </g>
          <g class="bh06-a">
            <g transform="rotate(-45 200 200)">
              <rect x="-260" y="186" width="920" height="34" fill="var(--bh06-red)"/>
            </g>
          </g>

          <!-- thin syncopating black bar — the offbeat -->
          <g class="bh06-c">
            <g transform="rotate(-45 200 200)">
              <rect x="-260" y="120" width="920" height="9" fill="var(--bh06-ink)"/>
            </g>
          </g>

          <!-- concentric ring: pure circle, slow rotation gives a constant pivot -->
          <g class="bh06-ring">
            <circle cx="200" cy="200" r="78" fill="none" stroke="var(--bh06-paper)" stroke-width="3" stroke-dasharray="170 320"/>
          </g>

          <!-- yellow square node at the crossing: the fixed accent against motion -->
          <g class="bh06-node">
            <rect x="178" y="178" width="44" height="44" fill="var(--bh06-yellow)"/>
          </g>

          <!-- small fixed counter-circle, lower right: balance weight -->
          <circle cx="330" cy="318" r="20" fill="var(--bh06-red)"/>
          <!-- small triangle, upper left: completes the trinity of forms -->
          <polygon points="70,64 96,108 44,108" fill="var(--bh06-blue)"/>
        </g>
      </svg>
    </div>
  </div>
  <div class="cap">Diagonal Counterpoint</div>

  <script>
  (function(){
    "use strict";
    var svg = document.getElementById('bh06-c');
    if(!svg) return;
    var reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;

    // SMIL not used; CSS drives motion. We only manage play/pause for perf.
    function setPlay(state){
      // toggle CSS animations on the whole subtree without layout reads
      svg.style.setProperty('--bh06-play', state); // noop var, future-proof
      var anims = (svg.getAnimations ? svg.getAnimations({subtree:true}) : []);
      for(var i=0;i<anims.length;i++){
        if(state === 'paused'){ anims[i].pause(); } else { anims[i].play(); }
      }
    }

    if(reduce){
      // honor reduced motion: do nothing, CSS settles to a static frame.
      return;
    }

    document.addEventListener('visibilitychange', function(){
      setPlay(document.hidden ? 'paused' : 'running');
    }, {passive:true});
  })();
  </script>
</body>
</html>
