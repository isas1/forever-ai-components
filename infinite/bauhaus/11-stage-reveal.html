<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A curtain of red, blue, yellow and black bars parts left/right to reveal a primary-red circle with gold ring on a dark stage, looping.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stage Reveal</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#101012;overflow:hidden}
  #bh11-stage{position:fixed;inset:0;width:100%;height:100%;background:#101012}
  .bh11-svg{position:absolute;inset:0;width:100%;height:100%;display:block}

  #bh11-curtain rect{
    transform-box:fill-box;transform-origin:center;
    animation:bh11-part 4.6s cubic-bezier(.76,0,.24,1) infinite;
  }
  #bh11-curtain g.bh11-L rect{transform-origin:left center}
  #bh11-curtain g.bh11-R rect{transform-origin:right center}

  .bh11-L rect{animation-name:bh11-partL}
  .bh11-R rect{animation-name:bh11-partR}

  @keyframes bh11-partL{
    0%,16%{transform:translateX(0)}
    52%,80%{transform:translateX(-118%)}
    96%,100%{transform:translateX(0)}
  }
  @keyframes bh11-partR{
    0%,16%{transform:translateX(0)}
    52%,80%{transform:translateX(118%)}
    96%,100%{transform:translateX(0)}
  }

  #bh11-circle{
    transform-box:fill-box;transform-origin:center;
    animation:bh11-rise 4.6s cubic-bezier(.34,1.4,.5,1) infinite;
  }
  @keyframes bh11-rise{
    0%,30%{transform:scale(.18);opacity:0}
    54%,78%{transform:scale(1);opacity:1}
    92%,100%{transform:scale(.18);opacity:0}
  }
  #bh11-ring{
    transform-box:fill-box;transform-origin:center;
    animation:bh11-ring 4.6s cubic-bezier(.34,1.3,.5,1) infinite;
  }
  @keyframes bh11-ring{
    0%,32%{transform:scale(.4);opacity:0}
    56%{transform:scale(1);opacity:.9}
    78%{transform:scale(1);opacity:.9}
    90%,100%{transform:scale(1.5);opacity:0}
  }
  .bh11-tri{
    transform-box:fill-box;transform-origin:center;
    animation:bh11-cue 4.6s cubic-bezier(.5,0,.2,1) infinite;
  }
  @keyframes bh11-cue{
    0%,40%{transform:translateY(0) rotate(0deg);opacity:.9}
    58%{transform:translateY(0) rotate(0deg);opacity:.9}
    82%{transform:translateY(0) rotate(180deg);opacity:.9}
    100%{transform:translateY(0) rotate(180deg);opacity:.9}
  }

  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
    #bh11-curtain .bh11-L rect{transform:translateX(-118%)}
    #bh11-curtain .bh11-R rect{transform:translateX(118%)}
    #bh11-circle{transform:scale(1);opacity:1}
    #bh11-ring{opacity:0}
    .bh11-tri{transform:rotate(180deg)}
  }
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/bauhaus/11-stage-reveal.html",
 "title": "Stage Reveal",
 "description": "Eight colored bars split left/right like a stage curtain to reveal a primary-red circle with a gold ring, then close again in a 4.6s loop.",
 "useWhen": "Hero sections needing dramatic geometric reveals, Bauhaus/constructivist aesthetic pages, loading or intro animations.",
 "avoidWhen": "Contexts requiring immediate content visibility — curtain obscures center for first 50% of each cycle. Avoid on slow connections where CSS animation may stutter.",
 "agentPrompt": "Change the revealed circle color to #1f4ea8 (Bauhaus blue) and slow the cycle to 6s by updating animation-duration from 4.6s to 6s on all animation rules.",
 "editableAreas": [
  "curtain bar colors (fill attributes on rect elements)",
  "animation duration (4.6s on all keyframe rules)",
  "circle fill color (#e63329)",
  "ring color (#f4c20d stroke)",
  "curtain slide distance (118% in keyframes)"
 ],
 "preserveElements": [
  "bh11-L / bh11-R transform-origin split (left center / right center)",
  "prefers-reduced-motion static fallback block",
  "visibilitychange pause handler",
  "IIFE wrapper"
 ],
 "knownLimitations": [
  "All animations share a single 4.6s duration — changing speed requires updating every animation-duration declaration",
  "Background color is hardcoded in both CSS and SVG rect — must edit both to change it"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "bauhaus",
  "curtain",
  "reveal",
  "geometric",
  "loop",
  "svg",
  "theater"
 ]
}
</script>
</head>
<body>
<div id="bh11-stage" role="img" aria-label="Bauhaus composition: a curtain of red, blue, yellow and black bars parts to reveal a single primary red circle on a dark stage.">
  <svg class="bh11-svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="bh11-glow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#e63329" stop-opacity=".55"/>
        <stop offset="60%" stop-color="#e63329" stop-opacity=".12"/>
        <stop offset="100%" stop-color="#e63329" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <rect x="0" y="0" width="400" height="400" fill="#101012"/>
    <rect x="34" y="34" width="332" height="332" fill="none" stroke="#1d1d20" stroke-width="2"/>

    <circle cx="200" cy="200" r="150" fill="url(#bh11-glow)"/>

    <g id="bh11-ring">
      <circle cx="200" cy="200" r="92" fill="none" stroke="#f4c20d" stroke-width="6"/>
    </g>

    <g id="bh11-circle">
      <circle cx="200" cy="200" r="74" fill="#e63329"/>
      <circle cx="200" cy="200" r="74" fill="none" stroke="#101012" stroke-width="3"/>
    </g>

    <g id="bh11-curtain">
      <g class="bh11-L">
        <rect x="0"   y="0"   width="50" height="400" fill="#1f4ea8" style="animation-delay:0s"/>
        <rect x="50"  y="0"   width="50" height="400" fill="#0e0e10" style="animation-delay:.05s"/>
        <rect x="100" y="0"   width="50" height="400" fill="#f4c20d" style="animation-delay:.1s"/>
        <rect x="150" y="0"   width="50" height="400" fill="#0e0e10" style="animation-delay:.15s"/>
      </g>
      <g class="bh11-R">
        <rect x="200" y="0"   width="50" height="400" fill="#0e0e10" style="animation-delay:.15s"/>
        <rect x="250" y="0"   width="50" height="400" fill="#e63329" style="animation-delay:.1s"/>
        <rect x="300" y="0"   width="50" height="400" fill="#0e0e10" style="animation-delay:.05s"/>
        <rect x="350" y="0"   width="50" height="400" fill="#1f4ea8" style="animation-delay:0s"/>
      </g>
    </g>

    <polygon class="bh11-tri" points="200,40 214,66 186,66" fill="#f4c20d"/>
    <polygon class="bh11-tri" points="200,360 214,334 186,334" fill="#1f4ea8" style="animation-delay:.08s"/>
    <rect x="40" y="194" width="20" height="12" fill="#e63329"/>
    <rect x="340" y="194" width="20" height="12" fill="#f4c20d"/>
  </svg>
  <div class="cap">Stage Reveal</div>
</div>

<script>
(function(){
  "use strict";
  var stage = document.getElementById("bh11-stage");
  if(!stage) return;
  var reduce = matchMedia("(prefers-reduced-motion:reduce)").matches;
  var nodes = stage.querySelectorAll("[style*='animation'],#bh11-curtain rect,#bh11-circle,#bh11-ring,.bh11-tri");

  function setState(s){
    var all = stage.querySelectorAll("*");
    for(var i=0;i<all.length;i++){ all[i].style.animationPlayState = s; }
  }
  if(reduce) return;

  document.addEventListener("visibilitychange", function(){
    setState(document.hidden ? "paused" : "running");
  });
})();
</script>
</body>
</html>
