<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Mechanical Gear Schematic — Blueprint Technical. A self-contained, zero-dependency animated web component.">
<title>Mechanical Gear Schematic</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:#002147}
body{
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 19px,rgba(126,200,227,.05) 19px,rgba(126,200,227,.05) 20px),
    repeating-linear-gradient(90deg,transparent,transparent 19px,rgba(126,200,227,.05) 19px,rgba(126,200,227,.05) 20px);
}
#gs-root{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
#gs-svg{width:88%;height:88%}
.gs-stroke{stroke:#7ec8e3;stroke-width:1.2;fill:none}
.gs-thin{stroke:#7ec8e3;stroke-width:.6;fill:none;opacity:.55}
.gs-dim{stroke:#a8d8ea;stroke-width:.5;fill:none;opacity:.45}
.gs-txt{fill:#a8d8ea;font:8px monospace;opacity:.8}
.gs-title{fill:#7ec8e3;font:bold 7.5px monospace}

/* gear rotations — strong and obvious */
#gs-gear-a{transform-origin:90px 120px;animation:gs-cw 4s linear infinite}
#gs-gear-b{transform-origin:185px 120px;animation:gs-ccw 2s linear infinite}
#gs-gear-c{transform-origin:137px 185px;animation:gs-cw 2.67s linear infinite}
@keyframes gs-cw{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes gs-ccw{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}

/* scanning measurement line sweeps left→right continuously */
#gs-scanline{animation:gs-scanh 2.8s linear infinite}
@keyframes gs-scanh{
  0%{transform:translateX(-110px);opacity:0}
  10%{opacity:.9}
  90%{opacity:.7}
  100%{transform:translateX(110px);opacity:0}
}

/* dimension line pulse */
.gs-dimp{animation:gs-dimp 1.6s ease-in-out infinite}
@keyframes gs-dimp{0%,100%{opacity:.45}50%{opacity:1;stroke-width:1.2}}

#gs-cap{position:fixed;left:8px;bottom:7px;font:11px/1 monospace;color:#7ec8e3;opacity:.45;pointer-events:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/blueprint/02-gear-schematic.html",
 "title": "Mechanical Gear Schematic",
 "description": "Three interlocking gears rotate at matched ratios on a blueprint grid with scanning dimension lines and engineering annotation blocks.",
 "useWhen": "Technical/engineering-themed hero sections, mechanical product showcases, retro industrial dashboards.",
 "avoidWhen": "Contexts requiring high legibility text overlays — the rotating SVG elements compete with static content. Avoid on low-motion preference UIs without fallback content.",
 "agentPrompt": "Change the blueprint color from cyan-blue (#7ec8e3) to amber (#f59e0b), slow gear A rotation to 8s, and update the title block text to 'TURBINE ASSEMBLY · DWG-007'.",
 "editableAreas": [
  "stroke color (--gs-stroke: #7ec8e3)",
  "gear rotation speeds (4s / 2s / 2.67s in CSS)",
  "scanline sweep duration (gs-scanh 2.8s)",
  "title block text (GEAR ASSEMBLY, DWG-002, REV B)",
  "background grid color (rgba(126,200,227,.05))"
 ],
 "preserveElements": [
  "transform-origin on each gear group (must match cx/cy of gear center)",
  "prefers-reduced-motion guard in IIFE",
  "visibilitychange pause handler",
  "IIFE wrapper"
 ],
 "knownLimitations": [
  "Gear teeth are decorative lines at fixed angles — they do not mesh geometrically with neighboring gears",
  "Scanline sweeps only horizontally across gear A; does not track gear positions",
  "No touch or pointer interaction"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "blueprint",
  "gear",
  "schematic",
  "technical-drawing",
  "svg",
  "mechanical",
  "engineering"
 ]
}
</script>
</head>

    <line x1="151" y1="171" x2="155" y2="167" class="gs-stroke"/>

</div>
<div id="gs-cap">GEAR ASSEMBLY · DWG-002</div>
<script>(()=>{
  const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
  if(reduce){
    ['gs-gear-a','gs-gear-b','gs-gear-c'].forEach(id=>{
      const el = document.getElementById(id);
      if(el) el.style.animation='none';
    });
    const sc = document.getElementById('gs-scanline');
    if(sc) sc.style.animation='none';
    return;
  }

  document.addEventListener('visibilitychange',()=>{
    const s=document.hidden?'paused':'running';
    document.querySelectorAll('*').forEach(el=>{if(el.style)el.style.animationPlayState=s;});
  });
})();</script>
</body>
</html>
