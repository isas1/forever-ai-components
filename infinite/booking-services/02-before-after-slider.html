<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Before/after treatment comparison: an abstract skin-tone gradient portrait pair divided by a slider that sweeps back and forth on its own, with a soft caption crossfading between 'Before' and 'After — 6 weeks'.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Before / After Slider</title>
<style>
:root{
  --pro-bg:#0d1117;
  --pro-surface:#161b22;
  --pro-border:rgba(255,255,255,.08);
  --pro-text:#e6edf3;
  --pro-muted:#8b949e;
  --pro-accent:#58c4a8;
  --pro-warn:#e3b341;
  --pro-radius:16px;
  --pro-font:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--pro-bg)}
.bas-stage{position:fixed;inset:0;display:flex;flex-direction:column;gap:2.2vmin;
  padding:4.6vmin;font-family:var(--pro-font);color:var(--pro-text)}
.bas-head{display:flex;align-items:baseline;justify-content:space-between;gap:1.4vmin;user-select:none}
.bas-title{margin:0;font-size:clamp(11px,2.5vmin,15px);font-weight:600}
.bas-sub{font-size:clamp(8px,1.8vmin,11px);color:var(--pro-muted);font-weight:500}
.bas-frame{flex:1;min-height:0;position:relative;border-radius:var(--pro-radius);
  overflow:hidden;background:var(--pro-surface);border:1px solid var(--pro-border)}
.bas-panel{position:absolute;inset:0;background-size:cover}
.bas-panel.before{background-image:
    radial-gradient(34% 42% at 24% 26%,color-mix(in srgb,var(--pro-warn) 48%,var(--pro-surface)) 0%,transparent 72%),
    radial-gradient(28% 36% at 72% 60%,color-mix(in srgb,var(--pro-warn) 36%,var(--pro-surface)) 0%,transparent 74%),
    radial-gradient(44% 56% at 48% 88%,color-mix(in srgb,var(--pro-warn) 24%,var(--pro-surface)) 0%,transparent 76%),
    linear-gradient(160deg,var(--pro-surface),color-mix(in srgb,var(--pro-warn) 14%,var(--pro-surface)))}
.bas-panel.after{background-image:
    radial-gradient(120% 140% at 30% 20%,color-mix(in srgb,var(--pro-accent) 40%,var(--pro-surface)),var(--pro-surface) 70%),
    linear-gradient(160deg,transparent,color-mix(in srgb,var(--pro-accent) 12%,transparent))}
.bas-panel .bas-tag{position:absolute;top:1.6vmin;font-size:clamp(7px,1.5vmin,9px);
  font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.6vmin 1.4vmin;
  border-radius:999px;background:color-mix(in srgb,var(--pro-bg) 55%,transparent);color:var(--pro-muted)}
.bas-panel.before .bas-tag{left:1.6vmin}
.bas-panel.after .bas-tag{right:1.6vmin;color:var(--pro-accent)}
.bas-metric{position:absolute;bottom:1.6vmin;font-size:clamp(7px,1.5vmin,9px);font-weight:600;
  padding:.6vmin 1.4vmin;border-radius:999px;background:color-mix(in srgb,var(--pro-bg) 55%,transparent)}
.bas-panel.before .bas-metric{left:1.6vmin;color:var(--pro-warn)}
.bas-panel.after .bas-metric{right:1.6vmin;color:var(--pro-accent)}
.bas-clip{position:absolute;inset:0;overflow:hidden;width:var(--bas-w,50%)}
.bas-clip .bas-panel{width:calc(1 / var(--bas-r,.5) * 100%);max-width:none}
.bas-handle{position:absolute;top:0;bottom:0;left:var(--bas-w,50%);width:2px;
  background:var(--pro-text);opacity:.85;transform:translateX(-1px)}
.bas-knob{position:absolute;top:50%;left:0;width:4.2vmin;min-width:26px;aspect-ratio:1;
  border-radius:50%;background:var(--pro-text);transform:translate(-50%,-50%);
  display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.35)}
.bas-knob svg{width:52%;height:52%;color:var(--pro-bg)}
.bas-foot{display:flex;align-items:center;justify-content:space-between;gap:2vmin}
.bas-label{font-size:clamp(9px,2vmin,12px);font-weight:600;color:var(--pro-muted);
  transition:color .8s ease}
.bas-label.now{color:var(--pro-text)}
.cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
  color:var(--pro-muted);opacity:.5;letter-spacing:.08em;text-transform:uppercase;
  user-select:none;pointer-events:none}
@media (prefers-reduced-motion:reduce){ .bas-handle,.bas-knob,.bas-clip{transition:none} }
</style>
</head>
<body>
  <div class="bas-stage" id="bas-stage" role="img"
       aria-label="Before and after treatment comparison. A vertical divider sweeps slowly back and forth across the frame, revealing a blotchy warm-toned before texture with a redness score of 6.4 versus a smooth cool accent-toned after texture with a redness score of 2.1, labelled Before and After six weeks.">
    <div class="bas-head">
      <h1 class="bas-title">Progress comparison</h1>
      <span class="bas-sub">Client: R. Okafor</span>
    </div>
    <div class="bas-frame" aria-hidden="true">
      <div class="bas-panel after"><span class="bas-tag">After · 6 wks</span><span class="bas-metric">Redness score 2.1</span></div>
      <div class="bas-clip" id="bas-clip">
        <div class="bas-panel before"><span class="bas-tag">Before</span><span class="bas-metric">Redness score 6.4</span></div>
      </div>
      <div class="bas-handle" id="bas-handle"><div class="bas-knob"><svg viewBox="0 0 24 24" fill="none"><path d="M8 6l-5 6 5 6M16 6l5 6-5 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>
    </div>
    <div class="bas-foot" aria-hidden="true">
      <span class="bas-label" id="bas-l1">Before</span>
      <span class="bas-label" id="bas-l2">After — 6 weeks</span>
    </div>
  </div>
  <div class="cap" aria-hidden="true">Before / After Slider</div>
  <script>(function(){"use strict";
    var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
    var stage=document.getElementById('bas-stage'),
        clip=document.getElementById('bas-clip'),
        handle=document.getElementById('bas-handle'),
        l1=document.getElementById('bas-l1'), l2=document.getElementById('bas-l2');
    if(!stage||!clip)return;

    function setPos(pct){
      clip.style.setProperty('--bas-w',pct+'%');
      clip.style.setProperty('--bas-r',(pct/100).toFixed(4));
      handle.style.left=pct+'%';
      l1.classList.toggle('now',pct>55);
      l2.classList.toggle('now',pct<45);
    }

    if(reduce){ setPos(50); return; }

    var running=true;
    document.addEventListener('visibilitychange',function(){ running=!document.hidden; });

    var t0=performance.now();
    function frame(ts){
      if(running){
        var sec=(ts-t0)/1000;
        // slow ease sweep 18%..82%, ~7s each way
        var phase=(Math.sin(sec*(Math.PI/7)-Math.PI/2)+1)/2;
        setPos((18+phase*64).toFixed(2));
      }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  })();</script>
