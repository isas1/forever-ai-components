<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<meta name="description" content="Stamp Button — Neo-Brutalism. A self-contained, zero-dependency animated web component."><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stamp Button</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#fffbe6;display:flex;align-items:center;justify-content:center}
.bru-cap{position:fixed;left:8px;bottom:7px;font:600 10px ui-monospace,monospace;color:#000;opacity:.35;letter-spacing:.5px;pointer-events:none;z-index:99}
.bru-stage{display:flex;align-items:center;justify-content:center;width:100%;height:100%}
.bru-btn{
  display:inline-block;
  padding:22px 48px;
  background:#ffe640;
  border:3px solid #000;
  box-shadow:6px 6px 0 #ff2d00;
  font:900 2.2rem/1 "Arial Black","Arial",Impact,system-ui,sans-serif;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:#000;
  cursor:default;
  user-select:none;
  transform:translate(0,0);
  transition:none;
}
@keyframes bru-stamp{
  0%{transform:translate(0,0);box-shadow:6px 6px 0 #ff2d00}
  30%{transform:translate(6px,6px);box-shadow:0 0 0 #ff2d00}
  60%{transform:translate(6px,6px);box-shadow:0 0 0 #ff2d00}
  90%{transform:translate(0,0);box-shadow:6px 6px 0 #ff2d00}
  100%{transform:translate(0,0);box-shadow:6px 6px 0 #ff2d00}
}
.bru-btn.bru-animate{
  animation:bru-stamp 2.5s infinite;
}
.bru-btn.bru-reduced{
  animation:none;
}
</style></head><body>
<div class="bru-stage">
  <div class="bru-btn" id="bruBtn">SUBMIT</div>
</div>
<div class="bru-cap">STAMP BUTTON</div>
<script>(()=>{
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const btn=document.getElementById('bruBtn');
  function stop(){btn.classList.remove('bru-animate');}
  function play(){btn.classList.add('bru-animate');}
  document.addEventListener('visibilitychange',()=>document.hidden?stop():play());
  if(reduce){btn.classList.add('bru-reduced');}else{play();}
})();</script>
</body></html>
