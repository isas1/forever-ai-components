<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<meta name="description" content="Stamp Button — Neo-Brutalism. A self-contained, zero-dependency animated web component."><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stamp Button</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#fffbe6;display:flex;align-items:center;justify-content:center}
.bru-cap{position:fixed;left:8px;bottom:7px;font:600 10px ui-monospace,monospace;color:#000;opacity:.35;letter-spacing:.5px;pointer-events:none;z-index:99}
.bru-stage{display:flex;align-items:center;justify-content:center;width:100%;height:100%}
.bru-btn{
  display:inline-block;
  padding:22px 48px;
  background:#ffe640;
  border:3px solid #000;
  box-shadow:6px 6px 0 #ff2d00;
  font:900 2.2rem/1 "Arial Black","Arial",Impact,system-ui,sans-serif;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:#000;
  cursor:default;
  user-select:none;
  transform:translate(0,0);
  transition:none;
}
@keyframes bru-stamp{
  0%{transform:translate(0,0);box-shadow:6px 6px 0 #ff2d00}
  30%{transform:translate(6px,6px);box-shadow:0 0 0 #ff2d00}
  60%{transform:translate(6px,6px);box-shadow:0 0 0 #ff2d00}
  90%{transform:translate(0,0);box-shadow:6px 6px 0 #ff2d00}
  100%{transform:translate(0,0);box-shadow:6px 6px 0 #ff2d00}
}
.bru-btn.bru-animate{
  animation:bru-stamp 2.5s infinite;
}
.bru-btn.bru-reduced{
  animation:none;
}
</style><script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/brutalism/01-stamp-button.html",
 "title": "Stamp Button",
 "description": "A neo-brutalist yellow button auto-stamps with a chunky red offset shadow — the box shifts down-right to simulate a physical press on a 2.5s loop.",
 "useWhen": "CTA or submit button demos, neo-brutalist UI kits, landing pages needing bold tactile button feel.",
 "avoidWhen": "Production forms — the stamp loop auto-cycles; remove animation and wire a real click handler before shipping.",
 "agentPrompt": "Change the button label to 'BUY NOW', swap the shadow color to #00c8ff, and slow the stamp cycle to 4s by editing the animation duration in .bru-btn.bru-animate.",
 "editableAreas": [
  "button label (text content of #bruBtn)",
  "background color (#ffe640)",
  "shadow color (#ff2d00)",
  "animation duration (2.5s)",
  "padding and font size (22px 48px / 2.2rem)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (.bru-reduced class)",
  "visibilitychange pause/play"
 ],
 "knownLimitations": [
  "Auto-cycles by default — must remove loop and add click handler for production use",
  "cursor:default prevents pointer affordance; change to cursor:pointer for interactive version"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "brutalism",
  "button",
  "stamp",
  "press",
  "ui-control",
  "typography",
  "loop"
 ]
}
</script>
</head><body>
<div class="bru-stage">
  <div class="bru-btn" id="bruBtn">SUBMIT</div>
</div>
<div class="bru-cap">STAMP BUTTON</div>
<script>(()=>{
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const btn=document.getElementById('bruBtn');
  function stop(){btn.classList.remove('bru-animate');}
  function play(){btn.classList.add('bru-animate');}
  document.addEventListener('visibilitychange',()=>document.hidden?stop():play());
  if(reduce){btn.classList.add('bru-reduced');}else{play();}
})();</script>
</body></html>
