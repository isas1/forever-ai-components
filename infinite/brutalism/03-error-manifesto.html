<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<meta name="description" content="Error Manifesto — Neo-Brutalism. A self-contained, zero-dependency animated web component."><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Error Manifesto</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#111;display:flex;align-items:center;justify-content:center}
.bru-cap{position:fixed;left:8px;bottom:7px;font:600 10px ui-monospace,monospace;color:#fff;opacity:.35;letter-spacing:.5px;pointer-events:none;z-index:99}
.bru-error{
  border:3px solid #fff;
  box-shadow:6px 6px 0 #ff2d00;
  padding:28px 32px 24px;
  max-width:88%;
  text-align:left;
  background:#111;
}
.bru-etype{
  font:900 .72rem/1 "Arial Black","Arial",Impact,system-ui,sans-serif;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:#ff2d00;
  margin-bottom:10px;
}
.bru-code{
  font:900 3.8rem/1 "Arial Black","Arial",Impact,system-ui,sans-serif;
  letter-spacing:-.01em;
  text-transform:uppercase;
  margin:0 0 8px;
}
.bru-divider{border:none;border-top:2px solid currentColor;margin:12px 0;}
.bru-desc{
  font:700 .95rem/1.35 system-ui,"Arial",sans-serif;
  letter-spacing:.03em;
  text-transform:uppercase;
  margin:0 0 6px;
}
.bru-meta{
  font:600 .72rem/1.5 ui-monospace,monospace;
  opacity:.6;
  text-transform:uppercase;
  letter-spacing:.08em;
}
@keyframes bru-cycle{
  0%,19%{color:#fff}
  20%,39%{color:#ff2d00}
  40%,59%{color:#ffe640}
  60%,79%{color:#fff}
  80%,100%{color:#ff2d00}
}
.bru-error.bru-animate .bru-code,
.bru-error.bru-animate .bru-desc,
.bru-error.bru-animate .bru-divider{
  animation:bru-cycle 3s steps(1,end) infinite;
}
.bru-error.bru-animate .bru-desc{animation-delay:.6s;}
.bru-error.bru-animate .bru-divider{animation-delay:.3s;}
.bru-error.bru-static .bru-code,
.bru-error.bru-static .bru-desc,
.bru-error.bru-static .bru-divider{color:#fff;}
</style></head><body>
<div class="bru-error" id="bruErr">
  <div class="bru-etype">System Error</div>
  <div class="bru-code">ERR 0x4F2</div>
  <hr class="bru-divider">
  <div class="bru-desc">FATAL: STRUCTURE CANNOT BE DECORATED</div>
  <div class="bru-meta">MODULE: DESIGN_SYSTEM &nbsp;|&nbsp; LINE 001<br>STACK: HONESTY &gt; ORNAMENT &gt; FAILURE</div>
</div>
<div class="bru-cap">ERROR MANIFESTO</div>
<script>(()=>{
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const el=document.getElementById('bruErr');
  function stop(){el.classList.remove('bru-animate');el.classList.add('bru-static');}
  function play(){el.classList.remove('bru-static');el.classList.add('bru-animate');}
  document.addEventListener('visibilitychange',()=>document.hidden?stop():play());
  if(reduce){el.classList.add('bru-static');}else{play();}
})();</script>
</body></html>
