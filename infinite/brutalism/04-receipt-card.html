<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<meta name="description" content="Receipt Card — Neo-Brutalism. A self-contained, zero-dependency animated web component."><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Receipt Card</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#111;display:flex;align-items:center;justify-content:center}
.bru-cap{position:fixed;left:8px;bottom:7px;font:600 10px ui-monospace,monospace;color:#b8ff57;opacity:.35;letter-spacing:.5px;pointer-events:none;z-index:99}
.bru-receipt{
  border:3px solid #b8ff57;
  box-shadow:5px 5px 0 #b8ff57;
  padding:18px 22px 16px;
  background:#111;
  min-width:220px;
  max-width:90%;
  color:#b8ff57;
  font:600 .82rem/1.6 ui-monospace,"Courier New",monospace;
}
.bru-rhead{
  font:900 1rem/1 "Arial Black","Arial",Impact,system-ui,sans-serif;
  letter-spacing:.14em;
  text-transform:uppercase;
  text-align:center;
  margin-bottom:6px;
}
.bru-rdash{border:none;border-top:1px dashed #b8ff57;margin:8px 0;}
.bru-rrow{display:flex;justify-content:space-between;opacity:0;}
.bru-rrow.bru-visible{opacity:1;}
.bru-rtotal{
  display:flex;justify-content:space-between;
  font:900 1.05rem/1.5 "Arial Black","Arial",Impact,system-ui,sans-serif;
  letter-spacing:.06em;
  text-transform:uppercase;
  border-top:2px solid #b8ff57;
  margin-top:4px;
  padding-top:4px;
  opacity:0;
}
.bru-rtotal.bru-visible{opacity:1;}
@keyframes bru-fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.bru-rrow.bru-anim{animation:bru-fadein .28s ease-out forwards;}
.bru-rtotal.bru-anim{animation:bru-fadein .32s ease-out forwards;}
</style></head><body>
<div class="bru-receipt" id="bruReceipt">
  <div class="bru-rhead">ORDER #4291</div>
  <hr class="bru-rdash">
  <div class="bru-rrow" id="bruR1"><span>GRID PAPER</span><span>$4.00</span></div>
  <div class="bru-rrow" id="bruR2"><span>BLACK INK ×3</span><span>$9.00</span></div>
  <div class="bru-rrow" id="bruR3"><span>RULER 30CM</span><span>$2.50</span></div>
  <div class="bru-rrow" id="bruR4"><span>MANIFESTO</span><span>FREE</span></div>
  <hr class="bru-rdash">
  <div class="bru-rtotal" id="bruTotal"><span>TOTAL</span><span id="bruAmt">$00.00</span></div>
</div>
<div class="bru-cap">RECEIPT CARD</div>
<script>(()=>{
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const rows=[
    {id:'bruR1',delay:0,val:4.00},
    {id:'bruR2',delay:420,val:9.00},
    {id:'bruR3',delay:840,val:2.50},
    {id:'bruR4',delay:1260,val:0},
  ];
  const totalEl=document.getElementById('bruTotal');
  const amtEl=document.getElementById('bruAmt');
  const totals=[4.00,13.00,15.50,15.50];
  let timers=[];

  function reset(){
    rows.forEach(r=>{
      const el=document.getElementById(r.id);
      el.classList.remove('bru-visible','bru-anim');
    });
    totalEl.classList.remove('bru-visible','bru-anim');
    amtEl.textContent='$00.00';
  }

  function run(){
    reset();
    rows.forEach((r,i)=>{
      timers.push(setTimeout(()=>{
        const el=document.getElementById(r.id);
        if(reduce){el.classList.add('bru-visible');}
        else{el.classList.add('bru-visible','bru-anim');}
        amtEl.textContent='$'+totals[i].toFixed(2);
      },r.delay+300));
    });
    timers.push(setTimeout(()=>{
      if(reduce){totalEl.classList.add('bru-visible');}
      else{totalEl.classList.add('bru-visible','bru-anim');}
      amtEl.textContent='$15.50';
    },1260+420+300));
    timers.push(setTimeout(()=>run(),1260+420+300+2200));
  }

  function stop(){timers.forEach(clearTimeout);timers=[];}
  function play(){stop();run();}

  document.addEventListener('visibilitychange',()=>document.hidden?stop():play());
  if(reduce){
    rows.forEach(r=>document.getElementById(r.id).classList.add('bru-visible'));
    totalEl.classList.add('bru-visible');
    amtEl.textContent='$15.50';
  }else{play();}
})();</script>
</body></html>
