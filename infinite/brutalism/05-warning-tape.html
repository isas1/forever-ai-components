<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<meta name="description" content="Warning Tape — Neo-Brutalism. A self-contained, zero-dependency animated web component."><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Warning Tape</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#111;display:flex;align-items:center;justify-content:center;flex-direction:column}
.bru-cap{position:fixed;left:8px;bottom:7px;font:600 10px ui-monospace,monospace;color:#ffe640;opacity:.35;letter-spacing:.5px;pointer-events:none;z-index:99}
.bru-scene{width:100%;height:100%;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0}
@keyframes bru-stripe-scroll{
  from{background-position:0 0}
  to{background-position:80px 0}
}
.bru-stripe{
  width:100%;
  height:72px;
  background:repeating-linear-gradient(
    -45deg,
    #ffe640 0px,
    #ffe640 20px,
    #111 20px,
    #111 40px
  );
  background-size:80px 80px;
  border-top:3px solid #000;
  border-bottom:3px solid #000;
  box-shadow:0 4px 0 #ffe640,0 -4px 0 #ffe640;
}
.bru-stripe.bru-animate{
  animation:bru-stripe-scroll 1.2s linear infinite;
}
.bru-label{
  position:relative;
  z-index:2;
  text-align:center;
  padding:0 12px;
}
.bru-label-inner{
  display:inline-block;
  background:#ffe640;
  border:3px solid #000;
  box-shadow:5px 5px 0 #000;
  padding:14px 28px 12px;
}
.bru-title{
  font:900 1.3rem/1 "Arial Black","Arial",Impact,system-ui,sans-serif;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:#000;
  display:block;
}
.bru-sub{
  font:700 .65rem/1.4 system-ui,"Arial",sans-serif;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:#000;
  display:block;
  margin-top:5px;
}
@keyframes bru-pulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.7;transform:scale(.97)}
}
.bru-label-inner.bru-animate{
  animation:bru-pulse 1.4s ease-in-out infinite;
}
</style><script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/brutalism/05-warning-tape.html",
 "title": "Warning Tape",
 "description": "Two scrolling yellow-black hazard stripe bands frame a bold \"UNDER CONSTRUCTION\" label that gently pulses. Pure CSS, zero JS logic.",
 "useWhen": "Maintenance pages, coming-soon placeholders, neo-brutalist hero sections needing high-contrast industrial energy.",
 "avoidWhen": "Polished, minimal, or light-background UIs — background is hardcoded dark (#111) and aesthetic is intentionally abrasive.",
 "agentPrompt": "Change the label text to \"SITE OFFLINE\", set stripe color to #ff3b3b (red), and slow the scroll animation to 2.4s.",
 "editableAreas": [
  "stripe scroll speed (1.2s in bru-stripe-scroll animation)",
  "stripe color (#ffe640 in repeating-linear-gradient)",
  "label title text (UNDER CONSTRUCTION)",
  "label subtitle text (DO NOT CROSS THIS LINE)",
  "stripe height (72px)",
  "pulse animation duration (1.4s)"
 ],
 "preserveElements": [
  "prefers-reduced-motion guard (reduce check)",
  "visibilitychange pause/play handlers",
  "IIFE wrapper",
  "bru-animate class toggle pattern"
 ],
 "knownLimitations": [
  "Background color hardcoded #111 — must edit CSS to change dark surround",
  "Stripe scroll direction is fixed left-to-right; reversing requires negating background-position end value"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "neo-brutalism",
  "warning",
  "stripes",
  "construction",
  "typography",
  "loop",
  "ambient"
 ]
}
</script>
</head><body>
<div class="bru-scene">
  <div class="bru-stripe" id="bruStripe1"></div>
  <div class="bru-label">
    <div class="bru-label-inner" id="bruLabel">
      <span class="bru-title">UNDER CONSTRUCTION</span>
      <span class="bru-sub">DO NOT CROSS THIS LINE</span>
    </div>
  </div>
  <div class="bru-stripe" id="bruStripe2"></div>
</div>
<div class="bru-cap">WARNING TAPE</div>
<script>(()=>{
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const s1=document.getElementById('bruStripe1');
  const s2=document.getElementById('bruStripe2');
  const lbl=document.getElementById('bruLabel');
  function stop(){
    s1.classList.remove('bru-animate');
    s2.classList.remove('bru-animate');
    lbl.classList.remove('bru-animate');
  }
  function play(){
    s1.classList.add('bru-animate');
    s2.classList.add('bru-animate');
    lbl.classList.add('bru-animate');
  }
  document.addEventListener('visibilitychange',()=>document.hidden?stop():play());
  if(reduce){/* static — stripes visible, no motion */}else{play();}
})();</script>
</body></html>
