<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Dark pill button that magnetically drifts toward the cursor with a soft idle orbital float and iris-to-cyan glow on hover.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Magnetic Button</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-surface:#1c2030; --text-0:#f4f6fb;
    --border-mid:rgba(255,255,255,0.12); --border-glow:rgba(124,92,255,0.45);
    --grad-iris-cyan:linear-gradient(120deg,#7c5cff,#22d3ee);
    --r-pill:999px;
    --glow-iris:0 0 0 1px var(--border-glow),0 8px 40px -8px rgba(124,92,255,0.45);
    --ease-out-soft:cubic-bezier(0.22,1,0.36,1);
    --font-display:"Space Grotesk",system-ui,sans-serif;
    --dur-fast:160ms; --dur-base:280ms;
  }
  html,body{margin:0;height:100%;overflow:hidden}
  body{background:#08090d;display:grid;place-items:center;
    background-image:radial-gradient(60vw 40vw at 20% -10%,rgba(124,92,255,0.16),transparent 60%),radial-gradient(50vw 40vw at 90% 0%,rgba(34,211,238,0.14),transparent 55%);}
  #stage{position:fixed;inset:0;display:grid;place-items:center}

  .c01-mag{
    position:relative;border:0;cursor:pointer;padding:18px 34px;
    font-family:var(--font-display);font-size:clamp(15px,4.5vw,18px);font-weight:600;letter-spacing:-0.01em;
    color:var(--text-0);background:var(--bg-surface);border:1px solid var(--border-mid);border-radius:var(--r-pill);
    transition:transform var(--dur-base) var(--ease-out-soft),border-color var(--dur-fast) var(--ease-out-soft),box-shadow var(--dur-base) var(--ease-out-soft);
    will-change:transform;
  }
  .c01-mag::before{content:"";position:absolute;inset:0;border-radius:inherit;background:var(--grad-iris-cyan);opacity:0;transition:opacity var(--dur-base) var(--ease-out-soft);z-index:-1;}
  .c01-mag:hover{border-color:var(--border-glow);box-shadow:var(--glow-iris);}
  .c01-mag__label{display:inline-block;transition:transform var(--dur-base) var(--ease-out-soft);will-change:transform;}

  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase;font-family:var(--font-display)}
  @media (prefers-reduced-motion:reduce){.c01-mag,.c01-mag__label{transition-duration:.001ms}}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/buttons/01-magnetic-button.html",
 "title": "Magnetic Button",
 "description": "Dark pill button drifts in an idle orbital float; cursor proximity pulls it magnetically with a label inner-parallax and iris-to-cyan glow on hover.",
 "useWhen": "CTA buttons on dark hero sections or landing pages where tactile interactivity signals quality.",
 "avoidWhen": "Dense form layouts or light backgrounds — glow and drift assume a dark surface and open space around the button.",
 "agentPrompt": "Change the idle drift amplitude from 14/9 to 6/4 for a subtler float, and set accent color to #ff6b6b by replacing #7c5cff throughout.",
 "editableAreas": [
  "magnetic pull strength (strength = 0.4)",
  "idle orbit amplitude (cos/sin multipliers 14, 9, 5, 3)",
  "orbit speed (e*0.9, e*0.7, e*0.37, e*1.3)",
  "gradient accent colors (--grad-iris-cyan)",
  "button label text ('Hover me')"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (reduce check before apply)",
  "visibilitychange stop/start loop",
  "label inner-parallax (separate transform on .c01-mag__label)"
 ],
 "knownLimitations": [
  "CSS transition on transform fights the rAF loop when exiting hover — works fine visually but two systems control transform simultaneously",
  "Magnetic effect applies only within the button bounding box, not a wider attraction radius"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "button",
  "magnetic",
  "hover",
  "glow",
  "orbital",
  "ui-control",
  "pointer"
 ]
}
</script>
</head>
<body>
<div id="stage">
  <button class="c01-mag" type="button"><span class="c01-mag__label">Hover me</span></button>
</div>
<div class="cap">Magnetic button</div>
<script>
(function(){
  "use strict";
  var reduce = matchMedia("(prefers-reduced-motion:reduce)").matches;
  var btn = document.querySelector(".c01-mag");
  var label = btn.querySelector(".c01-mag__label");
  var strength = 0.4, hovering = false;

  function apply(x,y){
    btn.style.transform = "translate("+x*strength+"px,"+y*strength+"px)";
    if(label) label.style.transform = "translate("+x*strength*0.4+"px,"+y*strength*0.4+"px)";
  }
  function reset(){ btn.style.transform=""; if(label) label.style.transform=""; }

  btn.addEventListener("pointerenter", function(){ hovering = true; });
  btn.addEventListener("pointermove", function(e){
    if(reduce) return;
    var r = btn.getBoundingClientRect();
    apply(e.clientX-(r.left+r.width/2), e.clientY-(r.top+r.height/2));
  });
  btn.addEventListener("pointerleave", function(){ hovering = false; reset(); });

  // autonomous idle: gentle orbital drift when not hovered
  var t0 = null, raf = null;
  function loop(t){
    if(t0===null) t0=t;
    var e=(t-t0)/1000;
    if(!hovering){
      var x = Math.cos(e*0.9)*14 + Math.cos(e*0.37)*5;
      var y = Math.sin(e*0.7)*9 + Math.sin(e*1.3)*3;
      apply(x,y);
    }
    raf = requestAnimationFrame(loop);
  }
  function start(){ if(reduce) return; if(!raf){ t0=null; raf=requestAnimationFrame(loop);} }
  function stop(){ if(raf){ cancelAnimationFrame(raf); raf=null; } reset(); }
  document.addEventListener("visibilitychange", function(){ document.hidden?stop():start(); });
  start();
})();
</script>
</body>
</html>
