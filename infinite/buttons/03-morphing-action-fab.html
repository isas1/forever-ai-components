<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Gradient floating action button whose plus rotates to an X while six icon buttons fan out in a radial spring menu.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Morphing Action FAB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-surface:#1c2030; --text-1:#c7ccdb;
    --accent-cyan:#22d3ee;
    --border-mid:rgba(255,255,255,0.12); --border-glow:rgba(124,92,255,0.45);
    --grad-iris-cyan:linear-gradient(120deg,#7c5cff,#22d3ee);
    --glow-cyan:0 0 32px -6px rgba(34,211,238,0.5);
    --ease-out-soft:cubic-bezier(0.22,1,0.36,1); --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
    --dur-fast:160ms; --dur-base:280ms;
    --font-display:"Space Grotesk",system-ui,sans-serif;
  }
  html,body{margin:0;height:100%;overflow:hidden}
  body{background:#08090d;display:grid;place-items:center;
    background-image:radial-gradient(60vw 50vw at 50% 0%,rgba(34,211,238,0.12),transparent 60%);}
  #stage{position:fixed;inset:0;display:grid;place-items:center}

  .c03-fab{position:relative;width:168px;height:168px;}
  .c03-fab__main{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:60px;height:60px;border:0;border-radius:50%;cursor:pointer;
    background:var(--grad-iris-cyan);box-shadow:var(--glow-cyan);z-index:3;
    transition:transform var(--dur-base) var(--ease-spring),box-shadow var(--dur-base) var(--ease-out-soft);}
  .c03-fab__main:hover{box-shadow:0 0 44px -4px rgba(34,211,238,0.7);}
  .c03-fab__plus{position:absolute;left:50%;top:50%;width:22px;height:22px;transform:translate(-50%,-50%);transition:transform var(--dur-base) var(--ease-spring);}
  .c03-fab__plus::before,.c03-fab__plus::after{content:"";position:absolute;background:#fff;border-radius:2px;}
  .c03-fab__plus::before{left:50%;top:0;width:2.5px;height:100%;transform:translateX(-50%);}
  .c03-fab__plus::after{top:50%;left:0;height:2.5px;width:100%;transform:translateY(-50%);}
  .c03-fab--open .c03-fab__plus{transform:translate(-50%,-50%) rotate(135deg);}

  .c03-fab__item{position:absolute;left:50%;top:50%;width:42px;height:42px;margin:-21px 0 0 -21px;
    border:1px solid var(--border-mid);border-radius:50%;background:var(--bg-surface);color:var(--text-1);cursor:pointer;
    display:flex;align-items:center;justify-content:center;opacity:0;transform:translate(0,0) scale(0.3);
    transition:transform var(--dur-base) var(--ease-spring),opacity var(--dur-fast) var(--ease-out-soft),border-color var(--dur-fast) var(--ease-out-soft),color var(--dur-fast) var(--ease-out-soft);z-index:2;}
  .c03-fab__item svg{width:18px;height:18px;}
  .c03-fab__item:hover{border-color:var(--border-glow);color:var(--accent-cyan);}
  .c03-fab--open .c03-fab__item{opacity:1;}
  .c03-fab--open .c03-fab__item:nth-child(2){transform:translate(0,-64px) scale(1);transition-delay:0ms;}
  .c03-fab--open .c03-fab__item:nth-child(3){transform:translate(55px,-32px) scale(1);transition-delay:50ms;}
  .c03-fab--open .c03-fab__item:nth-child(4){transform:translate(55px,32px) scale(1);transition-delay:100ms;}
  .c03-fab--open .c03-fab__item:nth-child(5){transform:translate(0,64px) scale(1);transition-delay:150ms;}
  .c03-fab--open .c03-fab__item:nth-child(6){transform:translate(-55px,32px) scale(1);transition-delay:200ms;}
  .c03-fab--open .c03-fab__item:nth-child(7){transform:translate(-55px,-32px) scale(1);transition-delay:250ms;}

  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase;font-family:var(--font-display)}
  @media (prefers-reduced-motion:reduce){.c03-fab__item,.c03-fab__plus{transition-duration:.001ms}}
</style>
</head>
<body>
<div id="stage">
  <div class="c03-fab">
    <button class="c03-fab__item" type="button" aria-label="Share" tabindex="-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg></button>
    <button class="c03-fab__item" type="button" aria-label="Star" tabindex="-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l2.6 5.3 5.9.9-4.3 4.1 1 5.8L12 16.9 6.8 19.6l1-5.8L3.5 9.7l5.9-.9z"/></svg></button>
    <button class="c03-fab__item" type="button" aria-label="Edit" tabindex="-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20h4L18.5 9.5a2 2 0 0 0-2.8-2.8L5 17.5z"/></svg></button>
    <button class="c03-fab__item" type="button" aria-label="Save" tabindex="-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3h11l3 3v15H5z"/><path d="M8 3v5h7M8 21v-6h8v6"/></svg></button>
    <button class="c03-fab__item" type="button" aria-label="Delete" tabindex="-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg></button>
    <button class="c03-fab__item" type="button" aria-label="Link" tabindex="-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 15l6-6M10 6l1-1a4 4 0 0 1 6 6l-1 1M14 18l-1 1a4 4 0 0 1-6-6l1-1"/></svg></button>
    <button class="c03-fab__main" type="button" aria-expanded="false" aria-label="Open actions"><span class="c03-fab__plus"></span></button>
  </div>
</div>
<div class="cap">Morphing action FAB</div>
<script>
(function(){
  "use strict";
  var reduce = matchMedia("(prefers-reduced-motion:reduce)").matches;
  var fab = document.querySelector(".c03-fab");
  var main = fab.querySelector(".c03-fab__main");
  var items = fab.querySelectorAll(".c03-fab__item");

  function setOpen(open){
    fab.classList.toggle("c03-fab--open", open);
    main.setAttribute("aria-expanded", String(open));
    items.forEach(function(it){ it.setAttribute("tabindex", open?"0":"-1"); });
  }
  main.addEventListener("click", function(e){ e.stopPropagation(); setOpen(!fab.classList.contains("c03-fab--open")); });
  document.addEventListener("click", function(e){ if(!fab.contains(e.target)) setOpen(false); });
  fab.addEventListener("keydown", function(e){ if(e.key==="Escape") setOpen(false); });

  // autonomous idle: open and close the radial menu on a loop
  var timer=null, open=false;
  function loop(){
    if(reduce) return;
    open=!open;
    setOpen(open);
    timer=setTimeout(loop, open?2600:1700);
  }
  function stop(){ clearTimeout(timer); }
  document.addEventListener("visibilitychange", function(){ document.hidden?stop():loop(); });
  setTimeout(loop, 900);
})();
</script>
</body>
</html>
