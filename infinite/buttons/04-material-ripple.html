<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Dark rounded button that spawns an expanding iris-cyan radial ink ripple from the tap point, looping from random spots at rest.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Material Ripple</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-surface:#1c2030; --text-0:#f4f6fb;
    --border-mid:rgba(255,255,255,0.12); --border-glow:rgba(124,92,255,0.45);
    --r-md:14px;
    --ease-out-soft:cubic-bezier(0.22,1,0.36,1);
    --dur-fast:160ms; --dur-slow:520ms;
    --font-display:"Space Grotesk",system-ui,sans-serif;
  }
  html,body{margin:0;height:100%;overflow:hidden}
  body{background:#08090d;display:grid;place-items:center;
    background-image:radial-gradient(60vw 40vw at 20% -10%,rgba(124,92,255,0.14),transparent 60%);}
  #stage{position:fixed;inset:0;display:grid;place-items:center}

  .c04-rip{position:relative;overflow:hidden;border:0;cursor:pointer;padding:17px 36px;
    font-family:var(--font-display);font-size:clamp(15px,4.5vw,18px);font-weight:600;color:var(--text-0);
    background:var(--bg-surface);border:1px solid var(--border-mid);border-radius:var(--r-md);
    transition:border-color var(--dur-fast) var(--ease-out-soft);-webkit-tap-highlight-color:transparent;}
  .c04-rip:hover{border-color:var(--border-glow);}
  .c04-rip__ink{position:absolute;border-radius:50%;
    background:radial-gradient(circle,rgba(124,92,255,0.55),rgba(34,211,238,0.15));
    transform:translate(-50%,-50%) scale(0);pointer-events:none;
    animation:c04-rip-spread var(--dur-slow) var(--ease-out-soft) forwards;}
  @keyframes c04-rip-spread{ to{ transform:translate(-50%,-50%) scale(1);opacity:0; } }

  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase;font-family:var(--font-display)}
  @media (prefers-reduced-motion:reduce){.c04-rip__ink{animation-duration:.001ms}}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/buttons/04-material-ripple.html",
 "title": "Material Ripple",
 "description": "Dark rounded button that spawns an expanding ink ripple from the tap point; idles by firing ripples from random positions every 1.5 s.",
 "useWhen": "CTA buttons, action triggers, any click surface needing tactile feedback with a material-design feel.",
 "avoidWhen": "Auto-cycling demo ripple must be removed before production use; not suitable where motion is distracting or backgrounds are light.",
 "agentPrompt": "Change the ripple color from purple/cyan to gold by editing the radial-gradient in .c04-rip__ink background to rgba(255,180,0,0.55), rgba(255,220,80,0.15), and slow the spread to 800ms via --dur-slow.",
 "editableAreas": [
  "ripple color (radial-gradient in .c04-rip__ink)",
  "ripple spread duration (--dur-slow: 520ms)",
  "ripple size multiplier (2.2 in JS)",
  "idle loop interval (1500ms in setTimeout)",
  "button padding and border-radius (--r-md)"
 ],
 "preserveElements": [
  "overflow:hidden on .c04-rip (clips ripple)",
  "IIFE wrapper",
  "reduced-motion guard (animation-duration:.001ms + early return in loop)",
  "visibilitychange pause"
 ],
 "knownLimitations": [
  "Auto-cycling idle loop must be removed or stopped before shipping in production",
  "Ripple color is hardcoded in CSS — not a CSS variable, requires two-place edit"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "button",
  "ripple",
  "material",
  "ink",
  "click",
  "microinteraction",
  "ui-control"
 ]
}
</script>
</head>
<body>
<div id="stage">
  <button class="c04-rip" type="button">Tap for ripple</button>
</div>
<div class="cap">Material ripple</div>
<script>
(function(){
  "use strict";
  var reduce = matchMedia("(prefers-reduced-motion:reduce)").matches;
  var btn = document.querySelector(".c04-rip");

  function ripple(localX, localY){
    var r = btn.getBoundingClientRect();
    var size = Math.max(r.width, r.height) * 2.2;
    var ink = document.createElement("span");
    ink.className = "c04-rip__ink";
    ink.style.width = ink.style.height = size + "px";
    ink.style.left = localX + "px";
    ink.style.top = localY + "px";
    btn.appendChild(ink);
    ink.addEventListener("animationend", function(){ ink.remove(); });
    if(reduce) setTimeout(function(){ ink.remove(); }, 30);
  }
  btn.addEventListener("pointerdown", function(e){
    var r = btn.getBoundingClientRect();
    ripple(e.clientX-r.left, e.clientY-r.top);
  });

  // autonomous idle: ripple from random points on a loop
  var timer=null;
  function loop(){
    if(reduce) return;
    var r = btn.getBoundingClientRect();
    ripple(r.width*(0.25+Math.random()*0.5), r.height*(0.3+Math.random()*0.4));
    timer=setTimeout(loop, 1500);
  }
  function stop(){ clearTimeout(timer); }
  document.addEventListener("visibilitychange", function(){ document.hidden?stop():loop(); });
  setTimeout(loop, 700);
})();
</script>
</body>
</html>
