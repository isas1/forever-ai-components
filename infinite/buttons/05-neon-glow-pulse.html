<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Cyan-outlined neon button on near-black that breathes a bright glow bloom in and out on a slow infinite pulse.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Glow Pulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --text-0:#f4f6fb; --accent-cyan:#22d3ee;
    --r-pill:999px;
    --ease-out-soft:cubic-bezier(0.22,1,0.36,1); --ease-in-out:cubic-bezier(0.65,0,0.35,1);
    --dur-fast:160ms; --dur-loop:2400ms;
    --font-display:"Space Grotesk",system-ui,sans-serif;
  }
  html,body{margin:0;height:100%;overflow:hidden}
  body{background:#070b0d;display:grid;place-items:center;
    background-image:radial-gradient(60vw 50vw at 50% 50%,rgba(34,211,238,0.10),transparent 60%);}
  #stage{position:fixed;inset:0;display:grid;place-items:center}

  .c05-neon{position:relative;border:1px solid var(--accent-cyan);cursor:pointer;padding:16px 34px;
    font-family:var(--font-display);font-size:clamp(15px,4.5vw,18px);font-weight:600;letter-spacing:0.02em;
    color:var(--accent-cyan);background:rgba(34,211,238,0.05);border-radius:var(--r-pill);
    /* static base glow (low state) — never repainted */
    box-shadow:0 0 16px -4px rgba(34,211,238,0.5),inset 0 0 12px -6px rgba(34,211,238,0.4);
    text-shadow:0 0 6px rgba(34,211,238,0.4);
    transition:color var(--dur-fast) var(--ease-out-soft),background var(--dur-fast) var(--ease-out-soft);}
  /* bright bloom lives on a sibling layer; we pulse only its opacity (cheap) */
  .c05-neon::before{content:"";position:absolute;inset:-1px;border-radius:inherit;pointer-events:none;
    box-shadow:0 0 42px -2px rgba(34,211,238,0.85),inset 0 0 22px -4px rgba(34,211,238,0.6);
    opacity:0;animation:c05-neon-bloom var(--dur-loop) var(--ease-in-out) infinite;will-change:opacity;}
  .c05-neon:hover{color:var(--text-0);background:rgba(34,211,238,0.14);}
  @keyframes c05-neon-bloom{
    0%,100%{opacity:0;}
    50%{opacity:1;}
  }
  .c05-neon.is-paused::before{animation-play-state:paused;}

  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase;font-family:var(--font-display)}
  @media (prefers-reduced-motion:reduce){
    .c05-neon::before{animation:none;opacity:0.6;}
  }
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/buttons/05-neon-glow-pulse.html",
 "title": "Neon Glow Pulse",
 "description": "Cyan pill button on near-black that breathes a bright neon bloom via opacity pulse on a pseudo-element; hover shifts background and text color.",
 "useWhen": "Dark-mode CTAs, sci-fi or cyberpunk UI, hero sections needing an ambient glowing button with no JS overhead.",
 "avoidWhen": "Light backgrounds (background is hardcoded near-black). Contexts where constant glow motion would compete with dense content.",
 "agentPrompt": "Change accent to hot pink by setting --accent-cyan to #f0abfc, update border and text-shadow color references to match, and slow the pulse to 3600ms by editing --dur-loop.",
 "editableAreas": [
  "accent color (--accent-cyan: #22d3ee)",
  "pulse duration (--dur-loop: 2400ms)",
  "bloom opacity peak (50%{opacity:1})",
  "button padding and font size",
  "border-radius (--r-pill)",
  "hover background intensity (rgba alpha 0.14)"
 ],
 "preserveElements": [
  "::before pseudo-element bloom layer (opacity-only animation for perf)",
  "is-paused class + visibilitychange listener",
  "prefers-reduced-motion guard (animation:none + static opacity:0.6)"
 ],
 "knownLimitations": [
  "Background color and radial gradient are hardcoded — must edit CSS to use on any other background",
  "Button has no aria-label; label text 'Activate' is visible but a real action should be wired to click"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "neon",
  "glow",
  "button",
  "pulse",
  "css-animation",
  "loop",
  "dark-ui"
 ]
}
</script>
</head>
<body>
<div id="stage">
  <button class="c05-neon" type="button">Activate</button>
</div>
<div class="cap">Neon glow pulse</div>
<script>
(function(){
  "use strict";
  // CSS-driven bloom loop runs autonomously. Pause on hidden tab to save cycles.
  var btn = document.querySelector(".c05-neon");
  document.addEventListener("visibilitychange", function(){
    btn.classList.toggle("is-paused", document.hidden);
  });
})();
</script>
</body>
</html>
