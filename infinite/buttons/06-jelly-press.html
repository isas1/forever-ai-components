<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Aurora-gradient button that squashes and stretches with elastic spring jelly bounce on press and idle.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jelly Press</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --grad-aurora:linear-gradient(135deg,#7c5cff 0%,#ff5ca8 55%,#22d3ee 100%);
    --r-md:14px;
    --ease-out-soft:cubic-bezier(0.22,1,0.36,1); --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
    --dur-fast:160ms;
    --font-display:"Space Grotesk",system-ui,sans-serif;
  }
  html,body{margin:0;height:100%;overflow:hidden}
  body{background:#0b0c12;display:grid;place-items:center;
    background-image:radial-gradient(60vw 40vw at 50% 0%,rgba(124,92,255,0.16),transparent 60%);}
  #stage{position:fixed;inset:0;display:grid;place-items:center}

  .c06-jel{border:0;cursor:pointer;padding:17px 36px;font-family:var(--font-display);
    font-size:clamp(15px,4.5vw,18px);font-weight:600;color:#0b0c12;background:var(--grad-aurora);
    border-radius:var(--r-md);box-shadow:0 10px 28px -10px rgba(124,92,255,0.6);
    transition:transform var(--dur-fast) var(--ease-out-soft);will-change:transform;}
  .c06-jel:hover{transform:scale(1.04);}
  .c06-jel.is-squish{animation:c06-jel-squish 0.5s var(--ease-spring);}
  @keyframes c06-jel-squish{
    0%{transform:scale(1.04,1.04);}
    30%{transform:scale(1.18,0.78);}
    55%{transform:scale(0.88,1.14);}
    75%{transform:scale(1.06,0.96);}
    100%{transform:scale(1,1);}
  }

  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase;font-family:var(--font-display)}
  @media (prefers-reduced-motion:reduce){.c06-jel.is-squish{animation:none}.c06-jel{transition-duration:.001ms}}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/buttons/06-jelly-press.html",
 "title": "Jelly Press",
 "description": "Aurora-gradient button squashes and stretches with a spring keyframe animation on click; auto-cycles idle squish every 2.1s to stay alive at rest.",
 "useWhen": "CTA buttons, interactive demos, any UI needing tactile press feedback with lively personality.",
 "avoidWhen": "Forms where animation distracts from input focus; remove the idle auto-cycle loop before shipping in production.",
 "agentPrompt": "Change the button label to 'Get Started', swap the gradient to linear-gradient(135deg,#00c6ff,#0072ff), and slow the squish duration to 0.7s.",
 "editableAreas": [
  "button label text ('Press me')",
  "aurora gradient (--grad-aurora)",
  "squish duration (0.5s)",
  "idle loop interval (2100ms)",
  "border-radius (--r-md: 14px)"
 ],
 "preserveElements": [
  "void btn.offsetWidth restart trick (forces animation restart)",
  "IIFE wrapper",
  "prefers-reduced-motion guard",
  "visibilitychange stop/start"
 ],
 "knownLimitations": [
  "Auto-cycles idle squish by default — remove loop() call before production use",
  "Gradient is CSS background so no direct text contrast check; dark text (#0b0c12) may fail on pale gradient ends"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "button",
  "jelly",
  "squish",
  "spring",
  "aurora",
  "gradient",
  "microinteraction"
 ]
}
</script>
</head>
<body>
<div id="stage">
  <button class="c06-jel" type="button">Press me</button>
</div>
<div class="cap">Jelly press</div>
<script>
(function(){
  "use strict";
  var reduce = matchMedia("(prefers-reduced-motion:reduce)").matches;
  var btn = document.querySelector(".c06-jel");

  function squish(){
    btn.classList.remove("is-squish");
    void btn.offsetWidth; // restart animation
    btn.classList.add("is-squish");
  }
  btn.addEventListener("click", squish);
  btn.addEventListener("animationend", function(){ btn.classList.remove("is-squish"); });

  // autonomous idle: squash-stretch on a loop so the tile is alive at rest
  var timer=null;
  function loop(){ if(reduce) return; timer=setTimeout(function(){ squish(); loop(); }, 2100); }
  function stop(){ clearTimeout(timer); }
  document.addEventListener("visibilitychange", function(){ document.hidden?stop():loop(); });
  setTimeout(loop, 800);
})();
</script>
</body>
</html>
