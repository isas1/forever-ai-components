<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Ghost button whose iris SVG outline self-draws stroke by stroke on hover and on a quiet looping cycle, brightening its label.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stroke-Draw Outline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --text-0:#f4f6fb; --text-2:#8a91a8; --accent-iris:#7c5cff;
    --ease-out-soft:cubic-bezier(0.22,1,0.36,1); --ease-in-out:cubic-bezier(0.65,0,0.35,1);
    --dur-base:280ms;
    --font-display:"Space Grotesk",system-ui,sans-serif;
  }
  html,body{margin:0;height:100%;overflow:hidden}
  body{background:#08090d;display:grid;place-items:center;
    background-image:radial-gradient(60vw 40vw at 20% -10%,rgba(124,92,255,0.16),transparent 60%);}
  #stage{position:fixed;inset:0;display:grid;place-items:center}

  .c07-draw{position:relative;border:0;background:none;cursor:pointer;padding:18px 38px;
    font-family:var(--font-display);font-size:clamp(15px,4.5vw,18px);font-weight:600;color:var(--text-2);
    transition:color var(--dur-base) var(--ease-out-soft);}
  .c07-draw:hover,.c07-draw.is-lit{color:var(--text-0);}
  .c07-draw__svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible;}
  .c07-draw__rect{fill:rgba(124,92,255,0.04);stroke:var(--accent-iris);stroke-width:1.5;
    stroke-dasharray:480;stroke-dashoffset:480;transition:stroke-dashoffset 0.9s var(--ease-in-out);}
  .c07-draw:hover .c07-draw__rect,
  .c07-draw:focus-visible .c07-draw__rect,
  .c07-draw.is-lit .c07-draw__rect{stroke-dashoffset:0;}

  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase;font-family:var(--font-display)}
  @media (prefers-reduced-motion:reduce){.c07-draw__rect{transition-duration:.001ms;stroke-dashoffset:0}}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/buttons/07-stroke-draw-outline.html",
 "title": "Stroke-Draw Outline",
 "description": "Ghost button whose rounded-rect SVG border self-draws via stroke-dashoffset on hover; an idle loop auto-cycles draw/erase every ~2s.",
 "useWhen": "CTAs on dark backgrounds, hero section buttons, any ghost-style button needing tactile hover feedback without heavy motion.",
 "avoidWhen": "Light backgrounds (bg hardcoded dark). Forms requiring instant-visible borders — the outline starts hidden by default.",
 "agentPrompt": "Change accent to teal (#00d4aa), slow the draw to 1.4s (transition-duration on .c07-draw__rect), and update idle hold time from 2200 to 3500ms.",
 "editableAreas": [
  "accent color (--accent-iris: #7c5cff)",
  "stroke draw duration (0.9s on .c07-draw__rect)",
  "idle hold time (lit?2200 timeout)",
  "idle erase pause (1300 timeout)",
  "stroke-dasharray total length (480)"
 ],
 "preserveElements": [
  "stroke-dasharray/stroke-dashoffset pattern (critical for draw effect)",
  "IIFE wrapper",
  "prefers-reduced-motion guard",
  "visibilitychange pause"
 ],
 "knownLimitations": [
  "stroke-dasharray=480 is hardcoded — must recalculate if button size changes significantly",
  "Auto-cycles by default; remove setTimeout loop before shipping in production",
  "Background hardcoded dark — not drop-in on light themes"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "button",
  "stroke",
  "svg",
  "outline",
  "ghost-button",
  "draw",
  "loop"
 ]
}
</script>
</head>
<body>
<div id="stage">
  <button class="c07-draw" type="button">
    <svg class="c07-draw__svg" viewBox="0 0 180 60" preserveAspectRatio="none" aria-hidden="true">
      <rect class="c07-draw__rect" x="1" y="1" width="178" height="58" rx="14"/>
    </svg>
    Trace outline
  </button>
</div>
<div class="cap">Stroke-draw outline</div>
<script>
(function(){
  "use strict";
  var reduce = matchMedia("(prefers-reduced-motion:reduce)").matches;
  var btn = document.querySelector(".c07-draw");

  // autonomous idle: draw the outline, hold, undraw, repeat
  var timer=null, lit=false;
  function loop(){
    if(reduce) return;
    lit=!lit;
    btn.classList.toggle("is-lit", lit);
    timer=setTimeout(loop, lit?2200:1300);
  }
  function stop(){ clearTimeout(timer); }
  document.addEventListener("visibilitychange", function(){ document.hidden?stop():loop(); });
  setTimeout(loop, 600);
})();
</script>
</body>
</html>
