<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Outlined button where an iris-to-cyan gradient sweeps across to fill it and flip the text dark, looping in and out.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sliding Fill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --text-0:#f4f6fb;
    --border-mid:rgba(255,255,255,0.12);
    --grad-iris-cyan:linear-gradient(120deg,#7c5cff,#22d3ee);
    --r-md:14px;
    --ease-out-soft:cubic-bezier(0.22,1,0.36,1); --ease-in-out:cubic-bezier(0.65,0,0.35,1);
    --dur-base:280ms; --dur-slow:520ms;
    --font-display:"Space Grotesk",system-ui,sans-serif;
  }
  html,body{margin:0;height:100%;overflow:hidden}
  body{background:#08090d;display:grid;place-items:center;
    background-image:radial-gradient(60vw 40vw at 80% 0%,rgba(34,211,238,0.14),transparent 60%);}
  #stage{position:fixed;inset:0;display:grid;place-items:center}

  .c08-fill{position:relative;overflow:hidden;border:1px solid var(--border-mid);cursor:pointer;padding:17px 36px;
    font-family:var(--font-display);font-size:clamp(15px,4.5vw,18px);font-weight:600;color:var(--text-0);
    background:transparent;border-radius:var(--r-md);
    transition:color var(--dur-base) var(--ease-out-soft),border-color var(--dur-base) var(--ease-out-soft);isolation:isolate;}
  .c08-fill::before{content:"";position:absolute;inset:0;background:var(--grad-iris-cyan);
    transform:translateX(-101%);transition:transform var(--dur-slow) var(--ease-in-out);z-index:-1;}
  .c08-fill:hover,.c08-fill.is-filled{color:#0b0c12;border-color:transparent;}
  .c08-fill:hover::before,.c08-fill.is-filled::before{transform:translateX(0);}

  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase;font-family:var(--font-display)}
  @media (prefers-reduced-motion:reduce){.c08-fill,.c08-fill::before{transition-duration:.001ms}}
</style>
<script type="application/json" id="forever-agent-meta">

</head>
<body>
<div id="stage">
  <button class="c08-fill" type="button">Slide fill</button>
</div>
<div class="cap">Sliding fill</div>
<script>
(function(){
  "use strict";
  var reduce = matchMedia("(prefers-reduced-motion:reduce)").matches;
  var btn = document.querySelector(".c08-fill");

  // autonomous idle: sweep the gradient fill in and out
  var timer=null, filled=false;
  function loop(){
    if(reduce) return;
    filled=!filled;
    btn.classList.toggle("is-filled", filled);
    timer=setTimeout(loop, filled?1900:1500);
  }
  function stop(){ clearTimeout(timer); }
  document.addEventListener("visibilitychange", function(){ document.hidden?stop():loop(); });
  setTimeout(loop, 700);
})();
</script>
</body>
</html>
