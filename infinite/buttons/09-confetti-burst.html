<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Magenta-outlined pill button on dark that fires a physics-driven burst of colorful confetti particles on click and idle.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Confetti Burst</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-surface:#1c2030; --text-0:#f4f6fb; --accent-magenta:#ff5ca8;
    --r-pill:999px;
    --ease-out-soft:cubic-bezier(0.22,1,0.36,1);
    --dur-fast:160ms;
    --font-display:"Space Grotesk",system-ui,sans-serif;
  }
  html,body{margin:0;height:100%;overflow:hidden}
  body{background:#0c0810;display:grid;place-items:center;
    background-image:radial-gradient(60vw 50vw at 50% 50%,rgba(255,92,168,0.12),transparent 60%);}
  #stage{position:fixed;inset:0;display:grid;place-items:center}

  .c09-burst{position:relative;border:0;cursor:pointer;padding:17px 36px;
    font-family:var(--font-display);font-size:clamp(15px,4.5vw,18px);font-weight:600;color:var(--text-0);
    background:var(--bg-surface);border:1px solid var(--accent-magenta);border-radius:var(--r-pill);
    transition:transform var(--dur-fast) var(--ease-out-soft),box-shadow var(--dur-fast) var(--ease-out-soft);}
  .c09-burst:hover{transform:translateY(-2px);box-shadow:0 0 28px -6px rgba(255,92,168,0.6);}
  .c09-burst:active{transform:translateY(0) scale(0.96);}
  .c09-particle{position:absolute;top:0;left:0;width:8px;height:8px;border-radius:2px;pointer-events:none;will-change:transform,opacity;}

  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase;font-family:var(--font-display)}
  @media (prefers-reduced-motion:reduce){.c09-burst{transition-duration:.001ms}}
</style>
</head>
<body>
<div id="stage">
  <button class="c09-burst" type="button">Celebrate</button>
</div>
<div class="cap">Confetti burst</div>
<script>
(function(){
  "use strict";
  var reduce = matchMedia("(prefers-reduced-motion:reduce)").matches;
  var colors = ["#7c5cff","#22d3ee","#ff5ca8","#f4f6fb"];
  var btn = document.querySelector(".c09-burst");

  function burst(){
    var count = reduce ? 6 : 26;
    var r = btn.getBoundingClientRect();
    var cx = r.width/2, cy = r.height/2;
    for(var i=0;i<count;i++){ spawn(cx, cy, colors[i%colors.length]); }
  }
  function spawn(cx, cy, color){
    var p = document.createElement("span");
    p.className = "c09-particle";
    p.style.background = color;
    p.style.left = cx + "px";
    p.style.top = cy + "px";
    if(Math.random()>0.5) p.style.borderRadius = "50%";
    btn.appendChild(p);

    var angle = Math.random()*Math.PI*2;
    var velocity = 40 + Math.random()*90;
    var vx = Math.cos(angle)*velocity;
    var vy = Math.sin(angle)*velocity - 50;
    var rot = (Math.random()*720 - 360);
    var dur = reduce ? 1 : 700 + Math.random()*500;
    var start = null;
    function frame(t){
      if(start===null) start = t;
      var prog = Math.min((t-start)/dur, 1);
      var x = vx*prog;
      var y = vy*prog + 220*prog*prog;
      p.style.transform = "translate("+x+"px,"+y+"px) rotate("+rot*prog+"deg)";
      p.style.opacity = String(1-prog);
      if(prog<1) requestAnimationFrame(frame); else p.remove();
    }
    requestAnimationFrame(frame);
  }
  btn.addEventListener("click", burst);

  // autonomous idle: celebrate on a loop
  var timer=null;
  function loop(){ if(reduce) return; timer=setTimeout(function(){ burst(); loop(); }, 2300); }
  function stop(){ clearTimeout(timer); }
  document.addEventListener("visibilitychange", function(){ document.hidden?stop():loop(); });
  setTimeout(loop, 600);
})();
</script>
</body>
</html>
