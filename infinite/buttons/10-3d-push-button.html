<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Iris-to-cyan gradient button with a layered 3D edge and shadow that depresses and springs back like a tactile key.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>3D Push Button</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --text-0:#f4f6fb;
    --grad-iris-cyan:linear-gradient(120deg,#7c5cff,#22d3ee);
    --r-md:14px;
    --ease-out-soft:cubic-bezier(0.22,1,0.36,1);
    --dur-fast:160ms;
    --font-display:"Space Grotesk",system-ui,sans-serif;
  }
  html,body{margin:0;height:100%;overflow:hidden}
  body{background:#08090d;display:grid;place-items:center;
    background-image:radial-gradient(60vw 40vw at 30% -10%,rgba(124,92,255,0.16),transparent 60%);}
  #stage{position:fixed;inset:0;display:grid;place-items:center}

  .c10-push{position:relative;border:0;background:none;cursor:pointer;padding:0;border-radius:var(--r-md);outline-offset:4px;}
  .c10-push__shadow{position:absolute;inset:0;border-radius:var(--r-md);background:rgba(0,0,0,0.55);
    transform:translateY(8px);filter:blur(1px);transition:transform var(--dur-fast) var(--ease-out-soft);}
  .c10-push__edge{position:absolute;inset:0;border-radius:var(--r-md);background:linear-gradient(180deg,#4a3aa0,#3a2c80);}
  .c10-push__face{position:relative;display:block;padding:16px 36px;border-radius:var(--r-md);
    font-family:var(--font-display);font-size:clamp(15px,4.5vw,18px);font-weight:600;color:var(--text-0);
    background:var(--grad-iris-cyan);transform:translateY(-7px);
    transition:transform var(--dur-fast) var(--ease-out-soft);will-change:transform;}
  .c10-push:hover .c10-push__face{transform:translateY(-9px);}
  .c10-push:hover .c10-push__shadow{transform:translateY(10px);}
  .c10-push:active .c10-push__face,
  .c10-push.is-pressed .c10-push__face{transform:translateY(-2px);}
  .c10-push:active .c10-push__shadow,
  .c10-push.is-pressed .c10-push__shadow{transform:translateY(2px);filter:blur(0.5px);}

  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase;font-family:var(--font-display)}
  @media (prefers-reduced-motion:reduce){.c10-push__face,.c10-push__shadow{transition-duration:.001ms}}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/buttons/10-3d-push-button.html",
 "title": "3D Push Button",
 "description": "Iris-to-cyan gradient button with a layered edge and drop shadow that depresses on press and springs back, mimicking a physical key. Auto-cycles as demo.",
 "useWhen": "CTAs, form submit buttons, or any action trigger that benefits from tactile physical feedback.",
 "avoidWhen": "Passive display contexts — remove the auto-cycle setTimeout loop before shipping in production.",
 "agentPrompt": "Change the button label to 'Subscribe', update the gradient to linear-gradient(120deg,#f97316,#ec4899), and increase the idle press interval from 1800ms to 3000ms.",
 "editableAreas": [
  "button label (Push down text)",
  "gradient colors (--grad-iris-cyan)",
  "press depth (translateY -7px face / 8px shadow)",
  "edge background color (#4a3aa0 / #3a2c80)",
  "auto-cycle interval (1800ms)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (transition-duration:.001ms)",
  "visibilitychange pause",
  "three-layer structure (shadow / edge / face)"
 ],
 "knownLimitations": [
  "Auto-cycles by default — remove setTimeout loop for production use",
  "Edge color is a static dark purple and must be updated manually if gradient changes"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "button",
  "3d",
  "press",
  "tactile",
  "microinteraction",
  "gradient",
  "ui-control"
 ]
}
</script>
</head>
<body>
<div id="stage">
  <button class="c10-push" type="button">
    <span class="c10-push__shadow"></span>
    <span class="c10-push__edge"></span>
    <span class="c10-push__face">Push down</span>
  </button>
</div>
<div class="cap">3D push button</div>
<script>
(function(){
  "use strict";
  var reduce = matchMedia("(prefers-reduced-motion:reduce)").matches;
  var btn = document.querySelector(".c10-push");

  // autonomous idle: depress and release the key on a loop
  var timer=null;
  function press(){
    btn.classList.add("is-pressed");
    timer=setTimeout(function(){
      btn.classList.remove("is-pressed");
      timer=setTimeout(press, 1800);
    }, 220);
  }
  function stop(){ clearTimeout(timer); btn.classList.remove("is-pressed"); }
  document.addEventListener("visibilitychange", function(){ document.hidden?stop():(reduce||press()); });
  if(!reduce) setTimeout(press, 900);
})();
</script>
</body>
</html>
