<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Frosted glass panel with backdrop blur floating over slowly drifting iris, cyan and magenta color blobs.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frosted Glass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --text-0:#f4f6fb; --text-1:#c7ccdb;
    --accent-iris:#7c5cff; --accent-cyan:#22d3ee; --accent-magenta:#ff5ca8;
    --r-md:14px; --r-lg:22px; --r-pill:999px; --space-1:4px; --space-6:24px;
    --shadow-lift:0 18px 50px -24px rgba(0,0,0,0.9);
    --font-display:"Space Grotesk",system-ui,sans-serif;
    --font-body:"Inter",system-ui,sans-serif;
    --ease-in-out:cubic-bezier(0.65,0,0.35,1);
    --ease-out-soft:cubic-bezier(0.22,1,0.36,1); --dur-base:280ms;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;}
  body{background:radial-gradient(80% 70% at 50% 35%,#12141d,#08090d);
    font-family:var(--font-body);}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .c02-glass{position:relative;width:50vmin;height:54vmin;max-width:252px;max-height:274px;
    border-radius:var(--r-lg);overflow:hidden;display:flex;align-items:center;
    justify-content:center;}
  .c02-glass__blobs{position:absolute;inset:-20%;}
  .c02-glass__blob{position:absolute;border-radius:50%;filter:blur(6px);
    animation:c02-glass-drift 9s var(--ease-in-out) infinite alternate;}
  .c02-glass__blob--1{width:130px;height:130px;top:6%;left:6%;background:var(--accent-iris);}
  .c02-glass__blob--2{width:150px;height:150px;bottom:2%;right:4%;background:var(--accent-cyan);
    animation-delay:-3s;}
  .c02-glass__blob--3{width:100px;height:100px;top:40%;left:40%;background:var(--accent-magenta);
    animation-delay:-6s;}
  @keyframes c02-glass-drift{
    0%{transform:translate(0,0) scale(1);}
    100%{transform:translate(26px,-22px) scale(1.18);}
  }
  .c02-glass__panel{position:relative;z-index:2;width:84%;height:76%;border-radius:var(--r-md);
    background:rgba(20,22,34,0.42);backdrop-filter:blur(16px) saturate(140%);
    -webkit-backdrop-filter:blur(16px) saturate(140%);
    border:1px solid rgba(255,255,255,0.16);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.22),var(--shadow-lift);
    padding:var(--space-6);display:flex;flex-direction:column;justify-content:flex-end;
    transition:transform var(--dur-base) var(--ease-out-soft);}
  .c02-glass:hover .c02-glass__panel{transform:translateY(-4px) scale(1.02);}
  .c02-glass__pill{align-self:flex-start;font-size:10px;font-weight:600;letter-spacing:0.14em;
    text-transform:uppercase;color:var(--text-0);padding:4px 10px;border-radius:var(--r-pill);
    background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.18);margin-bottom:auto;}
  .c02-glass__h{font-family:var(--font-display);font-weight:600;font-size:20px;
    color:var(--text-0);margin:0 0 var(--space-1);letter-spacing:-0.02em;}
  .c02-glass__p{font-size:12px;color:var(--text-1);margin:0;}
  .cap{position:fixed;left:10px;bottom:8px;color:var(--accent-cyan);opacity:.4;
    font-family:var(--font-body);font-size:11px;letter-spacing:.08em;text-transform:uppercase;}
  @media (prefers-reduced-motion:reduce){.c02-glass__blob{animation:none;}}
</style>
</head>
<body>
<div id="stage">
  <div class="c02-glass">
    <div class="c02-glass__blobs">
      <span class="c02-glass__blob c02-glass__blob--1"></span>
      <span class="c02-glass__blob c02-glass__blob--2"></span>
      <span class="c02-glass__blob c02-glass__blob--3"></span>
    </div>
    <div class="c02-glass__panel">
      <span class="c02-glass__pill">Frosted</span>
      <h3 class="c02-glass__h">Glass Panel</h3>
      <p class="c02-glass__p">Blurred backdrop over drifting color.</p>
    </div>
  </div>
</div>
<div class="cap">Frosted Glass</div>
<script>
(function(){
  "use strict";
  // Blobs animate via CSS keyframes; pause on hidden to save cycles.
  var blobs=document.querySelectorAll(".c02-glass__blob");
  document.addEventListener("visibilitychange",function(){
    var s=document.hidden?"paused":"running";
    blobs.forEach(function(b){b.style.animationPlayState=s;});
  });
})();
</script>
</body>
</html>
