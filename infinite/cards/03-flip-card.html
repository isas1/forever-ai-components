<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Card that rotates 180 degrees in 3D on hover to reveal a magenta-gradient back face with detail copy.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-800:#0d0f16; --bg-surface:#1c2030;
    --text-0:#f4f6fb; --text-2:#8a91a8; --text-3:#565d73;
    --accent-iris:#7c5cff; --accent-cyan:#22d3ee; --accent-magenta:#ff5ca8;
    --accent-iris-dim:rgba(124,92,255,0.16);
    --grad-iris-cyan:linear-gradient(120deg,var(--accent-iris),var(--accent-cyan));
    --glow-cyan:0 0 32px -6px rgba(34,211,238,0.5);
    --border-mid:rgba(255,255,255,0.12); --r-md:14px;
    --space-1:4px; --space-2:8px; --space-6:24px;
    --font-display:"Space Grotesk",system-ui,sans-serif;
    --font-body:"Inter",system-ui,sans-serif;
    --ease-in-out:cubic-bezier(0.65,0,0.35,1); --dur-slow:520ms;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;}
  body{background:radial-gradient(80% 70% at 50% 30%,#12141d,#08090d);
    font-family:var(--font-body);}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    perspective:1000px;}
  .c03-flip{width:46vmin;height:59vmin;max-width:230px;max-height:296px;cursor:pointer;}
  .c03-flip__inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;
    transition:transform var(--dur-slow) var(--ease-in-out);}
  .c03-flip:hover .c03-flip__inner,.c03-flip:focus-within .c03-flip__inner,
  .c03-flip.c03-flip--auto .c03-flip__inner{transform:rotateY(180deg);}
  .c03-flip__face{position:absolute;inset:0;border-radius:var(--r-md);
    backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden;
    border:1px solid var(--border-mid);display:flex;flex-direction:column;
    justify-content:flex-end;padding:var(--space-6);}
  .c03-flip__face--front{background:radial-gradient(120% 90% at 70% 10%,var(--accent-iris-dim),transparent 60%),
    linear-gradient(160deg,var(--bg-surface),var(--bg-800));}
  .c03-flip__face--back{transform:rotateY(180deg);
    background:linear-gradient(150deg,var(--accent-iris),var(--accent-magenta) 130%);
    color:var(--text-0);justify-content:center;align-items:center;text-align:center;}
  .c03-flip__icon{position:absolute;top:20px;left:20px;width:40px;height:40px;border-radius:12px;
    background:var(--grad-iris-cyan);box-shadow:var(--glow-cyan);}
  .c03-flip__t{font-family:var(--font-display);font-weight:600;font-size:19px;color:var(--text-0);
    margin:0 0 var(--space-1);letter-spacing:-0.02em;}
  .c03-flip__s{font-size:12px;color:var(--text-2);margin:0;}
  .c03-flip__hint{position:absolute;bottom:16px;right:18px;font-size:10px;letter-spacing:0.14em;
    text-transform:uppercase;color:var(--text-3);}
  .c03-flip__back-h{font-family:var(--font-display);font-weight:700;font-size:26px;
    margin:0 0 var(--space-2);letter-spacing:-0.02em;}
  .c03-flip__back-p{font-size:12px;margin:0;opacity:0.92;max-width:22ch;}
  .cap{position:fixed;left:10px;bottom:8px;color:var(--accent-iris);opacity:.4;
    font-family:var(--font-body);font-size:11px;letter-spacing:.08em;text-transform:uppercase;}
  @media (prefers-reduced-motion:reduce){.c03-flip__inner{transition-duration:.001ms;}}
</style>
</head>
<body>
<div id="stage">
  <div class="c03-flip" tabindex="0" aria-label="Flip card, hover or focus to reveal back">
    <div class="c03-flip__inner">
      <div class="c03-flip__face c03-flip__face--front">
        <div class="c03-flip__icon"></div>
        <h3 class="c03-flip__t">Front Face</h3>
        <p class="c03-flip__s">Hover to turn it over.</p>
        <span class="c03-flip__hint">Flip</span>
      </div>
      <div class="c03-flip__face c03-flip__face--back">
        <h3 class="c03-flip__back-h">Hello.</h3>
        <p class="c03-flip__back-p">The reverse holds the detail you reveal on demand.</p>
      </div>
    </div>
  </div>
</div>
<div class="cap">Flip Card</div>
<script>
(function(){
  "use strict";
  var reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;
  var card=document.querySelector(".c03-flip");
  var timer=0, flipped=false, paused=false;
  function tick(){
    if(!paused){ flipped=!flipped; card.classList.toggle("c03-flip--auto",flipped); }
    timer=setTimeout(tick,2600);
  }
  // Pause autonomous flips while the user is interacting.
  card.addEventListener("pointerenter",function(){paused=true;card.classList.remove("c03-flip--auto");});
  card.addEventListener("pointerleave",function(){paused=false;});
  function start(){if(!timer&&!reduce)tick();}
  function stop(){clearTimeout(timer);timer=0;}
  document.addEventListener("visibilitychange",function(){document.hidden?stop():start();});
  if(!reduce)setTimeout(tick,1400);
})();
</script>
</body>
</html>
