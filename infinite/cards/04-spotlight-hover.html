<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Dark grid-textured card where an iris radial spotlight glow tracks the cursor and reveals a masked grid beneath it.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotlight Hover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&family=Inter:wght@400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-800:#0d0f16; --bg-surface:#1c2030;
    --text-0:#f4f6fb; --text-2:#8a91a8;
    --accent-cyan:#22d3ee; --accent-iris:#7c5cff;
    --border-soft:rgba(255,255,255,0.07); --border-mid:rgba(255,255,255,0.12);
    --r-md:14px; --space-1:4px; --space-6:24px;
    --font-display:"Space Grotesk",system-ui,sans-serif;
    --font-body:"Inter",system-ui,sans-serif;
    --ease-out-soft:cubic-bezier(0.22,1,0.36,1); --dur-base:280ms;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;}
  body{background:radial-gradient(80% 70% at 50% 30%,#12141d,#08090d);
    font-family:var(--font-body);}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .c04-spot{position:relative;width:50vmin;height:55vmin;max-width:256px;max-height:282px;
    border-radius:var(--r-md);background:linear-gradient(160deg,var(--bg-surface),var(--bg-800));
    border:1px solid var(--border-mid);overflow:hidden;padding:var(--space-6);
    display:flex;flex-direction:column;justify-content:flex-end;cursor:pointer;
    transition:border-color var(--dur-base) var(--ease-out-soft);}
  .c04-spot::before{content:"";position:absolute;inset:0;
    background:radial-gradient(380px circle at var(--c04-x,50%) var(--c04-y,50%),
      rgba(124,92,255,0.22),transparent 42%);
    opacity:1;pointer-events:none;}
  .c04-spot__grid{position:absolute;inset:0;
    background-image:linear-gradient(rgba(255,255,255,0.04) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,0.04) 1px,transparent 1px);
    background-size:26px 26px;
    -webkit-mask:radial-gradient(260px circle at var(--c04-x,50%) var(--c04-y,50%),#000 0%,transparent 60%);
    mask:radial-gradient(260px circle at var(--c04-x,50%) var(--c04-y,50%),#000 0%,transparent 60%);}
  .c04-spot__dot{position:absolute;top:22px;left:22px;width:10px;height:10px;border-radius:50%;
    background:var(--accent-cyan);box-shadow:0 0 14px var(--accent-cyan);}
  .c04-spot__t{position:relative;font-family:var(--font-display);font-weight:600;font-size:19px;
    color:var(--text-0);margin:0 0 var(--space-1);letter-spacing:-0.02em;}
  .c04-spot__p{position:relative;font-size:12px;color:var(--text-2);margin:0;}
  .cap{position:fixed;left:10px;bottom:8px;color:var(--accent-iris);opacity:.4;
    font-family:var(--font-body);font-size:11px;letter-spacing:.08em;text-transform:uppercase;}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/cards/04-spotlight-hover.html",
 "title": "Spotlight Hover",
 "description": "Dark card with an iris radial glow and a CSS-masked grid that both track the cursor; auto-orbits when the pointer is away.",
 "useWhen": "Feature cards, pricing tiles, or dashboard widgets on dark backgrounds needing tactile depth without canvas overhead.",
 "avoidWhen": "Light-background layouts (background hardcoded dark) or touch-only devices where pointermove never fires.",
 "agentPrompt": "Change the spotlight color from iris (#7c5cff) to amber (#f59e0b) by updating --accent-iris and the rgba value in .c04-spot::before background.",
 "editableAreas": [
  "spotlight color (rgba(124,92,255,0.22) in ::before)",
  "grid cell size (background-size: 26px 26px)",
  "spotlight radius (380px in ::before, 260px in mask)",
  "auto-orbit speed (t += 0.018)",
  "accent dot color (--accent-cyan)"
 ],
 "preserveElements": [
  "CSS custom properties --c04-x/--c04-y driving both pseudo-elements",
  "rect cache + resize refresh pattern (avoids per-frame reflow)",
  "visibilitychange stop/start guard"
 ],
 "knownLimitations": [
  "Grid and glow are pure CSS — no canvas, so spotlight edge is always a smooth gradient with no noise/texture",
  "Card size uses vmin units; very small viewports may clip content before max-width clamps"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "spotlight",
  "hover",
  "card",
  "glow",
  "radial-gradient",
  "grid-mask",
  "cursor-tracking"
 ]
}
</script>
</head>
<body>
<div id="stage">
  <div class="c04-spot" tabindex="0" aria-label="Spotlight hover card">
    <div class="c04-spot__grid"></div>
    <div class="c04-spot__dot"></div>
    <h3 class="c04-spot__t">Spotlight</h3>
    <p class="c04-spot__p">A glow that tracks the cursor.</p>
  </div>
</div>
<div class="cap">Spotlight Hover</div>
<script>
(function(){
  "use strict";
  var reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;
  var card=document.querySelector(".c04-spot");
  var hovering=false, raf=0, t=0, r=card.getBoundingClientRect();
  // Cache rect at init; refresh only on resize, never per-frame (avoids sync reflow each frame).
  addEventListener("resize",function(){r=card.getBoundingClientRect();});
  function setXY(x,y){
    card.style.setProperty("--c04-x",x.toFixed(1)+"px");
    card.style.setProperty("--c04-y",y.toFixed(1)+"px");
  }
  card.addEventListener("pointermove",function(e){
    hovering=true; r=card.getBoundingClientRect();
    setXY(e.clientX-r.left,e.clientY-r.top);
  });
  card.addEventListener("pointerleave",function(){hovering=false;});
  function loop(){
    t+=0.018;
    if(!hovering){
      setXY(r.width*(0.5+Math.cos(t)*0.34),r.height*(0.5+Math.sin(t*1.3)*0.34));
    }
    raf=requestAnimationFrame(loop);
  }
  function start(){if(!raf&&!reduce)loop();}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener("visibilitychange",function(){document.hidden?stop():start();});
  if(reduce){setXY(r.width*0.5,r.height*0.4);}else start();
})();
</script>
</body>
</html>
