<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Dark card framed by a continuously rotating conic iris-cyan-magenta gradient border with a soft blurred aura glow.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradient-Border Glow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&family=Inter:wght@400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-700:#12141d; --bg-900:#08090d;
    --text-0:#f4f6fb; --text-2:#8a91a8;
    --accent-iris:#7c5cff; --accent-cyan:#22d3ee; --accent-magenta:#ff5ca8;
    --r-md:14px; --space-1:4px; --space-6:24px;
    --font-display:"Space Grotesk",system-ui,sans-serif;
    --font-body:"Inter",system-ui,sans-serif;
    --ease-linear:linear;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;}
  body{background:radial-gradient(80% 70% at 50% 30%,#101019,#08090d);
    font-family:var(--font-body);}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .c05-glow{position:relative;width:48vmin;height:57vmin;max-width:240px;max-height:284px;
    border-radius:var(--r-md);padding:2px;isolation:isolate;}
  .c05-glow::before{content:"";position:absolute;inset:-40%;z-index:-1;
    background:conic-gradient(from 0deg,var(--accent-iris),var(--accent-cyan),var(--accent-magenta),var(--accent-iris));
    animation:c05-glow-spin 6s var(--ease-linear) infinite;filter:blur(2px);}
  .c05-glow::after{content:"";position:absolute;inset:-40%;z-index:-2;
    background:conic-gradient(from 0deg,var(--accent-iris),var(--accent-cyan),var(--accent-magenta),var(--accent-iris));
    animation:c05-glow-spin 6s var(--ease-linear) infinite;filter:blur(18px);opacity:0.55;}
  @keyframes c05-glow-spin{to{transform:rotate(360deg);}}
  .c05-glow__inner{position:relative;width:100%;height:100%;border-radius:calc(var(--r-md) - 1px);
    background:linear-gradient(160deg,var(--bg-700),var(--bg-900));padding:var(--space-6);
    display:flex;flex-direction:column;justify-content:flex-end;}
  .c05-glow__chip{position:absolute;top:18px;left:18px;font-size:10px;font-weight:600;
    letter-spacing:0.14em;text-transform:uppercase;color:var(--accent-cyan);}
  .c05-glow__t{font-family:var(--font-display);font-weight:600;font-size:19px;color:var(--text-0);
    margin:0 0 var(--space-1);letter-spacing:-0.02em;}
  .c05-glow__p{font-size:12px;color:var(--text-2);margin:0;}
  .cap{position:fixed;left:10px;bottom:8px;color:var(--accent-cyan);opacity:.4;
    font-family:var(--font-body);font-size:11px;letter-spacing:.08em;text-transform:uppercase;}
  .c05-glow.c05-glow--paused::before,.c05-glow.c05-glow--paused::after{animation-play-state:paused;}
  @media (prefers-reduced-motion:reduce){
    .c05-glow::before,.c05-glow::after{animation-duration:.001ms;animation-iteration-count:1;filter:none;}
    .c05-glow::after{opacity:0.4;}
  }
</style>
</head>
<body>
<div id="stage">
  <div class="c05-glow">
    <div class="c05-glow__inner">
      <span class="c05-glow__chip">Live</span>
      <h3 class="c05-glow__t">Aura Border</h3>
      <p class="c05-glow__p">A conic edge that never stops turning.</p>
    </div>
  </div>
</div>
<div class="cap">Gradient-Border Glow</div>
<script>
(function(){
  "use strict";
  var glow=document.querySelector(".c05-glow");
  document.addEventListener("visibilitychange",function(){
    glow.classList.toggle("c05-glow--paused",document.hidden);
  });
})();
</script>
</body>
</html>
