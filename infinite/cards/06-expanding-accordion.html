<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Narrow numbered panel that widens on hover and fades in supporting copy beneath its title, accordion-style.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expanding Accordion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-700:#12141d; --bg-800:#0d0f16; --bg-surface:#1c2030;
    --text-0:#f4f6fb; --text-2:#8a91a8;
    --accent-cyan:#22d3ee; --accent-iris:#7c5cff;
    --border-mid:rgba(255,255,255,0.12); --r-md:14px;
    --space-2:8px; --space-4:16px; --space-6:24px;
    --font-display:"Space Grotesk",system-ui,sans-serif;
    --font-body:"Inter",system-ui,sans-serif;
    --ease-out-soft:cubic-bezier(0.22,1,0.36,1); --dur-base:280ms; --dur-slow:520ms;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;}
  body{background:radial-gradient(80% 70% at 50% 30%,#12141d,#08090d);
    font-family:var(--font-body);}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .c06-acc{position:relative;width:132px;height:55vmin;max-height:270px;border-radius:var(--r-md);
    overflow:hidden;border:1px solid var(--border-mid);
    background:linear-gradient(160deg,var(--bg-surface),var(--bg-800));cursor:pointer;
    transition:width var(--dur-slow) var(--ease-out-soft);}
  .c06-acc:hover,.c06-acc:focus-within,.c06-acc.c06-acc--auto{width:270px;}
  .c06-acc__img{position:absolute;inset:0;
    background:radial-gradient(120% 100% at 20% 0%,rgba(124,92,255,0.5),transparent 60%),
      radial-gradient(120% 100% at 100% 100%,rgba(34,211,238,0.4),transparent 55%),var(--bg-700);}
  .c06-acc__veil{position:absolute;inset:0;
    background:linear-gradient(to top,rgba(8,9,13,0.92) 18%,rgba(8,9,13,0.25) 70%);}
  .c06-acc__body{position:absolute;inset:0;padding:var(--space-6) var(--space-4);
    display:flex;flex-direction:column;justify-content:flex-end;}
  .c06-acc__num{position:absolute;top:16px;left:16px;font-family:var(--font-display);
    font-weight:700;font-size:22px;color:var(--accent-cyan);letter-spacing:-0.02em;}
  .c06-acc__t{font-family:var(--font-display);font-weight:600;font-size:16px;color:var(--text-0);
    margin:0 0 var(--space-2);letter-spacing:-0.01em;white-space:nowrap;}
  .c06-acc__p{font-size:12px;color:var(--text-2);margin:0;max-width:190px;
    opacity:0;transform:translateY(8px);
    transition:opacity var(--dur-base) var(--ease-out-soft) 120ms,
      transform var(--dur-base) var(--ease-out-soft) 120ms;}
  .c06-acc:hover .c06-acc__p,.c06-acc:focus-within .c06-acc__p,
  .c06-acc.c06-acc--auto .c06-acc__p{opacity:1;transform:translateY(0);}
  .cap{position:fixed;left:10px;bottom:8px;color:var(--accent-cyan);opacity:.4;
    font-family:var(--font-body);font-size:11px;letter-spacing:.08em;text-transform:uppercase;}
  @media (prefers-reduced-motion:reduce){.c06-acc,.c06-acc__p{transition-duration:.001ms;}}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/cards/06-expanding-accordion.html",
 "title": "Expanding Accordion",
 "description": "A narrow card widens from 132px to 270px on hover, revealing supporting copy with a fade-up transition. Auto-cycles between states as a demo loop.",
 "useWhen": "Feature cards, portfolio panels, or any vertical card grid where brief copy should appear on hover without layout shift.",
 "avoidWhen": "Mobile-only contexts where hover is unavailable — the auto-cycle does fire but kills user control. Remove the timer loop before shipping in production.",
 "agentPrompt": "Change the card title to 'Features', update the number to '02', and increase expanded width from 270px to 320px in the `.c06-acc:hover` rule.",
 "editableAreas": [

  "transition duration (--dur-slow: 520ms)",
  "accent color (--accent-cyan: #22d3ee)",
  "auto-cycle open/close delays (3000ms / 2200ms)"
 ],

</head>
<body>
<div id="stage">
  <div class="c06-acc" tabindex="0" aria-label="Expanding accordion card">
    <div class="c06-acc__img"></div>
    <div class="c06-acc__veil"></div>
    <div class="c06-acc__body">
      <span class="c06-acc__num">01</span>
      <h3 class="c06-acc__t">Expand</h3>
      <p class="c06-acc__p">Hover widens the panel and fades in the supporting copy beneath the title.</p>
    </div>
  </div>
</div>
<div class="cap">Expanding Accordion</div>
<script>
(function(){
  "use strict";
  var reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;
  var card=document.querySelector(".c06-acc");
  var timer=0, open=false, paused=false;
  function tick(){
    if(!paused){ open=!open; card.classList.toggle("c06-acc--auto",open); }
    timer=setTimeout(tick,open?3000:2200);
  }
  card.addEventListener("pointerenter",function(){paused=true;card.classList.remove("c06-acc--auto");});
  card.addEventListener("pointerleave",function(){paused=false;});
  function start(){if(!timer&&!reduce)tick();}
  function stop(){clearTimeout(timer);timer=0;}
  document.addEventListener("visibilitychange",function(){document.hidden?stop():start();});
  if(!reduce)setTimeout(tick,1200);
})();
</script>
</body>
</html>
