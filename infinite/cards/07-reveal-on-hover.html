<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Dark image card whose gradient art dims and zooms as a hidden title-and-copy panel slides up from the bottom on hover.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reveal on Hover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&family=Inter:wght@400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-700:#12141d;
    --text-0:#f4f6fb; --text-1:#c7ccdb;
    --accent-magenta:#ff5ca8; --accent-iris:#7c5cff;
    --border-mid:rgba(255,255,255,0.12); --r-md:14px;
    --space-2:8px; --space-6:24px;
    --font-display:"Space Grotesk",system-ui,sans-serif;
    --font-body:"Inter",system-ui,sans-serif;
    --ease-out-soft:cubic-bezier(0.22,1,0.36,1); --dur-base:280ms; --dur-slow:520ms;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;}
  body{background:radial-gradient(80% 70% at 50% 30%,#12141d,#08090d);
    font-family:var(--font-body);}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .c07-rev{position:relative;width:48vmin;height:57vmin;max-width:240px;max-height:284px;
    border-radius:var(--r-md);overflow:hidden;border:1px solid var(--border-mid);cursor:pointer;}
  .c07-rev__img{position:absolute;inset:0;
    background:radial-gradient(130% 100% at 80% 10%,rgba(255,92,168,0.55),transparent 55%),
      radial-gradient(120% 110% at 0% 100%,rgba(124,92,255,0.55),transparent 55%),var(--bg-700);
    transition:transform var(--dur-slow) var(--ease-out-soft),filter var(--dur-slow) var(--ease-out-soft);}
  .c07-rev:hover .c07-rev__img,.c07-rev.c07-rev--auto .c07-rev__img{transform:scale(1.08);filter:brightness(0.7);}
  .c07-rev__tag{position:absolute;top:16px;left:16px;font-family:var(--font-display);
    font-weight:600;font-size:14px;color:var(--text-0);z-index:3;}
  .c07-rev__panel{position:absolute;left:0;right:0;bottom:0;padding:var(--space-6);
    background:linear-gradient(to top,rgba(8,9,13,0.96),rgba(8,9,13,0.4) 80%,transparent);
    transform:translateY(56%);transition:transform var(--dur-slow) var(--ease-out-soft);}
  .c07-rev:hover .c07-rev__panel,.c07-rev:focus-within .c07-rev__panel,
  .c07-rev.c07-rev--auto .c07-rev__panel{transform:translateY(0);}
  .c07-rev__t{font-family:var(--font-display);font-weight:600;font-size:18px;color:var(--text-0);
    margin:0 0 var(--space-2);letter-spacing:-0.01em;}
  .c07-rev__p{font-size:12px;color:var(--text-1);margin:0;opacity:0;transform:translateY(10px);
    transition:opacity var(--dur-base) var(--ease-out-soft) 120ms,
      transform var(--dur-base) var(--ease-out-soft) 120ms;}
  .c07-rev:hover .c07-rev__p,.c07-rev:focus-within .c07-rev__p,
  .c07-rev.c07-rev--auto .c07-rev__p{opacity:1;transform:translateY(0);}
  .cap{position:fixed;left:10px;bottom:8px;color:var(--accent-magenta);opacity:.4;
    font-family:var(--font-body);font-size:11px;letter-spacing:.08em;text-transform:uppercase;}
  @media (prefers-reduced-motion:reduce){
    .c07-rev__img,.c07-rev__panel,.c07-rev__p{transition-duration:.001ms;}
  }
</style>
</head>
<body>
<div id="stage">
  <div class="c07-rev" tabindex="0" aria-label="Reveal on hover card">
    <div class="c07-rev__img"></div>
    <span class="c07-rev__tag">Field Notes</span>
    <div class="c07-rev__panel">
      <h3 class="c07-rev__t">Slide Reveal</h3>
      <p class="c07-rev__p">Hidden copy rises into view as the image dims behind it.</p>
    </div>
  </div>
</div>
<div class="cap">Reveal on Hover</div>
<script>
(function(){
  "use strict";
  var reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;
  var card=document.querySelector(".c07-rev");
  var timer=0, open=false, paused=false;
  function tick(){
    if(!paused){ open=!open; card.classList.toggle("c07-rev--auto",open); }
    timer=setTimeout(tick,open?3000:2400);
  }
  card.addEventListener("pointerenter",function(){paused=true;card.classList.remove("c07-rev--auto");});
  card.addEventListener("pointerleave",function(){paused=false;});
  function start(){if(!timer&&!reduce)tick();}
  function stop(){clearTimeout(timer);timer=0;}
  document.addEventListener("visibilitychange",function(){document.hidden?stop():start();});
  if(!reduce)setTimeout(tick,1300);
})();
</script>
</body>
</html>
