<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="3D-tilting trading card with a rainbow iridescent sheen, conic foil chip and grain that shift with pointer position or drift idly.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holographic Iridescent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&family=Inter:wght@400&display=swap" rel="stylesheet">
<style>
  :root{
    --text-0:#f4f6fb; --text-1:#c7ccdb;
    --accent-iris:#7c5cff;
    --border-mid:rgba(255,255,255,0.12); --r-md:14px;
    --space-1:4px; --space-6:24px;
    --font-display:"Space Grotesk",system-ui,sans-serif;
    --font-body:"Inter",system-ui,sans-serif;
    --ease-linear:linear;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;}
  body{background:radial-gradient(80% 70% at 50% 30%,#101019,#08090d);
    font-family:var(--font-body);}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    perspective:1100px;}
  .c08-holo{position:relative;width:46vmin;height:59vmin;max-width:230px;max-height:296px;
    border-radius:var(--r-md);transform-style:preserve-3d;
    transform:rotateX(var(--c08-rx,0deg)) rotateY(var(--c08-ry,0deg));
    transition:transform 110ms var(--ease-linear);cursor:pointer;overflow:hidden;
    border:1px solid var(--border-mid);background:linear-gradient(160deg,#14131c,#0a0a12);}
  .c08-holo__sheen{position:absolute;inset:-2px;
    background:linear-gradient(115deg,transparent 0%,rgba(124,92,255,0.0) 18%,
      rgba(34,211,238,0.55) 38%,rgba(255,92,168,0.6) 50%,rgba(124,92,255,0.55) 62%,transparent 82%);
    background-size:240% 240%;background-position:var(--c08-sheen,50%) 50%;
    mix-blend-mode:color-dodge;opacity:0.85;
    transition:background-position 110ms var(--ease-linear);}
  .c08-holo__grain{position:absolute;inset:0;
    background-image:repeating-linear-gradient(115deg,rgba(255,255,255,0.05) 0 2px,transparent 2px 5px);
    mix-blend-mode:overlay;opacity:0.5;}
  .c08-holo__foil{position:absolute;top:18px;left:18px;width:44px;height:44px;border-radius:12px;
    background:conic-gradient(from 0deg,#22d3ee,#7c5cff,#ff5ca8,#22d3ee);
    box-shadow:0 0 18px -2px rgba(124,92,255,0.7);}
  .c08-holo__body{position:absolute;inset:0;padding:var(--space-6);
    display:flex;flex-direction:column;justify-content:flex-end;}
  .c08-holo__t{font-family:var(--font-display);font-weight:600;font-size:18px;color:var(--text-0);
    margin:0 0 var(--space-1);letter-spacing:-0.01em;}
  .c08-holo__p{font-size:12px;color:var(--text-1);margin:0;}
  .cap{position:fixed;left:10px;bottom:8px;color:var(--accent-iris);opacity:.4;
    font-family:var(--font-body);font-size:11px;letter-spacing:.08em;text-transform:uppercase;}
  @media (prefers-reduced-motion:reduce){.c08-holo,.c08-holo__sheen{transition-duration:.001ms;}}
</style>
</head>
<body>
<div id="stage">
  <div class="c08-holo" tabindex="0" aria-label="Holographic iridescent card">
    <div class="c08-holo__sheen"></div>
    <div class="c08-holo__grain"></div>
    <div class="c08-holo__foil"></div>
    <div class="c08-holo__body">
      <h3 class="c08-holo__t">Holo Foil</h3>
      <p class="c08-holo__p">Tilt to shift the rainbow.</p>
    </div>
  </div>
</div>
<div class="cap">Holographic Iridescent</div>
<script>
(function(){
  "use strict";
  var reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;
  var card=document.querySelector(".c08-holo");
  var max=12, hovering=false, raf=0, t=0;
  function apply(px,py){
    card.style.setProperty("--c08-ry",((px-0.5)*max*2).toFixed(2)+"deg");
    card.style.setProperty("--c08-rx",((0.5-py)*max*2).toFixed(2)+"deg");
    card.style.setProperty("--c08-sheen",(px*100).toFixed(1)+"%");
  }
  card.addEventListener("pointermove",function(e){
    hovering=true;
    var r=card.getBoundingClientRect();
    apply((e.clientX-r.left)/r.width,(e.clientY-r.top)/r.height);
  });
  card.addEventListener("pointerleave",function(){hovering=false;});
  function loop(){
    t+=0.011;
    if(!hovering)apply(0.5+Math.sin(t)*0.42,0.5+Math.cos(t*0.7)*0.3);
    raf=requestAnimationFrame(loop);
  }
  function start(){if(!raf&&!reduce)loop();}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener("visibilitychange",function(){document.hidden?stop():start();});
  if(!reduce)start();
})();
</script>
</body>
</html>
