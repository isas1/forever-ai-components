<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Three layered gradient cards that fan out and rotate apart with a springy bounce on hover, then restack.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stacked Peeking Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&family=Inter:wght@400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-800:#0d0f16; --bg-surface:#1c2030;
    --text-0:#f4f6fb; --text-2:#8a91a8;
    --accent-iris:#7c5cff; --accent-cyan:#22d3ee; --accent-magenta:#ff5ca8;
    --grad-iris-cyan:linear-gradient(120deg,var(--accent-iris),var(--accent-cyan));
    --border-mid:rgba(255,255,255,0.12); --r-md:14px; --space-4:16px;
    --shadow-lift:0 18px 50px -24px rgba(0,0,0,0.9);
    --font-display:"Space Grotesk",system-ui,sans-serif;
    --font-body:"Inter",system-ui,sans-serif;
    --ease-out-soft:cubic-bezier(0.22,1,0.36,1);
    --ease-spring:cubic-bezier(0.34,1.56,0.64,1); --dur-slow:520ms;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;}
  body{background:radial-gradient(80% 70% at 50% 30%,#12141d,#08090d);
    font-family:var(--font-body);}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .c09-stack{position:relative;width:42vmin;height:53vmin;max-width:210px;max-height:268px;
    cursor:pointer;}
  .c09-stack__card{position:absolute;inset:0;border-radius:var(--r-md);
    border:1px solid var(--border-mid);box-shadow:var(--shadow-lift);padding:var(--space-4);
    display:flex;flex-direction:column;justify-content:space-between;transform-origin:bottom center;
    transition:transform var(--dur-slow) var(--ease-spring),
      box-shadow var(--dur-slow) var(--ease-out-soft);}
  .c09-stack__card--3{background:linear-gradient(160deg,#211a3d,#0f0e1a);
    transform:translateY(0) rotate(0deg) scale(0.9);z-index:1;}
  .c09-stack__card--2{background:linear-gradient(160deg,#16263a,#0d141d);
    transform:translateY(0) rotate(0deg) scale(0.95);z-index:2;}
  .c09-stack__card--1{background:linear-gradient(160deg,var(--bg-surface),var(--bg-800));
    transform:translateY(0) rotate(0deg) scale(1);z-index:3;}
  .c09-stack:hover .c09-stack__card--1,.c09-stack:focus-within .c09-stack__card--1,
  .c09-stack.c09-stack--auto .c09-stack__card--1{transform:translate(-2px,6px) rotate(-9deg);}
  .c09-stack:hover .c09-stack__card--2,.c09-stack:focus-within .c09-stack__card--2,
  .c09-stack.c09-stack--auto .c09-stack__card--2{transform:translate(0,-4px) rotate(0deg) scale(0.97);}
  .c09-stack:hover .c09-stack__card--3,.c09-stack:focus-within .c09-stack__card--3,
  .c09-stack.c09-stack--auto .c09-stack__card--3{transform:translate(2px,6px) rotate(9deg);}
  .c09-stack__dot{width:26px;height:26px;border-radius:9px;background:var(--grad-iris-cyan);}
  .c09-stack__card--2 .c09-stack__dot{background:linear-gradient(120deg,var(--accent-cyan),var(--accent-magenta));}
  .c09-stack__card--3 .c09-stack__dot{background:linear-gradient(120deg,var(--accent-magenta),var(--accent-iris));}
  .c09-stack__lbl{font-family:var(--font-display);font-weight:600;font-size:13px;color:var(--text-0);margin:0;}
  .c09-stack__meta{font-size:11px;color:var(--text-2);margin:0;}
  .cap{position:fixed;left:10px;bottom:8px;color:var(--accent-iris);opacity:.4;
    font-family:var(--font-body);font-size:11px;letter-spacing:.08em;text-transform:uppercase;}
  @media (prefers-reduced-motion:reduce){.c09-stack__card{transition-duration:.001ms;}}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/cards/09-stacked-peeking-cards.html",
 "title": "Stacked Peeking Cards",
 "description": "Three layered gradient cards auto-cycle and fan out with a springy rotation on hover; cards spread left and right then restack when cursor leaves.",
 "useWhen": "Card collection previews, playlist/deck UI, portfolio thumbnails where showing multiple items in compact space matters.",
 "avoidWhen": "Contexts needing legible card content — the fanned back cards are partially obscured. Avoid when auto-cycle motion conflicts with focused reading layouts.",
 "agentPrompt": "Change the fan rotation from 9deg to 14deg by editing the rotate(9deg) and rotate(-9deg) values in the hover/auto CSS rules, and slow the spring to 700ms by updating --dur-slow.",
 "editableAreas": [
  "fan rotation angle (rotate(9deg) / rotate(-9deg))",
  "spring duration (--dur-slow: 520ms)",
  "auto-cycle timing (2800ms / 2200ms delays in tick())",
  "card gradient colors (--bg-surface, accent vars)",
  "card dimensions (42vmin / 53vmin)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (transition-duration:.001ms)",
  "visibilitychange stop/start",
  "pointerenter pause logic"
 ],
 "knownLimitations": [
  "Auto-cycle pauses on hover but resumes on pointerleave — may feel surprising if user lingers nearby",
  "Card content labels are placeholder text only; real content must be wired in"
 ],
 "tier": "curated",
 "labels": [

  "easy-to-modify",

 ]

</script>
</head>
<body>
<div id="stage">
  <div class="c09-stack" tabindex="0" aria-label="Stacked peeking cards that fan out">
    <div class="c09-stack__card c09-stack__card--3">
      <span class="c09-stack__dot"></span>
      <div><p class="c09-stack__lbl">Layer 3</p><p class="c09-stack__meta">Back</p></div>
    </div>
    <div class="c09-stack__card c09-stack__card--2">
      <span class="c09-stack__dot"></span>
      <div><p class="c09-stack__lbl">Layer 2</p><p class="c09-stack__meta">Middle</p></div>
    </div>
    <div class="c09-stack__card c09-stack__card--1">
      <span class="c09-stack__dot"></span>
      <div><p class="c09-stack__lbl">Layer 1</p><p class="c09-stack__meta">Front</p></div>
    </div>
  </div>
</div>
<div class="cap">Stacked Peeking Cards</div>
<script>
(function(){
  "use strict";
  var reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;
  var card=document.querySelector(".c09-stack");
  var timer=0, fanned=false, paused=false;
  function tick(){
    if(!paused){ fanned=!fanned; card.classList.toggle("c09-stack--auto",fanned); }
    timer=setTimeout(tick,fanned?2800:2200);
  }
  card.addEventListener("pointerenter",function(){paused=true;card.classList.remove("c09-stack--auto");});
  card.addEventListener("pointerleave",function(){paused=false;});
  function start(){if(!timer&&!reduce)tick();}
  function stop(){clearTimeout(timer);timer=0;}
  document.addEventListener("visibilitychange",function(){document.hidden?stop():start();});
  if(!reduce)setTimeout(tick,1200);
})();
</script>
</body>
</html>
