<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Featured image card where the conic-gradient art zooms in while an eyebrow and title caption rise into view under a dark shade.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Zoom + Caption Rise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&family=Inter:wght@400&display=swap" rel="stylesheet">
<style>
  :root{
    --text-0:#f4f6fb;
    --accent-cyan:#22d3ee;
    --border-mid:rgba(255,255,255,0.12); --r-md:14px;
    --space-1:4px; --space-6:24px;
    --font-display:"Space Grotesk",system-ui,sans-serif;
    --font-body:"Inter",system-ui,sans-serif;
    --ease-out-soft:cubic-bezier(0.22,1,0.36,1); --dur-base:280ms; --dur-slow:520ms;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;}
  body{background:radial-gradient(80% 70% at 50% 30%,#12141d,#08090d);
    font-family:var(--font-body);}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .c10-zoom{position:relative;width:48vmin;height:57vmin;max-width:240px;max-height:284px;
    border-radius:var(--r-md);overflow:hidden;border:1px solid var(--border-mid);cursor:pointer;}
  .c10-zoom__img{position:absolute;inset:0;
    background:radial-gradient(120% 90% at 70% 20%,rgba(34,211,238,0.5),transparent 55%),
      radial-gradient(120% 100% at 10% 100%,rgba(124,92,255,0.55),transparent 55%),
      conic-gradient(from 200deg at 50% 50%,#1a1530,#0e1622,#1a1530);
    transform:scale(1);transition:transform var(--dur-slow) var(--ease-out-soft);}
  .c10-zoom:hover .c10-zoom__img,.c10-zoom.c10-zoom--auto .c10-zoom__img{transform:scale(1.14);}
  .c10-zoom__shade{position:absolute;inset:0;
    background:linear-gradient(to top,rgba(8,9,13,0.88),transparent 55%);}
  .c10-zoom__cap{position:absolute;left:0;right:0;bottom:0;padding:var(--space-6);
    transform:translateY(14px);transition:transform var(--dur-slow) var(--ease-out-soft);}
  .c10-zoom:hover .c10-zoom__cap,.c10-zoom:focus-within .c10-zoom__cap,
  .c10-zoom.c10-zoom--auto .c10-zoom__cap{transform:translateY(0);}
  .c10-zoom__eyebrow{font-size:10px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;
    color:var(--accent-cyan);margin:0 0 var(--space-1);opacity:0;transform:translateY(10px);
    transition:opacity var(--dur-base) var(--ease-out-soft) 90ms,
      transform var(--dur-base) var(--ease-out-soft) 90ms;}
  .c10-zoom:hover .c10-zoom__eyebrow,.c10-zoom:focus-within .c10-zoom__eyebrow,
  .c10-zoom.c10-zoom--auto .c10-zoom__eyebrow{opacity:1;transform:translateY(0);}
  .c10-zoom__t{font-family:var(--font-display);font-weight:600;font-size:19px;color:var(--text-0);
    margin:0;letter-spacing:-0.01em;}
  .cap{position:fixed;left:10px;bottom:8px;color:var(--accent-cyan);opacity:.4;
    font-family:var(--font-body);font-size:11px;letter-spacing:.08em;text-transform:uppercase;}
  @media (prefers-reduced-motion:reduce){
    .c10-zoom__img,.c10-zoom__cap,.c10-zoom__eyebrow{transition-duration:.001ms;}
  }
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/cards/10-image-zoom-caption-rise.html",
 "title": "Image Zoom + Caption Rise",
 "description": "A card with a conic-gradient art panel that scales up on hover while an eyebrow label and title rise into view from beneath a dark gradient shade.",
 "useWhen": "Featured article cards, portfolio thumbnails, or product tiles where hover reveals contextual text without cluttering the resting state.",
 "avoidWhen": "Touch-only interfaces where hover states never fire. Layouts requiring always-visible captions — the text is hidden at rest.",
 "agentPrompt": "Change the eyebrow text to 'New Release', set --accent-cyan to #f59e0b, and increase the zoom scale from 1.14 to 1.22 in .c10-zoom__img.",
 "editableAreas": [
  "accent color (--accent-cyan)",
  "zoom scale (1.14 in transform:scale)",
  "caption text (eyebrow + h3)",
  "transition duration (--dur-slow: 520ms)",
  "shade gradient stop (rgba(8,9,13,0.88))"
 ],
 "preserveElements": [
  "c10-zoom--auto class toggle (drives demo auto-cycle)",
  "prefers-reduced-motion guard (transition-duration:.001ms)",
  "visibilitychange stop/start pattern",
  "IIFE wrapper"

 "knownLimitations": [
  "Background art is a CSS gradient only — no real image; swap .c10-zoom__img background for a real image URL to use in production",
  "Auto-cycle pauses on pointerenter but resumes on pointerleave with no debounce — may feel abrupt on fast mouse sweeps"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",

  "copy-paste-safe",
  "minimal-deps"

 ]

</head>
<body>
<div id="stage">
  <div class="c10-zoom" tabindex="0" aria-label="Image zoom and caption rise card">
    <div class="c10-zoom__img"></div>
    <div class="c10-zoom__shade"></div>
    <div class="c10-zoom__cap">
      <p class="c10-zoom__eyebrow">Featured</p>
      <h3 class="c10-zoom__t">Zoom &amp; Rise</h3>
    </div>
  </div>
</div>
<div class="cap">Image Zoom + Caption Rise</div>
<script>
(function(){
  "use strict";
  var reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;
  var card=document.querySelector(".c10-zoom");
  var timer=0, zoomed=false, paused=false;
  function tick(){
    if(!paused){ zoomed=!zoomed; card.classList.toggle("c10-zoom--auto",zoomed); }
    timer=setTimeout(tick,zoomed?3000:2400);
  }
  card.addEventListener("pointerenter",function(){paused=true;card.classList.remove("c10-zoom--auto");});
  card.addEventListener("pointerleave",function(){paused=false;});
  function start(){if(!timer&&!reduce)tick();}
  function stop(){clearTimeout(timer);timer=0;}
  document.addEventListener("visibilitychange",function(){document.hidden?stop():start();});
  if(!reduce)setTimeout(tick,1300);
})();
</script>
</body>
</html>
