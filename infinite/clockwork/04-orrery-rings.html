<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Orrery — Clockwork &amp; Mechanical. A self-contained, zero-dependency animated web component.">
<title>Orrery</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#141414}
  .or-root{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
  .or-svg{width:min(100%,100vmin);height:min(100%,100vmin)}
  .or-caption{position:fixed;left:8px;bottom:7px;font:11px/1 monospace;color:#b5813a;opacity:.45;pointer-events:none}

  #or-ring1{transform-origin:50% 50%;animation:or-r1 12s linear infinite}
  #or-ring2{transform-origin:50% 50%;animation:or-r2 8s linear infinite}
  #or-ring3{transform-origin:50% 50%;animation:or-r3 5s linear infinite}
  #or-ring4{transform-origin:50% 50%;animation:or-r4 3s linear infinite}
  #or-ring5{transform-origin:50% 50%;animation:or-r5 20s linear infinite reverse}
  #or-armature{transform-origin:50% 50%;animation:or-r1 12s linear infinite}

  @keyframes or-r1{to{transform:rotate(360deg)}}
  @keyframes or-r2{to{transform:rotate(360deg)}}
  @keyframes or-r3{to{transform:rotate(360deg)}}
  @keyframes or-r4{to{transform:rotate(360deg)}}
  @keyframes or-r5{to{transform:rotate(360deg)}}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/clockwork/04-orrery-rings.html",
 "title": "Orrery",
 "description": "Four planetary arms orbit a glowing brass sun at staggered speeds; a counter-rotating dashed ring and crosshair armature give a steampunk orrery feel.",
 "useWhen": "Dark-mode hero backgrounds, science/space themes, steampunk or mechanical UI aesthetics, ambient looping decorations.",
 "avoidWhen": "Light backgrounds (hardcoded dark plate). Contexts where constant rotational motion competes with foreground content.",
 "agentPrompt": "Change the outermost planet speed to 18s by editing #or-ring1 animation duration, and recolor the sun gradient stops to deep red (#ff4400 → #880000).",
 "editableAreas": [
  "orbit arm speeds (animation durations 12s/8s/5s/3s/20s)",
  "planet fill colors (cx/cy circle fills)",
  "sun gradient stops (#ffe066, #e8a020, #a05010)",
  "ring track radii (r=72/56/40/25)",
  "counter-rotation direction (reverse keyword on or-ring5)"
 ],
 "preserveElements": [
  "IIFE wrapper with prefers-reduced-motion guard",
  "visibilitychange pause handler",
  "transform-origin:50% 50% on all rotating groups"
 ],
 "knownLimitations": [
  "Background color hardcoded to #141414 — must edit CSS to change",
  "No interactivity; purely decorative",
  "SVG filter or-glow uses feComposite which may render differently across browsers"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "orrery",
  "clockwork",
  "orbits",
  "mechanical",
  "svg",
  "astronomy",
  "ambient"
 ]
}
</script>
</head>
<body>
<div class="or-root">
  <svg class="or-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="or-sun" cx="35%" cy="30%">
        <stop offset="0%" stop-color="#ffe066"/>
        <stop offset="60%" stop-color="#e8a020"/>
        <stop offset="100%" stop-color="#a05010"/>
      </radialGradient>
      <radialGradient id="or-brass" cx="35%" cy="30%">
        <stop offset="0%" stop-color="#d4a755"/>
        <stop offset="100%" stop-color="#7a5420"/>
      </radialGradient>
      <filter id="or-glow">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
      <filter id="or-drop">
        <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#b5813a" flood-opacity=".3"/>
      </filter>
    </defs>

    <!-- Base plate -->
    <circle cx="100" cy="100" r="92" fill="#1a1408" stroke="#5a3c10" stroke-width="1.5"/>
    <circle cx="100" cy="100" r="88" fill="none" stroke="#3a2808" stroke-width=".5" stroke-dasharray="4 4"/>

    <!-- Orbital ring tracks (static, engraved look) -->
    <circle cx="100" cy="100" r="72" fill="none" stroke="#3a2808" stroke-width=".8"/>
    <circle cx="100" cy="100" r="56" fill="none" stroke="#3a2808" stroke-width=".8"/>
    <circle cx="100" cy="100" r="40" fill="none" stroke="#3a2808" stroke-width=".8"/>
    <circle cx="100" cy="100" r="25" fill="none" stroke="#3a2808" stroke-width=".8"/>

    <!-- Sun at centre -->
    <circle cx="100" cy="100" r="12" fill="url(#or-sun)" filter="url(#or-glow)"/>
    <circle cx="100" cy="100" r="9" fill="none" stroke="#ffe066" stroke-width=".4" opacity=".5"/>

    <!-- Outer decorative ring (counter-rotating) -->
    <g id="or-ring5">
      <circle cx="100" cy="100" r="88" fill="none" stroke="#b5813a" stroke-width="1.5" stroke-dasharray="3 6"/>
    </g>

    <!-- Ring 1: outermost orbit arm + planet -->
    <g id="or-ring1">
      <line x1="100" y1="100" x2="172" y2="100" stroke="#8a6030" stroke-width=".8" opacity=".6"/>
      <!-- Gear at orbit radius for visual interest -->
      <circle cx="172" cy="100" r="7" fill="#2c2c2c" stroke="#b5813a" stroke-width="1"/>
      <circle cx="172" cy="100" r="4.5" fill="#8a8a96"/>
      <circle cx="172" cy="100" r="1.5" fill="#b5813a"/>
      <!-- Teeth suggestion -->
      <circle cx="172" cy="100" r="7" fill="none" stroke="#b5813a" stroke-width="1.5" stroke-dasharray="1.5 2.5"/>
    </g>

    <!-- Ring 2 -->
    <g id="or-ring2">
      <line x1="100" y1="100" x2="156" y2="100" stroke="#8a6030" stroke-width=".7" opacity=".6"/>
      <circle cx="156" cy="100" r="6" fill="#3a2808" stroke="#d4a755" stroke-width=".8"/>
      <circle cx="156" cy="100" r="3.5" fill="#b5813a"/>
      <circle cx="156" cy="100" r="1" fill="#e8dcc8"/>
    </g>

    <!-- Ring 3 -->
    <g id="or-ring3">
      <line x1="100" y1="100" x2="140" y2="100" stroke="#8a6030" stroke-width=".7" opacity=".6"/>
      <circle cx="140" cy="100" r="5" fill="#1e1810" stroke="#c49030" stroke-width=".8"/>
      <circle cx="140" cy="100" r="3" fill="#8a8a96"/>
      <circle cx="140" cy="100" r="1" fill="#d4a755"/>
    </g>

    <!-- Ring 4: inner fast orbit -->
    <g id="or-ring4">
      <line x1="100" y1="100" x2="125" y2="100" stroke="#7a5420" stroke-width=".6" opacity=".6"/>
      <circle cx="125" cy="100" r="4" fill="#141414" stroke="#b5813a" stroke-width=".8"/>
      <circle cx="125" cy="100" r="2" fill="#d4a755"/>
    </g>

    <!-- Armature crossbar (structural, rotates with outer orbit) -->
    <g id="or-armature">
      <line x1="28" y1="100" x2="172" y2="100" stroke="#5a3c10" stroke-width=".5" opacity=".3"/>
      <line x1="100" y1="28" x2="100" y2="172" stroke="#5a3c10" stroke-width=".5" opacity=".3"/>
    </g>

    <!-- Centre pivot -->
    <circle cx="100" cy="100" r="3" fill="url(#or-brass)" stroke="#5a3c10" stroke-width=".5"/>

    <!-- Degree ring -->
    <g stroke="#5a3c10" stroke-width=".4" opacity=".5">
      <line x1="100" y1="10" x2="100" y2="14"/>
      <line x1="100" y1="186" x2="100" y2="190"/>
      <line x1="10" y1="100" x2="14" y2="100"/>
      <line x1="186" y1="100" x2="190" y2="100"/>
      <line x1="135" y1="18" x2="133" y2="22"/>
      <line x1="63" y1="178" x2="65" y2="182"/>
      <line x1="18" y1="65" x2="22" y2="67"/>
      <line x1="178" y1="133" x2="182" y2="135"/>
      <line x1="165" y1="35" x2="162" y2="38"/>
      <line x1="35" y1="165" x2="38" y2="162"/>
      <line x1="165" y1="165" x2="162" y2="162"/>
      <line x1="35" y1="35" x2="38" y2="38"/>
    </g>
  </svg>
</div>
<div class="or-caption">orrery · nested orbits</div>
<script>
(()=>{
  const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
  const ids = ['or-ring1','or-ring2','or-ring3','or-ring4','or-ring5','or-armature'];
  if(reduce){
    ids.forEach(id=>{ const el=document.getElementById(id); if(el) el.style.animation='none'; });
  }
  document.addEventListener('visibilitychange',()=>{
    const state = document.hidden ? 'paused' : 'running';
    ids.forEach(id=>{ const el=document.getElementById(id); if(el) el.style.animationPlayState=state; });
  });
})();
</script>
</body>
</html>
