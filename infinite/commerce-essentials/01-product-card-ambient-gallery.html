<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Product card with an ambient gallery: the color-blocked backdrop and product silhouette rotate through angles on their own, a discount badge pulses, and a live 'sold today' counter ticks up.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Product Card Ambient Gallery</title>
<style>
:root{
  --pro-bg:#0d1117;
  --pro-surface:#161b22;
  --pro-border:rgba(255,255,255,.08);
  --pro-text:#e6edf3;
  --pro-muted:#8b949e;
  --pro-accent:#ffb224;
  --pro-accent-2:#ff5c7a;
  --pro-ok:#3fb950;
  --pro-radius:16px;
  --pro-font:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--pro-bg)}
.cpg-stage{position:fixed;inset:0;display:flex;padding:3.6vmin;font-family:var(--pro-font);color:var(--pro-text)}
.cpg-card{flex:1;min-height:0;background:var(--pro-surface);border:1px solid var(--pro-border);
  border-radius:var(--pro-radius);display:flex;flex-direction:column;overflow:hidden}
.cpg-media{position:relative;flex:1.3;min-height:0;overflow:hidden;
  background:linear-gradient(135deg,var(--cpg-a,var(--pro-accent)) 0%,var(--cpg-a,var(--pro-accent)) 46%,var(--cpg-b,var(--pro-accent-2)) 46%,var(--cpg-b,var(--pro-accent-2)) 100%);
  transition:background 1.1s ease}
.cpg-obj{position:absolute;left:50%;top:52%;width:34%;aspect-ratio:1/1.3;border-radius:22% 22% 8% 8%/14% 14% 6% 6%;
  background:color-mix(in srgb,var(--pro-surface) 88%,#000);box-shadow:0 1.6vmin 3vmin rgba(0,0,0,.32);
  transform:translate(-50%,-50%) rotate(var(--cpg-r,0deg)) scale(var(--cpg-s,1));transition:transform 1.1s cubic-bezier(.4,.1,.2,1)}
.cpg-obj::after{content:"";position:absolute;inset:16% 20%;border-radius:50%;background:color-mix(in srgb,var(--pro-surface) 96%,#000)}
.cpg-badge{position:absolute;top:2.4vmin;left:2.4vmin;font-size:clamp(8px,1.7vmin,10px);font-weight:800;
  letter-spacing:.03em;padding:.6vmin 1.6vmin;border-radius:999px;background:var(--pro-bg);color:var(--pro-accent);
  animation:cpg-pulse 2.4s ease-in-out infinite}
@keyframes cpg-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.cpg-dots{position:absolute;bottom:2vmin;left:50%;transform:translateX(-50%);display:flex;gap:1vmin}
.cpg-dot{width:1.3vmin;min-width:6px;height:1.3vmin;min-height:6px;border-radius:50%;background:rgba(13,17,23,.35)}
.cpg-dot.on{background:var(--pro-bg)}
.cpg-body{padding:3vmin 3.4vmin 3.4vmin;display:flex;flex-direction:column;gap:1.2vmin}
.cpg-brand{font-size:clamp(7px,1.5vmin,9px);color:var(--pro-muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.cpg-name{font-size:clamp(11px,2.6vmin,16px);font-weight:800;letter-spacing:-.01em}
.cpg-stars{display:flex;align-items:center;gap:.8vmin;font-size:clamp(8px,1.6vmin,10px);color:var(--pro-muted)}
.cpg-stars svg{width:1.7vmin;height:1.7vmin;min-width:10px;min-height:10px;color:var(--pro-accent)}
.cpg-row{display:flex;align-items:baseline;justify-content:space-between;gap:1.6vmin;margin-top:.6vmin}
.cpg-price{display:flex;align-items:baseline;gap:1vmin}
.cpg-now{font-size:clamp(16px,4vmin,24px);font-weight:800;font-variant-numeric:tabular-nums}
.cpg-was{font-size:clamp(9px,1.8vmin,12px);color:var(--pro-muted);text-decoration:line-through;font-variant-numeric:tabular-nums}
.cpg-cta{font-size:clamp(9px,1.8vmin,11px);font-weight:800;padding:1.3vmin 2.4vmin;border-radius:999px;
  background:var(--pro-accent);color:#1a1300;white-space:nowrap}
.cpg-live{font-size:clamp(7px,1.5vmin,9px);color:var(--pro-muted);font-variant-numeric:tabular-nums}
.cpg-live b{color:var(--pro-ok);font-weight:700}
.cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:var(--pro-muted);
  opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none;pointer-events:none}
@media (prefers-reduced-motion:reduce){.cpg-badge{animation:none}.cpg-obj,.cpg-media{transition:none}}
</style>
</head>
<body>
  <div class="cpg-stage">
    <div class="cpg-card" role="img"
         aria-label="Aurora Desk Lamp by Northwind Home, rated 4.8 from 312 reviews, $48 marked down from $60, with a rotating ambient product view and a live sold-today counter.">
      <div class="cpg-media" id="cpg-media">
        <div class="cpg-obj" id="cpg-obj"></div>
        <div class="cpg-badge">-20%</div>
        <div class="cpg-dots" id="cpg-dots" aria-hidden="true"></div>
      </div>
      <div class="cpg-body">
        <div class="cpg-brand">Northwind Home</div>
        <div class="cpg-name">Aurora Desk Lamp</div>
        <div class="cpg-stars" id="cpg-stars">&#9733;&#9733;&#9733;&#9733;&#9733; 4.8 (312)</div>
        <div class="cpg-row">
          <div class="cpg-price"><span class="cpg-now">$48.00</span><span class="cpg-was">$60.00</span></div>
          <div class="cpg-cta">Add to cart</div>
        </div>
        <div class="cpg-live" id="cpg-live"><b>&#9679;</b> 47 sold today</div>
      </div>
    </div>
  </div>
  <div class="cap" aria-hidden="true">Product Card Ambient Gallery</div>
  <script>(function(){"use strict";
    var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
    var media=document.getElementById('cpg-media'), obj=document.getElementById('cpg-obj'),
        dotsWrap=document.getElementById('cpg-dots'), live=document.getElementById('cpg-live');
    if(!media)return;
    // four ambient "angles": color-block pairing + silhouette rotation/scale
    var views=[
      {a:'var(--pro-accent)',b:'var(--pro-accent-2)',r:-4,s:1},
      {a:'var(--pro-accent-2)',b:'var(--pro-accent)',r:3,s:1.04},
      {a:'var(--pro-accent)',b:'#3fb950',r:0,s:.97},
      {a:'#3fb950',b:'var(--pro-accent)',r:5,s:1.02}
    ];
    for(var i=0;i<views.length;i++){
      var d=document.createElement('div'); d.className='cpg-dot'+(i===0?' on':''); dotsWrap.appendChild(d);
    }
    var dots=dotsWrap.children;
    function paint(i){
      var v=views[i];
      media.style.setProperty('--cpg-a',v.a);
      media.style.setProperty('--cpg-b',v.b);
      obj.style.setProperty('--cpg-r',v.r+'deg');
      obj.style.setProperty('--cpg-s',v.s);
      for(var k=0;k<dots.length;k++) dots[k].classList.toggle('on',k===i);
    }
    var sold=47;
    function bump(){ sold+=Math.random()<0.6?1:0; live.innerHTML='<b>&#9679;</b> '+sold+' sold today'; }
    paint(0);
    if(reduce)return;
    var running=true, idx=0, t=null, soldTimer=null;
    document.addEventListener('visibilitychange',function(){running=!document.hidden;});
    function loop(){
      t=setTimeout(function(){
        if(running){ idx=(idx+1)%views.length; paint(idx); }
        loop();
      },2600);
    }
    function soldLoop(){
      soldTimer=setTimeout(function(){ if(running) bump(); soldLoop(); },5200+Math.random()*2600);
    }
    loop(); soldLoop();
  })();</script>
