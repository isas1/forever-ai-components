<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A red triangular wedge drives into a recoiling black disc, scattering shards, then RED WEDGE slab type sets, on cream paper.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Red Wedge</title>
<style>
  :root{
    --cv02-bg:#0c0c0d;
    --cv02-red:#d11f1f;
    --cv02-red-deep:#9a1414;
    --cv02-paper:#ece6da;
    --cv02-ink:#0c0c0d;
  }
  html,body{margin:0;height:100%;background:var(--cv02-bg);overflow:hidden}
  .cv02-stage{
    position:fixed;inset:0;width:100%;height:100%;
    background:var(--cv02-bg);
    display:grid;place-items:center;
    font-family:"Helvetica Neue",Arial,system-ui,sans-serif;
  }
  .cv02-frame{position:relative;width:100%;height:100%}
  .cv02-svg{position:absolute;inset:0;width:100%;height:100%;display:block}

  /* drive of the wedge — transform only */
  .cv02-wedge{transform-box:fill-box;transform-origin:0% 50%;
    animation:cv02-drive 4.6s cubic-bezier(.7,0,.25,1) infinite both}
  @keyframes cv02-drive{
    0%   {transform:translateX(-14%) scaleX(.78)}
    44%  {transform:translateX(2%)   scaleX(1.06)}
    58%  {transform:translateX(0%)   scaleX(1)}
    100% {transform:translateX(-14%) scaleX(.78)}
  }
  /* black field recoils as it is struck */
  .cv02-field{transform-box:fill-box;transform-origin:100% 50%;
    animation:cv02-recoil 4.6s cubic-bezier(.7,0,.25,1) infinite both}
  @keyframes cv02-recoil{
    0%{transform:translateX(0)}
    44%{transform:translateX(2.4%)}
    62%{transform:translateX(.4%)}
    100%{transform:translateX(0)}
  }
  /* shards thrown from the impact point */
  .cv02-shard{transform-box:fill-box;transform-origin:50% 50%;
    animation:cv02-burst 4.6s cubic-bezier(.6,.02,.3,1) infinite both}
  @keyframes cv02-burst{
    0%,40%{transform:translate(0,0) rotate(0deg);opacity:0}
    52%{opacity:1}
    100%{transform:translate(var(--cv02-dx),var(--cv02-dy)) rotate(var(--cv02-r));opacity:0}
  }
  .cv02-bar{transform-box:fill-box;transform-origin:0% 50%;
    animation:cv02-sweep 4.6s cubic-bezier(.7,0,.25,1) infinite both}
  @keyframes cv02-sweep{
    0%{transform:scaleX(0)} 40%{transform:scaleX(0)}
    60%{transform:scaleX(1)} 92%{transform:scaleX(1)} 100%{transform:scaleX(0)}
  }
  .cv02-type{transform-box:fill-box;transform-origin:0% 100%;
    animation:cv02-set 4.6s cubic-bezier(.6,0,.2,1) infinite both}
  @keyframes cv02-set{
    0%,46%{opacity:0;transform:translateY(8%)}
    60%{opacity:1;transform:translateY(0)}
    92%{opacity:1;transform:translateY(0)}
    100%{opacity:0;transform:translateY(8%)}
  }

  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}

  @media (prefers-reduced-motion:reduce){
    .cv02-wedge,.cv02-field,.cv02-shard,.cv02-bar,.cv02-type{animation:none!important}
    .cv02-wedge{transform:translateX(0) scaleX(1)!important}
    .cv02-field{transform:none!important}
    .cv02-shard{opacity:0!important}
    .cv02-bar{transform:scaleX(1)!important}
    .cv02-type{opacity:1!important;transform:none!important}
  }
</style>
</head>
<body>
<div class="cv02-stage">
  <div class="cv02-frame" role="img" aria-label="A red triangular wedge driving into a black field, scattering geometric shards, in the Russian Constructivist style.">
    <svg class="cv02-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <!-- paper ground -->
      <rect x="0" y="0" width="100" height="100" fill="var(--cv02-paper)"/>
      <!-- thin red border rules -->
      <rect x="4" y="4" width="92" height="92" fill="none" stroke="var(--cv02-red)" stroke-width=".7"/>

      <!-- black field (the whites' circle, abstracted to a hard disc) -->
      <g class="cv02-field">
        <circle cx="70" cy="50" r="33" fill="var(--cv02-ink)"/>
      </g>

      <!-- diagonal red rule sweeping under -->
      <g class="cv02-bar">
        <rect x="6" y="78" width="60" height="4" fill="var(--cv02-red)" transform="rotate(-6 6 80)"/>
      </g>

      <!-- the red wedge -->
      <g class="cv02-wedge">
        <polygon points="2,50 64,24 64,76" fill="var(--cv02-red)"/>
        <polygon points="2,50 64,38 64,62" fill="var(--cv02-red-deep)"/>
      </g>

      <!-- shards thrown at impact -->
      <g>
        <polygon class="cv02-shard" style="--cv02-dx:14px;--cv02-dy:-22px;--cv02-r:140deg" points="68,34 78,30 73,40" fill="var(--cv02-ink)"/>
        <polygon class="cv02-shard" style="--cv02-dx:22px;--cv02-dy:-6px;--cv02-r:-110deg" points="80,48 90,45 84,53" fill="var(--cv02-ink)"/>
        <polygon class="cv02-shard" style="--cv02-dx:16px;--cv02-dy:20px;--cv02-r:160deg" points="70,62 80,66 72,70" fill="var(--cv02-ink)"/>
        <rect class="cv02-shard" style="--cv02-dx:26px;--cv02-dy:10px;--cv02-r:90deg" x="84" y="56" width="6" height="2.2" fill="var(--cv02-red)"/>
        <rect class="cv02-shard" style="--cv02-dx:18px;--cv02-dy:-18px;--cv02-r:-70deg" x="74" y="40" width="5" height="2" fill="var(--cv02-red)"/>
      </g>

      <!-- slab type -->
      <g class="cv02-type">
        <text x="9" y="20" fill="var(--cv02-ink)" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="11" letter-spacing="-.3" style="text-transform:uppercase">Red</text>
        <text x="9" y="32" fill="var(--cv02-red)" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="11" letter-spacing="-.3" style="text-transform:uppercase">Wedge</text>
      </g>
    </svg>
  </div>
</div>
<div class="cap">Red Wedge</div>
<script>
(function(){
  "use strict";
  var stage=document.querySelector(".cv02-stage");
  if(!stage) return;
  var anims=stage.querySelectorAll('[class*="cv02-"]');
  function setState(state){
    for(var i=0;i<anims.length;i++){ anims[i].style.animationPlayState=state; }
  }
  document.addEventListener("visibilitychange",function(){
    setState(document.hidden?"paused":"running");
  });
})();
</script>
</body>
</html>
