<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A large tilted black square plus red and off-white bars, squares and a dot drift in slow suprematist suspension on near-black.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Floating Forms</title>
<style>
  html,body{margin:0;height:100%;background:#0c0c0d}
  #cv04-stage{position:fixed;inset:0;overflow:hidden;background:#0c0c0d;
    contain:layout paint size}
  /* static suprematist field; only transform/opacity animate */
  .cv04-f{position:absolute;will-change:transform,opacity;
    transform:translate3d(0,0,0) rotate(var(--r,0deg));
    transform-origin:center;backface-visibility:hidden}
  .cv04-blk{background:#111114}
  .cv04-red{background:#d11f1f}
  .cv04-wht{background:#e8e4d8}
  .cv04-line{background:#d11f1f}
  /* drift cycles — each form gets its own duration/offset, pure transform */
  @keyframes cv04-drift{
    0%  {transform:translate3d(0,0,0) rotate(var(--r,0deg))}
    50% {transform:translate3d(var(--dx,0px),var(--dy,0px),0) rotate(calc(var(--r,0deg) + var(--dr,0deg)))}
    100%{transform:translate3d(0,0,0) rotate(var(--r,0deg))}
  }
  @keyframes cv04-breathe{0%,100%{opacity:1}50%{opacity:.62}}
  .cv04-f{animation:cv04-drift var(--dur,9s) ease-in-out var(--del,0s) infinite}
  .cv04-soft{animation:cv04-drift var(--dur,9s) ease-in-out var(--del,0s) infinite,
    cv04-breathe calc(var(--dur,9s) * .5) ease-in-out var(--del,0s) infinite}
  /* the suprematist black square anchor — dominant, slow */
  #cv04-anchor{
    left:34%;top:30%;width:34%;aspect-ratio:1;
    --r:-9deg;--dx:14px;--dy:-18px;--dr:3deg;--dur:13s}
  #cv04-redbar{
    left:14%;top:54%;width:46%;height:7.5%;
    --r:26deg;--dx:26px;--dy:-12px;--dr:-2deg;--dur:10s;--del:-2s}
  #cv04-redsq{
    left:60%;top:18%;width:13%;aspect-ratio:1;
    --r:14deg;--dx:-22px;--dy:24px;--dr:8deg;--dur:11s;--del:-4s}
  #cv04-wbar{
    left:24%;top:20%;width:30%;height:3.4%;
    --r:-26deg;--dx:18px;--dy:16px;--dr:-4deg;--dur:8.5s;--del:-1s}
  #cv04-wsq{
    left:68%;top:60%;width:9%;aspect-ratio:1;
    --r:-18deg;--dx:-16px;--dy:-20px;--dr:6deg;--dur:9.5s;--del:-3s}
  #cv04-thin{
    left:8%;top:12%;width:64%;height:1.1%;
    --r:18deg;--dx:30px;--dy:8px;--dr:1deg;--dur:12s;--del:-5s}
  #cv04-dot{
    left:48%;top:74%;width:5.5%;aspect-ratio:1;border-radius:50%;
    --r:0deg;--dx:-12px;--dy:-26px;--dr:0deg;--dur:7.5s;--del:-2s}
  #cv04-tilt{
    left:78%;top:38%;width:8%;height:8%;
    --r:42deg;--dx:-14px;--dy:18px;--dr:-6deg;--dur:10.5s;--del:-6s}
  /* static red glow under the anchor — does NOT animate (no repaint) */
  #cv04-glow{position:absolute;left:30%;top:26%;width:42%;height:42%;
    border-radius:50%;
    background:radial-gradient(circle,rgba(209,31,31,.34),rgba(209,31,31,0) 68%);
    pointer-events:none}
  .cv04-cap{position:fixed;left:8px;bottom:7px;
    font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;
    letter-spacing:.08em;text-transform:uppercase;user-select:none;z-index:5}
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
    .cv04-f{transform:translate3d(0,0,0) rotate(var(--r,0deg))!important;opacity:1!important}
  }
</style>

</head>
<body>
<div id="cv04-stage" role="img" aria-label="Constructivist composition: a large tilted black square with red and off-white bars and squares drifting in dynamic suspension on a near-black field.">
  <div id="cv04-glow"></div>
  <div class="cv04-f cv04-line" id="cv04-thin"></div>
  <div class="cv04-f cv04-wht" id="cv04-wbar"></div>
  <div class="cv04-f cv04-soft cv04-blk" id="cv04-anchor"></div>
  <div class="cv04-f cv04-red" id="cv04-redbar"></div>
  <div class="cv04-f cv04-soft cv04-red" id="cv04-redsq"></div>
  <div class="cv04-f cv04-wht" id="cv04-wsq"></div>
  <div class="cv04-f cv04-red" id="cv04-dot"></div>
  <div class="cv04-f cv04-wht" id="cv04-tilt"></div>
</div>
<div class="cv04-cap">Floating Forms</div>
<script>
(function(){
  "use strict";
  var stage=document.getElementById("cv04-stage");
  if(!stage)return;
  var forms=stage.getElementsByClassName("cv04-f");
  var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
  function setState(s){
    for(var i=0;i<forms.length;i++){forms[i].style.animationPlayState=s;}
  }
  if(reduce){setState("paused");return;}
  // CSS-only motion: pause when tab hidden, resume on return.
  document.addEventListener("visibilitychange",function(){
    setState(document.hidden?"paused":"running");
  });
})();
</script>
</body>
