<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Industrial ink and red gears mesh and spin while red diagonal bars slam in and GEAR POSTER slab type assembles on paper.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gear Poster</title>
<style>
  :root{--cv06-bg:#0c0c0d;--cv06-red:#d11f1f;--cv06-ink:#f2ede4;--cv06-paper:#ded4c4}
  html,body{margin:0;height:100%;background:var(--cv06-bg)}
  #cv06-stage{position:fixed;inset:0;overflow:hidden;background:var(--cv06-bg);
    display:grid;place-items:center;font-family:"Helvetica Neue",Arial,sans-serif}
  #cv06-art{position:absolute;inset:0;width:100%;height:100%}
  /* gears spin slowly, opposite directions */
  .cv06-g{transform-box:fill-box;transform-origin:center;
    animation:cv06-spin 14s linear infinite}
  .cv06-g.r{animation-direction:reverse;animation-duration:9s}
  @keyframes cv06-spin{to{transform:rotate(360deg)}}
  /* diagonal bars slam in then hold */
  .cv06-bar{transform-box:fill-box;transform-origin:center;
    animation:cv06-slam 3.4s cubic-bezier(.16,1,.3,1) infinite}
  .cv06-bar.b2{animation-delay:.18s}
  .cv06-bar.b3{animation-delay:.36s}
  @keyframes cv06-slam{
    0%{transform:translate(28px,-30px) scaleX(.2);opacity:0}
    22%,86%{transform:translate(0,0) scaleX(1);opacity:1}
    100%{transform:translate(28px,-30px) scaleX(.2);opacity:0}}
  /* slab text assembles */
  .cv06-tg{transform-box:fill-box;transform-origin:left center;
    animation:cv06-set 3.4s cubic-bezier(.16,1,.3,1) infinite}
  .cv06-tg.t2{animation-delay:.5s}
  @keyframes cv06-set{
    0%,16%{transform:translateY(22px) scaleY(.04);opacity:0}
    40%,84%{transform:translateY(0) scaleY(1);opacity:1}
    100%{transform:translateY(22px) scaleY(.04);opacity:0}}
  .cv06-spark{transform-box:fill-box;transform-origin:center;
    animation:cv06-pulse 3.4s ease-in-out infinite}
  @keyframes cv06-pulse{0%,30%{transform:scale(0);opacity:0}
    46%{transform:scale(1.15);opacity:1}70%,100%{transform:scale(1);opacity:.9}}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
    .cv06-bar,.cv06-tg,.cv06-spark,.cv06-g{animation:none!important;opacity:1!important;transform:none!important}}
</style>
<script type="application/json" id="forever-agent-meta">

</head>
<body>
<div id="cv06-stage">
  <svg id="cv06-art" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice"
       role="img" aria-label="Constructivist poster: industrial gears and bold red diagonal bars assembling around the words GEAR POSTER.">
    <defs>
      <!-- one static gear path reused -->
      <g id="cv06-gear">
        <path d="M0,-58 6,-56 9,-44 21,-39 31,-46 38,-43 33,-31 41,-21 53,-23 56,-15
                 46,-8 47,4 58,9 56,17 44,17 40,28 47,38 41,44 31,38 21,46 23,57
                 15,58 9,47 -3,48 -8,58 -16,55 -14,43 -25,38 -36,45 -42,38 -34,28
                 -40,16 -52,17 -54,9 -43,4 -45,-8 -56,-13 -53,-21 -41,-20 -36,-31
                 -43,-41 -36,-46 -27,-39 -16,-45 -16,-56 -8,-58 Z"/>
        <circle r="18" fill="var(--cv06-bg)"/>
      </g>
    </defs>

    <!-- background division: paper wedge driven on a diagonal -->
    <polygon points="0,0 400,0 400,150 0,300" fill="var(--cv06-paper)" opacity=".10"/>
    <polygon points="400,400 0,400 0,250 400,120" fill="var(--cv06-red)" opacity=".14"/>

    <!-- big slow gear, lower left, ink -->
    <g transform="translate(96,300)">
      <use href="#cv06-gear" class="cv06-g" fill="var(--cv06-ink)" transform="scale(1.55)"/>
    </g>
    <!-- mid red gear meshing, upper right -->
    <g transform="translate(312,96)">
      <use href="#cv06-gear" class="cv06-g r" fill="var(--cv06-red)" transform="scale(1.05)"/>
    </g>
    <!-- small ink gear center -->
    <g transform="translate(214,214)">
      <use href="#cv06-gear" class="cv06-g" fill="var(--cv06-ink)" transform="scale(.62)"/>
    </g>

    <!-- diagonal propaganda bars -->
    <g transform="rotate(-26 200 200)">
      <rect class="cv06-bar" x="40" y="92" width="320" height="26" fill="var(--cv06-red)"/>
      <rect class="cv06-bar b2" x="40" y="124" width="244" height="13" fill="var(--cv06-ink)"/>
      <rect class="cv06-bar b3" x="40" y="143" width="300" height="8" fill="var(--cv06-red)"/>
    </g>

    <!-- spark rivet at the mesh point -->
    <circle class="cv06-spark" cx="206" cy="206" r="10" fill="var(--cv06-paper)"/>

    <!-- assembling slab type, rotated to the diagonal grid -->
    <g transform="rotate(-26 200 200)" font-weight="900" letter-spacing="2">
      <text class="cv06-tg" x="46" y="232" font-size="56"
            fill="var(--cv06-ink)" style="font-stretch:condensed">GEAR</text>
      <text class="cv06-tg t2" x="46" y="290" font-size="40"
            fill="var(--cv06-red)" style="font-stretch:condensed">POSTER</text>
    </g>

    <!-- corner registration marks -->
    <g stroke="var(--cv06-ink)" stroke-width="3" opacity=".7">
      <path d="M14,14 h22 M14,14 v22"/>
      <path d="M386,386 h-22 M386,386 v-22"/>
    </g>
  </svg>
  <div class="cap">Gear Poster</div>
</div>
<script>
(function(){
  "use strict";
  var stage=document.getElementById("cv06-stage");
  var svg=document.getElementById("cv06-art");
  var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
  if(reduce){
    // settle to one composed frame: stop SVG/SMIL not used; CSS @media handles statics
    return;
  }
  // pause CSS animations when tab hidden — no rAF, pure declarative
  var nodes=stage.querySelectorAll(".cv06-g,.cv06-bar,.cv06-tg,.cv06-spark");
  function setState(s){for(var i=0;i<nodes.length;i++)nodes[i].style.animationPlayState=s;}
  document.addEventListener("visibilitychange",function(){
    setState(document.hidden?"paused":"running");
  });
})();
</script>
</body>
</html>
