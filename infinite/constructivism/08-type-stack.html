<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Heavy slab letters spelling TYPE STACK 1923 shift and pop along a tilted red propaganda axis on a dark grid, a square ticking across.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Type Stack</title>
<style>
  :root{--cv08-bg:#0c0c0d;--cv08-red:#d11f1f;--cv08-ink:#0c0c0d;--cv08-paper:#f3ede1;--cv08-gray:#6f6f72}
  html,body{margin:0;height:100%;background:var(--cv08-bg)}
  .cv08-stage{position:fixed;inset:0;overflow:hidden;background:
    repeating-linear-gradient(115deg,transparent 0 38px,rgba(255,255,255,.022) 38px 39px),
    var(--cv08-bg)}
  /* diagonal red bar — static, set the propaganda axis */
  .cv08-bar{position:absolute;left:-12%;top:50%;width:124%;height:13%;
    background:var(--cv08-red);transform:translateY(-50%) rotate(-19deg);
    box-shadow:0 0 0 2px var(--cv08-bg),0 0 34px rgba(209,31,31,.34)}
  .cv08-wedge{position:absolute;left:0;bottom:0;width:0;height:0;
    border-left:46vmin solid transparent;border-bottom:30vmin solid var(--cv08-paper);opacity:.07}
  /* the type stack — heavy slabs on a tilted grid */
  .cv08-stack{position:absolute;left:50%;top:50%;
    transform:translate(-50%,-50%) rotate(-19deg);
    display:flex;flex-direction:column;gap:1.1vmin}
  .cv08-row{display:flex;align-items:stretch;will-change:transform}
  .cv08-slab{font:900 clamp(34px,15vmin,116px)/.78 "Arial Narrow",Impact,system-ui,sans-serif;
    letter-spacing:-.03em;text-transform:uppercase;padding:0 .12em;
    display:flex;align-items:center;justify-content:center;will-change:transform,opacity}
  .cv08-on{background:var(--cv08-red);color:var(--cv08-paper)}
  .cv08-off{background:var(--cv08-paper);color:var(--cv08-ink)}
  .cv08-blk{background:var(--cv08-ink);color:var(--cv08-paper);box-shadow:inset 0 0 0 1px #2a2a2c}
  /* a single tick — square chasing the axis */
  .cv08-tick{position:absolute;width:4.4vmin;height:4.4vmin;background:var(--cv08-paper);
    left:50%;top:50%;transform:translate(-50%,-50%) rotate(-19deg);
    box-shadow:0 0 0 2px var(--cv08-bg)}

  @keyframes cv08-shiftA{0%,14%{transform:translateX(0)}28%,62%{transform:translateX(11%)}76%,100%{transform:translateX(0)}}
  @keyframes cv08-shiftB{0%,18%{transform:translateX(0)}32%,66%{transform:translateX(-13%)}80%,100%{transform:translateX(0)}}
  @keyframes cv08-shiftC{0%,22%{transform:translateX(0)}36%,70%{transform:translateX(7%)}84%,100%{transform:translateX(0)}}
  @keyframes cv08-pop{0%,8%{opacity:0;transform:translateY(40%)}20%,100%{opacity:1;transform:translateY(0)}}
  @keyframes cv08-tickRun{0%{transform:translate(-50%,-50%) rotate(-19deg) translate(-30vmin,-30vmin)}
    50%{transform:translate(-50%,-50%) rotate(-19deg) translate(30vmin,30vmin)}
    100%{transform:translate(-50%,-50%) rotate(-19deg) translate(-30vmin,-30vmin)}}

  .cv08-r1{animation:cv08-shiftA 6.4s cubic-bezier(.7,0,.2,1) infinite}
  .cv08-r2{animation:cv08-shiftB 6.4s cubic-bezier(.7,0,.2,1) infinite}
  .cv08-r3{animation:cv08-shiftC 6.4s cubic-bezier(.7,0,.2,1) infinite}
  .cv08-r1 .cv08-slab{animation:cv08-pop 6.4s cubic-bezier(.7,0,.2,1) infinite}
  .cv08-r2 .cv08-slab{animation:cv08-pop 6.4s cubic-bezier(.7,0,.2,1) infinite .12s}
  .cv08-r3 .cv08-slab{animation:cv08-pop 6.4s cubic-bezier(.7,0,.2,1) infinite .24s}
  .cv08-tick{animation:cv08-tickRun 6.4s cubic-bezier(.7,0,.2,1) infinite}

  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
    .cv08-r1,.cv08-r2,.cv08-r3{transform:none}
    .cv08-r2{transform:translateX(-13%)}
    .cv08-r3{transform:translateX(7%)}
    .cv08-slab{opacity:1!important;transform:none!important}
    .cv08-tick{transform:translate(-50%,-50%) rotate(-19deg) translate(30vmin,30vmin)}
  }
</style>

</head>
<body>
  <div class="cv08-stage" id="cv08-stage" role="img" aria-label="Constructivist composition: heavy slab letters spelling type, stacking and sliding along a diagonal red axis on a black grid.">
    <span class="cv08-wedge"></span>
    <span class="cv08-bar"></span>
    <span class="cv08-tick"></span>
    <div class="cv08-stack" aria-hidden="true">
      <div class="cv08-row cv08-r1">
        <span class="cv08-slab cv08-on">T</span><span class="cv08-slab cv08-off">Y</span><span class="cv08-slab cv08-blk">P</span><span class="cv08-slab cv08-off">E</span>
      </div>
      <div class="cv08-row cv08-r2">
        <span class="cv08-slab cv08-off">S</span><span class="cv08-slab cv08-blk">T</span><span class="cv08-slab cv08-on">A</span><span class="cv08-slab cv08-off">C</span><span class="cv08-slab cv08-blk">K</span>
      </div>
      <div class="cv08-row cv08-r3">
        <span class="cv08-slab cv08-blk">1</span><span class="cv08-slab cv08-on">9</span><span class="cv08-slab cv08-off">2</span><span class="cv08-slab cv08-blk">3</span>
      </div>
    </div>
  </div>
  <div class="cap">Type Stack</div>
  <script>
  (function(){
    "use strict";
    var reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
    var stage = document.getElementById('cv08-stage');
    if(reduce) return; // CSS settles to a static on-brand frame
    // Pause/resume CSS animations on tab visibility — single source of truth.
    function setPlay(state){
      var n = stage.querySelectorAll('.cv08-r1,.cv08-r2,.cv08-r3,.cv08-slab,.cv08-tick');
      for(var i=0;i<n.length;i++){ n[i].style.animationPlayState = state; }
    }
    document.addEventListener('visibilitychange',function(){
      setPlay(document.hidden ? 'paused' : 'running');
    });
  })();
  </script>
</body>
</html>
