<title>Comet Streak Loop</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#030a14;}
  #c{display:block;width:100%;height:100%;}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1.2 system-ui,sans-serif;
       letter-spacing:.08em;color:#bff0ff;opacity:.34;text-transform:uppercase;
       pointer-events:none;user-select:none;}
</style>

  "max comet count cap (comets.length < 5)",
  "travel direction vector (dx=-0.78, dy=0.62)",

 ],

<body>
<canvas id="c"></canvas>
<div class="cap">Comet Streak Loop</div>
<script>
(function(){
  const cv=document.getElementById('c'),ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let W,H,DPR;
  function size(){
    DPR=Math.min(devicePixelRatio||1,2);
    W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  addEventListener('resize',size);size();
  const bg=[];for(let i=0;i<60;i++)bg.push({x:Math.random(),y:Math.random(),r:Math.random()*1.2});
  const comets=[];
  // direction: top-right -> bottom-left, slight variance
  function spawn(p0){
    comets.push({
      p:p0,
      sp:0.0045+Math.random()*0.004,
      lane:0.1+Math.random()*0.8,        // vertical start offset
      len:0.20+Math.random()*0.13,
      hue:Math.random()<0.5?'#7fe8ff':'#c9b6ff'
    });
  }
  spawn(0.1);spawn(0.55);
  let t=0;
  cv.addEventListener('pointerdown',()=>{if(comets.length<5)spawn(0);});
  function frame(){
    t++;
    ctx.fillStyle='#030a14';ctx.fillRect(0,0,W,H);
    bg.forEach(s=>{ctx.globalAlpha=0.3+0.5*Math.abs(Math.sin(t*0.02+s.x*9));
      ctx.fillStyle='#9fc4ff';ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fill();});
    ctx.globalAlpha=1;
    const dx=-0.78,dy=0.62; // travel direction (down-left)
    for(let i=comets.length-1;i>=0;i--){
      const c=comets[i];
      if(!reduce)c.p+=c.sp;
      // head position interpolated from off-screen top-right to off-screen bottom-left
      const px=W*(1.2-1.5*c.p);
      const py=H*(c.lane-0.35)+H*1.0*c.p;
      const tlen=Math.hypot(W,H)*c.len;
      const tx=px-dx*tlen, ty=py-dy*tlen;
      const grad=ctx.createLinearGradient(px,py,tx,ty);
      grad.addColorStop(0,c.hue);grad.addColorStop(1,'rgba(120,180,255,0)');
      ctx.strokeStyle=grad;ctx.lineWidth=2.4;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(tx,ty);ctx.stroke();
      ctx.fillStyle='#fff';ctx.shadowColor=c.hue;ctx.shadowBlur=10;
      ctx.beginPath();ctx.arc(px,py,2.6,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      if(c.p>1.3){comets.splice(i,1);spawn(0);}
    }
    raf=requestAnimationFrame(frame);
  }
  let raf=0;
  function start(){if(!raf)raf=requestAnimationFrame(frame);}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>{document.hidden?stop():start();});
  if(reduce){frame();}else start();
})();
</script>
</body>
</html>
