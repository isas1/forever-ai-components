<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Star streaks rush outward from a glowing center in a hyperspace warp; pressing the pointer accelerates the speed dramatically.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hyperspace Warp Streaks</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#02030a;}
  #c{display:block;width:100%;height:100%;}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1.2 system-ui,sans-serif;
       letter-spacing:.08em;color:#cdd8ff;opacity:.32;text-transform:uppercase;
       pointer-events:none;user-select:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="cap">Hyperspace Warp</div>
<script>
(function(){
  const cv=document.getElementById('c'),ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let W,H,DPR,cx,cy;
  function size(){
    DPR=Math.min(devicePixelRatio||1,2);
    W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
    cx=W/2;cy=H/2;
  }
  addEventListener('resize',size);size();
  const N=110,stars=[];
  function mk(s){const a=Math.random()*Math.PI*2;return{a,z:s?Math.random():1,
    sp:0.008+Math.random()*0.02,c:Math.random()<0.25?'#9fdcff':(Math.random()<0.4?'#ffd1f0':'#ffffff')};}
  for(let i=0;i<N;i++)stars.push(mk(true));
  let speed=1,target=1;
  cv.addEventListener('pointerdown',()=>{target=2.6;});
  cv.addEventListener('pointerup',()=>{target=1;});
  cv.addEventListener('pointerleave',()=>{target=1;});
  function frame(){
    speed+=(target-speed)*0.06;
    ctx.fillStyle='rgba(2,3,10,0.34)';ctx.fillRect(0,0,W,H);
    const maxR=Math.hypot(W,H)/2;
    stars.forEach(s=>{
      if(!reduce)s.z+=s.sp*speed;
      if(s.z>=1){Object.assign(s,mk(false));s.z=0.001;}
      const r0=s.z*maxR, r1=(s.z+ s.sp*speed*12)*maxR;
      const x0=cx+Math.cos(s.a)*r0,y0=cy+Math.sin(s.a)*r0;
      const x1=cx+Math.cos(s.a)*r1,y1=cy+Math.sin(s.a)*r1;
      ctx.strokeStyle=s.c;ctx.globalAlpha=Math.min(1,s.z*1.5);
      ctx.lineWidth=0.6+s.z*2.2;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();
    });
    ctx.globalAlpha=1;
    // center glow
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,40);
    g.addColorStop(0,'rgba(180,210,255,0.5)');g.addColorStop(1,'rgba(180,210,255,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,40,0,Math.PI*2);ctx.fill();
    raf=requestAnimationFrame(frame);
  }
  let raf=0;
  function start(){if(!raf)raf=requestAnimationFrame(frame);}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>{document.hidden?stop():start();});
  if(reduce){ctx.fillStyle='#02030a';ctx.fillRect(0,0,W,H);frame();}else start();
})();
</script>
</body>
</html>
