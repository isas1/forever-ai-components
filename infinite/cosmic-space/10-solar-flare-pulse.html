<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Fiery orange sun with pulsing corona, radiating flare spikes and arcing prominences; clicking kicks a brighter solar burst.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solar Flare Pulse</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#1a0703;}
  #c{display:block;width:100%;height:100%;}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1.2 system-ui,sans-serif;
       letter-spacing:.08em;color:#ffe2b0;opacity:.36;text-transform:uppercase;
       pointer-events:none;user-select:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="cap">Solar Flare Pulse</div>
<script>
(function(){
  const cv=document.getElementById('c'),ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let W,H,DPR,cx,cy,R;
  function size(){
    DPR=Math.min(devicePixelRatio||1,2);
    W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
    cx=W/2;cy=H/2;R=Math.min(W,H)*0.21;
  }
  addEventListener('resize',size);size();
  const M=60,flares=[];
  for(let i=0;i<M;i++)flares.push({a:Math.random()*Math.PI*2,
    base:0.4+Math.random()*0.5,ph:Math.random()*6.28,sp:0.6+Math.random()*1.4});
  // arcing prominences
  const arcs=[];for(let i=0;i<5;i++)arcs.push({a:Math.random()*6.28,sz:0.5+Math.random()*0.5,ph:Math.random()*6.28,sp:0.4+Math.random()*0.5});
  let t=0,kick=0;
  cv.addEventListener('pointerdown',()=>{kick=1;});
  function frame(){
    t+=reduce?0:0.02;kick*=0.93;
    ctx.fillStyle='#1a0703';ctx.fillRect(0,0,W,H);
    const pulse=0.5+0.5*Math.sin(t*1.3)+kick;
    // corona
    const cg=ctx.createRadialGradient(cx,cy,R*0.7,cx,cy,R*(2.4+pulse*0.5));
    cg.addColorStop(0,'rgba(255,160,40,0.5)');
    cg.addColorStop(0.5,'rgba(255,90,20,0.18)');
    cg.addColorStop(1,'rgba(255,60,10,0)');
    ctx.fillStyle=cg;ctx.beginPath();ctx.arc(cx,cy,R*(2.4+pulse*0.5),0,Math.PI*2);ctx.fill();
    // flare spikes
    ctx.save();ctx.translate(cx,cy);
    flares.forEach(f=>{
      const len=R*(f.base+0.35*(0.5+0.5*Math.sin(t*f.sp+f.ph))+kick*0.6);
      const x=Math.cos(f.a)*R,y=Math.sin(f.a)*R;
      const x2=Math.cos(f.a)*(R+len),y2=Math.sin(f.a)*(R+len);
      const g=ctx.createLinearGradient(x,y,x2,y2);
      g.addColorStop(0,'rgba(255,210,120,0.8)');g.addColorStop(1,'rgba(255,90,30,0)');
      ctx.strokeStyle=g;ctx.lineWidth=2;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x2,y2);ctx.stroke();
    });
    // prominences (arcs)
    arcs.forEach(a=>{
      const h=R*(0.5+a.sz*(0.6+0.4*Math.sin(t*a.sp+a.ph)));
      const mx=Math.cos(a.a)*(R+h*0.6),my=Math.sin(a.a)*(R+h*0.6);
      const w=0.4;
      const x1=Math.cos(a.a-w)*R,y1=Math.sin(a.a-w)*R;
      const x2=Math.cos(a.a+w)*R,y2=Math.sin(a.a+w)*R;
      ctx.strokeStyle='rgba(255,140,50,0.5)';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.quadraticCurveTo(mx,my,x2,y2);ctx.stroke();
    });
    ctx.restore();
    // sun body
    const sg=ctx.createRadialGradient(cx-R*0.3,cy-R*0.3,R*0.1,cx,cy,R);
    sg.addColorStop(0,'#fff2c0');sg.addColorStop(0.6,'#ffae3a');sg.addColorStop(1,'#e8521a');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(cx,cy,R*(1+kick*0.04),0,Math.PI*2);ctx.fill();
    // surface mottling
    ctx.save();ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.clip();
    for(let i=0;i<10;i++){
      const a=t*0.2+i*2.1, rr=R*(0.2+ (i%5)*0.16);
      ctx.fillStyle='rgba(200,60,10,0.18)';
      ctx.beginPath();ctx.arc(cx+Math.cos(a)*rr,cy+Math.sin(a*1.3)*rr,R*0.18,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
    raf=requestAnimationFrame(frame);
  }
  let raf=0;
  function start(){if(!raf)raf=requestAnimationFrame(frame);}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>{document.hidden?stop():start();});
  if(reduce){frame();}else start();
})();
</script>
</body>
</html>
