<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Labeled nested rings dilate outward from atom to cosmic web, an endless logarithmic scale journey accelerated by pointer interaction.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Logarithmic Zoom Journey</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#05060d;}
  #lzj{display:block;width:100%;height:100%;}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1.2 ui-monospace,Menlo,monospace;
       letter-spacing:.12em;color:#7fd4ff;opacity:.34;text-transform:uppercase;
       pointer-events:none;user-select:none;}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/cosmic-space/11-logarithmic-zoom-journey.html",
 "title": "Logarithmic Zoom Journey",
 "description": "Nested labeled rings dilate outward from a glowing core through 10 cosmic scales (atom to cosmic web); pointer and click accelerate the zoom drift.",
 "useWhen": "Space-themed hero backgrounds, science/data viz intros, ambient screensaver-style displays needing infinite-zoom metaphor.",
 "avoidWhen": "Light-background layouts (background hardcoded dark navy). Contexts where label text competes with page content.",
 "agentPrompt": "Change RUNGS labels and colors to geological timescales, set GAP to 2.0 to widen ring spacing, and increase baseR from U*0.052 to U*0.065.",
 "editableAreas": [
  "zoom speed (t increment divisor 520)",
  "ring gap (GAP=1.7)",
  "base ring size (baseR=U*0.052)",
  "rung labels and colors (RUNGS array)",
  "pointer boost strength (0.25 / cap 2.2)",
  "dot count per rung (dots property)"
 ],
 "preserveElements": [
  "DPR-aware canvas sizing",
  "visibilitychange pause/resume",
  "reduced-motion static-frame fallback",
  "IIFE wrapper"
 ],
 "knownLimitations": [
  "Background color hardcoded in CSS and canvas fillRect — must change both to alter background",
  "Reduced-motion fallback is a single static frame, not a fully static layout",
  "ringAt() helper function is defined but unused — actual radius computed inline"
 ],
 "tier": "curated",
 "labels": [
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps",
  "agent-ready"
 ],
 "tags": [
  "canvas",
  "zoom",
  "space",
  "rings",
  "logarithmic",
  "ambient",
  "generative"
 ]
}
</script>
</head>
<body>
<canvas id="lzj"></canvas>
<div class="cap">Logarithmic Zoom Journey</div>
<script>
(function(){
  const cv=document.getElementById('lzj'),ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let W,H,DPR,cx,cy,U;
  function size(){
    DPR=Math.min(devicePixelRatio||1,2);
    W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
    cx=W/2;cy=H/2;U=Math.min(W,H);
  }
  addEventListener('resize',size);size();
  // Each rung = one decade of scale. r = base radius in screen units.
  const RUNGS=[
    {label:'COSMIC WEB',     dots:0, c:'#9fb4ff'},
    {label:'GALAXY CLUSTER', dots:0, c:'#a8c4ff'},
    {label:'GALAXY',         dots:1, c:'#7fd4ff'},
    {label:'STAR CLUSTER',   dots:0, c:'#bfeaff'},
    {label:'SOLAR SYSTEM',   dots:1, c:'#ffe6a8'},
    {label:'STAR',           dots:0, c:'#fff0c8'},
    {label:'PLANET',         dots:1, c:'#9fe8d0'},
    {label:'MOON',           dots:0, c:'#cfe6ff'},
    {label:'ATOM',           dots:2, c:'#cfa8ff'},
    {label:'HYDROGEN',       dots:0, c:'#e6cfff'},
  ];
  const N=RUNGS.length, GAP=1.7;           // log-spacing between rungs
  // fixed star/feature field per rung so structures persist as they dilate
  const field=RUNGS.map((r,i)=>{
    const pts=[],seed=i*97+13;
    let s=seed; const rnd=()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};
    const cnt= r.dots===2?2 : (12+(i%3)*6);
    for(let k=0;k<cnt;k++){
      pts.push({a:rnd()*Math.PI*2, rr:0.35+rnd()*0.6, sz:0.4+rnd()*0.9, sp:(rnd()-0.5)*0.4});
    }
    return pts;
  });
  let t=0,boost=0;
  cv.addEventListener('pointermove',()=>{boost=Math.min(boost+0.25,2.2);});
  cv.addEventListener('click',()=>{boost=2.6;});

  function ringAt(level,base){
    // level: continuous log-position (0=outermost cosmic). returns screen radius
    return base*Math.pow(2.0,(level)/GAP*Math.LN2/Math.LN2*GAP);
  }
  function draw(){
    ctx.fillStyle='#05060d';ctx.fillRect(0,0,W,H);
    const phase=(t/520)%1;                  // 0..1 progress through one decade
    const baseR=U*0.052;
    for(let i=0;i<N;i++){
      // continuous index, smaller i = deeper/inner; we dilate outward
      const idx=i - phase;                  // shifts outward over time
      const k=idx/GAP;
      const r=baseR*Math.pow(2.0,k);
      if(r<baseR*0.5||r>U*0.95) continue;
      const ring=RUNGS[(i%N+N)%N];
      // fade in near birth (small), fade out at edge
      const fIn=Math.min(1,(r/(baseR*1.4)-0.5)*2.2);
      const fOut=1-Math.max(0,(r/(U*0.92)-0.55)/0.45);
      const al=Math.max(0,Math.min(1,fIn))*Math.max(0,Math.min(1,fOut));
      if(al<=0.01) continue;
      // nested ring
      ctx.lineWidth=1.1;
      ctx.strokeStyle=hexA(ring.c,0.18*al);
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
      // brighter inner accent ring
      ctx.strokeStyle=hexA(ring.c,0.55*al);
      ctx.beginPath();ctx.arc(cx,cy,r,-0.9,-0.9+2.4);ctx.stroke();
      // structure dots orbiting on this shell
      const pts=field[(i%N+N)%N];
      ctx.fillStyle=hexA(ring.c,0.9*al);
      pts.forEach(p=>{
        const a=p.a+t*p.sp*0.004*(1+boost*0.4);
        const rr=r*p.rr;
        const x=cx+Math.cos(a)*rr, y=cy+Math.sin(a)*rr;
        ctx.globalAlpha=al;
        ctx.beginPath();ctx.arc(x,y,p.sz*(U/420),0,Math.PI*2);ctx.fill();
      });
      ctx.globalAlpha=1;
      // scale label fading in on the ring (right side)
      const lab=ring.label;
      const fs=Math.max(9,Math.min(15,U*0.026));
      ctx.font='600 '+fs+'px ui-monospace,Menlo,monospace';
      ctx.fillStyle=hexA(ring.c,0.85*al);
      ctx.textBaseline='middle';
      const lx=cx+Math.cos(-0.42)*r+6, ly=cy+Math.sin(-0.42)*r;
      ctx.fillText(lab,lx,ly);
      ctx.textBaseline='alphabetic';
    }
    // central core: the breath point
    const pulse=0.5+0.5*Math.sin(t*0.02);
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,baseR*0.62);
    g.addColorStop(0,hexA('#dff2ff',0.95));
    g.addColorStop(0.5,hexA('#7fd4ff',0.5+0.2*pulse));
    g.addColorStop(1,hexA('#7fd4ff',0));
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,baseR*0.62,0,Math.PI*2);ctx.fill();
  }
  function hexA(h,a){
    const n=parseInt(h.slice(1),16);
    return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a.toFixed(3)+')';
  }
  function frame(){
    boost*=0.95;
    t+=1+boost*1.6;
    draw();
    raf=requestAnimationFrame(frame);
  }
  let raf=0;
  function start(){if(!raf)raf=requestAnimationFrame(frame);}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>{document.hidden?stop():start();});
  if(reduce){t=180;draw();}else start();
})();
</script>
</body>
</html>
