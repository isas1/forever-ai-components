<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A planet repeatedly crosses a limb-darkened star while a live light-curve panel below plots the dimming flux dip with a glowing read-head.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Exoplanet Transit Dip</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0c0a06;}
  #etd-c{display:block;width:100%;height:100%;}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1.2 system-ui,sans-serif;
       letter-spacing:.08em;color:#ffe08a;opacity:.34;text-transform:uppercase;
       pointer-events:none;user-select:none;}
</style>
</head>
<body>
<canvas id="etd-c"></canvas>
<div class="cap">Exoplanet Transit Dip</div>
<script>
(function(){
  const cv=document.getElementById('etd-c'),ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const ACC='#ffe08a', BG='#0c0a06';
  let W,H,DPR,S,starR,planetR;
  // star centre (upper region), light-curve baseline (lower region)
  let starX,starY, curveY0,curveH, lx0,lx1;
  function size(){
    DPR=Math.min(devicePixelRatio||1,2);
    W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
    S=Math.min(W,H);
    starR=S*0.20; planetR=starR*0.22;
    starX=W/2; starY=H*0.36;
    lx0=W*0.12; lx1=W*0.88;
    curveY0=H*0.74; curveH=S*0.16;
  }
  addEventListener('resize',size);size();

  // analytic transit depth for planet centre offset d (in star radii), planet/star ratio k
  function depth(d,k){
    d=Math.abs(d);
    if(d>=1+k) return 0;                       // no overlap
    if(d<=1-k) return k*k;                      // fully inside -> full depth
    // partial overlap: area of lens / star area
    const r=1, rp=k;
    const a=(d*d+r*r-rp*rp)/(2*d*r), b=(d*d+rp*rp-r*r)/(2*d*rp);
    const ca=Math.max(-1,Math.min(1,a)), cb=Math.max(-1,Math.min(1,b));
    const A=r*r*Math.acos(ca)+rp*rp*Math.acos(cb)
            -0.5*Math.sqrt(Math.max(0,(-d+r+rp)*(d+r-rp)*(d-r+rp)*(d+r+rp)));
    return A/Math.PI; // /(pi*r^2)
  }

  // trail of recent flux samples mapped across the light curve panel
  const NS=240, samples=new Array(NS).fill(1);
  let phase=-1.55;           // planet path param: x-offset in star radii (impact param via b)
  const b=0.32;              // impact parameter
  const k=planetRatio();
  function planetRatio(){return 0.22;}

  let t=0,nudge=0;
  cv.addEventListener('pointermove',e=>{nudge=0.6;});
  cv.addEventListener('click',()=>{phase=-1.55;});

  function fluxAt(ph){return 1-depth(Math.hypot(ph,b),k);}

  function draw(){
    ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);

    // --- starfield specks ---
    ctx.fillStyle='rgba(255,224,138,0.10)';
    for(let i=0;i<46;i++){
      const sx=((i*97.13)%1)*W, sy=((i*53.7)%1)*H*0.66;
      ctx.fillRect(sx,sy,1,1);
    }

    // --- the star: limb-darkened disk ---
    const g=ctx.createRadialGradient(starX-starR*0.18,starY-starR*0.18,starR*0.1,starX,starY,starR);
    g.addColorStop(0,'#fff6df');
    g.addColorStop(0.55,'#ffe6a8');
    g.addColorStop(0.85,'#f2b94e');
    g.addColorStop(1,'#a8702a');
    ctx.beginPath();ctx.arc(starX,starY,starR,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();
    // soft corona
    const cg=ctx.createRadialGradient(starX,starY,starR*0.9,starX,starY,starR*1.5);
    cg.addColorStop(0,'rgba(255,210,120,0.28)');cg.addColorStop(1,'rgba(255,210,120,0)');
    ctx.beginPath();ctx.arc(starX,starY,starR*1.5,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();

    // planet horizontal path across disk
    const px=starX+phase*starR;
    const py=starY+b*starR;

    // chord line showing the transit path
    ctx.strokeStyle='rgba(255,224,138,0.16)';ctx.lineWidth=1;
    ctx.setLineDash([3,4]);
    ctx.beginPath();ctx.moveTo(starX-starR*1.55,py);ctx.lineTo(starX+starR*1.55,py);ctx.stroke();
    ctx.setLineDash([]);

    // the planet silhouette (clip to allow it to occult the disk crisply)
    ctx.beginPath();ctx.arc(px,py,planetR,0,Math.PI*2);
    ctx.fillStyle=BG;ctx.fill();
    // faint backlit rim when near limb / exiting
    ctx.beginPath();ctx.arc(px,py,planetR+1.2,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,224,138,0.22)';ctx.lineWidth=1;ctx.stroke();

    // contact markers on the chord (ingress/egress = d = 1+k and 1-k)
    [-(1+k),-(1-k),(1-k),(1+k)].forEach(c=>{
      const cxp=starX+c*starR;
      ctx.fillStyle='rgba(255,224,138,0.30)';
      ctx.fillRect(cxp-0.5,py-3,1,6);
    });

    // --- LIGHT CURVE PANEL ---
    const fullDepth=k*k;
    const yFor=f=>curveY0 - (1-f)/Math.max(fullDepth,1e-4)*curveH; // baseline=top, full dip=bottom
    // baseline (flux=1) and floor (full transit) guides
    ctx.strokeStyle='rgba(255,224,138,0.14)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(lx0,yFor(1));ctx.lineTo(lx1,yFor(1));ctx.stroke();
    ctx.setLineDash([2,5]);
    ctx.beginPath();ctx.moveTo(lx0,yFor(1-fullDepth));ctx.lineTo(lx1,yFor(1-fullDepth));ctx.stroke();
    ctx.setLineDash([]);
    // labels
    ctx.fillStyle='rgba(255,224,138,0.45)';
    ctx.font='600 '+Math.max(8,S*0.020)+'px ui-monospace,Menlo,monospace';
    ctx.textBaseline='alphabetic';
    ctx.fillText('1.000', lx1+2, yFor(1)+3);
    ctx.fillStyle='rgba(255,224,138,0.30)';
    ctx.fillText((1-fullDepth).toFixed(3), lx1+2, yFor(1-fullDepth)+3);

    // plot the curve from sample history
    ctx.beginPath();
    for(let i=0;i<NS;i++){
      const x=lx0+(i/(NS-1))*(lx1-lx0);
      const y=yFor(samples[i]);
      i?ctx.lineTo(x,y):ctx.moveTo(x,y);
    }
    ctx.strokeStyle=ACC;ctx.lineWidth=Math.max(1.4,S*0.004);
    ctx.lineJoin='round';ctx.stroke();

    // glowing read-head dot at current flux (right edge of trace)
    const curF=samples[NS-1];
    const hx=lx1, hy=yFor(curF);
    const hg=ctx.createRadialGradient(hx,hy,0,hx,hy,7);
    hg.addColorStop(0,'#fff6df');hg.addColorStop(1,'rgba(255,246,223,0)');
    ctx.beginPath();ctx.arc(hx,hy,7,0,Math.PI*2);ctx.fillStyle=hg;ctx.fill();
    ctx.beginPath();ctx.arc(hx,hy,2.2,0,Math.PI*2);ctx.fillStyle='#fff6df';ctx.fill();

    // live flux readout
    ctx.fillStyle=ACC;
    ctx.font='600 '+Math.max(9,S*0.026)+'px ui-monospace,Menlo,monospace';
    ctx.fillText('FLUX '+curF.toFixed(4), lx0, curveY0-curveH-S*0.03);
  }

  function step(){
    const sp=reduce?0:(0.012+nudge*0.02);
    nudge*=0.92;
    phase+=sp;
    if(phase>1.55) phase=-1.55;
    // push newest flux sample
    samples.shift();
    samples.push(fluxAt(phase));
  }

  let raf=0;
  function frame(){
    if(!reduce){t++; step();}
    draw();
    raf=requestAnimationFrame(frame);
  }
  function start(){if(!raf)raf=requestAnimationFrame(frame);}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>{document.hidden?stop():start();});

  if(reduce){
    // static resting frame: planet mid-transit, curve pre-filled with the dip
    phase=0;
    for(let i=0;i<NS;i++){
      const ph=-1.55+(i/(NS-1))*3.1;
      samples[i]=fluxAt(ph);
    }
    draw();
  } else start();
})();
</script>
</body>
</html>
