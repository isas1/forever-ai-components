<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Link-in-bio profile card: avatar mark, bio and a stack of link buttons with a spotlight highlight that glides between them, a live follower count ticking up, and a pulsing status dot.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Link-in-Bio Profile Card</title>
<style>
:root{
  --pro-bg:#0d1117;
  --pro-surface:#161b22;
  --pro-border:rgba(255,255,255,.08);
  --pro-text:#e6edf3;
  --pro-muted:#8b949e;
  --pro-accent:#e05fa9;
  --pro-accent-2:#f4b740;
  --pro-ok:#3fb950;
  --pro-radius:16px;
  --pro-font:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--pro-bg)}
.rlb-stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  padding:3.6vmin;font-family:var(--pro-font);color:var(--pro-text)}
.rlb-card{width:min(72vmin,100%);max-height:100%;background:var(--pro-surface);border:1px solid var(--pro-border);
  border-radius:var(--pro-radius);padding:4vmin 4vmin 3.2vmin;display:flex;flex-direction:column;
  align-items:center;gap:1.2vmin;overflow:hidden}
.rlb-avatar{position:relative;width:15vmin;min-width:56px;aspect-ratio:1;border-radius:50%;
  background:conic-gradient(from 200deg,var(--pro-accent),var(--pro-accent-2),var(--pro-accent));
  display:flex;align-items:center;justify-content:center;margin-bottom:.6vmin;flex:none}
.rlb-avatar::after{content:"";position:absolute;inset:16%;border-radius:50%;background:var(--pro-surface)}
.rlb-init{position:relative;z-index:1;font-weight:800;font-size:clamp(13px,3.4vmin,20px);color:var(--pro-text)}
.rlb-live{position:absolute;right:-1%;bottom:2%;width:2.6vmin;min-width:11px;aspect-ratio:1;border-radius:50%;
  background:var(--pro-ok);border:2px solid var(--pro-surface);z-index:2}
.rlb-live::after{content:"";position:absolute;inset:-4px;border-radius:50%;border:1.5px solid var(--pro-ok);
  opacity:0;animation:rlb-ping 2.4s ease-out infinite}
.rlb-name{font-size:clamp(12px,2.7vmin,16px);font-weight:800;letter-spacing:-.01em}
.rlb-handle{font-size:clamp(8px,1.7vmin,11px);color:var(--pro-accent);font-weight:600}
.rlb-bio{font-size:clamp(8px,1.6vmin,10.5px);color:var(--pro-muted);text-align:center;line-height:1.4;
  max-width:46ch;margin:.2vmin 0 .6vmin}
.rlb-stats{display:flex;gap:2.6vmin;font-size:clamp(7.5px,1.5vmin,10px);color:var(--pro-muted);
  font-weight:600;margin-bottom:1vmin}
.rlb-stats b{color:var(--pro-text);font-variant-numeric:tabular-nums;font-weight:800}
.rlb-links{position:relative;width:100%;display:flex;flex-direction:column;gap:1.2vmin}
.rlb-spot{position:absolute;left:0;right:0;height:0;border-radius:calc(var(--pro-radius) - 6px);
  background:color-mix(in srgb,var(--pro-accent) 16%,transparent);
  border:1px solid color-mix(in srgb,var(--pro-accent) 45%,transparent);
  transition:transform .6s cubic-bezier(.34,1.15,.4,1),height .3s ease;pointer-events:none}
.rlb-link{position:relative;z-index:1;display:flex;align-items:center;gap:1.6vmin;
  padding:1.5vmin 2vmin;border-radius:calc(var(--pro-radius) - 6px);border:1px solid var(--pro-border);
  font-size:clamp(8.5px,1.8vmin,11px);font-weight:600}
.rlb-dot{width:1.8vmin;min-width:8px;aspect-ratio:1;border-radius:50%;background:var(--rlb-dc,var(--pro-accent));flex:none}
.rlb-lname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rlb-lcount{color:var(--pro-muted);font-size:clamp(7px,1.4vmin,9px);font-variant-numeric:tabular-nums;flex:none}
.cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:var(--pro-muted);
  opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none;pointer-events:none}
@keyframes rlb-ping{0%{opacity:.7;transform:scale(1)}100%{opacity:0;transform:scale(1.9)}}
@media (prefers-reduced-motion:reduce){.rlb-live::after{animation:none;opacity:0}.rlb-spot{transition:none}}
</style>
</head>
<body>
  <div class="rlb-stage">
    <div class="rlb-card" id="rlb-root" role="img"
         aria-label="Link-in-bio profile for Ana Mercado, illustrator and workshop host, with 12,400 followers and a stack of five links; a spotlight highlight glides between the links to show which is trending.">
      <div class="rlb-avatar"><span class="rlb-init">AM</span><span class="rlb-live"></span></div>
      <div class="rlb-name">Ana Mercado</div>
      <div class="rlb-handle">@anamercado</div>
      <div class="rlb-bio">Illustrator &amp; workshop host. New print drop every Friday.</div>
      <div class="rlb-stats"><span><b id="rlb-fol">12,400</b> followers</span><span><b>5</b> links</span></div>
      <div class="rlb-links" id="rlb-links"><div class="rlb-spot" id="rlb-spot"></div></div>
    </div>
  </div>
  <div class="cap" aria-hidden="true">Link-in-Bio Profile Card</div>
  <script>(function(){"use strict";
    var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
    var wrap=document.getElementById('rlb-links'), spot=document.getElementById('rlb-spot'),
        folEl=document.getElementById('rlb-fol');
    if(!wrap||!spot)return;
    var LINKS=[
      {label:"Latest video essay", n:"3.1k clicks", c:"var(--pro-accent)"},
      {label:"Shop original prints", n:"1.8k clicks", c:"var(--pro-accent-2)"},
      {label:"Weekly newsletter", n:"940 clicks", c:"var(--pro-accent)"},
      {label:"Book a 1:1 call", n:"312 clicks", c:"var(--pro-accent-2)"},
      {label:"New merch drop", n:"2.4k clicks", c:"var(--pro-accent)"}
    ];
    LINKS.forEach(function(l){
      var row=document.createElement('div'); row.className='rlb-link';
      row.innerHTML='<span class="rlb-dot" style="--rlb-dc:'+l.c+'"></span>'+
        '<span class="rlb-lname">'+l.label+'</span><span class="rlb-lcount">'+l.n+'</span>';
      wrap.appendChild(row);
    });
    var rows=Array.prototype.slice.call(wrap.querySelectorAll('.rlb-link'));
    function place(i){
      var r=rows[i], top=r.offsetTop, h=r.offsetHeight;
      spot.style.height=h+'px';
      spot.style.transform='translateY('+top+'px)';
    }
    var followers=12400;
    function paintFollowers(){ folEl.textContent=followers.toLocaleString(); }
    if(reduce){ requestAnimationFrame(function(){place(0);}); paintFollowers(); return; }
    var idx=0, running=true;
    document.addEventListener('visibilitychange',function(){ running=!document.hidden; });
    requestAnimationFrame(function(){place(0);});
    var spotTimer=setInterval(function(){
      if(!running)return;
      idx=(idx+1)%rows.length; place(idx);
    },2400);
    var folTimer=setInterval(function(){
      if(!running)return;
      followers+=Math.floor(2+Math.random()*6);
      paintFollowers();
    },3800);
  })();</script>
