<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Podcast episode player: cover art, episode title and show notes, a scrubbing progress bar over an animated waveform, and transport controls; playhead advances on its own through the episode.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Podcast Episode Player</title>
<style>
:root{
  --pro-bg:#0d1117;
  --pro-surface:#161b22;
  --pro-border:rgba(255,255,255,.08);
  --pro-text:#e6edf3;
  --pro-muted:#8b949e;
  --pro-accent:#e05fa9;
  --pro-accent-2:#f4b740;
  --pro-radius:16px;
  --pro-font:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--pro-bg)}
.rpp-stage{position:fixed;inset:0;display:flex;font-family:var(--pro-font);color:var(--pro-text);padding:3.8vmin}
.rpp-card{flex:1;min-height:0;background:var(--pro-surface);border:1px solid var(--pro-border);
  border-radius:var(--pro-radius);padding:3.6vmin;display:flex;flex-direction:column;gap:2.4vmin}
.rpp-top{display:flex;gap:2.6vmin;align-items:center}
.rpp-art{width:13vmin;min-width:48px;aspect-ratio:1;border-radius:calc(var(--pro-radius) - 5px);flex:none;
  background:conic-gradient(from 120deg,var(--pro-accent),var(--pro-accent-2),var(--pro-accent));
  position:relative}
.rpp-art::after{content:"";position:absolute;inset:30%;border-radius:50%;background:var(--pro-surface)}
.rpp-meta{min-width:0}
.rpp-show{font-size:clamp(7.5px,1.5vmin,9.5px);color:var(--pro-accent);font-weight:700;text-transform:uppercase;
  letter-spacing:.06em}
.rpp-title{font-size:clamp(11px,2.4vmin,15px);font-weight:800;margin-top:.4vmin;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.rpp-ep{font-size:clamp(7.5px,1.5vmin,9.5px);color:var(--pro-muted);margin-top:.3vmin}
.rpp-wave{flex:1;min-height:0;display:flex;align-items:center;gap:.5vmin}
.rpp-bar{flex:1;min-width:1px;border-radius:2px;background:var(--pro-border)}
.rpp-scrub{height:.9vmin;min-height:4px;border-radius:999px;background:var(--pro-border);position:relative}
.rpp-scrub i{position:absolute;left:0;top:0;bottom:0;border-radius:999px;background:var(--pro-accent);width:0}
.rpp-times{display:flex;justify-content:space-between;font-size:clamp(7px,1.4vmin,9.5px);
  color:var(--pro-muted);font-variant-numeric:tabular-nums;font-weight:600}
.rpp-controls{display:flex;align-items:center;justify-content:center;gap:3.2vmin}
.rpp-play{width:8.4vmin;min-width:38px;aspect-ratio:1;border-radius:50%;background:var(--pro-accent);
  display:flex;align-items:center;justify-content:center;color:#241019;flex:none}
.rpp-play svg{width:34%;height:34%}
.rpp-skip{color:var(--pro-muted);font-size:clamp(8px,1.7vmin,10.5px);font-weight:700}
.cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:var(--pro-muted);
  opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none;pointer-events:none}
@media (prefers-reduced-motion:reduce){.rpp-bar{transition:none}}
</style>
</head>
<body>
  <div class="rpp-stage">
    <div class="rpp-card" id="rpp-root" role="img"
         aria-label="Podcast player for episode 42 of The Solo Studio, One Person, Many Hats, currently at 14 minutes 12 seconds of 38 minutes 40 seconds, with a live animated waveform and playing transport controls.">
      <div class="rpp-top">
        <div class="rpp-art"></div>
        <div class="rpp-meta">
          <div class="rpp-show">The Solo Studio &middot; Ep. 42</div>
          <div class="rpp-title">One Person, Many Hats</div>
          <div class="rpp-ep">with Priya N. &middot; 38 min</div>
        </div>
      </div>
      <div class="rpp-wave" id="rpp-wave" aria-hidden="true"></div>
      <div class="rpp-scrub" id="rpp-scrub"><i id="rpp-fill"></i></div>
      <div class="rpp-times"><span id="rpp-cur">14:12</span><span id="rpp-tot">38:40</span></div>
      <div class="rpp-controls">
        <span class="rpp-skip">-15s</span>
        <div class="rpp-play" id="rpp-play"><svg id="rpp-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg></div>
        <span class="rpp-skip">+30s</span>
      </div>
    </div>
  </div>
  <div class="cap" aria-hidden="true">Podcast Episode Player</div>
  <script>(function(){"use strict";
    var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
    var waveWrap=document.getElementById('rpp-wave'), fill=document.getElementById('rpp-fill'),
        cur=document.getElementById('rpp-cur'), icon=document.getElementById('rpp-icon');
    if(!waveWrap)return;
    var N=48, bars=[], seed=[];
    for(var i=0;i<N;i++){ seed.push(18+Math.round(Math.sin(i*0.6)*14+Math.sin(i*1.7)*10+22)); }
    for(i=0;i<N;i++){
      var b=document.createElement('div'); b.className='rpp-bar';
      b.style.height=Math.max(8,seed[i])+'%';
      waveWrap.appendChild(b); bars.push(b);
    }
    var TOTAL=38*60+40, pos=14*60+12;
    function fmt(s){ s=Math.max(0,Math.round(s)); var m=Math.floor(s/60), r=s%60; return m+':'+(r<10?'0':'')+r; }
    function paint(){
      var pct=(pos/TOTAL)*100;
      fill.style.width=pct+'%';
      cur.textContent=fmt(pos);
      var lit=Math.round((pct/100)*N);
      for(var k=0;k<N;k++){ bars[k].style.background=k<lit?'var(--pro-accent)':'var(--pro-border)'; }
    }
    if(reduce){ paint(); return; }
    var running=true, playing=true, last=0, wobT=0;
    document.addEventListener('visibilitychange',function(){ running=!document.hidden; if(running)last=performance.now(); });
    function loop(ts){
      var dt=Math.min(0.25,(ts-last)/1000||0); last=ts;
      if(running&&playing){
        pos+=dt; if(pos>=TOTAL) pos=0;
        wobT+=dt;
        for(var k=0;k<N;k++){
          var wob=Math.sin(wobT*1.6+k*0.5)*4;
          bars[k].style.height=Math.max(8,Math.min(96,seed[k]+wob))+'%';
        }
        paint();
      }
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();</script>
