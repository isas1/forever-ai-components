<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Glowing cyan wireframe cube with radial-orb faces slowly rotating in CSS 3D, reacting subtly to pointer movement on deep navy.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotating Cube</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0d1021;
    font-family:system-ui,-apple-system,sans-serif;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    perspective:600px;}
  #cube{position:relative;width:38vmin;height:38vmin;transform-style:preserve-3d;
    transform:rotateX(-22deg) rotateY(0deg);will-change:transform;}
  .face{position:absolute;inset:0;border:1px solid rgba(120,225,255,.5);
    display:flex;align-items:center;justify-content:center;
    background:rgba(60,130,210,.12);box-shadow:inset 0 0 30px rgba(120,225,255,.25);
    backface-visibility:visible;}
  .face::after{content:"";width:46%;height:46%;border-radius:50%;
    background:radial-gradient(circle,#7ee1ff,#2d6fd8 70%,transparent);
    filter:blur(1px);opacity:.85;}
  .f1{transform:translateZ(19vmin)}
  .f2{transform:rotateY(180deg) translateZ(19vmin)}
  .f3{transform:rotateY(90deg) translateZ(19vmin)}
  .f4{transform:rotateY(-90deg) translateZ(19vmin)}
  .f5{transform:rotateX(90deg) translateZ(19vmin)}
  .f6{transform:rotateX(-90deg) translateZ(19vmin)}
  .cap{position:fixed;left:10px;bottom:8px;color:#7ee1ff;opacity:.32;
    font-size:11px;letter-spacing:.08em;text-transform:uppercase;}
</style>
</head>
<body>
<div id="stage">
  <div id="cube">
    <div class="face f1"></div><div class="face f2"></div>
    <div class="face f3"></div><div class="face f4"></div>
    <div class="face f5"></div><div class="face f6"></div>
  </div>
</div>
<div class="cap">Rotating Cube</div>
<script>
  const cube=document.getElementById('cube');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let ry=0,rx=-22,tx=0,ty=0,raf;
  // Cache viewport size once; re-read only on resize (never per pointermove/frame).
  let vw=innerWidth,vh=innerHeight;
  addEventListener('resize',()=>{vw=innerWidth;vh=innerHeight;});
  function loop(){
    ry+=0.5; rx=-22+Math.sin(ry/90)*8;
    cube.style.transform=`rotateX(${rx+ty}deg) rotateY(${ry+tx}deg)`;
    raf=requestAnimationFrame(loop);
  }
  addEventListener('pointermove',e=>{
    tx=(e.clientX/vw-.5)*40; ty=-(e.clientY/vh-.5)*30;
  });
  function start(){if(!raf&&!reduce)loop();}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>document.hidden?stop():start());
  if(reduce){cube.style.transform='rotateX(-22deg) rotateY(35deg)';}else start();
</script>
</body>
</html>
