<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Seven gold and blue playing cards fanning open and closed in a smooth 3D spread on a dark plum background.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Deck Fan</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#1a0f1e;
    font-family:system-ui,-apple-system,sans-serif;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    perspective:900px;}
  #deck{position:relative;width:24vmin;height:34vmin;transform-style:preserve-3d;
    transform:rotateX(8deg);}
  .card{position:absolute;inset:0;border-radius:9px;transform-origin:50% 130%;
    background:linear-gradient(150deg,#ffe9b8,#f7b955 55%,#e0743a);
    border:2px solid #fff7e6;box-shadow:0 8px 22px rgba(0,0,0,.4);
    display:flex;align-items:center;justify-content:center;}
  .card span{font-size:6vmin;font-weight:700;color:#a83a1a;
    text-shadow:0 1px 0 rgba(255,255,255,.5);}
  .card:nth-child(even){background:linear-gradient(150deg,#cfeaff,#5aa6e8 55%,#2d63b0);}
  .card:nth-child(even) span{color:#143a6b;}
  .cap{position:fixed;left:10px;bottom:8px;color:#f7b955;opacity:.34;
    font-size:11px;letter-spacing:.08em;text-transform:uppercase;}
</style>
</head>
<body>
<div id="stage"><div id="deck"></div></div>
<div class="cap">Card Deck Fan</div>
<script>
  const deck=document.getElementById('deck');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const N=7,glyph=['A','K','Q','J','10','9','8'],cards=[];
  for(let i=0;i<N;i++){
    const c=document.createElement('div');c.className='card';
    c.innerHTML='<span>'+glyph[i]+'</span>';deck.appendChild(c);cards.push(c);
  }
  let t=0,raf;
  function loop(){
    t+=0.018;
    const spread=(Math.sin(t)*0.5+0.5); // 0..1
    const fan=18+spread*30, lift=spread*14;
    cards.forEach((c,i)=>{
      const k=i-(N-1)/2;
      c.style.transform=`rotateZ(${k*fan}deg) translateY(${-Math.abs(k)*lift}px)`;
    });
    raf=requestAnimationFrame(loop);
  }
  function start(){if(!raf&&!reduce)loop();}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>document.hidden?stop():start());
  if(reduce){cards.forEach((c,i)=>{const k=i-(N-1)/2;
    c.style.transform=`rotateZ(${k*26}deg) translateY(${-Math.abs(k)*10}px)`;});}
  else start();
</script>
</body>
</html>
