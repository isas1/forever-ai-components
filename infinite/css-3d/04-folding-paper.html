<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Cream-and-sage paper accordion that folds and unfolds in a zig-zag CSS 3D motion, gently turning on a dark green ground.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folding Paper</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#13241f;
    font-family:system-ui,-apple-system,sans-serif;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    perspective:800px;}
  /* Nested accordion: each panel hosts the next, folding from its right edge */
  .panel{position:relative;width:11vmin;height:30vmin;transform-style:preserve-3d;
    transform-origin:left center;}
  .face{position:absolute;inset:0;backface-visibility:hidden;
    box-shadow:inset 0 0 18px rgba(0,0,0,.18);}
  .front{background:linear-gradient(115deg,#f6f2df,#ddd6b6);}
  .back{background:linear-gradient(115deg,#9fc090,#6f9463);transform:rotateY(180deg);}
  .child{position:absolute;left:100%;top:0;transform-origin:left center;}
  #root{transform:rotateX(10deg);will-change:transform;}
  .cap{position:fixed;left:10px;bottom:8px;color:#cfe6c2;opacity:.34;
    font-size:11px;letter-spacing:.08em;text-transform:uppercase;}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/css-3d/04-folding-paper.html",
 "title": "Folding Paper",
 "description": "4-panel paper accordion folds and unfolds in a zig-zag CSS 3D motion, slowly rotating on a dark green background. Cream front and sage back faces alternate.",
 "useWhen": "Ambient hero backgrounds, paper-craft or origami themes, portfolios needing calm 3D motion without user interaction.",
 "avoidWhen": "Contexts where CSS 3D perspective causes z-fighting on older GPUs, or where subtle motion is needed — the continuous fold cycle is always visible.",
 "agentPrompt": "Change panel count from 4 to 6 by setting P=6, widen each panel to 14vmin, and shift accordion colors to warm terracotta (#c87941) front and dusty rose (#b07070) back.",
 "editableAreas": [
  "panel count (P=4)",
  "panel dimensions (11vmin wide, 30vmin tall)",
  "fold angle limit (ang=f*165)",
  "animation speed (t+=0.011)",
  "front/back face gradient colors",
  "root rotation range (-20+f*40 deg)"
 ],
 "preserveElements": [
  "transform-style:preserve-3d on .panel",
  "visibilitychange pause/start",
  "prefers-reduced-motion guard with static frame",
  "IIFE-style scoped variable block"
 ],
 "knownLimitations": [
  "Panel count beyond 6-7 may cause perspective clipping at edges",
  "No touch/pointer interaction — purely passive",
  "Background color hardcoded in CSS body rule"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "css-3d",
  "paper",
  "accordion",
  "perspective",
  "fold",
  "ambient",
  "loop"
 ]
}
</script>
</head>
<body>
<div id="stage"><div id="root"></div></div>
<div class="cap">Folding Paper</div>
<script>
  const root=document.getElementById('root');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const P=4,panels=[];let parent=root;
  for(let i=0;i<P;i++){
    const p=document.createElement('div');
    p.className='panel'+(i>0?' child':'');
    p.innerHTML='<div class="face front"></div><div class="face back"></div>';
    parent.appendChild(p);panels.push(p);parent=p;
  }
  let t=0,raf;
  function loop(){
    t+=0.011;
    const f=(Math.sin(t)*0.5+0.5);          // 0 open .. 1 folded
    const ang=f*165;
    panels.forEach((p,i)=>{
      if(i===0){p.style.transform=`translateX(-16.5vmin)`;return;}
      const dir=i%2===1?-1:1;               // zig-zag
      p.style.transform=`rotateY(${dir*ang}deg)`;
    });
    root.style.transform=`rotateX(10deg) rotateY(${-20+f*40}deg)`;
    raf=requestAnimationFrame(loop);
  }
  function start(){if(!raf&&!reduce)loop();}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>document.hidden?stop():start());
  if(reduce){t=Math.PI/2;loop();cancelAnimationFrame(raf);raf=0;}else start();
</script>
</body>
</html>
