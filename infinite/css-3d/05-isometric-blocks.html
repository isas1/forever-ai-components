<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="A 3x3 grid of purple isometric cubes that gently bob up and down in a sine wave on a dark violet field.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isometric Blocks</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#181428;
    font-family:system-ui,-apple-system,sans-serif;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    perspective:1000px;}
  #scene{position:relative;transform-style:preserve-3d;
    transform:rotateX(58deg) rotateZ(-45deg);}
  .cube{position:absolute;width:9vmin;height:9vmin;transform-style:preserve-3d;}
  .s{position:absolute;width:9vmin;height:9vmin;}
  .top{background:#7c5cff;transform:translateZ(4.5vmin);}
  .lft{background:#5a3fd6;transform:rotateY(-90deg) translateZ(4.5vmin);transform-origin:left;}
  .rgt{background:#4730ad;transform:rotateX(90deg) translateZ(4.5vmin);transform-origin:top;}
  .cap{position:fixed;left:10px;bottom:8px;color:#b3a4ff;opacity:.34;
    font-size:11px;letter-spacing:.08em;text-transform:uppercase;}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/css-3d/05-isometric-blocks.html",
 "title": "Isometric Blocks",
 "description": "3x3 grid of purple CSS 3D cubes bobs in a staggered sine wave on dark violet. Three shaded faces per cube simulate isometric lighting.",
 "useWhen": "Ambient hero backgrounds, game UI, or dashboards with a retro/isometric aesthetic.",
 "avoidWhen": "Old WebViews or GPU-constrained devices where CSS 3D transforms are unreliable. Avoid over text-heavy layouts.",
 "agentPrompt": "Change grid to 4x4 by setting G=4, shift hue palette to amber (hues array near 35-45), slow the bob to t+=0.02.",
 "editableAreas": [
  "grid size (G=3)",
  "hue palette (hues array)",
  "bob amplitude (3.2vmin)",
  "animation speed (t+=0.04)",
  "cube size (9vmin)",
  "phase offset ((x+y)*0.7)"
 ],
 "preserveElements": [
  "transform-style:preserve-3d on #scene and .cube",
  "visibilitychange pause/start",
  "prefers-reduced-motion static fallback"
 ],
 "knownLimitations": [
  "Changing cube size requires updating left/top offsets in the loop (hardcoded vmin math)",
  "Background color hardcoded in CSS"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "isometric",
  "3d",
  "css-3d",
  "cubes",
  "sine-wave",
  "grid",
  "ambient"
 ]
}
</script>
</head>
<body>
<div id="stage"><div id="scene"></div></div>
<div class="cap">Isometric Blocks</div>
<script>
  const scene=document.getElementById('scene');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const G=3,blocks=[];
  const hues=[265,255,275,250,270,258,280,262,268];
  let k=0;
  for(let x=0;x<G;x++)for(let y=0;y<G;y++){
    const c=document.createElement('div');c.className='cube';
    c.style.left=(x*9-9)+'vmin';c.style.top=(y*9-9)+'vmin';
    const h=hues[k%hues.length];
    c.innerHTML=`<div class="s top" style="background:hsl(${h} 80% 65%)"></div>
      <div class="s lft" style="background:hsl(${h} 70% 48%)"></div>
      <div class="s rgt" style="background:hsl(${h} 65% 38%)"></div>`;
    scene.appendChild(c);blocks.push({el:c,ph:(x+y)*0.7});k++;
  }
  let t=0,raf;
  function loop(){
    t+=0.04;
    blocks.forEach(b=>{
      const z=Math.sin(t+b.ph)*3.2;
      b.el.style.transform=`translateZ(${z}vmin)`;
    });
    raf=requestAnimationFrame(loop);
  }
  function start(){if(!raf&&!reduce)loop();}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>document.hidden?stop():start());
  if(reduce){blocks.forEach((b,i)=>b.el.style.transform=`translateZ(${(i%3)*1.5}vmin)`);}
  else start();
</script>
</body>
</html>
