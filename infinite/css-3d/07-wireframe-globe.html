<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="A rotating teal wireframe globe of longitude and latitude rings with a soft glow, steerable by the pointer.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireframe Globe</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#04101a;
    font-family:system-ui,-apple-system,sans-serif;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    perspective:900px;}
  #globe{position:relative;width:40vmin;height:40vmin;transform-style:preserve-3d;will-change:transform;}
  .ring{position:absolute;inset:0;border-radius:50%;
    border:1px solid rgba(60,230,200,.55);box-shadow:0 0 8px rgba(60,230,200,.2);}
  .lat{border-color:rgba(60,160,230,.45);}
  #glow{position:absolute;inset:14%;border-radius:50%;
    background:radial-gradient(circle at 40% 35%,rgba(60,230,200,.28),transparent 65%);}
  .cap{position:fixed;left:10px;bottom:8px;color:#3ce6c8;opacity:.34;
    font-size:11px;letter-spacing:.08em;text-transform:uppercase;}
</style>
</head>
<body>
<div id="stage"><div id="globe"><div id="glow"></div></div></div>
<div class="cap">Wireframe Globe</div>
<script>
  const globe=document.getElementById('globe');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  // longitude rings: rotate around Y at evenly spaced angles
  const LON=6;
  for(let i=0;i<LON;i++){
    const r=document.createElement('div');r.className='ring';
    r.style.transform=`rotateY(${(180/LON)*i}deg)`;globe.appendChild(r);
  }
  // latitude rings: horizontal circles scaled + translated on Y
  const LAT=[{p:0,s:1},{p:0.5,s:.86},{p:-0.5,s:.86},{p:0.78,s:.62},{p:-0.78,s:.62}];
  LAT.forEach(L=>{
    const r=document.createElement('div');r.className='ring lat';
    r.style.transform=`rotateX(90deg) translateZ(${L.p*20}vmin) scale(${L.s})`;
    globe.appendChild(r);
  });
  let ry=0,rx=-18,raf,interacted=false,tx=0;
  function loop(){
    if(!interacted)ry+=0.5; else ry+=tx;
    globe.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg)`;
    raf=requestAnimationFrame(loop);
  }
  addEventListener('pointermove',e=>{interacted=true;
    tx=0.3+(e.clientX/innerWidth-.5)*3; rx=-18-(e.clientY/innerHeight-.5)*30;});
  function start(){if(!raf&&!reduce)loop();}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>document.hidden?stop():start());
  if(reduce){globe.style.transform='rotateX(-18deg) rotateY(30deg)';}else start();
</script>
</body>
</html>
