<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="A 4x4 grid of tiles flipping in a diagonal wave between pink and teal gradient faces on a tilted plane.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip Tiles Grid</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#1c1018;
    font-family:system-ui,-apple-system,sans-serif;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    perspective:800px;}
  #grid{display:grid;gap:1.4vmin;transform:rotateX(16deg) rotateZ(0deg);}
  .tile{width:10vmin;height:10vmin;position:relative;transform-style:preserve-3d;
    transition:none;}
  .face{position:absolute;inset:0;border-radius:6px;backface-visibility:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,.35);}
  .a{background:linear-gradient(135deg,#ff7eb3,#ff5858);}
  .b{background:linear-gradient(135deg,#43e0c4,#3a8ee6);transform:rotateY(180deg);}
  .cap{position:fixed;left:10px;bottom:8px;color:#ff9bc0;opacity:.34;
    font-size:11px;letter-spacing:.08em;text-transform:uppercase;}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/css-3d/08-flip-tiles-grid.html",
 "title": "Flip Tiles Grid",
 "description": "A 4x4 grid of tiles on a tilted plane flip in a diagonal sine wave, alternating between pink/red and teal/blue gradient faces.",
 "useWhen": "Hero backgrounds, loading screens, or decorative grid displays where rhythmic 3D motion sets a premium aesthetic.",
 "avoidWhen": "Contexts where users may have vestibular sensitivities — though a reduced-motion fallback exists, the static state may look odd. Avoid behind dense text overlays.",
 "agentPrompt": "Change grid size to 5x5 by setting N=5, swap the pink face gradient to purple (#9b59b6 → #6c3483), and slow the wave by changing t+=0.02 to t+=0.01.",
 "editableAreas": [
  "grid size (N=4)",
  "wave speed (t += 0.02)",
  "diagonal phase offset (o.d * 0.35)",
  "face A gradient colors (#ff7eb3, #ff5858)",
  "face B gradient colors (#43e0c4, #3a8ee6)",
  "tile size (10vmin) and gap (1.4vmin)"
 ],
 "preserveElements": [
  "transform-style: preserve-3d on .tile",
  "backface-visibility: hidden on .face",
  "visibilitychange pause/resume",
  "prefers-reduced-motion guard"
 ],
 "knownLimitations": [
  "No click or hover interactivity — purely decorative",
  "Grid tilt angle (rotateX 16deg) is hardcoded in CSS, not a JS variable",
  "Tile count scales as N², so large N values hit perf quickly"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "css-3d",
  "grid",
  "flip",
  "wave",
  "cards",
  "perspective",
  "loop"
 ]
}
</script>
</head>
<body>
<div id="stage"><div id="grid"></div></div>
<div class="cap">Flip Tiles Grid</div>
<script>
  const grid=document.getElementById('grid');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const N=4;grid.style.gridTemplateColumns=`repeat(${N},auto)`;
  const tiles=[];
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){
    const t=document.createElement('div');t.className='tile';
    t.innerHTML='<div class="face a"></div><div class="face b"></div>';
    grid.appendChild(t);tiles.push({el:t,d:x+y});
  }
  let t=0,raf;
  function loop(){
    t+=0.02;
    tiles.forEach(o=>{
      const phase=t - o.d*0.35;
      const ang=(Math.sin(phase)*0.5+0.5)*180; // wave of flips
      o.el.style.transform=`rotateY(${ang}deg)`;
    });
    raf=requestAnimationFrame(loop);
  }
  function start(){if(!raf&&!reduce)loop();}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>document.hidden?stop():start());
  if(reduce){tiles.forEach(o=>o.el.style.transform=`rotateY(${(o.d%2)*180}deg)`);}
  else start();
</script>
</body>
</html>
