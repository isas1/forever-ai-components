<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="An endless flight through receding rainbow-hued neon rings rushing toward the viewer in a rotating perspective tunnel.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perspective Tunnel</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#05060f;
    font-family:system-ui,-apple-system,sans-serif;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    perspective:420px;perspective-origin:50% 50%;}
  #tunnel{position:relative;width:62vmin;height:62vmin;transform-style:preserve-3d;}
  .ring{position:absolute;inset:0;border:2px solid;border-radius:10px;
    box-shadow:0 0 12px rgba(106,208,255,.45);}
  .cap{position:fixed;left:10px;bottom:8px;color:#6ad0ff;opacity:.34;
    font-size:11px;letter-spacing:.08em;text-transform:uppercase;}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/css-3d/09-perspective-tunnel.html",
 "title": "Perspective Tunnel",
 "description": "18 neon rings recede through a CSS 3D perspective tunnel, cycling rainbow hues and rotating as they rush toward the viewer. Pointer X-axis steers the spin rate.",
 "useWhen": "Dark-mode hero backgrounds, sci-fi or cyberpunk themes, immersive loading screens or intros needing strong depth illusion.",
 "avoidWhen": "Light backgrounds (hardcoded dark navy), motion-sensitive audiences (no static fallback beyond pause), or contexts where legible text must overlay the animation.",
 "agentPrompt": "Change ring count to 24, set base spin to 0.5, and shift the hue formula to start at blue tones by replacing `o.z*0.12` with `o.z*0.08+180`.",
 "editableAreas": [
  "ring count (N=18)",
  "base spin speed (spin=0.25)",
  "perspective depth (SPAN=1800)",
  "hue shift formula (o.z*0.12+roll*2)",
  "ring border-radius (10px)",
  "pointer influence range (1.6 multiplier)"
 ],
 "preserveElements": [
  "visibilitychange stop/start guard",
  "prefers-reduced-motion check",
  "IIFE-style scoped constants",
  "SPAN-based z wrapping (o.z -= SPAN)"
 ],
 "knownLimitations": [
  "No reduced-motion static fallback — animation is fully stopped but no still frame is shown",
  "Background color hardcoded in CSS; must edit to change from dark navy",
  "Ring count and SPAN tightly coupled — changing N without adjusting SPAN shifts spacing"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "tunnel",
  "3d",
  "css-3d",
  "perspective",
  "neon",
  "rainbow",
  "loop"
 ]
}
</script>
</head>
<body>
<div id="stage"><div id="tunnel"></div></div>
<div class="cap">Perspective Tunnel</div>
<script>
  const tunnel=document.getElementById('tunnel');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const N=18,SPAN=1800,rings=[];
  for(let i=0;i<N;i++){
    const r=document.createElement('div');r.className='ring';
    tunnel.appendChild(r);
    rings.push({el:r,z:-(i/N)*SPAN});
  }
  let raf,roll=0,interacted=false,spin=0.25;
  function loop(){
    roll+=spin;
    rings.forEach(o=>{
      o.z+=4;
      if(o.z>200)o.z-=SPAN;
      const depth=(o.z+SPAN)/SPAN;            // 0 far .. ~1 near
      const hue=(o.z*0.12+roll*2)%360;
      o.el.style.color=`hsl(${(hue+360)%360} 90% 62%)`;
      o.el.style.opacity=(0.15+depth*0.85).toFixed(2);
      const sc=0.2+depth*0.9;
      o.el.style.transform=`translateZ(${o.z}px) rotateZ(${roll+o.z*0.05}deg) scale(${sc})`;
    });
    raf=requestAnimationFrame(loop);
  }
  addEventListener('pointermove',e=>{interacted=true;
    spin=0.25+(e.clientX/innerWidth-.5)*1.6;});
  function start(){if(!raf&&!reduce)loop();}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>document.hidden?stop():start());
  if(reduce){loop();cancelAnimationFrame(raf);raf=0;}else start();
</script>
</body>
</html>
