<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="A glossy gold star coin spinning on its axis while bobbing above a soft shadow on a dark amber background.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Coin</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#1b1405;
    font-family:system-ui,-apple-system,sans-serif;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    perspective:800px;}
  #wrap{transform-style:preserve-3d;}
  #coin{position:relative;width:34vmin;height:34vmin;transform-style:preserve-3d;}
  .face{position:absolute;inset:0;border-radius:50%;backface-visibility:hidden;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 35% 30%,#fff3b0,#f5c542 45%,#b8860b 90%);
    box-shadow:inset 0 0 0 1.4vmin #d9a526, inset 0 0 5vmin rgba(120,80,0,.4);}
  .front span{font-size:16vmin;font-weight:800;color:#8a5a08;
    text-shadow:0 1px 0 #ffe89a;}
  .back{transform:rotateY(180deg);}
  .back span{font-size:9vmin;color:#8a5a08;text-shadow:0 1px 0 #ffe89a;}
  .edge{position:absolute;left:50%;top:0;width:2vmin;height:100%;
    transform-style:preserve-3d;}
  #shadow{position:absolute;bottom:14%;left:50%;width:24vmin;height:4vmin;
    transform:translateX(-50%);border-radius:50%;
    background:radial-gradient(ellipse,rgba(0,0,0,.5),transparent 70%);filter:blur(2px);}
  .cap{position:fixed;left:10px;bottom:8px;color:#f5c542;opacity:.34;
    font-size:11px;letter-spacing:.08em;text-transform:uppercase;}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/css-3d/10-floating-coin.html",
 "title": "Floating Coin",
 "description": "A glossy gold coin spins on its Y-axis and bobs up/down with a reactive shadow; pointer X position adjusts spin speed in real time.",
 "useWhen": "Game UIs, reward/achievement screens, crypto/NFT landing pages, or any dark-theme hero needing a tactile 3D object.",
 "avoidWhen": "Light backgrounds (dark amber is hardcoded). Contexts where constant rotation is distracting alongside body text.",
 "agentPrompt": "Change the front face star emoji to '💎', set the base spin speed to 2.5 (spin variable), and update the background to #0d1b2a for a night-blue theme.",
 "editableAreas": [
  "base spin speed (spin=1.6)",
  "bob amplitude (Math.sin(t)*4)",
  "coin size (34vmin)",
  "front/back face content (★ / 3D)",
  "background color (#1b1405)"
 ],
 "preserveElements": [
  "prefers-reduced-motion guard + static fallback",
  "visibilitychange stop/start pair",
  "transform-style:preserve-3d on #coin and #wrap",
  "backface-visibility:hidden on .face"
 ],
 "knownLimitations": [
  "Coin size in vmin — may appear too large on ultra-wide viewports",
  "No click interactivity; pointer only affects spin speed, not state",
  "Background color hardcoded in CSS body rule"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "3d",
  "coin",
  "spin",
  "bob",
  "css-3d",
  "perspective",
  "gold"
 ]
}
</script>
</head>
<body>
<div id="stage">
  <div id="shadow"></div>
  <div id="wrap"><div id="coin">
    <div class="face front"><span>★</span></div>
    <div class="face back"><span>3D</span></div>
  </div></div>
</div>
<div class="cap">Floating Coin</div>
<script>
  const coin=document.getElementById('coin');
  const wrap=document.getElementById('wrap');
  const shadow=document.getElementById('shadow');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let ry=0,t=0,raf,interacted=false,spin=1.6;
  function loop(){
    t+=0.03; ry+=spin;
    const bob=Math.sin(t)*4;
    wrap.style.transform=`translateY(${bob}vmin)`;
    coin.style.transform=`rotateX(8deg) rotateY(${ry}deg)`;
    shadow.style.transform=`translateX(-50%) scale(${1-bob*0.02})`;
    shadow.style.opacity=(0.5-bob*0.03).toFixed(2);
    raf=requestAnimationFrame(loop);
  }
  addEventListener('pointermove',e=>{interacted=true;
    spin=1.6+(e.clientX/innerWidth-.5)*6;});
  function start(){if(!raf&&!reduce)loop();}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>document.hidden?stop():start());
  if(reduce){coin.style.transform='rotateX(8deg) rotateY(28deg)';}else start();
</script>
</body>
</html>
