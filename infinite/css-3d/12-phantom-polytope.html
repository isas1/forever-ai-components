<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A glowing purple-blue 4D tesseract wireframe rotating and turning through itself on canvas, speeding up on interaction.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Phantom Polytope</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#10071f;}
  #pp-c{display:block;width:100%;height:100%;}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1.2 ui-monospace,SFMono-Regular,Menlo,monospace;
       letter-spacing:.14em;color:#9b6dff;opacity:.36;text-transform:uppercase;
       pointer-events:none;user-select:none;}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/css-3d/12-phantom-polytope.html",
 "title": "Phantom Polytope",
 "description": "Glowing purple-blue tesseract rotates through itself via dual perspective projection; edges glow hotter by 4D depth. Pointer/click boosts speed.",
 "useWhen": "Dark-theme hero backgrounds, math/generative-art showcases, sci-fi or cosmic aesthetic sections needing ambient depth.",
 "avoidWhen": "Light backgrounds (hardcoded dark canvas). Contexts needing legible text overlays or strict reduced-motion compliance.",
 "agentPrompt": "Change glow to emerald: set strokeStyle blue channel to 180 and shift red/green to 80 and 220, then slow base speed from 0.012 to 0.007.",
 "editableAreas": [
  "base rotation speed (t += 0.012)",
  "rotation plane speeds (0.31, 0.23, 0.17, 0.27)",
  "perspective distances (wd=2.4, dd=3.2)",
  "edge glow color (strokeStyle RGB formula)",
  "pointer boost cap (Math.min(boost+0.5, 3))"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "DPR-aware canvas sizing",
  "visibilitychange pause/resume",
  "reduced-motion static frame guard"
 ],
 "knownLimitations": [
  "Reduced-motion renders only a single static frame — no fallback animation",
  "Background hardcoded (#10071f) — must edit both CSS and ctx.fillStyle to retheme",
  "No aria semantics on canvas element"
 ],
 "tier": "curated",
 "labels": [
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps",
  "animation-heavy"
 ],
 "tags": [
  "tesseract",
  "4d",
  "wireframe",
  "canvas",
  "perspective",
  "rotation",
  "generative",
  "cosmic"
 ]
}
</script>
</head>
<body>
<canvas id="pp-c"></canvas>
<div class="cap">Phantom Polytope</div>
<script>
(function(){
  const cv=document.getElementById('pp-c'),ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let W,H,DPR,cx,cy,S;
  function size(){
    DPR=Math.min(devicePixelRatio||1,2);
    W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
    cx=W/2;cy=H/2;S=Math.min(W,H);
  }
  addEventListener('resize',size);size();

  // 16 vertices of the tesseract: all (+/-1)^4
  const V=[];
  for(let i=0;i<16;i++) V.push([(i&1?1:-1),(i&2?1:-1),(i&4?1:-1),(i&8?1:-1)]);
  // edges: pairs differing in exactly one coordinate
  const E=[];
  for(let a=0;a<16;a++)for(let b=a+1;b<16;b++){
    let d=0;for(let k=0;k<4;k++) if(V[a][k]!==V[b][k]) d++;
    if(d===1) E.push([a,b]);
  }

  function rot(p,i,j,ang){
    const c=Math.cos(ang),s=Math.sin(ang);
    const a=p[i],b=p[j];
    p[i]=a*c-b*s;p[j]=a*s+b*c;
  }

  let t=0,boost=0;
  cv.addEventListener('pointermove',()=>{boost=Math.min(boost+0.5,3);});
  cv.addEventListener('click',()=>{boost=4;});

  function project(tt){
    const pts=[];
    for(let k=0;k<16;k++){
      const p=[V[k][0],V[k][1],V[k][2],V[k][3]];
      // 4D rotations — the XW/YW planes drive the inner-cube turn-through
      rot(p,0,3,tt*0.31);      // XW
      rot(p,1,3,tt*0.23);      // YW
      rot(p,2,3,tt*0.17);      // ZW
      // 4D->3D perspective: w pulls vertices near/far through the 4th axis
      const wd=2.4, w4=1/(wd-p[3]);
      let x=p[0]*w4, y=p[1]*w4, z=p[2]*w4;
      // 3D rotation for readable depth
      const cz=Math.cos(tt*0.27),sz=Math.sin(tt*0.27);
      let X=x*cz-z*sz, Z=x*sz+z*cz, Y=y;
      const cy2=Math.cos(0.5),sy2=Math.sin(0.5);
      let Y2=Y*cy2-Z*sy2, Z2=Y*sy2+Z*cy2;
      // 3D->2D perspective
      const dd=3.2, w3=1/(dd-Z2);
      pts.push({
        x:cx+X*w3*S*0.62,
        y:cy+Y2*w3*S*0.62,
        depth:w3, w4:w4
      });
    }
    return pts;
  }

  function frame(){
    if(!reduce){ t+=0.012*(1+boost); boost*=0.95; }
    ctx.fillStyle='rgba(16,7,31,0.30)';ctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation='lighter';
    const pts=project(t);
    // depth range for shading
    let dmin=1e9,dmax=-1e9;
    pts.forEach(p=>{dmin=Math.min(dmin,p.depth);dmax=Math.max(dmax,p.depth);});
    const lw=Math.max(S/420,1);
    E.forEach(([a,b])=>{
      const p=pts[a],q=pts[b];
      const dep=((p.depth+q.depth)/2-dmin)/(dmax-dmin+1e-6);
      // inner (high w4) edges glow hotter
      const inner=((p.w4+q.w4)/2-0.28)/0.55;
      const hue=0.42+dep*0.4+Math.max(0,inner)*0.25;
      ctx.strokeStyle='rgba('+Math.round(120+inner*120)+','+Math.round(80+dep*70)+',255,'+(0.18+dep*0.6)+')';
      ctx.lineWidth=lw*(0.7+dep*1.4+Math.max(0,inner)*0.6);
      ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.stroke();
    });
    // vertex nodes
    pts.forEach(p=>{
      const dep=(p.depth-dmin)/(dmax-dmin+1e-6);
      ctx.fillStyle='rgba(220,200,255,'+(0.25+dep*0.7)+')';
      ctx.beginPath();ctx.arc(p.x,p.y,(0.8+dep*2.4)*lw,0,Math.PI*2);ctx.fill();
    });
    ctx.globalCompositeOperation='source-over';
    if(!reduce) raf=requestAnimationFrame(frame);
  }
  let raf=0;
  function start(){if(!raf)raf=requestAnimationFrame(frame);}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>{document.hidden?stop():start();});
  if(reduce){ctx.fillStyle='#10071f';ctx.fillRect(0,0,W,H);t=0.9;frame();}else start();
})();
</script>
</body>
</html>
