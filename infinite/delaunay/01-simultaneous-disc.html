<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Simultaneous Disc — Orphist Colour Discs. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Simultaneous Disc</title>
<style>
  html,body{margin:0;height:100%;background:#0c0d11;overflow:hidden}
  #del01-stage{position:fixed;inset:0;width:100%;height:100%}
  #del01-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .del01-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#f3f0e8;opacity:.46;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/delaunay/01-simultaneous-disc.html",
 "title": "Simultaneous Disc",
 "description": "7 concentric spectrum rings counter-rotate in alternating directions; a shimmer overlay and pulsing center dot evoke Orphist colour.",
 "useWhen": "Art/design portfolios, colorful ambient backgrounds, exhibition kiosks inspired by early 20th-century abstract painting.",
 "avoidWhen": "Contexts requiring legible text overlays — constant rotation competes with reading. Not suitable where reduced-motion users need animation.",
 "agentPrompt": "Change RINGS from 7 to 9, slow outer ring speed by setting the per-ring increment from 0.04 to 0.02, and swap SPECTRUM to warm reds and golds.",
 "editableAreas": [
  "ring count (RINGS=7)",
  "segment count per ring (SEG=24)",
  "rotation speed base (0.12) and per-ring increment (0.04)",
  "color palette (SPECTRUM array)",
  "shimmer intensity (0.16*shimmer)"
 ],
 "preserveElements": [
  "DPR-aware fitCanvas with setTransform",
  "visibilitychange stop/start guard",
  "prefers-reduced-motion static draw fallback",
  "IIFE wrapper"
 ],
 "knownLimitations": [
  "Background color hardcoded in both CSS and ctx.fillStyle — must change both to retheme",
  "No pointer interactivity — purely passive display",
  "Reduced-motion users see only a single static frame"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "orphism",
  "concentric-rings",
  "canvas",
  "color-theory",
  "generative",
  "ambient"
 ]
}
</script>
</head>
<body>
<div id="del01-stage" role="img" aria-label="Orphist colour: concentric full-spectrum rings counter-rotate against one another, simultaneous contrast shimmering where each band meets its neighbour.">
  <canvas id="del01-cv"></canvas>
</div>
<div class="del01-cap">Simultaneous Disc</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv=document.getElementById('del01-cv'); if(!cv) return;
  const PAL={ink:'#0d0e12',paper:'#f3f0e8',yellow:'#f4c81e'};
  const SPECTRUM=['#e23b2e','#f08a24','#f4c81e','#2fa86a','#1f6fd0','#7b3fa0'];
  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width), h=Math.max(2,r.height);
    c.width=Math.round(w*dpr); c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }
  let S=fitCanvas(cv);
  const RINGS=7, SEG=24;
  let t=0,last=performance.now();
  function draw(now){
    const dt=Math.min(0.05,(now-last)/1000); last=now;
    if(!REDUCED) t+=dt;
    const ctx=S.ctx,W=S.w,H=S.h,cx=W/2,cy=H/2;
    const R=Math.min(W,H)*0.46;
    ctx.fillStyle='#0c0d11';ctx.fillRect(0,0,W,H);
    for(let ri=0;ri<RINGS;ri++){
      const r0=R*ri/RINGS, r1=R*(ri+1)/RINGS;
      const dir=ri%2? -1:1;
      const spin=t*(0.12+ri*0.04)*dir;
      for(let s=0;s<SEG;s++){
        const a0=spin + (s/SEG)*Math.PI*2;
        const a1=spin + ((s+1)/SEG)*Math.PI*2;
        ctx.beginPath();
        ctx.arc(cx,cy,r1,a0,a1);
        ctx.arc(cx,cy,r0,a1,a0,true);
        ctx.closePath();
        ctx.fillStyle=SPECTRUM[(s+ri)%SPECTRUM.length];
        ctx.fill();
      }
    }
    const shimmer=0.5+0.5*Math.sin(t*1.6);
    ctx.globalCompositeOperation='overlay';
    ctx.globalAlpha=0.16*shimmer;
    ctx.fillStyle=PAL.paper;
    ctx.beginPath();ctx.arc(cx,cy,R,0,7);ctx.fill();
    ctx.globalCompositeOperation='source-over';
    ctx.globalAlpha=1;
    ctx.fillStyle=PAL.ink;ctx.beginPath();ctx.arc(cx,cy,R*0.13,0,7);ctx.fill();
    ctx.fillStyle=PAL.yellow;ctx.beginPath();ctx.arc(cx,cy,R*0.06+R*0.02*Math.sin(t*3),0,7);ctx.fill();
  }
  let raf=0, running=false;
  function loop(){ if(!running) return; draw(performance.now()); raf=requestAnimationFrame(loop); }
  function start(){ if(running) return; running=true; last=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
  S.ctx.fillStyle='#0c0d11';S.ctx.fillRect(0,0,S.w,S.h);
  let _rt;
  window.addEventListener('resize', ()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ S=fitCanvas(cv); if(REDUCED) draw(performance.now()); },150); }, {passive:true});
  document.addEventListener('visibilitychange', ()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });
  if(REDUCED){ draw(performance.now()); }
  else start();
})();
</script>
</body>
</html>
