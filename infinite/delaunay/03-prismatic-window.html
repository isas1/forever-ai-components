<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Prismatic Window — Robert Delaunay. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prismatic Window</title>
<style>
  html,body{margin:0;height:100%;background:#0c0d11;overflow:hidden}
  #del03-stage{position:fixed;inset:0;width:100%;height:100%}
  #del03-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .del03-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#f3f0e8;opacity:.46;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
</head>
<body>
<div id="del03-stage" role="img" aria-label="After Delaunay's Windows series: abstract fragmented planes of colour shift and overlap like daylight broken through faceted leaded glass.">
  <canvas id="del03-cv"></canvas>
</div>
<div class="del03-cap">Prismatic Window</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv=document.getElementById('del03-cv'); if(!cv) return;
  const SPECTRUM=['#e23b2e','#f08a24','#f4c81e','#2fa86a','#1f6fd0','#7b3fa0'];
  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width), h=Math.max(2,r.height);
    c.width=Math.round(w*dpr); c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }
  let S=fitCanvas(cv);
  let planes=[];
  function build(){
    planes=[];
    const COLS=5, ROWS=4;
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      planes.push({
        cx:(c+0.5)/COLS, cy:(r+0.5)/ROWS,
        w:1/COLS, h:1/ROWS,
        c:SPECTRUM[(r*COLS+c)%SPECTRUM.length],
        ph:(r*0.7+c*0.5),
        sp:0.4+((r+c)%3)*0.25
      });
    }
  }
  build();
  let t=0,last=performance.now();
  function draw(now){
    const dt=Math.min(0.05,(now-last)/1000); last=now;
    if(!REDUCED) t+=dt;
    const ctx=S.ctx,W=S.w,H=S.h;
    ctx.fillStyle='#0c0d11';ctx.fillRect(0,0,W,H);
    for(const p of planes){
      const wob=0.5+0.5*Math.sin(t*p.sp+p.ph);
      const x=p.cx*W, y=p.cy*H;
      const w=p.w*W*(0.7+0.55*wob);
      const h=p.h*H*(0.7+0.55*(1-wob));
      const skew=Math.sin(t*0.5+p.ph)*0.22;
      ctx.save();
      ctx.translate(x,y);
      ctx.transform(1,skew,skew*0.5,1,0,0);
      ctx.globalAlpha=0.34+0.32*wob;
      ctx.fillStyle=p.c;
      ctx.beginPath();
      ctx.moveTo(-w/2,-h/2);ctx.lineTo(w/2,-h/2);ctx.lineTo(w/2,h/2);ctx.lineTo(-w/2,h/2);ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha=1;
    ctx.strokeStyle='rgba(13,14,18,.5)';ctx.lineWidth=2;
    const off=Math.sin(t*0.4)*8;
    for(let gx=1;gx<5;gx++){const x=W*gx/5+off;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let gy=1;gy<4;gy++){const y=H*gy/4-off;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  }
  let raf=0, running=false;
  function loop(){ if(!running) return; draw(performance.now()); raf=requestAnimationFrame(loop); }
  function start(){ if(running) return; running=true; last=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
  S.ctx.fillStyle='#0c0d11';S.ctx.fillRect(0,0,S.w,S.h);
  let _rt;
  window.addEventListener('resize', ()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ S=fitCanvas(cv); build(); if(REDUCED) draw(performance.now()); },150); }, {passive:true});
  document.addEventListener('visibilitychange', ()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });
  if(REDUCED){ draw(performance.now()); }
  else start();
})();
</script>
</body>
</html>
