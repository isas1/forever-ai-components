<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Colour Wheel Pulse — Orphist Colour Discs. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Colour Wheel Pulse</title>
<style>
  html,body{margin:0;height:100%;background:#0c0d11;overflow:hidden}
  #del04-stage{position:fixed;inset:0;width:100%;height:100%}
  #del04-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .del04-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#f3f0e8;opacity:.46;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/delaunay/04-colour-wheel-pulse.html",
 "title": "Colour Wheel Pulse",
 "description": "36-segment spectral disc spins while an energy crest sweeps its segments, causing slices to pulse outward and flare bright as the wave passes.",
 "useWhen": "Dark hero backgrounds, loading screens, or art installations inspired by Orphist simultaneous-contrast colour theory.",
 "avoidWhen": "Light backgrounds (hardcoded dark canvas). Contexts needing legible text overlay — constant radial motion competes with reading.",
 "agentPrompt": "Change SPECTRUM to warm sunset tones (['#ff6b35','#f7c59f','#efefd0','#e63946','#457b9d','#1d3557']), slow the spin by setting vel=0.08, and increase SEG to 48 for finer segments.",
 "editableAreas": [
  "colour palette (SPECTRUM array)",
  "segment count (SEG=36)",
  "spin velocity (vel=0.25)",
  "crest sweep speed (dt*7)",
  "radial pulse depth (0.62+0.38 ratio)"
 ],
 "preserveElements": [
  "DPR-aware fitCanvas sizing",
  "visibilitychange pause/start",
  "prefers-reduced-motion guard (single static frame)",
  "IIFE wrapper"
 ],
 "knownLimitations": [
  "No user interactivity — purely autonomous; cannot be driven by pointer or click",
  "Background colour hardcoded to #0c0d11 in both CSS and canvas fill"
 ],
 "tier": "curated",
 "labels": [
  "accessible",
  "copy-paste-safe",
  "minimal-deps",
  "mobile-ready"
 ],
 "tags": [
  "colour-wheel",
  "canvas",
  "spectral",
  "loop",
  "ambient",
  "generative"
 ]
}
</script>
</head>
<body>
<div id="del04-stage" role="img" aria-label="A spectral disc spins on of its own accord, a wave of energy travelling around its segments, simultaneous contrast flaring brightest along the moving crest.">
  <canvas id="del04-cv"></canvas>
</div>
<div class="del04-cap">Colour Wheel Pulse</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv=document.getElementById('del04-cv'); if(!cv) return;
  const PAL={ink:'#0d0e12',paper:'#f3f0e8'};
  const SPECTRUM=['#e23b2e','#f08a24','#f4c81e','#2fa86a','#1f6fd0','#7b3fa0'];
  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width), h=Math.max(2,r.height);
    c.width=Math.round(w*dpr); c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }
  let S=fitCanvas(cv);
  const SEG=36;
  let energy=new Array(SEG).fill(0);
  let spin=0, vel=0.25;
  let crest=0;
  let t=0,last=performance.now();
  function draw(now){
    const dt=Math.min(0.05,(now-last)/1000); last=now;
    if(!REDUCED){ t+=dt; spin+=vel*dt; crest+=dt*7; }
    /* autonomous energy crest sweeping the wheel */
    const head=((crest%SEG)+SEG)%SEG;
    for(let k=-2;k<=2;k++){
      const idx=((Math.floor(head)+k)%SEG+SEG)%SEG;
      energy[idx]=Math.min(1.4, energy[idx]+ (1-Math.abs(k)*0.3)*0.5);
    }
    for(let i=0;i<SEG;i++) energy[i]*=0.94;
    const ctx=S.ctx,W=S.w,H=S.h,cx=W/2,cy=H/2,R=Math.min(W,H)*0.46;
    ctx.fillStyle='#0c0d11';ctx.fillRect(0,0,W,H);
    for(let s=0;s<SEG;s++){
      const a0=spin+(s/SEG)*Math.PI*2;
      const a1=spin+((s+1)/SEG)*Math.PI*2;
      const e=energy[s];
      const rOut=R*(0.62+0.38*Math.min(1,e));
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,rOut,a0,a1);
      ctx.closePath();
      ctx.fillStyle=SPECTRUM[s%SPECTRUM.length];
      ctx.globalAlpha=0.6+0.4*Math.min(1,e);
      ctx.fill();
      if(e>0.05){
        ctx.globalAlpha=Math.min(0.7,e*0.6);
        ctx.fillStyle=PAL.paper;
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,rOut,a0,a1);ctx.closePath();ctx.fill();
      }
    }
    ctx.globalAlpha=1;
    ctx.fillStyle=PAL.ink;ctx.beginPath();ctx.arc(cx,cy,R*0.16,0,7);ctx.fill();
    ctx.strokeStyle='rgba(243,240,232,.25)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(cx,cy,R*0.16,0,7);ctx.stroke();
  }
  let raf=0, running=false;
  function loop(){ if(!running) return; draw(performance.now()); raf=requestAnimationFrame(loop); }
  function start(){ if(running) return; running=true; last=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
  S.ctx.fillStyle='#0c0d11';S.ctx.fillRect(0,0,S.w,S.h);
  let _rt;
  window.addEventListener('resize', ()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ S=fitCanvas(cv); if(REDUCED) draw(performance.now()); },150); }, {passive:true});
  document.addEventListener('visibilitychange', ()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });
  if(REDUCED){ draw(performance.now()); }
  else start();
})();
</script>
</body>
</html>
