<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Endless Rhythm — Robert Delaunay. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Endless Rhythm</title>
<style>
  html,body{margin:0;height:100%;background:#0c0d11;overflow:hidden}
  #del05-stage{position:fixed;inset:0;width:100%;height:100%}
  .del05-band{position:absolute;inset:0;overflow:hidden;display:flex;align-items:center;}
  .del05-track{display:flex;align-items:center;gap:0;will-change:transform;}
  @keyframes del05-march{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  .del05-disc{flex:0 0 auto;border-radius:50%;position:relative;box-shadow:0 0 0 1px rgba(243,240,232,.18);}
  .del05-half{position:absolute;inset:0;border-radius:50%;clip-path:polygon(0 0,50% 0,50% 100%,0 100%);transform-origin:50% 50%;}
  .del05-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#f3f0e8;opacity:.46;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion: reduce){
    .del05-track{animation:none !important;transform:translateX(0);}
  }
</style>
</head>
<body>
<div id="del05-stage" role="img" aria-label="A band of split spectral half-discs marches endlessly sideways in a seamless loop, after Delaunay's endless-rhythm motifs, pure CSS keeping time.">
  <div class="del05-band" id="del05-band"></div>
</div>
<div class="del05-cap">Endless Rhythm</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const band=document.getElementById('del05-band'); if(!band) return;
  const SPECTRUM=['#e23b2e','#f08a24','#f4c81e','#2fa86a','#1f6fd0','#7b3fa0'];
  const track=document.createElement('div');
  track.className='del05-track';
  band.appendChild(track);
  const sizes=[58,40,72,48,64,36];
  function seq(parent){
    for(let i=0;i<14;i++){
      const d=document.createElement('div');
      d.className='del05-disc';
      const sz=sizes[i%sizes.length];
      d.style.width=d.style.height=sz+'px';
      d.style.margin='0 '+(8+(i%3)*6)+'px';
      const cA=SPECTRUM[i%SPECTRUM.length];
      const cB=SPECTRUM[(i+3)%SPECTRUM.length];
      d.style.background=cB;
      const half=document.createElement('div');
      half.className='del05-half';
      half.style.background=cA;
      half.style.transform='rotate('+((i*40)%360)+'deg)';
      d.appendChild(half);
      parent.appendChild(d);
    }
  }
  seq(track); seq(track);
  if(!REDUCED){
    track.style.animation='del05-march 22s linear infinite';
    document.addEventListener('visibilitychange', ()=>{
      track.style.animationPlayState = document.hidden ? 'paused' : 'running';
    });
  }
})();
</script>
</body>
</html>
