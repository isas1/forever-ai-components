<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Pulsing Dot Field — Infinitude. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pulsing Dot Field</title>
<style>
  html,body{margin:0;height:100%;background:#0a0608;overflow:hidden}
  #dot01-stage{position:fixed;inset:0;width:100%;height:100%}
  #dot01-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .dot01-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fbf6ef;opacity:.46;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/dot-field/01-pulsing-dot-field.html",
 "title": "Pulsing Dot Field",
 "description": "A lattice of red dots pulses in radius and alpha via staggered sine waves; bright dots flash yellow at peak. No user input required.",
 "useWhen": "Dark-mode hero backgrounds, loading screens, ambient loop displays needing a structured generative feel.",
 "avoidWhen": "Light backgrounds (hardcoded dark fill). Contexts where constant pulsing motion competes with foreground content.",
 "agentPrompt": "Change dot color to cyan (#00eaff) and flash color to white (#ffffff), increase grid spacing from gap=30 to gap=40, slow the pulse by changing t+=dt to t+=dt*0.5.",
 "editableAreas": [
  "grid spacing (gap=30)",
  "dot base and peak radius (3+wave*7)",
  "base color (#e8112d) and highlight color (#ffd400)",
  "pulse speed (t+=dt)",
  "phase offset formula (x+y)*0.02"
 ],
 "preserveElements": [
  "DPR-aware canvas sizing (fitCanvas)",
  "visibilitychange pause/resume",
  "prefers-reduced-motion guard (REDUCED)",
  "IIFE wrapper"
 ],
 "knownLimitations": [
  "Background color hardcoded in both CSS and canvas fill — must change both to retheme",
  "No pointer interactivity — dots do not react to cursor"
 ],
 "tier": "curated",
 "labels": [
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps",
  "easy-to-modify",
  "agent-ready"
 ],
 "tags": [
  "dots",
  "grid",
  "pulse",
  "sine-wave",
  "canvas",
  "ambient",
  "background"
 ]
}
</script>
</head>
<body>
<div id="dot01-stage" role="img" aria-label="A breathing lattice of red and yellow dots swelling and shrinking in slow sine-wave pulses across a black field.">
  <canvas id="dot01-cv"></canvas>
</div>
<div class="dot01-cap">Pulsing Dot Field</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv=document.getElementById('dot01-cv'); if(!cv) return;
  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width), h=Math.max(2,r.height);
    c.width=Math.round(w*dpr); c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }
  let S=fitCanvas(cv), grid=[], gap=30, t=0, last=performance.now();
  function build(){
    grid=[];
    for(let y=gap/2;y<S.h;y+=gap)
      for(let x=gap/2;x<S.w;x+=gap)
        grid.push({x:x, y:y, ph:(x+y)*0.02});
  }
  build();
  function draw(now){
    const dt=Math.min(0.05,(now-last)/1000); last=now;
    if(!REDUCED) t+=dt;
    const ctx=S.ctx;
    ctx.fillStyle='#0a0608'; ctx.fillRect(0,0,S.w,S.h);
    for(let i=0;i<grid.length;i++){
      const g=grid[i];
      const wave=REDUCED?0.7:(0.55+0.45*Math.sin(t*2+g.ph));
      const rr=3+wave*7;
      ctx.beginPath();
      ctx.fillStyle = wave>0.85 ? '#ffd400' : '#e8112d';
      ctx.globalAlpha=0.45+0.55*wave;
      ctx.arc(g.x, g.y, rr, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  let raf=0, running=false;
  function loop(){ if(!running) return; draw(performance.now()); raf=requestAnimationFrame(loop); }
  function start(){ if(running) return; running=true; last=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
  S.ctx.fillStyle='#0a0608'; S.ctx.fillRect(0,0,S.w,S.h);
  let _rt;
  window.addEventListener('resize', ()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ S=fitCanvas(cv); build(); if(REDUCED) draw(performance.now()); },150); }, {passive:true});
  document.addEventListener('visibilitychange', ()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });
  if(REDUCED){ for(let i=0;i<3;i++) draw(performance.now()); }
  else start();
})();
</script>
</body>
</html>
