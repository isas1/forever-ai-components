<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Mirrored Light Box — Infinitude. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mirrored Light Box</title>
<style>
  html,body{margin:0;height:100%;background:#060406;overflow:hidden}
  #dot06-stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#060406;overflow:hidden}
  .dot06-rot{position:absolute;inset:0;animation:dot06spin 26s linear infinite}
  .dot06-f{position:absolute;border-radius:8px;animation:dot06dive 6s ease-in-out infinite, dot06hue 18s linear infinite}
  .dot06-d{position:absolute;border-radius:50%;transform:translate(-50%,-50%)}
  .dot06-core{position:absolute;border-radius:50%;width:18px;height:18px;background:#fff6d6;box-shadow:0 0 26px #fff6d6,0 0 46px #ffd400;animation:dot06hue 8s linear infinite}
  @keyframes dot06spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  @keyframes dot06hue{from{filter:hue-rotate(0deg)}to{filter:hue-rotate(360deg)}}
  @keyframes dot06dive{0%{transform:scale(1);opacity:.15}50%{opacity:.9}100%{transform:scale(.08);opacity:.1}}
  @media (prefers-reduced-motion: reduce){
    .dot06-rot,.dot06-f,.dot06-core{animation:none}
  }
  .dot06-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#ffd400;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/dot-field/06-mirrored-light-box.html",
 "title": "Mirrored Light Box",
 "description": "12 nested glowing squares dive inward in a perpetual zoom loop while rotating; colored corner dots hue-rotate continuously over a deep dark stage.",
 "useWhen": "Dark-mode hero backgrounds, screensavers, or ambient loop visuals needing a hypnotic tunnel-of-light effect.",
 "avoidWhen": "Light backgrounds (hardcoded dark stage), or contexts where constant motion competes with foreground content.",
 "agentPrompt": "Change the palette to cool blues by replacing cols with ['#00cfff','#0077ff','#00ffcc','#ffffff','#3a86ff','#00b4d8'] and slow the spin to 40s in .dot06-rot.",
 "editableAreas": [
  "frame count (N=12)",
  "color palette (cols array)",
  "spin duration (26s in .dot06-rot)",
  "dive/zoom duration (6s in .dot06-f)",
  "hue-rotate cycle speed (18s / 8s)",
  "frame border thickness (2px solid)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (REDUCED check + animation:none media query)",
  "aria-label on stage div",
  "animationDelay stagger logic (-i*0.5s)"
 ],
 "knownLimitations": [
  "Background color hardcoded in both CSS and inline style — must change in two places",
  "No visibilitychange listener — animation runs while tab is hidden",
  "Corner dots clip at very small viewport sizes"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "infinity-room",
  "nested-frames",
  "color-cycling",
  "dots",
  "glow",
  "generative",
  "loop"
 ]
}
</script>
</head>
<body>
<div id="dot06-stage" role="img" aria-label="Nested square frames diving inward forever, lit by colour-cycling dots on each corner — a small CSS-only infinity room.">
  <div class="dot06-rot" id="dot06-rot"></div>
</div>
<div class="dot06-cap">Mirrored Light Box</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const rot=document.getElementById('dot06-rot'); if(!rot) return;
  const N=12;
  const cols=['#e8112d','#ff2d8a','#ffd400','#fff6d6','#ff63ac','#ff7a18'];
  const corners=[[6,6],[6,94],[94,6],[94,94]];
  for(let i=0;i<N;i++){
    const f=document.createElement('div');
    f.className='dot06-f';
    const sz=92-i*7;
    f.style.width=sz+'%'; f.style.height=sz+'%';
    f.style.left=((100-sz)/2)+'%'; f.style.top=((100-sz)/2)+'%';
    f.style.border='2px solid '+cols[i%cols.length];
    f.style.boxShadow='0 0 14px '+cols[i%cols.length];
    if(REDUCED){ f.style.opacity=(0.2+i*0.05); }
    else { f.style.animationDelay=(-i*0.5)+'s, 0s'; }
    for(let c=0;c<4;c++){
      const d=document.createElement('div');
      d.className='dot06-d';
      d.style.width=d.style.height=(6+(N-i))+'px';
      d.style.background=cols[(i+c)%cols.length];
      d.style.boxShadow='0 0 10px '+cols[(i+c)%cols.length];
      d.style.left=corners[c][0]+'%'; d.style.top=corners[c][1]+'%';
      f.appendChild(d);
    }
    rot.appendChild(f);
  }
  const core=document.createElement('div');
  core.className='dot06-core';
  core.style.left='50%'; core.style.top='50%'; core.style.transform='translate(-50%,-50%)';
  rot.appendChild(core);
})();
</script>
</body>
</html>
