<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Save-the-date card: a flipping date digit pair over a soft breathing gradient, with the event name and a small note that quietly cross-fades between 'Save the date' and 'RSVP opens soon'.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Save the Date Card</title>
<style>
:root{
  --pro-bg:#0d1117;
  --pro-surface:#161b22;
  --pro-border:rgba(255,255,255,.08);
  --pro-text:#e6edf3;
  --pro-muted:#8b949e;
  --pro-accent:#ff6b8b;
  --pro-radius:16px;
  --pro-font:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--pro-bg)}
.esd-stage{position:fixed;inset:0;padding:4vmin;font-family:var(--pro-font);color:var(--pro-text)}
.esd-card{position:relative;height:100%;border-radius:var(--pro-radius);border:1px solid var(--pro-border);
  background:var(--pro-surface);overflow:hidden;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:2.4vmin;text-align:center;padding:3vmin}
.esd-glow{position:absolute;inset:-30%;background:
  radial-gradient(closest-side,color-mix(in srgb,var(--pro-accent) 26%,transparent),transparent 70%);
  filter:blur(6vmin);opacity:.5;animation:esd-drift 9s ease-in-out infinite}
@keyframes esd-drift{0%,100%{transform:translate(-4%,-4%) scale(1)}50%{transform:translate(6%,4%) scale(1.15)}}
.esd-kicker{position:relative;font-size:clamp(7px,1.6vmin,9px);font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--pro-muted)}
.esd-flip{position:relative;display:flex;gap:1.4vmin}
.esd-digit{background:var(--pro-bg);border:1px solid var(--pro-border);border-radius:10px;
  padding:1.4vmin 2vmin;font-size:clamp(24px,8vmin,52px);font-weight:800;font-variant-numeric:tabular-nums;
  color:var(--pro-accent);min-width:9vmin;text-align:center}
.esd-title{position:relative;font-size:clamp(13px,3vmin,19px);font-weight:800}
.esd-note{position:relative;font-size:clamp(8px,1.7vmin,10px);color:var(--pro-muted);font-weight:600;
  min-height:1.4em;opacity:1;transition:opacity .5s}
.cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:var(--pro-muted);
  opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none;pointer-events:none}
@media (prefers-reduced-motion:reduce){.esd-glow{animation:none}.esd-note{transition:none}}
</style>
</head>
<body>
  <div class="esd-stage">
    <div class="esd-card" id="esd-root" role="img"
      aria-label="Save the date card for Northside Founders Meetup on September 18th; a small note alternates between Save the date and RSVP opens soon.">
      <div class="esd-glow" aria-hidden="true"></div>
      <div class="esd-kicker">Save the date</div>
      <div class="esd-flip" aria-hidden="true">
        <div class="esd-digit">09</div>
        <div class="esd-digit">18</div>
      </div>
      <div class="esd-title">Northside Founders Meetup</div>
      <div class="esd-note" id="esd-note">Save the date</div>
    </div>
  </div>
  <div class="cap" aria-hidden="true">Save the Date Card</div>
  <script>(function(){"use strict";
    var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
    var note=document.getElementById('esd-note');
    var msgs=["Save the date","RSVP opens soon"];
    if(reduce)return;
    var running=true, idx=0;
    document.addEventListener('visibilitychange',function(){running=!document.hidden;});
    setInterval(function(){
      if(!running)return;
      note.style.opacity='0';
      setTimeout(function(){
        idx=(idx+1)%msgs.length;
        note.textContent=msgs[idx];
        note.style.opacity='1';
      },260);
    },3200);
  })();</script>

</body>
</html>
