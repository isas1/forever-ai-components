<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="RSVP tally bar: a segmented Going/Maybe/Can't-go bar with a live-updating attendee count above it, a recent-response trend sparkline and a 'just RSVP'd' ticker line below, segments and trend quietly resizing as new responses trickle in.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RSVP Tally Bar</title>
<style>
:root{
  --pro-bg:#0d1117;
  --pro-surface:#161b22;
  --pro-border:rgba(255,255,255,.08);
  --pro-text:#e6edf3;
  --pro-muted:#8b949e;
  --pro-accent:#ff6b8b;
  --pro-accent-2:#ffb648;
  --pro-radius:14px;
  --pro-font:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--pro-bg)}
.ert-stage{position:fixed;inset:0;padding:4vmin;display:flex;flex-direction:column;justify-content:center;
  gap:2.4vmin;font-family:var(--pro-font);color:var(--pro-text)}
.ert-head{display:flex;align-items:baseline;justify-content:space-between}
.ert-h1{font-size:clamp(11px,2.4vmin,15px);font-weight:800}
.ert-total{font-size:clamp(14px,3vmin,19px);font-weight:800;color:var(--pro-accent);font-variant-numeric:tabular-nums}
.ert-bar{display:flex;height:3.6vmin;min-height:20px;border-radius:999px;overflow:hidden;border:1px solid var(--pro-border)}
.ert-seg{height:100%;transition:width .8s ease}
.ert-seg.going{background:var(--pro-accent)}
.ert-seg.maybe{background:var(--pro-accent-2)}
.ert-seg.no{background:var(--pro-muted)}
.ert-legend{display:flex;gap:2.4vmin;flex-wrap:wrap}
.ert-item{display:flex;align-items:center;gap:1vmin;font-size:clamp(8px,1.6vmin,10px);color:var(--pro-muted);font-weight:600}
.ert-dot{width:1.4vmin;height:1.4vmin;min-width:8px;min-height:8px;border-radius:3px}
.ert-dot.going{background:var(--pro-accent)}
.ert-dot.maybe{background:var(--pro-accent-2)}
.ert-dot.no{background:var(--pro-muted)}
.ert-item b{color:var(--pro-text);font-variant-numeric:tabular-nums}
.ert-trend{display:flex;align-items:flex-end;gap:.9vmin;height:8vmin;min-height:34px}
.ert-trend i{flex:1;border-radius:3px 3px 0 0;background:color-mix(in srgb,var(--pro-accent) 45%,var(--pro-border));
  transition:height .6s ease}
.ert-trend i:last-child{background:var(--pro-accent)}
.ert-ticker{display:flex;align-items:center;gap:1.2vmin;padding-top:.4vmin;border-top:1px solid var(--pro-border);
  font-size:clamp(8px,1.6vmin,10px);color:var(--pro-muted);font-weight:600;opacity:0;transition:opacity .5s ease}
.ert-ticker.show{opacity:1}
.ert-ticker b{color:var(--pro-text);font-weight:700}
.ert-tickerdot{width:1.3vmin;height:1.3vmin;min-width:7px;min-height:7px;border-radius:50%;background:var(--pro-accent);
  flex:none}
.cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:var(--pro-muted);
  opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none;pointer-events:none}
@media (prefers-reduced-motion:reduce){.ert-seg{transition:none}.ert-trend i{transition:none}.ert-ticker{transition:none}}
</style>
</head>
<body>
  <div class="ert-stage" id="ert-root" role="img"
    aria-label="RSVP tally for Northside Founders Meetup: 128 going, 34 maybe, 12 can't go, updating live as new responses arrive, with a response trend and a recent-RSVP ticker.">
    <div class="ert-head"><div class="ert-h1">RSVP tally</div><div class="ert-total" id="ert-total">174 responses</div></div>
    <div class="ert-bar" aria-hidden="true">
      <div class="ert-seg going" id="ert-going"></div>
      <div class="ert-seg maybe" id="ert-maybe"></div>
      <div class="ert-seg no" id="ert-no"></div>
    </div>
    <div class="ert-legend" aria-hidden="true">
      <div class="ert-item"><span class="ert-dot going"></span>Going <b id="ert-goingnum">128</b></div>
      <div class="ert-item"><span class="ert-dot maybe"></span>Maybe <b id="ert-maybenum">34</b></div>
      <div class="ert-item"><span class="ert-dot no"></span>Can't go <b id="ert-nonum">12</b></div>
    </div>
    <div class="ert-trend" id="ert-trend" aria-hidden="true"></div>
    <div class="ert-ticker" id="ert-ticker" aria-hidden="true">
      <span class="ert-tickerdot"></span><span id="ert-tickertxt">Maya K. just RSVP'd <b>Going</b> &middot; now</span>
    </div>
  </div>
  <div class="cap" aria-hidden="true">RSVP Tally Bar</div>
  <script>(function(){"use strict";
    var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
    var going=document.getElementById('ert-going'), maybe=document.getElementById('ert-maybe'), no=document.getElementById('ert-no');
    var totalEl=document.getElementById('ert-total'), gN=document.getElementById('ert-goingnum'),
        mN=document.getElementById('ert-maybenum'), nN=document.getElementById('ert-nonum');
    var trendEl=document.getElementById('ert-trend'), tickerEl=document.getElementById('ert-ticker'),
        tickerTxt=document.getElementById('ert-tickertxt');
    var counts={going:128, maybe:34, no:12};
    var trend=[138,147,155,161,166,170,174]; // recent response-total history, oldest first
    var names=[["Maya K.","Going"],["Devon R.","Maybe"],["Priya N.","Going"],["Sam O.","Can't go"],
      ["Kai W.","Going"],["Elena T.","Maybe"],["Marcus B.","Going"],["Nina P.","Going"]];
    var trendBars=trend.map(function(){ var i=document.createElement('i'); trendEl.appendChild(i); return i; });
    function paintTrend(){
      var max=Math.max.apply(null,trend);
      trendBars.forEach(function(bar,i){ bar.style.height=Math.max(14,trend[i]/max*100)+'%'; });
    }
    function paint(){
      var t=counts.going+counts.maybe+counts.no;
      going.style.width=(counts.going/t*100)+'%';
      maybe.style.width=(counts.maybe/t*100)+'%';
      no.style.width=(counts.no/t*100)+'%';
      totalEl.textContent=t+' responses';
      gN.textContent=counts.going; mN.textContent=counts.maybe; nN.textContent=counts.no;
      trend.push(t); trend.shift();
      paintTrend();
    }
    paint();
    tickerEl.classList.add('show');
    if(reduce)return;
    var running=true;
    document.addEventListener('visibilitychange',function(){running=!document.hidden;});
    setInterval(function(){
      if(!running)return;
      var r=Math.random();
      if(r<0.65)counts.going++; else if(r<0.9)counts.maybe++; else counts.no++;
      paint();
      var who=names[Math.floor(Math.random()*names.length)];
      tickerEl.classList.remove('show');
      setTimeout(function(){
        tickerTxt.innerHTML=who[0]+' just RSVP\'d <b>'+who[1]+'</b> &middot; now';
        tickerEl.classList.add('show');
      },260);
    },2400);
  })();</script>
