<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A dark email input field shakes horizontally, borders flush red, a red X pops in and a validation message slides up.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Error Shake</title>
<style>
  html,body{margin:0;height:100%;background:#0b0d12;overflow:hidden}
  #fb02-stage{position:fixed;inset:0;display:grid;place-items:center;
    font:500 14px/1.3 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    -webkit-tap-highlight-color:transparent}
  #fb02-card{width:min(64%,300px);outline:none}
  #fb02-label{font:600 10px/1 ui-monospace,Menlo,monospace;letter-spacing:.14em;
    text-transform:uppercase;color:#5b6472;margin:0 0 10px 2px}
  #fb02-field{position:relative;display:flex;align-items:center;gap:10px;
    height:clamp(40px,9vh,52px);padding:0 12px 0 16px;border-radius:12px;
    background:#11151d;border:1.5px solid #232a36;color:#aeb6c2;
    box-shadow:0 1px 0 #000a inset;will-change:transform;
    transform:translate3d(0,0,0)}
  #fb02-ghost{flex:1;letter-spacing:.02em;color:#6b7484;
    white-space:nowrap;overflow:hidden}
  #fb02-caret{width:2px;height:1.1em;background:#34d399;border-radius:2px;
    margin-left:-2px;will-change:opacity}
  #fb02-mark{position:relative;flex:none;width:22px;height:22px;will-change:transform}
  #fb02-mark svg{display:block;width:100%;height:100%;overflow:visible}
  #fb02-mark line{stroke:#fb6a6a;stroke-width:2.4;stroke-linecap:round;
    transform-box:fill-box;transform-origin:center;will-change:transform}
  #fb02-msg{height:14px;margin:9px 0 0 2px;font:600 11px/1 ui-sans-serif,system-ui,sans-serif;
    letter-spacing:.01em;color:#fb6a6a;will-change:transform,opacity}
  #fb02-card:focus-visible #fb02-field{border-color:#34d399;
    box-shadow:0 0 0 3px #34d39933,0 1px 0 #000a inset}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important}}
</style>
</head>
<body>
  <div id="fb02-stage">
    <div id="fb02-card" role="button" tabindex="0"
         aria-label="Submit field. Activate to trigger an error.">
      <p id="fb02-label">email</p>
      <div id="fb02-field">
        <span id="fb02-ghost">not-an-email</span>
        <span id="fb02-caret"></span>
        <span id="fb02-mark" aria-hidden="true">
          <svg viewBox="0 0 22 22">
            <line id="fb02-l1" x1="5" y1="5" x2="17" y2="17"></line>
            <line id="fb02-l2" x1="17" y1="5" x2="5" y2="17"></line>
          </svg>
        </span>
      </div>
      <div id="fb02-msg" role="status" aria-live="polite"></div>
    </div>
  </div>
  <div class="cap">Error Shake</div>
<script>
(function(){
  "use strict";
  var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
  var field=document.getElementById("fb02-field"),
      mark=document.getElementById("fb02-mark"),
      l1=document.getElementById("fb02-l1"),
      l2=document.getElementById("fb02-l2"),
      caret=document.getElementById("fb02-caret"),
      msg=document.getElementById("fb02-msg"),
      card=document.getElementById("fb02-card");

  function applyStatic(){
    field.style.transform="translate3d(0,0,0)";
    field.style.borderColor="#7a2f33";
    mark.style.transform="scale(1)";
    l1.style.transform="scale(1)";l2.style.transform="scale(1)";
    msg.textContent="enter a valid email";
    msg.style.opacity="1";msg.style.transform="translate3d(0,0,0)";
    caret.style.opacity="0";
  }
  if(reduce){applyStatic();return;}

  // spring + decaying-sine shake, transform only. amplitude in px.
  var AMP=13, FREQ=22, DECAY=7.5;        // shake envelope
  var t=0, running=true, active=false;   // active = shake playing
  var phase=0;                            // 0 idle, rising 0..1 cross draw
  var idleUntil=0, userControl=false;
  var nextAuto=performance.now()+1400;
  var caretT=0;

  function trigger(){
    if(active) return;
    active=true; t=0; phase=0;
    msg.textContent="enter a valid email";
  }

  function settle(){
    active=false; phase=0;
    field.style.transform="translate3d(0,0,0)";
    field.style.borderColor="#232a36";
    mark.style.transform="scale(0)";
    l1.style.transform="scale(0)";l2.style.transform="scale(0)";
    msg.textContent="";msg.style.opacity="0";
  }
  settle();

  // ease helpers
  function eo(x){return 1-Math.pow(1-x,3);}

  var last=performance.now();
  function frame(now){
    if(!running) return;
    var dt=(now-last)/1000; if(dt>0.05)dt=0.05; last=now;

    // self-demo scheduler
    if(!userControl && !active && now>nextAuto){
      trigger(); nextAuto=now+3200;
    }
    if(userControl && now>idleUntil){ userControl=false; nextAuto=now+1200; }

    // caret blink (opacity only) while idle/no error
    if(!active){
      caretT+=dt;
      caret.style.opacity = (caretT%1.0<0.5)?"0.9":"0.15";
    } else { caret.style.opacity="0"; }

    if(active){
      t+=dt;
      // shake: decaying sine, ~0.55s
      var env=Math.exp(-DECAY*t);
      var x=Math.sin(t*FREQ*Math.PI*2*0.5)*AMP*env;
      // tiny counter-rotate via skew-free: keep transform-only translate
      field.style.transform="translate3d("+x.toFixed(2)+"px,0,0)";

      // border flush to red, eased
      var bc=eo(Math.min(1,t/0.18));
      var r=Math.round(0x23+(0x9a-0x23)*bc),
          g=Math.round(0x2a+(0x3a-0x2a)*bc),
          b=Math.round(0x36+(0x3c-0x36)*bc);
      field.style.borderColor="rgb("+r+","+g+","+b+")";

      // cross pop: overshoot spring on scale, draw the two strokes
      var cp=Math.min(1,t/0.42);
      var s=cp<1 ? (1.0 - (1-eo(cp)))*1 : 1;
      // overshoot: scale to 1.18 then back
      var os = t<0.30 ? 1 + Math.sin(eo(Math.min(1,t/0.30))*Math.PI)*0.18 : 1;
      mark.style.transform="scale("+(eo(Math.min(1,t/0.22))*os).toFixed(3)+")";
      var d1=eo(Math.min(1,t/0.26)), d2=eo(Math.min(1,Math.max(0,(t-0.07)/0.26)));
      l1.style.transform="scale("+d1.toFixed(3)+")";
      l2.style.transform="scale("+d2.toFixed(3)+")";

      // message slides up + fades in
      var mp=eo(Math.min(1,Math.max(0,(t-0.10)/0.30)));
      msg.style.opacity=mp.toFixed(3);
      msg.style.transform="translate3d(0,"+((1-mp)*4).toFixed(2)+"px,0)";

      if(t>2.7){ settle(); }   // hold, then reset for next cycle
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // real interaction: hand control to user, ease back after idle
  function userTrigger(){
    userControl=true; idleUntil=performance.now()+4000;
    if(active){ active=false; } // restart cleanly
    trigger();
  }
  card.addEventListener("pointerdown",function(){ userTrigger(); });
  card.addEventListener("keydown",function(e){
    if(e.key==="Enter"||e.key===" "){ e.preventDefault(); userTrigger(); }
  });

  document.addEventListener("visibilitychange",function(){
    if(document.hidden){ running=false; }
    else if(!running){ running=true; last=performance.now();
      nextAuto=last+1200; requestAnimationFrame(frame); }
  });
})();
</script>
</body>
</html>
