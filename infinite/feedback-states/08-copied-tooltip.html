<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A flat copy button presses down and a green 'Copied!' tooltip with a check springs up on a notch, holds, then retreats.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Copied!</title>
<style>
  html,body{margin:0;height:100%}
  body{background:#0b0d12;overflow:hidden}
  #fb08-stage{position:fixed;inset:0;display:grid;place-items:center;outline:none}
  #fb08-stage:focus-visible #fb08-btn{box-shadow:0 0 0 3px rgba(52,211,153,.55)}
  #fb08-wrap{position:relative;width:min(58vmin,300px);display:grid;place-items:center}
  /* The button: a Bauhaus slab — flat, primary discipline, mechanical. */
  #fb08-btn{position:relative;display:flex;align-items:center;gap:14px;
    padding:18px 26px;background:#11161f;border:2px solid #1f2a36;border-radius:4px;
    cursor:pointer;will-change:transform;transform-origin:50% 100%;
    box-shadow:0 0 0 4px rgba(52,211,153,.06)}
  #fb08-lbl{font:600 clamp(14px,4.4vmin,22px)/1 ui-monospace,Menlo,monospace;
    color:#e8eef2;letter-spacing:.06em;white-space:nowrap}
  /* clipboard glyph built from rectangles — geometric primitives only */
  #fb08-ico{width:clamp(20px,6vmin,30px);height:clamp(20px,6vmin,30px);display:block;flex:none}
  .fb08-clip{fill:none;stroke:#e8eef2;stroke-width:5}
  .fb08-tab{fill:#e8eef2}
  .fb08-line{stroke:#34d399;stroke-width:5;stroke-linecap:round}
  /* The tooltip: a hard rectangle that springs up — primary yellow notch, teal field */
  #fb08-tip{position:absolute;bottom:calc(100% + 16px);left:50%;
    display:flex;align-items:center;gap:9px;padding:11px 17px;
    background:#34d399;border-radius:4px;white-space:nowrap;pointer-events:none;
    opacity:0;will-change:transform,opacity;transform-origin:50% 130%;
    box-shadow:0 0 0 3px rgba(52,211,153,.18)}
  #fb08-tiptxt{font:700 clamp(13px,3.8vmin,18px)/1 ui-monospace,Menlo,monospace;
    color:#04231a;letter-spacing:.04em}
  #fb08-notch{position:absolute;top:100%;left:50%;width:12px;height:12px;
    margin-left:-6px;background:#34d399;transform:rotate(45deg);border-radius:2px}
  .fb08-tick{fill:none;stroke:#04231a;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
  #fb08-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  #fb08-hint{position:fixed;right:9px;bottom:7px;font:600 9px/1 ui-monospace,Menlo,monospace;
    color:#34d399;opacity:.34;letter-spacing:.1em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important}}
</style>
</head>
<body>
<div id="fb08-stage" role="button" tabindex="0"
  aria-label="Copy button. Activate to copy and show the copied confirmation.">
  <div id="fb08-wrap">
    <div id="fb08-tip" aria-hidden="true">
      <svg id="fb08-tipico" viewBox="0 0 32 32" aria-hidden="true" style="width:clamp(16px,4.6vmin,22px);height:clamp(16px,4.6vmin,22px)">
        <path class="fb08-tick" d="M7 17 L13 23 L25 9"></path>
      </svg>
      <span id="fb08-tiptxt">Copied!</span>
      <span id="fb08-notch"></span>
    </div>
    <div id="fb08-btn">
      <svg id="fb08-ico" viewBox="0 0 32 32" aria-hidden="true">
        <rect class="fb08-clip" x="7" y="5" width="18" height="22" rx="2"></rect>
        <rect class="fb08-tab" x="12" y="2" width="8" height="5" rx="1.5"></rect>
        <line class="fb08-line" x1="12" y1="14" x2="20" y2="14"></line>
        <line class="fb08-line" x1="12" y1="20" x2="18" y2="20"></line>
      </svg>
      <span id="fb08-lbl">Copy</span>
    </div>
  </div>
</div>
<div id="fb08-cap">Copied!</div>
<div id="fb08-hint" aria-hidden="true">tap / space</div>
<div id="fb08-live" role="status" aria-live="polite"
  style="position:fixed;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)"></div>

<script>
(function(){
  "use strict";
  var reduce = matchMedia("(prefers-reduced-motion:reduce)").matches;
  var stage = document.getElementById("fb08-stage");
  var btn   = document.getElementById("fb08-btn");
  var tip   = document.getElementById("fb08-tip");
  var live  = document.getElementById("fb08-live");

  // Decaying-overshoot spring: rests at 1 with a crisp mechanical settle.
  function spring(t){
    if(t>=1) return 1;
    return 1 + Math.pow(2,-8*t) * Math.sin((t*6 - 0.16) * (Math.PI*2)) * 0.5;
  }
  function easeOut(t){ return 1 - Math.pow(1-t, 3); }

  function drawIdle(){
    btn.style.transform = "scale(1)";
    tip.style.opacity = 0;
    tip.style.transform = "translateX(-50%) scale(0)";
  }
  function drawCopied(){
    btn.style.transform = "scale(1)";
    tip.style.opacity = 1;
    tip.style.transform = "translateX(-50%) scale(1)";
    live.textContent = "Copied to clipboard";
  }
  if(reduce){ drawCopied(); return; }

  // Timeline (ms): 0-110 button press-down; 90-470 tip springs up + fades in;
  // hold to HOLD; HOLD-end tip eases out; button recovers with the press.
  var PRESS = 150, RISE = 380, HOLD = 1400, FALL = 300;
  var DUR = RISE + HOLD + FALL;     // tip lifecycle after press begins
  var IDLE_AFTER = 4200;            // hand back to self-demo after user input
  var AUTO_GAP   = 1900;            // pause between autonomous replays

  var running = true, rafId = 0;
  var playStart = -1;
  var nextAuto = 0;
  var userMode = false, lastInput = 0;

  function trigger(now, fromUser){
    playStart = now;
    tip.style.opacity = 0;
    tip.style.transform = "translateX(-50%) scale(0)";
    live.textContent = "";
    if(fromUser){ userMode = true; lastInput = now; }
  }

  function frame(now){
    if(!running) return;

    if(playStart < 0){
      if(userMode && now - lastInput > IDLE_AFTER) userMode = false;
      if(now >= nextAuto && !userMode) trigger(now, false);
    }

    if(playStart >= 0){
      var ms = now - playStart;

      // button press: dips down quickly, springs back — transform only
      var bp;
      if(ms < PRESS){ bp = 1 - easeOut(ms/PRESS) * 0.07; }
      else { bp = 0.93 + (spring(Math.min(1,(ms-PRESS)/420)) - 1 + 0.07); }
      if(bp > 1.06) bp = 1.06;
      btn.style.transform = "scale(" + bp.toFixed(4) + ")";

      // tooltip rise: spring scale + opacity, starts after press lands
      var rs = ms - PRESS * 0.6;
      if(rs <= 0){
        tip.style.opacity = 0;
        tip.style.transform = "translateX(-50%) scale(0)";
      } else if(rs < RISE){
        var rt = rs / RISE;
        var sc = spring(rt);
        tip.style.opacity = Math.min(1, easeOut(rt*1.4)).toFixed(3);
        tip.style.transform = "translateX(-50%) scale(" + sc.toFixed(4) + ")";
        if(rs > RISE*0.5 && live.textContent === "") live.textContent = "Copied to clipboard";
      } else if(rs < RISE + HOLD){
        tip.style.opacity = 1;
        tip.style.transform = "translateX(-50%) scale(1)";
      } else {
        // fall: ease down + fade out, tip retreats into the button
        var ft = (rs - RISE - HOLD) / FALL;
        if(ft > 1) ft = 1;
        var e = easeOut(ft);
        tip.style.opacity = (1 - e).toFixed(3);
        tip.style.transform = "translateX(-50%) scale(" + (1 - e*0.55).toFixed(4) + ")";
      }

      if(ms >= PRESS + DUR){
        playStart = -1;
        nextAuto = now + AUTO_GAP;
        drawIdle();
      }
    }
    rafId = requestAnimationFrame(frame);
  }

  function start(){ if(!running){ running = true; rafId = requestAnimationFrame(frame); } }
  function stop(){ running = false; cancelAnimationFrame(rafId); }

  function userPlay(){
    var now = performance.now();
    btn.style.transform = "scale(1)";
    trigger(now, true);
  }

  stage.addEventListener("pointerdown", function(){ userPlay(); });
  stage.addEventListener("keydown", function(e){
    if(e.key === " " || e.key === "Enter"){ e.preventDefault(); userPlay(); }
  });

  document.addEventListener("visibilitychange", function(){
    if(document.hidden){ stop(); }
    else { nextAuto = performance.now() + 400; start(); }
  });

  drawIdle();
  nextAuto = performance.now() + 650;
  rafId = requestAnimationFrame(frame);
})();
</script>
</body>
</html>
