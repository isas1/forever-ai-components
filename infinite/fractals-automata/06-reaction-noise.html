<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A slowly flowing field of domain-warped fractal noise in violet, indigo and ink, like layered marbled smoke.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Domain Warp</title>
<style>
  html,body{margin:0;height:100%;background:#06070b;overflow:hidden}
  #fr06-stage{position:fixed;inset:0;background:#06070b}
  #fr06-c{position:absolute;inset:0;width:100%;height:100%;display:block;
    box-shadow:inset 0 0 120px 30px rgba(6,7,11,.9)}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none;z-index:2}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important}}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/fractals-automata/06-reaction-noise.html",
 "title": "Domain Warp",
 "description": "Slowly flowing domain-warped fractal noise rendered in violet, indigo, and ink tones; layered fbm warp passes produce marbled smoke patterns.",
 "useWhen": "Dark-mode hero backgrounds, creative portfolio ambience, loading screens needing slow organic motion.",
 "avoidWhen": "Contexts requiring legible text overlays — the shifting noise competes with content. Light-color UIs (background hardcoded dark near-black).",
 "agentPrompt": "Change the palette stops array to warm amber/magenta tones (e.g. replace stops with [[6,4,2],[46,20,10],[120,60,20],[220,120,40],[255,180,80],[255,230,200]]) and slow the warp by changing qx multiplier from 0.018 to 0.008.",
 "editableAreas": [
  "palette stops array (stops variable)",
  "simulation grid cap (cap=140, lower for speed)",
  "warp time speeds (ty=t*0.06, qx=t*0.018, qy=t*0.012)",
  "domain warp strength (4.0 multipliers in fbm calls)",
  "blend ratio (f*0.6 + r1*0.4)"
 ],
 "preserveElements": [
  "low-res offscreen buffer pattern (critical for perf)",
  "IIFE wrapper",
  "visibilitychange pause/resume",
  "prefers-reduced-motion static fallback (frame(12.0))"
 ],
 "knownLimitations": [
  "CPU-bound nested fbm loops — 4 octaves x 5 fbm calls per pixel; heavy on low-end devices",
  "Simulation grid capped at 140px edge — upscaled so sharp edges are intentionally soft",
  "No interactivity; purely ambient"
 ],
 "tier": "curated",
 "labels": [
  "accessible",
  "copy-paste-safe",
  "minimal-deps",
  "animation-heavy",
  "mobile-ready"
 ],
 "tags": [
  "fractal",
  "noise",
  "domain-warp",
  "generative",
  "ambient",
  "canvas",
  "palette"
 ]
}
</script>
</head>
<body>
<div id="fr06-stage" role="img" aria-label="A slowly flowing field of domain-warped fractal noise in violet, indigo and ink, like layered marbled smoke.">
  <canvas id="fr06-c"></canvas>
</div>
<div class="cap">Domain Warp</div>
<script>
(function(){
  "use strict";
  var cv=document.getElementById("fr06-c");
  var ctx=cv.getContext("2d",{alpha:false});
  var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;

  // --- value-noise lattice (deterministic, IP-safe) ---
  var N=256, mask=N-1, perm=new Uint8Array(N), grad=new Float32Array(N);
  (function(){
    var s=1337;
    function r(){ s^=s<<13; s^=s>>>17; s^=s<<5; return ((s>>>0)/4294967296); }
    for(var i=0;i<N;i++){ perm[i]=i; grad[i]=r(); }
    for(var j=N-1;j>0;j--){ var k=(r()*(j+1))|0; var t=perm[j]; perm[j]=perm[k]; perm[k]=t; }
  })();
  function sm(t){ return t*t*(3-2*t); }
  function vnoise(x,y){
    var xi=Math.floor(x), yi=Math.floor(y);
    var xf=x-xi, yf=y-yi;
    var X=xi&mask, Y=yi&mask;
    var aa=grad[(perm[(X+perm[Y&mask])&mask])&mask];
    var ba=grad[(perm[((X+1)+perm[Y&mask])&mask])&mask];
    var ab=grad[(perm[(X+perm[(Y+1)&mask])&mask])&mask];
    var bb=grad[(perm[((X+1)+perm[(Y+1)&mask])&mask])&mask];
    var u=sm(xf), v=sm(yf);
    return aa+(ba-aa)*u + ((ab-aa)+(ba-aa)*-u + (bb-ab)*u)*v;
  }
  function fbm(x,y){
    var f=0, a=0.5, fx=x, fy=y;
    for(var o=0;o<4;o++){ f+=a*vnoise(fx,fy); fx*=2.0; fy*=2.0; a*=0.5; }
    return f;
  }

  // --- palette LUT: ink -> indigo -> violet accent -> pale (256 stops) ---
  var lut=new Uint8Array(256*3);
  var stops=[[6,7,11],[20,18,46],[58,44,120],[120,96,220],[155,140,255],[214,210,255]];
  (function(){
    for(var i=0;i<256;i++){
      var p=i/255*(stops.length-1), si=p|0, fr=p-si;
      if(si>=stops.length-1){ si=stops.length-2; fr=1; }
      var c0=stops[si], c1=stops[si+1];
      lut[i*3]=  (c0[0]+(c1[0]-c0[0])*fr)|0;
      lut[i*3+1]=(c0[1]+(c1[1]-c0[1])*fr)|0;
      lut[i*3+2]=(c0[2]+(c1[2]-c0[2])*fr)|0;
    }
  })();

  // --- capped low-res buffer, upscaled by canvas ---
  var W=0,H=0,img=null,buf=null,sx=0,sy=0;
  function resize(){
    var sc=Math.min(2,window.devicePixelRatio||1);
    cv.width=Math.max(1,(cv.clientWidth*sc)|0);
    cv.height=Math.max(1,(cv.clientHeight*sc)|0);
    var cap=140; // hard cap on sim grid edge
    var ar=cv.width/cv.height;
    if(ar>=1){ W=cap; H=Math.max(1,(cap/ar)|0); } else { H=cap; W=Math.max(1,(cap*ar)|0); }
    img=ctx.createImageData(W,H);
    buf=img.data;
    for(var i=3;i<buf.length;i+=4) buf[i]=255;
    sx=cv.width/W; sy=cv.height/H;
    ctx.imageSmoothingEnabled=true;
  }

  var off=document.createElement("canvas"), octx=null;
  function frame(t){
    // domain warp: warp the lookup coords by another fbm field
    var inv=3.4/W, ty=t*0.06, qx=t*0.018, qy=t*0.012;
    var k=0;
    for(var y=0;y<H;y++){
      var ny=y*inv;
      for(var x=0;x<W;x++,k+=4){
        var nx=x*inv;
        var q1=fbm(nx+qx, ny+ty);
        var q2=fbm(nx+5.2+qx, ny+1.3-ty);
        var r1=fbm(nx+4.0*q1+1.7, ny+4.0*q2+9.2-qy);
        var r2=fbm(nx+4.0*q1+8.3, ny+4.0*q2+2.8+qy);
        var f=fbm(nx+4.0*r1, ny+4.0*r2);
        var v=f*0.6+r1*0.4; // 0..1-ish
        var idx=(v*255)|0; if(idx<0)idx=0; else if(idx>255)idx=255;
        var li=idx*3;
        buf[k]=lut[li]; buf[k+1]=lut[li+1]; buf[k+2]=lut[li+2];
      }
    }
    off.width=W; off.height=H;
    octx.putImageData(img,0,0);
    ctx.drawImage(off,0,0,W,H,0,0,cv.width,cv.height);
  }

  var running=false, raf=0, t0=0, last=0;
  function loop(now){
    if(!running) return;
    if(now-last>=33){ last=now; frame((now-t0)*0.001); }
    raf=requestAnimationFrame(loop);
  }
  function start(){ if(running)return; running=true; last=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf)cancelAnimationFrame(raf); raf=0; }

  function init(){
    resize();
    octx=off.getContext("2d");
    if(reduce){ t0=performance.now(); frame(12.0); return; }
    t0=performance.now(); last=t0; start();
  }

  var rz=0;
  window.addEventListener("resize",function(){
    if(rz)clearTimeout(rz);
    rz=setTimeout(function(){ resize(); if(reduce){ frame(12.0); } },120);
  });
  document.addEventListener("visibilitychange",function(){
    if(reduce)return;
    if(document.hidden) stop(); else start();
  });

  init();
})();
</script>
</body>
</html>
