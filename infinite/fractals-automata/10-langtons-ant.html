<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Langton's ant traces emergent violet highways across a square grid with a glowing recency trail and bright head dot.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Langton's Ant</title>
<style>
  html,body{margin:0;height:100%;background:#06070b}
  #fr10-stage{position:fixed;inset:0;background:#06070b;overflow:hidden}
  /* static glow halo — never repaints */
  #fr10-stage::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(120% 120% at 50% 42%,rgba(155,140,255,.10),transparent 60%);
    box-shadow:inset 0 0 140px rgba(6,7,11,.9)}
  #fr10-c{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    image-rendering:pixelated;width:92%;height:92%;object-fit:contain}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important}}
</style>
</head>
<body>
<div id="fr10-stage" role="img" aria-label="Langton's ant: a single automaton tracing emergent highways across a square grid.">
  <canvas id="fr10-c"></canvas>
</div>
<div class="cap">Langton&rsquo;s Ant</div>
<script>
(function(){
  "use strict";
  var reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
  var cv = document.getElementById('fr10-c');
  var ctx = cv.getContext('2d', {alpha:false});

  // ---- capped square grid ----
  var N = 121;                 // cells per side (odd → centred ant)
  var cells = new Uint8Array(N*N);   // 0=dark, 1=lit
  var age   = new Uint16Array(N*N);  // recency for trail glow

  // palette around #06070b / #9b8cff (Bauhaus-cool with a violet bias)
  var BG=[10,11,18], C0=[18,20,34];
  var pal=[[60,52,120],[96,84,200],[155,140,255],[206,198,255]]; // depth ramp

  // pixel buffer — one ImageData blit per frame
  var img, data;
  function alloc(){ img = ctx.createImageData(N,N); data = img.data;
    for(var i=0;i<data.length;i+=4){data[i+3]=255;} }
  alloc();

  // ---- ant state ----
  var ax, ay, dir, reset;
  function init(){
    cells.fill(0); age.fill(0);
    ax=(N>>1); ay=(N>>1); dir=0; reset=0;
  }
  init();
  var DX=[0,1,0,-1], DY=[-1,0,1,0]; // N,E,S,W

  var STEPS = 90;          // ant moves per frame — capped, fixed
  var MAXAGE = 900;        // trail fade horizon
  var clock = 0;

  function step(){
    var idx = ay*N+ax, s = cells[idx];
    dir = s ? (dir+3)&3 : (dir+1)&3;   // on lit turn left, on dark turn right
    cells[idx] = s^1;
    age[idx] = clock;
    ax += DX[dir]; ay += DY[dir];
    // wrap toroidally — keeps the highway on the capped grid
    if(ax<0)ax=N-1; else if(ax>=N)ax=0;
    if(ay<0)ay=N-1; else if(ay>=N)ay=0;
    // auto-reset when the highway runs long, for an eternal loop
    if(++reset>14000){ init(); }
  }

  function paint(){
    var c=clock;
    for(var i=0,p=0;i<cells.length;i++,p+=4){
      if(cells[i]){
        var d=c-age[i]; if(d<0)d+=65536;
        var t = d>MAXAGE?0:1-(d/MAXAGE);   // recency 0..1
        var k = t>.66?2:(t>.30?1:0);        // depth band
        var col = pal[ t>.92?3:k ];
        data[p]=col[0]; data[p+1]=col[1]; data[p+2]=col[2];
      } else {
        data[p]=C0[0]; data[p+1]=C0[1]; data[p+2]=C0[2];
      }
    }
    // ant head — bright accent dot
    var hi=ay*N+ax, hp=hi*4;
    data[hp]=232; data[hp+1]=228; data[hp+2]=255;
    ctx.putImageData(img,0,0);
  }

  // ---- sizing (cached; recompute on resize only) ----
  function size(){
    var s = N; // canvas is the grid; CSS scales it up crisply
    cv.width = s; cv.height = s;
    ctx.imageSmoothingEnabled = false;
    paint();
  }

  // ---- single rAF loop, pause on hidden ----
  var raf=0, running=false;
  function frame(){
    if(!running) return;
    for(var k=0;k<STEPS;k++) step();
    clock++;
    paint();
    raf=requestAnimationFrame(frame);
  }
  function start(){ if(running)return; running=true; raf=requestAnimationFrame(frame); }
  function stop(){ running=false; if(raf)cancelAnimationFrame(raf); raf=0; }

  size();
  window.addEventListener('resize', size);

  if(reduce){
    // settle to a static, legible frame: run a fixed budget once, draw, stop.
    for(var q=0;q<11000;q++) step();
    clock++; paint();
    return;
  }

  document.addEventListener('visibilitychange', function(){
    if(document.hidden) stop(); else start();
  });
  start();
})();
</script>
</body>
</html>
