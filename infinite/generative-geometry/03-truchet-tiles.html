<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="8x8 grid of rainbow Truchet quarter-arc tiles that flip orientation in waves, weaving shifting interlocked curves.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truchet Tiles</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#1a1224}
  #c{display:block;width:100%;height:100%}
  #cap{position:fixed;left:8px;bottom:7px;font:11px/1 ui-monospace,monospace;
       color:#ffb3e6;opacity:.45;letter-spacing:.5px;pointer-events:none;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/generative-geometry/03-truchet-tiles.html",
 "title": "Truchet Tiles",
 "description": "8x8 grid of rainbow quarter-arc Truchet tiles that flip orientation in slow sine waves, weaving shifting interlocked curves across a dark background.",
 "useWhen": "Generative art backgrounds, creative portfolio heroes, or anywhere a hypnotic geometric pattern is needed without heavy compute.",
 "avoidWhen": "Contexts needing legible text overlaid — rainbow hues and constant flipping compete with copy. Not suited to light backgrounds without restyling.",
 "agentPrompt": "Change the grid size to 12x12 by setting n=12 in build(), shift the color to cool blues by changing the hue formula to (t*0.02+x*12+y*12+200)%360, and thicken the stroke to cell*0.22.",
 "editableAreas": [
  "grid size (n=8 in build())",
  "hue animation formula (t*0.02+x*16+y*16)",
  "stroke width (cell*0.16)",
  "flip speed per cell (c.sp range 0.4..1.2)",
  "background color (#1a1224)"
 ],
 "preserveElements": [
  "DPR-aware canvas sizing",
  "visibilitychange pause guard",
  "prefers-reduced-motion static draw fallback",
  "IIFE wrapper"
 ],
 "knownLimitations": [
  "Background color hardcoded in both CSS and JS fillStyle — must change both",
  "Grid is always square; non-square layouts require refactoring ox/oy math",
  "Click flips only base orientation (r), not the live flip — effect is subtle during wave motion"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "truchet",
  "generative",
  "canvas",
  "grid",
  "arcs",
  "rainbow",
  "loop"
 ]
}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div id="cap">truchet tiles</div>
<script>
(function(){
  const cv=document.getElementById('c'),ctx=cv.getContext('2d');
  let W,H,DPR,cells,n,cell,ox,oy,mouse=null;
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);build();}
  function build(){
    const s=Math.min(W,H);n=8;cell=s/n;ox=(W-s)/2;oy=(H-s)/2;
    cells=[];for(let i=0;i<n*n;i++)cells.push({r:Math.random()<.5?0:1,a:Math.random()*Math.PI*2,sp:0.4+Math.random()*0.8,fl:Math.random()*6});
  }
  function draw(t){
    ctx.fillStyle='#1a1224';ctx.fillRect(0,0,W,H);
    ctx.lineWidth=Math.max(2,cell*0.16);ctx.lineCap='round';
    for(let y=0;y<n;y++)for(let x=0;x<n;x++){
      const c=cells[y*n+x];
      const X=ox+x*cell,Y=oy+y*cell,r=cell/2;
      const hue=(t*0.02+x*16+y*16)%360;
      ctx.strokeStyle='hsl('+hue+',80%,65%)';
      const flip=Math.sin(t*0.0007*c.sp+c.fl)>0?c.r:1-c.r;
      ctx.beginPath();
      if(flip===0){
        ctx.arc(X,Y,r,0,Math.PI/2);
        ctx.arc(X+cell,Y+cell,r,Math.PI,Math.PI*1.5);
      }else{
        ctx.arc(X+cell,Y,r,Math.PI/2,Math.PI);
        ctx.arc(X,Y+cell,r,Math.PI*1.5,Math.PI*2);
      }
      ctx.stroke();
    }
  }
  let raf;
  function loop(t){if(!reduce)draw(t);raf=requestAnimationFrame(loop);}
  function start(){cancelAnimationFrame(raf);raf=requestAnimationFrame(loop);}
  addEventListener('resize',resize);
  cv.addEventListener('pointerdown',e=>{
    const r=cv.getBoundingClientRect();const px=(e.clientX-r.left-ox)/cell|0,py=(e.clientY-r.top-oy)/cell|0;
    const i=py*n+px;if(cells[i])cells[i].r=1-cells[i].r;
  });
  document.addEventListener('visibilitychange',()=>{if(document.hidden)cancelAnimationFrame(raf);else start();});
  resize();if(reduce)draw(0);else start();
})();
</script>
</body>
</html>
