<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Overlapping concentric ring patterns in cyan, pink and green drift to create shifting moire interference; pointer steers a center.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moire Interference</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#02080f}
  #c{display:block;width:100%;height:100%}
  #cap{position:fixed;left:8px;bottom:7px;font:11px/1 ui-monospace,monospace;
       color:#66f0ff;opacity:.5;letter-spacing:.5px;pointer-events:none;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/generative-geometry/07-moire.html",
 "title": "Moiré Interference",
 "description": "Three drifting concentric ring sets in cyan, pink, and green blend additively to create shifting moiré patterns. Pointer steers one ring center.",
 "useWhen": "Dark-mode hero backgrounds, generative art displays, ambient panels where optical interference adds visual depth.",
 "avoidWhen": "Light backgrounds (hardcoded dark navy). Users sensitive to repetitive optical interference patterns or motion.",
 "agentPrompt": "Change the cyan rings color to gold ('rgba(255,200,50,0.35)') and increase ring spacing from 10 to 14 for a more open pattern.",
 "editableAreas": [
  "ring spacing (r+=10 in rings loop)",
  "ring colors (rgba values in draw())",
  "separation scale (0.16 multiplier)",
  "wobble speed (t*0.0006)",
  "pointer lerp speed (0.05 factor)"
 ],
 "preserveElements": [
  "globalCompositeOperation='lighter' (creates interference effect)",
  "IIFE wrapper",
  "visibilitychange pause",
  "reduced-motion guard"
 ],
 "knownLimitations": [
  "No reduced-motion animation fallback — shows a single static frame only",
  "Background color hardcoded in both CSS and canvas fill — edit both to change",
  "Ring wobble uses raw ms timestamp — speed tweaks are non-linear"
 ],
 "tier": "curated",
 "labels": [
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps",
  "agent-ready"
 ],
 "tags": [
  "moire",
  "interference",
  "rings",
  "generative",
  "canvas",
  "additive-blend",
  "ambient"
 ]
}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div id="cap">moiré interference</div>
<script>
(function(){
  const cv=document.getElementById('c'),ctx=cv.getContext('2d');
  let W,H,DPR,mx=0.5,my=0.5,tmx=0.5,tmy=0.5;
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  function rings(cx,cy,hue,t,sp){
    const max=Math.hypot(W,H);
    ctx.strokeStyle=hue;ctx.lineWidth=1.1;
    for(let r=4;r<max;r+=10){
      ctx.beginPath();ctx.arc(cx,cy,r+Math.sin(t*0.001*sp+r*0.05)*2,0,7);ctx.stroke();
    }
  }
  function draw(t){
    ctx.fillStyle='#02080f';ctx.fillRect(0,0,W,H);
    mx+=(tmx-mx)*0.05;my+=(tmy-my)*0.05;
    const sep=Math.min(W,H)*0.16;
    const wob=Math.sin(t*0.0006)*sep;
    ctx.globalCompositeOperation='lighter';
    rings(W*mx-wob, H*my, 'rgba(90,200,255,0.35)', t, 1);
    rings(W*(1-mx)+wob, H*(1-my)+Math.cos(t*0.0007)*sep, 'rgba(255,90,170,0.32)', t, -1.3);
    rings(W*0.5+Math.cos(t*0.0005)*sep, H*my, 'rgba(120,255,170,0.22)', t, 0.7);
    ctx.globalCompositeOperation='source-over';
  }
  let raf;
  function loop(t){if(!reduce)draw(t);raf=requestAnimationFrame(loop);}
  function start(){cancelAnimationFrame(raf);raf=requestAnimationFrame(loop);}
  addEventListener('resize',resize);
  cv.addEventListener('pointermove',e=>{const r=cv.getBoundingClientRect();
    tmx=(e.clientX-r.left)/W;tmy=(e.clientY-r.top)/H;});
  cv.addEventListener('pointerleave',()=>{tmx=0.5;tmy=0.5;});
  document.addEventListener('visibilitychange',()=>{if(document.hidden)cancelAnimationFrame(raf);else start();});
  resize();if(reduce)draw(0);else start();
})();
</script>
</body>
</html>
