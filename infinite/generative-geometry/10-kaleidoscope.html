<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Ten-fold mirrored kaleidoscope of spinning pink-and-magenta polygon blobs slowly rotating on a deep plum field.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaleidoscope</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0c0612}
  #c{display:block;width:100%;height:100%}
  #cap{position:fixed;left:8px;bottom:7px;font:11px/1 ui-monospace,monospace;
       color:#ff9ad1;opacity:.45;letter-spacing:.5px;pointer-events:none;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/generative-geometry/10-kaleidoscope.html",
 "title": "Kaleidoscope",
 "description": "10-fold mirrored kaleidoscope of rotating polygon blobs on a deep plum background; tap/click spins the pattern and regenerates blobs.",
 "useWhen": "Dark-mode hero backgrounds, screensavers, generative art showcases, or any ambient loop needing hypnotic symmetry.",
 "avoidWhen": "Light-background UIs (background hardcoded dark plum). Contexts where users need to focus on text or UI controls.",
 "agentPrompt": "Change SEG from 10 to 8 for 8-fold symmetry, shift blob hues toward teal by replacing the random hue with a range of 150+Math.random()*80, and slow rotation by changing t*0.0002 to t*0.0001.",
 "editableAreas": [
  "segment count (SEG=10)",
  "blob count (M=7)",
  "rotation speed (t*0.0002)",
  "blob hue range (Math.random()*360)",
  "blob size range (0.04+Math.random()*0.1)",
  "spin impulse on click (spin+=0.4)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (static draw on reduce)",
  "visibilitychange pause",
  "DPR-aware canvas sizing"
 ],
 "knownLimitations": [
  "Reduced-motion path draws a single static frame but still runs the rAF loop (blobs update silently)",
  "Background color hardcoded in both CSS and fillRect — must change both to retheme",
  "Blob hues are fully random on each init; no palette control"
 ],
 "tier": "curated",
 "labels": [
  "accessible",
  "copy-paste-safe",
  "minimal-deps",
  "mobile-ready",
  "agent-ready"
 ],
 "tags": [
  "kaleidoscope",
  "generative",
  "canvas",
  "symmetry",
  "polygon",
  "ambient",
  "loop"
 ]
}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div id="cap">kaleidoscope</div>
<script>
(function(){
  const cv=document.getElementById('c'),ctx=cv.getContext('2d');
  let W,H,DPR,blobs,spin=0;
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const SEG=10,M=7;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);init();}
  function init(){
    blobs=[];for(let i=0;i<M;i++)blobs.push({
      r:0.1+Math.random()*0.8,a:Math.random()*Math.PI*2,
      sz:0.04+Math.random()*0.1,vr:(Math.random()-0.5)*0.0006,
      va:(Math.random()-0.5)*0.002,hue:Math.random()*360,sides:(3+(Math.random()*4|0))});
  }
  function drawWedge(t,R){
    const ang=Math.PI*2/SEG;
    ctx.save();
    ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,R*1.5,-ang/2,ang/2);ctx.closePath();ctx.clip();
    for(const b of blobs){
      const x=Math.cos(b.a)*b.r*R,y=Math.sin(b.a)*b.r*R;
      ctx.fillStyle='hsla('+((b.hue+t*0.02)%360)+',85%,62%,0.85)';
      ctx.strokeStyle='hsla('+((b.hue+t*0.02+40)%360)+',90%,75%,0.9)';
      ctx.lineWidth=1.2;
      ctx.beginPath();
      const s=b.sz*R;
      for(let k=0;k<=b.sides;k++){const an=t*0.0008+k/b.sides*Math.PI*2;
        const px=x+Math.cos(an)*s,py=y+Math.sin(an)*s;k===0?ctx.moveTo(px,py):ctx.lineTo(px,py);}
      ctx.closePath();ctx.fill();ctx.stroke();
    }
    ctx.restore();
  }
  function draw(t){
    ctx.fillStyle='#0c0612';ctx.fillRect(0,0,W,H);
    for(const b of blobs){b.r+=b.vr;b.a+=b.va;if(b.r<0.08||b.r>0.95)b.vr*=-1;}
    const R=Math.min(W,H)*0.5;
    ctx.save();ctx.translate(W/2,H/2);ctx.rotate(t*0.0002+spin);
    const ang=Math.PI*2/SEG;
    for(let i=0;i<SEG;i++){
      ctx.save();ctx.rotate(i*ang);
      if(i%2)ctx.scale(1,-1);
      drawWedge(t,R);
      ctx.restore();
    }
    ctx.restore();
  }
  let raf;
  function loop(t){if(!reduce){spin*=0.95;draw(t);}raf=requestAnimationFrame(loop);}
  function start(){cancelAnimationFrame(raf);raf=requestAnimationFrame(loop);}
  addEventListener('resize',resize);
  cv.addEventListener('pointerdown',()=>{spin+=0.4;init();});
  document.addEventListener('visibilitychange',()=>{if(document.hidden)cancelAnimationFrame(raf);else start();});
  resize();if(reduce)draw(0);else start();
})();
</script>
</body>
</html>
