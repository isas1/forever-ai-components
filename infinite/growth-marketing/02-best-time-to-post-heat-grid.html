<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Best time to post heat grid: a seven day by six time-slot engagement heatmap, cells glowing brighter for stronger historical engagement, with a traveling highlight sweeping to the single best slot on a loop." />
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Best Time To Post</title>
<style>
  :root{
    --pro-bg:#0d1117;
    --pro-surface:#161b22;
    --pro-border:rgba(255,255,255,.08);
    --pro-text:#e6edf3;
    --pro-muted:#8b949e;
    --pro-accent:#9bd12b;
    --pro-radius:14px;
    --pro-font:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--pro-bg)}
  .gbh-stage{position:fixed;inset:0;padding:4vmin;display:flex;font-family:var(--pro-font);color:var(--pro-text)}
  .gbh-card{flex:1;min-height:0;background:var(--pro-surface);border:1px solid var(--pro-border);
    border-radius:var(--pro-radius);padding:2.8vmin;display:flex;flex-direction:column;gap:1.4vmin}
  .gbh-top{display:flex;justify-content:space-between;align-items:baseline}
  .gbh-title{font-size:clamp(9px,2vmin,13px);font-weight:800}
  .gbh-best{font-size:clamp(7px,1.5vmin,9px);color:var(--pro-accent);font-weight:700}
  .gbh-grid{flex:1;min-height:0;display:grid;grid-template-columns:repeat(7,1fr);gap:.6vmin}
  .gbh-col{display:flex;flex-direction:column;gap:.6vmin;min-width:0}
  .gbh-dlbl{font-size:clamp(6px,1.2vmin,7px);color:var(--pro-muted);font-weight:700;text-align:center;text-transform:uppercase}
  .gbh-cell{flex:1;border-radius:3px;background:color-mix(in srgb,var(--pro-accent) calc(var(--v,0)*1%),var(--pro-border));
    transition:outline-color .3s;position:relative}
  .gbh-cell.peak{outline:2px solid var(--pro-accent);outline-offset:1px}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:var(--pro-muted);opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none;pointer-events:none}
  @media (prefers-reduced-motion:reduce){.gbh-cell{transition:none}}
</style>
</head>
<body>
  <div class="gbh-stage">
    <div class="gbh-card" id="gbh-root" role="img"
         aria-label="Best time to post heat grid: a seven day by six time slot engagement heatmap, brighter cells mean stronger historical engagement, with a highlight sweeping to call out the best posting slot.">
      <div class="gbh-top"><span class="gbh-title">Best time to post</span><span class="gbh-best" id="gbh-best">Peak: Thu 6pm</span></div>
      <div class="gbh-grid" id="gbh-grid"></div>
    </div>
  </div>
  <div class="cap" aria-hidden="true">Best Time To Post</div>
  <script>(function(){"use strict";
    var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
    var root=document.getElementById('gbh-root'), grid=document.getElementById('gbh-grid'), bestEl=document.getElementById('gbh-best');
    if(!root)return;
    var DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    var SLOTS=['6am','10am','1pm','3pm','6pm','9pm'];
    // base engagement matrix [day][slot], 0-100, seeded with a plausible evening/weekend bias
    var base=[
      [12,28,34,40,58,44],
      [10,30,38,46,62,40],
      [14,32,40,50,70,48],
      [16,34,44,54,88,52],
      [18,36,48,58,74,66],
      [22,40,52,60,68,72],
      [15,26,34,42,56,60]
    ];
    var cells=[];
    DAYS.forEach(function(name,di){
      var col=document.createElement('div'); col.className='gbh-col';
      col.innerHTML='<div class="gbh-dlbl">'+name+'</div>';
      SLOTS.forEach(function(slot,si){
        var c=document.createElement('div'); c.className='gbh-cell';
        c.style.setProperty('--v',base[di][si]);
        col.appendChild(c);
        cells.push({el:c,di:di,si:si});
      });
      grid.appendChild(col);
    });
    function findPeak(){
      var best=cells[0];
      cells.forEach(function(c){ if(base[c.di][c.si]>base[best.di][best.si]) best=c; });
      return best;
    }
    function paintPeak(){
      var peak=findPeak();
      cells.forEach(function(c){ c.el.classList.toggle('peak', c===peak); });
      bestEl.textContent='Peak: '+DAYS[peak.di]+' '+SLOTS[peak.si];
    }
    function repaintValues(){
      cells.forEach(function(c){ c.el.style.setProperty('--v',base[c.di][c.si]); });
    }
    paintPeak();
    if(reduce)return;
    var running=true,timer=null;
    document.addEventListener('visibilitychange',function(){ running=!document.hidden; });
    function drift(){
      var c=cells[Math.floor(Math.random()*cells.length)];
      var d=(Math.random()-0.5)*10;
      base[c.di][c.si]=Math.max(4,Math.min(96,base[c.di][c.si]+d));
      repaintValues();
      paintPeak();
    }
    timer=setInterval(function(){ if(running) drift(); },1500);
  })();</script>
