<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Sudden Rain — Utagawa Hiroshige. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sudden Rain</title>
<style>
  html,body{margin:0;height:100%;background:#dfe2dd;overflow:hidden}
  #hir01-stage{position:fixed;inset:0;width:100%;height:100%}
  #hir01-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .hir01-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#16202b;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/hiroshige/01-sudden-rain.html",
 "title": "Sudden Rain",
 "description": "Up to 140 slanted rain streaks fall in two depth layers over a painted ukiyo-e scene: gradient sky, green hill, indigo river, and arched bridge silhouette.",
 "useWhen": "Ambient hero backgrounds with a Japanese art or painterly aesthetic. Loading screens or mood-setting interstices for cultural or travel content.",
 "avoidWhen": "Layouts requiring legible text overlays — the constant rain motion competes with reading. Light-mode UIs where the muted palette feels out of place.",
 "agentPrompt": "Increase rain density by changing N to 220, steepen the slant by setting SLANT to -0.45, and shift the sky gradient to a stormy grey by changing PAL.sky to '#5a6a7a'.",
 "editableAreas": [
  "rain count (N = Math.round(S.w*0.42), max 140)",
  "slant angle (SLANT = -0.30)",
  "drop speed range (340 + random*260)",
  "palette colors (PAL object)",
  "bridge position (by = H*0.66)"
 ],
 "preserveElements": [
  "DPR-aware fitCanvas with setTransform",
  "visibilitychange pause/resume guard",
  "prefers-reduced-motion static-frame fallback",
  "IIFE wrapper"
 ],
 "knownLimitations": [
  "Background scene redrawn every frame (no offscreen cache) — minor CPU cost on large screens",
  "Rain color hardcoded as rgba literals, not tied to PAL object"
 ],
 "tier": "curated",
 "labels": [
  "accessible",
  "mobile-ready",
  "copy-paste-safe",
  "minimal-deps",
  "agent-ready"
 ],
 "tags": [
  "ukiyo-e",
  "rain",
  "canvas",
  "ambient",
  "hiroshige",
  "japanese",
  "generative"
 ]
}
</script>
</head>
<body>
<div id="hir01-stage" role="img" aria-label="Ukiyo-e sudden rain: fine ink lines slant in two registered passes over an arched bridge silhouette above an indigo river.">
  <canvas id="hir01-cv"></canvas>
</div>
<div class="hir01-cap">Sudden Rain</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv=document.getElementById('hir01-cv'); if(!cv) return;
  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width), h=Math.max(2,r.height);
    c.width=Math.round(w*dpr); c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }
  function mix(a,b,k){
    const pa=[parseInt(a.slice(1,3),16),parseInt(a.slice(3,5),16),parseInt(a.slice(5,7),16)];
    const pb=[parseInt(b.slice(1,3),16),parseInt(b.slice(3,5),16),parseInt(b.slice(5,7),16)];
    return 'rgb('+pa.map((v,i)=>Math.round(v+(pb[i]-v)*k)).join(',')+')';
  }
  const PAL={paper:'#f2f0e8',ink:'#16202b',indigo:'#1f3a5f',sky:'#3f6f9f',green:'#6f8f6a'};
  let S=fitCanvas(cv), drops=[];
  const SLANT=-0.30;
  function seed(){
    drops=[];
    const N=Math.min(140,Math.round(S.w*0.42));
    for(let i=0;i<N;i++) drops.push({x:Math.random()*(S.w+120)-60,y:Math.random()*S.h,len:14+Math.random()*22,sp:340+Math.random()*260,a:0.18+Math.random()*0.32,layer:Math.random()<0.5?0:1});
  }
  seed();
  function bridge(ctx,W,H){
    ctx.save();
    const by=H*0.66;
    const g=ctx.createLinearGradient(0,H*0.30,0,H*0.78);
    g.addColorStop(0,mix(PAL.paper,PAL.sky,0.18));
    g.addColorStop(1,mix(PAL.paper,PAL.indigo,0.10));
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    ctx.fillStyle=mix(PAL.paper,PAL.green,0.40);
    ctx.beginPath();ctx.moveTo(0,H*0.58);
    ctx.quadraticCurveTo(W*0.3,H*0.50,W*0.6,H*0.56);
    ctx.quadraticCurveTo(W*0.85,H*0.60,W,H*0.55);
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
    ctx.fillStyle=mix(PAL.paper,PAL.indigo,0.30);
    ctx.fillRect(0,by,W,H-by);
    ctx.strokeStyle=mix(PAL.ink,PAL.indigo,0.4);ctx.globalAlpha=0.55;ctx.lineWidth=Math.max(3,H*0.018);
    const x0=W*0.06,x1=W*0.94,top=by-H*0.10;
    ctx.beginPath();ctx.moveTo(x0,by+H*0.02);
    ctx.quadraticCurveTo(W*0.5,top-H*0.08,x1,by+H*0.02);ctx.stroke();
    ctx.lineWidth=Math.max(2,H*0.010);ctx.globalAlpha=0.42;
    ctx.beginPath();ctx.moveTo(x0,by);
    ctx.quadraticCurveTo(W*0.5,top,x1,by);ctx.stroke();
    ctx.globalAlpha=0.40;ctx.lineWidth=2;
    for(let p=0;p<=8;p++){
      const t=p/8, x=x0+(x1-x0)*t;
      const arc=top + (by-top)*(1-Math.sin(Math.PI*t));
      ctx.beginPath();ctx.moveTo(x,arc);ctx.lineTo(x,arc-H*0.05);ctx.stroke();
    }
    ctx.restore();
  }
  let last=performance.now();
  function draw(now){
    let dt=(now-last)/1000; last=now; if(dt>0.05)dt=0.05;
    const ctx=S.ctx,W=S.w,H=S.h;
    bridge(ctx,W,H);
    for(const d of drops){
      if(!REDUCED){ d.y+=d.sp*dt; d.x+=SLANT*d.sp*dt; if(d.y>H+20){ d.y=-20; d.x=Math.random()*(W+120)-60; } }
      ctx.strokeStyle=d.layer? 'rgba(242,240,232,.85)':'rgba(220,230,238,.7)';
      ctx.globalAlpha=d.a;ctx.lineWidth=d.layer?1.5:1;
      ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x+SLANT*d.len,d.y+d.len);ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
  let raf=0, running=false;
  function loop(){ if(!running) return; draw(performance.now()); raf=requestAnimationFrame(loop); }
  function start(){ if(running) return; running=true; last=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
  let _rt;
  window.addEventListener('resize', ()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ S=fitCanvas(cv); seed(); if(REDUCED) draw(performance.now()); },150); }, {passive:true});
  document.addEventListener('visibilitychange', ()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });
  if(REDUCED){ draw(performance.now()); } else start();
})();
</script>
</body>
</html>
