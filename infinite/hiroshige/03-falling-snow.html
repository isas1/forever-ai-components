<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Falling Snow — Ukiyo-e Weather &amp; Road. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Falling Snow</title>
<style>
  html,body{margin:0;height:100%;background:#16202b;overflow:hidden}
  #hir03-stage{position:fixed;inset:0;width:100%;height:100%}
  #hir03-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .hir03-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#f2f0e8;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/hiroshige/03-falling-snow.html",
 "title": "Falling Snow",
 "description": "Snow flakes drift and sway over a ukiyo-e night scene: indigo sky, snow-capped rooftops, and a lone layered pine. Static fallback for reduced-motion.",
 "useWhen": "Seasonal or cultural hero backgrounds, winter themes, Japanese art-inspired decorative panels.",
 "avoidWhen": "Light-mode UIs (background hardcoded dark navy). Layouts requiring legible text over the canvas.",
 "agentPrompt": "Increase snowflake count by changing N cap from 120 to 200 and the density multiplier from 0.22 to 0.35, then shift the sky palette to a deeper midnight blue by setting PAL.indigo to '#0d2240'.",
 "editableAreas": [
  "snowflake count (N cap=120, density 0.22)",
  "flake speed range (14..44 px/s)",
  "flake size range (1..3.6 r)",
  "palette colors (PAL object)",
  "scene layout ratios (W/H multipliers for roofs and pine)"
 ],
 "preserveElements": [
  "DPR-aware canvas sizing in fitCanvas()",
  "IIFE wrapper",
  "prefers-reduced-motion guard (REDUCED)",
  "visibilitychange pause/resume"
 ],
 "knownLimitations": [
  "Scene redraws every frame — no dirty-rect optimisation; heavy on very low-end devices at large viewport",
  "Background hardcoded dark navy in CSS; must edit both CSS and PAL.ink to change"
 ],
 "tier": "curated",
 "labels": [
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps",
  "easy-to-modify"
 ],
 "tags": [
  "snow",
  "ukiyo-e",
  "canvas",
  "ambient",
  "night",
  "japanese"
 ]
}
</script>
</head>
<body>
<div id="hir03-stage" role="img" aria-label="Soft snow settles over a still ukiyo-e village of snow-capped roofs and a lone pine against a deep indigo night.">
  <canvas id="hir03-cv"></canvas>
</div>
<div class="hir03-cap">Falling Snow</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv=document.getElementById('hir03-cv'); if(!cv) return;
  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width), h=Math.max(2,r.height);
    c.width=Math.round(w*dpr); c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }
  function mix(a,b,k){
    const pa=[parseInt(a.slice(1,3),16),parseInt(a.slice(3,5),16),parseInt(a.slice(5,7),16)];
    const pb=[parseInt(b.slice(1,3),16),parseInt(b.slice(3,5),16),parseInt(b.slice(5,7),16)];
    return 'rgb('+pa.map((v,i)=>Math.round(v+(pb[i]-v)*k)).join(',')+')';
  }
  const PAL={snow:'#f2f0e8',ink:'#16202b',indigo:'#1f3a5f',skySoft:'#7fa8c8',green:'#6f8f6a',sienna:'#9a5b3b'};
  let S=fitCanvas(cv), flakes=[];
  function seed(){
    flakes=[];
    const N=Math.min(120,Math.round(S.w*0.22));
    for(let i=0;i<N;i++) flakes.push({x:Math.random()*S.w,y:Math.random()*S.h,r:1+Math.random()*2.6,sp:14+Math.random()*30,drift:(Math.random()*0.6+0.2)*(Math.random()<0.5?-1:1),ph:Math.random()*7});
  }
  seed();
  function scene(ctx,W,H){
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,PAL.ink);
    g.addColorStop(0.6,mix(PAL.ink,PAL.indigo,0.5));
    g.addColorStop(1,mix(PAL.indigo,PAL.snow,0.20));
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    ctx.fillStyle=mix(PAL.snow,PAL.skySoft,0.10);
    ctx.beginPath();ctx.moveTo(0,H*0.82);
    ctx.quadraticCurveTo(W*0.4,H*0.78,W*0.7,H*0.83);
    ctx.quadraticCurveTo(W*0.9,H*0.86,W,H*0.81);
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
    function roof(cx,base,w){
      const h=w*0.45;
      ctx.fillStyle=mix(PAL.ink,PAL.indigo,0.35);
      ctx.beginPath();ctx.moveTo(cx-w/2,base);ctx.lineTo(cx-w*0.36,base-h);ctx.lineTo(cx+w*0.36,base-h);ctx.lineTo(cx+w/2,base);ctx.closePath();ctx.fill();
      ctx.fillStyle=PAL.snow;
      ctx.beginPath();ctx.moveTo(cx-w*0.40,base-h+2);ctx.lineTo(cx,base-h-3);ctx.lineTo(cx+w*0.40,base-h+2);
      ctx.quadraticCurveTo(cx,base-h+5,cx-w*0.40,base-h+2);ctx.closePath();ctx.fill();
      ctx.fillStyle=mix(PAL.ink,PAL.sienna,0.30);
      ctx.fillRect(cx-w*0.30,base,w*0.60,H-base);
    }
    roof(W*0.26,H*0.82,W*0.20);
    roof(W*0.58,H*0.84,W*0.26);
    ctx.strokeStyle=mix(PAL.ink,PAL.sienna,0.4);ctx.lineWidth=Math.max(2,W*0.006);
    const px=W*0.84, pb=H*0.84;
    ctx.beginPath();ctx.moveTo(px,pb);ctx.lineTo(px,pb-H*0.22);ctx.stroke();
    ctx.fillStyle=mix(PAL.green,PAL.ink,0.45);
    for(let l=0;l<3;l++){
      const yy=pb-H*0.10 - l*H*0.06, ww=(W*0.10)*(1-l*0.22);
      ctx.beginPath();ctx.moveTo(px-ww,yy);ctx.lineTo(px,yy-H*0.07);ctx.lineTo(px+ww,yy);ctx.closePath();ctx.fill();
    }
  }
  let last=performance.now();
  function draw(now){
    let dt=(now-last)/1000;last=now;if(dt>0.05)dt=0.05;
    const ctx=S.ctx,W=S.w,H=S.h;
    scene(ctx,W,H);
    ctx.fillStyle='rgba(242,240,232,.92)';
    for(const f of flakes){
      if(!REDUCED){
        f.y+=f.sp*dt;
        f.x+=Math.sin(now/1000*0.8+f.ph)*f.drift + f.drift*8*dt;
        if(f.y>H*0.84){ f.y=-4; f.x=Math.random()*W; }
        if(f.x<-6)f.x=W+6; if(f.x>W+6)f.x=-6;
      }
      ctx.globalAlpha=0.55+0.4*Math.sin(f.ph+now/1400);
      ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,7);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  let raf=0, running=false;
  function loop(){ if(!running) return; draw(performance.now()); raf=requestAnimationFrame(loop); }
  function start(){ if(running) return; running=true; last=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
  let _rt;
  window.addEventListener('resize', ()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ S=fitCanvas(cv); seed(); if(REDUCED) draw(performance.now()); },150); }, {passive:true});
  document.addEventListener('visibilitychange', ()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });
  if(REDUCED){ draw(performance.now()); } else start();
})();
</script>
</body>
</html>
