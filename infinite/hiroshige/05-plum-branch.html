<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Plum Branch — Ukiyo-e Weather &amp; Road. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Plum Branch</title>
<style>
  html,body{margin:0;height:100%;background:#cbd8e2;overflow:hidden}
  #hir05-stage{position:fixed;inset:0;width:100%;height:100%;overflow:hidden}
  .hir05-svg{position:absolute;inset:0;width:100%;height:100%}
  .hir05-petal{transform-box:fill-box;transform-origin:center}
  @keyframes hir05-bloom{0%{transform:scale(.2);opacity:0}60%{transform:scale(1.08);opacity:1}100%{transform:scale(1);opacity:1}}
  @keyframes hir05-sway{0%,100%{transform:rotate(-1.1deg)}50%{transform:rotate(1.1deg)}}
  .hir05-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#16202b;opacity:.55;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion: reduce){.hir05-petal{animation:none !important}#hir05-sway{animation:none !important}}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/hiroshige/05-plum-branch.html",
 "title": "Plum Branch",
 "description": "A ukiyo-e-style ume plum branch with 11 blossoms that bloom open petal-by-petal, sway gently, and re-bloom every 12 seconds against layered ink hills.",
 "useWhen": "Cultural or nature-themed hero sections, ambient art backgrounds, Japanese aesthetic UI themes.",
 "avoidWhen": "Contexts requiring text legibility over the canvas — the dark ink branch dominates the foreground. Not suited for light-only brand palettes.",
 "agentPrompt": "Change petal color to pale pink (#f7c5d8), increase blossom count by adding entries to the tips array, and slow the sway cycle to 12 seconds.",
 "editableAreas": [
  "petal color palette (petalCols array)",
  "sway speed (7s in animation string)",
  "branch color (branchColor via mix ratio)",
  "re-bloom interval (12000ms)",
  "blossom tip positions (tips array)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (REDUCED check)",
  "visibilitychange pause/start handlers",
  "SVG ARIA role and aria-label on stage div"
 ],
 "knownLimitations": [
  "Re-bloom uses animation:none + offsetWidth reflow trick — may flash briefly on very slow devices",
  "Branch geometry is hardcoded SVG paths; reshaping requires manual coordinate editing"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "ukiyo-e",
  "botanical",
  "svg",
  "bloom",
  "japanese",
  "ambient",
  "loop"
 ]
}
</script>
</head>
<body>
<div id="hir05-stage" role="img" aria-label="A sharp foreground ume plum branch in ukiyo-e style, blossoms opening and swaying against soft graded far hills, then renewing.">
  <div class="hir05-wrap" id="hir05-wrap"></div>
</div>
<div class="hir05-cap">Plum Branch</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const wrap=document.getElementById('hir05-wrap'); if(!wrap) return;
  function mix(a,b,k){
    const pa=[parseInt(a.slice(1,3),16),parseInt(a.slice(3,5),16),parseInt(a.slice(5,7),16)];
    const pb=[parseInt(b.slice(1,3),16),parseInt(b.slice(3,5),16),parseInt(b.slice(5,7),16)];
    return 'rgb('+pa.map((v,i)=>Math.round(v+(pb[i]-v)*k)).join(',')+')';
  }
  const PAL={paper:'#f2f0e8',ink:'#16202b',sky:'#3f6f9f',skySoft:'#7fa8c8',green:'#6f8f6a',sienna:'#9a5b3b',snow:'#f2f0e8'};
  const NS='http://www.w3.org/2000/svg';
  const bg=document.createElement('div');
  bg.style.cssText='position:absolute;inset:0;background:linear-gradient(160deg,'+PAL.skySoft+' 0%,'+mix(PAL.paper,PAL.sky,0.25)+' 42%,'+PAL.paper+' 100%);';
  wrap.appendChild(bg);
  const far=document.createElementNS(NS,'svg');
  far.setAttribute('class','hir05-svg');far.setAttribute('viewBox','0 0 340 300');far.setAttribute('preserveAspectRatio','none');
  far.innerHTML='<path d="M0 300 L0 210 Q70 170 130 200 L175 150 L210 195 Q280 175 340 205 L340 300 Z" fill="'+mix(PAL.green,PAL.paper,0.45)+'" opacity="0.85"/>'+
    '<path d="M0 300 L0 250 Q120 230 200 252 Q300 270 340 250 L340 300 Z" fill="'+mix(PAL.green,PAL.ink,0.10)+'" opacity="0.7"/>';
  wrap.appendChild(far);
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('class','hir05-svg');svg.setAttribute('viewBox','0 0 340 300');svg.setAttribute('preserveAspectRatio','xMidYMid slice');
  const swayG=document.createElementNS(NS,'g');
  swayG.id='hir05-sway';
  if(!REDUCED) swayG.style.cssText='transform-box:view-box;transform-origin:300px 290px;animation:hir05-sway 7s ease-in-out infinite;';
  svg.appendChild(swayG);
  const branchColor=mix(PAL.ink,PAL.sienna,0.25);
  function limb(d,w){
    const p=document.createElementNS(NS,'path');
    p.setAttribute('d',d);p.setAttribute('stroke',branchColor);p.setAttribute('stroke-width',w);
    p.setAttribute('fill','none');p.setAttribute('stroke-linecap','round');
    swayG.appendChild(p);
  }
  limb('M300 300 C 280 250, 250 230, 200 215 C 150 200, 110 175, 70 120',8);
  limb('M205 213 C 200 180, 175 160, 130 150',5);
  limb('M150 198 C 165 175, 175 150, 165 120',4);
  limb('M110 175 C 90 160, 70 155, 40 165',3.5);
  const tips=[[70,120],[130,150],[165,120],[40,165],[100,160],[150,170],[185,185],[60,140],[120,128],[155,148],[90,128]];
  const petalCols=[PAL.snow,'#f7e8ef','#f2dbe6'];
  tips.forEach((tp,bi)=>{
    const [cx,cy]=tp;
    const g=document.createElementNS(NS,'g');
    const petals=5, R=6.5+(bi*0.37%1)*2.5;
    const pc=petalCols[bi%petalCols.length];
    for(let i=0;i<petals;i++){
      const ang=(i/petals)*Math.PI*2 - Math.PI/2;
      const px=cx+Math.cos(ang)*R, py=cy+Math.sin(ang)*R;
      const el=document.createElementNS(NS,'circle');
      el.setAttribute('cx',px.toFixed(1));el.setAttribute('cy',py.toFixed(1));
      el.setAttribute('r',(R*0.62).toFixed(1));
      el.setAttribute('fill',pc);el.setAttribute('stroke',mix(PAL.sienna,PAL.ink,0.2));el.setAttribute('stroke-width','0.6');
      el.setAttribute('class','hir05-petal');
      if(!REDUCED){
        const delay=(bi*0.22 + i*0.04).toFixed(2);
        el.style.animation='hir05-bloom 1.1s ease-out '+delay+'s both';
      }
      g.appendChild(el);
    }
    const ctr=document.createElementNS(NS,'circle');
    ctr.setAttribute('cx',cx);ctr.setAttribute('cy',cy);ctr.setAttribute('r','2.4');
    ctr.setAttribute('fill',PAL.sienna);
    g.appendChild(ctr);
    swayG.appendChild(g);
  });
  wrap.appendChild(svg);
  if(REDUCED) return;
  const petalEls=svg.querySelectorAll('.hir05-petal');
  let bloomTimer=performance.now(), raf=0, running=false;
  function loop(){
    if(!running) return;
    const now=performance.now();
    if(now - bloomTimer > 12000){
      bloomTimer=now;
      petalEls.forEach((el,idx)=>{
        el.style.animation='none';
        void el.offsetWidth;
        el.style.animation='hir05-bloom 1.1s ease-out '+((idx%5)*0.05 + Math.floor(idx/5)*0.18).toFixed(2)+'s both';
      });
    }
    raf=requestAnimationFrame(loop);
  }
  function start(){ if(running) return; running=true; bloomTimer=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
  document.addEventListener('visibilitychange', ()=>{ if(document.hidden) stop(); else start(); });
  start();
})();
</script>
</body>
</html>
