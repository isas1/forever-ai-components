<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Boat on the Swell — Ukiyo-e Weather &amp; Road. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Boat on the Swell</title>
<style>
  html,body{margin:0;height:100%;background:#243044;overflow:hidden}
  #hir06-stage{position:fixed;inset:0;width:100%;height:100%}
  #hir06-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .hir06-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#f2f0e8;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/hiroshige/06-boat-on-the-swell.html",
 "title": "Boat on the Swell",
 "description": "A small ferry rocks on sine-wave swells at dusk beneath a sienna sun and three circling gulls, rendered in ukiyo-e woodblock palette.",
 "useWhen": "Ambient hero backgrounds, cultural or travel themes, dark-mode landing pages needing calm painterly motion.",
 "avoidWhen": "Light-background layouts (background is hardcoded dark navy). Contexts where subtle motion competes with text legibility.",
 "agentPrompt": "Move the sun to the right side by changing sx to W*0.70, shift sunset palette by replacing PAL.sienna with '#7a3b6a' for a violet dusk.",
 "editableAreas": [
  "sun position (sx = W*0.30)",
  "palette colors (PAL object)",
  "swell amplitude and count (amp, b loop 0..3)",
  "boat tilt sensitivity (Math.sin(t*0.9)*0.02)",
  "gull count and spacing (i loop 0..2)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (REDUCED)",
  "visibilitychange pause/resume",
  "DPR-aware fitCanvas()"
 ],
 "knownLimitations": [
  "Background color hardcoded in CSS (#243044) — must edit both CSS and canvas gradient to change sky",
  "Boat tilt derived from two swell sample points; at very wide viewports the angle change may be imperceptible"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "canvas",
  "woodblock",
  "boat",
  "water",
  "ambient",
  "landscape"
 ]
}
</script>
</head>
<body>
<div id="hir06-stage" role="img" aria-label="A small ferry rocks on gentle stylised swells at dusk beneath a low sienna sun and circling gulls, the slow lift and fall of an evening crossing.">
  <canvas id="hir06-cv"></canvas>
</div>
<div class="hir06-cap">Boat on the Swell</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv=document.getElementById('hir06-cv'); if(!cv) return;
  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width), h=Math.max(2,r.height);
    c.width=Math.round(w*dpr); c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }
  function mix(a,b,k){
    if(a[0]!=='#') a='#'+a;
    const pa=[parseInt(a.slice(1,3),16),parseInt(a.slice(3,5),16),parseInt(a.slice(5,7),16)];
    const pb=[parseInt(b.slice(1,3),16),parseInt(b.slice(3,5),16),parseInt(b.slice(5,7),16)];
    return 'rgb('+pa.map((v,i)=>Math.round(v+(pb[i]-v)*k)).join(',')+')';
  }
  const PAL={paper:'#f2f0e8',ink:'#16202b',indigo:'#1f3a5f',sienna:'#9a5b3b',snow:'#f2f0e8'};
  let S=fitCanvas(cv), t=0, last=performance.now();
  function swellY(x,W,baseY,amp,k,ph){ return baseY + Math.sin(x/W*Math.PI*k + ph)*amp; }
  function draw(now){
    let dt=(now-last)/1000;last=now;if(dt>0.05)dt=0.05;
    if(!REDUCED) t+=dt;
    const ctx=S.ctx,W=S.w,H=S.h;
    const g=ctx.createLinearGradient(0,0,0,H*0.60);
    g.addColorStop(0,mix(PAL.indigo,PAL.ink,0.10));
    g.addColorStop(0.5,mix(PAL.sienna,PAL.indigo,0.35));
    g.addColorStop(1,mix(PAL.sienna,PAL.paper,0.30));
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H*0.60);
    const sx=W*0.30, sy=H*0.44;
    const gr=ctx.createRadialGradient(sx,sy,2,sx,sy,W*0.16);
    gr.addColorStop(0,'rgba(232,147,74,.95)');gr.addColorStop(1,'rgba(232,147,74,0)');
    ctx.fillStyle=gr;ctx.beginPath();ctx.arc(sx,sy,W*0.16,0,7);ctx.fill();
    ctx.fillStyle=mix(PAL.sienna,'#f2c27a',0.5);ctx.beginPath();ctx.arc(sx,sy,Math.max(10,W*0.035),0,7);ctx.fill();
    ctx.strokeStyle='rgba(22,32,43,.55)';ctx.lineWidth=2;
    for(let i=0;i<3;i++){
      const gx=W*(0.6+i*0.10)+Math.sin(t*0.4+i)*10, gy=H*(0.18+i*0.05);
      const wf=Math.sin(t*4+i)*3;
      ctx.beginPath();ctx.moveTo(gx-6,gy+wf);ctx.quadraticCurveTo(gx,gy-3,gx,gy);ctx.quadraticCurveTo(gx,gy-3,gx+6,gy+wf);ctx.stroke();
    }
    const waterTop=H*0.56;
    const wg=ctx.createLinearGradient(0,waterTop,0,H);
    wg.addColorStop(0,mix(PAL.indigo,PAL.sienna,0.20));
    wg.addColorStop(1,mix(PAL.indigo,PAL.ink,0.30));
    ctx.fillStyle=wg;ctx.fillRect(0,waterTop,W,H-waterTop);
    ctx.fillStyle='rgba(232,147,74,.16)';
    for(let r=0;r<6;r++){
      const ry=waterTop+ r*(H-waterTop)/7 + 6;
      const ww=(W*0.10)*(1+r*0.18);
      ctx.fillRect(sx-ww/2, ry, ww, 3);
    }
    ctx.strokeStyle='rgba(242,240,232,.30)';ctx.lineWidth=2;
    for(let b=0;b<4;b++){
      const baseY=waterTop + (H-waterTop)*(0.18+b*0.22);
      const amp=4+b*2, k=3+b, ph=t*(0.8+b*0.3)+b;
      ctx.beginPath();
      for(let x=0;x<=W;x+=8){
        const y=swellY(x,W,baseY,amp,k,ph);
        x?ctx.lineTo(x,y):ctx.moveTo(x,y);
      }
      ctx.stroke();
    }
    const bx=W*0.62;
    const baseY=waterTop + (H-waterTop)*0.40;
    const by=swellY(bx,W,baseY,5,3,t*0.8);
    const by2=swellY(bx+40,W,baseY,5,3,t*0.8);
    const tilt=Math.atan2(by2-by,40);
    ctx.save();
    ctx.translate(bx,by);ctx.rotate(tilt + (REDUCED?0:Math.sin(t*0.9)*0.02));
    ctx.fillStyle=mix(PAL.ink,PAL.sienna,0.35);
    ctx.beginPath();
    ctx.moveTo(-38,0);ctx.quadraticCurveTo(-44,10,-30,12);ctx.lineTo(30,12);
    ctx.quadraticCurveTo(46,10,38,0);ctx.quadraticCurveTo(0,-6,-38,0);ctx.closePath();ctx.fill();
    ctx.strokeStyle=mix(PAL.ink,PAL.snow,0.15);ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=mix(PAL.sienna,PAL.ink,0.2);
    ctx.beginPath();ctx.arc(6,-8,3.5,0,7);ctx.fill();
    ctx.fillRect(3,-6,6,9);
    ctx.strokeStyle=mix(PAL.sienna,PAL.ink,0.3);ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(9,-10);ctx.lineTo(26,16);ctx.stroke();
    ctx.restore();
  }
  let raf=0, running=false;
  function loop(){ if(!running) return; draw(performance.now()); raf=requestAnimationFrame(loop); }
  function start(){ if(running) return; running=true; last=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
  let _rt;
  window.addEventListener('resize', ()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ S=fitCanvas(cv); if(REDUCED) draw(performance.now()); },150); }, {passive:true});
  document.addEventListener('visibilitychange', ()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });
  if(REDUCED){ draw(performance.now()); } else start();
})();
</script>
</body>
</html>
