<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="One Hundred Views — Utagawa Hiroshige. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>One Hundred Views</title>
<style>
  html,body{margin:0;height:100%;background:#16202b;overflow:hidden}
  #hir08-stage{position:fixed;inset:0;width:100%;height:100%}
  #hir08-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .hir08-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#f2f0e8;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/hiroshige/08-one-hundred-views.html",
 "title": "One Hundred Views",
 "description": "Four Hiroshige views cycle slowly — torii and pine recompose against bokashi skies with rain, snow, mist, or moonlight weather effects.",
 "useWhen": "Dark-mode hero backgrounds, Japanese art or travel themes, ambient looping screensavers needing a painterly aesthetic.",
 "avoidWhen": "Light backgrounds (sky hardcoded dark); contexts needing more than 4 distinct scene states without code changes.",
 "agentPrompt": "Add a fifth view to VIEWS: {top:'#4a2040', bot:'#e87060', weather:'mist', moonX:0.50, moonY:0.18, label:'autumn dusk'}, and increase DUR to 11 for a slower cycle.",
 "editableAreas": [
  "VIEWS array (sky colors, weather type, moon position, label)",
  "DUR constant (cycle duration in seconds, default 9)",
  "moon radius (Math.min(W,H)*0.045)",
  "particle count (120 in seedParts)",
  "torii horizontal drift amplitude (W*0.02)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (REDUCED flag)",
  "visibilitychange stop/start pair",
  "DPR-aware fitCanvas sizing"
 ],
 "knownLimitations": [
  "Background color hardcoded to dark navy — must edit CSS to change",
  "Weather particle system reuses the same 120 particles across all weather types so density is fixed",
  "Cross-fade only blends the last 22% of each scene — abrupt if DUR is very short"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "ukiyo-e",
  "canvas",
  "generative",
  "weather",
  "ambient",
  "torii",
  "japanese"
 ]
}
</script>
</head>
<body>
<div id="hir08-stage" role="img" aria-label="A closing ukiyo-e series: torii gate, rising moon and a wind-bent pine recompose into new views on a slow loop, each with its own bokashi sky and weather.">
  <canvas id="hir08-cv"></canvas>
</div>
<div class="hir08-cap">One Hundred Views</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv=document.getElementById('hir08-cv'); if(!cv) return;
  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width), h=Math.max(2,r.height);
    c.width=Math.round(w*dpr); c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }
  function mix(a,b,k){
    const pa=[parseInt(a.slice(1,3),16),parseInt(a.slice(3,5),16),parseInt(a.slice(5,7),16)];
    const pb=[parseInt(b.slice(1,3),16),parseInt(b.slice(3,5),16),parseInt(b.slice(5,7),16)];
    return 'rgb('+pa.map((v,i)=>Math.round(v+(pb[i]-v)*k)).join(',')+')';
  }
  function lerpHex(a,b,k){
    const pa=[parseInt(a.slice(1,3),16),parseInt(a.slice(3,5),16),parseInt(a.slice(5,7),16)];
    const pb=[parseInt(b.slice(1,3),16),parseInt(b.slice(3,5),16),parseInt(b.slice(5,7),16)];
    return 'rgb('+pa.map((v,i)=>Math.round(v+(pb[i]-v)*k)).join(',')+')';
  }
  const PAL={ink:'#16202b',green:'#6f8f6a'};
  const VIEWS=[
    {top:'#1f3a5f', bot:'#d98a5a', weather:'rain',  moonX:0.74, moonY:0.26, label:'evening rain'},
    {top:'#2a3f63', bot:'#cfe0ea', weather:'clear', moonX:0.22, moonY:0.22, label:'clear moon'},
    {top:'#101a2e', bot:'#3a3360', weather:'snow',  moonX:0.80, moonY:0.20, label:'night snow'},
    {top:'#3f6f9f', bot:'#e8c97a', weather:'mist',  moonX:0.30, moonY:0.30, label:'morning mist'}
  ];
  let S=fitCanvas(cv), parts=[];
  function seedParts(){
    parts=[];
    for(let i=0;i<120;i++) parts.push({x:Math.random(),y:Math.random(),sp:0.2+Math.random()*0.5,r:Math.random()});
  }
  seedParts();
  let t=0,last=performance.now();
  const DUR=9;
  function torii(ctx,W,H,cx,base,scale,col,alpha){
    ctx.save();ctx.globalAlpha=alpha;
    const w=W*0.16*scale, h=H*0.34*scale, th=Math.max(3,W*0.012*scale);
    ctx.fillStyle=col;ctx.strokeStyle=col;
    ctx.fillRect(cx-w/2-th/2, base-h, th, h);
    ctx.fillRect(cx+w/2-th/2, base-h, th, h);
    ctx.lineWidth=th*1.3;ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(cx-w*0.66, base-h+th*0.2);
    ctx.quadraticCurveTo(cx, base-h-th*1.4, cx+w*0.66, base-h+th*0.2);
    ctx.stroke();
    ctx.fillRect(cx-w*0.56, base-h+h*0.22, w*1.12, th*0.9);
    ctx.restore();
  }
  function pine(ctx,W,H,x,base,scale,col,alpha){
    ctx.save();ctx.globalAlpha=alpha;
    ctx.strokeStyle=col;ctx.lineWidth=Math.max(2,W*0.006*scale);ctx.lineCap='round';
    const top=base-H*0.30*scale;
    ctx.beginPath();ctx.moveTo(x,base);
    ctx.quadraticCurveTo(x+W*0.02*scale,base-H*0.16*scale,x+W*0.06*scale,top);
    ctx.stroke();
    ctx.fillStyle=col;
    function bough(bx,by,len){
      ctx.beginPath();ctx.moveTo(bx,by);
      ctx.quadraticCurveTo(bx+len*0.6,by-len*0.2,bx+len,by-len*0.05);
      ctx.quadraticCurveTo(bx+len*0.6,by+len*0.1,bx,by);
      ctx.closePath();ctx.fill();
    }
    bough(x+W*0.06*scale,top, W*0.12*scale);
    bough(x+W*0.03*scale,base-H*0.18*scale, W*0.09*scale);
    ctx.restore();
  }
  function moon(ctx,vx,vy,r,col,alpha){
    ctx.save();ctx.globalAlpha=alpha;
    const gr=ctx.createRadialGradient(vx,vy,2,vx,vy,r*2.4);
    gr.addColorStop(0,col);gr.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=gr;ctx.beginPath();ctx.arc(vx,vy,r*2.4,0,7);ctx.fill();
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(vx,vy,r,0,7);ctx.fill();
    ctx.restore();
  }
  function draw(now){
    let dt=(now-last)/1000;last=now;if(dt>0.05)dt=0.05;
    if(!REDUCED) t+=dt;
    const ctx=S.ctx,W=S.w,H=S.h;
    const u=(t/DUR);
    const vi=Math.floor(u)%VIEWS.length;
    const vn=(vi+1)%VIEWS.length;
    const k=u-Math.floor(u);
    const fade = k>0.78? (k-0.78)/0.22 : 0;
    const A=VIEWS[vi], B=VIEWS[vn];
    const top=lerpHex(A.top,B.top,fade);
    const bot=lerpHex(A.bot,B.bot,fade);
    const tHex=lerpHex(A.top,B.top,fade), bHex=lerpHex(A.bot,B.bot,fade);
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,top);g.addColorStop(0.6,lerpHex(A.top,A.bot,0.5));g.addColorStop(1,bot);
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    const aCur=1-fade, aNext=fade;
    ctx.fillStyle='rgba(22,32,43,.55)';
    ctx.beginPath();ctx.moveTo(0,H*0.82);
    ctx.quadraticCurveTo(W*0.4,H*0.78,W*0.7,H*0.83);
    ctx.quadraticCurveTo(W*0.9,H*0.86,W,H*0.80);
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
    const mxp=(A.moonX*(1-fade)+B.moonX*fade)*W;
    const myp=(A.moonY*(1-fade)+B.moonY*fade)*H;
    moon(ctx,mxp,myp,Math.min(W,H)*0.045,'rgba(244,240,228,.95)',1);
    const drift=Math.sin(t*0.15)*W*0.02;
    torii(ctx,W,H, W*0.30+drift, H*0.84, 1, 'rgba(20,42,71,.85)', aCur);
    if(fade>0) torii(ctx,W,H, W*0.30+drift+W*0.06, H*0.84, 1, 'rgba(20,42,71,.85)', aNext*0.9);
    pine(ctx,W,H, W*0.80, H*0.84, 1, mix(PAL.green,PAL.ink,0.45), aCur);
    if(fade>0) pine(ctx,W,H, W*0.74, H*0.84, 1, mix(PAL.green,PAL.ink,0.45), aNext*0.9);
    const weather = fade<0.5? A.weather : B.weather;
    if(weather==='rain'){
      ctx.strokeStyle='rgba(242,240,232,.45)';ctx.lineWidth=1.2;
      for(const p of parts){
        if(!REDUCED){ p.y+=p.sp*1.4*dt; p.x-=0.12*p.sp*dt; if(p.y>1){p.y=0;p.x=Math.random();} if(p.x<0)p.x=1; }
        const x=p.x*W,y=p.y*H*0.8;
        ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-6,y+18);ctx.stroke();
      }
    }else if(weather==='snow'){
      ctx.fillStyle='rgba(242,240,232,.85)';
      for(const p of parts){
        if(!REDUCED){ p.y+=p.sp*0.5*dt; p.x+=Math.sin(t+p.r*9)*0.0009; if(p.y>1){p.y=0;p.x=Math.random();} }
        const x=p.x*W,y=p.y*H*0.82;
        ctx.beginPath();ctx.arc(x,y,1+p.r*2,0,7);ctx.fill();
      }
    }else if(weather==='mist'){
      ctx.fillStyle='rgba(242,240,232,.06)';
      for(let m=0;m<4;m++){
        const my=H*(0.45+m*0.10)+Math.sin(t*0.3+m)*6;
        ctx.fillRect(0,my,W,H*0.05);
      }
    }
    ctx.fillStyle='rgba(242,240,232,.6)';ctx.font='12px ui-monospace,Menlo,monospace';ctx.textAlign='center';
    const lbl = fade<0.5? A.label : B.label;
    ctx.fillText('— '+lbl+' —', W/2, H-12);
    ctx.textAlign='start';
    ctx.fillStyle='rgba(154,91,59,.8)';
    ctx.fillRect(W-34,18,18,18);
    ctx.strokeStyle='rgba(242,240,232,.8)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(W-25,22);ctx.lineTo(W-25,32);ctx.moveTo(W-30,27);ctx.lineTo(W-20,27);ctx.stroke();
  }
  let raf=0, running=false;
  function loop(){ if(!running) return; draw(performance.now()); raf=requestAnimationFrame(loop); }
  function start(){ if(running) return; running=true; last=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
  let _rt;
  window.addEventListener('resize', ()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ S=fitCanvas(cv); seedParts(); if(REDUCED) draw(performance.now()); },150); }, {passive:true});
  document.addEventListener('visibilitychange', ()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });
  if(REDUCED){ draw(performance.now()); } else start();
})();
</script>
</body>
</html>
