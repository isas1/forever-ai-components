<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Fuji at Dawn (Red Fuji) — Katsushika Hokusai. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fuji at Dawn</title>
<style>
  html,body{margin:0;height:100%;background:#0d2347;overflow:hidden}
  #hok02-stage{position:fixed;inset:0;width:100%;height:100%;overflow:hidden}
  .hok02-sky{position:absolute;inset:0;background:linear-gradient(180deg,#0d2347 0%,#1b3a6b 30%,#2e5c9a 55%,#d96a7a 88%,#e9a6ad 100%);animation:hok02-cycle 16s ease-in-out infinite}
  @keyframes hok02-cycle{0%,100%{filter:hue-rotate(0deg) brightness(.9)}50%{filter:hue-rotate(-12deg) brightness(1.12)}}
  .hok02-sun{position:absolute;width:78px;height:78px;border-radius:50%;background:radial-gradient(circle at 40% 40%,#fbf8f0,#e9a6ad 60%,#d96a7a 100%);left:62%;top:55%;box-shadow:0 0 38px 10px rgba(217,106,122,.5);animation:hok02-rise 16s ease-in-out infinite}
  @keyframes hok02-rise{0%,100%{transform:translateY(50px);opacity:.4}50%{transform:translateY(-30px);opacity:1}}
  .hok02-cone{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:0;border-left:36vmin solid transparent;border-right:36vmin solid transparent;border-bottom:44vmin solid #0d2347;filter:drop-shadow(0 -2px 0 #1a1714)}
  .hok02-snow{position:absolute;bottom:31vmin;left:50%;transform:translateX(-50%);width:0;height:0;border-left:14vmin solid transparent;border-right:14vmin solid transparent;border-bottom:16vmin solid #fbf8f0}
  .hok02-cloud{position:absolute;height:16px;border-radius:14px;background:rgba(243,234,214,.85);box-shadow:0 0 0 2px rgba(26,23,20,.25);animation:hok02-drift linear infinite}
  @keyframes hok02-drift{from{transform:translateX(-180px)}to{transform:translateX(110vw)}}
  .hok02-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#1a1714;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none;z-index:5}
  @media (prefers-reduced-motion: reduce){.hok02-sky,.hok02-sun,.hok02-cloud{animation:none!important}}
</style>
<script type="application/json" id="forever-agent-meta">

 "description": "Flat woodblock-style Red Fuji scene: indigo cone with snow cap, sky cycling from night to beni-pink dawn, a sun rising, and three cloud bands drifting across.",

  "sky gradient stop colors (hok02-sky background)",
  "sun size and position (width/height/left/top on .hok02-sun)",
  "cycle speed (16s on hok02-sky and hok02-sun animations)",
  "cloud count, widths, and drift durations",
  "mountain cone size (border values on .hok02-cone)",
  "snow cap size (border values on .hok02-snow)"
 ],

  "prefers-reduced-motion guard (animation:none rule)",
  "role=img + aria-label on stage div",

 ],
 "knownLimitations": [

  "No JS — cloud count changes require hand-editing HTML divs"
 ],
 "tier": "curated",
 "labels": [
  "accessible",
  "easy-to-modify",
  "mobile-ready",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "woodblock",
  "landscape",
  "hokusai",
  "sky",
  "sunrise",
  "ambient",
  "japanese"
 ]
}

</head>
<body>
<div id="hok02-stage" role="img" aria-label="Red Fuji at dawn: a flat woodblock cone of indigo with a white snow cap, the sky cycling from night to beni-pink morning while a sun rises behind and clouds drift in flat bands.">
  <div class="hok02-sky"></div>
  <div class="hok02-sun"></div>
  <div class="hok02-cone"></div>
  <div class="hok02-snow"></div>
  <div class="hok02-cloud" style="top:18%;width:120px;animation-duration:19s;"></div>
  <div class="hok02-cloud" style="top:30%;width:80px;animation-duration:26s;animation-delay:-8s;"></div>
  <div class="hok02-cloud" style="top:12%;width:150px;animation-duration:32s;animation-delay:-15s;"></div>
</div>
<div class="hok02-cap">Fuji at Dawn</div>
</body>
</html>
