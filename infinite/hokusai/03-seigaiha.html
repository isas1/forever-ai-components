<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Seigaiha — The Blue Sea Waves — Katsushika Hokusai. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Seigaiha — Blue Sea Waves</title>
<style>
  html,body{margin:0;height:100%;background:#f3ead6;overflow:hidden}
  #hok03-stage{position:fixed;inset:0;width:100%;height:100%}
  #hok03-svg{width:100%;height:100%;display:block}
  .hok03-arc{fill:none;stroke-width:2.4;transform-box:fill-box}
  @keyframes hok03-breathe{0%,100%{transform:translateY(0) scaleY(1);opacity:.9}50%{transform:translateY(-4px) scaleY(1.08);opacity:1}}
  .hok03-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#0d2347;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion: reduce){.hok03-arc{animation:none!important}}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/hokusai/03-seigaiha.html",
 "title": "Seigaiha — Blue Sea Waves",
 "description": "Navy-to-sky arcs tile the canvas in the seigaiha pattern; nested rings breathe with a slow staggered rise like a tide held in cloth.",
 "useWhen": "Japanese/ukiyo-e themed backgrounds, decorative hero sections, ambient looping tile patterns.",
 "avoidWhen": "Light or warm UIs where blue-navy arcs clash. Avoid where text overlays compete with the dense pattern.",
 "agentPrompt": "Change the palette to warm gold by replacing cols with [\"#5c2e00\",\"#9c5a00\",\"#d4860a\",\"#f5c842\"] and increase arc radius R from 34 to 44.",
 "editableAreas": [
  "arc color palette (cols array)",
  "arc radius (R=34)",
  "ring count (rings=4)",
  "breathe animation duration (3.2s)",
  "grid spacing (stepX, stepY)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard",
  "aria-label on stage div",
  "SVG viewBox + preserveAspectRatio"
 ],
 "knownLimitations": [
  "SVG arcs appended as raw DOM nodes with no resize cleanup",
  "Background color hardcoded in CSS body rule (#f3ead6)"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "seigaiha",
  "waves",
  "pattern",
  "japanese",
  "arcs",
  "ambient",
  "hokusai"
 ]
}
</script>
</head>
<body>
<div id="hok03-stage" role="img" aria-label="Seigaiha: the old pattern of overlapping blue arcs in nested scales, the whole field breathing in a slow stagger like a tide held in cloth.">
  <svg id="hok03-svg" viewBox="0 0 700 300" preserveAspectRatio="xMidYMid slice"></svg>
</div>
<div class="hok03-cap">Seigaiha — Blue Sea Waves</div>
<script>
(function(){
  "use strict";
  var REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var svg=document.getElementById('hok03-svg'); if(!svg) return;
  var NS="http://www.w3.org/2000/svg";
  var cols=["#0d2347","#1b3a6b","#2e5c9a","#6f9fcf"];
  var R=34, rings=4, stepX=R*1.7, stepY=R*1.1;

  function scaleAt(cx,cy){
    for(var r=rings;r>=1;r--){
      var rad=R*(r/rings);
      var arc=document.createElementNS(NS,"path");
      arc.setAttribute("d","M "+(cx-rad)+" "+cy+" A "+rad+" "+rad+" 0 0 1 "+(cx+rad)+" "+cy);
      arc.setAttribute("class","hok03-arc");
      arc.setAttribute("stroke",cols[(rings-r)%cols.length]);
      var delay=((cx+cy)/180 + r*0.18)%3.2;
      if(!REDUCED){ arc.style.animation="hok03-breathe 3.2s ease-in-out infinite"; arc.style.animationDelay=(-delay)+"s"; }
      svg.appendChild(arc);
    }
  }
  var row=0;
  for(var y=20;y<320;y+=stepY){
    var offset=(row%2)? stepX/2 : 0;
    for(var x=-stepX;x<740;x+=stepX){ scaleAt(x+offset,y); }
    row++;
  }
})();
</script>
</body>
</html>
