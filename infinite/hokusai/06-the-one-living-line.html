<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="The One Living Line — Katsushika Hokusai. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The One Living Line</title>
<style>
  html,body{margin:0;height:100%;background:#f3ead6;overflow:hidden}
  #hok06-stage{position:fixed;inset:0;width:100%;height:100%}
  #hok06-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .hok06-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#1b3a6b;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
</head>
<body>
<div id="hok06-stage" role="img" aria-label="The one living line: a sumi brush draws itself across washi paper in flowing strokes whose width swells where slow and thins to dry where fast, the ink fading and the brush beginning anew.">
  <canvas id="hok06-cv"></canvas>
</div>
<div class="hok06-cap">The One Living Line</div>
<script>
(function(){
  "use strict";
  var REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var cv=document.getElementById('hok06-cv'); if(!cv) return;
  var ctx=cv.getContext('2d');
  var W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);
  var inks=["#1b3a6b","#1a1714","#d96a7a"];
  var t=0, ink=inks[0], last=null, lastSpeed=0.5, phase=0, restTimer=0;

  function size(){
    var r=cv.getBoundingClientRect(); W=Math.max(2,r.width); H=Math.max(2,r.height);
    cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
    ctx.fillStyle="#f3ead6"; ctx.fillRect(0,0,W,H);
    last=null;
  }
  size();

  // autonomous brush head following a slow lissajous, speed varies the width
  function brushPoint(){
    var cx=W*(0.5 + 0.34*Math.sin(phase*0.9));
    var cy=H*(0.5 + 0.30*Math.sin(phase*1.3 + 1.1));
    return {x:cx,y:cy};
  }
  function newStroke(){
    ink=inks[(Math.random()*inks.length)|0];
    phase=Math.random()*6.28; last=null;
  }
  function draw(){
    t+=0.016; phase+=0.05;
    // slowly fade older ink toward washi
    ctx.fillStyle="rgba(243,234,214,0.012)"; ctx.fillRect(0,0,W,H);

    var p=brushPoint();
    if(last){
      var dx=p.x-last.x, dy=p.y-last.y, dist=Math.sqrt(dx*dx+dy*dy);
      var speed=Math.min(2.4,dist*0.06);
      lastSpeed += (speed-lastSpeed)*0.2;
      var w=Math.max(1.4, 16 - lastSpeed*9);
      ctx.strokeStyle=ink; ctx.lineCap="round"; ctx.lineJoin="round";
      ctx.globalAlpha=Math.min(1,0.55+w*0.04);
      ctx.lineWidth=w;
      ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke();
      if(lastSpeed>1.1){
        for(var i=0;i<3;i++){ ctx.globalAlpha=0.2; ctx.beginPath(); ctx.arc(p.x+(Math.random()-0.5)*6,p.y+(Math.random()-0.5)*6,0.6,0,6.3); ctx.fillStyle=ink; ctx.fill(); }
      }
      ctx.globalAlpha=1;
    }
    last=p;
    restTimer++;
    if(restTimer>520){ restTimer=0; newStroke(); }
  }

  var raf=0, running=false;
  function loop(){ if(!running) return; draw(); raf=requestAnimationFrame(loop); }
  function start(){ if(running) return; running=true; raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }

  var _rt;
  window.addEventListener('resize', function(){ clearTimeout(_rt); _rt=setTimeout(size,150); }, {passive:true});
  document.addEventListener('visibilitychange', function(){ if(REDUCED) return; if(document.hidden) stop(); else start(); });

  if(REDUCED){ for(var i=0;i<80;i++) draw(); } else start();
})();
</script>
</body>
</html>
