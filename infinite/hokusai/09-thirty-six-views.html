<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Thirty-Six Views of Fuji — Katsushika Hokusai. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thirty-Six Views of Fuji</title>
<style>
  html,body{margin:0;height:100%;background:#f3ead6;overflow:hidden}
  #hok09-stage{position:fixed;inset:0;width:100%;height:100%}
  #hok09-svg{width:100%;height:100%;display:block}
  .hok09-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#0d2347;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none;z-index:5}
</style>
</head>
<body>
<div id="hok09-stage" role="img" aria-label="Thirty-six views of Fuji: three flat woodblock scenes — calm morning Fuji, a storm with red lightning, and the great wave — auto cross-fading, Fuji always present near or far.">
  <svg id="hok09-svg" viewBox="0 0 1000 400" preserveAspectRatio="xMidYMid slice"></svg>
</div>
<div class="hok09-cap">Thirty-Six Views of Fuji</div>
<script>
(function(){
  "use strict";
  var REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var svg=document.getElementById('hok09-svg'); if(!svg) return;
  var NS="http://www.w3.org/2000/svg";
  function el(tag,attrs){ var e=document.createElementNS(NS,tag); for(var k in attrs) e.setAttribute(k,attrs[k]); return e; }

  function sceneMorning(){
    var g=el("g",{});
    g.appendChild(el("rect",{x:0,y:0,width:1000,height:400,fill:"#f3ead6"}));
    g.appendChild(el("rect",{x:0,y:0,width:1000,height:120,fill:"#aecbe4",opacity:0.6}));
    g.appendChild(el("rect",{x:0,y:120,width:1000,height:60,fill:"#e9a6ad",opacity:0.5}));
    g.appendChild(el("circle",{cx:760,cy:90,r:42,fill:"#d96a7a"}));
    g.appendChild(el("path",{d:"M 320 300 L 500 110 L 680 300 Z",fill:"#1b3a6b",stroke:"#0d2347","stroke-width":2}));
    g.appendChild(el("path",{d:"M 452 158 L 500 110 L 548 158 L 528 150 L 512 168 L 494 150 L 476 166 Z",fill:"#f3ead6"}));
    g.appendChild(el("path",{d:"M 0 300 Q 250 270 1000 300 L 1000 400 L 0 400 Z",fill:"#2e5c9a"}));
    g.appendChild(el("rect",{x:120,y:150,width:140,height:14,rx:7,fill:"#f3ead6",opacity:0.85}));
    g.appendChild(el("rect",{x:600,y:180,width:100,height:12,rx:6,fill:"#f3ead6",opacity:0.8}));
    var birds=el("g",{stroke:"#1a1714","stroke-width":2,fill:"none"});
    [[180,80],[210,70],[250,90]].forEach(function(b){ birds.appendChild(el("path",{d:"M "+b[0]+" "+b[1]+" q 8 -8 16 0 q 8 -8 16 0"})); });
    g.appendChild(birds);
    return g;
  }
  function sceneStorm(){
    var g=el("g",{});
    g.appendChild(el("rect",{x:0,y:0,width:1000,height:400,fill:"#1b2740"}));
    g.appendChild(el("rect",{x:0,y:0,width:1000,height:200,fill:"#0d2347",opacity:0.7}));
    g.appendChild(el("path",{d:"M 300 320 L 500 120 L 700 320 Z",fill:"#10294f",stroke:"#0a1c38","stroke-width":2}));
    g.appendChild(el("path",{d:"M 470 150 L 500 120 L 530 150 L 514 144 L 500 158 L 486 144 Z",fill:"#aecbe4"}));
    var bolt=el("path",{d:"M 500 130 L 470 230 L 490 230 L 450 320",fill:"none",stroke:"#d96a7a","stroke-width":3,opacity:0});
    g.appendChild(bolt);
    var bolt2=el("path",{d:"M 540 160 L 560 240 L 545 240 L 580 310",fill:"none",stroke:"#e9a6ad","stroke-width":2,opacity:0});
    g.appendChild(bolt2);
    var rain=el("g",{stroke:"#6f9fcf","stroke-width":1,opacity:0.5});
    for(var i=0;i<50;i++){ var x=Math.random()*1000,y=Math.random()*400; rain.appendChild(el("line",{x1:x,y1:y,x2:x-10,y2:y+24})); }
    g.appendChild(rain);
    g.appendChild(el("path",{d:"M 0 330 Q 500 310 1000 330 L 1000 400 L 0 400 Z",fill:"#0d2347"}));
    g._anim=function(time){ var f2=Math.sin(time*0.9); if(f2>0.92){ bolt.setAttribute("opacity",1); bolt2.setAttribute("opacity",0.8); } else { bolt.setAttribute("opacity",0); bolt2.setAttribute("opacity",0); } };
    return g;
  }
  function sceneWave(){
    var g=el("g",{});
    g.appendChild(el("rect",{x:0,y:0,width:1000,height:400,fill:"#cfe0ee"}));
    g.appendChild(el("path",{d:"M 440 250 L 500 200 L 560 250 Z",fill:"#1b3a6b"}));
    g.appendChild(el("path",{d:"M 482 214 L 500 200 L 518 214 Z",fill:"#f3ead6"}));
    var wave=el("path",{fill:"#1b3a6b",stroke:"#0a1c38","stroke-width":3}); g.appendChild(wave);
    var foam=el("path",{fill:"none",stroke:"#fbf8f0","stroke-width":5,"stroke-linecap":"round"}); g.appendChild(foam);
    var claws=el("g",{fill:"#fbf8f0",stroke:"#0a1c38","stroke-width":1}); g.appendChild(claws);
    g._anim=function(time){
      var ph=time, d="M 0 360 ", foamPts=[];
      for(var i=0;i<=20;i++){ var u=i/20,x=u*1000,crest=Math.pow(Math.max(0,1-u*1.1),1.5),y=360-crest*230-Math.sin(u*8+ph)*14*(1-u); d+="L "+x.toFixed(0)+" "+y.toFixed(0)+" "; foamPts.push([x,y,crest]); }
      d+="L 1000 400 L 0 400 Z"; wave.setAttribute("d",d);
      var fd="M "+foamPts[0][0]+" "+foamPts[0][1]+" ";
      for(var j=1;j<foamPts.length;j++) fd+="L "+foamPts[j][0]+" "+foamPts[j][1]+" ";
      foam.setAttribute("d",fd);
      while(claws.firstChild) claws.removeChild(claws.firstChild);
      foamPts.forEach(function(p,idx){ if(p[2]>0.5 && idx%2===0){ var r=3+p[2]*5; claws.appendChild(el("circle",{cx:p[0]+Math.sin(ph+idx)*6,cy:p[1]-r-4,r:r})); } });
    };
    return g;
  }
  var builders=[sceneMorning,sceneStorm,sceneWave];
  var currentG=null, animFn=null, current=-1, t=0, switchAt=0;

  function show(idx){
    if(currentG){ var old=currentG; old.style.transition="opacity 0.6s ease"; old.style.opacity="0"; setTimeout(function(){ if(old.parentNode) old.parentNode.removeChild(old); },640); }
    var g=builders[idx]();
    g.style.opacity="0"; g.style.transition="opacity 0.6s ease";
    svg.appendChild(g); void g.getBBox();
    requestAnimationFrame(function(){ g.style.opacity="1"; });
    currentG=g; animFn=g._anim||null; current=idx;
  }

  var raf=0, running=false;
  function loop(){ if(!running) return; t+=0.016; if(animFn) animFn(t); if(t>switchAt){ switchAt=t+5; show((current+1)%builders.length); } raf=requestAnimationFrame(loop); }
  function start(){ if(running) return; running=true; raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
  document.addEventListener('visibilitychange', function(){ if(REDUCED) return; if(document.hidden) stop(); else start(); });

  switchAt=5; show(0);
  if(REDUCED){ if(animFn) animFn(0.6); } else start();
})();
</script>
</body>
</html>
