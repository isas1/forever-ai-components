<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Mint plus/minus stepper with a rolling number reel that springs and overshoots between digits on each step.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Spring Stepper</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#06231f;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .wrap{height:100%;display:flex;align-items:center;justify-content:center}
  .stepper{display:flex;align-items:center;gap:14px;user-select:none}
  .btn{width:54px;height:54px;border-radius:16px;background:#0e3a32;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#5fffcf;font-size:30px;font-weight:600;line-height:1;box-shadow:0 6px 18px rgba(0,0,0,.4);transition:transform .12s,background .2s}
  .btn:active{transform:scale(.9);background:#165247}
  .num{width:78px;height:74px;overflow:hidden;position:relative;border-radius:14px;background:#0a2e29}
  .roll{position:absolute;left:0;width:100%;text-align:center;font-size:46px;font-weight:800;color:#eafff8;line-height:74px;will-change:transform}
  .cap{position:fixed;left:10px;bottom:9px;font-size:11px;letter-spacing:.08em;color:#5fffcf;opacity:.4;text-transform:uppercase}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/inputs-switches/03-spring-stepper.html",
 "title": "Spring Stepper",
 "description": "Mint-themed +/- stepper with a number reel that springs and overshoots between digits 0–9; auto-cycles as a demo. Dark green palette.",
 "useWhen": "Quantity selectors, numeric inputs, settings with discrete integer steps where tactile spring feedback adds polish.",
 "avoidWhen": "Ranges beyond 0–9 (strip is hardcoded 12 rows). Remove auto-cycle timer before shipping in production.",
 "agentPrompt": "Change the value range to 0–99 by rebuilding the strip with 100 rows, set spring stiffness k=0.22, and change accent color from #5fffcf to #a78bfa.",
 "editableAreas": [
  "spring stiffness (k=0.16)",
  "damping factor (damp=0.62)",
  "accent color (#5fffcf)",
  "auto-cycle interval (auto>90)",
  "button/num box border-radius and size"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (static translateY fallback)",
  "visibilitychange pause guard"
 ],
 "knownLimitations": [
  "Value clamped 0–9; strip only contains 12 rows so ranges beyond single digits need a rebuild",
  "Auto-cycles every ~90 frames — remove for production",
  "Buttons are divs with no aria role or keyboard support"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "stepper",
  "spring",
  "number-reel",
  "counter",
  "ui-control",
  "physics",
  "mint"
 ]
}
</script>
</head>
<body>
<div class="wrap">
  <div class="stepper">
    <div class="btn" id="minus">&minus;</div>
    <div class="num"><div class="roll" id="roll"></div></div>
    <div class="btn" id="plus">+</div>
  </div>
</div>
<div class="cap">Spring Stepper</div>
<script>
(function(){
  const roll=document.getElementById('roll');
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const H=74;let val=4,disp=4,vel=0,running=true,auto=0;
  // build a tall strip of numbers
  let html='';for(let i=0;i<12;i++)html+='<div style="height:'+H+'px">'+i+'</div>';
  roll.innerHTML=html;roll.style.height=(12*H)+'px';
  function step(d){val=Math.max(0,Math.min(9,val+d));vel+=d*4;}
  document.getElementById('plus').addEventListener('pointerdown',()=>{step(1);auto=0;});
  document.getElementById('minus').addEventListener('pointerdown',()=>{step(-1);auto=0;});
  function frame(){
    if(!running)return;
    auto++;
    if(auto>90){auto=0;step(Math.random()>.5?1:-1);}
    // spring toward val
    const k=0.16,damp=0.62;
    const f=(val-disp)*k;vel=(vel+f)*damp;disp+=vel;
    roll.style.transform='translateY('+(-disp*H)+'px)';
    requestAnimationFrame(frame);
  }
  document.addEventListener('visibilitychange',()=>{running=!document.hidden;if(running&&!reduce)requestAnimationFrame(frame);});
  if(reduce){roll.style.transform='translateY('+(-val*H)+'px)';}
  else requestAnimationFrame(frame);
})();
</script>
</body>
</html>
