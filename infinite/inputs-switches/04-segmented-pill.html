<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Day/Week/Month/Year segmented control with a blue-violet gradient pill that springs and stretches as it slides between options.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Segmented Control</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0a0f1c;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .wrap{height:100%;display:flex;align-items:center;justify-content:center}
  .seg{position:relative;display:flex;background:#141c2e;border-radius:16px;padding:6px;width:min(80vmin,330px);box-shadow:inset 0 1px 3px rgba(0,0,0,.5)}
  .pill{position:absolute;top:6px;height:calc(100% - 12px);border-radius:11px;background:linear-gradient(135deg,#3a8bff,#7c5cff);box-shadow:0 4px 14px rgba(80,110,255,.5);transition:none;z-index:0}
  .opt{flex:1;text-align:center;padding:13px 6px;font-size:14px;font-weight:600;color:#8a95ad;cursor:pointer;position:relative;z-index:1;transition:color .25s;user-select:none}
  .opt.on{color:#fff}
  .cap{position:fixed;left:10px;bottom:9px;font-size:11px;letter-spacing:.08em;color:#7c5cff;opacity:.45;text-transform:uppercase}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/inputs-switches/04-segmented-pill.html",
 "title": "Segmented Control",
 "description": "Blue-violet gradient pill slides between Day/Week/Month/Year segments with elastic spring stretch. Auto-cycles; click pauses briefly.",
 "useWhen": "Date-range pickers, tab bars, filter controls in dark-themed dashboards or app UIs.",
 "avoidWhen": "Production use without removing the auto-cycle loop. Light-background UIs where the hardcoded dark background clashes.",
 "agentPrompt": "Change options to ['S','M','T','W'] in .opt divs, set pill gradient to linear-gradient(135deg,#f97316,#ec4899), slow spring by changing k from 0.18 to 0.10.",
 "editableAreas": [
  "option labels (Day/Week/Month/Year in .opt divs)",
  "pill gradient colors (#3a8bff, #7c5cff)",
  "spring stiffness (k=0.18) and damping (damp=0.65)",
  "auto-cycle interval (auto>75)",
  "pill stretch multiplier (vel*40)"
 ],
 "preserveElements": [
  "geometry cache (geoms array, measure() on resize only)",
  "visibilitychange pause guard",
  "IIFE wrapper",
  "prefers-reduced-motion check"
 ],
 "knownLimitations": [
  "Auto-cycles by default — remove before shipping in production",
  "Background hardcoded #0a0f1c — incompatible with light themes",
  "No aria-selected or role=tablist — add for full accessibility"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "segmented-control",
  "pill",
  "spring",
  "ui-control",
  "gradient",
  "auto-cycle",
  "tabs"
 ]
}
</script>
</head>
<body>
<div class="wrap">
  <div class="seg" id="seg">
    <div class="pill" id="pill"></div>
    <div class="opt on">Day</div>
    <div class="opt">Week</div>
    <div class="opt">Month</div>
    <div class="opt">Year</div>
  </div>
</div>
<div class="cap">Segmented Control</div>
<script>
(function(){
  const seg=document.getElementById('seg'),pill=document.getElementById('pill'),opts=[...seg.querySelectorAll('.opt')];
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  let idx=0,cur=0,vel=0,running=true,auto=0,manual=-1;
  // cache option geometry once; re-read only on resize (never per-frame -> no reflow)
  let geoms=[];
  function geom(i){return geoms[i];}
  function measure(){geoms=opts.map(o=>({x:o.offsetLeft,w:o.offsetWidth}));}
  function select(i){opts.forEach((o,j)=>o.classList.toggle('on',j===i));idx=i;}
  opts.forEach((o,i)=>o.addEventListener('pointerdown',()=>{select(i);manual=40;}));
  function frame(){
    if(!running)return;
    auto++;
    if(manual>0)manual--; else if(auto>75){auto=0;select((idx+1)%opts.length);}
    const k=0.18,damp=0.65,f=(idx-cur)*k;vel=(vel+f)*damp;cur+=vel;
    const a=geom(Math.floor(cur)),bi=Math.min(opts.length-1,Math.floor(cur)+1),b=geom(bi),fr=cur-Math.floor(cur);
    const x=a.x+(b.x-a.x)*fr, w=a.w+(b.w-a.w)*fr;
    // stretch pill while moving
    const stretch=Math.abs(vel)*40;
    pill.style.left=(x-stretch/2)+'px';pill.style.width=(w+stretch)+'px';
    requestAnimationFrame(frame);
  }
  function init(){measure();const g=geom(0);pill.style.left=g.x+'px';pill.style.width=g.w+'px';}
  addEventListener('resize',measure);
  document.addEventListener('visibilitychange',()=>{running=!document.hidden;if(running&&!reduce)requestAnimationFrame(frame);});
  requestAnimationFrame(()=>{init();if(!reduce)requestAnimationFrame(frame);});
})();
</script>
</body>
</html>
