<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Row of three amber rounded checkboxes that fill and draw an animated checkmark stroke as they toggle on and off.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Checkbox Morph</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#1a1206;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .wrap{height:100%;display:flex;align-items:center;justify-content:center;gap:18px}
  svg{width:min(20vmin,86px);height:auto;cursor:pointer}
  .box{fill:none;stroke:#5a4520;stroke-width:7;transition:fill .35s,stroke .35s}
  .box.on{fill:#ffb02e;stroke:#ffb02e}
  .check{fill:none;stroke:#1a1206;stroke-width:9;stroke-linecap:round;stroke-linejoin:round}
  .cap{position:fixed;left:10px;bottom:9px;font-size:11px;letter-spacing:.08em;color:#ffb02e;opacity:.45;text-transform:uppercase}
</style>
</head>
<body>
<div class="wrap" id="wrap"></div>
<div class="cap">Checkbox Morph</div>
<script>
(function(){
  const wrap=document.getElementById('wrap');
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const NS='http://www.w3.org/2000/svg';
  const LEN=80; // path length approx
  const boxes=[];
  for(let i=0;i<3;i++){
    const s=document.createElementNS(NS,'svg');s.setAttribute('viewBox','0 0 100 100');
    const r=document.createElementNS(NS,'rect');r.setAttribute('class','box');r.setAttribute('x','12');r.setAttribute('y','12');r.setAttribute('width','76');r.setAttribute('height','76');r.setAttribute('rx','20');
    const p=document.createElementNS(NS,'path');p.setAttribute('class','check');p.setAttribute('d','M28 52 L44 68 L74 34');
    p.style.strokeDasharray=LEN;p.style.strokeDashoffset=LEN;
    s.appendChild(r);s.appendChild(p);wrap.appendChild(s);
    const o={r,p,on:false,phase:i*0.9};
    s.addEventListener('pointerdown',()=>toggle(o));
    boxes.push(o);
  }
  function toggle(o){o.on=!o.on;render(o);}
  function render(o){
    o.r.classList.toggle('on',o.on);
  }
  let running=true,clock=0;
  function frame(){
    if(!running)return;
    clock++;
    boxes.forEach((o)=>{
      if(clock%150===Math.floor(o.phase*40)%150){o.on=!o.on;render(o);}
      const tgt=o.on?0:LEN;
      const off=parseFloat(o.p.style.strokeDashoffset);
      o.p.style.strokeDashoffset=off+(tgt-off)*0.18;
    });
    requestAnimationFrame(frame);
  }
  document.addEventListener('visibilitychange',()=>{running=!document.hidden;if(running&&!reduce)requestAnimationFrame(frame);});
  if(reduce){boxes.forEach(o=>{o.on=true;render(o);o.p.style.strokeDashoffset=0;});}
  else requestAnimationFrame(frame);
})();
</script>
</body>
</html>
