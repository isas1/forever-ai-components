<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Five gold stars that light up in sequence with a pop scale bounce on the active star as the rating sweeps up and down.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Star Rating</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#1c1500;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .wrap{height:100%;display:flex;align-items:center;justify-content:center}
  .stage{width:min(86vmin,360px)}
  svg{width:100%;height:auto;overflow:visible}
  .cap{position:fixed;left:10px;bottom:9px;font-size:11px;letter-spacing:.08em;color:#ffd23f;opacity:.45;text-transform:uppercase}
</style>
</head>
<body>
<div class="wrap"><div class="stage">
<svg id="svg" viewBox="0 0 320 80" role="img" aria-label="Star rating"></svg>
</div></div>
<div class="cap">Star Rating</div>
<script>
(function(){
  const svg=document.getElementById('svg');
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const NS='http://www.w3.org/2000/svg';
  const N=5,stars=[];
  const path='M0 -22 L6.5 -7 L23 -7 L9.5 3 L15 19 L0 9 L-15 19 L-9.5 3 L-23 -7 L-6.5 -7 Z';
  for(let i=0;i<N;i++){
    const g=document.createElementNS(NS,'g');g.setAttribute('transform','translate('+(36+i*62)+',40)');
    const back=document.createElementNS(NS,'path');back.setAttribute('d',path);back.setAttribute('fill','#3a3000');back.setAttribute('stroke','#5a4a10');back.setAttribute('stroke-width',2);
    const fill=document.createElementNS(NS,'path');fill.setAttribute('d',path);fill.setAttribute('fill','#ffd23f');
    g.appendChild(back);g.appendChild(fill);svg.appendChild(g);
    stars.push({g,fill,lit:0,scale:1});
    g.addEventListener('pointerenter',()=>setTarget(i+1));
  }
  let target=0,running=true,clock=0,dir=1;
  function setTarget(n){target=n;}
  function frame(){
    if(!running)return;
    clock++;
    if(clock%18===0){target+=dir;if(target>=N){dir=-1;}if(target<=0){dir=1;}}
    stars.forEach((s,i)=>{
      const want=i<target?1:0;
      s.lit+=(want-s.lit)*0.25;
      const popTarget = (i===Math.round(target)-1 && want>0.5)?1.25:1;
      s.scale+=(popTarget-s.scale)*0.2;
      s.fill.setAttribute('opacity',s.lit);
      s.g.setAttribute('transform','translate('+(36+i*62)+',40) scale('+s.scale+')');
    });
    requestAnimationFrame(frame);
  }
  document.addEventListener('visibilitychange',()=>{running=!document.hidden;if(running&&!reduce)requestAnimationFrame(frame);});
  if(reduce){target=4;stars.forEach((s,i)=>s.fill.setAttribute('opacity',i<4?1:0));}
  else requestAnimationFrame(frame);
})();
</script>
</body>
</html>
