<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Dark purple field that auto-fills and removes rounded colored tag chips with pop-scale spring animation and a blinking cursor.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tag Chips</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#170a1c;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .wrap{height:100%;display:flex;align-items:center;justify-content:center;padding:18px;box-sizing:border-box}
  .field{width:min(82vmin,340px);min-height:120px;background:#23102b;border:2px solid #3a1a47;border-radius:16px;padding:12px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;box-sizing:border-box}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:20px;color:#fff;font-size:14px;font-weight:600;transform:scale(0);will-change:transform,opacity}
  .chip .x{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:11px;line-height:1}
  .cursor{width:2px;height:22px;background:#d36bff;align-self:center;animation:bl 1s steps(2) infinite}
  @keyframes bl{0%,50%{opacity:1}50.01%,100%{opacity:0}}
  .cap{position:fixed;left:10px;bottom:9px;font-size:11px;letter-spacing:.08em;color:#d36bff;opacity:.45;text-transform:uppercase}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/inputs-switches/09-tag-chips.html",
 "title": "Tag Chips",
 "description": "Colored tag chips auto-fill and remove inside a dark input field with spring pop-in and shrink-out transitions; a blinking cursor mimics live typing.",
 "useWhen": "Demonstrating tag input UIs, filter selectors, or skill/interest pickers in dark-themed product contexts.",
 "avoidWhen": "Production tag input without wiring real keyboard entry — auto-cycle is demo-only; remove the rAF loop and add actual input handling before shipping.",
 "agentPrompt": "Change the word list to ['figma','motion','tailwind','a11y','token'] and update the colors array to use a warm palette: ['#ea580c','#b45309','#15803d','#0f766e','#7c3aed'].",
 "editableAreas": [
  "word list (words array)",
  "chip color palette (colors array)",
  "max chip count before removal (>=7)",
  "spring pop-in timing (cubic-bezier .2,1.5,.4,1)",
  "chip font size and padding"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (static fallback)",
  "visibilitychange pause",
  "cursor element inside field"
 ],
 "knownLimitations": [
  "Auto-cycles via rAF loop — must be replaced with keyboard input handling for real use",
  "Word list is finite (10 items), so duplicates appear quickly",
  "No aria roles on chips or remove buttons — needs role=button + aria-label for accessibility"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "tags",
  "chips",
  "input",
  "ui-control",
  "spring-animation",
  "dark-theme",
  "auto-cycle"
 ]
}
</script>
</head>
<body>
<div class="wrap"><div class="field" id="field"><span class="cursor"></span></div></div>
<div class="cap">Tag Chips</div>
<script>
(function(){
  const field=document.getElementById('field'),cursor=field.querySelector('.cursor');
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const words=['design','react','css','motion','ux','svg','dark','grid','type','flow'];
  const colors=['#7c3aed','#db2777','#2563eb','#0891b2','#ca8a04','#dc2626'];
  let running=true,timer=0,chips=[];
  function add(){
    const w=words[Math.floor(Math.random()*words.length)];
    const c=document.createElement('span');c.className='chip';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.innerHTML=w+'<span class="x">&times;</span>';
    field.insertBefore(c,cursor);
    requestAnimationFrame(()=>{c.style.transition='transform .4s cubic-bezier(.2,1.5,.4,1)';c.style.transform='scale(1)';});
    chips.push(c);
    c.querySelector('.x').addEventListener('pointerdown',e=>{e.stopPropagation();remove(c);});
  }
  function remove(c){
    c.style.transition='transform .25s,opacity .25s';c.style.transform='scale(0)';c.style.opacity='0';
    chips=chips.filter(x=>x!==c);setTimeout(()=>c.remove(),260);
  }
  function frame(){
    if(!running)return;
    timer++;
    if(timer%32===0){
      if(chips.length>=7){const c=chips[0];remove(c);}
      else add();
    }
    requestAnimationFrame(frame);
  }
  field.addEventListener('pointerdown',()=>{if(chips.length<9)add();});
  document.addEventListener('visibilitychange',()=>{running=!document.hidden;if(running&&!reduce)requestAnimationFrame(frame);});
  if(reduce){for(let i=0;i<4;i++)add();chips.forEach(c=>c.style.transform='scale(1)');}
  else requestAnimationFrame(frame);
})();
</script>
</body>
</html>
