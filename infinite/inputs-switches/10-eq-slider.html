<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Seven-band audio EQ of vertical teal sliders that auto-undulate and snap to your pointer with glowing level-meter dots.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reactive EQ</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#05080d;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .wrap{height:100%;display:flex;align-items:center;justify-content:center}
  .stage{width:min(80vmin,330px)}
  canvas{width:100%;height:auto;display:block}
  .cap{position:fixed;left:10px;bottom:9px;font-size:11px;letter-spacing:.08em;color:#19e8b0;opacity:.45;text-transform:uppercase}
</style>
</head>
<body>
<div class="wrap"><div class="stage"><canvas id="c" width="660" height="440"></canvas></div></div>
<div class="cap">Reactive EQ</div>
<script>
(function(){
  const cv=document.getElementById('c'),ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const W=cv.width,H=cv.height;
  const BANDS=7,gap=14,bw=(W-gap*(BANDS+1))/BANDS;
  const bands=[];for(let i=0;i<BANDS;i++)bands.push({v:0.5+0.3*Math.sin(i),t:0.5,vel:0,boost:Math.random()*Math.PI*2});
  let running=true,clock=0,target=-1;
  function frame(){
    if(!running)return;
    clock+=1;
    ctx.clearRect(0,0,W,H);
    bands.forEach((b,i)=>{
      if(target<0){b.t=0.5+0.4*Math.sin(clock*0.03+b.boost);}
      const k=0.2,damp=0.6,f=(b.t-b.v)*k;b.vel=(b.vel+f)*damp;b.v+=b.vel;
      const x=gap+i*(bw+gap);
      const trackTop=40,trackBot=H-40,trackH=trackBot-trackTop;
      // track
      ctx.fillStyle='#0e1a22';rr(ctx,x,trackTop,bw,trackH,bw/2);ctx.fill();
      // active fill from bottom
      const knobY=trackBot-trackH*b.v;
      const grad=ctx.createLinearGradient(0,trackBot,0,trackTop);
      grad.addColorStop(0,'#0c7a5e');grad.addColorStop(1,'#19e8b0');
      ctx.fillStyle=grad;rr(ctx,x,knobY,bw,trackBot-knobY,bw/2);ctx.fill();
      // glow bars (level meter dots) above knob
      for(let d=0;d<10;d++){
        const dy=trackBot-12-d*((trackH-24)/10);
        const lit=dy>knobY;
        ctx.globalAlpha=lit?0.18:0.0;
        if(lit){ctx.fillStyle='#19e8b0';rr(ctx,x+4,dy-3,bw-8,4,2);ctx.fill();}
      }
      ctx.globalAlpha=1;
      // knob
      ctx.fillStyle='#eafff8';ctx.beginPath();ctx.arc(x+bw/2,knobY,bw/2+3,0,7);ctx.fill();
      ctx.fillStyle='#0c7a5e';ctx.beginPath();ctx.arc(x+bw/2,knobY,bw/2-4,0,7);ctx.fill();
    });
    requestAnimationFrame(frame);
  }
  function rr(c,x,y,w,h,r){r=Math.min(r,w/2,h/2);c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
  cv.addEventListener('pointermove',e=>{
    const r=cv.getBoundingClientRect();const px=(e.clientX-r.left)/r.width*W,py=(e.clientY-r.top)/r.height*H;
    const i=Math.floor((px-gap/2)/(bw+gap));if(i>=0&&i<BANDS){target=i;bands[i].t=Math.min(1,Math.max(0,(H-40-py)/(H-80)));}
  });
  cv.addEventListener('pointerleave',()=>{target=-1;});
  document.addEventListener('visibilitychange',()=>{running=!document.hidden;if(running&&!reduce)requestAnimationFrame(frame);});
  if(reduce){
    running=false;
    bands.forEach(b=>{b.v=0.4+0.4*Math.random();});
    drawStatic();
  } else requestAnimationFrame(frame);
  function drawStatic(){
    ctx.clearRect(0,0,W,H);
    bands.forEach((b,i)=>{
      const x=gap+i*(bw+gap),trackTop=40,trackBot=H-40,trackH=trackBot-trackTop;
      ctx.fillStyle='#0e1a22';rr(ctx,x,trackTop,bw,trackH,bw/2);ctx.fill();
      const knobY=trackBot-trackH*b.v;
      const grad=ctx.createLinearGradient(0,trackBot,0,trackTop);grad.addColorStop(0,'#0c7a5e');grad.addColorStop(1,'#19e8b0');
      ctx.fillStyle=grad;rr(ctx,x,knobY,bw,trackBot-knobY,bw/2);ctx.fill();
      ctx.fillStyle='#eafff8';ctx.beginPath();ctx.arc(x+bw/2,knobY,bw/2+3,0,7);ctx.fill();
      ctx.fillStyle='#0c7a5e';ctx.beginPath();ctx.arc(x+bw/2,knobY,bw/2-4,0,7);ctx.fill();
    });
  }
})();
</script>
</body>
</html>
