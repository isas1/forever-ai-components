<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Knurled rotary knob that spring-snaps between 12 detents with flashing tick marks and a two-digit value readout in orange.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Detent Knob</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#1b1d22;}
  #dk-c{display:block;width:100%;height:100%;cursor:grab;}
  #dk-c:active{cursor:grabbing;}
  .cap{position:fixed;left:9px;bottom:8px;font:600 10px/1.2 ui-monospace,"SFMono-Regular",monospace;
       letter-spacing:.14em;color:#ff5c3a;opacity:.34;text-transform:uppercase;
       pointer-events:none;user-select:none;}
</style>
</head>
<body>
<canvas id="dk-c"></canvas>
<div class="cap">Detent Knob</div>
<script>
(function(){
  const cv=document.getElementById('dk-c'),ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const ACC='#ff5c3a', BG='#1b1d22', STEPS=12, TAU=Math.PI*2, STEP=TAU/STEPS;
  let W,H,DPR,cx,cy,R;
  function size(){
    DPR=Math.min(devicePixelRatio||1,2);
    W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
    cx=W/2;cy=H/2;R=Math.min(W,H)*0.30;
  }
  addEventListener('resize',size);size();

  // Hooke's-law spring pulling the pointer toward its target detent.
  let target=0;                 // index of detent we're snapping to
  let ang=0;                    // current angular position (radians)
  let vel=0;                    // angular velocity
  const K=0.020, DAMP=0.86;     // spring stiffness, damping -> overshoot+settle
  let value=0, shownValue=0;    // readout (counts up smoothly)
  const flash=new Array(STEPS).fill(0); // per-notch tick-mark flash
  let auto=0, dwell=0, dir=1;

  function setTarget(i){
    target=i;
    value=((i%STEPS)+STEPS)%STEPS;
    flash[value]=1;
  }
  cv.addEventListener('pointerdown',e=>{ // click nudges to nearest direction
    const x=e.offsetX-cx, y=e.offsetY-cy;
    setTarget(target + (x>=0?1:-1));
    auto=0; dwell=0;
  });

  function frame(){
    // autopilot: drift through detents, pausing in each pocket
    if(!reduce){
      auto++;
      if(auto>dwell){
        if(Math.random()<0.18) dir*=-1;
        setTarget(target+dir);
        dwell=auto+38+Math.random()*34;
      }
    }
    const tAng=target*STEP;
    const f=(tAng-ang)*K;                 // Hooke: F = -k x
    vel=(vel+f)*DAMP;
    ang+=reduce?(tAng-ang):vel;           // reduce -> snap, no loop motion
    shownValue+=(value-shownValue)*0.22;

    ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
    ctx.save();ctx.translate(cx,cy);

    // ---- detent ring: ticks + flashing pockets ----
    for(let i=0;i<STEPS;i++){
      const a=i*STEP-Math.PI/2;
      const fl=flash[i]; flash[i]*=0.90;
      const r0=R*1.18, r1=R*(fl>0.02?1.40:1.30);
      ctx.strokeStyle=fl>0.02?ACC:'rgba(255,255,255,0.16)';
      ctx.globalAlpha=fl>0.02?(0.45+fl*0.55):0.6;
      ctx.lineWidth=fl>0.02?(2+fl*2):1.4;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*r0,Math.sin(a)*r0);
      ctx.lineTo(Math.cos(a)*r1,Math.sin(a)*r1);
      ctx.stroke();
      if(fl>0.04){ // flash bloom dot at the notch
        ctx.fillStyle=ACC;ctx.globalAlpha=fl*0.8;
        ctx.beginPath();ctx.arc(Math.cos(a)*r1,Math.sin(a)*r1,2.2+fl*4,0,TAU);ctx.fill();
      }
    }
    ctx.globalAlpha=1;

    // ---- knob body: layered rings, brushed feel ----
    const g=ctx.createRadialGradient(-R*0.4,-R*0.4,R*0.1,0,0,R);
    g.addColorStop(0,'#34373f');g.addColorStop(0.7,'#26282e');g.addColorStop(1,'#16171b');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,R,0,TAU);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(0,0,R*0.99,0,TAU);ctx.stroke();
    ctx.strokeStyle='rgba(0,0,0,0.55)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,0,R*0.78,0,TAU);ctx.stroke();
    // knurled grip dashes around the rim
    ctx.save();ctx.rotate(ang);
    for(let i=0;i<48;i++){
      ctx.rotate(TAU/48);
      ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(0,-R*0.97);ctx.lineTo(0,-R*0.85);ctx.stroke();
    }
    ctx.restore();

    // ---- pointer (rotates with spring) ----
    ctx.save();ctx.rotate(ang);
    const grad=ctx.createLinearGradient(0,-R*0.7,0,0);
    grad.addColorStop(0,ACC);grad.addColorStop(1,'rgba(255,92,58,0.25)');
    ctx.strokeStyle=grad;ctx.lineCap='round';ctx.lineWidth=R*0.055;
    ctx.beginPath();ctx.moveTo(0,-R*0.16);ctx.lineTo(0,-R*0.70);ctx.stroke();
    ctx.fillStyle=ACC;ctx.shadowColor=ACC;ctx.shadowBlur=R*0.18;
    ctx.beginPath();ctx.arc(0,-R*0.70,R*0.05,0,TAU);ctx.fill();
    ctx.shadowBlur=0;
    ctx.restore();

    // ---- center hub + value readout ----
    ctx.fillStyle='#1f2127';ctx.beginPath();ctx.arc(0,0,R*0.40,0,TAU);ctx.fill();
    ctx.strokeStyle='rgba(255,92,58,0.35)';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.arc(0,0,R*0.40,0,TAU);ctx.stroke();
    ctx.fillStyle=ACC;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='700 '+(R*0.34).toFixed(0)+'px ui-monospace,monospace';
    ctx.fillText(String(Math.round(shownValue)).padStart(2,'0'),0,-R*0.02);
    ctx.fillStyle='rgba(255,255,255,0.32)';
    ctx.font='600 '+(R*0.085).toFixed(0)+'px ui-monospace,monospace';
    ctx.fillText('DETENT',0,R*0.21);

    ctx.restore();
    if(!reduce)raf=requestAnimationFrame(frame);
  }
  let raf=0;
  function start(){if(!raf&&!reduce)raf=requestAnimationFrame(frame);}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>{document.hidden?stop():start();});
  if(reduce){setTarget(4);ang=target*STEP;shownValue=value;frame();}else{start();}
})();
</script>
</body>
</html>
