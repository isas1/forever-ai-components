<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Cream watch-style engraved drum dial with a milled crown that ratchets through numbered teeth and a smooth value readout.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crown Dial</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#f4ede0;}
  #cd-c{display:block;width:100%;height:100%;cursor:ew-resize;}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1.2 ui-monospace,SFMono-Regular,Menlo,monospace;
       letter-spacing:.14em;color:#1a1a2e;opacity:.34;text-transform:uppercase;
       pointer-events:none;user-select:none;}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/inputs-switches/13-crown-dial.html",
 "title": "Crown Dial",
 "description": "Cream drum dial with engraved tick bars scrolling as it rotates; a milled crown wheel ratchets on drag or click. Numeric readout below.",
 "useWhen": "Precision numeric inputs with a tactile, mechanical aesthetic. Retro instrument panels, settings UIs, watch-themed interfaces.",
 "avoidWhen": "Touch-only mobile where drag conflicts with scroll. Fast data-entry forms where keyboard input is expected.",
 "agentPrompt": "Change TEETH from 24 to 12 to halve ratchet steps, set ACC to '#8B0000' for burgundy engraving, and slow auto-ratchet interval to 300 frames.",
 "editableAreas": [
  "tooth count (TEETH=24)",
  "spring friction (0.22 lerp factor)",
  "accent color (ACC='#1a1a2e')",
  "drum size (R*0.30)",
  "auto-ratchet interval (140+random*120)",
  "crown knurling count (KN=18)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard and static fallback",
  "visibilitychange stop/start",
  "DPR-aware canvas sizing"
 ],
 "knownLimitations": [
  "Pointer drag threshold (14px) may fire multiple ratchets per swipe on high-DPI trackpads",
  "Auto-ratchet changes direction randomly — remove auto block for production use",
  "Background color hardcoded in CSS (#f4ede0) — must edit to change theme"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "dial",
  "watch",
  "knob",
  "canvas",
  "ratchet",
  "mechanical",
  "pointer"
 ]
}
</script>
</head>
<body>
<canvas id="cd-c"></canvas>
<div class="cap">Crown Dial</div>
<script>
(function(){
  const cv=document.getElementById('cd-c'),ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const ACC='#1a1a2e',BG='#f4ede0';
  let W,H,DPR,cx,cy,R;
  function size(){
    DPR=Math.min(devicePixelRatio||1,2);
    W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
    cx=W/2;cy=H*0.46;R=Math.min(W,H)*0.30;
  }
  addEventListener('resize',size);size();

  const TEETH=24, STEP=Math.PI*2/TEETH;
  let drum=0;          // current drum angle (engraved cylinder)
  let target=0;        // ratchet target
  let val=0;           // value wheel index
  let t=0, tick=0;     // tick = parallax shadow energy (0..1)
  let breath=0;
  let auto=0;          // frames until next auto-tick

  function ratchet(dir){
    val+=dir; target+=dir*STEP; tick=1;
  }
  cv.addEventListener('click',e=>{ratchet(e.clientX<W/2?-1:1);});
  let lastX=null;
  cv.addEventListener('pointermove',e=>{
    if(lastX!==null && Math.abs(e.clientX-lastX)>14){ratchet(e.clientX>lastX?1:-1);lastX=e.clientX;}
    if(lastX===null)lastX=e.clientX;
  });
  cv.addEventListener('pointerleave',()=>lastX=null);

  function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

  function frame(){
    t++;
    // idle balance-wheel breathing + occasional auto-ratchet
    breath=Math.sin(t*0.018)*0.020;
    if(!reduce){
      if(--auto<=0){ratchet(Math.random()<0.5?-1:1);auto=140+Math.floor(Math.random()*120);}
    }
    // spring drum toward target
    drum+=(target-drum)*0.22;
    tick*=0.90;

    ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
    const ang=drum+breath;

    // ---- engraved drum (the cylinder seen edge-on, ticks as vertical bars) ----
    const drumW=R*2.05, drumH=R*0.62, dx=cx-drumW/2, dy=cy-drumH/2;
    // bezel shadow
    ctx.save();
    roundRect(dx-7,dy-7,drumW+14,drumH+14,drumH*0.30);
    ctx.fillStyle='rgba(26,26,46,0.10)';ctx.fill();
    // drum body
    const dg=ctx.createLinearGradient(0,dy,0,dy+drumH);
    dg.addColorStop(0,'#e7ddca');dg.addColorStop(0.5,'#f6efe3');dg.addColorStop(1,'#d8ccb4');
    roundRect(dx,dy,drumW,drumH,drumH*0.24);ctx.fillStyle=dg;ctx.fill();
    ctx.lineWidth=1.4;ctx.strokeStyle='rgba(26,26,46,0.55)';ctx.stroke();
    // clip engraving to drum face
    ctx.clip();
    // engraved tick bars scrolling with drum rotation (cylinder projection)
    const span=Math.PI; // visible half
    for(let i=-TEETH;i<=TEETH;i++){
      let a=i*STEP - ang;
      let s=Math.sin(a); if(Math.cos(a)<-0.02)continue; // front face only
      const px=cx + s*(drumW/2)*1.02;
      const depth=Math.cos(a);            // 1 center, ->0 edge
      const major=((((val%6)+6)%6)===((((i%6)+6)%6))); // every 6th = numeral mark
      const bw=(major?2.6:1.4)*depth;
      const bh=drumH*(major?0.62:0.40)*Math.max(depth,0.25);
      // parallax shadow on tick: brief offset right after a tick
      const par=tick*8*depth;
      ctx.globalAlpha=0.18+0.30*depth;
      ctx.fillStyle=ACC;
      ctx.fillRect(px-bw/2+par*0.4, cy-bh/2, bw, bh);
      ctx.globalAlpha=(0.55+0.40*depth);
      ctx.fillStyle=major?ACC:'rgba(26,26,46,0.78)';
      ctx.fillRect(px-bw/2, cy-bh/2, bw, bh);
    }
    ctx.globalAlpha=1;ctx.restore();
    // glass curvature sheen
    const sh=ctx.createLinearGradient(0,dy,0,dy+drumH);
    sh.addColorStop(0,'rgba(255,255,255,0.55)');sh.addColorStop(0.18,'rgba(255,255,255,0)');
    sh.addColorStop(0.82,'rgba(255,255,255,0)');sh.addColorStop(1,'rgba(26,26,46,0.10)');
    roundRect(dx,dy,drumW,drumH,drumH*0.24);ctx.fillStyle=sh;ctx.fill();
    // center index hairline
    ctx.fillStyle=ACC;ctx.fillRect(cx-0.8,dy-9,1.6,drumH+18);
    ctx.beginPath();ctx.moveTo(cx-6,dy-9);ctx.lineTo(cx+6,dy-9);ctx.lineTo(cx,dy-2);ctx.closePath();ctx.fill();

    // ---- value readout (the tooth the wheel rests on) ----
    const num=((val%TEETH)+TEETH)%TEETH;
    ctx.fillStyle=ACC;ctx.globalAlpha=0.92;
    ctx.font='700 '+Math.round(R*0.30)+'px ui-monospace,Menlo,monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(String(num).padStart(2,'0'), cx, dy+drumH+R*0.40);
    ctx.globalAlpha=1;

    // ---- the crown: ratcheting milled wheel on the right edge ----
    const crX=dx+drumW+R*0.30, crR=drumH*0.46;
    // stem
    ctx.fillStyle='#cbbda3';
    ctx.fillRect(dx+drumW-2, cy-crR*0.22, crX-(dx+drumW)+1, crR*0.44);
    ctx.save();ctx.translate(crX,cy);ctx.rotate(drum*1.0);
    const cg=ctx.createRadialGradient(-crR*0.3,-crR*0.3,crR*0.2,0,0,crR);
    cg.addColorStop(0,'#f3ecdf');cg.addColorStop(1,'#c8ba9f');
    ctx.beginPath();ctx.arc(0,0,crR,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();
    // milled knurling teeth
    const KN=18;
    for(let i=0;i<KN;i++){
      const a=i/KN*Math.PI*2;
      ctx.strokeStyle=i%2?'rgba(26,26,46,0.30)':'rgba(255,255,255,0.6)';
      ctx.lineWidth=2.2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*crR*0.78,Math.sin(a)*crR*0.78);
      ctx.lineTo(Math.cos(a)*crR,Math.sin(a)*crR);
      ctx.stroke();
    }
    ctx.beginPath();ctx.arc(0,0,crR*0.40,0,Math.PI*2);
    ctx.fillStyle='#e7ddca';ctx.fill();ctx.lineWidth=1;
    ctx.lineWidth=1;ctx.strokeStyle='rgba(26,26,46,0.5)';ctx.stroke();
    ctx.restore();
    ctx.lineWidth=1.4;ctx.strokeStyle='rgba(26,26,46,0.55)';
    ctx.beginPath();ctx.arc(crX,cy,crR,0,Math.PI*2);ctx.stroke();

    if(!reduce)raf=requestAnimationFrame(frame);
  }
  let raf=0;
  function start(){if(!raf)raf=requestAnimationFrame(frame);}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>{document.hidden?stop():start();});
  if(reduce){frame();}else start();
})();
</script>
</body>
</html>
