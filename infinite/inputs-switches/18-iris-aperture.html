<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Eight-bladed camera iris in dark metal and amber that opens and closes through f-stops with detent pauses and a glowing light core.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Iris Aperture</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0c0c0e;}
  #ia-c{display:block;width:100%;height:100%;cursor:pointer;}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1.2 ui-monospace,Menlo,Consolas,monospace;
       letter-spacing:.16em;color:#e8b339;opacity:.34;text-transform:uppercase;
       pointer-events:none;user-select:none;}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/inputs-switches/18-iris-aperture.html",
 "title": "Iris Aperture",
 "description": "Eight-bladed camera iris opens and closes through six f-stops with detent pauses, metallic blade sheen, and a warm amber glow through the aperture opening.",
 "useWhen": "Photography or optics themed UIs, creative portfolio heroes, settings controls needing a tactile mechanical metaphor.",
 "avoidWhen": "Contexts requiring fast user input — the detent pause cycle is automatic and slow. Not suitable for functional aperture controls without significant rework.",
 "agentPrompt": "Change blade count to 6 (set BLADES=6), shift accent color to cyan (#00e5ff), and increase opening range by changing the 0.70 multiplier in bladePath to 0.85 for a wider maximum aperture.",
 "editableAreas": [
  "blade count (BLADES=8)",
  "accent/glow color (ACC='#e8b339')",
  "f-stop positions (STOPS array)",
  "aperture open range (0.085+open*0.70)",
  "transition speed (phase+=0.018)",
  "detent hold duration (hold=46)"
 ],
 "preserveElements": [
  "DPR-aware canvas sizing",
  "visibilitychange pause/resume",
  "prefers-reduced-motion static fallback with mid-open state",
  "canvas clip before bladePath to contain blades in housing ring"
 ],
 "knownLimitations": [
  "Background color hardcoded in BG constant — must change both CSS and JS",
  "Click handler only hastens current detent; cannot jump to arbitrary stop",
  "No aria labels — purely visual, not screen-reader accessible"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "aperture",
  "camera",
  "iris",
  "blades",
  "mechanical",
  "canvas",
  "f-stop"
 ]
}
</script>
</head>
<body>
<canvas id="ia-c"></canvas>
<div class="cap">Iris Aperture</div>
<script>
(function(){
  const cv=document.getElementById('ia-c'),ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const ACC='#e8b339', BG='#0c0c0e', BLADES=8;
  // f-stops mapped to aperture radius fraction (0=closed,1=open)
  const STOPS=[0.10,0.20,0.33,0.48,0.66,0.86], FLAB=['f/16','f/11','f/8','f/5.6','f/4','f/2.8'];
  let W,H,DPR,cx,cy,R;
  function size(){
    DPR=Math.min(devicePixelRatio||1,2);
    W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
    cx=W/2;cy=H/2;R=Math.min(W,H)*0.36;
  }
  addEventListener('resize',size);size();

  let t=0, idx=0, hold=0, cur=STOPS[0], from=STOPS[0], to=STOPS[0], dir=1;
  // eased aperture value with detent pause at each stop
  function ease(x){return x<.5?4*x*x*x:1-Math.pow(-2*x+2,3)/2;}
  function advance(){
    from=to; idx+=dir;
    if(idx>=STOPS.length-1){idx=STOPS.length-1;dir=-1;}
    else if(idx<=0){idx=0;dir=1;}
    to=STOPS[idx];
  }
  let phase=0; // 0..1 transition between stops
  function step(){
    if(hold>0){hold--; if(hold===0){advance();phase=0;} return;}
    phase+=0.018;
    if(phase>=1){phase=1;cur=to;hold=46;} // mechanical detent pause
    else cur=from+(to-from)*ease(phase);
  }

  // The aperture opening is a regular BLADES-gon. Each blade is the leaf whose
  // straight inner edge is one side of that polygon; the leaf wraps from its own
  // pivot on the housing ring, hugs the polygon side, and overlaps its neighbour.
  function bladePath(open){
    const ar=R*(0.085+open*0.70);          // circumradius of the opening polygon
    const ring=R*1.07;                      // housing pivot ring
    const seg=Math.PI*2/BLADES;
    const spin=t*0.00045;                   // slow lockstep rotation
    // vertices of the opening polygon
    const V=[];
    for(let i=0;i<BLADES;i++){
      const va=i*seg+spin;
      V.push([cx+Math.cos(va)*ar, cy+Math.sin(va)*ar]);
    }
    for(let i=0;i<BLADES;i++){
      const v0=V[i], v1=V[(i+1)%BLADES];     // this blade's inner straight edge
      // Each leaf is a broad wedge that laps well over its neighbours so the
      // housing is fully covered. It runs from the trailing vertex out to the
      // ring, sweeps a wide arc of the ring, and returns to the leading vertex.
      const a0=(i-1.2)*seg+spin;             // trailing edge on the ring
      const a1=(i+2.2)*seg+spin;             // leading edge on the ring (wide overlap)
      ctx.beginPath();
      ctx.moveTo(v1[0],v1[1]);               // leading inner vertex
      ctx.lineTo(v0[0],v0[1]);               // along the opening edge to trailing vertex
      ctx.lineTo(cx+Math.cos(a0)*ring, cy+Math.sin(a0)*ring);
      // arc along the housing ring (approximated with a few segments)
      for(let k=1;k<=5;k++){
        const aa=a0+(a1-a0)*(k/5);
        ctx.lineTo(cx+Math.cos(aa)*ring, cy+Math.sin(aa)*ring);
      }
      ctx.closePath();
      const ox=cx+Math.cos(a1)*ring, oy=cy+Math.sin(a1)*ring;
      // metallic glint sweeps the leaves in lockstep
      const gp=((t*0.0011)%1 + i/BLADES)%1;
      const sh=0.5+0.5*Math.cos(gp*Math.PI*2);
      const base=15+sh*20;
      const g=ctx.createLinearGradient(v0[0],v0[1],ox,oy);
      g.addColorStop(0,'rgb('+(base+sh*60)+','+(base+sh*46)+','+(base+sh*20)+')');
      g.addColorStop(0.45,'rgb('+(base+8)+','+(base+8)+','+(base+11)+')');
      g.addColorStop(1,'rgb('+(base-2)+','+(base-2)+','+(base+2)+')');
      ctx.fillStyle=g;ctx.fill();
      // bright bevel along the inner edge that faces the light
      ctx.strokeStyle='rgba(232,179,57,'+(0.14+sh*0.42)+')';
      ctx.lineWidth=Math.max(1,R*0.012);
      ctx.beginPath();ctx.moveTo(v0[0],v0[1]);ctx.lineTo(v1[0],v1[1]);ctx.stroke();
    }
    return ar;
  }

  function draw(){
    ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
    // dark well behind aperture
    const wg=ctx.createRadialGradient(cx,cy,2,cx,cy,R*1.3);
    wg.addColorStop(0,'#050506');wg.addColorStop(1,BG);
    ctx.fillStyle=wg;ctx.beginPath();ctx.arc(cx,cy,R*1.25,0,Math.PI*2);ctx.fill();
    // glow of light coming through aperture
    const ar=R*(0.085+cur*0.70);
    const lg=ctx.createRadialGradient(cx,cy,1,cx,cy,ar*1.5);
    lg.addColorStop(0,'rgba(255,240,205,0.95)');
    lg.addColorStop(0.5,'rgba(232,179,57,0.34)');
    lg.addColorStop(1,'rgba(232,179,57,0)');
    ctx.fillStyle=lg;ctx.beginPath();ctx.arc(cx,cy,ar*1.5,0,Math.PI*2);ctx.fill();
    // clip outer barrel so blades stay in the housing ring
    ctx.save();
    ctx.beginPath();ctx.arc(cx,cy,R*1.06,0,Math.PI*2);ctx.clip();
    bladePath(cur);
    ctx.restore();
    // outer housing ring with notches
    ctx.lineWidth=Math.max(2,R*0.05);
    ctx.strokeStyle='#1c1c20';
    ctx.beginPath();ctx.arc(cx,cy,R*1.08,0,Math.PI*2);ctx.stroke();
    ctx.lineWidth=1;ctx.strokeStyle='rgba(232,179,57,0.22)';
    ctx.beginPath();ctx.arc(cx,cy,R*1.04,0,Math.PI*2);ctx.stroke();
    // f-stop readout, engraved on the housing ring at the bottom
    const fs=Math.max(11,R*0.13);
    ctx.font='600 '+fs+'px ui-monospace,Menlo,monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    const ly=cy+R*1.06;
    // small dark plate behind the engraving
    ctx.fillStyle=BG;ctx.fillRect(cx-fs*1.6,ly-fs*0.8,fs*3.2,fs*1.6);
    ctx.fillStyle=hold>0?ACC:'rgba(232,179,57,0.5)';
    ctx.fillText(FLAB[idx],cx,ly);
    // detent tick marks around the ring, one per stop
    for(let s=0;s<STOPS.length;s++){
      const ta=-Math.PI/2 + (s/(STOPS.length-1))*Math.PI*0.9 - Math.PI*0.45;
      const r1=R*1.12, r2=R*1.16;
      ctx.strokeStyle = s===idx?ACC:'rgba(232,179,57,0.25)';
      ctx.lineWidth = s===idx?2:1;
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(ta)*r1, cy+Math.sin(ta)*r1);
      ctx.lineTo(cx+Math.cos(ta)*r2, cy+Math.sin(ta)*r2);
      ctx.stroke();
    }
  }

  let raf=0;
  function frame(){t+=16; if(!reduce)step(); draw(); raf=requestAnimationFrame(frame);}
  function start(){if(!raf&&!reduce)raf=requestAnimationFrame(frame);}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>{document.hidden?stop():start();});
  cv.addEventListener('click',()=>{if(reduce||hold===0)return;hold=1;}); // nudge to next stop
  cv.addEventListener('pointermove',()=>{if(!reduce&&hold>8)hold=8;});    // hasten the detent
  if(reduce){cur=STOPS[3];idx=3;draw();}else start();
})();
</script>
</body>
</html>
