<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Several Circles — Wassily Kandinsky. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Several Circles</title>
<style>
  html,body{margin:0;height:100%;background:#17151a;overflow:hidden}
  #kan01-stage{position:fixed;inset:0;width:100%;height:100%}
  .kan01-sky{position:absolute;inset:0;}
  .kan01-orb{position:absolute;border-radius:50%;will-change:transform;}
  .kan01-halo{position:absolute;border-radius:50%;border:2px solid #16130f;opacity:.5;}
  @keyframes kan01-drift{
    0%{transform:translate(0,0) scale(1);}
    50%{transform:translate(var(--dx),var(--dy)) scale(var(--sc));}
    100%{transform:translate(0,0) scale(1);}
  }
  @keyframes kan01-pulse{0%,100%{transform:scale(1);opacity:.5;}50%{transform:scale(1.35);opacity:.12;}}
  @keyframes kan01-sway{0%,100%{transform:rotate(-18deg) scaleX(1);}50%{transform:rotate(-15deg) scaleX(1.03);}}
  .kan01-line{position:absolute;left:6%;top:80%;width:88%;height:3px;background:#f4efe2;transform:rotate(-18deg);transform-origin:left center;opacity:.85;animation:kan01-sway 11s ease-in-out infinite;}
  @media(prefers-reduced-motion:reduce){.kan01-line{animation:none;}}
  .kan01-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#f4efe2;opacity:.46;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
</head>
<body>
<div id="kan01-stage" role="img" aria-label="After Kandinsky's Several Circles: cobalt, cadmium and vermilion discs drift and pulse on their own slow breath against a charcoal ground, a single pale line crossing below.">
  <div class="kan01-sky" id="kan01-sky"></div>
</div>
<div class="kan01-cap">Several Circles</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const PAL={paper:'#f4efe2',ink:'#16130f',blue:'#1438a8',blueDeep:'#0c2470',yellow:'#f7c80b',red:'#d8321b',green:'#1f7a4d',violet:'#5a2d82'};
  const sky=document.getElementById('kan01-sky'); if(!sky) return;
  const cols=[PAL.blue,PAL.yellow,PAL.red,PAL.violet,PAL.green,PAL.blueDeep];
  const N=13;
  for(let i=0;i<N;i++){
    const o=document.createElement('div');
    o.className='kan01-orb';
    const d=22+Math.random()*120;
    const x=Math.random()*82+4, y=Math.random()*72+6;
    const c=cols[i%cols.length];
    o.style.width=o.style.height=d+'px';
    o.style.left=x+'%'; o.style.top=y+'%';
    o.style.background=c;
    o.style.opacity=(0.55+Math.random()*0.4).toFixed(2);
    o.style.mixBlendMode=i%3?'screen':'lighten';
    if(!REDUCED){
      o.style.setProperty('--dx',(Math.random()*60-30).toFixed(0)+'px');
      o.style.setProperty('--dy',(Math.random()*60-30).toFixed(0)+'px');
      o.style.setProperty('--sc',(0.8+Math.random()*0.5).toFixed(2));
      o.style.animation=`kan01-drift ${(9+Math.random()*9).toFixed(1)}s ease-in-out ${(-Math.random()*8).toFixed(1)}s infinite`;
    }
    sky.appendChild(o);
    if(Math.random()<0.5){
      const h=document.createElement('div');
      h.className='kan01-halo';
      const hd=d*(1.4+Math.random());
      h.style.width=h.style.height=hd+'px';
      h.style.left=`calc(${x}% + ${d/2}px - ${hd/2}px)`;
      h.style.top=`calc(${y}% + ${d/2}px - ${hd/2}px)`;
      h.style.borderColor=i%2?PAL.paper:PAL.yellow;
      if(!REDUCED) h.style.animation=`kan01-pulse ${(5+Math.random()*5).toFixed(1)}s ease-in-out ${(-Math.random()*4).toFixed(1)}s infinite`;
      sky.appendChild(h);
    }
  }
  const line=document.createElement('div');
  line.className='kan01-line';
  sky.appendChild(line);
})();
</script>
</body>
</html>
