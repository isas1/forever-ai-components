<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Singing Composition — Wassily Kandinsky. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Singing Composition</title>
<style>
  html,body{margin:0;height:100%;background:#f4efe2;overflow:hidden}
  #kan02-stage{position:fixed;inset:0;width:100%;height:100%}
  #kan02-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .kan02-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#16130f;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/kandinsky/02-singing-composition.html",
 "title": "Singing Composition",
 "description": "Triangles, arcs, circles and lines in Bauhaus primaries spawn, breathe and dissolve on warm paper in an endless generative composition inspired by Kandinsky.",
 "useWhen": "Art/gallery hero backgrounds, creative portfolio ambient backdrops, cultural institution pages with a Bauhaus or abstract-art theme.",
 "avoidWhen": "Content-heavy layouts needing legible overlays; low-end devices running many concurrent animations; contexts where muted/neutral backgrounds are required.",
 "agentPrompt": "Change the spawn interval to 400ms (ms=400), add PAL.orange:'#f4620a' to the palette cols array, and increase the max element cap from 22 to 30.",
 "editableAreas": [
  "spawn interval (ms=620)",
  "max element cap (elems.length>22)",
  "palette cols array",
  "element lifetime range (2600+Math.random()*3400)",
  "size range (sz: 18+Math.random()*70)",
  "blue wash overlay opacity (globalAlpha=0.05)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (REDUCED)",
  "visibilitychange pause/resume",
  "DPR-aware fitCanvas()"
 ],
 "knownLimitations": [
  "Background color hardcoded in both CSS and PAL.paper — must change both to retheme",
  "No click or pointer interactivity; purely generative",
  "Reduced-motion mode renders a single static frame only — no animation at all"
 ],
 "tier": "curated",
 "labels": [
  "accessible",
  "copy-paste-safe",
  "minimal-deps",
  "mobile-ready"
 ],
 "tags": [
  "kandinsky",
  "generative",
  "bauhaus",
  "geometric",
  "canvas",
  "ambient",
  "art"
 ]
}
</script>
</head>
<body>
<div id="kan02-stage" role="img" aria-label="A self-painting Kandinsky composition: free-floating triangles, arcs, circles and radiating lines in Bauhaus primaries arrive, hold and dissolve on warm paper, never repeating.">
  <canvas id="kan02-cv"></canvas>
</div>
<div class="kan02-cap">Singing Composition</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const PAL={paper:'#f4efe2',ink:'#16130f',blue:'#1438a8',yellow:'#f7c80b',red:'#d8321b',green:'#1f7a4d',violet:'#5a2d82'};
  const cv=document.getElementById('kan02-cv'); if(!cv) return;
  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width), h=Math.max(2,r.height);
    c.width=Math.round(w*dpr); c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }
  let S=fitCanvas(cv);
  const cols=[PAL.blue,PAL.yellow,PAL.red,PAL.green,PAL.violet,PAL.ink];
  let elems=[];
  function spawn(){
    const t=Math.random();
    const e={born:performance.now(), life:2600+Math.random()*3400,
      x:Math.random()*S.w, y:Math.random()*S.h,
      c:cols[(Math.random()*cols.length)|0], rot:Math.random()*Math.PI*2,
      sz:18+Math.random()*70, kind: t<.3?'tri': t<.55?'arc': t<.78?'circ':'line',
      spin:(Math.random()-.5)*0.4};
    elems.push(e);
    if(elems.length>22) elems.shift();
  }
  let acc=0, last=performance.now();
  function draw(now){
    const dt=now-last; last=now; acc+=dt;
    const ms=REDUCED?1400:620;
    if(!REDUCED && acc>ms){acc=0; spawn();}
    S.ctx.clearRect(0,0,S.w,S.h);
    S.ctx.save();S.ctx.globalAlpha=0.05;S.ctx.fillStyle=PAL.blue;S.ctx.fillRect(0,0,S.w,S.h*0.5);S.ctx.restore();
    for(const e of elems){
      const age=(now-e.born)/e.life;
      if(age>1){e.dead=true;continue;}
      const fade=age<0.12?age/0.12: age>0.8?(1-age)/0.2:1;
      const a=Math.max(0,Math.min(1,fade));
      if(!REDUCED) e.rot+=e.spin*0.016;
      S.ctx.save();
      S.ctx.translate(e.x,e.y); S.ctx.rotate(e.rot);
      S.ctx.globalAlpha=a;
      S.ctx.fillStyle=e.c; S.ctx.strokeStyle=PAL.ink; S.ctx.lineWidth=2;
      const z=e.sz*(0.7+0.3*Math.sin(age*Math.PI));
      if(e.kind==='tri'){
        S.ctx.beginPath();S.ctx.moveTo(0,-z);S.ctx.lineTo(z*.9,z*.7);S.ctx.lineTo(-z*.9,z*.7);S.ctx.closePath();S.ctx.fill();S.ctx.stroke();
      }else if(e.kind==='circ'){
        S.ctx.beginPath();S.ctx.arc(0,0,z,0,7);S.ctx.fill();S.ctx.stroke();
      }else if(e.kind==='arc'){
        S.ctx.lineWidth=4+z*0.08;S.ctx.strokeStyle=e.c;
        S.ctx.beginPath();S.ctx.arc(0,0,z,0.3,3.6);S.ctx.stroke();
      }else{
        S.ctx.lineWidth=2.5;S.ctx.strokeStyle=e.c;
        S.ctx.beginPath();S.ctx.moveTo(-z,0);S.ctx.lineTo(z,0);S.ctx.stroke();
        S.ctx.fillStyle=e.c;S.ctx.beginPath();S.ctx.arc(z,0,4,0,7);S.ctx.fill();
      }
      S.ctx.restore();
    }
    elems=elems.filter(e=>!e.dead);
  }
  for(let i=0;i<7;i++) spawn();

  let raf=0, running=false;
  function loop(){ if(!running) return; draw(performance.now()); raf=requestAnimationFrame(loop); }
  function start(){ if(running) return; running=true; last=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }

  let _rt;
  window.addEventListener('resize',()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ S=fitCanvas(cv); if(REDUCED) draw(performance.now()); },150); }, {passive:true});
  document.addEventListener('visibilitychange',()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });

  if(REDUCED){ draw(performance.now()); }
  else start();
})();
</script>
</body>
</html>
