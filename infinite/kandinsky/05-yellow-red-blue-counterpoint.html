<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Yellow-Red-Blue Counterpoint — Abstract Geometric Improvisations. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yellow-Red-Blue Counterpoint</title>
<style>
  html,body{margin:0;height:100%;background:#f4efe2;overflow:hidden}
  #kan05-stage{position:fixed;inset:0;width:100%;height:100%}
  .kan05-eq{position:absolute;inset:0;display:flex;align-items:flex-end;gap:0;}
  .kan05-col{flex:1;display:flex;flex-direction:column;justify-content:flex-end;}
  .kan05-bar{width:100%;transition:height .12s linear;}
  .kan05-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#16130f;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/kandinsky/05-yellow-red-blue-counterpoint.html",
 "title": "Yellow-Red-Blue Counterpoint",
 "description": "24 bars in yellow, red, and cobalt rise and fall in sine-wave counterpoint on warm paper, echoing abstract's three-voice color theory.",
 "useWhen": "Ambient backgrounds or art-themed hero sections where abstract or abstract expressionism is the visual language.",
 "avoidWhen": "Contexts requiring text legibility over the animation, or layouts where full-viewport fixed positioning conflicts with page scroll.",
 "agentPrompt": "Change column count from N=24 to N=36, slow all voice frequencies by half (1.1→0.55, 1.7→0.85, 0.7→0.35), and set PAL.red to '#e8600f'.",
 "editableAreas": [
  "column count (N=24)",
  "palette colors (PAL.yellow/red/blue)",
  "voice frequencies (1.1, 1.7, 0.7)",
  "bar height range (12+v*84)",
  "transition speed (.12s linear)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard with static fallback",
  "visibilitychange pause/resume"
 ],
 "knownLimitations": [
  "Background color hardcoded in CSS (#f4efe2) — must edit to change from warm paper",
  "No hover or click interaction — purely autonomous"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "equalizer",
  "bars",
  "color-palette",
  "generative",
  "ambient",
  "abstract"
 ]
}
</script>
</head>
<body>
<div id="kan05-stage" role="img" aria-label="Three voices in counterpoint in yellow, red and blue: cadmium, vermilion and cobalt bars rise and fall in separate phrases across the width of warm paper.">
  <div class="kan05-eq" id="kan05-eq"></div>
</div>
<div class="kan05-cap">Yellow-Red-Blue Counterpoint</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const PAL={ink:'#16130f',blue:'#1438a8',yellow:'#f7c80b',red:'#d8321b'};
  const wrap=document.getElementById('kan05-eq'); if(!wrap) return;
  const N=24;
  const cols=[];
  for(let i=0;i<N;i++){
    const col=document.createElement('div');col.className='kan05-col';
    const bar=document.createElement('div');bar.className='kan05-bar';
    const voice=i%3;
    bar.style.background=voice===0?PAL.yellow:voice===1?PAL.red:PAL.blue;
    bar.style.borderTop='2px solid '+PAL.ink;
    col.appendChild(bar);wrap.appendChild(col);
    cols.push({bar,voice,ph:i*0.5});
  }
  let last=performance.now(),t=0;
  function step(){
    if(!running) return;
    const now=performance.now();const dt=(now-last)/1000;last=now;
    t+=dt;
    for(const c of cols){
      const f=c.voice===0?1.1:c.voice===1?1.7:0.7;
      const v=(Math.sin(t*f+c.ph)*0.5+0.5);
      c.bar.style.height=(12+v*84).toFixed(1)+'%';
    }
    raf=requestAnimationFrame(step);
  }
  let raf=0, running=false;
  function start(){ if(running) return; running=true; last=performance.now(); raf=requestAnimationFrame(step); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
  document.addEventListener('visibilitychange',()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });

  if(REDUCED){ cols.forEach(c=>{ const v=Math.sin(c.ph)*0.5+0.5; c.bar.style.height=(12+v*84).toFixed(1)+'%'; }); }
  else start();
})();
</script>
</body>
</html>
