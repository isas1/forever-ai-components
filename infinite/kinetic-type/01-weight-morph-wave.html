<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="The word MORPH on deep navy, each letter pulsing font-weight and vertical squash in a sine wave with cyan-to-blue hue shifts.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Weight Morph Wave</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0d1b2a;}
  body{display:flex;align-items:center;justify-content:center;font-family:"Helvetica Neue",Arial,sans-serif;}
  #word{display:flex;line-height:.9;letter-spacing:-.02em;}
  #word span{
    display:inline-block;
    color:#e0fbfc;
    font-size:clamp(38px,18vw,140px);
    font-weight:700;
    transform-origin:center bottom;
    transition:none;
    text-shadow:0 0 24px rgba(120,200,255,.25);
  }
  .cap{position:absolute;left:10px;bottom:8px;font-size:11px;letter-spacing:.08em;
       color:#e0fbfc;opacity:.28;text-transform:uppercase;font-weight:400;}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/kinetic-type/01-weight-morph-wave.html",
 "title": "Weight Morph Wave",
 "description": "Each letter of a word pulses font-weight and vertical scale in a staggered sine wave, shifting hue from cyan to blue.",
 "useWhen": "Hero text needing ambient motion without distraction. Brand name displays.",
 "avoidWhen": "Body copy, strings longer than 8 characters, or viewports under 280px.",
 "agentPrompt": "Change the word to 'HELLO', set accent to #FF6B6B, slow the wave cycle to 4 seconds.",
 "editableAreas": [
  "word content (text variable)",
  "wave speed (t += value)",
  "font weight range (200..900)",
  "accent color"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard",
  "visibilitychange pause"
 ],
 "knownLimitations": [
  "Requires system font with bold weight; no variable-font axis — weight snaps in steps"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible"
 ],
 "tags": [
  "typography",
  "variable-font",
  "loop",
  "sine-wave",
  "text-animation"
 ]
}
</script>
</head>
<body>
  <div id="word"></div>
  <div class="cap">Weight Morph Wave</div>
<script>
(function(){
  var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var text = "MORPH";
  var host = document.getElementById('word');
  var spans = [];
  for(var i=0;i<text.length;i++){
    var s=document.createElement('span');
    s.textContent=text[i];
    host.appendChild(s);
    spans.push(s);
  }
  var t=0, raf=0;
  var lastW=[], lastHue=[];   // skip redundant style writes that cause needless reflow/repaint
  function frame(){
    t+=0.045;
    for(var i=0;i<spans.length;i++){
      var p = Math.sin(t - i*0.6);
      var w = 200 + (p*0.5+0.5)*700;          // 200..900
      var sc = 0.9 + (p*0.5+0.5)*0.35;        // vertical squash/stretch
      var wr = Math.round(w/25)*25;           // quantize weight (variable-font steps) -> fewer reflows
      var hue = Math.round(180 + p*40);
      if(wr!==lastW[i]){ spans[i].style.fontWeight = wr; lastW[i]=wr; }
      spans[i].style.transform = 'scaleY('+sc.toFixed(3)+')';
      if(hue!==lastHue[i]){ spans[i].style.color = 'hsl('+hue+',80%,72%)'; lastHue[i]=hue; }
    }
    raf=requestAnimationFrame(frame);
  }
  function start(){ if(!raf && !reduce) raf=requestAnimationFrame(frame); }
  function stop(){ cancelAnimationFrame(raf); raf=0; }
  document.addEventListener('visibilitychange',function(){document.hidden?stop():start();});
  if(reduce){ for(var i=0;i<spans.length;i++){spans[i].style.fontWeight=600;} }
  else start();
})();
</script>
</body>
</html>
