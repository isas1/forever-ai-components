<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Amber split-flap airport board with six tiles flipping through letters to spell DEPART, ARRIVE, ONTIME, BOARDS on dark charcoal.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Split-Flap Board</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#161616;}
  body{display:flex;align-items:center;justify-content:center;
       font-family:"Helvetica Neue",Arial,sans-serif;}
  #board{display:flex;gap:clamp(3px,1.4vw,8px);}
  .flap{
    position:relative;
    width:clamp(26px,11vw,72px);
    height:clamp(38px,16vw,104px);
    background:#0a0a0a;
    border-radius:5px;
    color:#f4c430;
    font-weight:800;
    font-size:clamp(24px,10vw,68px);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    box-shadow:inset 0 0 0 1px #2a2a2a,0 3px 8px rgba(0,0,0,.5);
  }
  .flap::after{content:"";position:absolute;left:0;right:0;top:50%;height:1px;
    background:rgba(0,0,0,.7);z-index:3;}
  .flap.spin .ch{animation:flip .09s linear;}
  @keyframes flip{0%{transform:rotateX(0);opacity:1}50%{transform:rotateX(-90deg);opacity:.3}51%{transform:rotateX(90deg)}100%{transform:rotateX(0);opacity:1}}
  .cap{position:absolute;left:10px;bottom:8px;font-size:11px;letter-spacing:.08em;
       color:#f4c430;opacity:.3;text-transform:uppercase;font-weight:600;}
</style>
</head>
<body>
  <div id="board"></div>
  <div class="cap">Split-Flap Board</div>
<script>
(function(){
  var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var seq=["DEPART","ARRIVE","ONTIME","BOARDS"];
  var pool=" ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  var board=document.getElementById('board');
  var N=6, flaps=[];
  for(var i=0;i<N;i++){
    var f=document.createElement('div'); f.className='flap';
    var c=document.createElement('span'); c.className='ch'; c.textContent=' ';
    f.appendChild(c); board.appendChild(f);
    flaps.push({el:f,ch:c,cur:' ',goal:' ',ticks:0});
  }
  var wi=0, raf=0, step=0, hold=0;
  function setTarget(){ var w=seq[wi]; for(var i=0;i<N;i++) flaps[i].goal=w[i]||' '; }
  function idx(c){ return pool.indexOf(c); }
  function tick(){
    step++;
    if(hold>0){ hold--; if(hold===0){ wi=(wi+1)%seq.length; setTarget(); } raf=requestAnimationFrame(tick); return; }
    if(step%4!==0){ raf=requestAnimationFrame(tick); return; }
    var moving=false;
    for(var i=0;i<N;i++){
      var f=flaps[i];
      if(f.cur!==f.goal){
        var ci=idx(f.cur), gi=idx(f.goal);
        ci=(ci+1)%pool.length;
        f.cur=pool[ci];
        f.ch.textContent=f.cur===' '?' ':f.cur;
        f.el.classList.remove('spin'); void f.el.offsetWidth; f.el.classList.add('spin');
        moving=true;
      }
    }
    if(!moving) hold=40;
    raf=requestAnimationFrame(tick);
  }
  function start(){ if(!raf&&!reduce) raf=requestAnimationFrame(tick); }
  function stop(){ cancelAnimationFrame(raf); raf=0; }
  document.addEventListener('visibilitychange',function(){document.hidden?stop():start();});
  setTarget();
  if(reduce){ var w=seq[0]; for(var i=0;i<N;i++){flaps[i].ch.textContent=w[i]||' ';} }
  else start();
})();
</script>
</body>
</html>
