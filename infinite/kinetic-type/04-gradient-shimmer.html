<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Bold word SHIMMER with a rainbow gradient clipped to the text, sliding continuously for a glossy iridescent sweep on dark purple.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gradient Shimmer</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#120018;}
  body{display:flex;align-items:center;justify-content:center;
       font-family:"Helvetica Neue",Arial,sans-serif;}
  #txt{
    font-size:clamp(40px,19vw,150px);
    font-weight:900;
    letter-spacing:-.03em;
    line-height:.9;
    text-align:center;
    background:linear-gradient(100deg,
      #ff2e97,#ff8a00,#ffe600,#00ffd5,#5d6bff,#ff2e97);
    background-size:300% 100%;
    -webkit-background-clip:text;background-clip:text;
    color:transparent;
    -webkit-text-fill-color:transparent;
    animation:shimmer 6s linear infinite;
    filter:drop-shadow(0 0 18px rgba(255,80,200,.25));
  }
  @keyframes shimmer{to{background-position:300% 0;}}
  @media (prefers-reduced-motion: reduce){#txt{animation:none;}}
  .cap{position:absolute;left:10px;bottom:8px;font-size:11px;letter-spacing:.08em;
       color:#ff8ad8;opacity:.4;text-transform:uppercase;font-weight:600;}
</style>

</head>
<body>
  <div id="txt">SHIMMER</div>
  <div class="cap">Gradient Shimmer</div>
<script>
(function(){
  // Pure-CSS animation; JS only pauses when hidden to save cycles.
  var txt=document.getElementById('txt');
  document.addEventListener('visibilitychange',function(){
    txt.style.animationPlayState=document.hidden?'paused':'running';
  });
})();
</script>
