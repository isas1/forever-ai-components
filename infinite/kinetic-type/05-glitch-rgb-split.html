<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="The word GLITCH with red and cyan RGB-split copies drifting and randomly bursting with clipped displacement on black.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Glitch RGB Split</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#080808;}
  body{display:flex;align-items:center;justify-content:center;
       font-family:"Helvetica Neue",Arial,sans-serif;}
  #g{
    position:relative;
    font-size:clamp(40px,18vw,140px);
    font-weight:900;
    letter-spacing:.01em;
    color:#f5f5f5;
  }
  #g::before,#g::after{
    content:attr(data-t);
    position:absolute;left:0;top:0;width:100%;height:100%;
    background:#080808;overflow:hidden;
  }
  #g::before{color:#ff003c;}
  #g::after{color:#00eaff;}
  .cap{position:absolute;right:10px;bottom:8px;font-size:11px;letter-spacing:.08em;
       color:#00eaff;opacity:.4;text-transform:uppercase;font-weight:600;}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/kinetic-type/05-glitch-rgb-split.html",
 "title": "Glitch RGB Split",
 "description": "Red and cyan pseudo-element copies of GLITCH drift and randomly snap with clipped displacement, simulating a CRT RGB-split glitch on near-black.",
 "useWhen": "Dark hero sections, cyberpunk or tech aesthetics, error/system-failure themed UIs, demo reels.",
 "avoidWhen": "Light backgrounds (hardcoded #080808), readable body text contexts, or reduced-motion environments where the effect is fully suppressed.",
 "agentPrompt": "Change the word to 'ERROR', set red channel to #ff6600 and cyan to #00ffcc, increase burst probability from 0.06 to 0.12 for more frequent glitch spikes.",
 "editableAreas": [
  "word content (data-t attribute + inner text)",
  "burst probability (Math.random()<0.06)",
  "channel colors (#ff003c / #00eaff)",
  "drift amplitude (sin/cos multiplier *2)",
  "clip displacement range (Math.random()*60 / *30)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard",
  "visibilitychange pause/resume",
  "CSS custom properties feeding pseudo-element transforms"
 ],
 "knownLimitations": [
  "Background color hardcoded in both CSS (#080808) and pseudo-element background — must change in two places",
  "Both channels share the same --clip value so they clip identically during bursts"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "glitch",
  "rgb-split",
  "typography",
  "chromatic-aberration",
  "loop",
  "kinetic-type",
  "dark"
 ]
}
</script>
</head>
<body>
  <div id="g" data-t="GLITCH">GLITCH</div>
  <div class="cap">Glitch RGB Split</div>
<script>
(function(){
  var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var g=document.getElementById('g');
  var before=document.styleSheets[0];
  var t=0, raf=0;
  function frame(){
    t+=0.05;
    // base subtle drift
    var rx=Math.sin(t*7)*2, cx=Math.cos(t*6)*2;
    // random burst
    var burst = Math.random()<0.06;
    if(burst){ rx+= (Math.random()*16-8); cx+= (Math.random()*16-8); }
    var clip = burst? 'inset('+(Math.random()*60)+'% 0 '+(Math.random()*30)+'% 0)' : 'inset(0 0 0 0)';
    g.style.setProperty('--rx',rx+'px');
    g.style.setProperty('--cx',cx+'px');
    g.style.setProperty('--clip',clip);
    raf=requestAnimationFrame(frame);
  }
  // apply via inline pseudo using CSS vars
  var st=document.createElement('style');
  st.textContent='#g::before{transform:translate(var(--rx,0),-1px);clip-path:var(--clip,none);}'+
                 '#g::after{transform:translate(var(--cx,0),1px);clip-path:var(--clip,none);}';
  document.head.appendChild(st);
  function start(){ if(!raf&&!reduce) raf=requestAnimationFrame(frame); }
  function stop(){ cancelAnimationFrame(raf); raf=0; }
  document.addEventListener('visibilitychange',function(){document.hidden?stop():start();});
  if(!reduce) start();
})();
</script>
</body>
</html>
