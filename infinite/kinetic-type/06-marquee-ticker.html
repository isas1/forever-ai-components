<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Two rows of bold words with bullet separators scrolling opposite directions in yellow and teal on dark green like a news ticker.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Marquee Ticker</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0a0f0d;}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(6px,2.5vh,18px);
       font-family:"Helvetica Neue",Arial,sans-serif;}
  .row{width:100%;overflow:hidden;white-space:nowrap;}
  .track{display:inline-block;will-change:transform;}
  .track span{
    display:inline-block;
    font-size:clamp(26px,11vw,76px);
    font-weight:800;
    letter-spacing:-.01em;
    padding:0 .35em;
  }
  .a span{color:#ffd23f;}
  .b span{color:#1dd3b0;}
  .dot{color:#ff5d73 !important;}
  .a{animation:scrollL 14s linear infinite;}
  .b{animation:scrollR 18s linear infinite;}
  @keyframes scrollL{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @keyframes scrollR{from{transform:translateX(-50%)}to{transform:translateX(0)}}
  @media (prefers-reduced-motion: reduce){.a,.b{animation:none;}}
  .cap{position:absolute;left:10px;bottom:8px;font-size:11px;letter-spacing:.08em;
       color:#ffd23f;opacity:.35;text-transform:uppercase;font-weight:600;}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/kinetic-type/06-marquee-ticker.html",
 "title": "Marquee Ticker",
 "description": "Two rows of bold words scroll in opposite directions — yellow left, teal right — with red bullet separators on a dark green background, news-ticker style.",
 "useWhen": "Brand marquees, event countdowns, portfolio hero sections, or any looping announcement banner needing kinetic energy.",
 "avoidWhen": "Contexts where users need to read the text carefully — fast scroll speed and opposing directions make sustained reading difficult.",
 "agentPrompt": "Change row 1 words to [\"DESIGN\",\"BUILD\",\"SHIP\",\"ITERATE\",\"LAUNCH\"], set yellow to #FF6B6B, and slow row 1 scroll to 20s by editing the .a animation duration.",
 "editableAreas": [
  "row 1 word list (fill t1 array)",
  "row 2 word list (fill t2 array)",
  "scroll speeds (.a 14s / .b 18s)",
  "text colors (.a span #ffd23f / .b span #1dd3b0)",
  "font size range (clamp 26px, 11vw, 76px)"
 ],
 "preserveElements": [
  "duplicate unit in fill() for seamless 50% loop",
  "visibilitychange pause handler",
  "prefers-reduced-motion guard",
  "IIFE wrapper"
 ],
 "knownLimitations": [
  "Seamless loop relies on exact 50% translateX — adding/removing words without duplicating the unit will break the loop",
  "No click or hover interactivity; speed cannot be changed at runtime without JS"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "marquee",
  "ticker",
  "scroll",
  "typography",
  "loop",
  "news-ticker",
  "kinetic-type"
 ]
}
</script>
</head>
<body>
  <div class="row"><div class="track a" id="t1"></div></div>
  <div class="row"><div class="track b" id="t2"></div></div>
  <div class="cap">Marquee Ticker</div>
<script>
(function(){
  function fill(el,words){
    var unit=words.map(function(w){return '<span>'+w+'</span><span class="dot">&bull;</span>';}).join('');
    el.innerHTML=unit+unit; // duplicate for seamless loop at 50%
  }
  fill(document.getElementById('t1'),["KINETIC","TYPE","MOTION","LOOP","SCROLL"]);
  fill(document.getElementById('t2'),["LIVE","NOW","BREAKING","UPDATE","FLOW"]);
  var tracks=document.querySelectorAll('.track');
  document.addEventListener('visibilitychange',function(){
    for(var i=0;i<tracks.length;i++) tracks[i].style.animationPlayState=document.hidden?'paused':'running';
  });
})();
</script>
</body>
</html>
