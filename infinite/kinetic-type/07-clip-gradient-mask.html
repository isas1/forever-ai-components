<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="The word REVEAL dark and dim until a diagonal gradient light band sweeps across it, lighting letters in shifting pink-blue hues.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Moving Mask</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0b0b14;}
  body{display:flex;align-items:center;justify-content:center;
       font-family:"Helvetica Neue",Arial,sans-serif;}
  .wrap{position:relative;}
  #base{
    font-size:clamp(40px,18vw,140px);font-weight:900;letter-spacing:-.02em;
    color:#1c1c2e;
  }
  #lit{
    position:absolute;inset:0;
    font-size:clamp(40px,18vw,140px);font-weight:900;letter-spacing:-.02em;
    background:linear-gradient(90deg,#ff6ec7,#7873f5,#21d4fd,#ff6ec7);
    background-size:200% 100%;
    -webkit-background-clip:text;background-clip:text;color:transparent;
    -webkit-text-fill-color:transparent;
    -webkit-mask-image:linear-gradient(120deg,transparent 35%,#000 45%,#000 55%,transparent 65%);
    mask-image:linear-gradient(120deg,transparent 35%,#000 45%,#000 55%,transparent 65%);
    -webkit-mask-size:250% 100%;mask-size:250% 100%;
    animation:sweep 4.5s ease-in-out infinite, hue 8s linear infinite;
  }
  @keyframes sweep{0%{-webkit-mask-position:140% 0;mask-position:140% 0;}100%{-webkit-mask-position:-40% 0;mask-position:-40% 0;}}
  @keyframes hue{to{background-position:200% 0;}}
  @media (prefers-reduced-motion: reduce){#lit{animation:none;-webkit-mask-image:none;mask-image:none;}}
  .cap{position:absolute;right:10px;bottom:8px;font-size:11px;letter-spacing:.08em;
       color:#7873f5;opacity:.45;text-transform:uppercase;font-weight:600;}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/kinetic-type/07-clip-gradient-mask.html",
 "title": "Moving Mask",
 "description": "Diagonal gradient light band sweeps across REVEAL, illuminating letters in shifting pink-blue-cyan hues against dark. Pure CSS mask + background-clip animation.",
 "useWhen": "Hero reveals, splash screens, brand name intros needing a premium lighting-sweep effect on dark backgrounds.",
 "avoidWhen": "Light backgrounds (hardcoded dark body), strings longer than ~8 chars, or contexts requiring broad CSS mask-image browser support.",
 "agentPrompt": "Change the word to 'LAUNCH', slow the sweep to 6s, and shift palette to gold: set background to linear-gradient(90deg,#ffb347,#ff6b6b,#ffd700,#ffb347).",
 "editableAreas": [
  "word content (#base and #lit text)",
  "sweep duration (4.5s in animation)",
  "gradient palette (background on #lit)",
  "mask sweep angle (120deg)",
  "font size clamp range"
 ],
 "preserveElements": [
  "dual-layer stacking (#base dim underlay + #lit masked overlay)",
  "CSS mask-image sweep pattern",
  "prefers-reduced-motion guard",
  "visibilitychange pause in IIFE"
 ],
 "knownLimitations": [
  "Background color hardcoded to #0b0b14 — edit CSS body to change theme",
  "Text must be duplicated in two divs due to background-clip:text technique",
  "-webkit-text-fill-color overrides color on #lit; edit background gradient to recolor"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "typography",
  "mask",
  "gradient",
  "sweep",
  "clip-text",
  "text-animation",
  "kinetic"
 ]
}
</script>
</head>
<body>
  <div class="wrap">
    <div id="base">REVEAL</div>
    <div id="lit">REVEAL</div>
  </div>
  <div class="cap">Moving Mask</div>
<script>
(function(){
  var lit=document.getElementById('lit');
  document.addEventListener('visibilitychange',function(){
    lit.style.animationPlayState=document.hidden?'paused':'running';
  });
})();
</script>
</body>
</html>
