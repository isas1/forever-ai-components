<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="The word REVEAL dark and dim until a diagonal gradient light band sweeps across it, lighting letters in shifting pink-blue hues.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Moving Mask</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0b0b14;}
  body{display:flex;align-items:center;justify-content:center;
       font-family:"Helvetica Neue",Arial,sans-serif;}
  .wrap{position:relative;}
  #base{
    font-size:clamp(40px,18vw,140px);font-weight:900;letter-spacing:-.02em;
    color:#1c1c2e;
  }
  #lit{
    position:absolute;inset:0;
    font-size:clamp(40px,18vw,140px);font-weight:900;letter-spacing:-.02em;
    background:linear-gradient(90deg,#ff6ec7,#7873f5,#21d4fd,#ff6ec7);
    background-size:200% 100%;
    -webkit-background-clip:text;background-clip:text;color:transparent;
    -webkit-text-fill-color:transparent;
    -webkit-mask-image:linear-gradient(120deg,transparent 35%,#000 45%,#000 55%,transparent 65%);
    mask-image:linear-gradient(120deg,transparent 35%,#000 45%,#000 55%,transparent 65%);
    -webkit-mask-size:250% 100%;mask-size:250% 100%;
    animation:sweep 4.5s ease-in-out infinite, hue 8s linear infinite;
  }
  @keyframes sweep{0%{-webkit-mask-position:140% 0;mask-position:140% 0;}100%{-webkit-mask-position:-40% 0;mask-position:-40% 0;}}
  @keyframes hue{to{background-position:200% 0;}}
  @media (prefers-reduced-motion: reduce){#lit{animation:none;-webkit-mask-image:none;mask-image:none;}}
  .cap{position:absolute;right:10px;bottom:8px;font-size:11px;letter-spacing:.08em;
       color:#7873f5;opacity:.45;text-transform:uppercase;font-weight:600;}
</style>
</head>
<body>
  <div class="wrap">
    <div id="base">REVEAL</div>
    <div id="lit">REVEAL</div>
  </div>
  <div class="cap">Moving Mask</div>
<script>
(function(){
  var lit=document.getElementById('lit');
  document.addEventListener('visibilitychange',function(){
    lit.style.animationPlayState=document.hidden?'paused':'running';
  });
})();
</script>
</body>
</html>
