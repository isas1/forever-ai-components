<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="The word WAVES~ in aquamarine, each letter bobbing and rotating along a sine wave with hue shifts on deep teal.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wavy Sine</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#001b2e;}
  body{display:flex;align-items:center;justify-content:center;
       font-family:"Helvetica Neue",Arial,sans-serif;}
  #wave{display:flex;}
  #wave span{
    display:inline-block;
    font-size:clamp(36px,16vw,120px);
    font-weight:800;
    color:#7fffd4;
    will-change:transform;
    text-shadow:0 0 16px rgba(127,255,212,.3);
  }
  .cap{position:absolute;left:10px;bottom:8px;font-size:11px;letter-spacing:.08em;
       color:#7fffd4;opacity:.35;text-transform:uppercase;font-weight:600;}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/kinetic-type/08-wavy-sine-distort.html",
 "title": "Wavy Sine",
 "description": "Letters of \"WAVES~\" bob vertically and rotate along a staggered sine wave with per-letter hue cycling between cyan and teal on a deep navy background.",
 "useWhen": "Hero or ambient display for ocean, wave, or fluid-themed brands. Looping title cards or screensaver-style backgrounds.",
 "avoidWhen": "Long strings — effect only works well for 6–8 characters. Light backgrounds require CSS edits throughout.",
 "agentPrompt": "Change the word to \"FLUID~\", increase vertical amplitude from 26 to 40, and shift the hue base from 160 to 200 for a bluer palette.",
 "editableAreas": [
  "word content (text variable)",
  "vertical amplitude (y = sin*26)",
  "rotation range (cos*10 deg)",
  "hue base and range (160 + sin*40)",
  "animation speed (t += 0.06)",
  "phase offset per letter (i*0.55)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard",
  "visibilitychange pause/resume",
  "lastHue cache (prevents thrashing color style)"
 ],
 "knownLimitations": [
  "Background color hardcoded in CSS — light-theme use requires editing both body background and span color",
  "No aria role on the animated container — purely decorative",
  "clamp font-size may clip very long words on narrow viewports"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "typography",
  "sine-wave",
  "loop",
  "hue-shift",
  "text-animation",
  "aquamarine",
  "kinetic"
 ]
}
</script>
</head>
<body>
  <div id="wave"></div>
  <div class="cap">Wavy Sine</div>
<script>
(function(){
  var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var text="WAVES~";
  var host=document.getElementById('wave');
  var spans=[];
  for(var i=0;i<text.length;i++){
    var s=document.createElement('span');
    s.textContent=text[i]===' '?' ':text[i];
    host.appendChild(s); spans.push(s);
  }
  var t=0, raf=0, amp=0.28;
  var lastHue=[];
  function frame(){
    t+=0.06;
    for(var i=0;i<spans.length;i++){
      var ph=t - i*0.55;
      var sin=Math.sin(ph);
      var y=sin*26;
      var rot=Math.cos(ph)*10;
      var hue=Math.round(160+ sin*40);
      spans[i].style.transform='translateY('+y.toFixed(2)+'px) rotate('+rot.toFixed(2)+'deg)';
      if(hue!==lastHue[i]){ spans[i].style.color='hsl('+hue+',90%,75%)'; lastHue[i]=hue; }
    }
    raf=requestAnimationFrame(frame);
  }
  function start(){ if(!raf&&!reduce) raf=requestAnimationFrame(frame); }
  function stop(){ cancelAnimationFrame(raf); raf=0; }
  document.addEventListener('visibilitychange',function(){document.hidden?stop():start();});
  if(!reduce) start();
})();
</script>
</body>
</html>
