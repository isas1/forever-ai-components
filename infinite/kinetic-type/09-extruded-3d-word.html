<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Bold word DEPTH on deep purple, rendered with layered drop-shadow extrusion, oscillating in 3D rotateX/Y like a turning solid block.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>3D Extruded Word</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#1a1030;}
  body{display:flex;align-items:center;justify-content:center;
       font-family:"Helvetica Neue",Arial,sans-serif;
       perspective:600px;}
  #word{
    font-size:clamp(40px,17vw,128px);
    font-weight:900;
    letter-spacing:.02em;
    color:#ffcf4d;
    transform-style:preserve-3d;
    will-change:transform;
    /* layered shadow = extrusion depth */
  }
  .cap{position:absolute;right:10px;bottom:8px;font-size:11px;letter-spacing:.08em;
       color:#ffcf4d;opacity:.4;text-transform:uppercase;font-weight:600;}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/kinetic-type/09-extruded-3d-word.html",
 "title": "3D Extruded Word",
 "description": "Bold word \"DEPTH\" rotates in 3D via oscillating rotateX/Y transforms; 14-layer drop-shadow stack creates a warm extruded block illusion.",
 "useWhen": "Hero displays, title cards, or any brand word that benefits from tactile 3D depth without 3D-library overhead.",
 "avoidWhen": "Strings longer than 6–7 characters (shadow stack becomes visually noisy) or low-contrast light backgrounds.",
 "agentPrompt": "Change the word to 'BOLD', set color to #00eaff, increase extrusion depth to 20 layers (d<=20), and slow the rotation by setting t+=0.01.",
 "editableAreas": [
  "word content (div#word text)",
  "font color (#ffcf4d)",
  "extrusion depth (d<=14 loop)",
  "rotation speed (t+=0.02)",
  "rotation amplitude (ry=sin(t)*32, rx=cos(t*0.8)*10)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard",
  "visibilitychange pause/resume",
  "transform-style:preserve-3d + perspective on body"
 ],
 "knownLimitations": [
  "Text shadow extrusion is purely 2D layered — true depth breaks if the word is rotated beyond ~45deg",
  "Background color hardcoded in CSS (#1a1030); must edit to use on light backgrounds"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "typography",
  "3d",
  "extrusion",
  "text-shadow",
  "rotation",
  "css-transform",
  "kinetic"
 ]
}
</script>
</head>
<body>
  <div id="word">DEPTH</div>
  <div class="cap">3D Extruded Word</div>
<script>
(function(){
  var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var word=document.getElementById('word');
  // build extrusion shadow once
  var sh=[]; for(var d=1;d<=14;d++){ var c=Math.round(120-d*7); sh.push(d+'px '+d+'px 0 rgb('+c+','+Math.round(c*0.6)+','+Math.round(c*0.2)+')'); }
  word.style.textShadow=sh.join(',');
  var t=0, raf=0;
  function frame(){
    t+=0.02;
    var ry=Math.sin(t)*32;
    var rx=Math.cos(t*0.8)*10;
    word.style.transform='rotateY('+ry.toFixed(2)+'deg) rotateX('+rx.toFixed(2)+'deg)';
    raf=requestAnimationFrame(frame);
  }
  function start(){ if(!raf&&!reduce) raf=requestAnimationFrame(frame); }
  function stop(){ cancelAnimationFrame(raf); raf=0; }
  document.addEventListener('visibilitychange',function(){document.hidden?stop():start();});
  if(!reduce) start();
})();
</script>
</body>
</html>
