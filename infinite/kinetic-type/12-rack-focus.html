<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Two stacked words trade sharpness in a cinematic rack-focus breath, the defocused one blooming into a soft cyan halo with vignette.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rack Focus</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#101418;}
  body{display:flex;align-items:center;justify-content:center;
       font-family:ui-sans-serif,system-ui,"Helvetica Neue",Arial,sans-serif;}
  .rf-stage{position:relative;width:100%;height:100%;display:flex;
       flex-direction:column;align-items:center;justify-content:center;
       gap:clamp(4px,2.4vh,22px);}
  .rf-word{
    color:#e9f6f9;
    font-size:clamp(34px,15.5vw,128px);
    font-weight:800;
    line-height:.92;
    letter-spacing:.01em;
    text-transform:uppercase;
    white-space:nowrap;
    will-change:filter,opacity,transform;
    position:relative;
  }
  /* bloom layer: the soft halo that swells when a word goes out of focus */
  .rf-word::before{
    content:attr(data-w);
    position:absolute;inset:0;
    color:#56cfe1;
    will-change:filter,opacity;
    pointer-events:none;
  }
  .rf-grain{position:absolute;inset:0;pointer-events:none;
       background:radial-gradient(120% 75% at 50% 50%,transparent 55%,rgba(0,0,0,.55) 100%);}
  .cap{position:fixed;right:10px;bottom:8px;font-size:11px;letter-spacing:.16em;
       color:#56cfe1;opacity:.34;text-transform:uppercase;font-family:monospace;
       pointer-events:none;user-select:none;}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/kinetic-type/12-rack-focus.html",
 "title": "Rack Focus",
 "description": "Two stacked words trade sharpness in a cinematic rack-focus breath: the defocused word blooms into a soft cyan halo while the focused one snaps razor-sharp.",
 "useWhen": "Hero sections, loading screens, or film/photography brand contexts needing cinematic ambient motion with minimal distraction.",
 "avoidWhen": "Contexts where users need to read both words simultaneously, or on low-end devices sensitive to repeated CSS filter repaints.",
 "agentPrompt": "Change the two words to 'FOCUS' and 'SHIFT', slow the breath cycle to 8000ms by setting PERIOD=8000, and change the bloom halo color from #56cfe1 to #ff6b6b.",
 "editableAreas": [
  "word content (data-w attribute and text node)",
  "cycle period (PERIOD=5200)",
  "max blur radius (14px in paint())",
  "bloom halo color (#56cfe1 in CSS)",
  "pointer nudge strength (±60ms t0 shift)"
 ],
 "preserveElements": [
  "quantized blur step logic (0.5px rounding for perf)",
  "prefers-reduced-motion static fallback",
  "visibilitychange pause/start",
  "IIFE wrapper"
 ],
 "knownLimitations": [
  "CSS filter:blur() triggers repaint every frame — quantized to 0.5px steps to reduce cost but still heavier than transform-only animations",
  "Pointer nudge shifts phase timing, which can cause a subtle jump on fast cursor sweeps",
  "Background color hardcoded to #101418 in CSS — must edit to change dark scheme"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "typography",
  "blur",
  "focus",
  "cinematic",
  "ambient",
  "loop",
  "glow"
 ]
}
</script>
</head>
<body>
  <div class="rf-stage">
    <div class="rf-word" id="rfA" data-w="ENTER">ENTER</div>
    <div class="rf-word" id="rfB" data-w="THE FRAME">THE FRAME</div>
    <div class="rf-grain"></div>
  </div>
  <div class="cap">Rack Focus</div>
<script>
(function(){
  var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var A=document.getElementById('rfA'), B=document.getElementById('rfB');
  var raf=0, t0=0, hold=0;        // hold = pointer nudge accelerator
  var PERIOD=5200;                // ms for a full breath (one word -> other -> back)

  // smoothstep eased triangle wave 0..1..0
  function ease(x){ return x*x*(3-2*x); }

  // apply a focus value f in [0,1] to a word: 1 = razor sharp, 0 = full bloom
  // blur/filter is the expensive repaint; quantize it to ~0.5px steps so the
  // filter string only changes in discrete jumps instead of every frame.
  var st={A:{},B:{}};
  function paint(el,f,key){
    var s=st[key];
    var blur = Math.round((1-f)*14*2)/2;   // 0.5px steps
    var scale = 1 + (1-f)*0.045;  // out-of-focus drifts slightly larger
    var bloom = (1-f);            // halo strength
    if(blur!==s.blur){ el.style.filter = 'blur('+blur.toFixed(1)+'px)'; s.blur=blur; }
    el.style.opacity = (0.30 + f*0.70).toFixed(3);
    el.style.transform = 'scale('+scale.toFixed(4)+')';
    var sh=Math.round((2+f*10)*2)/2;
    if(sh!==s.sh){ el.style.textShadow = '0 0 '+sh.toFixed(1)+'px rgba(86,207,225,'+(f*0.35).toFixed(3)+')'; s.sh=sh; }
    // bloom halo layer (the cyan ::before glow that swells as the word defocuses)
    var bb=Math.round((4+bloom*30)*2)/2;
    if(bb!==s.bb){ el.style.setProperty('--bb', bb.toFixed(1)+'px'); s.bb=bb; }
    el.style.setProperty('--bo', (bloom*0.85).toFixed(3));
  }

  // drive the ::before via CSS vars
  var sheet=document.createElement('style');
  sheet.textContent='.rf-word::before{filter:blur(var(--bb,0));opacity:var(--bo,0);}';
  document.head.appendChild(sheet);

  function render(now){
    var dt = (now - t0);
    var p = (dt % PERIOD) / PERIOD;          // 0..1 phase
    // triangle: focus sweeps A<->B. fA goes 1->0->1, fB the inverse, offset by half.
    var tri = p<0.5 ? p*2 : (1-p)*2;         // 0..1..0
    var fA = ease(tri);                      // A sharp at phase 0, soft at 0.5
    var fB = ease(1-tri);                    // B is the complement
    paint(A,fA,'A'); paint(B,fB,'B');
    hold*=0.95;
    raf=requestAnimationFrame(render);
  }

  function start(){ if(!raf&&!reduce){ t0=performance.now(); raf=requestAnimationFrame(render);} }
  function stop(){ cancelAnimationFrame(raf); raf=0; }
  document.addEventListener('visibilitychange',function(){document.hidden?stop():start();});
  // pointer nudge: jump the focus phase toward whichever word is nearer the cursor
  document.addEventListener('pointermove',function(e){
    if(reduce) return;
    var midY = innerHeight/2;
    // shift t0 so the targeted word resolves sooner
    var up = e.clientY < midY;
    t0 -= up?60:-60;
  });

  if(reduce){
    // single resting frame: top word sharp, bottom in bloom
    paint(A,1,'A'); paint(B,0.12,'B');
  } else { start(); }
})();
</script>
</body>
</html>
