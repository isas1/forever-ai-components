<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Magic Square — Paul Klee. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Magic Square</title>
<style>
  html,body{margin:0;height:100%;background:#efe7d6;overflow:hidden}
  #kle01-stage{position:fixed;inset:0;width:100%;height:100%}
  .kle01-grid{position:absolute;inset:0;display:grid;gap:3px;padding:14px;}
  .kle01-cell{border-radius:2px;will-change:transform,filter;}
  @keyframes kle01-breathe{
    0%,100%{transform:scale(.94);filter:saturate(.92) brightness(1);}
    50%{transform:scale(1);filter:saturate(1.12) brightness(1.06);}
  }
  .kle01-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#2a2620;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion: reduce){ .kle01-cell{animation:none !important;} }
</style>
</head>
<body>
<div id="kle01-stage" role="img" aria-label="A Paul Klee magic square: a quilt of watercolour colour-blocks in terracotta, teal, mustard, slate and plum that slowly breathe in and out and shift saturation.">
  <div class="kle01-grid" id="kle01-grid"></div>
</div>
<div class="kle01-cap">Magic Square</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const grid=document.getElementById('kle01-grid'); if(!grid) return;
  const HUES=['#c96f4a','#3a8a8c','#d9a441','#46566b','#7a4b6b'];
  const COLS=7, ROWS=5, N=COLS*ROWS;
  grid.style.gridTemplateColumns=`repeat(${COLS},1fr)`;
  grid.style.gridTemplateRows=`repeat(${ROWS},1fr)`;
  for(let i=0;i<N;i++){
    const cell=document.createElement('div');
    cell.className='kle01-cell';
    cell.style.background=HUES[(Math.random()*HUES.length)|0];
    cell.style.opacity=(0.78+Math.random()*0.22).toFixed(2);
    if(!REDUCED){
      const dur=(5+Math.random()*5).toFixed(1);
      const del=(-Math.random()*7).toFixed(1);
      cell.style.animation=`kle01-breathe ${dur}s ease-in-out ${del}s infinite`;
    }
    grid.appendChild(cell);
  }
})();
</script>
</body>
</html>
