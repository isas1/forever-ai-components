<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Twittering Contraption — Paul Klee. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Twittering Contraption</title>
<style>
  html,body{margin:0;height:100%;background:#23201b;overflow:hidden}
  #kle06-scene{position:fixed;inset:0;overflow:hidden}
  .kle06-wire{position:absolute;left:6%;right:6%;top:30%;height:2px;background:rgba(239,231,214,.6);}
  .kle06-crank{position:absolute;left:50%;bottom:18px;width:54px;height:54px;transform:translateX(-50%);}
  @keyframes kle06-spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  .kle06-bird{position:absolute;transform-origin:bottom center;will-change:transform;}
  @keyframes kle06-bob{0%,100%{transform:rotate(-9deg);}50%{transform:rotate(9deg);}}
  @keyframes kle06-chirp{0%,72%,100%{opacity:0;transform:translateY(0) scale(.7);}80%,92%{opacity:1;transform:translateY(-6px) scale(1);}}
  .kle06-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#efe7d6;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion: reduce){ .kle06-bird,.kle06-crank{animation:none !important;} }
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/klee/06-twittering-contraption.html",
 "title": "Twittering Contraption",
 "description": "Four Klee-style wire birds bob on a horizontal wire and chirp musical notes while a hand-crank below spins. Inspired by Paul Klee's 1922 painting.",
 "useWhen": "Art/creative portfolio backgrounds, generative-art showcases, ambient decorative tiles with a whimsical mechanical theme.",
 "avoidWhen": "Light-theme UIs — background is hardcoded dark #23201b and won't adapt. Contexts needing interactivity.",
 "agentPrompt": "Increase bird count to 6 by changing N=4 to N=6, and slow the crank rotation from 4s to 8s in the kle06-spin animation.",
 "editableAreas": [
  "bird count (N=4)",
  "color palette (HUES array)",
  "bob speed per bird (1.6+i*0.4 seconds)",
  "crank spin duration (4s in kle06-spin)",
  "wire vertical position (top:30%)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (REDUCED check)",
  "aria-label on scene div for accessibility"
 ],
 "knownLimitations": [
  "Background color hardcoded to dark #23201b — must edit CSS to change",
  "Bird positions are evenly spaced by formula; uneven layouts require manual overrides"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "klee",
  "birds",
  "wire",
  "crank",
  "generative",
  "ambient",
  "art-inspired"
 ]
}
</script>
</head>
<body>
<div id="kle06-scene" role="img" aria-label="A Paul Klee twittering contraption: wiry bird-glyphs perched on a wire are turned by a hand-crank below. They bob and tip and silently chirp musical notes — CSS clockwork on a dim ground."></div>
<div class="kle06-cap">Twittering Contraption</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const scene=document.getElementById('kle06-scene'); if(!scene) return;
  const HUES=['#c96f4a','#3a8a8c','#d9a441','#46566b','#7a4b6b'];
  const wire=document.createElement('div'); wire.className='kle06-wire'; scene.appendChild(wire);
  const N=4;
  for(let i=0;i<N;i++){
    const x=14 + i*(72/(N-1));
    const col=HUES[i%HUES.length];
    const b=document.createElement('div');
    b.className='kle06-bird';
    b.style.cssText=`left:${x}%;top:30%;width:44px;height:52px;margin-left:-22px;margin-top:-44px;`;
    b.innerHTML=`<svg viewBox="0 0 44 52" width="44" height="52" aria-hidden="true">
      <line x1="22" y1="52" x2="22" y2="30" stroke="#efe7d6" stroke-width="2"/>
      <circle cx="22" cy="22" r="9" fill="none" stroke="${col}" stroke-width="2.4"/>
      <circle cx="22" cy="22" r="2.4" fill="#efe7d6"/>
      <path d="M31 22 l10 -3 -10 -3" fill="none" stroke="${col}" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M22 13 q4 -9 -3 -10" fill="none" stroke="#efe7d6" stroke-width="2"/>
      <path d="M22 13 q-4 -9 3 -10" fill="none" stroke="#efe7d6" stroke-width="2"/>
    </svg>`;
    if(!REDUCED){ b.style.animation=`kle06-bob ${(1.6+i*0.4).toFixed(2)}s ease-in-out ${(-i*0.3).toFixed(2)}s infinite`; }
    else { b.style.transform=`rotate(${(i%2?6:-6)}deg)`; }
    scene.appendChild(b);
    const chirp=document.createElement('div');
    chirp.style.cssText=`position:absolute;left:${x}%;top:14%;margin-left:14px;font:15px system-ui,sans-serif;color:${col};`;
    chirp.textContent='♪';
    if(!REDUCED){ chirp.style.animation=`kle06-chirp ${(2.2+i*0.5).toFixed(2)}s ease-in-out ${(-i*0.6).toFixed(2)}s infinite`; }
    else { chirp.style.opacity='0'; }
    scene.appendChild(chirp);
  }
  const rod=document.createElement('div');
  rod.style.cssText='position:absolute;left:50%;top:30%;bottom:44px;width:2px;background:rgba(239,231,214,.3);transform:translateX(-50%);';
  scene.appendChild(rod);
  const crank=document.createElement('div');
  crank.className='kle06-crank';
  crank.innerHTML=`<svg viewBox="0 0 54 54" width="54" height="54" aria-hidden="true">
    <circle cx="27" cy="27" r="22" fill="none" stroke="#3a8a8c" stroke-width="2.4"/>
    <line x1="27" y1="27" x2="27" y2="6" stroke="#c96f4a" stroke-width="3" stroke-linecap="round"/>
    <circle cx="27" cy="6" r="4.5" fill="#d9a441" stroke="#efe7d6" stroke-width="1.6"/>
    <circle cx="27" cy="27" r="3.4" fill="#efe7d6"/>
  </svg>`;
  if(!REDUCED){ crank.style.animation='kle06-spin 4s linear infinite'; }
  scene.appendChild(crank);
})();
</script>
</body>
</html>
