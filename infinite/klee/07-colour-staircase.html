<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Colour Staircase — Paul Klee. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Colour Staircase</title>
<style>
  html,body{margin:0;height:100%;background:#efe7d6;overflow:hidden}
  #kle07-stage{position:fixed;inset:0;width:100%;height:100%}
  .kle07-stair{position:absolute;inset:0;display:flex;align-items:flex-end;gap:0;padding:14px;}
  .kle07-step{flex:1;display:flex;flex-direction:column;justify-content:flex-end;}
  .kle07-block{width:100%;border:1px solid rgba(42,38,32,.4);border-bottom:none;border-radius:3px 3px 0 0;will-change:height,filter;}
  @keyframes kle07-breathe{0%,100%{height:var(--lo);}50%{height:var(--hi);}}
  @keyframes kle07-march{0%,100%{filter:hue-rotate(0deg) brightness(1);}50%{filter:hue-rotate(20deg) brightness(1.08);}}
  .kle07-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#2a2620;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion: reduce){ .kle07-block{animation:none !important;} }
</style>
</head>
<body>
<div id="kle07-stage" role="img" aria-label="A Paul Klee colour staircase: stepped blocks of colour ascend like a gradated scale, the hue marching up the stair while the heights rise and settle in a slow tidal breath.">
  <div class="kle07-stair" id="kle07-stair"></div>
</div>
<div class="kle07-cap">Colour Staircase</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const stair=document.getElementById('kle07-stair'); if(!stair) return;
  const ribbon=['#7a4b6b','#46566b','#3a8a8c','#d9a441','#c96f4a'];
  function hx(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
  function mix(a,b,t){const pa=hx(a),pb=hx(b);
    return `rgb(${Math.round(pa[0]+(pb[0]-pa[0])*t)},${Math.round(pa[1]+(pb[1]-pa[1])*t)},${Math.round(pa[2]+(pb[2]-pa[2])*t)})`;}
  const N=9;
  for(let i=0;i<N;i++){
    const t=i/(N-1);
    const step=document.createElement('div');step.className='kle07-step';
    const block=document.createElement('div');block.className='kle07-block';
    const idx=t*(ribbon.length-1);
    const lo=ribbon[Math.floor(idx)], hi=ribbon[Math.min(ribbon.length-1,Math.ceil(idx))];
    block.style.background=mix(lo,hi,idx-Math.floor(idx));
    const base=24+t*52;
    block.style.setProperty('--lo',(base-4)+'%');
    block.style.setProperty('--hi',(base+16)+'%');
    block.style.height=base+'%';
    if(!REDUCED){
      const bd=(3.2+Math.random()*1.6).toFixed(2), bdel=(-i*0.5).toFixed(2);
      const md=(4+Math.random()*3).toFixed(1);
      block.style.animation=`kle07-breathe ${bd}s ease-in-out ${bdel}s infinite, kle07-march ${md}s ease-in-out ${(-i*0.4).toFixed(1)}s infinite`;
    }
    step.appendChild(block);stair.appendChild(step);
  }
})();
</script>
</body>
</html>
