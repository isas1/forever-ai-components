<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Geometric Face — Paul Klee. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Geometric Face — The Dreamer's Mask</title>
<style>
  html,body{margin:0;height:100%;background:#23201b;overflow:hidden}
  #kle08-stage{position:fixed;inset:0;width:100%;height:100%}
  #kle08-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .kle08-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#efe7d6;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/klee/08-geometric-face.html",
 "title": "Geometric Face",
 "description": "Abstract Klee-style face built from interlocking color planes that slowly cross-fade hues; eyes blink and mouth curves shift expression in a gentle loop.",
 "useWhen": "Art/museum contexts, generative portrait hero sections, dark-background ambient displays inspired by early modernism.",
 "avoidWhen": "Light backgrounds (hardcoded dark canvas fill). Contexts where constant subtle motion is distracting alongside dense content.",
 "agentPrompt": "Change the palette's accent from terra (#c96f4a) to crimson (#b53030) and slow the region color transitions by setting speed to 0.06+Math.random()*0.10.",
 "editableAreas": [
  "PAL color palette object (all named colors)",
  "region wobble amplitude (2.2 in Math.sin)",
  "blink threshold (0.96)",
  "mouth expression range (m = Math.sin(t*0.5)*6)",
  "face aspect ratio (fw*1.18)"
 ],
 "preserveElements": [
  "DPR-aware fitCanvas with setTransform",
  "visibilitychange start/stop guard",
  "REDUCED prefers-reduced-motion branch",
  "IIFE wrapper"
 ],
 "knownLimitations": [
  "Background fill is hardcoded #23201b — must edit CSS and canvas fillRect to change",
  "No click/hover interactivity; expression changes are purely time-driven"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "portrait",
  "geometric",
  "klee",
  "color-planes",
  "blink",
  "canvas",
  "generative"
 ]
}
</script>
</head>
<body>
<div id="kle08-stage" role="img" aria-label="A Paul Klee geometric face, the dreamer's mask: an abstract portrait built from interlocking colour planes that gently re-tile and re-colour, blinking and shifting expression, never quite the same twice.">
  <canvas id="kle08-cv"></canvas>
</div>
<div class="kle08-cap">Geometric Face</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv=document.getElementById('kle08-cv'); if(!cv) return;
  const PAL={paper:'#efe7d6',paper2:'#e7dcc6',ink:'#2a2620',terra:'#c96f4a',teal:'#3a8a8c',mustard:'#d9a441',slate:'#46566b',plum:'#7a4b6b'};
  function hx(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
  function mix(a,b,t){const pa=hx(a),pb=hx(b);
    return `rgb(${Math.round(pa[0]+(pb[0]-pa[0])*t)},${Math.round(pa[1]+(pb[1]-pa[1])*t)},${Math.round(pa[2]+(pb[2]-pa[2])*t)})`;}
  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width), h=Math.max(2,r.height);
    c.width=Math.round(w*dpr); c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }
  let S=fitCanvas(cv), regions=[]; const FEAT={};
  function build(){
    const fw=Math.min(S.w*0.62, S.h*0.78), fh=fw*1.18;
    const cx=S.w/2, cy=S.h/2, x0=cx-fw/2, y0=cy-fh/2;
    function P(u,v){ return [x0+u*fw, y0+v*fh]; }
    const defs=[
      {pts:[[0,0],[1,0],[1,.22],[0,.18]], pal:[PAL.mustard,PAL.terra,PAL.plum]},
      {pts:[[0,.18],[.4,.22],[.34,.6],[0,.66]], pal:[PAL.teal,PAL.slate,PAL.terra]},
      {pts:[[1,.22],[.62,.24],[.66,.6],[1,.62]], pal:[PAL.terra,PAL.mustard,PAL.teal]},
      {pts:[[.4,.22],[.62,.24],[.58,.7],[.42,.7]], pal:[PAL.paper2,PAL.mustard,PAL.terra]},
      {pts:[[.34,.32],[.66,.32],[.66,.46],[.34,.46]], pal:[PAL.slate,PAL.ink,PAL.teal]},
      {pts:[[.0,.66],[.42,.7],[.4,.92],[.04,.86]], pal:[PAL.terra,PAL.plum,PAL.mustard]},
      {pts:[[1,.62],[.58,.7],[.6,.92],[.96,.86]], pal:[PAL.plum,PAL.teal,PAL.slate]},
      {pts:[[.4,.7],[.58,.7],[.6,.92],[.4,.92]], pal:[PAL.mustard,PAL.terra,PAL.plum]},
      {pts:[[.04,.86],[.96,.86],[.78,1],[.22,1]], pal:[PAL.slate,PAL.teal,PAL.terra]}
    ];
    regions=defs.map((d,i)=>({
      poly:d.pts.map(p=>P(p[0],p[1])), pal:d.pal,
      idx:(Math.random()*d.pal.length)|0, next:(Math.random()*d.pal.length)|0,
      t:Math.random(), speed:0.12+Math.random()*0.18, seed:i
    }));
    FEAT.leftEye=P(.42,.39); FEAT.rightEye=P(.6,.39);
    FEAT.mouthA=P(.42,.82); FEAT.mouthB=P(.6,.82); FEAT.brow=P(.5,.30);
  }
  function smooth(x){return x*x*(3-2*x);}
  function drawEye(p, open){
    S.ctx.save();
    S.ctx.fillStyle=PAL.paper;S.ctx.strokeStyle=PAL.ink;S.ctx.lineWidth=2;
    S.ctx.beginPath();S.ctx.ellipse(p[0],p[1],11,11*open+1,0,0,7);S.ctx.fill();S.ctx.stroke();
    S.ctx.fillStyle=PAL.ink;
    S.ctx.beginPath();S.ctx.arc(p[0],p[1],3.4*Math.max(0.2,open),0,7);S.ctx.fill();
    S.ctx.restore();
  }
  let t=0,last=performance.now();
  function draw(now){
    const dt=Math.min(0.05,(now-last)/1000);last=now;
    if(!REDUCED) t+=dt;
    S.ctx.clearRect(0,0,S.w,S.h);
    S.ctx.fillStyle='rgba(35,32,27,0.5)';S.ctx.fillRect(0,0,S.w,S.h);
    for(const rg of regions){
      if(!REDUCED){
        rg.t+=dt*rg.speed;
        if(rg.t>=1){ rg.t=0; rg.idx=rg.next; rg.next=(rg.next+1+((Math.random()*(rg.pal.length-1))|0))%rg.pal.length; }
      }
      const col=REDUCED? rg.pal[rg.idx] : mix(rg.pal[rg.idx], rg.pal[rg.next], smooth(rg.t));
      const wob=REDUCED?0:Math.sin(t*0.6+rg.seed)*2.2;
      S.ctx.beginPath();
      rg.poly.forEach((p,i)=>{ const px=p[0]+wob, py=p[1]+wob*0.6;
        i? S.ctx.lineTo(px,py):S.ctx.moveTo(px,py); });
      S.ctx.closePath();
      S.ctx.fillStyle=col; S.ctx.fill();
      S.ctx.strokeStyle=PAL.ink; S.ctx.lineWidth=2; S.ctx.stroke();
    }
    if(FEAT.leftEye){
      const blink = REDUCED?1:(Math.sin(t*0.8)>0.96?0.12:1);
      drawEye(FEAT.leftEye, blink); drawEye(FEAT.rightEye, blink);
      S.ctx.strokeStyle=PAL.ink;S.ctx.lineWidth=2.6;S.ctx.lineCap='round';
      const m=REDUCED?0:Math.sin(t*0.5)*6;
      S.ctx.beginPath();
      S.ctx.moveTo(FEAT.mouthA[0],FEAT.mouthA[1]);
      S.ctx.quadraticCurveTo((FEAT.mouthA[0]+FEAT.mouthB[0])/2, FEAT.mouthA[1]+10+m, FEAT.mouthB[0],FEAT.mouthB[1]);
      S.ctx.stroke();
      S.ctx.strokeStyle=PAL.terra;S.ctx.lineWidth=2.4;
      const bx=FEAT.brow[0], by=FEAT.brow[1];
      S.ctx.beginPath();S.ctx.moveTo(bx-14,by+4);S.ctx.lineTo(bx+14,by-4);S.ctx.stroke();
      S.ctx.beginPath();S.ctx.moveTo(bx+14,by-4);S.ctx.lineTo(bx+6,by-8);S.ctx.moveTo(bx+14,by-4);S.ctx.lineTo(bx+8,by+2);S.ctx.stroke();
    }
    S.ctx.globalAlpha=1;
  }

  let raf=0, running=false;
  function loop(){ if(!running) return; draw(performance.now()); raf=requestAnimationFrame(loop); }
  function start(){ if(running) return; running=true; last=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }

  build();
  S.ctx.fillStyle='#23201b';S.ctx.fillRect(0,0,S.w,S.h);
  let _rt;
  window.addEventListener('resize', ()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ S=fitCanvas(cv); build(); if(REDUCED) draw(performance.now()); },150); }, {passive:true});
  document.addEventListener('visibilitychange', ()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });
  if(REDUCED){ draw(performance.now()); }
  else start();
})();
</script>
</body>
</html>
