<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Gilded Halo — Gustav Klimt. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gilded Halo</title>
<style>
  html,body{margin:0;height:100%;background:#070502;overflow:hidden}
  #kli04-stage{position:fixed;inset:0;width:100%;height:100%;cursor:crosshair}
  #kli04-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .kli04-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#e6cf86;opacity:.46;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/klimt/04-gilded-halo.html",
 "title": "Gilded Halo",
 "description": "Concentric gold rings bloom and fade from click/pointer points while gold-leaf flecks scatter with gravity; auto-strikes keep it alive passively.",
 "useWhen": "Dark luxury hero backgrounds, art-inspired installations, Klimt/Art Nouveau themed UIs needing ambient gold motion.",
 "avoidWhen": "Light backgrounds (hardcoded dark fill). Contexts needing legible content overlaid — rings and flecks compete visually.",
 "agentPrompt": "Change GOLD_HI to '#ffe066' and GOLD2 to '#b8960c', increase ring count per strike from 4 to 6, and slow ring expansion by reducing sp base from 54 to 36.",
 "editableAreas": [
  "gold colors (GOLD2, GOLD_HI)",
  "rings per strike (loop i<4)",
  "ring speed base (sp: 54+i*20)",
  "fleck count (10+random*8)",
  "auto-strike interval (1.5s)",
  "fleck gravity (60*dt)"
 ],
 "preserveElements": [
  "DPR-aware fitCanvas()",
  "visibilitychange pause/resume",
  "prefers-reduced-motion guard + static fallback",
  "IIFE wrapper"
 ],
 "knownLimitations": [
  "Background color hardcoded to #070502 — must edit CSS to change",
  "pointermove strikes at 5% probability; heavy cursor movement can spike particle count",
  "No aria live region for dynamic events — purely decorative role=img"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "gold",
  "klimt",
  "halo",
  "rings",
  "particles",
  "canvas",
  "dark"
 ]
}
</script>
</head>
<body>
<div id="kli04-stage" role="img" aria-label="Concentric gold rings and a scatter of gold-leaf flecks radiate from points struck into the darkness, blooming and fading like a halo.">
  <canvas id="kli04-cv"></canvas>
</div>
<div class="kli04-cap">Gilded Halo</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv=document.getElementById('kli04-cv'); if(!cv) return;
  const stage=document.getElementById('kli04-stage');
  const GOLD2='#9a7d28', GOLD_HI='#e6cf86';
  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width), h=Math.max(2,r.height);
    c.width=Math.round(w*dpr); c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }
  let S=fitCanvas(cv);
  const rings=[], flecks=[];
  function strike(x,y){
    for(let i=0;i<4;i++) rings.push({x,y,r:5+i*7,t:0,sp:54+i*20,hi:i%2===0});
    const n=10+(Math.random()*8|0);
    for(let i=0;i<n;i++){
      const a=Math.random()*7, s=40+Math.random()*120;
      flecks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,t:0,
        sz:1.5+Math.random()*3,rot:Math.random()*7,vr:(Math.random()-.5)*6});
    }
  }
  function pos(ev){const r=cv.getBoundingClientRect();const p=ev.touches?ev.touches[0]:ev;return [p.clientX-r.left,p.clientY-r.top];}
  stage.addEventListener('pointerdown',e=>{const [x,y]=pos(e);strike(x,y);});
  stage.addEventListener('pointermove',e=>{ if(Math.random()<0.05){const [x,y]=pos(e);strike(x,y);} });
  let last=performance.now(),autoT=0;
  function draw(now){
    const dt=(now-last)/1000;last=now;autoT+=dt;
    if(autoT>(REDUCED?2.4:1.5)){autoT=0;strike(S.w*(0.2+Math.random()*0.6),S.h*(0.2+Math.random()*0.6));}
    const ctx=S.ctx;
    ctx.fillStyle='rgba(7,5,2,0.28)';ctx.fillRect(0,0,S.w,S.h);
    for(const g of rings){
      g.t+=dt; g.r+=g.sp*dt;
      const a=Math.max(0,1-g.t/2.6);
      if(a<=0){g.dead=true;continue;}
      ctx.globalAlpha=a;ctx.strokeStyle=g.hi?GOLD_HI:GOLD2;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(g.x,g.y,g.r,0,7);ctx.stroke();
    }
    for(const f of flecks){
      f.t+=dt; f.vy+=60*dt; f.x+=f.vx*dt; f.y+=f.vy*dt; f.vx*=0.98; f.rot+=f.vr*dt;
      const a=Math.max(0,1-f.t/2.2);
      if(a<=0){f.dead=true;continue;}
      ctx.save();ctx.translate(f.x,f.y);ctx.rotate(f.rot);ctx.globalAlpha=a;
      ctx.fillStyle=GOLD_HI;ctx.fillRect(-f.sz,-f.sz*0.5,f.sz*2,f.sz);ctx.restore();
    }
    ctx.globalAlpha=1;
    for(let i=rings.length-1;i>=0;i--) if(rings[i].dead) rings.splice(i,1);
    for(let i=flecks.length-1;i>=0;i--) if(flecks[i].dead) flecks.splice(i,1);
  }
  let raf=0, running=false;
  function loop(){ if(!running) return; draw(performance.now()); raf=requestAnimationFrame(loop); }
  function start(){ if(running) return; running=true; last=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
  S.ctx.fillStyle='#070502';S.ctx.fillRect(0,0,S.w,S.h);
  strike(S.w*0.5,S.h*0.5);
  let _rt;
  window.addEventListener('resize', ()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ S=fitCanvas(cv); if(REDUCED) draw(performance.now()); },150); }, {passive:true});
  document.addEventListener('visibilitychange', ()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });
  if(REDUCED){ for(let i=0;i<40;i++) draw(performance.now()); }
  else start();
})();
</script>
</body>
</html>
