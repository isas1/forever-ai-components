<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Falling Gold — Gold-Leaf Ornamental Studies. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Falling Gold</title>
<style>
  html,body{margin:0;height:100%;background:#070502;overflow:hidden}
  #kli06-stage{position:fixed;inset:0;width:100%;height:100%}
  #kli06-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .kli06-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#e6cf86;opacity:.46;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/klimt/06-falling-gold.html",
 "title": "Falling Gold",
 "description": "Diamond-shaped gold flakes drift and sway downward against a near-black background, each shimmering in opacity as they tumble and rotate.",
 "useWhen": "Luxury or art-themed hero backgrounds, gold-leaf-inspired design systems, ambient dark-mode decorative panels.",
 "avoidWhen": "Light backgrounds (hardcoded dark canvas), contexts where falling motion competes with readable content, or low-end devices needing minimal repaints.",
 "agentPrompt": "Increase flake count by changing the divisor in `Math.round(S.w*S.h/5200)` to 3000, slow fall speed by reducing `vy` max from 34 to 18, and shift color to rose gold by setting GOLD to '#c47c5a' and GOLD_HI to '#e8a87c'.",
 "editableAreas": [
  "flake count (density divisor 5200)",
  "fall speed range (14+Math.random()*34)",
  "gold colors (GOLD, GOLD_HI constants)",
  "flake size range (2+Math.random()*5)",
  "sway amplitude (8*dt multiplier)"
 ],
 "preserveElements": [
  "DPR-aware fitCanvas with setTransform",
  "visibilitychange pause/resume guards",
  "IIFE wrapper",
  "prefers-reduced-motion static fallback"
 ],
 "knownLimitations": [
  "Background color hardcoded in both CSS (#070502) and canvas fill — must change both",
  "No pointer interactivity; entirely passive",
  "Flake count capped at 110 regardless of screen size"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "gold",
  "particles",
  "falling",
  "ambient",
  "canvas",
  "generative"
 ]
}
</script>
</head>
<body>
<div id="kli06-stage" role="img" aria-label="Flecks of gold leaf drift down through the dark, tumbling and swaying as they fall and catching the light with a soft shimmer.">
  <canvas id="kli06-cv"></canvas>
</div>
<div class="kli06-cap">Falling Gold</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv=document.getElementById('kli06-cv'); if(!cv) return;
  const GOLD='#c8a951', GOLD_HI='#e6cf86';
  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width), h=Math.max(2,r.height);
    c.width=Math.round(w*dpr); c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }
  let S=fitCanvas(cv);
  let bits=[];
  function make(y){
    return {x:Math.random()*S.w, y, vy:14+Math.random()*34,
      sz:2+Math.random()*5, rot:Math.random()*7, vr:(Math.random()-.5)*2.4,
      sway:Math.random()*7, swaySp:0.4+Math.random()*0.8, hi:Math.random()<0.5};
  }
  function seed(){
    bits=[];
    const N=Math.min(110,Math.round(S.w*S.h/5200));
    for(let i=0;i<Math.max(28,N);i++) bits.push(make(Math.random()*S.h));
  }
  let last=performance.now(),t=0;
  function draw(now){
    const dt=Math.min(0.05,(now-last)/1000);last=now;
    if(!REDUCED) t+=dt;
    const ctx=S.ctx;
    ctx.clearRect(0,0,S.w,S.h);
    for(const b of bits){
      if(!REDUCED){
        b.y+=b.vy*dt;
        b.x+=Math.sin(t*b.swaySp+b.sway)*8*dt;
        b.rot+=b.vr*dt;
        if(b.y>S.h+8){ Object.assign(b, make(-8)); b.x=Math.random()*S.w; }
      }
      const shimmer=0.55+0.45*Math.sin(t*2+b.sway);
      ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.rot);
      ctx.globalAlpha=(REDUCED?0.6:0.4+0.5*shimmer);
      ctx.fillStyle=b.hi?GOLD_HI:GOLD;
      ctx.beginPath();
      ctx.moveTo(0,-b.sz);ctx.lineTo(b.sz*0.7,0);ctx.lineTo(0,b.sz);ctx.lineTo(-b.sz*0.7,0);ctx.closePath();
      ctx.fill();ctx.restore();
    }
    ctx.globalAlpha=1;
  }
  let raf=0, running=false;
  function loop(){ if(!running) return; draw(performance.now()); raf=requestAnimationFrame(loop); }
  function start(){ if(running) return; running=true; last=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
  S.ctx.fillStyle='#070502';S.ctx.fillRect(0,0,S.w,S.h);
  seed();
  let _rt;
  window.addEventListener('resize', ()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ S=fitCanvas(cv); seed(); if(REDUCED) draw(performance.now()); },150); }, {passive:true});
  document.addEventListener('visibilitychange', ()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });
  if(REDUCED){ draw(performance.now()); }
  else start();
})();
</script>
</body>
</html>
