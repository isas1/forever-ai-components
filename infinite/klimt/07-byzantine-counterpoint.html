<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Byzantine Counterpoint — Gustav Klimt. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Byzantine Counterpoint</title>
<style>
  html,body{margin:0;height:100%;background:#070502;overflow:hidden}
  #kli07-stage{position:fixed;inset:0;width:100%;height:100%}
  .kli07-wrap{position:absolute;inset:0;display:flex}
  .kli07-col{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:space-around;padding:14px 0}
  .kli07-col.div{border-left:1px solid rgba(200,169,81,.3)}
  .kli07-mark{width:34px;height:34px;display:flex;align-items:center;justify-content:center;
    transition:transform .45s cubic-bezier(.2,.8,.2,1),opacity .45s}
  .kli07-mark svg{width:100%;height:100%;display:block}
  .kli07-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#e6cf86;opacity:.46;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/klimt/07-byzantine-counterpoint.html",
 "title": "Byzantine Counterpoint",
 "description": "Two SVG columns of spirals, eyes, and triangles in gold and malachite cycle motifs and counter-rotate every 900ms in phase-shifted counterpoint.",
 "useWhen": "Decorative ambient panels, art-deco or Klimt-themed hero sections, museum or gallery UI backgrounds.",
 "avoidWhen": "Contexts needing fast feedback or interactivity; the slow step cadence looks broken in busy, content-heavy layouts.",
 "agentPrompt": "Change GOLD to '#d4af37' and MALA to '#2e8b57', add a third column, and speed the tick interval from 900ms to 600ms.",
 "editableAreas": [
  "tick interval (acc>900)",
  "gold color (GOLD='#c8a951')",
  "malachite color (MALA='#1f6b4f')",
  "motifs array order [SP,EYE,TRI,EYE,SP]",
  "rotation step per tick (step*30 deg)",
  "mark scale values (1.1 / 0.92)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (REDUCED branch)",
  "visibilitychange pause/resume",
  "aria-label on stage element"
 ],
 "knownLimitations": [
  "900ms interval feels sluggish — motion won't be apparent until the second tick",
  "Only two columns; layout is hardcoded and not responsive to arbitrary column counts"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "klimt",
  "ornamental",
  "counterpoint",
  "gold",
  "byzantine",
  "motif",
  "loop"
 ]
}
</script>
</head>
<body>
<div id="kli07-stage" role="img" aria-label="Two ornamental columns in counterpoint, gold against malachite, trade spiral, eye and triangle motifs in tempo as they scale and counter-rotate against each other.">
  <div class="kli07-wrap" id="kli07-wrap"></div>
</div>
<div class="kli07-cap">Byzantine Counterpoint</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const wrap=document.getElementById('kli07-wrap'); if(!wrap) return;
  const GOLD='#c8a951', MALA='#1f6b4f';
  const SP=(col)=>'<svg viewBox="0 0 40 40"><g fill="none" stroke="'+col+'" stroke-width="2"><path d="M20 20 m0,-2 a2,2 0 1,1 -2,2 a6,6 0 1,1 6,-6 a10,10 0 1,1 -10,10 a14,14 0 1,1 14,-14"/></g></svg>';
  const EYE=(col)=>'<svg viewBox="0 0 40 40"><ellipse cx="20" cy="20" rx="16" ry="9" fill="none" stroke="'+col+'" stroke-width="2"/><circle cx="20" cy="20" r="5.5" fill="'+col+'"/><circle cx="20" cy="20" r="2" fill="#0d0b07"/></svg>';
  const TRI=(col)=>'<svg viewBox="0 0 40 40"><path d="M20 5 L34 32 L6 32 Z" fill="none" stroke="'+col+'" stroke-width="2"/><path d="M20 16 L27 30 L13 30 Z" fill="'+col+'"/></svg>';
  const motifs=[SP,EYE,TRI,EYE,SP];
  const N=motifs.length;
  function buildCol(divider, primary){
    const col=document.createElement('div');
    col.className='kli07-col'+(divider?' div':'');
    const marks=[];
    for(let i=0;i<N;i++){
      const m=document.createElement('div');m.className='kli07-mark';
      col.appendChild(m);marks.push(m);
    }
    wrap.appendChild(col);
    return {marks, primary};
  }
  const left=buildCol(false,GOLD);
  const right=buildCol(true,MALA);
  function render(side, step){
    side.marks.forEach((m,i)=>{
      const idx=((i+step)%N+N)%N;
      m.innerHTML=motifs[idx](side.primary);
    });
  }
  if(REDUCED){ render(left,0);render(right,2); return; }
  let last=performance.now(),acc=0,step=0;
  function tick(){
    if(!running) return;
    const now=performance.now();const dt=now-last;last=now;acc+=dt;
    if(acc>900){
      acc=0;
      render(left,step);
      render(right,N-step);
      left.marks.forEach((m,i)=>{ m.style.transform='scale('+(i%2?1.1:0.92)+') rotate('+(step*30)+'deg)'; m.style.opacity=i%2?'1':'0.7'; });
      right.marks.forEach((m,i)=>{ m.style.transform='scale('+(i%2?0.92:1.1)+') rotate('+(-step*30)+'deg)'; m.style.opacity=i%2?'0.7':'1'; });
      step++;
    }
    raf=requestAnimationFrame(tick);
  }
  let raf=0, running=false;
  function start(){ if(running) return; running=true; last=performance.now(); raf=requestAnimationFrame(tick); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
  render(left,0);render(right,N);
  document.addEventListener('visibilitychange', ()=>{ if(document.hidden) stop(); else start(); });
  start();
})();
</script>
</body>
</html>
