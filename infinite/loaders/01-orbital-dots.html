<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Three glowing iris, cyan and magenta dots orbit elliptical rings around a pulsing white core on a dark space backdrop.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Orbital Dots</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-900:#08090d;
  --text-0:#f4f6fb;
  --accent-iris:#7c5cff; --accent-cyan:#22d3ee; --accent-magenta:#ff5ca8;
  --border-soft:rgba(255,255,255,0.07);
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden}
body{
  background:var(--bg-900);
  background-image:
    radial-gradient(60vw 40vw at 15% -10%,rgba(124,92,255,.16),transparent 60%),
    radial-gradient(50vw 40vw at 90% 0%,rgba(34,211,238,.16),transparent 55%);
  display:grid;place-items:center;
}
.c01-orbit{position:relative;width:min(46vmin,180px);aspect-ratio:1;display:grid;place-items:center}
.c01-orbit__ring{position:absolute;inset:0;display:grid;place-items:center;
  animation:c01-orbit-spin 3.2s linear infinite}
.c01-orbit__ring--a{transform:rotate(0deg)}
.c01-orbit__ring--b{transform:rotate(60deg);animation-duration:4s;animation-direction:reverse}
.c01-orbit__ring--c{transform:rotate(120deg);animation-duration:2.6s}
.c01-orbit__path{position:absolute;width:93%;height:42%;border:1px solid var(--border-soft);border-radius:50%}
.c01-orbit__dot{position:absolute;width:8%;height:8%;border-radius:50%;top:50%;left:0;margin-top:-4%;
  will-change:transform;animation:c01-orbit-trace 3.2s linear infinite}
.c01-orbit__ring--a .c01-orbit__dot{background:var(--accent-iris);box-shadow:0 0 14px var(--accent-iris)}
.c01-orbit__ring--b .c01-orbit__dot{background:var(--accent-cyan);box-shadow:0 0 14px var(--accent-cyan);animation-duration:4s;animation-direction:reverse}
.c01-orbit__ring--c .c01-orbit__dot{background:var(--accent-magenta);box-shadow:0 0 14px var(--accent-magenta);animation-duration:2.6s}
.c01-orbit__core{width:9%;height:9%;border-radius:50%;background:var(--text-0);
  box-shadow:0 0 18px rgba(255,255,255,0.6);animation:c01-orbit-pulse 2.4s cubic-bezier(.65,0,.35,1) infinite}
@keyframes c01-orbit-spin{to{transform:rotate(360deg)}}
/* translateX (compositor) instead of animating `left` (layout every frame).
   Dot is 8% of container, travel is 92% of container => 92/8 = 1150% of dot. */
@keyframes c01-orbit-trace{from{transform:translateX(0)}50%{transform:translateX(1150%)}to{transform:translateX(0)}}
@keyframes c01-orbit-pulse{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.35);opacity:1}}
.cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 "Space Grotesk",ui-monospace,monospace;
  color:#22d3ee;opacity:.45;letter-spacing:.08em;text-transform:uppercase;user-select:none}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms!important;animation-iteration-count:1!important}
}
</style>
<script type="application/json" id="forever-agent-meta">

 "description": "Three glowing dots orbit elliptical rings at varied speeds around a pulsing white core; iris, cyan, and magenta on a dark space background.",
 "useWhen": "Loading screens, async operation indicators, dark-theme apps needing a polished spinner with visual depth.",

 "editableAreas": [

  "ring speeds (animation-duration on each ring)",
  "dot size (8% width/height)",

  "ring tilt angles (rotate values on --b and --c)"
 ],
 "preserveElements": [
  "visibilitychange pause handler in IIFE",
  "prefers-reduced-motion guard",
  "compositor-friendly translateX on c01-orbit-trace (not left)",
  "c01-orbit namespace prefix on all classes"
 ],
 "knownLimitations": [

  "Dots travel on a single fixed ellipse per ring; no 3D perspective illusion"

 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",

  "minimal-deps"

 ]

</head>
<body>
<div class="c01-orbit" role="img" aria-label="Orbital dots spinner">
  <div class="c01-orbit__ring c01-orbit__ring--a"><span class="c01-orbit__path"></span><span class="c01-orbit__dot"></span></div>
  <div class="c01-orbit__ring c01-orbit__ring--b"><span class="c01-orbit__path"></span><span class="c01-orbit__dot"></span></div>
  <div class="c01-orbit__ring c01-orbit__ring--c"><span class="c01-orbit__path"></span><span class="c01-orbit__dot"></span></div>
  <span class="c01-orbit__core"></span>
</div>
<div class="cap">Orbital Dots</div>
<script>
(function(){
  // CSS-only animation; pause on hidden tab to save cycles
  var root=document.querySelector('.c01-orbit');
  function vis(){root.style.animationPlayState=document.hidden?'paused':'running';
    root.querySelectorAll('*').forEach(function(n){n.style.animationPlayState=document.hidden?'paused':'running';});}
  document.addEventListener('visibilitychange',vis);vis();
})();
</script>
</body>
</html>
