<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="An aurora-gradient blob slowly morphs its rounded shape and rotates with an inset ghost layer, glowing on a dark backdrop.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Morphing Blob</title>
<style>
:root{
  --bg-900:#08090d; --bg-600:#181b27;
  --accent-iris:#7c5cff; --accent-cyan:#22d3ee; --accent-magenta:#ff5ca8;
  --grad-aurora:linear-gradient(135deg,var(--accent-iris) 0%,var(--accent-magenta) 55%,var(--accent-cyan) 100%);
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden}
body{
  background:var(--bg-900);
  background-image:
    radial-gradient(60vw 40vw at 15% -10%,rgba(124,92,255,.16),transparent 60%),
    radial-gradient(50vw 40vw at 90% 0%,rgba(34,211,238,.16),transparent 55%);
  display:grid;place-items:center;
}
.c02-blob{position:relative;width:min(34vmin,150px);aspect-ratio:1}
.c02-blob__shape{position:absolute;inset:0;background:var(--grad-aurora);
  border-radius:42% 58% 63% 37% / 41% 44% 56% 59%;
  animation:c02-blob-morph 6s cubic-bezier(.65,0,.35,1) infinite,c02-blob-rot 9s linear infinite;
  box-shadow:0 0 40px -8px rgba(124,92,255,0.6);filter:saturate(1.1)}
.c02-blob__shape--ghost{inset:11%;background:var(--bg-600);
  border-radius:58% 42% 37% 63% / 56% 59% 41% 44%;
  animation:c02-blob-morph2 6s cubic-bezier(.65,0,.35,1) infinite,c02-blob-rot 9s linear infinite reverse;
  box-shadow:none;filter:none}
@keyframes c02-blob-morph{
  0%,100%{border-radius:42% 58% 63% 37% / 41% 44% 56% 59%}
  33%{border-radius:63% 37% 41% 59% / 57% 63% 37% 43%}
  66%{border-radius:38% 62% 56% 44% / 63% 38% 62% 37%}}
@keyframes c02-blob-morph2{
  0%,100%{border-radius:58% 42% 37% 63% / 56% 59% 41% 44%}
  33%{border-radius:37% 63% 59% 41% / 43% 37% 63% 57%}
  66%{border-radius:62% 38% 44% 56% / 37% 62% 38% 63%}}
@keyframes c02-blob-rot{to{transform:rotate(360deg)}}
.cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
  color:#22d3ee;opacity:.45;letter-spacing:.08em;text-transform:uppercase;user-select:none}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms!important;animation-iteration-count:1!important}
}
</style>

</head>
<body>
<div class="c02-blob" role="img" aria-label="Morphing blob loader">
  <span class="c02-blob__shape"></span>
  <span class="c02-blob__shape c02-blob__shape--ghost"></span>
</div>
<div class="cap">Morphing Blob</div>
<script>
(function(){
  var nodes=document.querySelectorAll('.c02-blob__shape');
  function vis(){var s=document.hidden?'paused':'running';nodes.forEach(function(n){n.style.animationPlayState=s;});}
  document.addEventListener('visibilitychange',vis);vis();
})();
</script>
</body>
