<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Circular gauge with an iris-to-cyan liquid that waves and rises behind a centered 68% percentage label.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Liquid Fill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-900:#08090d; --bg-surface:#1c2030;
  --text-0:#f4f6fb;
  --accent-iris:#7c5cff; --accent-cyan:#22d3ee;
  --grad-iris-cyan:linear-gradient(120deg,var(--accent-iris),var(--accent-cyan));
  --border-mid:rgba(255,255,255,0.12);
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden}
body{
  background:var(--bg-900);
  background-image:
    radial-gradient(60vw 40vw at 15% -10%,rgba(124,92,255,.16),transparent 60%),
    radial-gradient(50vw 40vw at 90% 0%,rgba(34,211,238,.16),transparent 55%);
  display:grid;place-items:center;
}
.c03-liquid{position:relative;width:min(34vmin,150px);aspect-ratio:1;border-radius:50%;
  border:1px solid var(--border-mid);overflow:hidden;display:grid;place-items:center;background:var(--bg-surface)}
.c03-liquid__fill{position:absolute;left:-25%;bottom:-55%;width:150%;height:150%;
  background:var(--grad-iris-cyan);border-radius:43% 47% 0 0;opacity:.9;
  animation:c03-liquid-rise 5.5s cubic-bezier(.65,0,.35,1) infinite,c03-liquid-wave 3s linear infinite}
.c03-liquid__fill::after{content:"";position:absolute;inset:0;background:var(--grad-iris-cyan);
  border-radius:47% 43% 0 0;opacity:.5;animation:c03-liquid-wave 2.2s linear infinite reverse}
.c03-liquid__label{position:relative;z-index:2;font-family:"Space Grotesk",system-ui,sans-serif;
  font-weight:600;font-size:clamp(18px,5vmin,24px);color:var(--text-0);text-shadow:0 1px 6px rgba(0,0,0,.5)}
@keyframes c03-liquid-rise{
  0%{transform:translateY(30%) rotate(0deg)}
  50%{transform:translateY(-30%) rotate(180deg)}
  100%{transform:translateY(30%) rotate(360deg)}}
@keyframes c03-liquid-wave{to{transform:rotate(360deg)}}
.cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 "Space Grotesk",ui-monospace,monospace;
  color:#22d3ee;opacity:.45;letter-spacing:.08em;text-transform:uppercase;user-select:none}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms!important;animation-iteration-count:1!important}
  .c03-liquid__fill{transform:translateY(40%)}
}
</style>
</head>
<body>
<div class="c03-liquid" role="img" aria-label="Liquid fill progress">
  <span class="c03-liquid__fill"></span>
  <span class="c03-liquid__label">68%</span>
</div>
<div class="cap">Liquid Fill</div>
<script>
(function(){
  var fill=document.querySelector('.c03-liquid__fill');
  function vis(){fill.style.animationPlayState=document.hidden?'paused':'running';}
  document.addEventListener('visibilitychange',vis);vis();
})();
</script>
</body>
</html>
