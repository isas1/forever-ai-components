<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Dark content-placeholder card with avatar circle and text bars, swept by a looping iris-to-cyan shimmer gradient.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Skeleton Shimmer</title>
<style>
:root{
  --bg-900:#08090d; --bg-surface:#1c2030;
  --r-sm:8px;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden}
body{
  background:var(--bg-900);
  background-image:
    radial-gradient(60vw 40vw at 15% -10%,rgba(124,92,255,.16),transparent 60%),
    radial-gradient(50vw 40vw at 90% 0%,rgba(34,211,238,.16),transparent 55%);
  display:grid;place-items:center;padding:24px;
}
.c05-skel{width:min(70vmin,240px);display:flex;flex-direction:column;gap:12px}
.c05-skel__row{display:flex;gap:12px;align-items:center}
.c05-skel__bone{position:relative;border-radius:var(--r-sm);background:var(--bg-surface);overflow:hidden}
.c05-skel__bone::after{content:"";position:absolute;inset:0;transform:translateX(-100%);
  background:linear-gradient(90deg,transparent,rgba(124,92,255,.22) 40%,rgba(34,211,238,.22) 60%,transparent);
  animation:c05-skel-sweep 1.8s cubic-bezier(.65,0,.35,1) infinite}
.c05-skel__avatar{width:44px;height:44px;border-radius:50%;flex:0 0 auto}
.c05-skel__line{height:12px;flex:1}
.c05-skel__line--sm{height:10px;width:60%}
.c05-skel__block{height:14px}
.c05-skel__block--w80{width:80%}
.c05-skel__block--w95{width:95%}
.c05-skel__block--w60{width:60%}
.c05-skel__bone:nth-child(2)::after{animation-delay:.15s}
.c05-skel__block:nth-child(2)::after{animation-delay:.2s}
.c05-skel__block:nth-child(3)::after{animation-delay:.35s}
@keyframes c05-skel-sweep{0%{transform:translateX(-100%)}60%,100%{transform:translateX(100%)}}
.cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
  color:#22d3ee;opacity:.45;letter-spacing:.08em;text-transform:uppercase;user-select:none}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms!important;animation-iteration-count:1!important}
}
</style>
</head>
<body>
<div class="c05-skel" role="img" aria-label="Skeleton shimmer placeholder">
  <div class="c05-skel__row">
    <span class="c05-skel__bone c05-skel__avatar"></span>
    <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
      <span class="c05-skel__bone c05-skel__line"></span>
      <span class="c05-skel__bone c05-skel__line c05-skel__line--sm"></span>
    </div>
  </div>
  <span class="c05-skel__bone c05-skel__block c05-skel__block--w95"></span>
  <span class="c05-skel__bone c05-skel__block c05-skel__block--w80"></span>
  <span class="c05-skel__bone c05-skel__block c05-skel__block--w60"></span>
</div>
<div class="cap">Skeleton Shimmer</div>
<script>
(function(){
  var bones=document.querySelectorAll('.c05-skel__bone');
  function vis(){var s=document.hidden?'paused':'running';
    bones.forEach(function(n){n.style.setProperty('--ps',s);});
    // pseudo-element animation play-state via inline style on host is not possible;
    // toggle a class instead
    document.querySelector('.c05-skel').classList.toggle('paused',document.hidden);}
  document.addEventListener('visibilitychange',vis);vis();
})();
</script>
<style>.c05-skel.paused .c05-skel__bone::after{animation-play-state:paused}</style>
</body>
</html>
