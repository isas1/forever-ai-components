<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Concentric cyan, iris and magenta rings ripple outward from a beating gradient core on a dark backdrop.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Concentric Pulse</title>
<style>
:root{
  --bg-900:#08090d;
  --accent-iris:#7c5cff; --accent-cyan:#22d3ee; --accent-magenta:#ff5ca8;
  --grad-iris-cyan:linear-gradient(120deg,var(--accent-iris),var(--accent-cyan));
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden}
body{
  background:var(--bg-900);
  background-image:
    radial-gradient(60vw 40vw at 15% -10%,rgba(124,92,255,.16),transparent 60%),
    radial-gradient(50vw 40vw at 90% 0%,rgba(34,211,238,.16),transparent 55%);
  display:grid;place-items:center;
}
.c07-ripple{position:relative;width:min(40vmin,170px);aspect-ratio:1;display:grid;place-items:center}
.c07-ripple__wave{position:absolute;width:100%;height:100%;border-radius:50%;
  border:2px solid var(--accent-cyan);opacity:0;animation:c07-ripple-out 2.6s cubic-bezier(.22,1,.36,1) infinite}
.c07-ripple__wave:nth-child(2){animation-delay:.65s;border-color:var(--accent-iris)}
.c07-ripple__wave:nth-child(3){animation-delay:1.3s;border-color:var(--accent-magenta)}
.c07-ripple__wave:nth-child(4){animation-delay:1.95s;border-color:var(--accent-cyan)}
.c07-ripple__core{position:relative;z-index:2;width:13%;height:13%;border-radius:50%;
  background:var(--grad-iris-cyan);box-shadow:0 0 24px -2px var(--accent-iris);
  animation:c07-ripple-beat 2.6s cubic-bezier(.65,0,.35,1) infinite}
@keyframes c07-ripple-out{0%{transform:scale(.18);opacity:.9}100%{transform:scale(1);opacity:0}}
@keyframes c07-ripple-beat{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
.cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
  color:#22d3ee;opacity:.45;letter-spacing:.08em;text-transform:uppercase;user-select:none}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms!important;animation-iteration-count:1!important}
}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/loaders/07-concentric-pulse.html",

 "description": "Four concentric rings ripple outward in staggered cyan, iris, and magenta waves from a beating gradient core dot on a dark background.",
 "useWhen": "Loading states, processing indicators, or ambient backgrounds where a looping radial pulse fits the brand (dark-mode, tech, neon themes).",
 "avoidWhen": "Light backgrounds (hardcoded dark body color). Contexts requiring a determinate progress indicator — this communicates indeterminate loading only.",
 "agentPrompt": "Change the accent colors: set --accent-cyan to #00ff99 and --accent-magenta to #ff9900, then slow the ripple cycle to 3.6s by editing animation-duration on .c07-ripple__wave.",
 "editableAreas": [
  "ripple cycle duration (2.6s in animation shorthand)",
  "ring colors (--accent-iris, --accent-cyan, --accent-magenta)",
  "core size (13% width/height)",
  "stagger delay between waves (.65s increments)",
  "core glow spread (box-shadow 24px)"
 ],
 "preserveElements": [
  "visibilitychange pause in IIFE",
  "prefers-reduced-motion guard",
  "role=img + aria-label on wrapper",
  "nth-child stagger delays"
 ],

 ],

  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "loader",

  "concentric",
  "rings",
  "pulse",
  "ambient"
 ]

</head>
<body>
<div class="c07-ripple" role="img" aria-label="Pulsing concentric rings">
  <span class="c07-ripple__wave"></span>
  <span class="c07-ripple__wave"></span>
  <span class="c07-ripple__wave"></span>
  <span class="c07-ripple__wave"></span>
  <span class="c07-ripple__core"></span>
</div>
<div class="cap">Concentric Pulse</div>
<script>
(function(){
  var nodes=document.querySelectorAll('.c07-ripple > *');
  function vis(){var s=document.hidden?'paused':'running';nodes.forEach(function(n){n.style.animationPlayState=s;});}
  document.addEventListener('visibilitychange',vis);vis();
})();
</script>
</body>
</html>
