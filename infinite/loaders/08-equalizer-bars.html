<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Seven rounded iris-to-cyan gradient bars bounce up and down at staggered offsets like an audio equalizer.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Equalizer Bars</title>
<style>
:root{
  --bg-900:#08090d;
  --accent-iris:#7c5cff; --accent-cyan:#22d3ee;
  --grad-iris-cyan:linear-gradient(120deg,var(--accent-iris),var(--accent-cyan));
  --r-pill:999px;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden}
body{
  background:var(--bg-900);
  background-image:
    radial-gradient(60vw 40vw at 15% -10%,rgba(124,92,255,.16),transparent 60%),
    radial-gradient(50vw 40vw at 90% 0%,rgba(34,211,238,.16),transparent 55%);
  display:grid;place-items:center;
}
.c08-eq{display:flex;align-items:flex-end;gap:clamp(5px,1.6vmin,9px);height:min(34vmin,130px)}
.c08-eq__bar{width:clamp(7px,2vmin,11px);border-radius:var(--r-pill);background:var(--grad-iris-cyan);
  transform-origin:bottom;animation:c08-eq-bounce 1.1s cubic-bezier(.65,0,.35,1) infinite;
  box-shadow:0 0 12px -2px rgba(34,211,238,.6)}
.c08-eq__bar:nth-child(1){height:60%;animation-delay:-.9s}
.c08-eq__bar:nth-child(2){height:90%;animation-delay:-.2s}
.c08-eq__bar:nth-child(3){height:45%;animation-delay:-.5s}
.c08-eq__bar:nth-child(4){height:100%;animation-delay:-.7s}
.c08-eq__bar:nth-child(5){height:70%;animation-delay:-.1s}
.c08-eq__bar:nth-child(6){height:85%;animation-delay:-.4s}
.c08-eq__bar:nth-child(7){height:50%;animation-delay:-.8s}
@keyframes c08-eq-bounce{0%,100%{transform:scaleY(.28)}50%{transform:scaleY(1)}}
.cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
  color:#22d3ee;opacity:.45;letter-spacing:.08em;text-transform:uppercase;user-select:none}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms!important;animation-iteration-count:1!important}
  .c08-eq__bar{transform:scaleY(.7)}
}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/loaders/08-equalizer-bars.html",
 "title": "Equalizer Bars",
 "description": "Seven pill-shaped iris-to-cyan gradient bars bounce at staggered offsets, mimicking an audio equalizer. Pure CSS scaleY animation.",
 "useWhen": "Music apps, audio players, loading states, or any context where an audio/media metaphor fits the brand.",
 "avoidWhen": "Static content pages or contexts where looping motion distracts from primary content; reduced-motion users get a near-static fallback only.",
 "agentPrompt": "Change bar count to 5 by removing 2 span elements, set --accent-iris to #ff3b6b and --accent-cyan to #ff9f43, slow the bounce to 1.6s.",
 "editableAreas": [
  "bar count (number of .c08-eq__bar spans)",
  "animation duration (1.1s in animation shorthand)",
  "gradient colors (--accent-iris, --accent-cyan)",
  "bar height percentages per nth-child",
  "gap between bars (clamp gap value)"
 ],
 "preserveElements": [
  "visibilitychange pause in IIFE",
  "prefers-reduced-motion guard",
  "c08- namespaced class prefix (avoids conflicts)",
  "transform-origin:bottom on bars"
 ],
 "knownLimitations": [
  "Reduced-motion fallback freezes bars mid-animation rather than removing them — not fully static",
  "Bar heights are hardcoded per nth-child — adding/removing bars requires manual height assignment"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "equalizer",
  "loader",
  "bars",
  "audio",
  "gradient",
  "loop",
  "ui"
 ]
}
</script>
</head>
<body>
<div class="c08-eq" role="img" aria-label="Audio equalizer bars">
  <span class="c08-eq__bar"></span>
  <span class="c08-eq__bar"></span>
  <span class="c08-eq__bar"></span>
  <span class="c08-eq__bar"></span>
  <span class="c08-eq__bar"></span>
  <span class="c08-eq__bar"></span>
  <span class="c08-eq__bar"></span>
</div>
<div class="cap">Equalizer Bars</div>
<script>
(function(){
  var bars=document.querySelectorAll('.c08-eq__bar');
  function vis(){var s=document.hidden?'paused':'running';bars.forEach(function(n){n.style.animationPlayState=s;});}
  document.addEventListener('visibilitychange',vis);vis();
})();
</script>
</body>
</html>
