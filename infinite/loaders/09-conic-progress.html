<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Circular conic-gradient progress ring with a blurred cyan glow filling 0 to 100 percent and a live numeric counter.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Conic Progress</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-900:#08090d; --bg-600:#181b27;
  --text-0:#f4f6fb; --text-2:#8a91a8;
  --accent-iris:#7c5cff; --accent-cyan:#22d3ee;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden}
body{
  background:var(--bg-900);
  background-image:
    radial-gradient(60vw 40vw at 15% -10%,rgba(124,92,255,.16),transparent 60%),
    radial-gradient(50vw 40vw at 90% 0%,rgba(34,211,238,.16),transparent 55%);
  display:grid;place-items:center;
}
.c09-ring{position:relative;width:min(40vmin,170px);aspect-ratio:1;border-radius:50%;
  display:grid;place-items:center;
  background:conic-gradient(var(--accent-iris) calc(var(--c09-pct,0)*1%),rgba(255,255,255,.06) 0);
  transition:background .1s linear}
.c09-ring::before{content:"";position:absolute;inset:12px;border-radius:50%;background:var(--bg-600);
  box-shadow:inset 0 0 20px -8px rgba(124,92,255,.5)}
.c09-ring__glow{position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(var(--accent-cyan) calc(var(--c09-pct,0)*1%),transparent 0);
  filter:blur(8px);opacity:.45;transition:background .1s linear}
.c09-ring__num{position:relative;z-index:2;font-family:"Space Grotesk",system-ui,sans-serif;
  font-weight:700;font-size:clamp(24px,8vmin,32px);color:var(--text-0);letter-spacing:-.02em}
.c09-ring__num span{font-size:.55em;color:var(--text-2);font-weight:500}
.cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 "Space Grotesk",ui-monospace,monospace;
  color:#22d3ee;opacity:.45;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/loaders/09-conic-progress.html",
 "title": "Conic Progress",
 "description": "A circular conic-gradient ring fills from 0–100% with an iris arc and a blurred cyan glow layer; a live numeric counter updates in sync.",
 "useWhen": "Loading screens, file upload progress, onboarding steps — anywhere a single prominent percentage needs ambient drama.",
 "avoidWhen": "Contexts needing multiple simultaneous progress rings; the hardcoded dark background makes it unsuitable for light-mode UIs.",
 "agentPrompt": "Change the fill color from iris to amber by setting --accent-iris to #f59e0b and --accent-cyan to #fcd34d, then increase the cycle duration from 2600ms to 4000ms (RUN variable).",
 "editableAreas": [
  "accent colors (--accent-iris, --accent-cyan)",
  "cycle duration (RUN=2600, HOLD=900)",
  "ring size (min(40vmin,170px))",
  "glow blur intensity (filter:blur(8px))",
  "inner track inset (inset:12px in ::before)"
 ],
 "preserveElements": [
  "setPct() dirty-check (lastWhole guard) — avoids full repaint every frame",
  "IIFE wrapper",
  "visibilitychange pause/play",
  "prefers-reduced-motion static fallback"
 ],
 "knownLimitations": [
  "Background color hardcoded to dark navy — must edit CSS vars to use in light-mode layouts",
  "CSS transition on conic-gradient (background) is not hardware-accelerated — avoid on very low-end devices"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "loader",
  "progress",
  "conic-gradient",
  "counter",
  "glow",
  "ring",
  "css"
 ]
}
</script>
</head>
<body>
<div class="c09-ring" id="c09-ring" role="img" aria-label="Conic gradient ring progress">
  <span class="c09-ring__glow"></span>
  <span class="c09-ring__num" id="c09-num">0<span>%</span></span>
</div>
<div class="cap">Conic Progress</div>
<script>
(function(){
  var ring=document.getElementById('c09-ring'), num=document.getElementById('c09-num');
  if(!ring||!num) return;
  var glow=ring.querySelector('.c09-ring__glow');
  var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  var lastWhole=-1;
  function setPct(p){
    // Only touch the (paint-heavy) conic gradients + glow blur when the
    // rounded percent actually changes — avoids a full repaint every frame.
    var w=Math.round(p);
    if(w===lastWhole)return;
    lastWhole=w;
    ring.style.setProperty('--c09-pct',w);
    if(glow) glow.style.setProperty('--c09-pct',w);
    num.firstChild.nodeValue=String(w);
  }
  if(reduce){setPct(72);return;}
  var start=null, HOLD=900, RUN=2600, raf;
  function loop(ts){
    if(start===null)start=ts;
    var cycle=RUN+HOLD, t=(ts-start)%cycle, p;
    if(t<RUN){var k=t/RUN;p=(1-Math.pow(1-k,3))*100;}else{p=100;}
    setPct(p);raf=requestAnimationFrame(loop);
  }
  function play(){if(!raf&&!document.hidden){raf=requestAnimationFrame(loop);}}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',function(){document.hidden?stop():play();});
  play();
})();
</script>
</body>
</html>
