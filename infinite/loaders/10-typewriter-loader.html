<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Terminal-style card with traffic-light dots typing and erasing cyan status messages after a $ prompt with blinking caret.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Typewriter Loader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg-900:#08090d; --bg-700:#12141d; --bg-surface:#1c2030;
  --text-0:#f4f6fb; --text-3:#565d73;
  --accent-iris:#7c5cff; --accent-cyan:#22d3ee; --accent-magenta:#ff5ca8;
  --border-soft:rgba(255,255,255,0.07);
  --r-md:14px;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden}
body{
  background:var(--bg-900);
  background-image:
    radial-gradient(60vw 40vw at 15% -10%,rgba(124,92,255,.16),transparent 60%),
    radial-gradient(50vw 40vw at 90% 0%,rgba(34,211,238,.16),transparent 55%);
  display:grid;place-items:center;padding:24px;
}
.c10-type{width:min(74vmin,260px);font-family:"Space Grotesk",ui-monospace,monospace;
  background:var(--bg-surface);border:1px solid var(--border-soft);border-radius:var(--r-md);
  padding:18px 18px 16px;box-shadow:inset 0 0 28px -16px rgba(124,92,255,.6)}
.c10-type__bar{display:flex;gap:6px;margin-bottom:14px}
.c10-type__dot{width:9px;height:9px;border-radius:50%;background:var(--bg-700)}
.c10-type__dot:nth-child(1){background:var(--accent-magenta)}
.c10-type__dot:nth-child(2){background:var(--accent-iris)}
.c10-type__dot:nth-child(3){background:var(--accent-cyan)}
.c10-type__line{font-size:14px;line-height:1.7;color:var(--accent-cyan);min-height:1.7em;
  white-space:pre-wrap;word-break:break-word}
.c10-type__prompt{color:var(--text-3)}
.c10-type__txt{color:var(--text-0)}
.c10-type__caret{display:inline-block;width:8px;height:1.05em;margin-left:1px;
  vertical-align:text-bottom;background:var(--accent-iris);animation:c10-type-blink 1s steps(1) infinite}
@keyframes c10-type-blink{0%,50%{opacity:1}50.01%,100%{opacity:0}}
.cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 "Space Grotesk",ui-monospace,monospace;
  color:#22d3ee;opacity:.45;letter-spacing:.08em;text-transform:uppercase;user-select:none}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms!important;animation-iteration-count:1!important}
  .c10-type__caret{opacity:1}
}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/loaders/10-typewriter-loader.html",
 "title": "Typewriter Loader",
 "description": "Terminal card with traffic-light dots cycles through status phrases typing and erasing character-by-character after a $ prompt with a blinking iris caret.",
 "useWhen": "Loading screens, build/compile progress indicators, developer-tool or CLI-themed UIs needing ambient status text.",
 "avoidWhen": "Non-technical or consumer-facing contexts where terminal aesthetics feel out of place. Avoid when progress must map to real state.",
 "agentPrompt": "Change the status phrases in the frames array to ['building assets...','minifying...','done!'], set TYPE speed to 40ms, and change accent-cyan to #00ff99.",
 "editableAreas": [
  "status phrases (frames array)",
  "type/erase speed (TYPE=55, ERASE=30)",
  "hold durations (HOLD_FULL=1100, HOLD_EMPTY=280)",
  "accent colors (--accent-cyan, --accent-iris, --accent-magenta)",
  "card width (min(74vmin,260px))"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (static first frame fallback)",
  "visibilitychange stop/play handlers"
 ],
 "knownLimitations": [
  "Purely decorative — not wired to real async state; remove loop and drive fi/ci externally for production use",
  "Card width capped at 260px; long phrases may wrap unexpectedly"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "typewriter",
  "terminal",
  "loader",
  "text-animation",
  "css",
  "monospace",
  "status"
 ]
}
</script>
</head>
<body>
<div class="c10-type" role="img" aria-label="Typewriter ASCII text loader">
  <div class="c10-type__bar">
    <span class="c10-type__dot"></span>
    <span class="c10-type__dot"></span>
    <span class="c10-type__dot"></span>
  </div>
  <div class="c10-type__line"><span class="c10-type__prompt">$ </span><span class="c10-type__txt" id="c10-txt"></span><span class="c10-type__caret" id="c10-caret"></span></div>
</div>
<div class="cap">Typewriter Loader</div>
<script>
(function(){
  var el=document.getElementById('c10-txt'), caret=document.getElementById('c10-caret');
  if(!el) return;
  var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  var frames=['compiling shaders...','warming the aurora...','allocating particles...','rendering loaders...','almost there...'];
  if(reduce){el.textContent=frames[0];return;}
  var fi=0,ci=0,typing=true,last=0,raf;
  var TYPE=55,ERASE=30,HOLD_FULL=1100,HOLD_EMPTY=280;
  function tick(ts){
    if(!last)last=ts;
    var dt=ts-last, word=frames[fi];
    if(typing){
      if(dt>=TYPE){last=ts;ci++;el.textContent=word.slice(0,ci);
        if(ci>=word.length){typing=false;last=ts+HOLD_FULL;}}
    }else{
      if(dt>=ERASE){last=ts;ci--;el.textContent=word.slice(0,Math.max(0,ci));
        if(ci<=0){typing=true;fi=(fi+1)%frames.length;last=ts+HOLD_EMPTY;}}
    }
    raf=requestAnimationFrame(tick);
  }
  function play(){if(!raf&&!document.hidden){last=0;raf=requestAnimationFrame(tick);
    caret.style.animationPlayState='running';}}
  function stop(){cancelAnimationFrame(raf);raf=0;caret.style.animationPlayState='paused';}
  document.addEventListener('visibilitychange',function(){document.hidden?stop():play();});
  play();
})();
</script>
</body>
</html>
