<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A boiling coffee pot loader with dripping liquid and rising steam.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Boiling Coffee Pot</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#08090d}
  body{
    display:grid;place-items:center;
    background-image:
      radial-gradient(60vw 40vw at 15% -10%,rgba(124,92,255,.16),transparent 60%),
      radial-gradient(50vw 40vw at 90% 0%,rgba(34,211,238,.16),transparent 55%);
  }
  .c13-coffee {
    width: 100px; height: 120px;
  }
  .c13-machine {
    fill: none;
    stroke: #ff5ca8;
    stroke-width: 3.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 6px rgba(255,92,168,0.5));
  }
  .c13-drip {
    fill: #22d3ee;
    animation: c13-dripping 1.6s cubic-bezier(0.4, 0, 1, 1) infinite;
  }
  .c13-liquid {
    fill: #22d3ee;
    transform-origin: 50px 88px;
    animation: c13-fill-up 8s ease-in-out infinite;
  }
  .c13-steam {
    fill: none;
    stroke: rgba(255, 255, 255, 0.45);
    stroke-width: 2.5;
    stroke-linecap: round;
    animation: c13-steaming 2s ease-in-out infinite;
  }
  .c13-steam--2 {
    animation-delay: 0.7s;
  }
  @keyframes c13-dripping {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    40% { transform: translateY(28px) scale(0.8); opacity: 1; }
    40.1%, 100% { opacity: 0; }
  }
  @keyframes c13-fill-up {
    0%, 100% { transform: scaleY(0.1); }
    50% { transform: scaleY(0.95); }
  }
  @keyframes c13-steaming {
    0% { stroke-dasharray: 0, 30; stroke-dashoffset: 0; opacity: 0; }
    50% { stroke-dasharray: 15, 15; stroke-dashoffset: -10; opacity: 1; }
    100% { stroke-dasharray: 0, 30; stroke-dashoffset: -25; opacity: 0; }
  }
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 "Space Grotesk",ui-monospace,monospace;
    color:#ff5ca8;opacity:.45;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){
    .c13-drip, .c13-liquid, .c13-steam {
      animation: none !important;
    }
    .c13-steam { display: none; }
    .c13-liquid { transform: scaleY(0.6); }
  }
</style>

</head>
<body>
<svg class="c13-coffee" viewBox="0 0 100 120" width="100" height="120">
  <path class="c13-steam" d="M 45 42 Q 41 32 45 22 Q 49 12 45 2" />
  <path class="c13-steam c13-steam--2" d="M 55 42 Q 51 32 55 22 Q 59 12 55 2" />
  <path class="c13-liquid" d="M 33 88 L 67 88 L 65 72 L 35 72 Z" />
  <circle class="c13-drip" cx="50" cy="50" r="3" />
  <path class="c13-machine" d="M 25 110 L 75 110 M 25 110 L 25 15 C 25 15 40 10 50 10 C 60 10 75 15 75 15 L 75 42 L 50 42 M 25 42 L 35 42 M 30 70 L 70 70 C 73 70 75 73 75 76 L 73 90 C 72 94 68 97 64 97 L 36 97 C 32 97 28 94 27 90 L 25 76 C 25 73 27 70 30 70 Z M 72 74 L 84 74 C 88 74 90 77 90 80 L 89 83 C 88 86 86 88 82 88 L 71 88" />
</svg>
<div class="cap">Boiling Coffee</div>
<script>
(function(){
  var mf = document.querySelector('.c13-coffee');
  function vis(){
    var state = document.hidden ? 'paused' : 'running';
    mf.querySelectorAll('*').forEach(function(n){
      n.style.animationPlayState = state;
    });
  }
  document.addEventListener('visibilitychange', vis);
  vis();
})();
</script>

</html>
