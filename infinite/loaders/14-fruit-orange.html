<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A pulsing orange fruit loader with glowing segment animations.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fruit Orange</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#08090d}
  body{
    display:grid;place-items:center;
    background-image:
      radial-gradient(60vw 40vw at 15% -10%,rgba(124,92,255,.16),transparent 60%),
      radial-gradient(50vw 40vw at 90% 0%,rgba(34,211,238,.16),transparent 55%);
  }
  .c14-orange {
    width: 120px; height: 120px;
    position: relative;
    animation: c14-spin 8s linear infinite;
  }
  .c14-peel {
    fill: none;
    stroke: #f97316;
    stroke-width: 4;
    filter: drop-shadow(0 0 5px rgba(249,115,22,0.5));
  }
  .c14-segment {
    fill: #f59e0b;
    opacity: 0.15;
    transform-origin: 60px 60px;
    animation: c14-pulse 1.6s ease-in-out infinite;
  }
  .c14-segment:nth-child(3) { transform: rotate(0deg); animation-delay: 0.0s; }
  .c14-segment:nth-child(4) { transform: rotate(45deg); animation-delay: 0.2s; }
  .c14-segment:nth-child(5) { transform: rotate(90deg); animation-delay: 0.4s; }
  .c14-segment:nth-child(6) { transform: rotate(135deg); animation-delay: 0.6s; }
  .c14-segment:nth-child(7) { transform: rotate(180deg); animation-delay: 0.8s; }
  .c14-segment:nth-child(8) { transform: rotate(225deg); animation-delay: 1.0s; }
  .c14-segment:nth-child(9) { transform: rotate(270deg); animation-delay: 1.2s; }
  .c14-segment:nth-child(10) { transform: rotate(315deg); animation-delay: 1.4s; }

  @keyframes c14-spin {
    to { transform: rotate(360deg); }
  }
  @keyframes c14-pulse {
    0%, 100% { opacity: 0.15; fill: #f59e0b; }
    50% { opacity: 1; fill: #ff781f; }
  }
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 "Space Grotesk",ui-monospace,monospace;
    color:#f97316;opacity:.45;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){
    .c14-orange, .c14-segment {
      animation: none !important;
    }
    .c14-segment { opacity: 0.8; }
  }
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/loaders/14-fruit-orange.html",
 "title": "Fruit Orange",
 "description": "SVG orange cross-section: 8 wedge segments pulse amber-to-orange in a sequential wave while the whole slice rotates slowly on an 8s spin.",
 "useWhen": "Playful loading indicators for food, health, or consumer apps. Anywhere a fruit motif or warm radial spinner fits the brand.",
 "avoidWhen": "Corporate or enterprise contexts. Background hardcoded dark — needs CSS override for light themes.",
 "agentPrompt": "Change to a lemon by updating .c14-peel stroke to #facc15 and both fill values in c14-pulse keyframe from #f59e0b/#ff781f to #fef08a/#facc15. Stop rotation by setting animation: none on .c14-orange. Reduce to 6 segments by deleting the last two nth-child rules and two path elements.",
 "editableAreas": [
  "peel stroke color (#f97316 on .c14-peel)",
  "segment pulse colors (#f59e0b and #ff781f inside c14-pulse keyframe)",
  "spin speed (8s on .c14-orange animation)",
  "pulse wave delay increment (0.2s per nth-child)",
  "segment count (nth-child rules + matching path elements in SVG)"
 ],
 "preserveElements": [
  "transform-origin: 60px 60px on .c14-segment — rotation pivot at SVG center; wrong value breaks the wave",
  "visibilitychange pause handler for both .c14-orange and all .c14-segment nodes",
  "prefers-reduced-motion guard",
  "c14- namespace on all classes"
 ],
 "knownLimitations": [
  "All 8 segment path elements share the identical d attribute — position comes from nth-child rotate transforms only; adding a 9th segment requires both a new path element and a new nth-child rule",
  "Background hardcoded in body CSS"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "orange",
  "fruit",
  "segments",
  "spinner",
  "radial",
  "pulse",
  "svg",
  "playful",
  "wave"
 ]
}
</script>
</head>
<body>
<svg class="c14-orange" viewBox="0 0 120 120" width="120" height="120">
  <circle class="c14-peel" cx="60" cy="60" r="50" />
  <circle cx="60" cy="60" r="5" fill="#f4f6fb" />
  <path class="c14-segment" d="M 60 17 A 43 43 0 0 1 89 29 L 63 56 A 5 5 0 0 1 57 56 Z" />
  <path class="c14-segment" d="M 60 17 A 43 43 0 0 1 89 29 L 63 56 A 5 5 0 0 1 57 56 Z" />
  <path class="c14-segment" d="M 60 17 A 43 43 0 0 1 89 29 L 63 56 A 5 5 0 0 1 57 56 Z" />
  <path class="c14-segment" d="M 60 17 A 43 43 0 0 1 89 29 L 63 56 A 5 5 0 0 1 57 56 Z" />
  <path class="c14-segment" d="M 60 17 A 43 43 0 0 1 89 29 L 63 56 A 5 5 0 0 1 57 56 Z" />
  <path class="c14-segment" d="M 60 17 A 43 43 0 0 1 89 29 L 63 56 A 5 5 0 0 1 57 56 Z" />
  <path class="c14-segment" d="M 60 17 A 43 43 0 0 1 89 29 L 63 56 A 5 5 0 0 1 57 56 Z" />
  <path class="c14-segment" d="M 60 17 A 43 43 0 0 1 89 29 L 63 56 A 5 5 0 0 1 57 56 Z" />
</svg>
<div class="cap">Fruit Orange</div>
<script>
(function(){
  var org = document.querySelector('.c14-orange');
  function vis(){
    var state = document.hidden ? 'paused' : 'running';
    org.style.animationPlayState = state;
    org.querySelectorAll('.c14-segment').forEach(function(n){
      n.style.animationPlayState = state;
    });
  }
  document.addEventListener('visibilitychange', vis);
  vis();
})();
</script>
</body>
</html>
