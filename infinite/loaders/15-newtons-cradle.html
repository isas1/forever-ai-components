<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Newton's cradle physics loader using CSS keyframe swings.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Newton's Cradle</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#08090d}
  body{
    display:grid;place-items:center;
    background-image:
      radial-gradient(60vw 40vw at 15% -10%,rgba(124,92,255,.16),transparent 60%),
      radial-gradient(50vw 40vw at 90% 0%,rgba(34,211,238,.16),transparent 55%);
  }
  .c15-cradle {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    width: 180px; height: 110px;
    border-top: 4px solid #7c5cff;
    border-radius: 2px;
    padding-top: 10px;
  }
  .c15-wire {
    width: 2px; height: 50px;
    background: rgba(255,255,255,0.15);
    position: relative;
    transform-origin: top center;
    margin: 0 8px;
  }
  .c15-wire::after {
    content: "";
    position: absolute;
    bottom: -18px; left: -8px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #22d3ee;
    box-shadow: 0 0 10px rgba(34,211,238,0.6);
  }
  .c15-wire:nth-child(1) {
    animation: c15-swing-l 1.2s cubic-bezier(0.25, 0, 0.75, 1) infinite;
  }
  .c15-wire:nth-child(5) {
    animation: c15-swing-r 1.2s cubic-bezier(0.25, 0, 0.75, 1) infinite;
    animation-delay: 0.6s;
  }
  .c15-wire:nth-child(5)::after {
    background: #ff5ca8;
    box-shadow: 0 0 10px rgba(255,92,168,0.6);
  }

  @keyframes c15-swing-l {
    0% { transform: rotate(0deg); }
    25% { transform: rotate(35deg); }
    50% { transform: rotate(0deg); }
    100% { transform: rotate(0deg); }
  }
  @keyframes c15-swing-r {
    0% { transform: rotate(0deg); }
    25% { transform: rotate(-35deg); }
    50% { transform: rotate(0deg); }
    100% { transform: rotate(0deg); }
  }
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 "Space Grotesk",ui-monospace,monospace;
    color:#22d3ee;opacity:.45;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){
    .c15-wire {
      animation: none !important;
    }
  }
</style>

 "editableAreas": [
  "cyan ball color (::after background + box-shadow rgba on .c15-wire)",
  "pink ball color (::after on .c15-wire:nth-child(5))",
  "swing angle (35deg in c15-swing-l and c15-swing-r keyframes)",
  "swing speed (1.2s on animation duration)",
  "bar color (#7c5cff on border-top of .c15-cradle)",
  "wire opacity (0.15 rgba on .c15-wire background)"
 ],
 "preserveElements": [
  "animation-delay: 0.6s on .c15-wire:nth-child(5) — exactly half the cycle; changing this breaks the cradle illusion",
  "transform-origin: top center on .c15-wire — pivot at the bar; changing breaks the swing",
  "visibilitychange pause handler",
  "c15- namespace on all classes"
 ],
 "knownLimitations": [
  "Middle 3 balls are static (CSS-only, no true physics engine). The alternating swing is a visual illusion.",
  "Swing angle above ~50deg breaks the illusion — the balls appear to pass through each other"

 "tier": "curated",

 ]
}

</head>
<body>
<div class="c15-cradle">
  <div class="c15-wire"></div>
  <div class="c15-wire"></div>
  <div class="c15-wire"></div>
  <div class="c15-wire"></div>
  <div class="c15-wire"></div>
</div>
<div class="cap">Newton's Cradle</div>
<script>
(function(){
  var wires = document.querySelectorAll('.c15-wire');
  function vis(){
    var state = document.hidden ? 'paused' : 'running';
    wires.forEach(function(n){
      n.style.animationPlayState = state;
    });
  }
  document.addEventListener('visibilitychange', vis);
  vis();
})();
</script>
</body>
</html>
