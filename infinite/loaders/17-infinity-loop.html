<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A performant infinity loop loader tracing path strokes with CSS.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Infinity Loop</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#08090d}
  body{
    display:grid;place-items:center;
    background-image:
      radial-gradient(60vw 40vw at 15% -10%,rgba(124,92,255,.16),transparent 60%),
      radial-gradient(50vw 40vw at 90% 0%,rgba(34,211,238,.16),transparent 55%);
  }
  .c17-svg {
    width: 140px; height: 100px;
  }
  .c17-track {
    fill: none;
    stroke: rgba(255, 255, 255, 0.05);
    stroke-width: 5;
  }
  .c17-trace {
    fill: none;
    stroke: #ff5ca8;
    stroke-width: 5;
    stroke-linecap: round;
    stroke-dasharray: 22 78;
    stroke-dashoffset: 0;
    filter: drop-shadow(0 0 6px rgba(255,92,168,0.7));
    animation: c17-trace-loop 2s linear infinite;
  }
  .c17-trace--cyan {
    stroke: #22d3ee;
    filter: drop-shadow(0 0 6px rgba(34,211,238,0.7));
    animation-delay: -1s;
  }
  @keyframes c17-trace-loop {
    to { stroke-dashoffset: -100; }
  }
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 "Space Grotesk",ui-monospace,monospace;
    color:#ff5ca8;opacity:.45;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){
    .c17-trace {
      animation: none !important;
      stroke-dasharray: 40 60;
    }
  }
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/loaders/17-infinity-loop.html",
 "title": "Infinity Loop",
 "description": "Two glowing traces (pink and cyan) chase each other around a lemniscate path using stroke-dashoffset animation; a near-invisible track marks the full path beneath.",
 "useWhen": "Elegant loading indicators for dark-theme apps. AI/processing metaphors, infinite-process indicators, anywhere the infinity symbol resonates with the product.",
 "avoidWhen": "Light backgrounds (hardcoded dark fill). Very small sizes — trace detail degrades below ~80px width.",
 "agentPrompt": "Make single-color by removing the .c17-trace--cyan path element and its CSS rule. Adjust trace length with the first dasharray value (22 = short, 50 = half-path). Speed up by reducing 2s on c17-trace-loop. Thicken by increasing stroke-width from 5 to 7.",
 "editableAreas": [
  "trace colors (#ff5ca8 and #22d3ee on .c17-trace and .c17-trace--cyan)",
  "trace length (22 — first value in stroke-dasharray; max 100 due to pathLength)",
  "animation speed (2s on c17-trace-loop)",
  "stroke width (5 on .c17-trace)",
  "track visibility (0.05 rgba — increase to show the full path)"
 ],
 "preserveElements": [
  "pathLength='100' on all path elements — makes dasharray values path-percentage not pixels; removing it breaks all animation math",
  "animation-delay: -1s on .c17-trace--cyan — creates the chase offset at exactly half-cycle",
  "degenerate close segment 'C 35 20, 35 40, 35 40' at path end — needed for smooth loop with no jump",
  "visibilitychange pause handler",
  "c17- namespace on all classes"
 ],
 "knownLimitations": [
  "pathLength='100' is intentional and must not be changed — see preserveElements",
  "The lemniscate path closes with a degenerate cubic segment; editing the path requires re-testing loop continuity"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "infinity",
  "loop",
  "lemniscate",
  "figure-eight",
  "stroke",
  "dash-offset",
  "svg",
  "minimal",
  "math",
  "elegant"
 ]
}
</script>
</head>
<body>
<svg class="c17-svg" viewBox="0 0 110 80" width="110" height="80">
  <path class="c17-track" pathLength="100" d="M 35 40 C 35 20, 15 20, 15 40 C 15 60, 35 60, 55 40 C 75 20, 95 20, 95 40 C 95 60, 75 60, 55 40 C 35 20, 35 40, 35 40 Z" />
  <path class="c17-trace" pathLength="100" d="M 35 40 C 35 20, 15 20, 15 40 C 15 60, 35 60, 55 40 C 75 20, 95 20, 95 40 C 95 60, 75 60, 55 40 C 35 20, 35 40, 35 40 Z" />
  <path class="c17-trace c17-trace--cyan" pathLength="100" d="M 35 40 C 35 20, 15 20, 15 40 C 15 60, 35 60, 55 40 C 75 20, 95 20, 95 40 C 95 60, 75 60, 55 40 C 35 20, 35 40, 35 40 Z" />
</svg>
<div class="cap">Infinity Loop</div>
<script>
(function(){
  var traces = document.querySelectorAll('.c17-trace');
  function vis(){
    var state = document.hidden ? 'paused' : 'running';
    traces.forEach(function(n){
      n.style.animationPlayState = state;
    });
  }
  document.addEventListener('visibilitychange', vis);
  vis();
})();
</script>
</body>
</html>
