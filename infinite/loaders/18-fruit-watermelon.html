<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A bouncy fruit watermelon loader with falling seed particles.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fruit Watermelon</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#08090d}
  body{
    display:grid;place-items:center;
    background-image:
      radial-gradient(60vw 40vw at 15% -10%,rgba(124,92,255,.16),transparent 60%),
      radial-gradient(50vw 40vw at 90% 0%,rgba(34,211,238,.16),transparent 55%);
  }
  .c18-container {
    position: relative;
    width: 120px; height: 120px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .c18-slice {
    width: 80px; height: 40px;
    background: #ff5ca8;
    border-bottom: 8px solid #10b981;
    border-left: 4px solid #f4f6fb;
    border-right: 4px solid #f4f6fb;
    border-radius: 0 0 80px 80px;
    box-shadow: 0 0 15px rgba(255,92,168,0.5);
    position: relative;
    animation: c18-bounce 1.5s ease-in-out infinite;
  }
  .c18-seed {
    position: absolute;
    width: 4px; height: 7px;
    background: #08090d;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    animation: c18-seed-drop 1.5s linear infinite;
  }
  .c18-seed--1 { left: 25px; top: 10px; animation-delay: 0.1s; }
  .c18-seed--2 { left: 40px; top: 18px; animation-delay: 0.5s; }
  .c18-seed--3 { left: 55px; top: 12px; animation-delay: 0.9s; }

  @keyframes c18-bounce {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-12px) rotate(-5deg); }
  }
  @keyframes c18-seed-drop {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    30% { transform: translateY(35px) scale(0.9); opacity: 0.8; }
    60%, 100% { transform: translateY(60px) scale(0.6); opacity: 0; }
  }
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 "Space Grotesk",ui-monospace,monospace;
    color:#ff5ca8;opacity:.45;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){
    .c18-slice, .c18-seed {
      animation: none !important;
    }
  }
</style>
</head>
<body>
<div class="c18-container">
  <div class="c18-slice">
    <div class="c18-seed c18-seed--1"></div>
    <div class="c18-seed c18-seed--2"></div>
    <div class="c18-seed c18-seed--3"></div>
  </div>
</div>
<div class="cap">Fruit Watermelon</div>
<script>
(function(){
  var slice = document.querySelector('.c18-slice');
  var seeds = document.querySelectorAll('.c18-seed');
  function vis(){
    var state = document.hidden ? 'paused' : 'running';
    slice.style.animationPlayState = state;
    seeds.forEach(function(n){
      n.style.animationPlayState = state;
    });
  }
  document.addEventListener('visibilitychange', vis);
  vis();
})();
</script>
</body>
</html>
