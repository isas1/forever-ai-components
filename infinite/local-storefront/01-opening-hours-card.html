<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Opening hours card: a live open/closed status with a soft pulsing indicator, today's hours highlighted in a full weekly hours list, and time until close.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Opening Hours Card</title>
<style>
  :root{
    --pro-bg:#0d1117;
    --pro-surface:#161b22;
    --pro-border:rgba(255,255,255,.08);
    --pro-text:#e6edf3;
    --pro-muted:#8b949e;
    --pro-accent:#e8845c;
    --pro-ok:#3fb950;
    --pro-radius:16px;
    --pro-font:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    --soh-serif:ui-serif,Georgia,"Times New Roman",serif;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--pro-bg)}
  .soh-stage{position:fixed;inset:0;padding:4.2vmin;display:flex;font-family:var(--pro-font);color:var(--pro-text)}
  .soh-card{flex:1;min-height:0;background:var(--pro-surface);border:1px solid var(--pro-border);
    border-radius:var(--pro-radius);padding:3.6vmin;display:flex;flex-direction:column;gap:2vmin}
  .soh-title{margin:0;font-family:var(--soh-serif);font-style:italic;font-weight:700;
    font-size:clamp(13px,2.8vmin,16px)}
  .soh-status{display:flex;align-items:center;gap:1vmin;font-weight:700;font-size:clamp(9px,1.9vmin,12px);
    color:var(--pro-ok)}
  .soh-status i{width:1.6vmin;min-width:7px;height:1.6vmin;min-height:7px;border-radius:50%;background:currentColor;
    animation:soh-pulse 1.8s ease-in-out infinite}
  @keyframes soh-pulse{0%,100%{opacity:.5}50%{opacity:1}}
  .soh-status.closed{color:var(--pro-muted)}
  .soh-status.closed i{animation:none;opacity:.6}
  .soh-sub{font-size:clamp(7px,1.5vmin,9px);color:var(--pro-muted);margin-top:.8vmin}
  .soh-list{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:space-evenly}
  .soh-row{display:flex;justify-content:space-between;font-size:clamp(8px,1.7vmin,10.5px);color:var(--pro-muted)}
  .soh-row.today{color:var(--pro-text);font-weight:700}
  .soh-row.today .soh-hrs{color:var(--pro-accent)}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:var(--pro-muted);opacity:.5;letter-spacing:.08em;text-transform:uppercase;
    user-select:none;pointer-events:none}
  @media (prefers-reduced-motion:reduce){.soh-status i{animation:none;opacity:1}}
</style>
</head>
<body>
  <div class="soh-stage">
    <div class="soh-card" id="soh-card" role="img"
         aria-label="Opening hours card showing the restaurant is open now and closes at 10pm today, with the full weekly hours list and today's row highlighted.">
      <h1 class="soh-title">Via Verde</h1>
      <div>
        <div class="soh-status" id="soh-status"><i></i><span id="soh-status-text">Open now</span></div>
        <div class="soh-sub" id="soh-sub">Closes at 10:00pm</div>
      </div>
      <div class="soh-list" id="soh-list"></div>
    </div>
  </div>
  <div class="cap" aria-hidden="true">Opening Hours Card</div>
  <script>(function(){"use strict";
    var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
    var statusEl=document.getElementById('soh-status'), statusText=document.getElementById('soh-status-text'),
        sub=document.getElementById('soh-sub'), list=document.getElementById('soh-list');
    if(!list)return;
    var week=[
      {d:"Monday",h:"Closed"},
      {d:"Tuesday",h:"5pm – 9pm"},
      {d:"Wednesday",h:"5pm – 9pm"},
      {d:"Thursday",h:"5pm – 10pm"},
      {d:"Friday",h:"5pm – 11pm"},
      {d:"Saturday",h:"11am – 11pm"},
      {d:"Sunday",h:"11am – 9pm"}
    ];
    var rows=week.map(function(w){
      var r=document.createElement('div'); r.className='soh-row';
      r.innerHTML='<span>'+w.d+'</span><span class="soh-hrs">'+w.h+'</span>';
      list.appendChild(r); return r;
    });
    var todayIdx=4; // Friday, for the initial open state below
    rows[todayIdx].classList.add('today');
    function setState(open){
      statusEl.classList.toggle('closed',!open);
      statusText.textContent = open ? 'Open now' : 'Closed now';
      sub.textContent = open ? 'Closes at 11:00pm' : 'Opens tomorrow at 11:00am';
    }
    setState(true);
    if(reduce)return;
    var running=true, open=true;
    document.addEventListener('visibilitychange',function(){ running=!document.hidden; });
    setInterval(function(){
      if(!running)return;
      open=!open;
      setState(open);
    },6000);
  })();</script>
