<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Loyalty punch card: a row of stamp circles fills in one by one with a satisfying pop, reaching the free-reward stamp before resetting to start a fresh card.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loyalty Punch Card</title>
<style>
  :root{
    --pro-bg:#0d1117;
    --pro-surface:#161b22;
    --pro-border:rgba(255,255,255,.08);
    --pro-text:#e6edf3;
    --pro-muted:#8b949e;
    --pro-accent:#e8845c;
    --pro-radius:16px;
    --pro-font:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    --slp-serif:ui-serif,Georgia,"Times New Roman",serif;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--pro-bg)}
  .slp-stage{position:fixed;inset:0;padding:4.2vmin;display:flex;font-family:var(--pro-font);color:var(--pro-text)}
  .slp-card{flex:1;min-height:0;background:var(--pro-surface);border:1px solid var(--pro-border);
    border-radius:var(--pro-radius);padding:3.6vmin;display:flex;flex-direction:column;gap:2.4vmin}
  .slp-head{display:flex;align-items:baseline;justify-content:space-between}
  .slp-title{margin:0;font-family:var(--slp-serif);font-style:italic;font-weight:700;
    font-size:clamp(12px,2.6vmin,15px)}
  .slp-name{font-size:clamp(7px,1.5vmin,9px);color:var(--pro-muted)}
  .slp-grid{flex:1;min-height:0;display:grid;grid-template-columns:repeat(5,1fr);gap:1.6vmin;place-items:center}
  .slp-stamp{width:80%;aspect-ratio:1;border-radius:50%;border:1.6px dashed var(--pro-border);
    display:grid;place-items:center;position:relative;color:var(--pro-muted)}
  .slp-stamp svg{width:46%;height:46%;opacity:0;transform:scale(.4) rotate(-18deg);
    transition:opacity .35s ease,transform .4s cubic-bezier(.5,1.6,.4,1)}
  .slp-stamp.on{border-style:solid;border-color:var(--pro-accent);
    background:color-mix(in srgb,var(--pro-accent) 14%,transparent);color:var(--pro-accent)}
  .slp-stamp.on svg{opacity:1;transform:none}
  .slp-stamp.free{border-color:var(--pro-accent)}
  .slp-stamp.free:not(.on){color:var(--pro-accent)}
  .slp-stamp .slp-star{font-size:clamp(9px,2vmin,13px);font-weight:800}
  .slp-foot{font-size:clamp(7px,1.5vmin,9.5px);color:var(--pro-muted);text-align:center}
  .slp-foot b{color:var(--pro-accent);font-variant-numeric:tabular-nums}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:var(--pro-muted);opacity:.5;letter-spacing:.08em;text-transform:uppercase;
    user-select:none;pointer-events:none}
  @media (prefers-reduced-motion:reduce){.slp-stamp,.slp-stamp svg{transition:none}}
</style>
</head>
<body>
  <div class="slp-stage">
    <div class="slp-card" id="slp-card" role="img"
         aria-label="Loyalty punch card with ten stamps; stamps fill in one by one toward a free reward on the tenth visit, then the card resets and starts filling again.">
      <div class="slp-head">
        <h1 class="slp-title">Loyalty card</h1>
        <span class="slp-name">Maya K.</span>
      </div>
      <div class="slp-grid" id="slp-grid"></div>
      <div class="slp-foot"><b id="slp-count">6</b> of 10 &middot; free entrée on your 10th visit</div>
    </div>
  </div>
  <div class="cap" aria-hidden="true">Loyalty Punch Card</div>
  <script>(function(){"use strict";
    var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
    var grid=document.getElementById('slp-grid'), countEl=document.getElementById('slp-count');
    if(!grid)return;
    var TOTAL=10;
    var CHK='<svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3.5 8.6l3 3 6-7" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    var STAR='<svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M10 1.6l2.6 5.4 5.9.7-4.3 4.2 1 5.9L10 14.8l-5.2 2.9 1-5.9-4.3-4.2 5.9-.7z"/></svg>';
    var cells=[];
    for(var i=0;i<TOTAL;i++){
      var d=document.createElement('div'); d.className='slp-stamp'+(i===TOTAL-1?' free':'');
      d.innerHTML = i===TOTAL-1 ? STAR : CHK;
      grid.appendChild(d); cells.push(d);
    }
    function paint(n){
      cells.forEach(function(c,i){ c.classList.toggle('on', i<n); });
      countEl.textContent = n;
    }
    if(reduce){ paint(6); return; }
    var n=6; paint(n);
    var running=true;
    document.addEventListener('visibilitychange',function(){ running=!document.hidden; });
    setInterval(function(){
      if(!running)return;
      n = n>=TOTAL ? 0 : n+1;
      paint(n);
    },1500);
  })();</script>
