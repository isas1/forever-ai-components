<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="The Black Square, Breathing — Suprematist Geometric Forms. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Black Square, Breathing</title>
<style>
  html,body{margin:0;height:100%;background:#f0ece2;overflow:hidden}
  #mal01-stage{position:fixed;inset:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
  #mal01-ghost{position:absolute;width:46%;height:46%;background:#d8261c;opacity:.10;transform:translate(7%,7%) rotate(-3deg)}
  #mal01-sq{width:46%;height:46%;background:#111111;will-change:transform}
  #mal01-stage.run #mal01-sq{animation:mal01-breathe 7.5s ease-in-out infinite}
  @keyframes mal01-breathe{
    0%,100%{transform:scale(1) rotate(0deg) translate(0,0)}
    50%{transform:scale(1.045) rotate(1.1deg) translate(0,-2px)}
  }
  .mal01-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#111;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion: reduce){#mal01-stage.run #mal01-sq{animation:none}}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/malevich/01-black-square-breathing.html",
 "title": "The Black Square, Breathing",
 "description": "A near-black square barely scales and rotates on a warm white ground; a faint red ghost square offsets behind it. Suprematist stillness in motion.",
 "useWhen": "Art/culture hero backgrounds, minimal ambient displays, gallery digital signage where extreme restraint is needed.",
 "avoidWhen": "Contexts needing obvious motion or engagement cues — the animation is near-imperceptible and will read as static to many users.",
 "agentPrompt": "Slow the breathing cycle to 12 seconds by changing the animation duration in `#mal01-stage.run #mal01-sq { animation: mal01-breathe 12s ... }`, and increase ghost opacity from 0.10 to 0.20.",
 "editableAreas": [

  "scale amount (1.045 in keyframe)",

  "ghost rotation and offset (rotate(-3deg), translate(7%,7%))",
  "background color (#f0ece2 on body)",
  "square color (#111111 on #mal01-sq)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (animation:none in @media block)",

 "knownLimitations": [

 "labels": [
  "agent-ready",

</head>
<body>
<div id="mal01-stage" role="img" aria-label="A near-black Suprematist square hovering in pure white space, scaling and rotating by a hair, with a faint red ghost square offset behind it.">
  <div id="mal01-ghost"></div>
  <div id="mal01-sq"></div>
</div>
<div class="mal01-cap">The Black Square, Breathing</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const stage=document.getElementById('mal01-stage'); if(!stage) return;
  function start(){ stage.classList.add('run'); }
  function stop(){ stage.classList.remove('run'); }
  document.addEventListener('visibilitychange', ()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });
  if(!REDUCED) start();
})();
</script>
</body>
</html>
