<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Suprematist Drift — Kazimir Malevich. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Suprematist Drift</title>
<style>
  html,body{margin:0;height:100%;background:#f0ece2;overflow:hidden}
  #mal02-field{position:fixed;inset:0;width:100%;height:100%;overflow:hidden}
  .mal02-bar{position:absolute;left:0;top:0;will-change:transform}
  @keyframes mal02-drift{
    from{transform:translate(var(--x0),var(--y0)) rotate(var(--r))}
    to{transform:translate(var(--x1),var(--y1)) rotate(var(--r))}
  }
  .mal02-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#111;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion: reduce){.mal02-bar{animation:none !important}}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/malevich/02-suprematist-drift.html",
 "title": "Suprematist Drift",
 "description": "9 colored bars in black, red, blue, yellow rotate at random angles and drift slowly across a cream field via alternating CSS keyframes.",
 "useWhen": "Art/design-themed hero backgrounds, gallery splash screens, ambient displays referencing early modernist aesthetics.",
 "avoidWhen": "Contexts requiring legible text overlays — bars drift into readable areas. Dark-background layouts where the cream field clashes.",
 "agentPrompt": "Change the palette to earthy tones by updating PAL to {black:'#2b1d0e', red:'#8b3a1a', blue:'#2c4a6e', yellow:'#c9913d'} and increase bar count N from 9 to 14.",
 "editableAreas": [
  "bar count (N=9)",
  "palette colors (PAL object)",
  "bar size range (long: 14+40%, thin: 4+16%)",
  "rotation range (-30..+30deg)",
  "drift duration range (16..32s)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard with static fallback",
  "visibilitychange pause/resume",
  "aria-label on field div"
 ],
 "knownLimitations": [
  "Bar positions randomize on each page load — composition cannot be pinned",
  "Bars can overlap in ways that obscure each other; no z-index ordering logic"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "suprematism",
  "geometric",
  "abstract-art",
  "bars",
  "drift",
  "css-animation",
  "generative"
 ]
}
</script>
</head>
<body>
<div id="mal02-field" role="img" aria-label="Coloured bars and rectangles in black, red, blue and yellow, set on diagonals, drifting slowly across a pure white field in weightless suspension."></div>
<div class="mal02-cap">Suprematist Drift</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const PAL={black:'#111111',red:'#d8261c',blue:'#1746a0',yellow:'#f2b705'};
  const field=document.getElementById('mal02-field'); if(!field) return;
  const cols=[PAL.black,PAL.red,PAL.blue,PAL.yellow,PAL.black,PAL.red];
  const bars=[];
  const N=9;
  for(let i=0;i<N;i++){
    const b=document.createElement('div');
    b.className='mal02-bar';
    const long=14+Math.random()*40, thin=4+Math.random()*16;
    const c=cols[i%cols.length];
    b.style.width=long+'%'; b.style.height=thin+'%'; b.style.background=c;
    if(c!==PAL.black) b.style.boxShadow='0 0 0 1px rgba(17,17,17,.12)';
    const rot=(-30+Math.random()*60).toFixed(1)+'deg';
    const x0=(Math.random()*60).toFixed(1)+'%', y0=(Math.random()*74).toFixed(1)+'%';
    const x1=(Math.random()*60).toFixed(1)+'%', y1=(Math.random()*74).toFixed(1)+'%';
    b.style.setProperty('--r',rot);
    if(REDUCED){
      b.style.transform=`translate(${x0},${y0}) rotate(${rot})`;
    }else{
      b.style.setProperty('--x0',x0); b.style.setProperty('--y0',y0);
      b.style.setProperty('--x1',x1); b.style.setProperty('--y1',y1);
      const dur=(16+Math.random()*16).toFixed(1), del=(-Math.random()*16).toFixed(1);
      b.style.animation=`mal02-drift ${dur}s ease-in-out ${del}s infinite alternate`;
    }
    bars.push(b); field.appendChild(b);
  }
  document.addEventListener('visibilitychange', ()=>{
    if(REDUCED) return;
    const st=document.hidden?'paused':'running';
    bars.forEach(b=>b.style.animationPlayState=st);
  });
})();
</script>
</body>
</html>
