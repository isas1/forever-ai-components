<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Weightless — Kazimir Malevich. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Weightless</title>
<style>
  html,body{margin:0;height:100%;background:#111111;overflow:hidden}
  #mal06-stage{position:fixed;inset:0;width:100%;height:100%}
  #mal06-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .mal06-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#f5f3ee;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
</head>
<body>
<div id="mal06-stage" role="img" aria-label="Suprematist forms in red, blue, yellow and white orbit an invisible centre in black space with no gravity and no ground — slow celestial drift, the supremacy of sensation over object.">
  <canvas id="mal06-cv"></canvas>
</div>
<div class="mal06-cap">Weightless</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const PAL={red:'#d8261c',blue:'#1746a0',yellow:'#f2b705',white:'#f5f3ee'};
  const cv=document.getElementById('mal06-cv'); if(!cv) return;
  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width), h=Math.max(2,r.height);
    c.width=Math.round(w*dpr); c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }
  let S=fitCanvas(cv);
  const cols=[PAL.red,PAL.blue,PAL.yellow,PAL.white];
  const kinds=['sq','circ','bar','cross'];
  const bodies=[];
  for(let i=0;i<7;i++){
    bodies.push({R:0.12+Math.random()*0.40, sp:(0.10+Math.random()*0.35)*(Math.random()<0.5?-1:1),
      ph:Math.random()*Math.PI*2, sz:0.035+Math.random()*0.06, ratio:3+Math.random()*3,
      c:cols[i%cols.length], kind:kinds[i%kinds.length], selfSpin:(-0.4+Math.random()*0.8)});
  }
  let t=0,last=performance.now();
  function draw(now){
    const dt=Math.min(0.05,(now-last)/1000); last=now;
    if(!REDUCED) t+=dt;
    const ctx=S.ctx,W=S.w,H=S.h,cx=W*0.5,cy=H*0.5,unit=Math.min(W,H);
    ctx.fillStyle='#111111'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(245,243,238,.07)'; ctx.beginPath(); ctx.arc(cx,cy,unit*0.03,0,7); ctx.fill();
    for(const b of bodies){
      const a=t*b.sp + b.ph;
      const x=cx+Math.cos(a)*unit*b.R;
      const y=cy+Math.sin(a)*unit*b.R*0.78;
      const z=b.sz*unit;
      ctx.save(); ctx.translate(x,y); ctx.rotate(t*b.selfSpin + b.ph);
      ctx.fillStyle=b.c; ctx.strokeStyle='rgba(245,243,238,.3)'; ctx.lineWidth=1;
      if(b.kind==='sq'){ ctx.fillRect(-z*0.7,-z*0.7,z*1.4,z*1.4); }
      else if(b.kind==='circ'){ ctx.beginPath();ctx.arc(0,0,z*0.8,0,7);ctx.fill(); }
      else if(b.kind==='bar'){ const w=z*b.ratio,h=z*0.5; ctx.fillRect(-w/2,-h/2,w,h); }
      else { const arm=z*1.0,th=z*0.3; ctx.fillRect(-arm,-th,2*arm,2*th); ctx.fillRect(-th,-arm,2*th,2*arm); }
      ctx.restore();
    }
  }
  let raf=0,running=false;
  function loop(){ if(!running) return; draw(performance.now()); raf=requestAnimationFrame(loop); }
  function start(){ if(running) return; running=true; last=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
  S.ctx.fillStyle='#111111'; S.ctx.fillRect(0,0,S.w,S.h);
  let _rt;
  window.addEventListener('resize', ()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ S=fitCanvas(cv); if(REDUCED) draw(performance.now()); },150); }, {passive:true});
  document.addEventListener('visibilitychange', ()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });
  if(REDUCED){ draw(performance.now()); }
  else start();
})();
</script>
</body>
</html>
