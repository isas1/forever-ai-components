<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Red Wedge — Suprematist Geometric Forms. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Red Wedge</title>
<style>
  html,body{margin:0;height:100%;background:#f0ece2;overflow:hidden}
  #mal07-field{position:fixed;inset:0;width:100%;height:100%;overflow:hidden}
  #mal07-wedge{position:absolute;left:0;top:50%;width:0;height:0;margin-top:-130px;will-change:transform;
    border-top:130px solid transparent;border-bottom:130px solid transparent;border-left:220px solid #d8261c}
  #mal07-field.run #mal07-wedge{animation:mal07-cleave 9s ease-in-out infinite}
  @keyframes mal07-cleave{
    0%{transform:translateX(-14%) rotate(0deg)}
    50%{transform:translateX(56%) rotate(2deg)}
    100%{transform:translateX(-14%) rotate(0deg)}
  }
  .mal07-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#111;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion: reduce){#mal07-field.run #mal07-wedge{animation:none}}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/malevich/07-red-wedge.html",
 "title": "Red Wedge",
 "description": "A bold red CSS triangle slowly sweeps across a cream field past faint black and grey rectangles, evoking Suprematist's Suprematist diagonal.",
 "useWhen": "Art/design portfolio heroes, constructivist or avant-garde themes, ambient background loops that reference Suprematist aesthetics.",
 "avoidWhen": "Contexts requiring legible text overlays (wedge sweeps over the layout). Audiences sensitive to slow diagonal motion.",
 "agentPrompt": "Change the wedge color from #d8261c to #0033cc (blue wedge variant), slow the cycle to 14s, and increase the wedge tip height from 130px to 180px.",
 "editableAreas": [
  "wedge color (border-left: 220px solid #d8261c)",
  "wedge height (border-top/bottom: 130px)",
  "animation duration (9s)",
  "sweep range in @keyframes mal07-cleave (translateX values)",
  "background color (#f0ece2)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (static translateX fallback)",
  "visibilitychange pause/start logic"
 ],
 "knownLimitations": [
  "Background blocks use Math.random() — layout shifts on every page load",
  "Wedge is pure CSS border trick; resizing viewport may distort proportions at extreme aspect ratios"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "suprematism",
  "geometric",
  "css-animation",
  "diagonal",
  "red",
  "ambient"
 ]
}
</script>
</head>
<body>
<div id="mal07-field" role="img" aria-label="A large red triangle cleaves a white field in a slow repeating wave, sweeping past faint black and grey blocks — the dynamic diagonal as pure agitating force.">
  <div id="mal07-wedge"></div>
</div>
<div class="mal07-cap">Red Wedge</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const PAL={black:'#111111'};
  const field=document.getElementById('mal07-field'); if(!field) return;
  const wedge=document.getElementById('mal07-wedge');
  for(let i=0;i<3;i++){
    const blk=document.createElement('div');
    const c=i===0?PAL.black:'#dedace';
    blk.style.cssText='position:absolute;background:'+c+';opacity:'+(i===0?0.9:0.5)+';';
    const w=18+Math.random()*22, h=10+Math.random()*30;
    blk.style.width=w+'%'; blk.style.height=h+'%';
    blk.style.left=(8+i*30)+'%'; blk.style.top=(20+Math.random()*40)+'%';
    blk.style.transform='rotate('+(-12+Math.random()*24)+'deg)';
    field.insertBefore(blk, wedge);
  }
  if(REDUCED){ wedge.style.transform='translateX(22%) rotate(1deg)'; }
  function start(){ field.classList.add('run'); }
  function stop(){ field.classList.remove('run'); }
  document.addEventListener('visibilitychange', ()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });
  if(!REDUCED) start();
})();
</script>
</body>
</html>
