<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Logo Wall Marquee - a 'Trusted by teams at' section with two rows of invented geometric company marks on chips, sliding in opposite directions on a seamless loop.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Logo Wall Marquee</title>
<style>
  :root{
    --pro-bg:#0d1117;
    --pro-surface:#161b22;
    --pro-border:rgba(255,255,255,.08);
    --pro-text:#e6edf3;
    --pro-muted:#8b949e;
    --pro-accent:#8b949e;
    --pro-radius:12px;
    --pro-font:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--pro-bg)}
  .lwm-stage{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;
    gap:4vmin;padding:6vmin 0;font-family:var(--pro-font);color:var(--pro-text)}
  .lwm-head{display:flex;justify-content:center;padding:0 6vmin;user-select:none}
  .lwm-eyebrow{display:inline-flex;align-items:center;gap:2vmin;font-size:clamp(8px,2.1vmin,12px);
    font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--pro-muted)}
  .lwm-eyebrow::before,.lwm-eyebrow::after{content:"";width:5vmin;height:1px;
    background:linear-gradient(90deg,transparent,var(--pro-muted))}
  .lwm-eyebrow::after{transform:scaleX(-1)}
  .lwm-rows{position:relative;display:flex;flex-direction:column;gap:2.6vmin}
  .lwm-rows::before,.lwm-rows::after{content:"";position:absolute;top:0;bottom:0;width:13%;
    z-index:2;pointer-events:none}
  .lwm-rows::before{left:0;background:linear-gradient(90deg,var(--pro-bg),transparent)}
  .lwm-rows::after{right:0;background:linear-gradient(270deg,var(--pro-bg),transparent)}
  .lwm-row{overflow:hidden}
  .lwm-track{display:flex;width:max-content;padding:.4vmin 0;
    animation:lwm-slide 34s linear infinite;will-change:transform}
  .lwm-track.lwm-b{animation-duration:41s;animation-direction:reverse}
  .lwm-row:hover .lwm-track,.lwm-paused .lwm-track{animation-play-state:paused}
  .lwm-chip{flex:none;display:inline-flex;align-items:center;gap:1.7vmin;margin-right:2.4vmin;
    padding:1.7vmin 2.8vmin;border-radius:var(--pro-radius);
    background:var(--pro-surface);border:1px solid var(--pro-border);
    transition:border-color .4s,transform .4s}
  .lwm-chip:hover{border-color:color-mix(in srgb,var(--pro-accent) 40%,var(--pro-border));
    transform:translateY(-.4vmin)}
  .lwm-ico{display:inline-flex;color:var(--pro-accent)}
  .lwm-mark{width:clamp(16px,3.6vmin,27px);height:clamp(16px,3.6vmin,27px);display:block}
  .lwm-wm{font-size:clamp(11px,2.7vmin,18px);font-weight:700;letter-spacing:-.01em;
    color:var(--pro-text);white-space:nowrap}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:var(--pro-muted);opacity:.5;letter-spacing:.08em;text-transform:uppercase;
    user-select:none;pointer-events:none}
  @keyframes lwm-slide{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @media (prefers-reduced-motion:reduce){.lwm-track{animation:none}}
</style>
</head>
<body>
  <div class="lwm-stage" id="lwm-stage" role="img"
       aria-label="Trusted-by logo wall: two rows of invented geometric brand marks — Northwind, Vertex, Lumen, Halcyon, Arcus, Nimbus, Meridian, Quanta, Solace, Fathom, Orbital, Beacon — scrolling seamlessly in opposite directions.">
    <div class="lwm-head"><span class="lwm-eyebrow">Trusted by teams at</span></div>
    <div class="lwm-rows">
      <div class="lwm-row"><div class="lwm-track" id="lwm-a"></div></div>
      <div class="lwm-row"><div class="lwm-track lwm-b" id="lwm-b"></div></div>
    </div>
  </div>
  <div class="cap" aria-hidden="true">Logo Wall Marquee</div>
  <script>(function(){"use strict";
    var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
    function mk(inner){return '<svg class="lwm-mark" viewBox="0 0 24 24" fill="none" '+
      'stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" '+
      'aria-hidden="true">'+inner+'</svg>';}
    // Invented, purely geometric marks — no real brands.
    var S={
      ring:'<circle cx="12" cy="12" r="8"/>',
      tri:'<path d="M12 4l8.4 15H3.6z" fill="currentColor" stroke="none"/>',
      hex:'<path d="M12 3l7.8 4.5v9L12 21l-7.8-4.5v-9z"/>',
      dia:'<path d="M12 3l9 9-9 9-9-9z"/>',
      chev:'<path d="M4 8l8 5 8-5M4 14l8 5 8-5"/>',
      arch:'<path d="M4 17a8 8 0 0116 0"/>',
      venn:'<circle cx="9.3" cy="12" r="6"/><circle cx="14.7" cy="12" r="6"/>',
      pent:'<path d="M12 3l8.5 6.2-3.2 10H6.7l-3.2-10z"/>',
      bars:'<path d="M6 18V9M12 18V5M18 18v-6" stroke-width="3"/>',
      disc:'<circle cx="12" cy="12" r="7.5" fill="currentColor" stroke="none"/>',
      star:'<path d="M12 2l2.6 7.4L22 12l-7.4 2.6L12 22l-2.6-7.4L2 12l7.4-2.6z" fill="currentColor" stroke="none"/>',
      ast:'<path d="M12 3v18M4.4 7.5l15.2 9M19.6 7.5l-15.2 9" stroke-width="1.8"/>'
    };
    // Two rows of invented companies [wordmark, mark].
    var rowA=[["Northwind","hex"],["Vertex","tri"],["Lumen","ring"],
              ["Halcyon","arch"],["Arcus","chev"],["Nimbus","venn"]];
    var rowB=[["Meridian","pent"],["Quanta","bars"],["Solace","disc"],
              ["Fathom","star"],["Orbital","dia"],["Beacon","ast"]];
    function chip(b){return '<span class="lwm-chip"><span class="lwm-ico">'+mk(S[b[1]])+
      '</span><span class="lwm-wm">'+b[0]+'</span></span>';}
    function fill(el,list){ if(!el)return; var h=list.map(chip).join(''); el.innerHTML=h+h; }
    fill(document.getElementById('lwm-a'),rowA);
    fill(document.getElementById('lwm-b'),rowB);
    if(reduce)return;
    var stage=document.getElementById('lwm-stage');
    document.addEventListener('visibilitychange',function(){
      if(stage) stage.classList.toggle('lwm-paused',document.hidden);
    });
  })();
  </script>
