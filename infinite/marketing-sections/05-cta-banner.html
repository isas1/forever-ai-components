<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="CTA Banner - a centered rounded call-to-action band with a slowly shifting purple-to-cyan gradient, a bold headline, a subline, a white primary button with a sweeping sheen and a ghost outline button.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CTA Banner</title>
<style>
  :root{
    --pro-bg:#0d1117;
    --pro-surface:#161b22;
    --pro-border:rgba(255,255,255,.08);
    --pro-text:#e6edf3;
    --pro-muted:#8b949e;
    --pro-accent:#7c5cff;
    --pro-accent-2:#22d3ee;
    --pro-radius:22px;
    --pro-font:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--pro-bg)}
  .ctb-stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    padding:5vmin;font-family:var(--pro-font);color:var(--pro-text)}
  .ctb-band{position:relative;overflow:hidden;width:min(90%,560px);text-align:center;
    border-radius:var(--pro-radius);padding:clamp(24px,7.5vmin,54px) clamp(18px,6vmin,46px);
    background:linear-gradient(120deg,
      color-mix(in srgb,var(--pro-accent) 92%,var(--pro-bg)),
      color-mix(in srgb,var(--pro-accent) 42%,var(--pro-accent-2)),
      color-mix(in srgb,var(--pro-accent-2) 82%,var(--pro-bg)));
    background-size:220% 220%;animation:ctb-shift 15s ease-in-out infinite;
    box-shadow:0 22px 60px color-mix(in srgb,var(--pro-accent) 30%,transparent),
      inset 0 0 0 1px color-mix(in srgb,var(--pro-text) 16%,transparent)}
  .ctb-band::before{content:"";position:absolute;inset:-45%;pointer-events:none;
    background:radial-gradient(circle at 32% 30%,
      color-mix(in srgb,var(--pro-text) 24%,transparent),transparent 46%);
    animation:ctb-orb 19s ease-in-out infinite}
  .ctb-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center}
  .ctb-eyebrow{display:inline-block;font-size:clamp(9px,1.9vmin,12px);font-weight:700;
    letter-spacing:.14em;text-transform:uppercase;color:var(--pro-text);
    background:color-mix(in srgb,var(--pro-bg) 32%,transparent);
    border:1px solid color-mix(in srgb,var(--pro-text) 22%,transparent);
    padding:.6vmin 1.8vmin;border-radius:999px;transition:opacity .5s}
  .ctb-eyebrow.ctb-fade{opacity:0}
  .ctb-head{margin:2.6vmin 0 0;font-size:clamp(19px,5.6vmin,38px);font-weight:800;
    line-height:1.08;letter-spacing:-.02em;color:var(--pro-text);
    text-shadow:0 2px 20px color-mix(in srgb,var(--pro-bg) 45%,transparent)}
  .ctb-sub{margin:1.8vmin auto 0;max-width:34ch;font-size:clamp(10px,2.3vmin,14px);
    line-height:1.5;color:color-mix(in srgb,var(--pro-text) 90%,var(--pro-bg))}
  .ctb-actions{display:flex;flex-wrap:wrap;justify-content:center;gap:1.8vmin;margin-top:3.4vmin}
  .ctb-btn{font-size:clamp(11px,2.3vmin,14px);font-weight:700;white-space:nowrap;cursor:pointer;
    position:relative;overflow:hidden;border-radius:calc(var(--pro-radius) - 11px);
    padding:1.5vmin clamp(14px,3.4vmin,28px);border:1px solid transparent}
  .ctb-primary{background:var(--pro-text);color:var(--pro-bg);
    box-shadow:0 10px 26px color-mix(in srgb,var(--pro-bg) 42%,transparent)}
  .ctb-primary::after{content:"";position:absolute;top:0;bottom:0;left:0;width:65%;
    background:linear-gradient(105deg,transparent 18%,
      color-mix(in srgb,var(--pro-accent) 30%,transparent),transparent 82%);
    transform:translateX(-190%);animation:ctb-sheen 4.6s ease-in-out infinite}
  .ctb-ghost{background:color-mix(in srgb,var(--pro-bg) 14%,transparent);color:var(--pro-text);
    border:1px solid color-mix(in srgb,var(--pro-text) 42%,transparent)}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:var(--pro-muted);opacity:.5;letter-spacing:.08em;text-transform:uppercase;
    user-select:none;pointer-events:none}
  @keyframes ctb-shift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  @keyframes ctb-orb{0%,100%{transform:translate(0,0)}50%{transform:translate(20%,14%)}}
  @keyframes ctb-sheen{0%,14%{transform:translateX(-190%)}55%{transform:translateX(230%)}100%{transform:translateX(230%)}}
  @media (prefers-reduced-motion:reduce){
    .ctb-band,.ctb-band::before,.ctb-primary::after{animation:none}
    .ctb-band{background-position:50% 50%}
    .ctb-primary::after{opacity:0}
  }
</style>
</head>
<body>
  <div class="ctb-stage" role="img"
       aria-label="Call-to-action banner on a slowly shifting purple-to-cyan gradient: eyebrow tag 'Free to start', headline 'Ship your first component today', a supporting subline, a white 'Start building free' button and a 'Read the docs' outline button.">
    <div class="ctb-band">
      <div class="ctb-inner">
        <span class="ctb-eyebrow" id="ctb-eye">Free to start</span>
        <h2 class="ctb-head">Ship your first<br>component today</h2>
        <p class="ctb-sub">Copy one self-contained file into your page. No build step, no dependencies — it works online or off.</p>
        <div class="ctb-actions">
          <div class="ctb-btn ctb-primary">Start building free</div>
          <div class="ctb-btn ctb-ghost">Read the docs</div>
        </div>
      </div>
    </div>
  </div>
  <div class="cap" aria-hidden="true">CTA Banner</div>
  <script>(function(){"use strict";
    var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
    var eye=document.getElementById('ctb-eye');
    if(!eye)return;
    // Rotating trust tags for the eyebrow pill.
    var tags=["Free to start","Open source","Ship in minutes","No credit card"];
    if(reduce)return; // leave first tag as a meaningful static state
    var idx=0, running=true;
    document.addEventListener('visibilitychange',function(){ running=!document.hidden; });
    (function loop(){
      setTimeout(function(){
        if(running){
          eye.classList.add('ctb-fade');
          setTimeout(function(){
            idx=(idx+1)%tags.length;
            eye.textContent=tags[idx];
            eye.classList.remove('ctb-fade');
          },520);
        }
        loop();
      },2800);
    })();
  })();
  </script>
