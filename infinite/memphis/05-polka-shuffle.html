<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Grid of Memphis polka dots, rings and squares swaying and breathing while colors cross-fade between clashing 80s palettes on dark plum.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Polka Shuffle</title>
<style>
  html,body{margin:0;height:100%;background:#141019;overflow:hidden}
  #mp05-stage{position:fixed;inset:0;display:block}
  #mp05-c{position:absolute;inset:0;width:100%;height:100%;display:block}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important}}
</style>
</head>
<body>
<div id="mp05-stage" role="img" aria-label="Memphis-style polka dots shuffling between clashing 1980s color palettes on a dark field.">
  <canvas id="mp05-c"></canvas>
</div>
<div class="cap">Polka Shuffle</div>
<script>
(function(){
  "use strict";
  var BG="#141019";
  // Clashing Memphis palettes. Dots cross-fade between consecutive palettes.
  var PALS=[
    ["#36d6c3","#ff5d8f","#ffd23f","#7b5cff","#ff7a3d","#19c3ff"],
    ["#ff2e93","#00e0b0","#ffe14d","#5b3bff","#ff8a00","#2bd1ff"],
    ["#ffd23f","#ff5d8f","#36d6c3","#9b6cff","#ff5a36","#16e0a0"]
  ];
  var cv=document.getElementById("mp05-c"), ctx=cv.getContext("2d");
  var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
  var DPR=Math.min(2,window.devicePixelRatio||1);
  var W=0,H=0,unit=0,cell=0,cols=0,rows=0,N=0;
  // typed-array state, allocation-free loop
  var MAX=110;
  var bx=new Float32Array(MAX),by=new Float32Array(MAX); // home positions
  var ph=new Float32Array(MAX);   // phase offset
  var rb=new Float32Array(MAX);   // base radius (fraction of cell)
  var ci=new Int16Array(MAX);     // color slot index 0..5
  var shp=new Int8Array(MAX);     // 0 dot, 1 ring, 2 square
  function rand(a,b){return a+Math.random()*(b-a);}
  function layout(){
    var r=cv.getBoundingClientRect();
    W=Math.max(1,Math.round(r.width));H=Math.max(1,Math.round(r.height));
    cv.width=Math.round(W*DPR);cv.height=Math.round(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
    unit=Math.min(W,H);
    // grid sized so dot count stays <=110 and scales with frame
    cell=Math.max(34,unit/6.2);
    cols=Math.ceil(W/cell)+1;rows=Math.ceil(H/cell)+1;
    N=Math.min(MAX,cols*rows);
    var i=0;
    for(var gy=0;gy<rows&&i<N;gy++){
      for(var gx=0;gx<cols&&i<N;gx++){
        // brick offset every other row = Memphis irregular grid
        var ox=(gy&1)?cell*0.5:0;
        bx[i]=gx*cell+ox-cell*0.5;
        by[i]=gy*cell+cell*0.5;
        ph[i]=Math.random()*6.2831;
        rb[i]=rand(0.20,0.40);
        ci[i]=i%6;
        shp[i]=(Math.random()<0.18)?(Math.random()<0.5?1:2):0;
        i++;
      }
    }
    N=i;
  }
  // color lerp in hex
  function mix(a,b,t){
    var ar=parseInt(a.slice(1,3),16),ag=parseInt(a.slice(3,5),16),ab=parseInt(a.slice(5,7),16);
    var br=parseInt(b.slice(1,3),16),bg=parseInt(b.slice(3,5),16),bb=parseInt(b.slice(5,7),16);
    var r=(ar+(br-ar)*t)|0,g=(ag+(bg-ag)*t)|0,bl=(ab+(bb-ab)*t)|0;
    return "rgb("+r+","+g+","+bl+")";
  }
  function drawShape(s,x,y,rad,col){
    ctx.fillStyle=col;
    if(s===0){ctx.beginPath();ctx.arc(x,y,rad,0,6.2831);ctx.fill();}
    else if(s===2){ctx.fillRect(x-rad*0.9,y-rad*0.9,rad*1.8,rad*1.8);}
    else{ctx.beginPath();ctx.arc(x,y,rad,0,6.2831);ctx.fill();
      ctx.fillStyle=BG;ctx.beginPath();ctx.arc(x,y,rad*0.5,0,6.2831);ctx.fill();}
  }
  function frame(now){
    var t=now*0.001;
    // palette cross-fade: cycle index + eased blend
    var per=4.0; // seconds per palette
    var prog=(t/per);
    var pa=((prog|0)%PALS.length+PALS.length)%PALS.length;
    var pb=(pa+1)%PALS.length;
    var f=prog-(prog|0);
    f=f*f*(3-2*f); // smoothstep — slow, seizure-safe transition
    ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
    var A=PALS[pa],B=PALS[pb];
    for(var i=0;i<N;i++){
      var s=ph[i];
      // shuffle: gentle orbital sway + breathing radius
      var sx=Math.cos(t*0.9+s)*cell*0.16;
      var sy=Math.sin(t*0.9+s*1.3)*cell*0.16;
      var breathe=0.85+0.22*Math.sin(t*1.7+s);
      var rad=cell*rb[i]*breathe;
      var col=mix(A[ci[i]],B[ci[i]],f);
      drawShape(shp[i],bx[i]+sx,by[i]+sy,rad,col);
    }
  }
  function staticFrame(){
    ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
    var A=PALS[0];
    for(var i=0;i<N;i++){
      drawShape(shp[i],bx[i],by[i],cell*rb[i],A[ci[i]]);
    }
  }
  var raf=0,running=false;
  function loop(now){ if(!running)return; frame(now); raf=requestAnimationFrame(loop); }
  function start(){ if(running||reduce)return; running=true; raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf)cancelAnimationFrame(raf); raf=0; }
  function init(){ layout(); if(reduce){staticFrame();return;} start(); }
  var rt=0;
  window.addEventListener("resize",function(){
    clearTimeout(rt);
    rt=setTimeout(function(){ layout(); if(reduce){staticFrame();} },120);
  });
  document.addEventListener("visibilitychange",function(){
    if(document.hidden)stop(); else start();
  });
  init();
})();
</script>
</body>
</html>
