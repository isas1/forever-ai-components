<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Looping SVG noodle lines in teal, pink and yellow snake around the frame with pulsing dots and spinning confetti on a dark violet field.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Noodle Loop</title>
<style>
  :root{
    --mp07-bg:#141019;
    --mp07-teal:#36d6c3;
    --mp07-pink:#ff5d8f;
    --mp07-yellow:#ffd23f;
    --mp07-violet:#9b6bff;
    --mp07-coral:#ff7a45;
  }
  html,body{margin:0;height:100%;background:var(--mp07-bg);overflow:hidden}
  .mp07-stage{
    position:fixed;inset:0;display:block;
    background:
      radial-gradient(120% 120% at 18% 12%, rgba(155,107,255,.16), transparent 46%),
      radial-gradient(120% 120% at 86% 88%, rgba(54,214,195,.16), transparent 46%),
      var(--mp07-bg);
  }
  #mp07-svg{position:absolute;inset:0;width:100%;height:100%}
  /* noodles: animate ONLY stroke-dashoffset (compositor-friendly transform-ish via SMIL) — here CSS on dashoffset is paint, so we drive via transform of a clip-less mask?  -> use stroke-dashoffset animation which is GPU-cheap for stroked paths in modern engines, kept to <=6 paths */
  .mp07-noodle{
    fill:none;stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:var(--mp07-dash);
    animation:mp07-flow var(--mp07-dur) linear infinite;
    animation-play-state:running;
  }
  @keyframes mp07-flow{to{stroke-dashoffset:var(--mp07-off)}}
  .mp07-dot{transform-box:fill-box;transform-origin:center;
    animation:mp07-pulse 2.4s ease-in-out infinite}
  @keyframes mp07-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}
  .mp07-confetti{transform-box:fill-box;transform-origin:center;
    animation:mp07-spin var(--mp07-sd,9s) linear infinite}
  @keyframes mp07-spin{to{transform:rotate(360deg)}}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
    .mp07-noodle{stroke-dashoffset:0!important}
  }
</style>
</head>
<body>
<main class="mp07-stage" role="img" aria-label="Memphis-style looping noodle lines snaking around the frame over a dark violet field with confetti and dots">
  <svg id="mp07-svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <!-- static dotted grid texture, drawn once, never repaints -->
      <pattern id="mp07-grid" width="26" height="26" patternUnits="userSpaceOnUse">
        <circle cx="3" cy="3" r="1.4" fill="#ffffff" opacity=".05"/>
      </pattern>
    </defs>
    <rect x="0" y="0" width="400" height="400" fill="url(#mp07-grid)"/>

    <!-- NOODLES: 5 closed-ish snaking loops. Each animates stroke-dashoffset to read as a
         travelling noodle. dasharray = [dashLen gapLen], offset travels one full period. -->
    <g stroke-width="13" opacity=".96">
      <path class="mp07-noodle"
        style="--mp07-dash:54 600;--mp07-off:-654;--mp07-dur:5.5s"
        stroke="var(--mp07-violet)"
        d="M40 90 C 120 30, 200 150, 300 80 S 380 200, 320 270 S 180 230, 120 300 S 30 360, 40 280 S 0 150, 40 90 Z"/>
      <path class="mp07-noodle"
        style="--mp07-dash:44 520;--mp07-off:-564;--mp07-dur:6.8s"
        stroke="var(--mp07-pink)"
        d="M90 350 C 40 300, 110 230, 70 170 S 150 70, 230 120 S 360 90, 350 180 S 290 300, 200 290 S 140 380, 90 350 Z"/>
      <path class="mp07-noodle"
        style="--mp07-dash:38 480;--mp07-off:-518;--mp07-dur:4.6s"
        stroke="var(--mp07-yellow)"
        d="M330 330 C 380 270, 300 210, 340 150 S 250 40, 170 80 S 60 50, 90 130 S 160 210, 130 270 S 280 390, 330 330 Z"/>
      <path class="mp07-noodle"
        style="--mp07-dash:30 440;--mp07-off:-470;--mp07-dur:7.6s"
        stroke="var(--mp07-teal)"
        d="M200 40 C 280 70, 250 160, 320 200 S 320 330, 240 320 S 150 360, 150 290 S 60 250, 100 180 S 120 10, 200 40 Z"/>
      <path class="mp07-noodle"
        style="--mp07-dash:22 360;--mp07-off:-382;--mp07-dur:5.9s"
        stroke="var(--mp07-coral)" stroke-width="0"
        d="M60 200 C 140 160, 180 250, 260 220 S 360 260, 300 320"/>
    </g>

    <!-- Memphis accents: static glow-free shapes; only transform/opacity animate -->
    <g>
      <circle class="mp07-dot" style="animation-delay:0s"   cx="58"  cy="60"  r="7" fill="var(--mp07-yellow)"/>
      <circle class="mp07-dot" style="animation-delay:.6s"  cx="344" cy="64"  r="6" fill="var(--mp07-teal)"/>
      <circle class="mp07-dot" style="animation-delay:1.2s" cx="60"  cy="338" r="6" fill="var(--mp07-pink)"/>
      <circle class="mp07-dot" style="animation-delay:.9s"  cx="338" cy="340" r="7" fill="var(--mp07-violet)"/>
      <circle class="mp07-dot" style="animation-delay:1.6s" cx="200" cy="200" r="5" fill="var(--mp07-coral)"/>

      <g class="mp07-confetti" style="--mp07-sd:8s;transform-origin:96px 168px">
        <rect x="88" y="160" width="16" height="16" fill="var(--mp07-coral)" transform="rotate(18 96 168)"/>
      </g>
      <g class="mp07-confetti" style="--mp07-sd:11s;transform-origin:306px 246px">
        <polygon points="306,234 316,254 296,254" fill="var(--mp07-teal)"/>
      </g>
      <g class="mp07-confetti" style="--mp07-sd:9.5s;transform-origin:250px 92px">
        <rect x="242" y="84" width="14" height="14" fill="var(--mp07-pink)" transform="rotate(30 250 92)"/>
      </g>
      <g class="mp07-confetti" style="--mp07-sd:13s;transform-origin:150px 308px">
        <polygon points="150,298 159,316 141,316" fill="var(--mp07-yellow)"/>
      </g>

      <!-- a couple of squiggle ticks, static -->
      <path d="M30 200 q 8 -10 16 0 t 16 0" fill="none" stroke="var(--mp07-teal)" stroke-width="3" stroke-linecap="round" opacity=".8"/>
      <path d="M330 130 q 8 -10 16 0 t 16 0" fill="none" stroke="var(--mp07-pink)" stroke-width="3" stroke-linecap="round" opacity=".8"/>
    </g>
  </svg>
  <div class="cap">Noodle Loop</div>
</main>

<script>
(function(){
  "use strict";
  var svg = document.getElementById("mp07-svg");
  if(!svg) return;
  var mq = window.matchMedia("(prefers-reduced-motion:reduce)");

  // Coral overlay noodle: give it width only after load so reduced-motion stays calm.
  // (kept stroke-width 0 in markup as a no-op guard; promote here when motion allowed.)
  function setMotion(reduce){
    var coral = svg.querySelector('.mp07-noodle[stroke="var(--mp07-coral)"]');
    if(coral) coral.setAttribute("stroke-width", reduce ? "0" : "9");
    var state = reduce ? "paused" : "running";
    var nodes = svg.querySelectorAll(".mp07-noodle,.mp07-dot,.mp07-confetti");
    for(var i=0;i<nodes.length;i++){ nodes[i].style.animationPlayState = state; }
  }
  setMotion(mq.matches);
  if(mq.addEventListener) mq.addEventListener("change", function(e){ setMotion(e.matches); });

  // Pause all CSS animations when tab hidden; resume on return (respects reduced-motion).
  document.addEventListener("visibilitychange", function(){
    if(mq.matches) return;
    var state = document.hidden ? "paused" : "running";
    var nodes = svg.querySelectorAll(".mp07-noodle,.mp07-dot,.mp07-confetti");
    for(var i=0;i<nodes.length;i++){ nodes[i].style.animationPlayState = state; }
  });
})();
</script>
</body>
</html>
