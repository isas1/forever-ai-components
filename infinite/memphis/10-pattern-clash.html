<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Three Memphis pattern bands — dots, zigzags, squiggles, confetti, rings — scroll horizontally in opposing directions split by crisp accent s">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pattern Clash</title>
<style>
  html,body{margin:0;height:100%;background:#141019;overflow:hidden}
  #mp10-stage{position:fixed;inset:0;background:#141019}
  #mp10-c{position:absolute;inset:0;width:100%;height:100%;display:block}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important}}
</style>
</head>
<body>
<div id="mp10-stage" role="img" aria-label="Two clashing Memphis-style pattern bands — zigzags, polka dots, confetti and squiggles — sliding past each other in opposite directions.">
  <canvas id="mp10-c"></canvas>
</div>
<div class="cap">Pattern Clash</div>
<script>
(function(){
  "use strict";
  var cv=document.getElementById("mp10-c"),ctx=cv.getContext("2d");
  var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
  // Memphis palette around #36d6c3 accent, on #141019.
  var BG="#141019";
  var PAL=["#36d6c3","#ff4d80","#ffd23f","#7b6cf6","#ff8c42","#f4f0e6","#2bb6d8"];

  var W=0,H=0,DPR=1,band=0,running=false,raf=0,t0=0;
  // motif kinds: 0 dot, 1 zig, 2 squiggle, 3 confetti-triangle, 4 ring
  var KIND=[0,1,2,3,4];

  function resize(){
    DPR=Math.min(2,window.devicePixelRatio||1);
    W=cv.clientWidth;H=cv.clientHeight;
    cv.width=Math.max(1,Math.round(W*DPR));
    cv.height=Math.max(1,Math.round(H*DPR));
    ctx.setTransform(DPR,0,0,DPR,0,0);
    band=H/3;
  }

  // Draw one motif at local origin, size s, color col, rotation rot.
  function motif(kind,s,col,rot){
    ctx.save();ctx.rotate(rot);
    ctx.fillStyle=col;ctx.strokeStyle=col;
    ctx.lineWidth=s*0.18;ctx.lineCap="round";ctx.lineJoin="round";
    if(kind===0){ // dot
      ctx.beginPath();ctx.arc(0,0,s*0.5,0,6.2832);ctx.fill();
    }else if(kind===1){ // zigzag stroke
      ctx.beginPath();
      ctx.moveTo(-s*0.7,-s*0.4);ctx.lineTo(-s*0.23,s*0.4);
      ctx.lineTo(s*0.23,-s*0.4);ctx.lineTo(s*0.7,s*0.4);
      ctx.stroke();
    }else if(kind===2){ // squiggle
      ctx.beginPath();
      ctx.moveTo(-s*0.7,0);
      ctx.bezierCurveTo(-s*0.45,-s*0.7,-s*0.15,s*0.7,0,0);
      ctx.bezierCurveTo(s*0.15,-s*0.7,s*0.45,s*0.7,s*0.7,0);
      ctx.stroke();
    }else if(kind===3){ // confetti triangle
      ctx.beginPath();
      ctx.moveTo(0,-s*0.55);ctx.lineTo(s*0.5,s*0.45);ctx.lineTo(-s*0.5,s*0.45);
      ctx.closePath();ctx.fill();
    }else{ // ring
      ctx.beginPath();ctx.arc(0,0,s*0.42,0,6.2832);ctx.stroke();
    }
    ctx.restore();
  }

  // A band: tiled motif grid scrolling horizontally.
  // bandIdx 0 top,1 mid,2 bottom. dir +/-1. each band a distinct motif set.
  function drawBand(y,h,off,kindA,kindB,baseCol,altCol,cell,jitterSeed){
    ctx.save();
    ctx.beginPath();ctx.rect(0,y,W,h);ctx.clip();
    var cols=Math.ceil(W/cell)+2;
    var rows=Math.ceil(h/cell)+1;
    var s=cell*0.62;
    var cy=y+cell*0.5;
    for(var r=0;r<rows;r++){
      var rowY=cy+r*cell;
      // staggered row offset for organic Memphis feel
      var stag=(r&1)?cell*0.5:0;
      for(var i=-1;i<cols;i++){
        var x=i*cell+stag-((off%cell)+cell)%cell+cell;
        var id=(r*31+i*17+jitterSeed)>>>0;
        var kind=((id%5)<3)?kindA:kindB;
        var col=((id&3)===0)?altCol:(((id>>2)&1)?baseCol:PAL[(id>>3)%PAL.length]);
        var rot=((id%7)-3)*0.32;
        ctx.save();
        ctx.translate(x,rowY+((id&8)?-cell*0.06:cell*0.06));
        motif(kind,s*(0.78+((id%5)*0.06)),col,rot);
        ctx.restore();
      }
    }
    ctx.restore();
  }

  // Static glow seam between bands — drawn once per frame as a flat gradient
  // already-baked-into-bg style. We pre-render seams as solid bars (no per-frame filter).
  function drawSeams(){
    // thin accent rule lines where bands meet (static, crisp)
    ctx.save();
    ctx.fillStyle="#141019";
    // top seam
    ctx.fillRect(0,band-2.5,W,5);
    ctx.fillRect(0,band*2-2.5,W,5);
    ctx.fillStyle="#36d6c3";
    ctx.fillRect(0,band-1.2,W,2.4);
    ctx.fillStyle="#ff4d80";
    ctx.fillRect(0,band*2-1.2,W,2.4);
    ctx.restore();
  }

  function frame(now){
    if(!running)return;
    if(!t0)t0=now;
    var e=(now-t0)/1000;
    // opposite-direction scroll speeds; bottom slowest for parallax clash
    var oTop=e*78;
    var oMid=-e*54;
    var oBot=e*36;

    ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);

    var cell=Math.max(30,Math.min(64,W/6.2));
    // Band 1: turquoise dots + zigzags
    drawBand(0,band,oTop,0,1,"#36d6c3","#ffd23f",cell,2);
    // Band 2 (clash core): pink squiggles + confetti, opposite dir, tighter cell
    drawBand(band,band,oMid,2,3,"#ff4d80","#7b6cf6",cell*0.86,57);
    // Band 3: violet rings + dots
    drawBand(band*2,H-band*2,oBot,4,0,"#7b6cf6","#ff8c42",cell,113);

    drawSeams();
    raf=requestAnimationFrame(frame);
  }

  function drawOneFrame(){
    ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
    var cell=Math.max(30,Math.min(64,W/6.2));
    drawBand(0,band,W*0.18,0,1,"#36d6c3","#ffd23f",cell,2);
    drawBand(band,band,-W*0.22,2,3,"#ff4d80","#7b6cf6",cell*0.86,57);
    drawBand(band*2,H-band*2,W*0.1,4,0,"#7b6cf6","#ff8c42",cell,113);
    drawSeams();
  }

  function start(){
    if(running)return;
    running=true;t0=0;raf=requestAnimationFrame(frame);
  }
  function stop(){
    running=false;if(raf)cancelAnimationFrame(raf);raf=0;
  }

  resize();
  window.addEventListener("resize",function(){
    resize();
    if(reduce)drawOneFrame();
  });

  if(reduce){drawOneFrame();return;}

  document.addEventListener("visibilitychange",function(){
    if(document.hidden)stop();else start();
  });

  start();
})();
</script>
</body>
</html>
