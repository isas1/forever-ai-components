<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A glowing cyan area line streams across a faint grid with a white head dot, scrolling a live time-series of softly noisy sine data.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live Line Sweep</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0b1020;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  canvas{display:block;width:100%;height:100%}
  .cap{position:fixed;right:8px;bottom:6px;font-size:10px;letter-spacing:.08em;
    color:#4dd1ff;opacity:.4;text-transform:uppercase}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/micro-dataviz/02-line-sweep.html",
 "title": "Live Line Sweep",
 "description": "A glowing cyan area line chart scrolls a live sine-plus-noise time-series across a faint grid, with a white head dot marking the latest value.",
 "useWhen": "Dashboard hero sections, live-data widgets, terminal-style monitoring UI backgrounds, or any dark-theme data-viz accent.",
 "avoidWhen": "Light backgrounds (hardcoded dark navy). Contexts where users need to read real data — values are synthetic sine noise, not wired to real data.",
 "agentPrompt": "Change COL to '#ff6b6b' for a red alert theme, reduce M to 60 for fewer data points, and increase shadowBlur to 16 for a stronger glow.",
 "editableAreas": [
  "accent color (COL='#4dd1ff')",
  "data buffer length (M=120)",
  "phase step speed (phase+=0.12)",
  "noise amplitude (0.12 factor)",
  "update interval (step=90ms)",
  "fill gradient opacity stops ('44'/'00')"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (disables noise, freezes update)",
  "visibilitychange pause",
  "DPR-aware canvas sizing"
 ],
 "knownLimitations": [
  "Data is synthetic (sine+noise) — must replace next() to wire real data",
  "Background color hardcoded in CSS; must edit to change dark navy",
  "Grid always shows 4 horizontal lines with no labels or axis values"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "line-chart",
  "data-viz",
  "canvas",
  "glow",
  "time-series",
  "ambient",
  "monospace"
 ]
}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div class="cap">line sweep</div>
<script>
(function(){
  const cv=document.getElementById('c'),ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  let W,H,DPR; const COL='#4dd1ff';
  const M=120; let data=new Array(M).fill(0.5), head=0, phase=0;
  function resize(){DPR=Math.min(2,devicePixelRatio||1);W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  function next(){
    phase+=0.12;
    let v=0.5+0.28*Math.sin(phase)+0.12*Math.sin(phase*2.3+1)+ (reduce?0:(Math.random()-0.5)*0.12);
    v=Math.max(0.04,Math.min(0.96,v));
    data[head]=v; head=(head+1)%M;
  }
  let last=0,acc=0;
  function draw(t){
    if(document.hidden){last=t;return raf()}
    const dt=Math.min(64,t-last);last=t;acc+=dt;
    const step=reduce?9999:90;
    while(acc>=step){acc-=step;next();}
    ctx.clearRect(0,0,W,H);
    const padL=W*0.06,padR=W*0.06,top=H*0.2,bot=H*0.8;
    // grid
    ctx.strokeStyle='#ffffff10';ctx.lineWidth=1;
    for(let i=0;i<4;i++){const y=top+(bot-top)*i/3;ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke();}
    const px=i=>padL+(W-padL-padR)*i/(M-1);
    const py=v=>bot-(bot-top)*v;
    // fill
    ctx.beginPath();ctx.moveTo(px(0),bot);
    for(let i=0;i<M;i++){const v=data[(head+i)%M];ctx.lineTo(px(i),py(v));}
    ctx.lineTo(px(M-1),bot);ctx.closePath();
    const g=ctx.createLinearGradient(0,top,0,bot);g.addColorStop(0,COL+'44');g.addColorStop(1,COL+'00');
    ctx.fillStyle=g;ctx.fill();
    // line
    ctx.beginPath();
    for(let i=0;i<M;i++){const v=data[(head+i)%M];const x=px(i),y=py(v);i?ctx.lineTo(x,y):ctx.moveTo(x,y);}
    ctx.strokeStyle=COL;ctx.lineWidth=2;ctx.shadowColor=COL;ctx.shadowBlur=8;ctx.stroke();ctx.shadowBlur=0;
    // head dot
    const lv=data[(head+M-1)%M];ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(px(M-1),py(lv),3,0,7);ctx.fill();
    raf();
  }
  function raf(){requestAnimationFrame(draw)}
  addEventListener('resize',resize);
  document.addEventListener('visibilitychange',()=>{if(!document.hidden)last=performance.now()});
  resize();raf();
})();
</script>
</body>
</html>
