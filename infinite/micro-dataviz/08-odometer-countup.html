<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Six-digit mechanical odometer with rolling number reels counting up to a random REQUESTS/SEC value in mint-green mono type.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Odometer Count-Up</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0d0f14;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  canvas{display:block;width:100%;height:100%}
  .cap{position:fixed;right:8px;bottom:6px;font-size:10px;letter-spacing:.08em;
    color:#7af0c0;opacity:.4;text-transform:uppercase}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/micro-dataviz/08-odometer-countup.html",
 "title": "Odometer Count-Up",
 "description": "Six-digit mechanical odometer with rolling digit reels easing toward a random REQUESTS/SEC target; tap/click to randomize a new target value.",
 "useWhen": "Dashboards, live metric displays, or hero stats counters needing a tactile mechanical feel.",
 "avoidWhen": "Contexts requiring exact real-time data binding — target is random; wire tgt externally before shipping.",
 "agentPrompt": "Change the label to 'USERS ONLINE', set the accent color COL to '#ff9f43', and slow the easing by changing 0.045 to 0.02.",
 "editableAreas": [
  "accent color (COL='#7af0c0')",
  "digit count (DIG=6)",
  "easing speed (0.045)",
  "label text ('REQUESTS / SEC')",
  "target range (Math.random()*1000000)",
  "hold idle delay (hold>80)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (reduce=...matches)",
  "visibilitychange pause",
  "DPR-aware canvas sizing"
 ],
 "knownLimitations": [
  "Target value is random — must replace tgt assignment with external data source for real metrics",
  "Background color hardcoded in CSS (#0d0f14); must edit to use on light backgrounds"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "odometer",
  "counter",
  "number",
  "canvas",
  "data-viz",
  "mechanical",
  "monospace"
 ]
}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div class="cap">odometer</div>
<script>
(function(){
  const cv=document.getElementById('c'),ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  let W,H,DPR; const COL='#7af0c0';
  const DIG=6;
  let cur=0, tgt=Math.floor(Math.random()*900000), hold=0;
  function resize(){DPR=Math.min(2,devicePixelRatio||1);W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  let last=0;
  function draw(t){
    if(document.hidden){last=t;return raf()}
    last=t;
    if(reduce)cur=tgt; else{cur+=(tgt-cur)*0.045;
      if(Math.abs(tgt-cur)<1){hold++;if(hold>80){hold=0;tgt=Math.floor(Math.random()*1000000);}}}
    ctx.clearRect(0,0,W,H);
    const cellW=Math.min(W*0.14, H*0.5), cellH=cellW*1.5;
    const totalW=cellW*DIG+ (DIG-1)*cellW*0.12;
    const x0=(W-totalW)/2, y0=(H-cellH)/2;
    // label
    ctx.fillStyle=COL;ctx.textAlign='center';ctx.font='600 '+(cellW*0.32)+'px ui-monospace,monospace';
    ctx.textBaseline='alphabetic';
    ctx.fillText('REQUESTS / SEC',W/2,y0-cellH*0.18);
    // each digit reel
    const value=cur, place=[100000,10000,1000,100,10,1];
    for(let d=0;d<DIG;d++){
      const x=x0+d*(cellW+cellW*0.12);
      // slot bg
      ctx.fillStyle='#161b22';rr(x,y0,cellW,cellH,cellW*0.16);ctx.fill();
      ctx.strokeStyle='#2a323d';ctx.lineWidth=1;ctx.stroke();
      // continuous reel position for this place
      const reel=(value/place[d]); // fractional
      const frac=reel - Math.floor(reel);
      const top=Math.floor(reel)%10;
      ctx.save();
      ctx.beginPath();rr(x,y0,cellW,cellH,cellW*0.16);ctx.clip();
      ctx.fillStyle='#e8fff5';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.font='700 '+(cellH*0.62)+'px ui-monospace,monospace';
      const cy=y0+cellH/2;
      for(let k=-1;k<=1;k++){
        const dig=((top+k)%10+10)%10;
        const yy=cy + (-frac+k)*cellH;
        const dist=Math.abs(yy-cy)/cellH;
        ctx.globalAlpha=Math.max(0,1-dist*1.3);
        ctx.fillText(dig,x+cellW/2,yy);
      }
      ctx.restore();ctx.globalAlpha=1;
    }
    // center sheen line
    ctx.strokeStyle=COL+'33';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x0,y0+cellH/2);ctx.lineTo(x0+totalW,y0+cellH/2);ctx.stroke();
    raf();
  }
  function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
  function raf(){requestAnimationFrame(draw)}
  addEventListener('resize',resize);
  document.addEventListener('visibilitychange',()=>{if(!document.hidden)last=performance.now()});
  cv.addEventListener('pointerdown',()=>{tgt=Math.floor(Math.random()*1000000)});
  resize();raf();
})();
</script>
</body>
</html>
