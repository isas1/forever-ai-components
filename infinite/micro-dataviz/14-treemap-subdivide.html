<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Violet-to-magenta squarified treemap whose rounded tiles smoothly resize and re-pack as underlying values shift each cycle.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Treemap Subdivide</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#221026;}
  #tms-c{display:block;width:100%;height:100%;}
  .tms-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1.2 ui-monospace,SFMono-Regular,Menlo,monospace;
       letter-spacing:.14em;color:#d65cff;opacity:.36;text-transform:uppercase;
       pointer-events:none;user-select:none;}
</style>
</head>
<body>
<canvas id="tms-c"></canvas>
<div class="tms-cap">Treemap Subdivide</div>
<script>
(function(){
  const cv=document.getElementById('tms-c'),ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let W,H,DPR,pad;
  function size(){
    DPR=Math.min(devicePixelRatio||1,2);
    W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
    pad=Math.max(6,Math.min(W,H)*0.045);
  }
  addEventListener('resize',()=>{size();retile();});
  const N=11;                       // leaf count
  const hues=[]; for(let i=0;i<N;i++) hues.push(280+ (i/N)*60 - 30); // violet→magenta band
  let vals=rand(),from=[],to=[],t=1,hold=0;
  function rand(){const v=[];for(let i=0;i<N;i++)v.push(0.4+Math.random()*Math.random()*4);return v;}

  // squarified treemap → array of {x,y,w,h,i}
  function squarify(items,x,y,w,h){
    const out=[],total=items.reduce((s,it)=>s+it.v,0);
    // classic squarified treemap
    const queue=items.map(it=>it.v*((w*h)/total));
    const idx=items.map(it=>it.i);
    let cx=x,cy=y,cw=w,ch=h,p=0;
    while(p<queue.length){
      const horizontal=cw<ch;       // lay along shorter side
      const len=horizontal?cw:ch;
      let row=[],rowSum=0,k=p,prevR=Infinity;
      while(k<queue.length){
        const ns=rowSum+queue[k];
        const mx=Math.max(...row,queue[k]),mn=Math.min(...(row.length?row:[queue[k]]),queue[k]);
        const r=Math.max((len*len*mx)/(ns*ns),(ns*ns)/(len*len*mn));
        if(row.length && r>prevR) break;
        row.push(queue[k]);rowSum=ns;prevR=r;k++;
      }
      const thick=rowSum/len;
      let off=0;
      for(let j=p;j<k;j++){
        const seg=queue[j]/thick;
        if(horizontal) out.push({x:cx+off,y:cy,w:seg,h:thick,i:idx[j]});
        else           out.push({x:cx,y:cy+off,w:thick,h:seg,i:idx[j]});
        off+=seg;
      }
      if(horizontal){cy+=thick;ch-=thick;} else {cx+=thick;cw-=thick;}
      p=k;
    }
    return out;
  }

  function layout(v){
    const items=v.map((val,i)=>({v:val,i})).sort((a,b)=>b.v-a.v);
    const r=squarify(items,pad,pad,W-pad*2,H-pad*2);
    const m=[]; r.forEach(c=>m[c.i]=c); return m;
  }

  function retile(){from=layout(vals).map(c=>({...c}));to=from;t=1;}
  function morph(){
    from=to.length?to.map(c=>({...c})):layout(vals).map(c=>({...c}));
    vals=vals.map(x=>Math.max(0.35,x+(Math.random()-0.48)*x*1.1));
    to=layout(vals);t=0;
  }
  size();from=layout(vals).map(c=>({...c}));to=from;

  function ease(p){return p<.5?4*p*p*p:1-Math.pow(-2*p+2,3)/2;}
  function lerpR(a,b,e){return{x:a.x+(b.x-a.x)*e,y:a.y+(b.y-a.y)*e,w:a.w+(b.w-a.w)*e,h:a.h+(b.h-a.h)*e};}

  let boost=0;
  cv.addEventListener('pointermove',()=>{boost=Math.min(boost+0.04,1);});
  cv.addEventListener('click',()=>{if(t>=1){hold=0;t=0;morphTrigger=true;}});
  let morphTrigger=false;

  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#221026';ctx.fillRect(0,0,W,H);
    const e=ease(t),gap=Math.max(1.4,Math.min(W,H)*0.008);
    for(let i=0;i<N;i++){
      if(!from[i]||!to[i])continue;
      const c=lerpR(from[i],to[i],e);
      const x=c.x+gap*0.5,y=c.y+gap*0.5,w=Math.max(0,c.w-gap),h=Math.max(0,c.h-gap);
      if(w<=0||h<=0)continue;
      const area=w*h,big=Math.min(1,area/(W*H*0.18));
      const hue=hues[i];
      const light=22+big*30;
      const g=ctx.createLinearGradient(x,y,x,y+h);
      g.addColorStop(0,`hsl(${hue} 72% ${light+10}%)`);
      g.addColorStop(1,`hsl(${hue-8} 70% ${light}%)`);
      const rr=Math.min(5,w*0.18,h*0.18);
      rrect(x,y,w,h,rr);
      ctx.fillStyle=g;ctx.fill();
      // accent top edge — sparkline-thin highlight
      ctx.strokeStyle=`hsl(${hue} 95% 72% / ${0.25+big*0.45})`;
      ctx.lineWidth=1;
      rrect(x+.5,y+.5,w-1,h-1,Math.max(0,rr-1));ctx.stroke();
      // tiny area tick mark (truth-per-pixel, no number) bottom-left
      if(w>14&&h>10){
        const tl=Math.min(w*0.32,4+big*14);
        ctx.strokeStyle=`hsl(300 100% 80% / ${0.3+big*0.5})`;
        ctx.lineWidth=1.4;ctx.beginPath();
        ctx.moveTo(x+4,y+h-4);ctx.lineTo(x+4+tl,y+h-4);ctx.stroke();
      }
    }
    boost*=0.95;
  }
  function rrect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
  }

  let raf=0;
  function frame(){
    if(t<1){t=Math.min(1,t+(0.012+boost*0.02));}
    else{
      hold+=1;
      if(hold>(morphTrigger?0:130)){hold=0;morphTrigger=false;morph();}
    }
    draw();
    raf=requestAnimationFrame(frame);
  }
  function start(){if(!raf&&!reduce)raf=requestAnimationFrame(frame);}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>{document.hidden?stop():start();});
  if(reduce){from=layout(vals).map(c=>({...c}));to=from;t=1;draw();}
  else start();
})();
</script>
</body>
</html>
