<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Stacked violet ridgeline of layered density curves continuously morphing between bimodal and unimodal peaks with glowing crests.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ridgeline Morph</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#16121f;}
  #rm-c{display:block;width:100%;height:100%;}
  .rm-cap{position:fixed;left:9px;bottom:8px;font:600 10px/1.2 ui-monospace,SFMono-Regular,Menlo,monospace;
       letter-spacing:.14em;color:#b39ddb;opacity:.34;text-transform:uppercase;
       pointer-events:none;user-select:none;}
</style>
</head>
<body>
<canvas id="rm-c"></canvas>
<div class="rm-cap">Ridgeline Morph</div>
<script>
(function(){
  const cv=document.getElementById('rm-c'),ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const AC='#b39ddb';
  let W,H,DPR;
  function size(){
    DPR=Math.min(devicePixelRatio||1,2);
    W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  addEventListener('resize',size);size();

  const ROWS=14, SAMP=120;
  // each row migrates between a bimodal and a unimodal distribution on a slow loop
  const rows=[];
  for(let i=0;i<ROWS;i++){
    rows.push({
      ph:i*0.42,                       // phase offset along the morph cycle
      sp:0.9+ (i%3)*0.12,              // peak slide speed
      base:0.35+ (i*0.013),            // bimodal centre spread
      amp:0.55+0.4*Math.sin(i*0.7),    // base height
      sw:0.10+0.02*((i*7)%5)/5         // peak width
    });
  }
  function gauss(x,mu,s){const d=(x-mu)/s;return Math.exp(-0.5*d*d);}

  let t=0,nudge=0;
  cv.addEventListener('pointermove',e=>{
    const r=cv.getBoundingClientRect();
    nudge=1-Math.abs((e.clientY-r.top)/r.height-0.5)*1.6;
    if(nudge<0)nudge=0;
  });

  function frame(){
    t+=reduce?0:0.006;
    ctx.fillStyle='#16121f';ctx.fillRect(0,0,W,H);

    const padX=W*0.10, padTop=H*0.12, padBot=H*0.10;
    const plotW=W-padX*2, plotH=H-padTop-padBot;
    const gap=plotH/(ROWS-1);
    const ridge=gap*3.1;                // vertical reach of a curve
    const n=nudge; nudge*=0.93;

    // faint baseline axis ticks
    ctx.strokeStyle='rgba(179,157,219,0.07)';ctx.lineWidth=1;
    for(let g=0;g<=4;g++){
      const gx=padX+plotW*g/4;
      ctx.beginPath();ctx.moveTo(gx,padTop);ctx.lineTo(gx,H-padBot);ctx.stroke();
    }

    // draw back-to-front so nearer ridges overlap farther ones
    for(let i=ROWS-1;i>=0;i--){
      const r=rows[i];
      const yb=padTop+gap*i;            // baseline of this ridge
      // morph 0..1: 1 = bimodal split, 0 = unimodal merged
      const m=0.5+0.5*Math.sin(t*1.0+r.ph);
      const slide=Math.sin(t*r.sp+i*0.5)*0.16;        // peaks drift along axis
      const spread=r.base*m;                          // separation of the two modes
      const mu1=0.5+slide-spread, mu2=0.5+slide+spread;
      const w1=r.sw*(1+0.6*(1-m)), w2=r.sw;
      const a2=m;                                     // 2nd mode fades as it merges
      const h=ridge*(r.amp+ n*0.5*(1-Math.abs(i/(ROWS-1)-0.5)*2));

      // build curve
      const pts=[];
      let peak=0;
      for(let s=0;s<=SAMP;s++){
        const x=s/SAMP;
        let d=gauss(x,mu1,w1)+a2*gauss(x,mu2,w2);
        if(d>peak)peak=d;
        pts.push(d);
      }
      const inv=peak>0?1/peak:1;
      ctx.beginPath();
      ctx.moveTo(padX,yb);
      for(let s=0;s<=SAMP;s++){
        const x=padX+plotW*s/SAMP;
        const y=yb-pts[s]*inv*h;
        ctx.lineTo(x,y);
      }
      ctx.lineTo(padX+plotW,yb);
      ctx.closePath();

      // fill: dark violet wash, depth-shaded so front rows read brighter
      const dep=i/(ROWS-1);
      const fl=0.40+0.30*(1-dep);
      ctx.fillStyle=`rgba(${22+ (179-22)*0.18|0},${18+ (157-18)*0.16|0},${31+ (219-31)*0.22|0},${fl})`;
      ctx.fill();

      // accent stroke along the top edge, brighter where density is high
      ctx.beginPath();
      for(let s=0;s<=SAMP;s++){
        const x=padX+plotW*s/SAMP;
        const y=yb-pts[s]*inv*h;
        if(s===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
      }
      const lal=0.30+0.55*(1-dep);
      ctx.strokeStyle=`rgba(179,157,219,${lal})`;
      ctx.lineWidth=1.1;
      ctx.shadowColor=AC;ctx.shadowBlur=6*(1-dep)+1;
      ctx.stroke();
      ctx.shadowBlur=0;

      // small mode-peak markers (truth-per-pixel: mark the actual maxima)
      const peaks=m>0.18?[mu1,mu2]:[ (mu1+mu2)/2 ];
      ctx.fillStyle=`rgba(255,255,255,${0.5+0.4*(1-dep)})`;
      peaks.forEach(mp=>{
        let dd=gauss(mp,mu1,w1)+a2*gauss(mp,mu2,w2);
        const px=padX+plotW*mp, py=yb-dd*inv*h;
        ctx.beginPath();ctx.arc(px,py,1.3,0,Math.PI*2);ctx.fill();
      });
    }

    if(!reduce)raf=requestAnimationFrame(frame);
  }
  let raf=0;
  function start(){if(!raf&&!reduce)raf=requestAnimationFrame(frame);}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>{document.hidden?stop():start();});
  if(reduce){frame();}else start();
})();
</script>
</body>
</html>
