<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Trading Weight — Piet Mondrian. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trading Weight</title>
<style>
  html,body{margin:0;height:100%;background:#f7f4ec;overflow:hidden}
  #mon04-stage{position:fixed;inset:0;width:100%;height:100%}
  #mon04-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .mon04-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#15110d;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/mondrian/04-trading-weight.html",
 "title": "Trading Weight",
 "description": "Red and blue blocks trade mass across a fixed axis; a yellow counterweight keeps the Mondrian grid balanced. Slow eased transitions reseed randomly.",
 "useWhen": "Art/design-themed hero backgrounds, generative aesthetic loops, Mondrian or De Stijl brand contexts.",
 "avoidWhen": "Contexts needing text legibility over canvas or user interaction — tile is fully passive.",
 "agentPrompt": "Set axisX=0.5 to center the axis, change dur=3600 to slow transitions, swap C.red to '#f6c700' and C.blue to '#1a6e3c'.",
 "editableAreas": [
  "axis position (axisX=0.62)",
  "transition duration (dur=2400)",
  "hold pause length (1200ms)",
  "color palette (C object)",
  "weight range (rand(.25,.85))"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (REDUCED)",
  "visibilitychange pause/resume",
  "DPR-aware fitCanvas()"
 ],
 "knownLimitations": [
  "Background color set in both CSS and canvas fill — must change both to recolor the field",
  "No touch/pointer interactivity; fully autonomous"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "mondrian",
  "geometric",
  "canvas",
  "balance",
  "color-blocks",
  "ambient",
  "composition"
 ]
}
</script>
</head>
<body>
<div id="mon04-stage" role="img" aria-label="Two primary blocks on either side of a fixed black axis exchange their mass, a yellow counterweight keeping the asymmetric Mondrian composition in balance.">
  <canvas id="mon04-cv"></canvas>
</div>
<div class="mon04-cap">Trading Weight</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv=document.getElementById('mon04-cv'); if(!cv) return;
  const C={white:'#f7f4ec',black:'#15110d',red:'#d6191e',blue:'#1d3bd1',yellow:'#f6c700'};
  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width),h=Math.max(2,r.height);
    c.width=Math.round(w*dpr);c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h};
  }
  const lerp=(a,b,t)=>a+(b-a)*t, clamp=(v,a,b)=>v<a?a:v>b?b:v, rand=(a,b)=>a+Math.random()*(b-a);
  const easeInOut=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;

  let S=fitCanvas(cv);
  const axisX=0.62,dur=2400;
  let lw=0.5,target=0.7,t=0,phase='move',hold=0,last=performance.now();
  function reseed(){target=rand(.25,.85);t=0;phase='move';}
  function draw(now){
    const dt=now-last;last=now;const ctx=S.ctx,W=S.w,H=S.h;
    let w;
    if(phase==='move'){t+=dt;const p=clamp(t/dur,0,1);w=lerp(lw,target,easeInOut(p));if(p>=1){lw=target;phase='hold';hold=0;}}
    else{w=lw;hold+=dt;if(hold>(REDUCED?3500:1200))reseed();}
    ctx.fillStyle=C.white;ctx.fillRect(0,0,W,H);
    const ax=Math.round(axisX*W),padT=18,padB=18,padL=18;
    const colW=ax-padL-10,fullH=H-padT-padB,lh=fullH*w;
    ctx.fillStyle=C.red;ctx.fillRect(padL,padT+(fullH-lh),colW,lh);
    const rx=ax+10,rW=W-rx-18,rh=fullH*(1-w);
    ctx.fillStyle=C.blue;ctx.fillRect(rx,padT,rW,rh);
    const yH=fullH-rh;
    ctx.fillStyle=C.yellow;ctx.fillRect(rx,padT+rh,rW*0.55,yH);
    ctx.fillStyle='#e9e6dc';ctx.fillRect(rx+rW*0.55,padT+rh,rW*0.45,yH);
    ctx.fillStyle=C.black;const TH=8;
    ctx.fillRect(0,0,W,TH);ctx.fillRect(0,H-TH,W,TH);ctx.fillRect(0,0,TH,H);ctx.fillRect(W-TH,0,TH,H);
    ctx.fillRect(ax-TH/2,0,TH,H);
    ctx.fillRect(rx-4,padT+rh-TH/2,rW+4,TH);
    ctx.fillRect(rx+rW*0.55-TH/2,padT+rh,TH,yH);
    ctx.fillStyle=C.yellow;ctx.fillRect(ax-13,H-TH-7,26,7);
  }

  let raf=0,running=false;
  function loop(){if(!running)return;draw(performance.now());raf=requestAnimationFrame(loop);}
  function start(){if(running)return;running=true;last=performance.now();raf=requestAnimationFrame(loop);}
  function stop(){running=false;if(raf)cancelAnimationFrame(raf);raf=0;}

  reseed();
  let _rt;
  window.addEventListener('resize',()=>{clearTimeout(_rt);_rt=setTimeout(()=>{S=fitCanvas(cv);if(REDUCED)draw(performance.now());},150);},{passive:true});
  document.addEventListener('visibilitychange',()=>{if(REDUCED)return;if(document.hidden)stop();else start();});

  if(REDUCED){lw=target;draw(performance.now());}
  else start();
})();
</script>
</body>
</html>
