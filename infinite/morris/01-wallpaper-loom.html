<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="The Wallpaper Loom — William Morris. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Wallpaper Loom</title>
<style>
  html,body{margin:0;height:100%;background:#efe7d2;overflow:hidden}
  #mor01-stage{position:fixed;inset:0;width:100%;height:100%}
  #mor01-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .mor01-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#23301f;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
</head>
<body>
<div id="mor01-stage" role="img" aria-label="A seamless William Morris botanical wallpaper tile — olive stems, sage leaves, a madder flower and indigo berries — tessellated edge to edge and scrolling forever up a warm cream ground.">
  <canvas id="mor01-cv"></canvas>
</div>
<div class="mor01-cap">The Wallpaper Loom</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv=document.getElementById('mor01-cv'); if(!cv) return;
  const PAL={cream:'#efe7d2',indigo:'#2c4a6e',olive:'#6b7233',madder:'#a8392b',sage:'#7d9b6a',gold:'#c2a14a',ink:'#23301f'};

  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width), h=Math.max(2,r.height);
    c.width=Math.round(w*dpr); c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }

  let S=fitCanvas(cv);
  let tile, patSize=132;

  function motif(x,u){
    x.save();x.lineCap='round';x.lineJoin='round';
    x.strokeStyle=PAL.olive;x.lineWidth=4;
    x.beginPath();x.moveTo(0,u);
    x.bezierCurveTo(u*0.30,u*0.78,u*0.18,u*0.46,u*0.5,u*0.5);
    x.bezierCurveTo(u*0.82,u*0.54,u*0.70,u*0.22,u,0);x.stroke();
    x.strokeStyle=PAL.sage;x.lineWidth=3;
    x.beginPath();x.moveTo(u*0.5,0);
    x.bezierCurveTo(u*0.36,u*0.24,u*0.62,u*0.32,u*0.5,u*0.5);
    x.bezierCurveTo(u*0.40,u*0.66,u*0.64,u*0.74,u*0.5,u);x.stroke();
    function leaf(px,py,rot,sc,fill){
      x.save();x.translate(px,py);x.rotate(rot);x.scale(sc,sc);
      x.beginPath();x.moveTo(0,0);
      x.bezierCurveTo(14,-8,18,-26,6,-40);
      x.bezierCurveTo(2,-30,-4,-34,-14,-22);
      x.bezierCurveTo(-8,-12,-10,-6,0,0);x.closePath();
      x.fillStyle=fill;x.fill();x.strokeStyle=PAL.ink;x.lineWidth=1.4;x.stroke();
      x.beginPath();x.moveTo(0,-2);x.quadraticCurveTo(2,-20,4,-36);x.strokeStyle='rgba(35,48,31,.55)';x.lineWidth=1;x.stroke();
      x.restore();
    }
    leaf(u*0.34,u*0.62,-0.5,1.05,PAL.olive);
    leaf(u*0.66,u*0.40,2.1,0.95,PAL.sage);
    leaf(u*0.5,u*0.5,0.7,0.78,PAL.olive);
    x.save();x.translate(u*0.5,u*0.5);
    for(let i=0;i<6;i++){x.rotate(Math.PI/3);x.beginPath();x.ellipse(0,-11,6,10,0,0,7);x.fillStyle=PAL.madder;x.fill();x.strokeStyle=PAL.ink;x.lineWidth=1;x.stroke();}
    x.beginPath();x.arc(0,0,6,0,7);x.fillStyle=PAL.gold;x.fill();x.strokeStyle=PAL.ink;x.lineWidth=1.2;x.stroke();x.restore();
    function berries(cx,cy){
      const offs=[[0,0],[8,4],[-7,5],[2,11]];
      for(const o of offs){
        x.beginPath();x.arc(cx+o[0],cy+o[1],4.2,0,7);x.fillStyle=PAL.indigo;x.fill();x.strokeStyle=PAL.ink;x.lineWidth=1;x.stroke();
        x.beginPath();x.arc(cx+o[0]-1.2,cy+o[1]-1.3,1.3,0,7);x.fillStyle='rgba(255,255,255,.5)';x.fill();
      }
    }
    berries(u*0.06,u*0.10);berries(u*0.92,u*0.90);
    x.restore();
  }
  function buildTile(){
    const c=document.createElement('canvas');c.width=c.height=patSize;
    const x=c.getContext('2d');x.fillStyle=PAL.cream;x.fillRect(0,0,patSize,patSize);
    const u=patSize;
    for(let oy=-1;oy<=1;oy++)for(let ox=-1;ox<=1;ox++){x.save();x.translate(ox*u,oy*u);motif(x,u);x.restore();}
    return c;
  }
  tile=buildTile();

  let off=0,last=performance.now();
  function draw(now){
    const dt=Math.min(0.05,(now-last)/1000);last=now;
    if(!REDUCED) off=(off+dt*10)%patSize;
    const ctx=S.ctx;ctx.clearRect(0,0,S.w,S.h);
    const pat=ctx.createPattern(tile,'repeat');
    ctx.save();ctx.translate(-off,off);ctx.fillStyle=pat;
    ctx.fillRect(-patSize,-patSize,S.w+patSize*2,S.h+patSize*2);ctx.restore();
    const g=ctx.createRadialGradient(S.w/2,S.h/2,S.h*0.2,S.w/2,S.h/2,S.h*0.75);
    g.addColorStop(0,'rgba(239,231,210,0)');g.addColorStop(1,'rgba(35,48,31,.12)');
    ctx.fillStyle=g;ctx.fillRect(0,0,S.w,S.h);
  }

  let raf=0,running=false;
  function loop(){ if(!running) return; draw(performance.now()); raf=requestAnimationFrame(loop); }
  function start(){ if(running) return; running=true; last=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }

  let _rt;
  window.addEventListener('resize',()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ S=fitCanvas(cv); if(REDUCED) draw(performance.now()); },150); },{passive:true});
  document.addEventListener('visibilitychange',()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });

  if(REDUCED){ draw(performance.now()); } else start();
})();
</script>
</body>
</html>
