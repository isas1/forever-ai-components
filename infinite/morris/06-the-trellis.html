<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="The Trellis — William Morris. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Trellis</title>
<style>
  html,body{margin:0;height:100%;background:#efe7d2;overflow:hidden}
  #mor06-stage{position:fixed;inset:0;width:100%;height:100%;overflow:hidden}
  .mor06-trellis{position:absolute;inset:0;}
  .mor06-lath{position:absolute;background:linear-gradient(180deg,#6b7233,#23301f);box-shadow:0 1px 2px rgba(0,0,0,.3);border-radius:2px;}
  .mor06-rose{position:absolute;width:30px;height:30px;transform:translate(-50%,-50%) scale(0);transform-origin:center;will-change:transform;}
  @keyframes mor06-bloom{0%{transform:translate(-50%,-50%) scale(0) rotate(-40deg);}60%{transform:translate(-50%,-50%) scale(1.12) rotate(6deg);}100%{transform:translate(-50%,-50%) scale(1) rotate(0deg);}}
  .mor06-leaf{position:absolute;width:16px;height:9px;background:#7d9b6a;border-radius:0 60% 0 60%;transform:translate(-50%,-50%) rotate(var(--lr,0deg));opacity:.9;}
  .mor06-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#23301f;opacity:.55;letter-spacing:.08em;text-transform:uppercase;user-select:none;z-index:3}
  @media (prefers-reduced-motion: reduce){.mor06-rose{transform:translate(-50%,-50%) scale(1)!important;}}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/morris/06-the-trellis.html",
 "title": "The Trellis",
 "description": "Diamond lattice of olive laths with madder roses and leaves at each joint; blooms open in a staggered wave across the trellis then repeat every 6 seconds.",
 "useWhen": "William Morris or Arts & Crafts themed hero backgrounds, decorative loading screens, botanical/nature brand pages.",
 "avoidWhen": "Content-heavy layouts where repeating bloom motion competes with reading. Low-end devices with many DOM nodes from large viewports.",
 "agentPrompt": "Change rose color from madder red to dusty pink by editing the SVG circle fills (replace #a8392b with #c97b8a and #c2553f with #d9a0a0), and slow the wave cycle to 9000ms in the setInterval call.",
 "editableAreas": [
  "rose SVG colors (fill values in roseSVG())",
  "grid step size (step=46)",
  "bloom animation duration (1.1s in mor06-bloom)",
  "wave cycle interval (6000ms in setInterval)",
  "lath colors (gradient in .mor06-lath)",
  "leaf color (.mor06-leaf background)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (REDUCED const + CSS rule)",
  "visibilitychange pause/resume",
  "resize debounce rebuild"
 ],
 "knownLimitations": [
  "DOM node count scales with viewport — very large screens may create hundreds of rose/leaf elements",
  "Lath lines use fixed 45deg diagonal — does not adapt to non-square aspect ratios aesthetically"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "morris",
  "trellis",
  "lattice",
  "botanical",
  "bloom",
  "wave",
  "decorative"
 ]
}
</script>
</head>
<body>
<div id="mor06-stage" role="img" aria-label="A William Morris diamond lattice of olive laths with madder roses climbing the joints; the blooms open in a slow travelling wave around the trellis, leaf by leaf, then begin again.">
  <div class="mor06-trellis" id="mor06-trellis"></div>
</div>
<div class="mor06-cap">The Trellis</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const wrap=document.getElementById('mor06-trellis'); if(!wrap) return;
  const stage=document.getElementById('mor06-stage');

  let roses=[], timer=0;
  function clear(){ wrap.innerHTML=''; roses=[]; }
  function roseSVG(){
    return '<svg viewBox="0 0 30 30" width="30" height="30">'+
      '<circle cx="15" cy="15" r="13" fill="#a8392b" stroke="#23301f" stroke-width="1.5"/>'+
      '<circle cx="15" cy="15" r="8" fill="#c2553f"/>'+
      '<circle cx="15" cy="15" r="4" fill="#c2a14a"/>'+
      '<path d="M15 4 A11 11 0 0 1 26 15" fill="none" stroke="#7e2a20" stroke-width="1.5"/>'+
      '<path d="M15 26 A11 11 0 0 1 4 15" fill="none" stroke="#7e2a20" stroke-width="1.5"/>'+
      '</svg>';
  }
  function build(){
    clear();
    const W=stage.clientWidth||400, H=stage.clientHeight||300, step=46;
    function lath(x1,y1,len,deg){
      const d=document.createElement('div');d.className='mor06-lath';
      d.style.left=x1+'px';d.style.top=y1+'px';d.style.width=len+'px';d.style.height='5px';
      d.style.transformOrigin='left center';d.style.transform='rotate('+deg+'deg)';
      wrap.appendChild(d);
    }
    const diag=Math.sqrt(W*W+H*H)+step*2;
    for(let i=-Math.ceil(H/step);i<Math.ceil(W/step)+2;i++){lath(i*step,0,diag,45);lath(i*step,H,diag,-45);}
    const cols=Math.ceil(W/step)+1, rows=Math.ceil(H/step)+1; let idx=0;
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
      if((r+c)%2) continue;
      const x=c*step, y=r*step;
      if(x<6||x>W-6||y<6||y>H-6) continue;
      const rose=document.createElement('div');rose.className='mor06-rose';
      rose.style.left=x+'px';rose.style.top=y+'px';rose.innerHTML=roseSVG();
      wrap.appendChild(rose);
      for(let l=0;l<2;l++){
        const lf=document.createElement('div');lf.className='mor06-leaf';
        lf.style.left=(x+(l?12:-12))+'px';lf.style.top=(y+10)+'px';
        lf.style.setProperty('--lr',(l?40:-40)+'deg');
        wrap.appendChild(lf);
      }
      roses.push({el:rose,order:idx++});
    }
    if(REDUCED){ roses.forEach(r=>r.el.style.transform='translate(-50%,-50%) scale(1)'); }
  }
  function cycle(){
    const N=roses.length;
    roses.forEach(r=>{
      const delay=(r.order/Math.max(1,N))*4200;
      r.el.style.animation='none';void r.el.offsetWidth;
      r.el.style.animation='mor06-bloom 1.1s cubic-bezier(.2,.9,.3,1.2) '+delay+'ms both';
    });
  }
  function start(){ if(timer||REDUCED) return; cycle(); timer=setInterval(cycle,6000); }
  function stop(){ if(timer){ clearInterval(timer); timer=0; } }

  build();
  let _rt;
  window.addEventListener('resize',()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ const run=!!timer; stop(); build(); if(run) start(); },200); },{passive:true});
  document.addEventListener('visibilitychange',()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });

  if(!REDUCED) start();
})();
</script>
</body>
</html>
