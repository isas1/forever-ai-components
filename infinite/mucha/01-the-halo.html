<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="The Halo — Art Nouveau Ornamental Panels. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Halo</title>
<style>
  html,body{margin:0;height:100%;background:#f4ecd8;overflow:hidden}
  #muc01-stage{position:fixed;inset:0;width:100%;height:100%}
  .muc01-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .muc01-rot{position:absolute;width:78%;aspect-ratio:1;left:50%;top:50%;transform:translate(-50%,-50%)}
  .muc01-rot svg{width:100%;height:100%;display:block}
  @keyframes muc01-spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
  @keyframes muc01-spin-r{to{transform:translate(-50%,-50%) rotate(-360deg)}}
  @keyframes muc01-breathe{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.05)}}
  .muc01-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#5b4632;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/mucha/01-the-halo.html",
 "title": "The Halo",
 "description": "Three nested SVG rings of gilded beads and teardrops rotate on slow opposing axes around a breathing gold rosette, evoking Art Nouveau's decorative halos.",
 "useWhen": "Art-nouveau themed hero sections, cultural/museum contexts, ambient decorative backgrounds needing elegant slow motion.",
 "avoidWhen": "Dark backgrounds (palette hardcoded for warm cream). Contexts needing interactivity or content overlaid in the center.",
 "agentPrompt": "Change PAL.gold to '#d4af37' for brighter gilt, slow the outer ring to 80s duration, increase bead count on outer ring from 24 to 32.",
 "editableAreas": [
  "color palette (PAL object)",
  "ring bead counts (n: 24/16/12)",
  "rotation durations (dur: 54/40/30)",
  "rosette petal count (loop i<8)",
  "core breathe scale (1.05 in keyframe)"
 ],
 "preserveElements": [
  "REDUCED motion guard on all animations",
  "IIFE wrapper",
  "role=img + aria-label on stage div"
 ],
 "knownLimitations": [
  "Background color hardcoded to warm cream (#f4ecd8) — must edit CSS to change",
  "CSS animations run continuously even when tab is hidden (no visibility pause)"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "ornamental",
  "halo",
  "rings",
  "filigree",
  "art-nouveau",
  "ambient"
 ]
}
</script>
</head>
<body>
<div id="muc01-stage" role="img" aria-label="An Art Nouveau ornamental halo: three nested rings of gilded filigree, beads and leaf-teardrops turn on slow opposing axes around a breathing peach-and-gold rosette.">
  <div class="muc01-wrap" id="muc01-wrap"></div>
</div>
<div class="muc01-cap">The Halo</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const PAL={cream2:'#ece1c6',sage:'#8a9a5b',peach:'#e7b98f',gold:'#c4a14e',rose:'#c98c8c',line:'#5b4632'};
  const wrap=document.getElementById('muc01-wrap'); if(!wrap) return;
  const NS='http://www.w3.org/2000/svg';
  const rings=[
    {r:46,n:24,col:PAL.gold,spin:'muc01-spin',dur:54,dash:'2 6',w:2},
    {r:36,n:16,col:PAL.sage,spin:'muc01-spin-r',dur:40,dash:'',w:1.5},
    {r:26,n:12,col:PAL.rose,spin:'muc01-spin',dur:30,dash:'1 4',w:1.5}
  ];
  rings.forEach((rg,idx)=>{
    const holder=document.createElement('div'); holder.className='muc01-rot';
    const svg=document.createElementNS(NS,'svg'); svg.setAttribute('viewBox','0 0 100 100');
    const c=document.createElementNS(NS,'circle');
    c.setAttribute('cx','50');c.setAttribute('cy','50');c.setAttribute('r',rg.r);
    c.setAttribute('fill','none');c.setAttribute('stroke',rg.col);
    c.setAttribute('stroke-width',rg.w);c.setAttribute('opacity','0.7');
    if(rg.dash) c.setAttribute('stroke-dasharray',rg.dash);
    svg.appendChild(c);
    for(let i=0;i<rg.n;i++){
      const a=(i/rg.n)*Math.PI*2;
      const x=50+Math.cos(a)*rg.r, y=50+Math.sin(a)*rg.r;
      if(idx===1){
        const p=document.createElementNS(NS,'path');
        const ix=50+Math.cos(a)*(rg.r-7), iy=50+Math.sin(a)*(rg.r-7);
        p.setAttribute('d',`M${ix} ${iy} Q ${x+Math.cos(a+0.5)*3} ${y+Math.sin(a+0.5)*3} ${x} ${y} Q ${x+Math.cos(a-0.5)*3} ${y+Math.sin(a-0.5)*3} ${ix} ${iy} Z`);
        p.setAttribute('fill',PAL.sage);p.setAttribute('opacity','0.55');
        svg.appendChild(p);
      }else{
        const d=document.createElementNS(NS,'circle');
        d.setAttribute('cx',x);d.setAttribute('cy',y);d.setAttribute('r',idx===0?1.6:1.2);
        d.setAttribute('fill',rg.col); svg.appendChild(d);
      }
    }
    holder.appendChild(svg);
    if(!REDUCED) holder.style.animation=`${rg.spin} ${rg.dur}s linear infinite`;
    wrap.appendChild(holder);
  });
  const core=document.createElement('div'); core.className='muc01-rot'; core.style.width='28%';
  const svg=document.createElementNS(NS,'svg'); svg.setAttribute('viewBox','0 0 100 100');
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2;
    const p=document.createElementNS(NS,'ellipse');
    p.setAttribute('cx',50+Math.cos(a)*14); p.setAttribute('cy',50+Math.sin(a)*14);
    p.setAttribute('rx','7');p.setAttribute('ry','13');
    p.setAttribute('fill',i%2?PAL.peach:PAL.cream2);
    p.setAttribute('stroke',PAL.gold);p.setAttribute('stroke-width','0.8');
    p.setAttribute('transform',`rotate(${a*180/Math.PI+90} ${50+Math.cos(a)*14} ${50+Math.sin(a)*14})`);
    svg.appendChild(p);
  }
  const mid=document.createElementNS(NS,'circle');
  mid.setAttribute('cx','50');mid.setAttribute('cy','50');mid.setAttribute('r','10');
  mid.setAttribute('fill',PAL.gold);mid.setAttribute('stroke',PAL.line);mid.setAttribute('stroke-width','1');
  svg.appendChild(mid);
  const mid2=document.createElementNS(NS,'circle');
  mid2.setAttribute('cx','50');mid2.setAttribute('cy','50');mid2.setAttribute('r','4');
  mid2.setAttribute('fill',PAL.rose); svg.appendChild(mid2);
  core.appendChild(svg);
  if(!REDUCED) core.style.animation='muc01-breathe 7s ease-in-out infinite';
  wrap.appendChild(core);
})();
</script>
</body>
</html>
