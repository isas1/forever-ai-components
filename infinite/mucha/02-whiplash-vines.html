<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Whiplash Vines — Art Nouveau Ornamental Panels. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Whiplash Vines</title>
<style>
  html,body{margin:0;height:100%;background:#f4ecd8;overflow:hidden}
  #muc02-stage{position:fixed;inset:0;width:100%;height:100%}
  #muc02-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .muc02-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#5b4632;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/mucha/02-whiplash-vines.html",
 "title": "Whiplash Vines",
 "description": "Sinuous sage and teal tendrils grow and curl on parchment; each vine ends in a rose or gold bezier-petal bloom, fades, and the cycle restarts.",
 "useWhen": "Art Nouveau hero backgrounds, editorial pages, or decorative ambient loops where organic growth motion fits the brand.",
 "avoidWhen": "Content-heavy layouts where moving vines compete with text, or low-end devices where continuous canvas redraws are costly.",
 "agentPrompt": "Change vine palette to burgundy and forest green by setting PAL.sage to '#6b2d3e' and PAL.teal to '#2d5a27', and raise the vine cap from 5 to 7.",
 "editableAreas": [
  "vine color palette (PAL object)",
  "max concurrent vines (vines.length < 5)",
  "vine growth speed (dt*22)",
  "curl intensity (0.5 + Math.random()*0.7)",
  "bloom petal count (5 + random*3)",
  "bloom size range (6 + random*8)"
 ],
 "preserveElements": [
  "DPR-aware fitCanvas with setTransform",
  "visibilitychange stop/start guard",
  "prefers-reduced-motion static draw path",
  "IIFE wrapper"
 ],
 "knownLimitations": [
  "Background color hardcoded in both CSS and canvas fillRect — must change both to recolor",
  "No pointer interactivity — vines spawn on a timer only"
 ],
 "tier": "curated",
 "labels": [
  "accessible",
  "copy-paste-safe",
  "minimal-deps",
  "mobile-ready",
  "agent-ready"
 ],
 "tags": [
  "art-nouveau",
  "vines",
  "generative",
  "canvas",
  "bloom",
  "ambient"
 ]
}
</script>
</head>
<body>
<div id="muc02-stage" role="img" aria-label="Art Nouveau whiplash vines: sinuous sage and teal tendrils grow and curl back upon themselves, break into rose and gold blooms, then dissolve so the garden begins again.">
  <canvas id="muc02-cv"></canvas>
</div>
<div class="muc02-cap">Whiplash Vines</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const PAL={sage:'#8a9a5b',sageDeep:'#6c7a44',peach:'#e7b98f',gold:'#c4a14e',rose:'#c98c8c',teal:'#2c5d63'};
  const cv=document.getElementById('muc02-cv'); if(!cv) return;
  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width), h=Math.max(2,r.height);
    c.width=Math.round(w*dpr); c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }
  function lerp(a,b,t){return a+(b-a)*t;}
  function petal(ctx,len,wid){
    ctx.beginPath();ctx.moveTo(0,0);
    ctx.bezierCurveTo(wid,-len*0.4,wid,-len*0.8,0,-len);
    ctx.bezierCurveTo(-wid,-len*0.8,-wid,-len*0.4,0,0);
    ctx.closePath();
  }
  let S=fitCanvas(cv);
  let vines=[], blooms=[];
  function newVine(){
    const fromBottom=Math.random()<0.5;
    return {pts:[],x:lerp(S.w*0.2,S.w*0.8,Math.random()),
      y:fromBottom?S.h+6:-6,
      ang:fromBottom?-Math.PI/2+(Math.random()-0.5)*0.6:Math.PI/2+(Math.random()-0.5)*0.6,
      curl:(Math.random()<0.5?1:-1)*(0.5+Math.random()*0.7),
      len:0,max:40+Math.random()*40,step:6+Math.random()*4,
      col:[PAL.sage,PAL.sageDeep,PAL.teal][(Math.random()*3)|0],
      t:0,life:7+Math.random()*3,done:false};
  }
  function reset(){vines=[];blooms=[];for(let i=0;i<3;i++) spawn();}
  function spawn(){if(vines.length<5) vines.push(newVine());}
  function bloom(x,y,col){blooms.push({x,y,col,t:0,life:3.5,sz:6+Math.random()*8,petals:5+((Math.random()*3)|0),rot:Math.random()*7});}
  let last=performance.now(), acc=0;
  function draw(now){
    const dt=Math.min(0.05,(now-last)/1000); last=now;
    S.ctx.clearRect(0,0,S.w,S.h);
    S.ctx.fillStyle='#f4ecd8';S.ctx.fillRect(0,0,S.w,S.h);
    S.ctx.fillStyle='rgba(138,154,91,0.04)';S.ctx.fillRect(0,0,S.w,S.h);
    acc+=dt; if(acc>1.6){acc=0; spawn();}
    for(const v of vines){
      v.t+=dt;
      if(!v.done){
        const grow=REDUCED?v.max:Math.min(v.max,v.len+dt*22);
        while(v.len<grow){
          v.len++;
          v.ang+=v.curl*0.10+Math.sin(v.len*0.18)*0.04;
          v.x+=Math.cos(v.ang)*v.step; v.y+=Math.sin(v.ang)*v.step;
          v.pts.push({x:v.x,y:v.y});
          if(v.len>=v.max){v.done=true;bloom(v.x,v.y,[PAL.rose,PAL.peach,PAL.gold][(Math.random()*3)|0]);break;}
          if(v.x<-30||v.x>S.w+30){v.done=true;break;}
        }
        if(REDUCED && !v.done){v.done=true;bloom(v.x,v.y,PAL.rose);}
      }
      const fade=v.t>v.life-1.2?Math.max(0,(v.life-v.t)/1.2):1;
      if(v.pts.length>1){
        S.ctx.strokeStyle=v.col;S.ctx.globalAlpha=0.85*fade;
        S.ctx.lineWidth=2.4;S.ctx.lineJoin='round';S.ctx.lineCap='round';
        S.ctx.beginPath();
        v.pts.forEach((p,i)=>i?S.ctx.lineTo(p.x,p.y):S.ctx.moveTo(p.x,p.y));
        S.ctx.stroke();
        S.ctx.fillStyle=v.col;
        for(let i=4;i<v.pts.length;i+=7){
          const p=v.pts[i], pp=v.pts[i-2];
          const la=Math.atan2(p.y-pp.y,p.x-pp.x)+(i%14<7?1.3:-1.3);
          S.ctx.save();S.ctx.translate(p.x,p.y);S.ctx.rotate(la);S.ctx.globalAlpha=0.5*fade;
          S.ctx.beginPath();S.ctx.ellipse(4,0,5,2.4,0,0,7);S.ctx.fill();S.ctx.restore();
        }
      }
      S.ctx.globalAlpha=1;
    }
    for(const b of blooms){
      b.t+=dt;
      const grow=Math.min(1,b.t*2.2);
      const fade=b.t>b.life-1?Math.max(0,(b.life-b.t)):1;
      const a=Math.min(1,grow)*Math.min(1,fade);
      S.ctx.save();S.ctx.translate(b.x,b.y);S.ctx.rotate(b.rot+b.t*0.3);
      S.ctx.globalAlpha=a;
      for(let i=0;i<b.petals;i++){
        S.ctx.save();S.ctx.rotate((i/b.petals)*Math.PI*2);
        S.ctx.fillStyle=b.col;S.ctx.strokeStyle='rgba(91,70,50,0.4)';S.ctx.lineWidth=0.8;
        petal(S.ctx,b.sz*grow*1.6,b.sz*grow*0.7);
        S.ctx.fill();S.ctx.stroke();S.ctx.restore();
      }
      S.ctx.fillStyle=PAL.gold;S.ctx.beginPath();S.ctx.arc(0,0,b.sz*grow*0.4,0,7);S.ctx.fill();
      S.ctx.restore();S.ctx.globalAlpha=1;
    }
    vines=vines.filter(v=>v.t<v.life);
    blooms=blooms.filter(b=>b.t<b.life);
    if(vines.length===0 && blooms.length===0) reset();
  }
  let raf=0, running=false;
  function loop(){ if(!running) return; draw(performance.now()); raf=requestAnimationFrame(loop); }
  function start(){ if(running) return; running=true; last=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
  S.ctx.fillStyle='#f4ecd8';S.ctx.fillRect(0,0,S.w,S.h);
  reset();
  let _rt;
  window.addEventListener('resize',()=>{clearTimeout(_rt);_rt=setTimeout(()=>{S=fitCanvas(cv);reset();if(REDUCED) draw(performance.now());},150);},{passive:true});
  document.addEventListener('visibilitychange',()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });
  if(REDUCED){ for(let i=0;i<40;i++) draw(performance.now()); }
  else start();
})();
</script>
</body>
</html>
