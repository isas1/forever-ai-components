<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Mosaic Tendrils — Alphonse Mucha. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mosaic Tendrils</title>
<style>
  html,body{margin:0;height:100%;background:#f4ecd8;overflow:hidden}
  #muc07-stage{position:fixed;inset:0;width:100%;height:100%}
  .muc07-field{position:absolute;inset:0}
  .muc07-dot{position:absolute;border-radius:50%;transform:translate(-50%,-50%) scale(0);will-change:transform,opacity}
  @keyframes muc07-bloom{0%{transform:translate(-50%,-50%) scale(0);opacity:0}30%{opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:.92}}
  .muc07-link{position:absolute;height:1.5px;transform-origin:left center;background:linear-gradient(90deg,transparent,#c4a14e,transparent);will-change:transform,opacity}
  .muc07-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#5b4632;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/mucha/07-mosaic-tendrils.html",
 "title": "Mosaic Tendrils",
 "description": "Colored beads bloom and connect with gradient lines, branching into tendrils that slowly replace oldest nodes. Mucha palette: gold, sage, rose, peach, teal.",
 "useWhen": "Art-nouveau or decorative hero backgrounds, ambient loading screens, botanical or filigree-themed brand presentations.",
 "avoidWhen": "Contexts requiring legible text overlays — growing dot network competes visually. Not suitable where motion must stop on demand.",
 "agentPrompt": "Change the palette to cooler tones by replacing PAL.sage with '#6b8fa3' and PAL.rose with '#a07db0', and slow growth by changing the interval threshold from 0.34 to 0.55.",
 "editableAreas": [
  "color palette (PAL object — 5 named colors)",
  "max node count (MAX=64)",
  "dot size range (4+Math.random()*7)",
  "growth interval threshold (acc>0.34)",
  "branch distance range (18+Math.random()*34)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (REDUCED)",
  "visibilitychange pause/resume",
  "node cull loop (while nodes.length>MAX)"
 ],
 "knownLimitations": [
  "Growth is purely random — no directional bias, so tendrils can cluster in one area",
  "Resize re-seeds entirely, losing current growth state",
  "Many nodes create many DOM elements — may slow on low-end devices at high MAX"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "mosaic",
  "tendrils",
  "dots",
  "filigree",
  "mucha",
  "generative",
  "art-nouveau"
 ]
}
</script>
</head>
<body>
<div id="muc07-stage" role="img" aria-label="Dotted-and-line Mucha filigree spreading like frost on a window: beads of gold, sage, rose and peach bloom and thread themselves together into tendrils that keep growing, fading the oldest as new ones appear.">
  <div class="muc07-field" id="muc07-field"></div>
</div>
<div class="muc07-cap">Mosaic Tendrils</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const PAL={sage:'#8a9a5b',peach:'#e7b98f',gold:'#c4a14e',rose:'#c98c8c',teal:'#2c5d63'};
  const field=document.getElementById('muc07-field'); if(!field) return;
  const cols=[PAL.gold,PAL.sage,PAL.rose,PAL.peach,PAL.teal];
  let nodes=[];
  const MAX=64;
  function dim(){const r=field.getBoundingClientRect();return {w:r.width,h:r.height};}
  function addNode(x,y,parent){
    const d=dim();
    x=Math.max(6,Math.min(d.w-6,x)); y=Math.max(6,Math.min(d.h-6,y));
    const dot=document.createElement('div'); dot.className='muc07-dot';
    const sz=4+Math.random()*7;
    const col=cols[(Math.random()*cols.length)|0];
    dot.style.width=dot.style.height=sz+'px';
    dot.style.left=x+'px';dot.style.top=y+'px';
    dot.style.background=col;
    dot.style.boxShadow='0 0 0 1px rgba(91,70,50,.35)';
    if(REDUCED){dot.style.transform='translate(-50%,-50%) scale(1)';dot.style.opacity='.9';}
    else dot.style.animation=`muc07-bloom ${(0.6+Math.random()*0.5).toFixed(2)}s ease-out forwards`;
    field.appendChild(dot);
    const node={el:dot,x,y};
    if(parent){
      const link=document.createElement('div'); link.className='muc07-link';
      const dx=x-parent.x, dy=y-parent.y, len=Math.hypot(dx,dy);
      link.style.left=parent.x+'px';link.style.top=parent.y+'px';
      link.style.width=len+'px';
      link.style.transform=`rotate(${Math.atan2(dy,dx)}rad)`;
      if(!REDUCED){link.style.opacity='0';link.style.transition='opacity .6s ease';
        requestAnimationFrame(()=>link.style.opacity='.7');}
      else link.style.opacity='.7';
      field.appendChild(link);
      node.link=link;
    }
    nodes.push(node);
    while(nodes.length>MAX){
      const old=nodes.shift();
      old.el&&old.el.remove(); old.link&&old.link.remove();
    }
    return node;
  }
  function grow(from){
    if(!from) return;
    const ang=Math.random()*Math.PI*2;
    const dist=18+Math.random()*34;
    addNode(from.x+Math.cos(ang)*dist,from.y+Math.sin(ang)*dist,from);
  }
  function seed(){
    nodes.forEach(n=>{n.el&&n.el.remove();n.link&&n.link.remove();}); nodes=[];
    const d0=dim();
    for(let i=0;i<3;i++) addNode(d0.w*(0.25+0.25*i),d0.h*(0.3+0.2*(i%2)),null);
  }
  seed();
  let acc=0,last=performance.now();
  let raf=0, running=false;
  function loop(){
    if(!running) return;
    const now=performance.now();const dt=(now-last)/1000;last=now;
    acc+=dt;
    if(acc>0.34){acc=0; grow(nodes[(Math.random()*nodes.length)|0]); }
    raf=requestAnimationFrame(loop);
  }
  function start(){ if(running||REDUCED) return; running=true; last=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
  let _rt;
  window.addEventListener('resize',()=>{clearTimeout(_rt);_rt=setTimeout(seed,200);},{passive:true});
  document.addEventListener('visibilitychange',()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });
  if(!REDUCED) start();
})();
</script>
</body>
</html>
