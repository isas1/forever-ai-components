<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="The Decorative Panel — Alphonse Mucha. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Decorative Panel</title>
<style>
  html,body{margin:0;height:100%;background:#231a12;overflow:hidden}
  #muc08-stage{position:fixed;inset:0;width:100%;height:100%;background:radial-gradient(circle at 50% 40%,#2f2418,#231a12)}
  #muc08-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .muc08-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#f4ecd8;opacity:.46;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
</head>
<body>
<div id="muc08-stage" role="img" aria-label="A full Mucha panneau decoratif: an arched gold frame with a rayed peach-and-rose halo, a blooming central flower and a garland of small flowers sweeping the base — the whole composition opens, breathes, folds and blooms once more.">
  <canvas id="muc08-cv"></canvas>
</div>
<div class="muc08-cap">The Decorative Panel</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const PAL={cream:'#f4ecd8',sage:'#8a9a5b',peach:'#e7b98f',gold:'#c4a14e',rose:'#c98c8c'};
  const cv=document.getElementById('muc08-cv'); if(!cv) return;
  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width), h=Math.max(2,r.height);
    c.width=Math.round(w*dpr); c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }
  function petal(ctx,len,wid){
    ctx.beginPath();ctx.moveTo(0,0);
    ctx.bezierCurveTo(wid,-len*0.4,wid,-len*0.8,0,-len);
    ctx.bezierCurveTo(-wid,-len*0.8,-wid,-len*0.4,0,0);
    ctx.closePath();
  }
  function withA(hex,a){const n=parseInt(hex.slice(1),16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}
  let S=fitCanvas(cv);
  let t=0,last=performance.now();
  function paintBg(){const g=S.ctx.createRadialGradient(S.w/2,S.h*0.4,0,S.w/2,S.h*0.4,Math.max(S.w,S.h));g.addColorStop(0,'#2f2418');g.addColorStop(1,'#231a12');S.ctx.fillStyle=g;S.ctx.fillRect(0,0,S.w,S.h);}
  function petalsRing(ctx,cx,cy,R,n,col,col2,rot){
    for(let i=0;i<n;i++){
      ctx.save();ctx.translate(cx,cy);ctx.rotate((i/n)*Math.PI*2+rot);
      ctx.translate(0,-R);
      ctx.fillStyle=i%2?col:col2;ctx.strokeStyle='rgba(244,236,216,0.4)';ctx.lineWidth=0.8;
      petal(ctx,R*0.32,R*0.12);ctx.fill();ctx.stroke();
      ctx.restore();
    }
  }
  function draw(now){
    const dt=(now-last)/1000;last=now;
    if(!REDUCED) t+=dt;
    const ctx=S.ctx,W=S.w,H=S.h;
    paintBg();
    const cx=W*0.5, cy=H*0.52;
    const breath=REDUCED?1:0.5+0.5*Math.sin(t*0.5);
    const open=REDUCED?1:0.55+0.45*breath;
    const panW=Math.min(W*0.7,520)*open+W*0.18;
    const left=cx-panW/2, right=cx+panW/2;
    const top=H*0.10, bot=H*0.90, archR=panW/2;
    ctx.strokeStyle=PAL.gold;ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(left,bot);ctx.lineTo(left,top+archR);
    ctx.arc(cx,top+archR,archR,Math.PI,0);
    ctx.lineTo(right,bot);ctx.stroke();
    ctx.strokeStyle=withA(PAL.sage,0.7);ctx.lineWidth=1.2;
    const ins=10;
    ctx.beginPath();
    ctx.moveTo(left+ins,bot-ins);ctx.lineTo(left+ins,top+archR);
    ctx.arc(cx,top+archR,archR-ins,Math.PI,0);
    ctx.lineTo(right-ins,bot-ins);ctx.stroke();
    ctx.strokeStyle=PAL.gold;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(left,bot);ctx.lineTo(right,bot);ctx.stroke();
    const haloR=archR*0.62*(0.85+0.15*breath);
    const hcy=top+archR+archR*0.15;
    ctx.save();ctx.globalAlpha=0.9;
    ctx.strokeStyle=PAL.peach;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(cx,hcy,haloR,0,7);ctx.stroke();
    ctx.strokeStyle=withA(PAL.rose,0.7);ctx.lineWidth=1.2;
    ctx.beginPath();ctx.arc(cx,hcy,haloR*0.8,0,7);ctx.stroke();
    const rays=24;
    for(let i=0;i<rays;i++){
      const a=(i/rays)*Math.PI*2+t*0.1;
      const r0=haloR*1.02, r1=haloR*(1.1+0.12*Math.sin(t*1.5+i));
      ctx.strokeStyle=i%2?withA(PAL.gold,0.6):withA(PAL.sage,0.4);
      ctx.lineWidth=i%4===0?1.6:0.8;
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(a)*r0,hcy+Math.sin(a)*r0);
      ctx.lineTo(cx+Math.cos(a)*r1,hcy+Math.sin(a)*r1);
      ctx.stroke();
    }
    ctx.restore();
    const fs=haloR*0.7*(0.7+0.3*breath);
    petalsRing(ctx,cx,hcy,fs,12,PAL.rose,PAL.peach,t*0.2);
    petalsRing(ctx,cx,hcy,fs*0.62,8,PAL.gold,PAL.sage,-t*0.3);
    ctx.fillStyle=PAL.gold;ctx.beginPath();ctx.arc(cx,hcy,fs*0.2,0,7);ctx.fill();
    ctx.fillStyle=PAL.cream;ctx.beginPath();ctx.arc(cx,hcy,fs*0.08,0,7);ctx.fill();
    ctx.strokeStyle=PAL.sage;ctx.lineWidth=2;
    ctx.beginPath();
    for(let x=left;x<=right;x+=6){
      const u=(x-left)/(right-left);
      const y=bot-10-Math.sin(u*Math.PI)*(22*open)-Math.sin(u*Math.PI*6+t)*3;
      x===left?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
    const gN=7;
    for(let i=0;i<gN;i++){
      const u=(i+0.5)/gN;
      const x=left+u*(right-left);
      const y=bot-10-Math.sin(u*Math.PI)*(22*open)-Math.sin(u*Math.PI*6+t)*3;
      const gs=5+3*Math.sin(t*1.3+i)+3;
      ctx.save();ctx.translate(x,y);ctx.rotate(t*0.3+i);
      const col=[PAL.rose,PAL.peach,PAL.gold][i%3];
      for(let p=0;p<5;p++){
        ctx.save();ctx.rotate((p/5)*Math.PI*2);
        ctx.fillStyle=col;petal(ctx,gs*1.6*open,gs*0.6);ctx.fill();ctx.restore();
      }
      ctx.fillStyle=PAL.gold;ctx.beginPath();ctx.arc(0,0,gs*0.4,0,7);ctx.fill();
      ctx.restore();
    }
    [[left,top+archR],[right,top+archR]].forEach(([fx,fy])=>{
      ctx.fillStyle=PAL.gold;ctx.beginPath();ctx.arc(fx,fy,4,0,7);ctx.fill();
      ctx.fillStyle=PAL.rose;ctx.beginPath();ctx.arc(fx,fy,1.8,0,7);ctx.fill();
    });
  }
  let raf=0, running=false;
  function loop(){ if(!running) return; draw(performance.now()); raf=requestAnimationFrame(loop); }
  function start(){ if(running) return; running=true; last=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
  paintBg();
  let _rt;
  window.addEventListener('resize',()=>{clearTimeout(_rt);_rt=setTimeout(()=>{S=fitCanvas(cv);if(REDUCED) draw(performance.now());},150);},{passive:true});
  document.addEventListener('visibilitychange',()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });
  if(REDUCED){ draw(performance.now()); }
  else start();
})();
</script>
</body>
</html>
