<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Rounded dark hamburger button whose three lines spring-morph into a glowing iris X when toggled.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hamburger Morph</title>
<style>
  :root{
    --bg-surface:#1c2030;
    --text-0:#f4f6fb;
    --accent-iris:#7c5cff;
    --border-soft:rgba(255,255,255,0.07);
    --border-mid:rgba(255,255,255,0.12);
    --border-glow:rgba(124,92,255,0.45);
    --glow-iris:0 0 0 1px var(--border-glow),0 8px 40px -8px rgba(124,92,255,0.45);
    --ease-out-soft:cubic-bezier(0.22,1,0.36,1);
    --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
    --dur-fast:160ms;--dur-base:280ms;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{
    background:#0d0f16;
    background-image:radial-gradient(60vw 40vw at 15% -10%,rgba(124,92,255,0.16),transparent 60%);
    display:grid;place-items:center;
  }
  .c02-burger{
    position:relative;width:84px;height:84px;
    border:1px solid var(--border-soft);border-radius:14px;
    background:var(--bg-surface);cursor:pointer;padding:0;
    transition:border-color var(--dur-base) var(--ease-out-soft),box-shadow var(--dur-base) var(--ease-out-soft);
  }
  .c02-burger:hover{border-color:var(--border-mid)}
  .c02-burger.c02-burger--on{border-color:var(--border-glow);box-shadow:var(--glow-iris)}
  .c02-burger__line{
    position:absolute;left:50%;top:50%;
    width:36px;height:3px;border-radius:3px;
    background:var(--text-0);transform:translate(-50%,-50%);
    transition:transform var(--dur-base) var(--ease-spring),opacity var(--dur-fast) var(--ease-out-soft),background var(--dur-base);
  }
  .c02-burger__line:nth-child(1){transform:translate(-50%,-11px)}
  .c02-burger__line:nth-child(3){transform:translate(-50%,9px)}
  .c02-burger--on .c02-burger__line{background:var(--accent-iris)}
  .c02-burger--on .c02-burger__line:nth-child(1){transform:translate(-50%,-50%) rotate(45deg)}
  .c02-burger--on .c02-burger__line:nth-child(2){opacity:0;transform:translate(-50%,-50%) scaleX(0.3)}
  .c02-burger--on .c02-burger__line:nth-child(3){transform:translate(-50%,-50%) rotate(-45deg)}
  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase;font-family:system-ui,sans-serif}
  @media (prefers-reduced-motion:reduce){*{transition-duration:.001ms!important}}
</style>
</head>
<body>
<button class="c02-burger" id="c02-burger" aria-label="Toggle menu" aria-pressed="false">
  <span class="c02-burger__line"></span>
  <span class="c02-burger__line"></span>
  <span class="c02-burger__line"></span>
</button>
<div class="cap">Hamburger Morph</div>
<script>
(function(){
  var b=document.getElementById('c02-burger');
  if(!b)return;
  var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  function set(on){
    b.classList.toggle('c02-burger--on',on);
    b.setAttribute('aria-pressed',on?'true':'false');
  }
  b.addEventListener('click',function(){set(!b.classList.contains('c02-burger--on'));});
  /* autonomous idle: toggle open/closed on a calm cadence */
  var timer;
  function loop(){
    if(reduce)return;
    timer=setTimeout(function(){
      set(!b.classList.contains('c02-burger--on'));
      loop();
    },1900);
  }
  function stop(){clearTimeout(timer);}
  document.addEventListener('visibilitychange',function(){document.hidden?stop():loop();});
  loop();
})();
</script>
</body>
</html>
