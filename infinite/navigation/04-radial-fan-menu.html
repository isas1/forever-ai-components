<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A circular core button rotates to an X and fans five glowing cyan icon petals outward in a spring arc, auto-opening and closing.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Radial Fan Menu</title>
<style>
  :root{
    --bg-700:#12141d;
    --bg-surface:#1c2030;
    --text-0:#f4f6fb;
    --accent-iris:#7c5cff;
    --accent-cyan:#22d3ee;
    --border-soft:rgba(255,255,255,0.07);
    --border-glow:rgba(124,92,255,0.45);
    --glow-iris:0 0 0 1px var(--border-glow),0 8px 40px -8px rgba(124,92,255,0.45);
    --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
    --ease-out-soft:cubic-bezier(0.22,1,0.36,1);
    --dur-base:280ms;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{
    background:#0d0f16;
    background-image:radial-gradient(60vw 40vw at 50% 110%,rgba(124,92,255,0.14),transparent 60%);
    display:grid;place-items:center;
  }
  .c04-radial{position:relative;width:190px;height:190px;display:flex;align-items:center;justify-content:center}
  .c04-radial__core{
    position:relative;z-index:3;width:64px;height:64px;border-radius:50%;
    border:1px solid var(--border-glow);background:var(--bg-surface);color:var(--text-0);
    font-size:30px;line-height:1;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:transform var(--dur-base) var(--ease-spring),box-shadow var(--dur-base),background var(--dur-base);
  }
  .c04-radial--open .c04-radial__core{transform:rotate(135deg);background:var(--accent-iris);box-shadow:var(--glow-iris)}
  .c04-radial__petal{
    position:absolute;width:46px;height:46px;border-radius:50%;
    border:1px solid var(--border-soft);background:var(--bg-700);color:var(--accent-cyan);
    display:flex;align-items:center;justify-content:center;font-size:18px;
    transform:translate(0,0) scale(0.2);opacity:0;pointer-events:none;
    transition:transform 460ms var(--ease-spring),opacity var(--dur-base) var(--ease-out-soft);
  }
  .c04-radial--open .c04-radial__petal{opacity:1;pointer-events:auto}
  .c04-radial--open .c04-radial__petal:hover{border-color:var(--border-glow);color:var(--accent-iris)}
  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase;font-family:system-ui,sans-serif}
  @media (prefers-reduced-motion:reduce){.c04-radial__core,.c04-radial__petal{transition-duration:.001ms!important}}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/navigation/04-radial-fan-menu.html",
 "title": "Radial Fan Menu",
 "description": "A core button rotates to an X and fans five glowing cyan icon petals outward in a staggered spring arc; auto-cycles open/close as a demo.",
 "useWhen": "Floating action buttons, mobile-style radial nav, speed-dial UIs where compact access to 4-6 actions is needed.",
 "avoidWhen": "More than 6 actions (petals overlap), or contexts requiring always-visible navigation — petals are hidden by default.",
 "agentPrompt": "Change the fan arc from -150 to -30 degrees to -200 to -90 so petals open downward-left, and set R=80 to spread them further apart.",
 "editableAreas": [
  "petal count (5 .c04-radial__petal buttons)",
  "fan arc angles (start=-150, end=-30)",
  "orbit radius (R=66)",
  "stagger delay (i*45 ms open, (n-i)*30 ms close)",
  "accent colors (--accent-iris, --accent-cyan)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (reduce var stops auto-loop)",
  "visibilitychange pause/resume",
  "data-x/data-y coordinate pre-computation"
 ],
 "knownLimitations": [
  "Auto-cycles every 2.2s by default — remove the loop() call before shipping in production",
  "Arc is hardcoded upper-left quadrant; repositioning requires changing start/end angles"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "navigation",
  "radial",
  "menu",
  "spring",
  "fan",
  "ui-control",
  "dark-ui"
 ]

</head>
<body>
<div class="c04-radial" id="c04-radial">
  <button class="c04-radial__core" aria-label="Open menu">+</button>
  <button class="c04-radial__petal" aria-label="Star">&#9733;</button>
  <button class="c04-radial__petal" aria-label="Heart">&#9829;</button>
  <button class="c04-radial__petal" aria-label="Bolt">&#9889;</button>
  <button class="c04-radial__petal" aria-label="Bell">&#9873;</button>
  <button class="c04-radial__petal" aria-label="Pin">&#9678;</button>
</div>
<div class="cap">Radial Fan Menu</div>
<script>
(function(){
  var root=document.getElementById('c04-radial');
  if(!root)return;
  var core=root.querySelector('.c04-radial__core');
  var petals=Array.prototype.slice.call(root.querySelectorAll('.c04-radial__petal'));
  var R=66,start=-150,end=-30,n=petals.length;
  var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  petals.forEach(function(p,i){
    var t=n===1?0.5:i/(n-1);
    var ang=(start+(end-start)*t)*Math.PI/180;
    p.dataset.x=(Math.cos(ang)*R).toFixed(1);
    p.dataset.y=(Math.sin(ang)*R).toFixed(1);
  });
  function setOpen(open){
    root.classList.toggle('c04-radial--open',open);
    petals.forEach(function(p,i){
      if(open){
        p.style.transitionDelay=(i*45)+'ms';
        p.style.transform='translate('+p.dataset.x+'px,'+p.dataset.y+'px) scale(1)';
      }else{
        p.style.transitionDelay=((n-i)*30)+'ms';
        p.style.transform='translate(0,0) scale(0.2)';
      }
    });
  }
  core.addEventListener('click',function(){
    setOpen(!root.classList.contains('c04-radial--open'));
  });
  /* autonomous idle: open, hold, close */
  var timer;
  function loop(){
    if(reduce)return;
    timer=setTimeout(function(){
      setOpen(!root.classList.contains('c04-radial--open'));
      loop();
    },2200);
  }
  function stop(){clearTimeout(timer);}
  document.addEventListener('visibilitychange',function(){document.hidden?stop():loop();});
  loop();
})();
</script>
</body>
</html>
