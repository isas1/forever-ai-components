<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A hamburger morphs to an X while a side panel slides in over a scrim, revealing staggered nav items inside a dark card.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Slide-in Drawer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-700:#12141d;
    --bg-surface:#1c2030;
    --text-1:#c7ccdb;
    --text-2:#8a91a8;
    --border-soft:rgba(255,255,255,0.07);
    --border-glow:rgba(124,92,255,0.45);
    --ease-out-soft:cubic-bezier(0.22,1,0.36,1);
    --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
    --dur-fast:160ms;--dur-base:280ms;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{
    background:#0d0f16;
    background-image:radial-gradient(60vw 40vw at 15% -10%,rgba(124,92,255,0.16),transparent 60%);
    display:grid;place-items:center;padding:16px;
  }
  .c05-drawer{
    position:relative;width:100%;max-width:280px;height:220px;
    border:1px solid var(--border-soft);border-radius:14px;
    background:var(--bg-700);overflow:hidden;
  }
  .c05-drawer__topbar{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border-soft)}
  .c05-drawer__hb{width:22px;height:16px;position:relative;cursor:pointer;flex:0 0 auto}
  .c05-drawer__hb span{
    position:absolute;left:0;width:100%;height:2px;border-radius:2px;background:var(--text-1);
    transition:transform var(--dur-base) var(--ease-spring),opacity var(--dur-fast);
  }
  .c05-drawer__hb span:nth-child(1){top:0}
  .c05-drawer__hb span:nth-child(2){top:7px}
  .c05-drawer__hb span:nth-child(3){top:14px}
  .c05-drawer--open .c05-drawer__hb span:nth-child(1){transform:translateY(7px) rotate(45deg)}
  .c05-drawer--open .c05-drawer__hb span:nth-child(2){opacity:0}
  .c05-drawer--open .c05-drawer__hb span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
  .c05-drawer__title{font-family:"Space Grotesk",system-ui,sans-serif;font-size:13px;color:var(--text-2);font-weight:500}
  .c05-drawer__scrim{
    position:absolute;inset:0;background:rgba(8,9,13,0.5);
    opacity:0;pointer-events:none;transition:opacity var(--dur-base) var(--ease-out-soft);
  }
  .c05-drawer--open .c05-drawer__scrim{opacity:1;pointer-events:auto}
  .c05-drawer__panel{
    position:absolute;top:0;bottom:0;left:0;width:64%;
    background:var(--bg-surface);border-right:1px solid var(--border-glow);
    padding:16px 14px;transform:translateX(-101%);
    transition:transform var(--dur-base) var(--ease-out-soft);
    display:flex;flex-direction:column;gap:8px;
  }
  .c05-drawer--open .c05-drawer__panel{transform:translateX(0)}
  .c05-drawer__item{
    font-size:13px;color:var(--text-1);padding:7px 10px;border-radius:8px;
    background:rgba(255,255,255,0.03);opacity:0;transform:translateX(-12px);
    font-family:system-ui,sans-serif;
  }
  .c05-drawer--open .c05-drawer__item{animation:c05-drawer-in var(--dur-base) var(--ease-out-soft) forwards}
  .c05-drawer--open .c05-drawer__item:nth-child(1){animation-delay:80ms}
  .c05-drawer--open .c05-drawer__item:nth-child(2){animation-delay:150ms}
  .c05-drawer--open .c05-drawer__item:nth-child(3){animation-delay:220ms}
  .c05-drawer--open .c05-drawer__item:nth-child(4){animation-delay:290ms}
  @keyframes c05-drawer-in{to{opacity:1;transform:translateX(0)}}
  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase;font-family:system-ui,sans-serif}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
</style>
</head>
<body>
<div class="c05-drawer" id="c05-drawer">
  <div class="c05-drawer__topbar">
    <div class="c05-drawer__hb" id="c05-hb" role="button" tabindex="0" aria-label="Toggle drawer">
      <span></span><span></span><span></span>
    </div>
    <span class="c05-drawer__title">Workspace</span>
  </div>
  <div class="c05-drawer__scrim" id="c05-scrim"></div>
  <nav class="c05-drawer__panel">
    <div class="c05-drawer__item">Dashboard</div>
    <div class="c05-drawer__item">Projects</div>
    <div class="c05-drawer__item">Members</div>
    <div class="c05-drawer__item">Settings</div>
  </nav>
</div>
<div class="cap">Slide-in Drawer</div>
<script>
(function(){
  var drawer=document.getElementById('c05-drawer');
  if(!drawer)return;
  var hb=document.getElementById('c05-hb');
  var scrim=document.getElementById('c05-scrim');
  var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  function toggle(){drawer.classList.toggle('c05-drawer--open');}
  function close(){drawer.classList.remove('c05-drawer--open');}
  hb.addEventListener('click',toggle);
  hb.addEventListener('keydown',function(e){
    if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle();}
  });
  scrim.addEventListener('click',close);
  /* autonomous idle: open and close on a cadence */
  var timer;
  function loop(){
    if(reduce)return;
    timer=setTimeout(function(){toggle();loop();},2400);
  }
  function stop(){clearTimeout(timer);}
  document.addEventListener('visibilitychange',function(){document.hidden?stop():loop();});
  loop();
})();
</script>
</body>
</html>
