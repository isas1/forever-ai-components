<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A glowing iris-to-cyan gradient underline glides and resizes to follow hovered nav links, wandering idly when unhovered.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Underline Follow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --text-0:#f4f6fb;
    --text-2:#8a91a8;
    --accent-iris:#7c5cff;
    --accent-cyan:#22d3ee;
    --grad-iris-cyan:linear-gradient(120deg,var(--accent-iris),var(--accent-cyan));
    --ease-out-soft:cubic-bezier(0.22,1,0.36,1);
    --dur-base:280ms;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{
    background:#0d0f16;
    background-image:radial-gradient(50vw 40vw at 90% 0%,rgba(34,211,238,0.16),transparent 55%);
    font-family:"Inter",system-ui,sans-serif;
    display:grid;place-items:center;
  }
  .c06-nav{position:relative;display:flex;gap:6px;padding-bottom:8px}
  .c06-nav__link{
    position:relative;border:0;background:none;
    font-family:"Inter",system-ui,sans-serif;font-size:15px;font-weight:500;
    color:var(--text-2);padding:6px 14px;cursor:pointer;
    transition:color var(--dur-base) var(--ease-out-soft);
  }
  .c06-nav__link:hover,.c06-nav__link--active{color:var(--text-0)}
  .c06-nav__ink{
    position:absolute;bottom:0;left:0;height:2px;border-radius:2px;
    background:var(--grad-iris-cyan);box-shadow:0 0 12px -2px var(--accent-iris);
    transform:translateX(0);width:0;
    transition:transform 420ms var(--ease-out-soft),width 420ms var(--ease-out-soft);
  }
  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase}
  @media (prefers-reduced-motion:reduce){.c06-nav__ink{transition-duration:.001ms!important}}
</style>
<script type="application/json" id="forever-agent-meta">

 "description": "A glowing iris-to-cyan gradient underline slides and resizes to follow hovered nav links; wanders idly across links when unhovered.",
 "useWhen": "Portfolio or app nav bars needing a polished active-state indicator with ambient motion between interactions.",
 "avoidWhen": "Nav bars with more than 6 items where the idle wander may feel restless; or any context requiring a truly static nav indicator.",
 "agentPrompt": "Change the underline gradient to gold-to-orange by setting --accent-iris:#f59e0b and --accent-cyan:#f97316, and slow the idle cycle to 2400ms.",
 "editableAreas": [

  "idle wander interval (1600ms in setTimeout)",

  "gap between nav items (gap:6px)"
 ],

  "prefers-reduced-motion guard (kills idle loop)",
  "visibilitychange stop/loop guard",

  "Autonomous idle cycle must be removed or paused for production click-driven nav"

</head>
<body>
<nav class="c06-nav" id="c06-nav">
  <button class="c06-nav__link c06-nav__link--active">Work</button>
  <button class="c06-nav__link">About</button>
  <button class="c06-nav__link">Journal</button>
  <button class="c06-nav__link">Contact</button>
  <span class="c06-nav__ink" id="c06-ink"></span>
</nav>
<div class="cap">Underline Follow</div>
<script>
(function(){
  var nav=document.getElementById('c06-nav');
  if(!nav)return;
  var ink=document.getElementById('c06-ink');
  var links=Array.prototype.slice.call(nav.querySelectorAll('.c06-nav__link'));
  var active=links[0];
  var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  var hovering=false;
  function to(el){
    ink.style.width=el.offsetWidth+'px';
    ink.style.transform='translateX('+el.offsetLeft+'px)';
  }
  links.forEach(function(l){
    l.addEventListener('mouseenter',function(){hovering=true;to(l);});
    l.addEventListener('click',function(){
      links.forEach(function(x){x.classList.remove('c06-nav__link--active');});
      l.classList.add('c06-nav__link--active');
      active=l;
    });
  });
  nav.addEventListener('mouseenter',function(){hovering=true;});
  nav.addEventListener('mouseleave',function(){hovering=false;to(active);});
  requestAnimationFrame(function(){to(active);});
  /* autonomous idle: the ink wanders across links when not hovered */
  var i=0,timer;
  function loop(){
    if(reduce)return;
    timer=setTimeout(function(){
      if(!hovering){i=(i+1)%links.length;to(links[i]);}
      loop();
    },1600);
  }
  function stop(){clearTimeout(timer);}
  document.addEventListener('visibilitychange',function(){document.hidden?stop():loop();});
  loop();
})();
</script>
</body>
</html>
