<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A segmented Day/Week/Month toggle where a glowing translucent pill springs between options on a dark rounded bar.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sliding Pill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-surface:#1c2030;
    --text-0:#f4f6fb;
    --text-2:#8a91a8;
    --accent-iris-dim:rgba(124,92,255,0.16);
    --border-soft:rgba(255,255,255,0.07);
    --border-glow:rgba(124,92,255,0.45);
    --glow-cyan:0 0 32px -6px rgba(34,211,238,0.5);
    --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
    --ease-out-soft:cubic-bezier(0.22,1,0.36,1);
    --dur-base:280ms;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{
    background:#0d0f16;
    background-image:radial-gradient(60vw 40vw at 15% -10%,rgba(124,92,255,0.16),transparent 60%);
    font-family:"Inter",system-ui,sans-serif;
    display:grid;place-items:center;
  }
  .c07-pill{
    position:relative;display:flex;gap:2px;padding:5px;
    background:var(--bg-surface);
    border:1px solid var(--border-soft);border-radius:999px;
  }
  .c07-pill__glide{
    position:absolute;top:5px;left:5px;height:calc(100% - 10px);
    border-radius:999px;background:var(--accent-iris-dim);
    border:1px solid var(--border-glow);box-shadow:var(--glow-cyan);
    transition:transform 440ms var(--ease-spring),width 440ms var(--ease-spring);
    z-index:0;
  }
  .c07-pill__btn{
    position:relative;z-index:1;border:0;background:none;
    font-family:"Inter",system-ui,sans-serif;font-size:14px;font-weight:500;
    color:var(--text-2);padding:9px 17px;cursor:pointer;border-radius:999px;
    transition:color var(--dur-base) var(--ease-out-soft);
  }
  .c07-pill__btn--active{color:var(--text-0)}
  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase}
  @media (prefers-reduced-motion:reduce){.c07-pill__glide{transition-duration:.001ms!important}}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/navigation/07-sliding-pill.html",
 "title": "Sliding Pill",
 "description": "A 3-segment Day/Week/Month toggle where a glowing translucent pill slides between options with a spring bounce on a dark rounded bar.",
 "useWhen": "Calendar views, date-range pickers, or any 2-4 option segmented control on dark UI surfaces.",
 "avoidWhen": "Light backgrounds (colors hardcoded for dark surface). More than 4-5 options — pill width math gets cramped.",
 "agentPrompt": "Change the three labels to 'Hours', 'Days', 'Weeks' and update the accent glow color from cyan to amber by replacing rgba(34,211,238,0.5) with rgba(251,191,36,0.5).",
 "editableAreas": [
  "button labels (Day/Week/Month text)",
  "spring easing curve (--ease-spring cubic-bezier)",
  "glide transition duration (440ms)",
  "accent glow color (--glow-cyan / --border-glow)",
  "auto-cycle interval (1700ms)",
  "padding and font size"
 ],
 "preserveElements": [
  "requestAnimationFrame initial move() call (sizes glide on load)",
  "visibilitychange stop/loop pause pattern",
  "prefers-reduced-motion guard on auto-cycle loop"
 ],
 "knownLimitations": [
  "Auto-cycles by default — remove loop() call and stop() handler before shipping in production",
  "Background and colors hardcoded for dark surfaces only",
  "No aria-pressed or role=tablist semantics for screen readers"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "navigation",
  "pill",
  "toggle",
  "segmented-control",
  "spring",
  "glow",
  "dark-ui"
 ]

</script>
</head>
<body>
<div class="c07-pill" id="c07-pill">
  <span class="c07-pill__glide" id="c07-glide"></span>
  <button class="c07-pill__btn c07-pill__btn--active">Day</button>
  <button class="c07-pill__btn">Week</button>
  <button class="c07-pill__btn">Month</button>
</div>
<div class="cap">Sliding Pill</div>
<script>
(function(){
  var pill=document.getElementById('c07-pill');
  if(!pill)return;
  var glide=document.getElementById('c07-glide');
  var btns=Array.prototype.slice.call(pill.querySelectorAll('.c07-pill__btn'));
  var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  function move(btn){
    btns.forEach(function(x){x.classList.remove('c07-pill__btn--active');});
    btn.classList.add('c07-pill__btn--active');
    glide.style.width=btn.offsetWidth+'px';
    glide.style.transform='translateX('+(btn.offsetLeft-5)+'px)';
  }
  btns.forEach(function(btn){btn.addEventListener('click',function(){move(btn);});});
  requestAnimationFrame(function(){move(btns[0]);});
  /* autonomous idle: cycle the active segment */
  var i=0,timer;
  function loop(){
    if(reduce)return;
    timer=setTimeout(function(){i=(i+1)%btns.length;move(btns[i]);loop();},1700);
  }
  function stop(){clearTimeout(timer);}
  document.addEventListener('visibilitychange',function(){document.hidden?stop():loop();});
  loop();
})();
</script>
</body>
</html>
