<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A breadcrumb path where chevron separators draw themselves in with a stroke animation and the active cyan crumb advances down the trail.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Breadcrumb Trail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --text-0:#f4f6fb;
    --text-2:#8a91a8;
    --text-3:#565d73;
    --accent-cyan:#22d3ee;
    --ease-out-soft:cubic-bezier(0.22,1,0.36,1);
    --dur-base:280ms;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{
    background:#0d0f16;
    background-image:radial-gradient(50vw 40vw at 90% 0%,rgba(34,211,238,0.16),transparent 55%);
    font-family:"Inter",system-ui,sans-serif;
    display:grid;place-items:center;padding:16px;
  }
  .c08-crumb{display:flex;align-items:center;font-size:14px;flex-wrap:wrap;justify-content:center}
  .c08-crumb__seg{display:flex;align-items:center}
  .c08-crumb__link{
    border:0;background:none;font-family:"Inter",system-ui,sans-serif;
    font-size:14px;font-weight:500;color:var(--text-2);
    padding:5px 10px;border-radius:8px;cursor:pointer;
    transition:color var(--dur-base),background var(--dur-base);
  }
  .c08-crumb__link:hover{color:var(--text-0);background:rgba(255,255,255,0.04)}
  .c08-crumb__link--active{color:var(--accent-cyan)}
  .c08-crumb__chev{width:16px;height:16px;position:relative;flex:0 0 auto}
  .c08-crumb__chev svg{width:100%;height:100%;display:block}
  .c08-crumb__chev path{
    stroke:var(--text-3);stroke-width:2;fill:none;
    stroke-dasharray:16;stroke-dashoffset:16;
    animation:c08-crumb-draw 520ms var(--ease-out-soft) forwards;
  }
  .c08-crumb__seg:nth-child(2) .c08-crumb__chev path{animation-delay:120ms}
  .c08-crumb__seg:nth-child(3) .c08-crumb__chev path{animation-delay:240ms}
  .c08-crumb__seg:nth-child(4) .c08-crumb__chev path{animation-delay:360ms}
  @keyframes c08-crumb-draw{to{stroke-dashoffset:0}}
  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase}
  @media (prefers-reduced-motion:reduce){.c08-crumb__chev path{animation:none!important;stroke-dashoffset:0!important}}
</style>
</head>
<body>
<nav class="c08-crumb" id="c08-crumb">
  <span class="c08-crumb__seg"><button class="c08-crumb__link">Home</button></span>
  <span class="c08-crumb__seg">
    <span class="c08-crumb__chev"><svg viewBox="0 0 16 16"><path d="M6 3 L11 8 L6 13"/></svg></span>
    <button class="c08-crumb__link">Library</button>
  </span>
  <span class="c08-crumb__seg">
    <span class="c08-crumb__chev"><svg viewBox="0 0 16 16"><path d="M6 3 L11 8 L6 13"/></svg></span>
    <button class="c08-crumb__link">Albums</button>
  </span>
  <span class="c08-crumb__seg">
    <span class="c08-crumb__chev"><svg viewBox="0 0 16 16"><path d="M6 3 L11 8 L6 13"/></svg></span>
    <button class="c08-crumb__link c08-crumb__link--active">Nebula</button>
  </span>
</nav>
<div class="cap">Breadcrumb Trail</div>
<script>
(function(){
  var nav=document.getElementById('c08-crumb');
  if(!nav)return;
  var links=Array.prototype.slice.call(nav.querySelectorAll('.c08-crumb__link'));
  var chevs=Array.prototype.slice.call(nav.querySelectorAll('.c08-crumb__chev path'));
  var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  links.forEach(function(l){
    l.addEventListener('click',function(){
      links.forEach(function(x){x.classList.remove('c08-crumb__link--active');});
      l.classList.add('c08-crumb__link--active');
    });
  });
  /* autonomous idle: redraw the chevron trail, advancing the active crumb */
  var i=links.length-1,timer;
  function redraw(){
    chevs.forEach(function(p,k){
      p.style.animation='none';
      void p.getBoundingClientRect();
      p.style.animation='c08-crumb-draw 520ms var(--ease-out-soft) '+(k*120)+'ms forwards';
    });
    links.forEach(function(x){x.classList.remove('c08-crumb__link--active');});
    links[i].classList.add('c08-crumb__link--active');
  }
  function loop(){
    if(reduce)return;
    timer=setTimeout(function(){
      i=(i+1)%links.length;redraw();loop();
    },2600);
  }
  function stop(){clearTimeout(timer);}
  document.addEventListener('visibilitychange',function(){document.hidden?stop():loop();});
  loop();
})();
</script>
</body>
</html>
