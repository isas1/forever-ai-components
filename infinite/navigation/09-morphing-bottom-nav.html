<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A floating mobile bottom bar of line icons with a glowing iris-cyan gradient blob that springs beneath the active icon.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Morphing Bottom Nav</title>
<style>
  :root{
    --bg-surface:#1c2030;
    --text-2:#8a91a8;
    --accent-iris:#7c5cff;
    --accent-cyan:#22d3ee;
    --grad-iris-cyan:linear-gradient(120deg,var(--accent-iris),var(--accent-cyan));
    --border-soft:rgba(255,255,255,0.07);
    --glow-cyan:0 0 32px -6px rgba(34,211,238,0.5);
    --shadow-lift:0 18px 50px -24px rgba(0,0,0,0.9);
    --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
    --dur-base:280ms;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{
    background:#0d0f16;
    background-image:radial-gradient(60vw 40vw at 50% 110%,rgba(34,211,238,0.14),transparent 60%);
    display:grid;place-items:center;
  }
  .c09-bnav{
    position:relative;display:flex;gap:0;padding:8px;
    background:var(--bg-surface);border:1px solid var(--border-soft);
    border-radius:22px;box-shadow:var(--shadow-lift);
  }
  .c09-bnav__blob{
    position:absolute;top:8px;left:8px;width:52px;height:calc(100% - 16px);
    border-radius:14px;background:var(--grad-iris-cyan);box-shadow:var(--glow-cyan);
    transition:transform 520ms var(--ease-spring);z-index:0;
  }
  .c09-bnav__btn{
    position:relative;z-index:1;width:52px;height:44px;border:0;background:none;
    display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);
    transition:color var(--dur-base),transform var(--dur-base) var(--ease-spring);
  }
  .c09-bnav__btn svg{width:22px;height:22px}
  .c09-bnav__btn--active{color:#fff;transform:translateY(-2px)}
  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase;font-family:system-ui,sans-serif}
  @media (prefers-reduced-motion:reduce){.c09-bnav__blob,.c09-bnav__btn{transition-duration:.001ms!important}}
</style>
<script type="application/json" id="forever-agent-meta">

 "file": "infinite/navigation/09-morphing-bottom-nav.html",

 "description": "A floating mobile bottom nav bar with 4 icon buttons; a glowing iris-to-cyan gradient blob springs beneath the active tab on click.",
 "useWhen": "Mobile app demos, dark-mode UI showcases, bottom navigation pattern references.",
 "avoidWhen": "Desktop-only layouts. Auto-cycles by default — remove the loop before shipping as a real nav component.",

 ],

  "blob translateX positioning via offsetLeft"

 "knownLimitations": [

  "Blob width is hardcoded 52px and must match button width if count changes"

</head>
<body>
<nav class="c09-bnav" id="c09-bnav">
  <span class="c09-bnav__blob" id="c09-blob"></span>
  <button class="c09-bnav__btn c09-bnav__btn--active" aria-label="Home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
  </button>
  <button class="c09-bnav__btn" aria-label="Search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
  </button>
  <button class="c09-bnav__btn" aria-label="Favorites">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-4.5-9-9a5 5 0 019-3 5 5 0 019 3c-2 4.5-9 9-9 9z"/></svg>
  </button>
  <button class="c09-bnav__btn" aria-label="Profile">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
  </button>
</nav>
<div class="cap">Morphing Bottom Nav</div>
<script>
(function(){
  var nav=document.getElementById('c09-bnav');
  if(!nav)return;
  var blob=document.getElementById('c09-blob');
  var btns=Array.prototype.slice.call(nav.querySelectorAll('.c09-bnav__btn'));
  var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  function move(btn){
    btns.forEach(function(x){x.classList.remove('c09-bnav__btn--active');});
    btn.classList.add('c09-bnav__btn--active');
    blob.style.transform='translateX('+(btn.offsetLeft-8)+'px)';
  }
  btns.forEach(function(btn){btn.addEventListener('click',function(){move(btn);});});
  requestAnimationFrame(function(){move(btns[0]);});
  /* autonomous idle: hop the blob between icons */
  var i=0,timer;
  function loop(){
    if(reduce)return;
    timer=setTimeout(function(){i=(i+1)%btns.length;move(btns[i]);loop();},1500);
  }
  function stop(){clearTimeout(timer);}
  document.addEventListener('visibilitychange',function(){document.hidden?stop():loop();});
  loop();
})();
</script>
</body>
</html>
