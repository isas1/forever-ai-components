<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<meta name="description" content="Soft Button — Neumorphism. A self-contained, zero-dependency animated web component."><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Soft Button</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#e0e5ec;display:flex;align-items:center;justify-content:center}
.neu-cap{position:fixed;left:8px;bottom:7px;font:600 10px ui-monospace,monospace;color:#8a91a8;opacity:.35;letter-spacing:.5px;pointer-events:none;z-index:99}
.neu-btn{
  width:140px;height:140px;border-radius:50%;
  background:#e0e5ec;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:8px;
  box-shadow:6px 6px 14px #b8bec7,-6px -6px 14px #ffffff;
  transition:box-shadow 220ms ease,transform 220ms ease;
  outline:none;
}
.neu-btn.neu-pressed{
  box-shadow:inset 4px 4px 10px #b8bec7,inset -4px -4px 10px #ffffff;
  transform:scale(0.97);
}
.neu-btn-icon{font-size:32px;line-height:1;transition:opacity 180ms ease}
.neu-btn-label{font:600 11px/1 system-ui,-apple-system,sans-serif;letter-spacing:1.5px;color:#8a91a8;transition:color 200ms ease}
.neu-btn.neu-pressed .neu-btn-label{color:#7c5cff}
.neu-ring{
  width:180px;height:180px;border-radius:50%;
  background:#e0e5ec;
  box-shadow:inset 3px 3px 8px #b8bec7,inset -3px -3px 8px #ffffff;
  display:flex;align-items:center;justify-content:center;
}
</style></head><body>
<div class="neu-ring">
  <button class="neu-btn" id="neuBtn" aria-pressed="false">
    <span class="neu-btn-icon" id="neuIcon">▶</span>
    <span class="neu-btn-label" id="neuLabel">PLAY</span>
  </button>
</div>
<div class="neu-cap">SOFT BUTTON</div>
<script>(()=>{
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const btn=document.getElementById('neuBtn');
  const icon=document.getElementById('neuIcon');
  const label=document.getElementById('neuLabel');
  let pressed=false,timer=null;
  function toggle(){
    pressed=!pressed;
    btn.classList.toggle('neu-pressed',pressed);
    btn.setAttribute('aria-pressed',String(pressed));
    icon.textContent=pressed?'⏸':'▶';
    label.textContent=pressed?'PAUSE':'PLAY';
  }
  function stop(){clearInterval(timer);}
  function play(){
    if(reduce){return;}
    timer=setInterval(toggle,2000);
  }
  document.addEventListener('visibilitychange',()=>document.hidden?stop():play());
  play();
})();</script>
</body></html>
