<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<meta name="description" content="Toggle Switches — Neumorphism. A self-contained, zero-dependency animated web component."><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Toggle Switches</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#e0e5ec;display:flex;align-items:center;justify-content:center}
.neu-cap{position:fixed;left:8px;bottom:7px;font:600 10px ui-monospace,monospace;color:#8a91a8;opacity:.35;letter-spacing:.5px;pointer-events:none;z-index:99}
.neu-panel{
  background:#e0e5ec;border-radius:24px;padding:28px 36px;
  box-shadow:8px 8px 18px #b8bec7,-8px -8px 18px #ffffff;
  display:flex;flex-direction:column;gap:22px;
}
.neu-row{display:flex;align-items:center;justify-content:space-between;gap:32px}
.neu-row-label{font:600 11px/1 system-ui,-apple-system,sans-serif;letter-spacing:2px;color:#8a91a8;min-width:36px}
.neu-track{
  width:58px;height:30px;border-radius:15px;background:#e0e5ec;
  box-shadow:inset 3px 3px 7px #b8bec7,inset -3px -3px 7px #ffffff;
  position:relative;cursor:pointer;transition:box-shadow 200ms;
}
.neu-thumb{
  width:22px;height:22px;border-radius:50%;
  background:#e0e5ec;
  box-shadow:3px 3px 7px #b8bec7,-3px -3px 7px #ffffff;
  position:absolute;top:4px;left:4px;
  transition:transform 260ms cubic-bezier(.4,0,.2,1),background 260ms;
}
.neu-track.neu-on .neu-thumb{
  transform:translateX(28px);
  background:#7c5cff;
  box-shadow:2px 2px 5px rgba(124,92,255,.4),-2px -2px 5px rgba(255,255,255,.6);
}
</style><script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/neumorphism/02-toggle-switches.html",
 "title": "Toggle Switches",
 "description": "Three neumorphic toggle switches auto-cycle on/off with a smooth purple-accented thumb slide and inset shadow track.",
 "useWhen": "Settings panels or preference UIs where a neumorphic soft-UI aesthetic is desired.",
 "avoidWhen": "Production interactive controls — remove auto-cycle and wire click handlers before shipping. Avoid on dark backgrounds; colors are hardcoded to light gray.",
 "agentPrompt": "Change the accent color from #7c5cff to #00c896 and slow the cycle interval from 1400ms to 2200ms by updating setInterval(tick, 1400).",
 "editableAreas": [
  "accent color (#7c5cff)",
  "cycle interval (1400ms in setInterval)",
  "switch labels (WIFI/BT/VPN)",
  "track/panel background (#e0e5ec)",
  "thumb travel distance (translateX(28px))"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard",
  "visibilitychange pause/play"
 ],
 "knownLimitations": [
  "Auto-cycles by default — add click handlers and remove setInterval for production use",
  "Background color hardcoded to light gray; does not support dark mode"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "neumorphism",
  "toggle",
  "switch",
  "ui-control",
  "settings",
  "loop",
  "soft-ui"
 ]
}
</script>
</head><body>
<div class="neu-panel">
  <div class="neu-row">
    <span class="neu-row-label">WIFI</span>
    <div class="neu-track" id="sw0"><div class="neu-thumb"></div></div>
  </div>
  <div class="neu-row">
    <span class="neu-row-label">BT</span>
    <div class="neu-track" id="sw1"><div class="neu-thumb"></div></div>
  </div>
  <div class="neu-row">
    <span class="neu-row-label">VPN</span>
    <div class="neu-track" id="sw2"><div class="neu-thumb"></div></div>
  </div>
</div>
<div class="neu-cap">TOGGLE SWITCHES</div>
<script>(()=>{
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const sw=[0,1,2].map(i=>document.getElementById('sw'+i));
  const steps=[[0],[1],[2],[0,1,2,'off']];
  let step=0,timer=null;
  function applyStep(s){
    const cur=steps[s];
    if(cur.includes('off')){sw.forEach(el=>el.classList.remove('neu-on'));}
    else{cur.forEach(i=>sw[i].classList.add('neu-on'));}
  }
  function tick(){step=(step+1)%steps.length;applyStep(step);}
  function stop(){clearInterval(timer);}
  function play(){
    if(reduce){applyStep(0);return;}
    timer=setInterval(tick,1400);
  }
  document.addEventListener('visibilitychange',()=>document.hidden?stop():play());
  play();
})();</script>
</body></html>
