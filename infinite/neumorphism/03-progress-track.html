<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<meta name="description" content="Progress Track — Neumorphism. A self-contained, zero-dependency animated web component."><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Progress Track</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#e0e5ec;display:flex;align-items:center;justify-content:center}
.neu-cap{position:fixed;left:8px;bottom:7px;font:600 10px ui-monospace,monospace;color:#8a91a8;opacity:.35;letter-spacing:.5px;pointer-events:none;z-index:99}
.neu-wrap{display:flex;flex-direction:column;gap:20px;align-items:center;width:72%;max-width:280px}
.neu-pct{font:300 38px/1 system-ui,-apple-system,sans-serif;color:#8a91a8;letter-spacing:-1px;text-align:center}
.neu-pct span{font-size:18px;vertical-align:super;margin-left:2px}
.neu-track-outer{
  width:100%;height:18px;border-radius:9px;
  background:#e0e5ec;
  box-shadow:inset 3px 3px 8px #b8bec7,inset -3px -3px 8px #ffffff;
  overflow:hidden;position:relative;
}
.neu-fill{
  height:100%;width:0%;border-radius:9px;
  background:linear-gradient(90deg,#7c5cff,#60a5fa);
  box-shadow:2px 0 8px rgba(124,92,255,.35);
  transition:width 80ms linear;
}
.neu-label{font:600 10px/1 system-ui,-apple-system,sans-serif;letter-spacing:2px;color:#8a91a8}
</style><script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/neumorphism/03-progress-track.html",
 "title": "Progress Track",
 "description": "Neumorphic inset progress track fills 0→100% via a purple-to-blue gradient fill, cycling with a percentage counter. Resets and loops automatically.",
 "useWhen": "Loading screens, file upload indicators, onboarding step trackers with a soft/clay UI aesthetic.",
 "avoidWhen": "Production upload flows — remove the auto-loop and wire real progress values. Avoid on light or dark backgrounds that don't match the hardcoded #e0e5ec base.",
 "agentPrompt": "Change the gradient to warm tones (e.g. background: linear-gradient(90deg,#ff7c5c,#fbbf24)), slow the cycle to 8 seconds by setting DURATION=8000, and change the label text from 'LOADING' to 'UPLOADING'.",
 "editableAreas": [
  "fill gradient colors (#7c5cff → #60a5fa)",
  "cycle duration (DURATION=4000)",
  "label text ('LOADING')",
  "track height (18px)",
  "box-shadow depths for inset effect"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (static 60% fallback)",
  "visibilitychange pause/resume",
  "transition:none reset pattern before re-animating"
 ],
 "knownLimitations": [
  "Background color (#e0e5ec) is hardcoded in both CSS and the neumorphic shadows — changing it requires updating multiple shadow values to maintain the soft-UI effect",
  "Auto-loops by default; wire real progress values and remove setInterval for production use"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "neumorphism",
  "progress-bar",
  "loading",
  "loop",
  "ui-control",
  "soft-ui"
 ]
}
</script>
</head><body>
<div class="neu-wrap">
  <div class="neu-pct"><span id="neuPct">0</span><span>%</span></div>
  <div class="neu-track-outer"><div class="neu-fill" id="neuFill"></div></div>
  <div class="neu-label">LOADING</div>
</div>
<div class="neu-cap">PROGRESS TRACK</div>
<script>(()=>{
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const fill=document.getElementById('neuFill');
  const pct=document.getElementById('neuPct');
  const DURATION=4000,INTERVAL=80;
  let val=0,timer=null,dir=1;
  function step(){
    val=Math.min(100,Math.max(0,val+dir*(100/(DURATION/INTERVAL))));
    fill.style.width=val+'%';
    pct.textContent=Math.round(val);
    if(val>=100){clearInterval(timer);setTimeout(reset,600);}
  }
  function reset(){val=0;fill.style.transition='none';fill.style.width='0%';pct.textContent='0';requestAnimationFrame(()=>{fill.style.transition='width 80ms linear';play();});}
  function stop(){clearInterval(timer);}
  function play(){if(reduce){fill.style.width='60%';pct.textContent='60';return;}timer=setInterval(step,INTERVAL);}
  document.addEventListener('visibilitychange',()=>document.hidden?stop():play());
  play();
})();</script>
</body></html>
