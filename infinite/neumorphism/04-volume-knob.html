<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<meta name="description" content="Volume Knob — Neumorphism. A self-contained, zero-dependency animated web component."><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Volume Knob</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#e0e5ec;display:flex;align-items:center;justify-content:center}
.neu-cap{position:fixed;left:8px;bottom:7px;font:600 10px ui-monospace,monospace;color:#8a91a8;opacity:.35;letter-spacing:.5px;pointer-events:none;z-index:99}
.neu-scene{position:relative;width:180px;height:180px}
.neu-ticks{position:absolute;inset:0}
.neu-tick{
  position:absolute;width:4px;height:10px;border-radius:2px;
  background:#c8cdd8;top:0;left:50%;transform-origin:2px 90px;
  margin-left:-2px;
}
.neu-tick.neu-tick-major{height:14px;background:#b0b7c3}
.neu-socket{
  position:absolute;inset:22px;border-radius:50%;
  background:#e0e5ec;
  box-shadow:inset 4px 4px 10px #b8bec7,inset -4px -4px 10px #ffffff;
}
.neu-knob{
  position:absolute;inset:34px;border-radius:50%;
  background:#e0e5ec;
  box-shadow:5px 5px 12px #b8bec7,-5px -5px 12px #ffffff;
}
.neu-marker{
  position:absolute;left:50%;top:10px;width:4px;height:16px;border-radius:2px;
  background:linear-gradient(180deg,#7c5cff,#60a5fa);
  margin-left:-2px;transform-origin:2px 42px;
}
.neu-label{position:absolute;bottom:-24px;width:100%;text-align:center;font:600 10px/1 system-ui,-apple-system,sans-serif;letter-spacing:2px;color:#8a91a8}
</style><script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/neumorphism/04-volume-knob.html",
 "title": "Volume Knob",
 "description": "A neumorphic volume knob with 24 tick marks auto-rotates back and forth over 6 seconds, its gradient marker sweeping the full 360 degrees.",
 "useWhen": "Audio/music UI mockups, settings panels, or any neumorphic design showcase needing a realistic dial component.",
 "avoidWhen": "Contexts requiring actual user input — the knob is display-only with no drag/click interaction wired up.",
 "agentPrompt": "Change the marker gradient from purple-blue to orange-red (update background:linear-gradient(180deg,#ff6b35,#f7c948)), slow the sweep cycle to 10000ms by setting PERIOD=10000.",
 "editableAreas": [
  "tick count (N=24)",
  "sweep period (PERIOD=6000ms)",
  "marker gradient colors (#7c5cff, #60a5fa)",
  "knob/socket shadow values",
  "label text ('VOLUME')"
 ],
 "preserveElements": [
  "visibilitychange stop/play guards",
  "prefers-reduced-motion static fallback (rotate(120deg))",
  "IIFE wrapper"
 ],
 "knownLimitations": [
  "No drag interaction — purely decorative auto-animation",
  "Background color hardcoded to #e0e5ec; changing it breaks the neumorphic shadow illusion"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "neumorphism",
  "knob",
  "ui-control",
  "loop",
  "soft-ui",
  "ambient"
 ]
}
</script>
</head><body>
<div style="display:flex;flex-direction:column;align-items:center">
<div class="neu-scene" id="neuScene">
  <div class="neu-ticks" id="neuTicks"></div>
  <div class="neu-socket"></div>
  <div class="neu-knob" id="neuKnob">
    <div class="neu-marker" id="neuMarker"></div>
  </div>
</div>
<div class="neu-label">VOLUME</div>
</div>
<div class="neu-cap">VOLUME KNOB</div>
<script>(()=>{
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const ticks=document.getElementById('neuTicks');
  const knob=document.getElementById('neuKnob');
  const N=24;
  for(let i=0;i<N;i++){
    const t=document.createElement('div');
    t.className='neu-tick'+(i%4===0?' neu-tick-major':'');
    t.style.transform=`rotate(${i*(360/N)}deg)`;
    ticks.appendChild(t);
  }
  const PERIOD=6000;
  let start=null,raf=null,dir=1,base=0,elapsed=0;
  function frame(ts){
    if(!start)start=ts;
    const dt=ts-start;start=ts;
    elapsed+=dt*dir;
    if(elapsed>=PERIOD){elapsed=PERIOD;dir=-1;}
    else if(elapsed<=0){elapsed=0;dir=1;}
    const deg=(elapsed/PERIOD)*360;
    knob.style.transform=`rotate(${deg}deg)`;
    raf=requestAnimationFrame(frame);
  }
  function stop(){cancelAnimationFrame(raf);raf=null;start=null;}
  function play(){if(reduce){knob.style.transform='rotate(120deg)';return;}raf=requestAnimationFrame(frame);}
  document.addEventListener('visibilitychange',()=>document.hidden?stop():play());
  play();
})();</script>
</body></html>
