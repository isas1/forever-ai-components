<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<meta name="description" content="Stat Cards — Neumorphism. A self-contained, zero-dependency animated web component."><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stat Cards</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#e0e5ec;display:flex;align-items:center;justify-content:center}
.neu-cap{position:fixed;left:8px;bottom:7px;font:600 10px ui-monospace,monospace;color:#8a91a8;opacity:.35;letter-spacing:.5px;pointer-events:none;z-index:99}
.neu-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:4px}
.neu-card{
  width:108px;height:108px;border-radius:20px;
  background:#e0e5ec;
  box-shadow:6px 6px 14px #b8bec7,-6px -6px 14px #ffffff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  transition:box-shadow 160ms ease;
}
.neu-card.neu-pulse{
  box-shadow:8px 8px 18px #b0b6c0,-8px -8px 18px #ffffff;
}
.neu-icon{font-size:26px;line-height:1}
.neu-val{font:700 22px/1 system-ui,-apple-system,sans-serif;color:#6b7280}
.neu-lbl{font:600 9px/1 system-ui,-apple-system,sans-serif;letter-spacing:1.8px;color:#9ca3af}
</style></head><body>
<div class="neu-grid">
  <div class="neu-card" id="nc0"><div class="neu-icon">🌡</div><div class="neu-val" id="nv0">22</div><div class="neu-lbl">TEMP</div></div>
  <div class="neu-card" id="nc1"><div class="neu-icon">💧</div><div class="neu-val" id="nv1">48</div><div class="neu-lbl">HUMID</div></div>
  <div class="neu-card" id="nc2"><div class="neu-icon">⚡</div><div class="neu-val" id="nv2">74</div><div class="neu-lbl">POWER</div></div>
  <div class="neu-card" id="nc3"><div class="neu-icon">📶</div><div class="neu-val" id="nv3">91</div><div class="neu-lbl">SIGNAL</div></div>
</div>
<div class="neu-cap">STAT CARDS</div>
<script>(()=>{
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const vals=[22,48,74,91];
  const deltas=[1,-1,2,-1];
  const limits=[[18,30],[40,60],[60,90],[80,99]];
  const cards=[0,1,2,3].map(i=>({card:document.getElementById('nc'+i),val:document.getElementById('nv'+i)}));
  let timer=null,cycle=0;
  function tick(){
    const i=cycle%4;
    vals[i]+=deltas[i];
    if(vals[i]>=limits[i][1]||vals[i]<=limits[i][0])deltas[i]*=-1;
    cards[i].val.textContent=vals[i];
    cards[i].card.classList.add('neu-pulse');
    setTimeout(()=>cards[i].card.classList.remove('neu-pulse'),300);
    cycle++;
  }
  function stop(){clearInterval(timer);}
  function play(){if(reduce)return;timer=setInterval(tick,900);}
  document.addEventListener('visibilitychange',()=>document.hidden?stop():play());
  play();
})();</script>
</body></html>
