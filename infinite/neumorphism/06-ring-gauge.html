<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<meta name="description" content="Ring Gauge — Neumorphism. A self-contained, zero-dependency animated web component."><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ring Gauge</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#1e2130;display:flex;align-items:center;justify-content:center}
.neu-cap{position:fixed;left:8px;bottom:7px;font:600 10px ui-monospace,monospace;color:#8a91a8;opacity:.35;letter-spacing:.5px;pointer-events:none;z-index:99}
.neu-wrap{position:relative;width:180px;height:180px}
.neu-svg{width:180px;height:180px;transform:rotate(-90deg)}
.neu-track{fill:none;stroke:#16192a;stroke-width:14;filter:drop-shadow(2px 2px 4px #16192a) drop-shadow(-2px -2px 4px #262a40)}
.neu-ring{fill:none;stroke:url(#rg);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 120ms linear}
.neu-center{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;
}
.neu-pct{font:700 32px/1 system-ui,-apple-system,sans-serif;color:#c4c9da;letter-spacing:-1px}
.neu-unit{font:600 10px/1 system-ui,-apple-system,sans-serif;letter-spacing:2px;color:#555e7a}
</style></head><body>
<div class="neu-wrap">
  <svg class="neu-svg" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#7c5cff"/>
        <stop offset="100%" stop-color="#60a5fa"/>
      </linearGradient>
    </defs>
    <circle class="neu-track" cx="90" cy="90" r="72"/>
    <circle class="neu-ring" id="neuRing" cx="90" cy="90" r="72"/>
  </svg>
  <div class="neu-center">
    <div class="neu-pct" id="neuPct">0</div>
    <div class="neu-unit">LOAD</div>
  </div>
</div>
<div class="neu-cap">RING GAUGE</div>
<script>(()=>{
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const ring=document.getElementById('neuRing');
  const pctEl=document.getElementById('neuPct');
  const C=2*Math.PI*72;
  ring.style.strokeDasharray=C;
  ring.style.strokeDashoffset=C;
  const DURATION=4000,INTERVAL=80;
  let val=0,timer=null;
  function setVal(v){
    ring.style.strokeDashoffset=C-(v/100)*C;
    pctEl.textContent=Math.round(v);
  }
  function step(){
    val=Math.min(100,val+(100/(DURATION/INTERVAL)));
    setVal(val);
    if(val>=100){clearInterval(timer);setTimeout(reset,700);}
  }
  function reset(){
    val=0;
    ring.style.transition='none';
    setVal(0);
    requestAnimationFrame(()=>{ring.style.transition='stroke-dashoffset 120ms linear';play();});
  }
  function stop(){clearInterval(timer);}
  function play(){if(reduce){setVal(65);return;}timer=setInterval(step,INTERVAL);}
  document.addEventListener('visibilitychange',()=>document.hidden?stop():play());
  play();
})();</script>
</body></html>
