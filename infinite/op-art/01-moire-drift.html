<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Two concentric black-and-white ring grids slide apart, producing soft drifting moire interference fringes.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Moire Drift</title>
<style>
  html,body{margin:0;height:100%;background:#0a0a0a;overflow:hidden}
  #op01-stage{position:fixed;inset:0;background:#0a0a0a}
  #op01-c{display:block;width:100%;height:100%}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important}}
</style>
</head>
<body>
<div id="op01-stage" role="img" aria-label="Two fine concentric line grids overlapping and slowly sliding apart, producing soft drifting moire interference in black and white.">
  <canvas id="op01-c"></canvas>
</div>
<div class="cap">Moire Drift</div>
<script>
(function(){
  "use strict";
  var stage=document.getElementById("op01-stage");
  var c=document.getElementById("op01-c");
  var ctx=c.getContext("2d");
  var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;

  // cached geometry (recomputed on resize only)
  var W=0,H=0,dpr=1,cx0=0,cy0=0;
  var running=false,raf=0,t0=0;

  // Two concentric ring fields. Period in device px; centers drift slowly.
  // Drawing rings as filled arcs (even ring = white-ish, odd = bg) makes the
  // overlap of two fields multiply into moire fringes. We draw field A solid,
  // then field B with 'multiply' so coincident dark rings reinforce.
  var P=0; // ring period

  function resize(){
    dpr=Math.min(2,window.devicePixelRatio||1);
    W=Math.round(stage.clientWidth*dpr);
    H=Math.round(stage.clientHeight*dpr);
    c.width=W;c.height=H;
    cx0=W*0.5;cy0=H*0.5;
    // period scales with size: keep ~legible fringe density 180->640px
    var minD=Math.min(stage.clientWidth,stage.clientHeight);
    P=Math.max(7,Math.min(16,minD/26))*dpr;
  }

  // draw one concentric-ring field centered at (fx,fy) into ctx using current
  // composite mode. Rings are anti-aliased bands via stroked circles.
  function drawField(fx,fy,shade){
    var maxR=Math.hypot(W,H); // cover frame
    var n=Math.ceil(maxR/P)+1;
    ctx.strokeStyle=shade;
    ctx.lineWidth=P*0.5;
    var i,r;
    ctx.beginPath();
    for(i=0;i<n;i++){
      r=(i+0.25)*P;
      ctx.moveTo(fx+r,fy);
      ctx.arc(fx,fy,r,0,6.283185307179586);
    }
    ctx.stroke();
  }

  function frame(now){
    if(!running)return;
    if(!t0)t0=now;
    var t=(now-t0)*0.001;

    // slow elliptical drift of the two centers, opposed phase -> shifting moire
    var ax=Math.sin(t*0.18)*P*1.7;
    var ay=Math.cos(t*0.13)*P*1.4;
    var bx=-Math.sin(t*0.15+0.6)*P*1.9;
    var by=-Math.cos(t*0.11+0.4)*P*1.6;
    // gentle separation breathing of field B center
    var sep=Math.sin(t*0.07)*P*0.9;

    ctx.globalCompositeOperation="source-over";
    ctx.fillStyle="#0a0a0a";
    ctx.fillRect(0,0,W,H);

    // field A: white rings
    ctx.globalCompositeOperation="lighter";
    drawField(cx0+ax,cy0+ay,"#f4f4f4");
    // field B: rings that subtract where they fall between A's rings -> moire
    ctx.globalCompositeOperation="difference";
    drawField(cx0+bx+sep,cy0+by,"#ffffff");

    ctx.globalCompositeOperation="source-over";
    raf=requestAnimationFrame(frame);
  }

  function drawOneFrame(){
    ctx.globalCompositeOperation="source-over";
    ctx.fillStyle="#0a0a0a";
    ctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation="lighter";
    drawField(cx0-P*1.2,cy0,"#f4f4f4");
    ctx.globalCompositeOperation="difference";
    drawField(cx0+P*1.2,cy0,"#ffffff");
    ctx.globalCompositeOperation="source-over";
  }

  function start(){
    if(running)return;
    running=true;t0=0;
    raf=requestAnimationFrame(frame);
  }
  function stop(){
    running=false;
    if(raf)cancelAnimationFrame(raf);
    raf=0;
  }

  window.addEventListener("resize",function(){
    resize();
    if(reduce){drawOneFrame();}
  });

  document.addEventListener("visibilitychange",function(){
    if(reduce)return;
    if(document.hidden){stop();}
    else{start();}
  });

  resize();
  if(reduce){drawOneFrame();return;}
  start();
})();
</script>
</body>
</html>
