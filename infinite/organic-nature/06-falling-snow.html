<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Soft white snowflakes of varied depth drift and sway down a cool blue-grey gradient sky, with pointer-driven wind nudging the flurry.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Falling Snow</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#1a2433}
  #c{display:block;width:100%;height:100%}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-sans-serif,system-ui,sans-serif;
       letter-spacing:.08em;text-transform:uppercase;color:#e6f1ff;opacity:.34;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/organic-nature/06-falling-snow.html",
 "title": "Falling Snow",
 "description": "Up to 110 depth-layered snowflakes drift and sway down a dark blue gradient; pointer movement shifts a wind force that nudges the entire flurry sideways.",
 "useWhen": "Winter/holiday hero backgrounds, ambient screensavers, seasonal landing pages on dark themes.",
 "avoidWhen": "Light-background layouts (background hardcoded dark navy). Contexts where motion competes with legible text overlays.",
 "agentPrompt": "Increase snowflake count by changing the divisor in `Math.round(W*H/4200)` to 2500, shift flake color to warm white by changing `rgba(245,250,255,` to `rgba(255,248,230,`, and slow drift speed by setting `t+=0.005`.",
 "editableAreas": [
  "flake density divisor (W*H/4200)",
  "flake color (rgba 245,250,255)",
  "wind responsiveness (mw*1.2 factor)",
  "flake size range (1+z*2.6)",
  "sway amplitude (0.5*f.z multiplier)",
  "sky gradient colors (#243349 / #141d2a)"
 ],
 "preserveElements": [
  "DPR-aware canvas sizing and setTransform",
  "visibilitychange pause/resume",
  "prefers-reduced-motion guard (reduced drift path)"
 ],
 "knownLimitations": [
  "Background color hardcoded in CSS — must change #1a2433 and gradient stops together",
  "Flake count capped at 110 regardless of screen size",
  "Reduced-motion path still animates (slow drift) rather than fully static"
 ],
 "tier": "curated",
 "labels": [
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps",
  "agent-ready"
 ],
 "tags": [
  "snow",
  "particles",
  "canvas",
  "wind",
  "ambient",
  "nature",
  "winter"
 ]
}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div class="cap">Falling Snow</div>
<script>
const cv=document.getElementById('c'),x=cv.getContext('2d');
let W,H,DPR,raf,F=[],t=0,wind=0,mw=0;
const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
function size(){DPR=Math.min(devicePixelRatio||1,2);W=cv.clientWidth;H=cv.clientHeight;
  cv.width=W*DPR;cv.height=H*DPR;x.setTransform(DPR,0,0,DPR,0,0);build();}
function build(){F=[];const n=Math.min(110,Math.round(W*H/4200));
  for(let i=0;i<n;i++)F.push(mk(Math.random()*H));}
function mk(y){const z=Math.random();return{x:Math.random()*W,y,z,
  r:1+z*2.6,vy:(0.3+z*1.1),sw:Math.random()*7,sa:0.5+z*0.5};}
addEventListener('resize',size);size();
cv.addEventListener('pointermove',e=>{const r=cv.getBoundingClientRect();mw=((e.clientX-r.left)/W-0.5)*2;});
cv.addEventListener('pointerleave',()=>mw=0);
function frame(){
  t+=0.01;
  wind+=(Math.sin(t*0.6)*0.5+mw*1.2-wind)*0.05;
  const g=x.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#243349');g.addColorStop(1,'#141d2a');
  x.fillStyle=g;x.fillRect(0,0,W,H);
  for(const f of F){
    if(!reduce){
      f.y+=f.vy;
      f.x+=Math.sin(t*1.5+f.sw)*0.5*f.z + wind*f.z*1.4;
    }else{f.y+=0.2;}
    if(f.y>H+4){Object.assign(f,mk(-4));}
    if(f.x>W+4)f.x=-4;if(f.x<-4)f.x=W+4;
    x.fillStyle=`rgba(245,250,255,${f.sa})`;
    x.beginPath();x.arc(f.x,f.y,f.r,0,7);x.fill();
  }
  raf=requestAnimationFrame(frame);
}
raf=requestAnimationFrame(frame);
document.addEventListener('visibilitychange',()=>{
  if(document.hidden)cancelAnimationFrame(raf);else raf=requestAnimationFrame(frame);
});
</script>
</body>
</html>
