<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Puffy soft white clouds drift slowly across a bright blue daytime sky gradient with subtle undersides; pointer gently pushes them along.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Drifting Clouds</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#7fb6e0}
  #c{display:block;width:100%;height:100%}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-sans-serif,system-ui,sans-serif;
       letter-spacing:.08em;text-transform:uppercase;color:#ffffff;opacity:.45;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/organic-nature/08-drifting-clouds.html",
 "title": "Drifting Clouds",
 "description": "Puffy white clouds with radial-gradient puffs and soft blue undersides drift across a layered sky gradient; pointer nudges them forward.",
 "useWhen": "Calm ambient backgrounds, weather apps, nature or travel themes, daytime sky hero sections.",
 "avoidWhen": "Dark-mode UIs (sky gradient hardcoded light blue). Contexts requiring text legibility — clouds drift across foreground.",
 "agentPrompt": "Change cloud count to 10 by adjusting the divisor in Math.round(W/120), set base speed to 0.3 in mk(), and shift sky to a sunset palette by updating the three gradient color stops in frame().",
 "editableAreas": [
  "cloud count divisor (W/120)",
  "cloud speed base (0.12 + z*0.25)",
  "puff count per cloud (5 + random*3)",
  "sky gradient color stops",
  "pointer push strength (push+0.3)",
  "cloud y-spread range (0.15..0.75)"
 ],
 "preserveElements": [
  "DPR-aware canvas sizing + setTransform",
  "visibilitychange pause/resume",
  "prefers-reduced-motion guard (stops cloud movement)",
  "cloud wrap-around respawn logic"
 ],
 "knownLimitations": [
  "Sky and cloud colors hardcoded — dark-mode adaptation requires full palette swap",
  "Reduced-motion stops movement but still runs rAF loop drawing static clouds",
  "Pointer only accelerates clouds rightward — no directional influence"
 ],
 "tier": "curated",
 "labels": [
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps",
  "easy-to-modify"
 ],
 "tags": [
  "clouds",
  "sky",
  "canvas",
  "ambient",
  "nature",
  "background",
  "pointer"
 ]
}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div class="cap">Drifting Clouds</div>
<script>
const cv=document.getElementById('c'),x=cv.getContext('2d');
let W,H,DPR,raf,t=0,clouds=[],push=0;
const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
function size(){DPR=Math.min(devicePixelRatio||1,2);W=cv.clientWidth;H=cv.clientHeight;
  cv.width=W*DPR;cv.height=H*DPR;x.setTransform(DPR,0,0,DPR,0,0);build();}
function mk(xx){const z=0.4+Math.random()*0.6;
  return{x:xx,y:H*(0.15+Math.random()*0.6),s:z,sp:(0.12+z*0.25),
    puffs:Array.from({length:5+((Math.random()*3)|0)},()=>({dx:(Math.random()-0.5)*70,dy:(Math.random()-0.5)*22,r:18+Math.random()*26}))};}
function build(){clouds=[];const n=Math.min(7,Math.max(3,Math.round(W/120)));
  for(let i=0;i<n;i++)clouds.push(mk(Math.random()*W));
  clouds.sort((a,b)=>a.s-b.s);}
addEventListener('resize',size);size();
cv.addEventListener('pointermove',()=>push=Math.min(2,push+0.3));
function cloud(c){
  x.save();x.translate(c.x,c.y);x.scale(c.s,c.s);
  for(const p of c.puffs){
    const g=x.createRadialGradient(p.dx-p.r*0.3,p.dy-p.r*0.4,0,p.dx,p.dy,p.r);
    g.addColorStop(0,'rgba(255,255,255,0.95)');
    g.addColorStop(0.7,`rgba(240,248,255,0.85)`);
    g.addColorStop(1,'rgba(210,228,245,0)');
    x.fillStyle=g;x.beginPath();x.arc(p.dx,p.dy,p.r,0,7);x.fill();
  }
  // soft shadow underside
  x.fillStyle='rgba(150,180,210,0.18)';
  for(const p of c.puffs){x.beginPath();x.ellipse(p.dx,p.dy+p.r*0.4,p.r*0.8,p.r*0.4,0,0,7);x.fill();}
  x.restore();
}
function frame(){
  t+=0.005;
  if(push>0)push*=0.96;
  // sky
  const g=x.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#5d9fd6');g.addColorStop(0.6,'#9cc8ea');g.addColorStop(1,'#cfe6f5');
  x.fillStyle=g;x.fillRect(0,0,W,H);
  for(const c of clouds){
    if(!reduce)c.x+=(c.sp+push*c.s);
    if(c.x-130*c.s>W){c.x=-130*c.s;c.y=H*(0.15+Math.random()*0.6);}
    cloud(c);
  }
  raf=requestAnimationFrame(frame);
}
raf=requestAnimationFrame(frame);
document.addEventListener('visibilitychange',()=>{
  if(document.hidden)cancelAnimationFrame(raf);else raf=requestAnimationFrame(frame);
});
</script>
</body>
</html>
