<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Physarum slime-mold agents self-organize into glowing purple radial veins on dark ground, trails attract toward the cursor.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Slime Mold Network</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0c0a14;}
  #smn-c{display:block;width:100%;height:100%;}
  .smn-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1.2 ui-monospace,SFMono-Regular,Menlo,monospace;
       letter-spacing:.14em;color:#d9b3ff;opacity:.34;text-transform:uppercase;
       pointer-events:none;user-select:none;}
</style>
</head>
<body>
<canvas id="smn-c"></canvas>
<div class="smn-cap">Slime Mold Network</div>
<script>
(function(){
  const cv=document.getElementById('smn-c'),ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let W,H,DPR,GW,GH,trail,next,ag,N,img,buf,tc,tcx;
  const SCALE=2; // sim grid is canvas/SCALE for speed
  const SA=0.55,RA=0.42,SO=8,SS=1.1,DEP=22,DECAY=0.90,DIFF=0.16;
  let mx=-999,my=-999,mPow=0;

  function size(){
    DPR=Math.min(devicePixelRatio||1,2);
    W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(1,0,0,1,0,0);
    // cap sim-grid cell budget so the diffuse pass stays bounded on large screens
    const GMAX=240,asp=W/H;
    GW=Math.max(80,Math.min(GMAX,Math.round(W*DPR/SCALE)));GH=Math.max(80,Math.min(GMAX,Math.round(H*DPR/SCALE)));
    if(W*DPR/SCALE>GMAX||H*DPR/SCALE>GMAX){ // preserve aspect within the cap
      if(asp>=1){GW=GMAX;GH=Math.max(80,Math.round(GMAX/asp));}else{GH=GMAX;GW=Math.max(80,Math.round(GMAX*asp));}
    }
    trail=new Float32Array(GW*GH);next=new Float32Array(GW*GH);
    img=ctx.createImageData(GW,GH);buf=new Uint32Array(img.data.buffer);
    tc=tc||document.createElement('canvas');tc.width=GW;tc.height=GH;tcx=tc.getContext('2d');
    N=Math.min(6000,Math.round(GW*GH*0.18));ag=new Float32Array(N*3);
    // seed agents in a disc, headings outward → radial veins
    const ccx=GW/2,ccy=GH/2,rad=Math.min(GW,GH)*0.34;
    for(let i=0;i<N;i++){
      const a=Math.random()*6.2832,r=Math.sqrt(Math.random())*rad;
      ag[i*3]=ccx+Math.cos(a)*r;ag[i*3+1]=ccy+Math.sin(a)*r;
      ag[i*3+2]=a+Math.PI+(Math.random()-0.5);
    }
  }
  addEventListener('resize',size);size();

  function sample(x,y,h){
    let sx=x+Math.cos(h)*SO,sy=y+Math.sin(h)*SO;
    sx=((sx%GW)+GW)%GW;sy=((sy%GH)+GH)%GH;
    return trail[(sy|0)*GW+(sx|0)];
  }
  function step(){
    // sense + steer + move + deposit
    for(let i=0;i<N;i++){
      const o=i*3;let x=ag[o],y=ag[o+1],h=ag[o+2];
      const c=sample(x,y,h),l=sample(x,y,h-SA),r=sample(x,y,h+SA);
      if(c>l&&c>r){}
      else if(l>r)h-=RA*(0.5+Math.random()*0.5);
      else if(r>l)h+=RA*(0.5+Math.random()*0.5);
      else h+=(Math.random()-0.5)*RA;
      // attract to pointer
      if(mPow>0.01){
        const dx=mx-x,dy=my-y,d=Math.hypot(dx,dy);
        if(d<90&&d>1)h+=(((Math.atan2(dy,dx)-h+9.4248)%6.2832)-3.1416)*0.08*mPow;
      }
      x+=Math.cos(h)*SS;y+=Math.sin(h)*SS;
      if(x<0)x+=GW;else if(x>=GW)x-=GW;
      if(y<0)y+=GH;else if(y>=GH)y-=GH;
      ag[o]=x;ag[o+1]=y;ag[o+2]=h;
      const idx=(y|0)*GW+(x|0);trail[idx]=Math.min(255,trail[idx]+DEP);
    }
    // diffuse + decay (cheap 4-neighbour blur)
    for(let yy=1;yy<GH-1;yy++){
      let row=yy*GW;
      for(let xx=1;xx<GW-1;xx++){
        const i=row+xx;
        const v=trail[i]*(1-DIFF)+(trail[i-1]+trail[i+1]+trail[i-GW]+trail[i+GW])*(DIFF*0.25);
        next[i]=v*DECAY;
      }
    }
    const tmp=trail;trail=next;next=tmp;
    mPow*=0.95;
  }
  function paint(){
    for(let i=0,n=GW*GH;i<n;i++){
      let v=trail[i];if(v>255)v=255;
      const t=v/255;
      // 0c0a14 base → purple veins → bright accent cores
      const g=Math.pow(t,0.7);
      const r=12+g*205+(t>0.75?(t-0.75)*4*40:0);
      const gg=10+g*120+(t>0.8?(t-0.8)*5*90:0);
      const b=20+g*255;
      buf[i]=(255<<24)|((b>255?255:b)<<16)|((gg>255?255:gg)<<8)|(r>255?255:r);
    }
    // nearest-neighbour upscale to backing store
    ctx.save();
    tcx.putImageData(img,0,0);
    ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
    ctx.globalCompositeOperation='source-over';
    ctx.drawImage(tc,0,0,W*DPR,H*DPR);
    ctx.restore();
  }
  cv.addEventListener('pointermove',e=>{
    const r=cv.getBoundingClientRect();
    mx=(e.clientX-r.left)/W*GW;my=(e.clientY-r.top)/H*GH;mPow=1;
  });
  cv.addEventListener('pointerleave',()=>{mPow=0;});

  let raf=0;
  function frame(){step();paint();raf=requestAnimationFrame(frame);}
  function start(){if(!raf&&!reduce)raf=requestAnimationFrame(frame);}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>{document.hidden?stop():start();});
  if(reduce){for(let k=0;k<240;k++)step();paint();}else start();
})();
</script>
</body>
</html>
