<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Dandelion seedhead of golden-angle pappus parachutes releases cream filaments one by one to drift on a turbulent breeze, then regrows.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Seedhead Dispersal</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#101622;}
  #sd-c{display:block;width:100%;height:100%;}
  .sd-cap{position:fixed;left:9px;bottom:8px;font:600 10px/1.2 ui-monospace,SFMono-Regular,Menlo,monospace;
       letter-spacing:.16em;color:#e8d9b0;opacity:.34;text-transform:uppercase;
       pointer-events:none;user-select:none;}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/organic-nature/20-seedhead-dispersal.html",
 "title": "Seedhead Dispersal",
 "description": "150 dandelion seeds on a golden-angle spiral drift off one by one on a noise-field breeze; the receptacle slowly glows bare. Click triggers a gust.",
 "useWhen": "Nature or botanical hero backgrounds, ambient screensaver loops, organic brand aesthetics.",
 "avoidWhen": "Content-heavy layouts where continuous drift competes with reading. Low-end devices sensitive to per-frame canvas redraws.",
 "agentPrompt": "Change seed count to 80 by setting N=80, shift pappus color to pale lavender (#d8d0e8), slow release interval from 26 to 40 frames.",
 "editableAreas": [
  "seed count (N=150)",
  "release interval (timer>26)",
  "pappus filament color (#e8d9b0)",
  "background color (#101622)",
  "gust strength on click (gust=1.6)",
  "breeze noise intensity (nz*0.10)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard with static fallback frame",
  "visibilitychange pause/resume",
  "golden angle seed placement (GA constant)"
 ],
 "knownLimitations": [
  "pointermove also sets gust=1 so hovering accelerates dispersal on desktop",
  "Seeds that fly offscreen mark attached=2 but are not freed until full reset cycle",
  "Stem position is hardcoded relative to cx/cy and not configurable"
 ],
 "tier": "curated",
 "labels": [
  "accessible",
  "mobile-ready",
  "copy-paste-safe",
  "minimal-deps",
  "agent-ready"
 ],
 "tags": [
  "dandelion",
  "nature",
  "particles",
  "generative",
  "ambient",
  "canvas",
  "organic"
 ]
}
</script>
</head>
<body>
<canvas id="sd-c"></canvas>
<div class="sd-cap">Seedhead Dispersal</div>
<script>
(function(){
  const cv=document.getElementById('sd-c'),ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const GA=Math.PI*(3-Math.sqrt(5)); // golden angle
  let W,H,DPR,cx,cy,R,raf=0,t=0,gust=0;
  function size(){
    DPR=Math.min(devicePixelRatio||1,2);
    W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
    cx=W*0.42;cy=H*0.56;R=Math.min(W,H)*0.30;
  }
  addEventListener('resize',size);size();

  // pappus filaments arranged on the receptacle by golden angle
  const N=150,seeds=[];
  for(let i=0;i<N;i++){
    const f=i/N, rr=Math.sqrt(f)*R, a=i*GA;
    seeds.push({a,rr,base:i*0.013, attached:1, // 1=on head, 0..1=releasing, then flying
      x:0,y:0,vx:0,vy:0,phase:Math.random()*6.28,spin:Math.random()*6.28,
      drift:(Math.random()-0.5)*0.8, life:0});
  }
  let next=0,timer=0;

  // soft 2-octave noise field for the breeze
  function noise(x,y){
    return Math.sin(x*1.3+y*0.7)*0.6 + Math.sin(x*0.5-y*1.1+1.7)*0.4;
  }

  function pappus(x,y,sz,al,rot){ // a parachute of fine filaments
    ctx.globalAlpha=al;ctx.strokeStyle='#e8d9b0';ctx.lineWidth=Math.max(0.4,sz*0.05);
    for(let k=0;k<11;k++){
      const ang=rot+(k/11)*Math.PI*2, len=sz*(0.78+0.22*Math.sin(k*2.1));
      const ex=x+Math.cos(ang)*len, ey=y+Math.sin(ang)*len;
      ctx.beginPath();ctx.moveTo(x,y);
      ctx.quadraticCurveTo(x+Math.cos(ang)*len*0.5, y+Math.sin(ang)*len*0.5-sz*0.18, ex,ey);
      ctx.stroke();
    }
    ctx.globalAlpha=al*0.9;ctx.fillStyle='#fff4d8';
    ctx.beginPath();ctx.arc(x,y,Math.max(0.6,sz*0.10),0,6.283);ctx.fill();
  }

  function frame(){
    t+=reduce?0:0.016;
    gust*=0.95;
    ctx.fillStyle='rgba(16,22,34,0.20)';ctx.fillRect(0,0,W,H);

    // bald receptacle revealed beneath, glowing softly
    const detached=seeds.filter(s=>s.attached<1).length;
    const reveal=detached/N;
    const g=ctx.createRadialGradient(cx,cy,2,cx,cy,R*0.62);
    g.addColorStop(0,'rgba(232,217,176,'+(0.10+reveal*0.22)+')');
    g.addColorStop(0.55,'rgba(150,138,108,'+(0.05+reveal*0.10)+')');
    g.addColorStop(1,'rgba(16,22,34,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,R*0.62,0,6.283);ctx.fill();
    // stem
    ctx.strokeStyle='rgba(232,217,176,0.16)';ctx.lineWidth=Math.max(1,R*0.018);
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.quadraticCurveTo(cx-R*0.10,cy+R*1.4,cx-R*0.04,H+10);ctx.stroke();

    // release one seed at a time on the breeze
    timer+=reduce?0:1;
    if(!reduce && timer>26 && next<N){ seeds[next].attached=0.001; next++; timer=0; }
    if(next>=N && detached>=N-1){ // reset cycle, regrow head
      for(const s of seeds){ s.attached=1; s.life=0; }
      next=0;
    }

    for(const s of seeds){
      if(s.attached>=1){
        // resting on the seedhead — gentle quiver
        const q=reduce?0:Math.sin(t*1.6+s.phase)*0.6;
        const x=cx+Math.cos(s.a)*s.rr+q, y=cy+Math.sin(s.a)*s.rr*0.62+q*0.5;
        // attach filament line to centre (the seed shaft)
        ctx.globalAlpha=0.22;ctx.strokeStyle='#e8d9b0';ctx.lineWidth=0.5;
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x,y);ctx.stroke();
        pappus(x,y,Math.max(2.4,R*0.075),0.55,s.base+t*0.1);
      } else {
        // flying — curling drift on turbulent breeze
        s.life+=reduce?0:0.016;
        if(s.x===0&&s.y===0){ s.x=cx+Math.cos(s.a)*s.rr; s.y=cy+Math.sin(s.a)*s.rr*0.62; }
        const nz=noise(s.x*0.012+t*0.3, s.y*0.012);
        s.vx+=(0.18+gust*0.5)+nz*0.10+s.drift*0.04;
        s.vy+=-0.14 - Math.abs(nz)*0.05 + Math.sin(t*0.8+s.phase)*0.02;
        s.vx*=0.97;s.vy*=0.97;
        s.x+=s.vx;s.y+=s.vy;s.spin+=0.02+s.drift*0.01;
        const al=Math.max(0,1-s.life*0.10);
        if(al<=0.02||s.x>W+30||s.y<-30){ s.attached=2; continue; } // gone
        pappus(s.x,s.y,Math.max(2.4,R*0.075),al*0.9,s.spin);
      }
    }
    ctx.globalAlpha=1;
    if(!reduce) raf=requestAnimationFrame(frame);
  }

  cv.addEventListener('pointermove',()=>{ gust=1; });
  cv.addEventListener('click',()=>{ // a stronger puff releases several
    gust=1.6;
    for(let k=0;k<6&&next<N;k++){ seeds[next].attached=0.001; next++; }
  });

  function start(){ if(!raf&&!reduce) raf=requestAnimationFrame(frame); }
  function stop(){ cancelAnimationFrame(raf); raf=0; }
  document.addEventListener('visibilitychange',()=>{document.hidden?stop():start();});

  if(reduce){
    // single resting frame: full intact seedhead
    ctx.fillStyle='#101622';ctx.fillRect(0,0,W,H);
    const g=ctx.createRadialGradient(cx,cy,2,cx,cy,R*0.62);
    g.addColorStop(0,'rgba(232,217,176,0.12)');g.addColorStop(1,'rgba(16,22,34,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,R*0.62,0,6.283);ctx.fill();
    ctx.strokeStyle='rgba(232,217,176,0.16)';ctx.lineWidth=Math.max(1,R*0.018);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.quadraticCurveTo(cx-R*0.10,cy+R*1.4,cx-R*0.04,H+10);ctx.stroke();
    for(const s of seeds){
      const x=cx+Math.cos(s.a)*s.rr, y=cy+Math.sin(s.a)*s.rr*0.62;
      ctx.globalAlpha=0.22;ctx.strokeStyle='#e8d9b0';ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x,y);ctx.stroke();
      pappus(x,y,Math.max(2.4,R*0.075),0.55,s.base);
    }
    ctx.globalAlpha=1;
  } else start();
})();
</script>
</body>
</html>
