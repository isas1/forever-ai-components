<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Radial bursts of colorful glowing sparks explode, fall under gravity and fade against a near-black sky, with extra bursts on click.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Firework Burst</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#06060f}
  #c{display:block;width:100%;height:100%}
  .cap{position:fixed;right:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:#ffd76b;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="cap">Firework Burst</div>
<script>
const cv=document.getElementById('c'),x=cv.getContext('2d');
let W,H,DPR,parts=[],t=0,nextLaunch=0,reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
const hues=[10,45,200,280,330,140];
function size(){DPR=Math.min(2,devicePixelRatio||1);W=cv.clientWidth;H=cv.clientHeight;
  cv.width=W*DPR;cv.height=H*DPR;x.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',size);size();
function burst(cx,cy){
  const hue=hues[(Math.random()*hues.length)|0],n=28+(Math.random()*16|0);
  for(let i=0;i<n;i++){const a=(i/n)*6.283+Math.random()*0.2,sp=1+Math.random()*2.6;
    parts.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,
      hue:hue+(Math.random()*30-15),r:1+Math.random()*1.6});}
}
cv.addEventListener('pointerdown',e=>{const r=cv.getBoundingClientRect();burst(e.clientX-r.left,e.clientY-r.top);});
function step(){
  x.fillStyle='rgba(6,6,15,0.22)';x.fillRect(0,0,W,H);
  t++;
  if(t>nextLaunch&&parts.length<110){nextLaunch=t+30+(Math.random()*40|0);
    burst(W*(0.25+Math.random()*0.5),H*(0.2+Math.random()*0.45));}
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];
    p.vy+=0.035;p.vx*=0.985;p.vy*=0.985;p.x+=p.vx;p.y+=p.vy;p.life-=0.014;
    if(p.life<=0){parts.splice(i,1);continue;}
    x.globalAlpha=Math.max(0,p.life);
    x.fillStyle='hsl('+p.hue+',95%,'+(55+p.life*15)+'%)';
    x.beginPath();x.arc(p.x,p.y,p.r*p.life+0.4,0,7);x.fill();
  }
  x.globalAlpha=1;
}
let raf;function loop(){step();raf=requestAnimationFrame(loop);}
function play(){if(!raf&&!document.hidden){if(reduce){burst(W/2,H/2);step();return;}loop();}}
function stop(){cancelAnimationFrame(raf);raf=0;}
document.addEventListener('visibilitychange',()=>document.hidden?stop():play());
play();
</script>
</body>
</html>
