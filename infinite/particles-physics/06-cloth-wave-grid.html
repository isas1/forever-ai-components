<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A 10x10 wireframe mesh ripples like cloth in cyan-to-violet hues, bulging away from the cursor on a dark teal field.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cloth Wave Grid</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#071018}
  #c{display:block;width:100%;height:100%}
  .cap{position:fixed;right:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:#7dd3fc;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="cap">Cloth Wave Grid</div>
<script>
const cv=document.getElementById('c'),x=cv.getContext('2d');
let W,H,DPR,t=0,reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
const COLS=10,ROWS=10;
function size(){DPR=Math.min(2,devicePixelRatio||1);W=cv.clientWidth;H=cv.clientHeight;
  cv.width=W*DPR;cv.height=H*DPR;x.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',size);size();
let pointer={x:-999,y:-999};
cv.addEventListener('pointermove',e=>{const r=cv.getBoundingClientRect();pointer.x=e.clientX-r.left;pointer.y=e.clientY-r.top;});
cv.addEventListener('pointerleave',()=>{pointer.x=-999;pointer.y=-999;});
function step(){
  x.clearRect(0,0,W,H);t+=0.03;
  const mx=W*0.1,my=H*0.1,gw=W*0.8,gh=H*0.8;
  const pts=[];
  for(let r=0;r<=ROWS;r++){pts[r]=[];for(let c=0;c<=COLS;c++){
    let px=mx+c/COLS*gw, py=my+r/ROWS*gh;
    const wave=Math.sin(c*0.6+t)*6 + Math.cos(r*0.5+t*1.3)*6;
    py+=wave;px+=Math.sin(r*0.5+t)*4;
    const dx=px-pointer.x,dy=py-pointer.y,dd=Math.hypot(dx,dy);
    if(dd<60){const f=(60-dd)/60*16;px+=dx/(dd||1)*f;py+=dy/(dd||1)*f;}
    pts[r][c]={x:px,y:py};}}
  for(let r=0;r<=ROWS;r++)for(let c=0;c<=COLS;c++){const p=pts[r][c];
    const h=190+c*7+r*3;x.strokeStyle='hsla('+h+',80%,62%,0.5)';x.lineWidth=1;
    if(c<COLS){x.beginPath();x.moveTo(p.x,p.y);x.lineTo(pts[r][c+1].x,pts[r][c+1].y);x.stroke();}
    if(r<ROWS){x.beginPath();x.moveTo(p.x,p.y);x.lineTo(pts[r+1][c].x,pts[r+1][c].y);x.stroke();}}
  for(let r=0;r<=ROWS;r++)for(let c=0;c<=COLS;c++){const p=pts[r][c];
    x.fillStyle='hsl('+(190+c*7+r*3)+',90%,70%)';
    x.beginPath();x.arc(p.x,p.y,1.5,0,7);x.fill();}
}
let raf;function loop(){step();raf=requestAnimationFrame(loop);}
function play(){if(!raf&&!document.hidden){if(reduce){step();return;}loop();}}
function stop(){cancelAnimationFrame(raf);raf=0;}
document.addEventListener('visibilitychange',()=>document.hidden?stop():play());
play();
</script>
</body>
</html>
