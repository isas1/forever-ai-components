<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Rainbow particle sparks emit and arc off a cursor (auto-orbits when idle) on near-black, fading into a glowing trail.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pointer Trail</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#05060c}
  #c{display:block;width:100%;height:100%}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:#67e8f9;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="cap">Pointer Trail</div>
<script>
const cv=document.getElementById('c'),x=cv.getContext('2d');
let W,H,DPR,parts=[],t=0,reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
let pos={x:0,y:0},auto=true;
function size(){DPR=Math.min(2,devicePixelRatio||1);W=cv.clientWidth;H=cv.clientHeight;
  cv.width=W*DPR;cv.height=H*DPR;x.setTransform(DPR,0,0,DPR,0,0);pos.x=W/2;pos.y=H/2;}
addEventListener('resize',size);size();
cv.addEventListener('pointermove',e=>{const r=cv.getBoundingClientRect();
  pos.x=e.clientX-r.left;pos.y=e.clientY-r.top;auto=false;});
cv.addEventListener('pointerleave',()=>auto=true);
let last={x:W/2,y:H/2};
function emit(px,py,vx,vy){
  const sp=Math.hypot(vx,vy),count=Math.min(4,1+(sp/6|0));
  for(let i=0;i<count&&parts.length<110;i++)
    parts.push({x:px,y:py,vx:vx*0.15+(Math.random()-0.5)*1.2,
      vy:vy*0.15+(Math.random()-0.5)*1.2,life:1,
      r:1.5+Math.random()*2.5,h:(t*40+i*30)%360});
}
function step(){
  x.fillStyle='rgba(5,6,12,0.18)';x.fillRect(0,0,W,H);t+=0.02;
  let tx,ty;
  if(auto){tx=W/2+Math.cos(t*1.1)*W*0.32+Math.cos(t*2.3)*W*0.1;
    ty=H/2+Math.sin(t*1.5)*H*0.32+Math.sin(t*3.1)*H*0.08;}
  else{tx=pos.x;ty=pos.y;}
  const vx=tx-last.x,vy=ty-last.y;
  emit(tx,ty,vx,vy);last.x=tx;last.y=ty;
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.02;p.vx*=0.96;p.vy*=0.96;p.life-=0.022;
    if(p.life<=0){parts.splice(i,1);continue;}
    x.globalAlpha=p.life;x.fillStyle='hsl('+p.h+',95%,'+(60+p.life*15)+'%)';
    x.beginPath();x.arc(p.x,p.y,p.r*p.life+0.4,0,7);x.fill();}
  x.globalAlpha=1;
}
let raf;function loop(){step();raf=requestAnimationFrame(loop);}
function play(){if(!raf&&!document.hidden){if(reduce){step();return;}loop();}}
function stop(){cancelAnimationFrame(raf);raf=0;}
document.addEventListener('visibilitychange',()=>document.hidden?stop():play());
play();
</script>
</body>
</html>
