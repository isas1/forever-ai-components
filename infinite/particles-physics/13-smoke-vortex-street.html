<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Teal smoke streamlines flow past an invisible cylinder, shedding alternating vortices in a Karman street; pointer disturbs the flow.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smoke Vortex Street</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0a1416;}
  #svs-c{display:block;width:100%;height:100%;}
  .cap{position:fixed;left:9px;bottom:8px;font:600 10px/1.2 ui-monospace,SFMono-Regular,Menlo,monospace;
       letter-spacing:.13em;color:#5fd0c4;opacity:.34;text-transform:uppercase;
       pointer-events:none;user-select:none;}
</style>
</head>
<body>
<canvas id="svs-c"></canvas>
<div class="cap">Smoke Vortex Street</div>
<script>
(function(){
  const cv=document.getElementById('svs-c'),ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let W,H,DPR,oX,oY,oR,sc;
  function size(){
    DPR=Math.min(devicePixelRatio||1,2);
    W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
    sc=Math.min(W,H);oR=sc*0.07;oX=W*0.30;oY=H*0.5;
  }
  addEventListener('resize',size);size();

  // vortex street: alternating discrete eddies shed from the obstacle, drifting downstream
  const ED=14,eddies=[];
  function seedEddy(e,phase){
    e.x=oX; e.y=oY+(phase?1:-1)*oR*0.85; e.s=(phase?1:-1); // spin sign alternates
    e.born=t; e.life=0; e.k=0.9+Math.random()*0.3; if(e.fade==null)e.fade=0;
  }
  let t=0;
  for(let i=0;i<ED;i++){eddies.push({});seedEddy(eddies[i],i%2); eddies[i].x=oX+i*(W*0.06); eddies[i].born=-i*40;}

  const N=reduce?260:300,P=[];
  for(let i=0;i<N;i++)P.push({x:Math.random()*W,y:Math.random()*H,h:0});

  let mx=-1,my=-1,nudge=0;
  cv.addEventListener('pointermove',e=>{const r=cv.getBoundingClientRect();mx=e.clientX-r.left;my=e.clientY-r.top;nudge=1;});
  cv.addEventListener('pointerleave',()=>{mx=-1;});

  // smooth curl-ish background flow + obstacle deflection + eddy rotation
  function flow(x,y,vx,out){
    let u=vx, v=0;
    // breathing ripple, lazy left->right
    const ph=t*0.012;
    v += Math.sin(x*0.010+ph)*0.18*vx + Math.cos(y*0.013-ph*1.3)*0.12*vx;
    u += Math.sin(y*0.011+ph*0.7)*0.10*vx;
    // obstacle: push flow around the cylinder
    const dx=x-oX,dy=y-oY,d2=dx*dx+dy*dy,r2=oR*oR;
    if(d2<r2*9){
      const d=Math.sqrt(d2)+1e-3, str=r2/(d2+r2*0.3);
      u += (dx/d)*str*vx*0.9; v += (dy/d)*str*vx*0.9;
    }
    // eddies: tangential swirl
    for(let i=0;i<ED;i++){
      const e=eddies[i];
      if(e.fade<0.01)continue;           // dormant eddy contributes nothing
      const ex=x-e.x,ey=y-e.y,ed2=ex*ex+ey*ey;
      const rad=oR*1.9*e.k, rr=rad*rad;
      if(ed2<rr*4){
        const fall=Math.exp(-ed2/rr), w=e.s*fall*vx*1.35*e.fade;
        u += -ey*w/rad; v += ex*w/rad;
      }
    }
    out[0]=u;out[1]=v;
  }

  const buf=[0,0];
  function frame(){
    t+=reduce?0:1;
    ctx.fillStyle='rgba(10,20,22,0.13)';ctx.fillRect(0,0,W,H);
    const vx=sc*0.0016*(1+nudge*0.5);nudge*=0.95;

    // shed an alternating eddy on a steady period (Strouhal-like cadence)
    if(!reduce){
      const period=58;
      if(t%period===0){
        // recycle the eddy that's drifted farthest right
        let far=0;for(let i=1;i<ED;i++)if(eddies[i].x>eddies[far].x)far=i;
        seedEddy(eddies[far],(t/period)%2);
      }
    }
    for(let i=0;i<ED;i++){
      const e=eddies[i];
      if(!reduce){e.x+=vx*1.0;e.y+=Math.sin((e.x-oX)*0.02)*0.15;}
      // ramp in as it leaves the obstacle, fade out near the right edge
      const grow=Math.max(0,Math.min(1,(e.x-oX)/(oR*5)));
      const decay=Math.max(0,1-Math.max(0,e.x-W*0.92)/(W*0.12));
      e.fade=grow*decay;
    }

    ctx.lineCap='round';
    for(let i=0;i<N;i++){
      const p=P[i];
      flow(p.x,p.y,vx,buf);
      let u=buf[0],v=buf[1];
      if(mx>=0){const dx=p.x-mx,dy=p.y-my,dd=dx*dx+dy*dy;if(dd<sc*sc*0.02){const f=sc*0.0009/(dd*0.0006+1);u+=dx*f;v+=dy*f;}}
      const nx=p.x+u, ny=p.y+v;
      const speed=Math.hypot(u,v);
      p.h=p.h*0.9+speed*0.1;
      const heat=Math.min(1,p.h/(vx*2.2));
      // teal smoke -> brighter accent in fast swirls
      const a=0.10+heat*0.5;
      ctx.strokeStyle='rgba('+(40+heat*70|0)+','+(150+heat*60|0)+','+(150+heat*40|0)+','+a+')';
      ctx.lineWidth=(0.5+heat*1.1);
      ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(nx,ny);ctx.stroke();
      p.x=nx;p.y=ny;
      // wrap: recycle off the right / strays, re-emit from the left band
      if(p.x>W+4||p.y<-4||p.y>H+4||p.x<-4){p.x=-3;p.y=Math.random()*H;p.h=0;}
    }

    // faint obstacle marker (invisible cylinder, just a whisper)
    const g=ctx.createRadialGradient(oX,oY,oR*0.2,oX,oY,oR*1.3);
    g.addColorStop(0,'rgba(95,208,196,0.10)');g.addColorStop(1,'rgba(95,208,196,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(oX,oY,oR*1.3,0,Math.PI*2);ctx.fill();

    if(!reduce)raf=requestAnimationFrame(frame);
  }
  let raf=0;
  function start(){if(!raf&&!reduce)raf=requestAnimationFrame(frame);}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>{document.hidden?stop():start();});
  if(reduce){ctx.fillStyle='#0a1416';ctx.fillRect(0,0,W,H);for(let k=0;k<160;k++)frame();}else start();
})();
</script>
</body>
</html>
