<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Hundreds of hot-pink particles trace a slowly rotating Aizawa strange attractor in 3D, glowing where fast; pointer spins and boosts.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Strange Attractor Swarm</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#120010;}
  #sas-c{display:block;width:100%;height:100%;}
  .sas-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1.2 ui-monospace,Menlo,Consolas,monospace;
       letter-spacing:.14em;color:#ff5fa0;opacity:.36;text-transform:uppercase;
       pointer-events:none;user-select:none;}
</style>
</head>
<body>
<canvas id="sas-c"></canvas>
<div class="sas-cap">Strange Attractor Swarm</div>
<script>
(function(){
  const cv=document.getElementById('sas-c'),ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let W,H,DPR,cx,cy,scale;
  function size(){
    DPR=Math.min(devicePixelRatio||1,2);
    W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
    cx=W/2;cy=H/2;scale=Math.min(W,H)/4.4;
  }
  addEventListener('resize',size);size();

  // Aizawa attractor params — a folded two-lobed flow that never self-crosses.
  const A=0.95,B=0.7,C=0.6,D=3.5,E=0.25,F=0.1,DT=0.0085;
  function vel(p){
    const x=p.x,y=p.y,z=p.z;
    return {
      x:(z-B)*x - D*y,
      y:D*x + (z-B)*y,
      z:C + A*z - z*z*z/3 - (x*x+y*y)*(1+E*z) + F*z*x*x*x
    };
  }
  const N=reduce?900:560,P=[];
  function seed(p){ // scatter near the attractor basin
    p.x=(Math.random()-0.5)*2; p.y=(Math.random()-0.5)*2; p.z=Math.random()*1.4;
    p.life=Math.random()*240|0;
  }
  for(let i=0;i<N;i++){const p={};seed(p);P.push(p);}

  let rot=0.5,boost=0,pull=0;
  cv.addEventListener('pointermove',e=>{boost=1;pull=(e.offsetX/W-0.5)*1.4;});
  cv.addEventListener('click',()=>{boost=1.6;});

  function project(p,sr,cr){
    // rotate about vertical axis, tilt slightly, perspective for depth glow
    const rx=p.x*cr - p.y*sr, ry=p.x*sr + p.y*cr;
    const tz=ry*0.42 + p.z*0.91, ty=ry*0.91 - p.z*0.42;
    const persp=1.7/(1.7+tz+1.3);
    return {sx:cx+rx*scale*persp, sy:cy - ty*scale*persp + scale*0.15, d:persp};
  }

  function frame(){
    ctx.fillStyle='rgba(18,0,16,0.16)';ctx.fillRect(0,0,W,H);
    boost*=0.93; pull*=0.9;
    if(!reduce) rot+=0.0016+pull*0.004;
    const sr=Math.sin(rot),cr=Math.cos(rot);
    const steps=reduce?1:(2+(boost>0.05?2:0));
    ctx.globalCompositeOperation='lighter';
    for(let i=0;i<N;i++){
      const p=P[i];
      for(let s=0;s<steps;s++){
        const v=vel(p);
        p.x+=v.x*DT; p.y+=v.y*DT; p.z+=v.z*DT;
        p.life++;
      }
      if(p.life>520||Math.abs(p.x)>3||Math.abs(p.z)>3) seed(p);
      const q=project(p,sr,cr);
      const spd=Math.min(1,(p.x*p.x+p.y*p.y)*0.18);   // speed → hue toward white/hot pink
      const a=(0.10+q.d*0.5);
      const r=(0.5+q.d*1.7);
      // colour ramp: deep magenta dust → hot pink → near-white crest
      const cr2=255, cg= 95 + spd*120, cb=160 - spd*40;
      ctx.fillStyle='rgba('+cr2+','+(cg|0)+','+(cb|0)+','+(a*(0.55+spd*0.6)).toFixed(3)+')';
      ctx.beginPath();ctx.arc(q.sx,q.sy,r,0,6.2832);ctx.fill();
    }
    ctx.globalCompositeOperation='source-over';
    raf=requestAnimationFrame(frame);
  }
  let raf=0;
  function start(){if(!raf&&!reduce)raf=requestAnimationFrame(frame);}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>{document.hidden?stop():start();});
  if(reduce){
    ctx.fillStyle='#120010';ctx.fillRect(0,0,W,H);
    // settle the swarm onto the attractor, then draw one static frame
    for(let w=0;w<700;w++)for(let i=0;i<N;i++){const p=P[i],v=vel(p);p.x+=v.x*DT;p.y+=v.y*DT;p.z+=v.z*DT;if(Math.abs(p.x)>3)seed(p);}
    const sr=Math.sin(rot),cr=Math.cos(rot);
    ctx.globalCompositeOperation='lighter';
    for(let i=0;i<N;i++){const p=P[i],q=project(p,sr,cr);const spd=Math.min(1,(p.x*p.x+p.y*p.y)*0.18);
      ctx.fillStyle='rgba(255,'+((95+spd*120)|0)+','+((160-spd*40)|0)+','+(0.18+q.d*0.5).toFixed(3)+')';
      ctx.beginPath();ctx.arc(q.sx,q.sy,(0.5+q.d*1.7),0,6.2832);ctx.fill();}
    ctx.globalCompositeOperation='source-over';
  } else start();
})();
</script>
</body>
</html>
