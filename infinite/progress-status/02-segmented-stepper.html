<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A four-step circular stepper fills connector segments and stamps checkmarks as it advances through Account, Profile, Verify, Done.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Segmented Stepper</title>
<style>
  :root{
    --pg02-bg:#0b0d12;
    --pg02-accent:#7c5cff;
    --pg02-accent2:#22d3a6;
    --pg02-track:#1b1f2b;
    --pg02-ink:#e8eaf2;
    --pg02-dim:#5a6075;
  }
  html,body{height:100%;margin:0}
  .pg02-stage{
    position:fixed;inset:0;background:var(--pg02-bg);
    display:grid;place-items:center;
    font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    overflow:hidden;
  }
  /* faint Bauhaus structural grid, static, never repaints */
  .pg02-grid{
    position:absolute;inset:0;opacity:.05;
    background:
      linear-gradient(var(--pg02-ink) 1px,transparent 1px) 0 0/100% 14.2857%,
      linear-gradient(90deg,var(--pg02-ink) 1px,transparent 1px) 0 0/14.2857% 100%;
  }
  .pg02-wrap{position:relative;width:78%;max-width:520px}
  .pg02-row{display:flex;align-items:flex-start;gap:0}
  .pg02-step{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;width:14%}
  .pg02-node{
    position:relative;width:clamp(26px,7vw,40px);height:clamp(26px,7vw,40px);
    border-radius:50%;display:grid;place-items:center;
    background:var(--pg02-track);
    box-shadow:inset 0 0 0 2px #2a3042;
    transform:scale(.86);transition:transform .45s cubic-bezier(.34,1.56,.64,1);
    will-change:transform;
  }
  .pg02-node.pg02-active{transform:scale(1.04)}
  .pg02-node.pg02-done{
    background:var(--pg02-accent);
    box-shadow:inset 0 0 0 2px var(--pg02-accent),0 0 0 6px rgba(124,92,255,.14);
    transform:scale(1)
  }
  .pg02-node.pg02-active:not(.pg02-done){
    box-shadow:inset 0 0 0 2px var(--pg02-accent),0 0 0 6px rgba(124,92,255,.10);
  }
  .pg02-num{
    font:700 13px/1 ui-monospace,Menlo,monospace;color:var(--pg02-dim);
    transition:opacity .25s;
  }
  .pg02-done .pg02-num{opacity:0}
  /* SVG check, drawn via stroke-dashoffset (transform-equivalent paint-once, cheap) */
  .pg02-check{position:absolute;width:54%;height:54%;overflow:visible}
  .pg02-check path{
    fill:none;stroke:#0b0d12;stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:22;stroke-dashoffset:22;
  }
  .pg02-done .pg02-check path{animation:pg02-draw .4s .08s cubic-bezier(.65,0,.35,1) forwards}
  @keyframes pg02-draw{to{stroke-dashoffset:0}}
  /* connector segments */
  .pg02-seg{flex:1 1 auto;height:clamp(26px,7vw,40px);display:flex;align-items:center;min-width:8px}
  .pg02-seg-track{position:relative;width:100%;height:4px;border-radius:2px;background:var(--pg02-track);overflow:hidden}
  .pg02-seg-fill{
    position:absolute;inset:0;border-radius:2px;
    background:linear-gradient(90deg,var(--pg02-accent),var(--pg02-accent2));
    transform-origin:left center;transform:scaleX(0);
    transition:transform .5s cubic-bezier(.65,0,.35,1);will-change:transform;
  }
  .pg02-labels{display:flex;justify-content:space-between;margin-top:14px}
  .pg02-label{
    width:14%;text-align:center;font:600 10px/1.3 ui-sans-serif,system-ui,sans-serif;
    color:var(--pg02-dim);letter-spacing:.04em;transition:color .3s;
  }
  .pg02-label.pg02-on{color:var(--pg02-ink)}
  .pg02-meta{
    margin-top:22px;display:flex;justify-content:space-between;align-items:baseline;
    font:600 11px/1 ui-monospace,Menlo,monospace;color:var(--pg02-dim);letter-spacing:.06em;
  }
  .pg02-pct{color:var(--pg02-ink);font-size:13px}
  .pg02-bar{margin-top:8px;height:3px;border-radius:2px;background:var(--pg02-track);overflow:hidden}
  .pg02-bar-fill{
    height:100%;border-radius:2px;background:var(--pg02-accent);
    transform-origin:left;transform:scaleX(0);transition:transform .5s cubic-bezier(.65,0,.35,1);
  }
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/progress-status/02-segmented-stepper.html",
 "title": "Segmented Stepper",
 "description": "Four-step circular stepper auto-advances, filling connector segments with a purple-to-teal gradient and stamping SVG checkmarks as each step completes.",
 "useWhen": "Onboarding flows, multi-step form demos, or progress indicators on dark-themed dashboards where ambient motion is welcome.",
 "avoidWhen": "Production use without wiring a real step controller — remove the auto-cycle loop and drive render() from actual form state.",
 "agentPrompt": "Change the step labels to ['Cart','Payment','Review','Confirm'], set --pg02-accent to #f97316, and increase the hold time between steps to 1800ms by editing holdUntil=now+1000.",
 "editableAreas": [

  "accent color (--pg02-accent, --pg02-accent2)",

 ],

</head>
<body>
  <div class="pg02-stage">
    <div class="pg02-grid" aria-hidden="true"></div>
    <div class="pg02-wrap"
         id="pg02-bar-root"
         role="progressbar"
         aria-label="Setup progress, four steps"
         aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div class="pg02-row" id="pg02-row" aria-hidden="true"></div>
      <div class="pg02-labels" id="pg02-labels" aria-hidden="true"></div>
      <div class="pg02-meta">
        <span id="pg02-stage-name">Account</span>
        <span class="pg02-pct" id="pg02-pct">0%</span>
      </div>
      <div class="pg02-bar" aria-hidden="true"><div class="pg02-bar-fill" id="pg02-overall"></div></div>
    </div>
  </div>
  <div class="cap">Segmented Stepper</div>

<script>
(function(){
  var STEPS=['Account','Profile','Verify','Done'];
  var row=document.getElementById('pg02-row');
  var labelsEl=document.getElementById('pg02-labels');
  var nodes=[],segFills=[],labels=[];
  var CHECK='M5 13 L10 18 L19 6';

  for(var i=0;i<STEPS.length;i++){
    var step=document.createElement('div');step.className='pg02-step';
    var node=document.createElement('div');node.className='pg02-node';
    var num=document.createElement('span');num.className='pg02-num';num.textContent=(i+1);
    node.appendChild(num);
    var ns='http://www.w3.org/2000/svg';
    var svg=document.createElementNS(ns,'svg');svg.setAttribute('class','pg02-check');
    svg.setAttribute('viewBox','0 0 24 24');
    var p=document.createElementNS(ns,'path');p.setAttribute('d',CHECK);
    svg.appendChild(p);node.appendChild(svg);
    step.appendChild(node);row.appendChild(step);nodes.push(node);

    var lab=document.createElement('div');lab.className='pg02-label';lab.textContent=STEPS[i];
    labelsEl.appendChild(lab);labels.push(lab);

    if(i<STEPS.length-1){
      var seg=document.createElement('div');seg.className='pg02-seg';
      var t=document.createElement('div');t.className='pg02-seg-track';
      var f=document.createElement('div');f.className='pg02-seg-fill';
      t.appendChild(f);seg.appendChild(t);row.appendChild(seg);segFills.push(f);
    }
  }

  var barRoot=document.getElementById('pg02-bar-root');
  var pctEl=document.getElementById('pg02-pct');
  var nameEl=document.getElementById('pg02-stage-name');
  var overall=document.getElementById('pg02-overall');
  var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;

  // progress is a continuous 0..N value; integer part = completed steps
  function render(prog){
    var done=Math.floor(prog+1e-6);
    var frac=prog-done;
    for(var i=0;i<nodes.length;i++){
      var isDone=i<done;
      var isActive=i===done;
      nodes[i].classList.toggle('pg02-done',isDone);
      nodes[i].classList.toggle('pg02-active',isActive);
      labels[i].classList.toggle('pg02-on',i<=done);
    }
    for(var s=0;s<segFills.length;s++){
      var v=s<done?1:(s===done?frac:0);
      segFills[s].style.transform='scaleX('+v.toFixed(3)+')';
    }
    var pct=Math.round((prog/(STEPS.length-1))*100);
    if(pct>100)pct=100;
    overall.style.transform='scaleX('+(pct/100).toFixed(3)+')';
    pctEl.textContent=pct+'%';
    barRoot.setAttribute('aria-valuenow',pct);
    var idx=Math.min(done,STEPS.length-1);
    nameEl.textContent=pct>=100?'Complete':STEPS[idx];
  }

  if(reduce){ render(STEPS.length-1); return; }

  // animation: hold on a step, then advance one segment; loop with a reset
  var MAX=STEPS.length-1;
  var prog=0,target=0,holdUntil=0,phase='hold';
  var running=true,raf=0,last=0;

  function tick(now){
    if(!running)return;
    if(!last)last=now;
    var dt=(now-last)/1000;last=now;
    if(dt>0.05)dt=0.05;

    if(phase==='hold'){
      if(now>=holdUntil){
        if(target<MAX){target+=1;phase='move';}
        else {phase='reset';holdUntil=now+1100;}
      }
    } else if(phase==='move'){
      var d=target-prog;
      prog+=d*Math.min(1,dt*3.2);
      if(target-prog<0.004){prog=target;phase='hold';holdUntil=now+1000;}
      render(prog);
    } else if(phase==='reset'){
      if(now>=holdUntil){prog=0;target=0;render(0);phase='hold';holdUntil=now+700;}
    }
    raf=requestAnimationFrame(tick);
  }
  render(0);
  holdUntil=performance.now()+650;
  raf=requestAnimationFrame(tick);

  document.addEventListener('visibilitychange',function(){
    if(document.hidden){running=false;if(raf)cancelAnimationFrame(raf);}
    else if(!running){running=true;last=0;raf=requestAnimationFrame(tick);}
  });
})();
</script>
</body>
</html>
