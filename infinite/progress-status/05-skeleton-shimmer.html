<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Dark content-card skeleton placeholder with avatar, text rows, thumbnail and pills, swept by a violet diagonal shimmer wavefront.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Skeleton Loader</title>
<style>
  :root{
    --pg05-bg:#0b0d12;
    --pg05-accent:#7c5cff;
    --pg05-bone:#171a24;       /* skeleton block base */
    --pg05-bone2:#1d2130;      /* lighter block (text rows) */
    --pg05-edge:#222637;
  }
  html,body{margin:0;height:100%}
  .pg05-stage{
    position:fixed;inset:0;background:var(--pg05-bg);
    display:grid;place-items:center;overflow:hidden;
    font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  /* card holding the skeleton */
  .pg05-card{
    width:min(74%,420px);
    border:1px solid var(--pg05-edge);
    border-radius:14px;
    background:linear-gradient(180deg,#10131c,#0d1017);
    padding:7.5% 7%;
    display:grid;gap:6.2%;
    position:relative;overflow:hidden;
    /* STATIC glow — never repaints */
    box-shadow:0 0 0 1px rgba(124,92,255,.06),0 24px 60px -28px rgba(124,92,255,.5);
  }
  .pg05-head{display:flex;align-items:center;gap:5%}
  .pg05-blk{position:relative;overflow:hidden;background:var(--pg05-bone);border-radius:7px}
  .pg05-avatar{width:14%;aspect-ratio:1;border-radius:50%;flex:0 0 auto;background:var(--pg05-bone2)}
  .pg05-hcol{flex:1;display:grid;gap:9px}
  .pg05-line{height:11px;border-radius:5px}
  .pg05-w70{width:70%}.pg05-w45{width:45%}.pg05-w95{width:95%}
  .pg05-w85{width:85%}.pg05-w60{width:60%}.pg05-w35{width:35%}
  .pg05-thumb{width:100%;aspect-ratio:16/7;border-radius:9px;background:var(--pg05-bone2)}
  .pg05-body{display:grid;gap:11px}
  .pg05-foot{display:flex;gap:5%;align-items:center;margin-top:2%}
  .pg05-pill{height:26px;width:34%;border-radius:13px;background:var(--pg05-bone2)}
  .pg05-pill.pg05-ghost{width:22%;background:var(--pg05-bone)}

  /* The shimmer: ONE element, translateX only. Compositor-safe. */
  .pg05-sheen{
    position:absolute;inset:0;
    pointer-events:none;
    /* a soft diagonal band — static gradient, moved by transform */
    background:linear-gradient(105deg,
      transparent 38%,
      rgba(124,92,255,.0) 44%,
      rgba(155,128,255,.16) 50%,
      rgba(214,205,255,.42) 50.6%,
      rgba(155,128,255,.16) 51.2%,
      transparent 60%);
    transform:translate3d(-120%,0,0);
    will-change:transform;
    animation:pg05-sweep 1.7s cubic-bezier(.46,.03,.52,.96) infinite;
  }
  /* offset each block so the sweep reads as one wavefront crossing the card */
  .pg05-d1 .pg05-sheen{animation-delay:.00s}
  .pg05-d2 .pg05-sheen{animation-delay:.07s}
  .pg05-d3 .pg05-sheen{animation-delay:.13s}
  .pg05-d4 .pg05-sheen{animation-delay:.20s}
  .pg05-d5 .pg05-sheen{animation-delay:.26s}
  .pg05-d6 .pg05-sheen{animation-delay:.30s}

  @keyframes pg05-sweep{
    0%{transform:translate3d(-120%,0,0)}
    62%,100%{transform:translate3d(120%,0,0)}
  }

  /* subtle breathing of base tone via opacity (compositor) on a tint layer */
  .pg05-pulse{
    position:absolute;inset:0;pointer-events:none;border-radius:inherit;
    background:radial-gradient(120% 140% at 50% -10%,rgba(124,92,255,.10),transparent 60%);
    opacity:.5;
    animation:pg05-breathe 3.4s ease-in-out infinite;
  }
  @keyframes pg05-breathe{0%,100%{opacity:.34}50%{opacity:.7}}

  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
    .pg05-sheen{transform:translate3d(0,0,0);opacity:.55}
    .pg05-pulse{opacity:.5}
  }
</style>
</head>
<body>
  <div class="pg05-stage" id="pg05-stage" role="progressbar" aria-label="Content loading, skeleton placeholder" aria-busy="true">
    <div class="pg05-card">
      <div class="pg05-pulse"></div>

      <div class="pg05-head">
        <div class="pg05-blk pg05-avatar pg05-d1"><div class="pg05-sheen"></div></div>
        <div class="pg05-hcol">
          <div class="pg05-blk pg05-line pg05-w70 pg05-d2"><div class="pg05-sheen"></div></div>
          <div class="pg05-blk pg05-line pg05-w45 pg05-d3"><div class="pg05-sheen"></div></div>
        </div>
      </div>

      <div class="pg05-blk pg05-thumb pg05-d3"><div class="pg05-sheen"></div></div>

      <div class="pg05-body">
        <div class="pg05-blk pg05-line pg05-w95 pg05-d4"><div class="pg05-sheen"></div></div>
        <div class="pg05-blk pg05-line pg05-w85 pg05-d5"><div class="pg05-sheen"></div></div>
        <div class="pg05-blk pg05-line pg05-w60 pg05-d6"><div class="pg05-sheen"></div></div>
      </div>

      <div class="pg05-foot">
        <div class="pg05-blk pg05-pill pg05-d5"><div class="pg05-sheen"></div></div>
        <div class="pg05-blk pg05-pill pg05-ghost pg05-d6"><div class="pg05-sheen"></div></div>
      </div>
    </div>
  </div>
  <div class="cap">Skeleton Loader</div>

  <script>
  (function(){
    // Pause shimmer when tab hidden — pure CSS toggle, no rAF needed.
    var stage=document.getElementById('pg05-stage');
    if(!stage) return;
    var sheens=stage.getElementsByClassName('pg05-sheen');
    var pulses=stage.getElementsByClassName('pg05-pulse');
    function setState(s){
      var i;
      for(i=0;i<sheens.length;i++) sheens[i].style.animationPlayState=s;
      for(i=0;i<pulses.length;i++) pulses[i].style.animationPlayState=s;
    }
    document.addEventListener('visibilitychange',function(){
      setState(document.hidden?'paused':'running');
    });
  })();
  </script>
</body>
</html>
