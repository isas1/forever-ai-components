<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Horizontal battery shell with segmented violet fill sweeping from 4% to 100%, pulsing bolt icon, traveling sheen and green charged glow.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Battery Charge</title>
<style>
  :root{
    --bg:#0b0d12; --cell:#11141c; --rim:#2a2f40;
    --a:#7c5cff; --a2:#9b86ff; --hi:#c7baff;
    --ok:#5ce0a8; --txt:#e7e3ff;
  }
  *{margin:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);overflow:hidden;font-family:ui-monospace,Menlo,monospace}
  .pg07-wrap{position:fixed;inset:0;display:grid;place-items:center}
  .pg07-stage{
    position:relative;width:62vmin;max-width:340px;height:42vmin;max-height:230px;
  }
  /* battery shell */
  .pg07-body{
    position:absolute;inset:0;border-radius:18px;
    background:var(--cell);
    border:2px solid var(--rim);
    box-shadow:0 0 0 6px #0e1119, 0 0 46px 2px rgba(124,92,255,.22) inset, 0 14px 40px rgba(0,0,0,.5);
  }
  .pg07-cap{
    position:absolute;right:-13px;top:34%;width:13px;height:32%;
    background:var(--rim);border-radius:0 7px 7px 0;
  }
  /* fill track */
  .pg07-track{position:absolute;left:12px;top:12px;bottom:12px;right:12px;border-radius:11px;overflow:hidden;background:#0c0f16}
  /* the charging fill — scaleX on compositor only */
  .pg07-fill{
    position:absolute;left:0;top:0;bottom:0;width:100%;
    transform-origin:left center;transform:scaleX(0);
    background:linear-gradient(90deg,var(--a) 0%,var(--a2) 70%,var(--hi) 100%);
    box-shadow:0 0 30px 4px rgba(124,92,255,.55);
    border-radius:11px;
    animation:pg07-charge 6s cubic-bezier(.6,0,.25,1) infinite;
  }
  /* segment dividers, static */
  .pg07-segs{position:absolute;inset:0;display:flex}
  .pg07-segs i{flex:1;border-right:2px solid rgba(11,13,18,.85)}
  .pg07-segs i:last-child{border-right:0}
  /* travelling sheen, transform+opacity only */
  .pg07-sheen{
    position:absolute;top:0;bottom:0;left:0;width:34%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.32),transparent);
    transform:translateX(-120%);
    animation:pg07-sheen 6s ease-in-out infinite;
  }
  /* bolt + readout */
  .pg07-info{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:10px;pointer-events:none}
  .pg07-bolt{
    width:9%;max-width:30px;color:var(--hi);
    filter:drop-shadow(0 0 6px rgba(199,186,255,.9));
    transform:scale(1);animation:pg07-pulse 3s ease-in-out infinite;
  }
  .pg07-pct{
    font:700 clamp(16px,6vmin,34px)/1 ui-monospace,Menlo,monospace;
    color:var(--txt);letter-spacing:.04em;
    text-shadow:0 0 10px rgba(124,92,255,.6);
    min-width:3.4ch;text-align:right;
  }
  .pg07-pct::after{content:"0%";animation:pg07-num 6s steps(1) infinite}
  @keyframes pg07-charge{
    0%{transform:scaleX(.04)}
    22%{transform:scaleX(.28)}
    48%{transform:scaleX(.55)}
    74%{transform:scaleX(.82)}
    92%,100%{transform:scaleX(1)}
  }
  @keyframes pg07-sheen{
    0%,8%{transform:translateX(-120%)}
    40%{transform:translateX(120%)}
    100%{transform:translateX(120%)}
  }
  @keyframes pg07-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
  @keyframes pg07-num{
    0%{content:"4%"}22%{content:"28%"}48%{content:"55%"}
    74%{content:"82%"}92%{content:"100%"}100%{content:"100%"}
  }
  /* charged glow ring — static, fades via opacity */
  .pg07-done{
    position:absolute;inset:-2px;border-radius:18px;pointer-events:none;
    box-shadow:0 0 34px 4px rgba(92,224,168,.5);
    opacity:0;animation:pg07-done 6s ease-in-out infinite;
  }
  @keyframes pg07-done{0%,88%{opacity:0}94%,100%{opacity:.85}}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
    .pg07-fill{transform:scaleX(.74)}
    .pg07-pct::after{content:"74%"}
    .pg07-sheen{opacity:0}
    .pg07-done{opacity:0}
  }
</style>

</head>
<body>
  <div class="pg07-wrap">
    <div class="pg07-stage" role="progressbar" aria-label="Battery charge" aria-valuemin="0" aria-valuemax="100" aria-valuenow="74" aria-valuetext="charging">
      <div class="pg07-body"></div>
      <div class="pg07-cap"></div>
      <div class="pg07-track">
        <div class="pg07-fill"></div>
        <div class="pg07-sheen"></div>
        <div class="pg07-segs"><i></i><i></i><i></i><i></i><i></i></div>
      </div>
      <div class="pg07-info">
        <svg class="pg07-bolt" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M13 2 4 14h6l-1 8 9-12h-6z"/></svg>
        <span class="pg07-pct"></span>
      </div>
      <div class="pg07-done"></div>
    </div>
  </div>
  <div class="cap">Battery Charge</div>
  <script>
  (function(){
    var bar=document.querySelector('.pg07-stage');
    if(!bar)return;
    var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
    if(reduce)return;
    var fill=document.querySelector('.pg07-fill');
    var stops=[{t:0,v:4},{t:.22,v:28},{t:.48,v:55},{t:.74,v:82},{t:.92,v:100}];
    function sync(){
      var len=stops.length,i;
      var dur=6000, now=(performance.now()% dur)/dur, v=100;
      for(i=len-1;i>=0;i--){ if(now>=stops[i].t){ v=stops[i].v; break; } }
      bar.setAttribute('aria-valuenow', v);
      bar.setAttribute('aria-valuetext', v>=100?'fully charged':'charging '+v+'%');
    }
    var raf=0, running=true;
    function tick(){ if(!running)return; sync(); raf=requestAnimationFrame(tick); }
    function play(){ if(running)return; running=true; fill.style.animationPlayState='running'; tick(); }
    function stop(){ running=false; cancelAnimationFrame(raf); fill.style.animationPlayState='paused'; }
    document.addEventListener('visibilitychange',function(){ document.hidden?stop():play(); });
    tick();
  })();
  </script>
</body>
</html>
