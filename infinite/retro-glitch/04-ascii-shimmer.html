<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Grid of ASCII ramp characters shimmering through interfering radial and plasma waves in green-teal hues, following the pointer.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ASCII shimmer</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#04110f}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  canvas{width:100%;height:100%;display:block}
  .cap{position:fixed;right:8px;bottom:7px;font:600 10px ui-monospace,Menlo,monospace;
    color:#46f5b0;opacity:.4;letter-spacing:.5px;pointer-events:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/retro-glitch/04-ascii-shimmer.html",
 "title": "ASCII shimmer",
 "description": "Grid of ASCII ramp characters shimmers through interfering radial and plasma waves in green-teal hues; character density and wave center follow the pointer.",
 "useWhen": "Retro/terminal-aesthetic hero backgrounds, hacker-themed UIs, or ambient screensaver displays on dark backgrounds.",
 "avoidWhen": "Light-color UIs (background hardcoded dark green-black). Contexts requiring legible foreground text — the shimmer competes with readability.",
 "agentPrompt": "Change the character ramp from \" .:-=+*#%@\" to \" ░▒▓█\", shift the hue base from 140 to 220 for a blue palette, and slow the wave speed by changing t+=0.035 to t+=0.018.",
 "editableAreas": [
  "character ramp (chars variable)",
  "wave speed (t += 0.035)",
  "hue range (140 + v*60)",
  "cell density divisor (30 / 46)",
  "wave frequency coefficients (0.6, 0.35, 0.4)"
 ],
 "preserveElements": [
  "visibilitychange pause / cancelAnimationFrame",
  "prefers-reduced-motion guard (t freeze)",
  "DPR-independent canvas sizing with cell cap",
  "IIFE-free but scoped const/let block"
 ],
 "knownLimitations": [
  "No DPR scaling — canvas renders at CSS pixel resolution, looks soft on high-DPI displays",
  "Cell size cap logic (divisor 46) may leave noticeable gaps at very wide aspect ratios"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "ascii",
  "canvas",
  "retro",
  "glitch",
  "plasma",
  "pointer",
  "generative"
 ]
}
</script>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div class="cap">ASCII SHIMMER</div>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let W,H,t=0,raf,reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
const chars=" .:-=+*#%@";
let cell,cols,rows,mx=0.5,my=0.5;
function size(){
  W=c.width=Math.floor(innerWidth);H=c.height=Math.floor(innerHeight);
  // base cell on the SHORT side for visual density, but floor it so the LONG
  // side can't blow the grid up past ~46 cells (caps per-frame fillText count)
  cell=Math.max(8,Math.min(W,H)/30);
  cell=Math.max(cell,Math.max(W,H)/46);
  cols=Math.ceil(W/cell);rows=Math.ceil(H/cell);
  x.font=Math.round(cell*1.05)+'px ui-monospace,Menlo,monospace';x.textBaseline='top';
}
addEventListener('resize',size);size();
function draw(){
  x.fillStyle='#04110f';x.fillRect(0,0,W,H);
  const cxp=mx*cols,cyp=my*rows;
  for(let r=0;r<rows;r++)for(let q=0;q<cols;q++){
    const dx=q-cxp,dy=(r-cyp)*1.0,d=Math.sqrt(dx*dx+dy*dy);
    // interfering radial + plasma waves
    let v=Math.sin(d*0.6-t*2)+Math.sin(q*0.35+t*1.3)+Math.sin(r*0.4-t*1.1);
    v=(v+3)/6; // 0..1
    const idx=Math.max(0,Math.min(chars.length-1,Math.floor(v*chars.length)));
    const ch=chars[idx];if(ch===' ')continue;
    const hue=140+v*60+Math.sin(t)*20;
    x.fillStyle='hsl('+hue+','+(70)+'%,'+(35+v*45)+'%)';
    x.fillText(ch,q*cell,r*cell);
  }
  t+=reduce?0:0.035;
  raf=requestAnimationFrame(draw);
}
function play(){cancelAnimationFrame(raf);draw();}
document.addEventListener('visibilitychange',()=>document.hidden?cancelAnimationFrame(raf):play());
addEventListener('pointermove',e=>{mx=e.clientX/innerWidth;my=e.clientY/innerHeight;});
play();
</script>
</body>
</html>
