<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Glowing pink-and-cyan neon ARCADE sign with flickering tubes, pulsing border and chasing marquee bulbs.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon arcade sign</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0a0418}
  #wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4%}
  .sign{font:900 clamp(34px,17vw,120px) "Arial Black",Impact,system-ui,sans-serif;
    letter-spacing:2px;color:#fff;line-height:.95;text-align:center;
    -webkit-text-stroke:2px #ff2fa0}
  .sub{font:700 clamp(11px,4.5vw,30px) "Courier New",monospace;letter-spacing:6px;
    color:#2ffaff;text-shadow:0 0 6px #2ffaff,0 0 16px #15a8c8}
  .neon{text-shadow:0 0 4px #ff7fd0,0 0 12px #ff2fa0,0 0 28px #ff2fa0,0 0 50px #d10b6e}
  .flick{animation:fk 4s infinite}
  .flick2{animation:fk2 5.5s infinite}
  @keyframes fk{0%,92%,96%,100%{opacity:1}93%{opacity:.3}94%{opacity:1}95%{opacity:.4}}
  @keyframes fk2{0%,88%,100%{opacity:1}89%{opacity:.2}90%{opacity:.9}91%{opacity:.3}92%{opacity:1}}
  .frame{position:fixed;inset:6%;border:3px solid #ff2fa0;border-radius:14px;
    box-shadow:0 0 8px #ff2fa0,0 0 22px #ff2fa0,inset 0 0 18px rgba(255,47,160,.25);
    animation:pulse 2.4s ease-in-out infinite;pointer-events:none}
  @keyframes pulse{0%,100%{box-shadow:0 0 8px #ff2fa0,0 0 22px #ff2fa0,inset 0 0 18px rgba(255,47,160,.25)}
    50%{box-shadow:0 0 14px #ff5fc0,0 0 40px #ff2fa0,inset 0 0 26px rgba(255,47,160,.4)}}
  .dot{position:absolute;width:8px;height:8px;border-radius:50%;background:#2ffaff;
    box-shadow:0 0 8px #2ffaff,0 0 16px #2ffaff}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px ui-monospace,monospace;
    color:#ff7fd0;opacity:.4;letter-spacing:.5px;pointer-events:none}
  @media(prefers-reduced-motion:reduce){.flick,.flick2,.frame,.chase{animation:none!important}}
</style>
</head>
<body>
<div class="frame">
  <span class="dot" style="left:-4px;top:-4px"></span>
  <span class="dot" style="right:-4px;top:-4px"></span>
  <span class="dot" style="left:-4px;bottom:-4px"></span>
  <span class="dot" style="right:-4px;bottom:-4px"></span>
</div>
<div id="wrap">
  <div class="sign neon flick">ARCADE</div>
  <div class="sub flick2">★ OPEN 24HR ★</div>
</div>
<div class="cap">NEON ARCADE</div>
<script>
// chase lights around the frame border
const frame=document.querySelector('.frame');
const N=24;const lamps=[];
for(let i=0;i<N;i++){const s=document.createElement('span');s.className='dot chase';
  s.style.background='#ffe23f';s.style.boxShadow='0 0 6px #ffe23f';
  frame.appendChild(s);lamps.push(s);}
function place(){const w=frame.clientWidth,h=frame.clientHeight,per=2*(w+h);
  lamps.forEach((s,i)=>{let d=(i/N)*per,X,Y;
    if(d<w){X=d;Y=0}else if(d<w+h){X=w;Y=d-w}else if(d<2*w+h){X=w-(d-w-h);Y=h}else{X=0;Y=h-(d-2*w-h)}
    s.dataset.base=i/N;s.style.left=(X-4)+'px';s.style.top=(Y-4)+'px';});}
addEventListener('resize',place);place();
let t=0,raf,reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
function loop(){const ph=(t*0.4)%1;
  lamps.forEach(s=>{const d=Math.abs(((+s.dataset.base)-ph+1)%1);
    const on=d<0.12||d>0.88;s.style.opacity=on?1:0.15;});
  t+=reduce?0:0.03;raf=requestAnimationFrame(loop);}
function play(){cancelAnimationFrame(raf);loop();}
document.addEventListener('visibilitychange',()=>document.hidden?cancelAnimationFrame(raf):play());
play();
</script>
</body>
</html>
