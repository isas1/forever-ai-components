<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Chunky-pixel violet-and-cyan checker texture rotating and breathing-zoom through itself in a seasick demoscene rotozoom.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rotozoom Texture</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#1b0033;}
  #rztz-c{display:block;width:100%;height:100%;image-rendering:pixelated;}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1.2 ui-monospace,Menlo,Consolas,monospace;
       letter-spacing:.18em;color:#00e5ff;opacity:.34;text-transform:uppercase;
       pointer-events:none;user-select:none;}
</style>
</head>
<body>
<canvas id="rztz-c"></canvas>
<div class="cap">Rotozoom Texture</div>
<script>
(function(){
  const cv=document.getElementById('rztz-c'),ctx=cv.getContext('2d',{alpha:false});
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let CW,CH,img,buf,W,H,P=4; // P = chunky pixel size (the aliasing stairs)
  function size(){
    const r=cv.getBoundingClientRect();
    CW=Math.max(1,r.width|0);CH=Math.max(1,r.height|0);
    P=Math.max(2,Math.round(Math.min(CW,CH)/110)); // scale chunk to tile size
    W=Math.ceil(CW/P);H=Math.ceil(CH/P);
    cv.width=W;cv.height=H;cv.style.imageRendering='pixelated';
    img=ctx.createImageData(W,H);buf=img.data;
  }
  addEventListener('resize',size);size();
  // palette: deep violet bg -> cyan accent, two checker shades each
  const A=[0x1b,0x00,0x33], B=[0x3a,0x0d,0x6e], C=[0x00,0xe5,0xff], D=[0x07,0x86,0xa0];
  let t=0,boost=0,px=0.5,py=0.5;
  cv.addEventListener('pointermove',e=>{const r=cv.getBoundingClientRect();
    px=(e.clientX-r.left)/r.width;py=(e.clientY-r.top)/r.height;boost=1;});
  cv.addEventListener('click',()=>{boost=2.4;});
  function render(){
    // seasick continuous rotate + breathing zoom
    const ang=t*0.011, zoom=0.55+0.45*Math.sin(t*0.013)+boost*0.5;
    const sc=(0.014+0.010*Math.cos(t*0.009))*zoom; // texels per pixel
    const ca=Math.cos(ang)*sc, sa=Math.sin(ang)*sc;
    const cx=W*0.5, cy=H*0.5;
    // drifting offset so the plane scrolls through itself
    const ox=t*0.6 + (px-0.5)*40, oy=t*0.35 + (py-0.5)*40;
    let i=0;
    for(let y=0;y<H;y++){
      const dy=y-cy;
      // u = (x-cx)*ca - (y-cy)*sa + ox ; v = (x-cx)*sa + (y-cy)*ca + oy
      const du=ca, dv=sa;
      let u=(-cx)*ca - dy*sa + ox;
      let v=(-cx)*sa + dy*ca + oy;
      for(let x=0;x<W;x++){
        // tiled checker with a finer sub-grid for texture detail
        const fu=Math.floor(u), fv=Math.floor(v);
        const chk=(fu^fv)&1;
        const sub=((Math.floor(u*4)^Math.floor(v*4))&1);
        let col = chk ? (sub?C:D) : (sub?B:A);
        // radial cyan vignette pulse toward edges for that CRT bloom
        const r2=((x-cx)*(x-cx)+(y-cy)*(y-cy))/(cx*cx+cy*cy);
        const glow=0.12*Math.max(0,Math.sin(t*0.04 - r2*5));
        buf[i++]=Math.min(255,col[0]+glow*0x00);
        buf[i++]=Math.min(255,col[1]+glow*0xe5);
        buf[i++]=Math.min(255,col[2]+glow*0xff);
        buf[i++]=255;
        u+=du; v+=dv;
      }
    }
    ctx.putImageData(img,0,0);
  }
  let raf=0;
  function frame(){
    t+=reduce?0:1; boost*=0.93; render();
    raf=requestAnimationFrame(frame);
  }
  function start(){if(!raf&&!reduce)raf=requestAnimationFrame(frame);}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>{document.hidden?stop():start();});
  if(reduce){t=120;render();}else start();
})();
</script>
</body>
</html>
