<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Stipple Painter — Pointillist Dot-Field Studies. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stipple Painter</title>
<style>
  html,body{margin:0;height:100%;background:#f1ecdf;overflow:hidden}
  #seu03-stage{position:fixed;inset:0;width:100%;height:100%}
  #seu03-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .seu03-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#2a2620;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/seurat/03-stipple-painter.html",
 "title": "Stipple Painter",
 "description": "An invisible brush drifts a Lissajous path, laying colored dots on a warm cream canvas in a slow pointillist build-up inspired by pointillist.",
 "useWhen": "Art-themed hero backgrounds, ambient loading screens, or decorative panels where slow generative painting suits the mood.",
 "avoidWhen": "Contexts needing fast visual feedback or text readability over the canvas — dot accumulation fades slowly and background is hardcoded cream.",
 "agentPrompt": "Change the palette by replacing RGB.sky to [100,180,255] and slow the brush path by reducing ap+=0.018 to ap+=0.008.",
 "editableAreas": [
  "color palette (RGB object)",
  "brush path speed (ap += 0.018)",
  "Lissajous radii (0.36 / 0.34 multipliers)",
  "max dot count (MAX=900)",
  "dot radius range (1.3 + 1.7)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion static fallback",
  "visibilitychange pause/resume",
  "DPR-aware fitCanvas"
 ],
 "knownLimitations": [
  "Background color hardcoded in both CSS and clearAll() — must update both to change ground color",
  "No pointer interactivity; purely autonomous"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "stipple",
  "pointillism",
  "canvas",
  "ambient",
  "generative",
  "dots"
 ]
}
</script>
</head>
<body>
<div id="seu03-stage" role="img" aria-label="An invisible hand stipples coloured dots in a slow drifting path, building tone touch by patient touch across a warm cream ground.">
  <canvas id="seu03-cv"></canvas>
</div>
<div class="seu03-cap">Stipple Painter</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv=document.getElementById('seu03-cv'); if(!cv) return;
  const RGB={green:[111,155,78],sky:[143,184,214],orange:[224,138,46],violet:[107,91,149],ink:[42,38,32]};
  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width),h=Math.max(2,r.height);
    c.width=Math.round(w*dpr);c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }
  function rgba(t,a){return 'rgba('+t[0]+','+t[1]+','+t[2]+','+a+')';}
  function dot(ctx,x,y,r,col,a){ctx.globalAlpha=a;ctx.fillStyle=col;ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fill();ctx.globalAlpha=1;}
  let S=fitCanvas(cv);
  let dots=[];
  const MAX=900;
  function lay(x,y,spread,bias){
    const n=3+(Math.random()*3|0);
    for(let i=0;i<n;i++){
      const a=Math.random()*7,d=Math.random()*spread;
      const col=bias[(Math.random()*bias.length)|0];
      dots.push({x:x+Math.cos(a)*d,y:y+Math.sin(a)*d,r:1.3+Math.random()*1.7,col});
    }
    if(dots.length>MAX)dots.splice(0,dots.length-MAX);
  }
  function clearAll(){dots=[];S.ctx.fillStyle='#f1ecdf';S.ctx.fillRect(0,0,S.w,S.h);}
  function seed(){const all=[RGB.green,RGB.sky,RGB.orange,RGB.violet,RGB.ink];for(let i=0;i<120;i++){lay(S.w*0.5+(Math.random()-0.5)*S.w*0.4,S.h*0.5+(Math.random()-0.5)*S.h*0.4,40,all);}}
  let ap=0,last=performance.now(),acc=0;
  function draw(now){
    const dt=(now-last)/1000;last=now;acc+=dt;
    const ctx=S.ctx,W=S.w,H=S.h;
    ctx.fillStyle='rgba(241,236,223,0.014)';ctx.fillRect(0,0,W,H);
    if(!REDUCED&&acc>0.02){
      acc=0;ap+=0.018;
      const x=W*(0.5+0.36*Math.sin(ap*1.0));
      const y=H*(0.5+0.34*Math.sin(ap*1.7+0.6));
      const bias=y>H*0.55?[RGB.green,RGB.violet,RGB.green]:[RGB.sky,RGB.orange,RGB.sky];
      lay(x,y,8,bias);
    }
    for(const d of dots){dot(ctx,d.x,d.y,d.r,rgba(d.col,1),0.9);}
  }
  let raf=0,running=false;
  function loop(){if(!running)return;draw(performance.now());raf=requestAnimationFrame(loop);}
  function start(){if(running)return;running=true;last=performance.now();raf=requestAnimationFrame(loop);}
  function stop(){running=false;if(raf)cancelAnimationFrame(raf);raf=0;}
  let _rt;
  window.addEventListener('resize',()=>{clearTimeout(_rt);_rt=setTimeout(()=>{S=fitCanvas(cv);clearAll();seed();},150);},{passive:true});
  document.addEventListener('visibilitychange',()=>{if(REDUCED)return;if(document.hidden)stop();else start();});
  clearAll();seed();
  if(REDUCED){for(const d of dots)dot(S.ctx,d.x,d.y,d.r,rgba(d.col,1),0.9);}
  else start();
})();
</script>
</body>
</html>
