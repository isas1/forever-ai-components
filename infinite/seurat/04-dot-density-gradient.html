<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Dot Density Gradient — Pointillist Dot-Field Studies. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dot Density Gradient</title>
<style>
  html,body{margin:0;height:100%;background:#f1ecdf;overflow:hidden}
  #seu04-stage{position:fixed;inset:0;width:100%;height:100%}
  #seu04-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .seu04-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#2a2620;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/seurat/04-dot-density-gradient.html",
 "title": "Dot Density Gradient",
 "description": "Stippled dots encode luminance via density; a sine-driven light band sweeps the field, shifting hues between orange, green, and violet zones.",
 "useWhen": "Art-themed hero backgrounds, gallery intros, ambient screen fills where a painterly slow-motion texture is wanted.",
 "avoidWhen": "Contexts requiring legible text overlays — the moving light sweep and dense dot field compete with copy placed on top.",
 "agentPrompt": "Change the palette to cool blues: set RGB.green to [70,130,200], RGB.orange to [200,220,255], RGB.violet to [40,60,140], and slow the sweep by changing t*0.45 to t*0.2.",
 "editableAreas": [
  "RGB color palette (RGB.green, RGB.orange, RGB.violet)",
  "sweep speed (t*0.45)",
  "dot grid spacing (base=9)",
  "dot radius range (1.2 + (1-lum)*1.9)",
  "density threshold (0.10+density*0.85)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (REDUCED static draw)",
  "DPR-aware fitCanvas with setTransform",
  "visibilitychange pause/resume"
 ],
 "knownLimitations": [
  "Full canvas redraw every frame — moderately CPU-bound on large viewports due to nested dot loops",
  "Background color hardcoded in both CSS and canvas fillRect — must change in two places"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "pointillism",
  "dots",
  "gradient",
  "canvas",
  "generative",
  "ambient",
  "light-sweep"
 ]
}
</script>
</head>
<body>
<div id="seu04-stage" role="img" aria-label="Dot spacing encodes light: where dots crowd, shadow gathers; where they thin, the cream shows through. A soft band of luminance sweeps the field.">
  <canvas id="seu04-cv"></canvas>
</div>
<div class="seu04-cap">Dot Density Gradient</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv=document.getElementById('seu04-cv'); if(!cv) return;
  const RGB={green:[111,155,78],orange:[224,138,46],violet:[107,91,149]};
  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width),h=Math.max(2,r.height);
    c.width=Math.round(w*dpr);c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }
  function rgba(t,a){return 'rgba('+t[0]+','+t[1]+','+t[2]+','+a+')';}
  function dot(ctx,x,y,r,col,a){ctx.globalAlpha=a;ctx.fillStyle=col;ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fill();ctx.globalAlpha=1;}
  let S=fitCanvas(cv);
  function draw(t){
    const ctx=S.ctx,W=S.w,H=S.h;
    ctx.fillStyle='#f1ecdf';ctx.fillRect(0,0,W,H);
    const sweep=REDUCED?0.5:(Math.sin(t*0.45)*0.5+0.5);
    const lightX=sweep*W;
    const base=9;
    for(let y=base/2,row=0;y<H;y+=base,row++){
      for(let x=base/2+(row%2)*base/2;x<W;x+=base){
        const dxl=Math.abs(x-lightX)/W;
        const lum=1-Math.min(1,dxl*1.6);
        const hash=((Math.round(x)*13+Math.round(y)*7)%100)/100;
        const density=(1-lum);
        if(hash<0.10+density*0.85){
          const col=lum>0.6?RGB.orange:lum>0.3?RGB.green:RGB.violet;
          const r=1.2+(1-lum)*1.9;
          dot(ctx,x,y,r,rgba(col,0.85),1);
        }
      }
    }
  }
  let raf=0,running=false,t0=performance.now();
  function loop(){if(!running)return;draw((performance.now()-t0)/1000);raf=requestAnimationFrame(loop);}
  function start(){if(running)return;running=true;raf=requestAnimationFrame(loop);}
  function stop(){running=false;if(raf)cancelAnimationFrame(raf);raf=0;}
  let _rt;
  window.addEventListener('resize',()=>{clearTimeout(_rt);_rt=setTimeout(()=>{S=fitCanvas(cv);if(REDUCED)draw(0);},150);},{passive:true});
  document.addEventListener('visibilitychange',()=>{if(REDUCED)return;if(document.hidden)stop();else{t0=performance.now();start();}});
  if(REDUCED)draw(0);else start();
})();
</script>
</body>
</html>
