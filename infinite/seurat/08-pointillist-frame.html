<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Pointillist Frame — Pointillist Dot-Field Studies. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pointillist Frame</title>
<style>
  html,body{margin:0;height:100%;background:#f1ecdf;overflow:hidden}
  #seu08-stage{position:fixed;inset:0;width:100%;height:100%}
  #seu08-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .seu08-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#2a2620;opacity:.5;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/seurat/08-pointillist-frame.html",
 "title": "Pointillist Frame",
 "description": "Canvas field of color-cycling dots with a breathing dot border; gradient drifts through green, sky, orange, and violet in pointillist pointillist style.",
 "useWhen": "Art-themed hero backgrounds, museum or gallery UIs, ambient screensavers needing a painterly aesthetic.",
 "avoidWhen": "Contexts requiring text overlays — dot field competes visually. Low-contrast palettes clash with the fixed warm-cream background.",
 "agentPrompt": "Change gradient palette by replacing RGB.sky with [90,160,220] and RGB.violet with [180,80,160], then increase gap from 13 to 18 for a sparser dot grid.",
 "editableAreas": [
  "color palette (RGB.green/sky/orange/violet)",
  "dot grid gap (gap=13)",
  "frame inset (inset=26)",
  "drift speed (t*0.05)",
  "dot pulse amplitude (0.12*Math.sin)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (REDUCED)",
  "visibilitychange pause/resume",
  "DPR-aware fitCanvas()"
 ],
 "knownLimitations": [
  "Background color hardcoded as #f1ecdf in both CSS and canvas fillRect — must change both to retheme",
  "Dot count scales with viewport; large screens may stress fill calls on low-end devices"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "pointillism",
  "dots",
  "canvas",
  "ambient",
  "gradient",
  "border"
 ]
}
</script>
</head>
<body>
<div id="seu08-stage" role="img" aria-label="A breathing dotted border surrounds a calm field of dots, the whole gradient drifting through green, sky, orange and violet — frame and picture made of one divided light.">
  <canvas id="seu08-cv"></canvas>
</div>
<div class="seu08-cap">Pointillist Frame</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv=document.getElementById('seu08-cv'); if(!cv) return;
  const RGB={green:[111,155,78],sky:[143,184,214],orange:[224,138,46],violet:[107,91,149]};
  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width),h=Math.max(2,r.height);
    c.width=Math.round(w*dpr);c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }
  function rgba(t,a){return 'rgba('+t[0]+','+t[1]+','+t[2]+','+a+')';}
  function dot(ctx,x,y,r,col,a){ctx.globalAlpha=a;ctx.fillStyle=col;ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fill();ctx.globalAlpha=1;}
  let S=fitCanvas(cv);
  const grad=[RGB.green,RGB.sky,RGB.orange,RGB.violet];
  function lerp3(a,b,k){return [a[0]+(b[0]-a[0])*k|0,a[1]+(b[1]-a[1])*k|0,a[2]+(b[2]-a[2])*k|0];}
  function ramp(u){u=(u%1+1)%1;const f=u*grad.length;const i=Math.floor(f)%grad.length;const k=f-Math.floor(f);return lerp3(grad[i],grad[(i+1)%grad.length],k);}
  function draw(t){
    const ctx=S.ctx,W=S.w,H=S.h;
    ctx.fillStyle='#f1ecdf';ctx.fillRect(0,0,W,H);
    const drift=REDUCED?0:t*0.05;
    const inset=26,gap=13;
    for(let y=inset+gap/2,row=0;y<H-inset;y+=gap,row++){
      for(let x=inset+gap/2+(row%2)*gap/2;x<W-inset;x+=gap){
        const u=(x/W)*0.6+(y/H)*0.4+drift;
        const c=ramp(u);
        const pulse=REDUCED?0:0.12*Math.sin(t*1.1+x*0.02+y*0.02);
        const r=2.0+pulse*1.4;
        dot(ctx,x,y,r,rgba(c,1),0.9);
      }
    }
    const breath=REDUCED?0:Math.sin(t*1.2)*2;
    const step=14,peri=[];
    for(let x=10;x<W-10;x+=step){peri.push([x,10]);peri.push([x,H-10]);}
    for(let y=10;y<H-10;y+=step){peri.push([10,y]);peri.push([W-10,y]);}
    peri.forEach((p,i)=>{const u=i/peri.length+drift*1.4;const c=ramp(u*2);const r=2.4+breath*0.5;dot(ctx,p[0],p[1],r,rgba(c,1),0.95);});
    const breath2=REDUCED?0:Math.sin(t*1.2+Math.PI)*1.6;
    const inset2=20;
    for(let x=inset2;x<W-inset2;x+=step){const c1=ramp(x/W+drift);dot(ctx,x,inset2+breath2,2.0,rgba(c1,1),0.7);dot(ctx,x,H-inset2-breath2,2.0,rgba(c1,1),0.7);}
    for(let y=inset2;y<H-inset2;y+=step){const c1=ramp(y/H+drift+0.3);dot(ctx,inset2+breath2,y,2.0,rgba(c1,1),0.7);dot(ctx,W-inset2-breath2,y,2.0,rgba(c1,1),0.7);}
  }
  let raf=0,running=false,t0=performance.now();
  function loop(){if(!running)return;draw((performance.now()-t0)/1000);raf=requestAnimationFrame(loop);}
  function start(){if(running)return;running=true;raf=requestAnimationFrame(loop);}
  function stop(){running=false;if(raf)cancelAnimationFrame(raf);raf=0;}
  let _rt;
  window.addEventListener('resize',()=>{clearTimeout(_rt);_rt=setTimeout(()=>{S=fitCanvas(cv);if(REDUCED)draw(0);},150);},{passive:true});
  document.addEventListener('visibilitychange',()=>{if(REDUCED)return;if(document.hidden)stop();else{t0=performance.now();start();}});
  if(REDUCED)draw(0);else start();
})();
</script>
</body>
</html>
