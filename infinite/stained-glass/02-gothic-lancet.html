<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Gothic Lancet Triptych — Stained Glass. A self-contained, zero-dependency animated web component.">
<title>Gothic Lancet Triptych</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0a0608}
  #gl-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
  #gl-svg{width:min(100%,100vh);height:min(100%,100vh);max-width:640px;max-height:640px}
  /* Each lancet hue-shifts independently, fast enough to see */
  .gl-left{animation:gl-hueL 3s ease-in-out infinite}
  .gl-centre{animation:gl-hueC 5s ease-in-out infinite}
  .gl-right{animation:gl-hueR 4s ease-in-out infinite}
  /* Bright sweeping light beam */
  #gl-beam{animation:gl-beam 4s linear infinite}
  /* Trefoils pulse */
  .gl-trefoil{animation:gl-trefoil 2.5s ease-in-out infinite}
  @keyframes gl-hueL{
    0%,100%{filter:brightness(0.75) saturate(0.9) hue-rotate(0deg)}
    50%{filter:brightness(1.5) saturate(1.7) hue-rotate(60deg)}
  }
  @keyframes gl-hueC{
    0%,100%{filter:brightness(0.8) saturate(1) hue-rotate(-20deg)}
    50%{filter:brightness(1.5) saturate(1.8) hue-rotate(80deg)}
  }
  @keyframes gl-hueR{
    0%,100%{filter:brightness(0.7) saturate(0.85) hue-rotate(30deg)}
    50%{filter:brightness(1.5) saturate(1.6) hue-rotate(-40deg)}
  }
  @keyframes gl-beam{
    0%{transform:translateX(-420px);opacity:0}
    8%{opacity:1}
    85%{opacity:0.9}
    100%{transform:translateX(500px);opacity:0}
  }
  @keyframes gl-trefoil{
    0%,100%{filter:brightness(0.8)}
    50%{filter:brightness(1.6) saturate(1.8)}
  }
  #gl-caption{position:fixed;left:8px;bottom:7px;font:11px/1 monospace;color:#c8860a;opacity:0.45;pointer-events:none}
</style>
</head>
<body>
<div id="gl-wrap">
<svg id="gl-svg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="gl-arch-l">
      <path d="M60,460 L60,160 Q60,80 120,80 Q180,80 180,160 L180,460 Z"/>
    </clipPath>
    <clipPath id="gl-arch-c">
      <path d="M190,460 L190,130 Q190,40 250,40 Q310,40 310,130 L310,460 Z"/>
    </clipPath>
    <clipPath id="gl-arch-r">
      <path d="M320,460 L320,160 Q320,80 380,80 Q440,80 440,160 L440,460 Z"/>
    </clipPath>
    <linearGradient id="gl-beam-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8f0dc" stop-opacity="0"/>
      <stop offset="30%" stop-color="#f8f0dc" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#fffbe0" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#f8f0dc" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f8f0dc" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="500" height="500" fill="#0a0608"/>

  <!-- Left lancet — hue-cycles independently -->
  <g class="gl-left">
    <path d="M60,460 L60,160 Q60,80 120,80 Q180,80 180,160 L180,460 Z" fill="#0a0608" stroke="#2a1a24" stroke-width="8"/>
    <g clip-path="url(#gl-arch-l)">
      <rect x="65" y="340" width="110" height="115" fill="#8b1a1a" stroke="#0a0608" stroke-width="3"/>
      <rect x="65" y="260" width="50" height="75" fill="#c8860a" stroke="#0a0608" stroke-width="3"/>
      <rect x="125" y="260" width="50" height="75" fill="#1a3a6b" stroke="#0a0608" stroke-width="3"/>
      <rect x="65" y="190" width="50" height="65" fill="#0d5c2e" stroke="#0a0608" stroke-width="3"/>
      <rect x="125" y="190" width="50" height="65" fill="#5b2d8e" stroke="#0a0608" stroke-width="3"/>
      <path d="M65,190 L120,100 L175,190 Z" fill="#d4a017" stroke="#0a0608" stroke-width="3"/>
      <path d="M80,170 L120,115 L160,170 Z" fill="#f8f0dc" stroke="#0a0608" stroke-width="2"/>
    </g>
    <path d="M60,460 L60,160 Q60,80 120,80 Q180,80 180,160 L180,460" fill="none" stroke="#1a1218" stroke-width="8"/>
  </g>

  <!-- Centre lancet — different timing -->
  <g class="gl-centre">
    <path d="M190,460 L190,130 Q190,40 250,40 Q310,40 310,130 L310,460 Z" fill="#0a0608" stroke="#2a1a24" stroke-width="8"/>
    <g clip-path="url(#gl-arch-c)">
      <rect x="195" y="350" width="110" height="105" fill="#1a3a6b" stroke="#0a0608" stroke-width="3"/>
      <rect x="195" y="270" width="48" height="75" fill="#8b1a1a" stroke="#0a0608" stroke-width="3"/>
      <rect x="257" y="270" width="48" height="75" fill="#0d5c2e" stroke="#0a0608" stroke-width="3"/>
      <rect x="195" y="190" width="48" height="75" fill="#d4a017" stroke="#0a0608" stroke-width="3"/>
      <rect x="257" y="190" width="48" height="75" fill="#5b2d8e" stroke="#0a0608" stroke-width="3"/>
      <rect x="195" y="130" width="48" height="55" fill="#c8860a" stroke="#0a0608" stroke-width="3"/>
      <rect x="257" y="130" width="48" height="55" fill="#8b1a1a" stroke="#0a0608" stroke-width="3"/>
      <path d="M195,130 L250,48 L305,130 Z" fill="#5b2d8e" stroke="#0a0608" stroke-width="3"/>
      <path d="M210,118 L250,62 L290,118 Z" fill="#f8f0dc" stroke="#0a0608" stroke-width="2"/>
      <circle cx="250" cy="90" r="18" fill="#d4a017" stroke="#0a0608" stroke-width="2"/>
    </g>
    <path d="M190,460 L190,130 Q190,40 250,40 Q310,40 310,130 L310,460" fill="none" stroke="#1a1218" stroke-width="8"/>
  </g>

  <!-- Right lancet — third timing -->
  <g class="gl-right">
    <path d="M320,460 L320,160 Q320,80 380,80 Q440,80 440,160 L440,460 Z" fill="#0a0608" stroke="#2a1a24" stroke-width="8"/>
    <g clip-path="url(#gl-arch-r)">
      <rect x="325" y="340" width="110" height="115" fill="#5b2d8e" stroke="#0a0608" stroke-width="3"/>
      <rect x="325" y="260" width="50" height="75" fill="#d4a017" stroke="#0a0608" stroke-width="3"/>
      <rect x="385" y="260" width="50" height="75" fill="#8b1a1a" stroke="#0a0608" stroke-width="3"/>
      <rect x="325" y="190" width="50" height="65" fill="#1a3a6b" stroke="#0a0608" stroke-width="3"/>
      <rect x="385" y="190" width="50" height="65" fill="#c8860a" stroke="#0a0608" stroke-width="3"/>
      <path d="M325,190 L380,100 L435,190 Z" fill="#0d5c2e" stroke="#0a0608" stroke-width="3"/>
      <path d="M340,170 L380,115 L420,170 Z" fill="#f8f0dc" stroke="#0a0608" stroke-width="2"/>
    </g>
    <path d="M320,460 L320,160 Q320,80 380,80 Q440,80 440,160 L440,460" fill="none" stroke="#1a1218" stroke-width="8"/>
  </g>

  <!-- Trefoils that pulse brightness -->
  <g class="gl-trefoil">
    <circle cx="120" cy="65" r="22" fill="#c8860a" stroke="#0a0608" stroke-width="3"/>
    <circle cx="100" cy="52" r="12" fill="#8b1a1a" stroke="#0a0608" stroke-width="2"/>
    <circle cx="140" cy="52" r="12" fill="#1a3a6b" stroke="#0a0608" stroke-width="2"/>
    <circle cx="380" cy="65" r="22" fill="#0d5c2e" stroke="#0a0608" stroke-width="3"/>
    <circle cx="360" cy="52" r="12" fill="#5b2d8e" stroke="#0a0608" stroke-width="2"/>
    <circle cx="400" cy="52" r="12" fill="#d4a017" stroke="#0a0608" stroke-width="2"/>
  </g>

  <!-- Sweeping light beam — translates across full width -->
  <rect id="gl-beam" x="-40" y="40" width="80" height="420" fill="url(#gl-beam-grad)" rx="2"/>

  <!-- Stone floor suggestion -->
  <rect x="0" y="460" width="500" height="40" fill="#100810"/>
  <line x1="0" y1="460" x2="500" y2="460" stroke="#2a1a24" stroke-width="4"/>
</svg>
</div>
<div id="gl-caption">gothic lancet · stained glass</div>
<script>
(()=>{
  const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
  if(reduce){
    document.querySelectorAll('.gl-left,.gl-centre,.gl-right,.gl-trefoil').forEach(el=>el.style.animation='none');
    const beam=document.getElementById('gl-beam');
    if(beam) beam.style.display='none';
    return;
  }
  document.addEventListener('visibilitychange',()=>{});
})();
</script>
</body>
</html>
