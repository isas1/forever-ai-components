<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Client satisfaction score ring: a large radial score out of ten draws in on load, with a rotating strip of short client quotes beneath it cross-fading on a slow loop." >
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Satisfaction Score Ring</title>
<style>
:root{
  --pro-bg:#0d1117;
  --pro-surface:#161b22;
  --pro-border:rgba(255,255,255,.08);
  --pro-text:#e6edf3;
  --pro-muted:#8b949e;
  --pro-accent:#7c9cff;
  --pro-radius:8px;
  --pro-font:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--pro-bg)}
.asr-stage{position:fixed;inset:0;padding:3vmin;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:2vmin;font-family:var(--pro-font);color:var(--pro-text)}
.asr-ring{position:relative;width:min(64vmin,92%);aspect-ratio:1;border-radius:50%;
  background:conic-gradient(from -90deg,var(--pro-accent) calc(var(--pct,0)*1%),var(--pro-border) 0)}
.asr-hole{position:absolute;inset:15%;border-radius:50%;background:var(--pro-surface);border:1px solid var(--pro-border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.4vmin}
.asr-num{font-size:clamp(26px,11vmin,58px);font-weight:800;letter-spacing:-.02em;color:var(--pro-accent);font-variant-numeric:tabular-nums}
.asr-den{font-size:clamp(8px,2vmin,13px);color:var(--pro-muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.asr-quote{min-height:3em;max-width:94%;text-align:center;font-size:clamp(11px,2.6vmin,16px);color:var(--pro-muted);
  transition:opacity .5s ease}
.asr-quote b{color:var(--pro-text);font-weight:600}
.cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
  color:var(--pro-muted);opacity:.5;letter-spacing:.08em;text-transform:uppercase;
  user-select:none;pointer-events:none}
</style>
</head>
<body>
  <div class="asr-stage">
    <div class="asr-ring" id="asr-ring" role="img" aria-label="Client satisfaction score of 9.4 out of 10 shown as a radial ring, with a rotating strip of short client quotes underneath.">
      <div class="asr-hole"><div class="asr-num" id="asr-num">9.4</div><div class="asr-den">out of 10</div></div>
    </div>
    <div class="asr-quote" id="asr-quote"></div>
  </div>
  <div class="cap" aria-hidden="true">Satisfaction Score Ring</div>
  <script>(function(){"use strict";
  var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  var SCORE=9.4;
  var quotes=[
    "<b>“Calm, precise, always on time.”</b> — Sofie B.",
    "<b>“Sharper than what we asked for.”</b> — Ines C.",
    "<b>“Rare combination of rigor and taste.”</b> — Anders L."
  ];
  var ring=document.getElementById('asr-ring'), num=document.getElementById('asr-num'), qEl=document.getElementById('asr-quote');
  function setScore(v,animatePct){
    ring.style.setProperty('--pct',(v*10).toFixed(1));
    num.textContent=v.toFixed(1);
  }
  var idx=0; qEl.innerHTML=quotes[0];
  if(reduce){ setScore(SCORE); return; }

  ring.style.setProperty('--pct','0');
  var t0=null;
  function grow(ts){
    if(t0===null)t0=ts;
    var p=Math.min(1,(ts-t0)/1200), e=1-Math.pow(1-p,3);
    setScore(SCORE*e);
    if(p<1) requestAnimationFrame(grow);
  }
  requestAnimationFrame(grow);

  var running=true;
  document.addEventListener('visibilitychange',function(){running=!document.hidden;});
  function loop(){
    setTimeout(function(){
      if(!running){ loop(); return; }
      qEl.style.opacity='0';
      setTimeout(function(){ idx=(idx+1)%quotes.length; qEl.innerHTML=quotes[idx]; qEl.style.opacity='1'; },420);
      loop();
    },3800);
  }
  loop();
  })();</script>

</body>
</html>
