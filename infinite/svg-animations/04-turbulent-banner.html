<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="description" content="The word TURBULENT in serif gradient ink rippling under animated fractal-noise heat-haze displacement, with a dark vignette.">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Turbulent Banner</title>
<style>
html,body{margin:0;height:100%;overflow:hidden}
body{background:#0b0d12;display:grid;place-items:center}
#ssa04-stage{width:100%;height:100%;display:block}
.cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
  color:#7c5cff;opacity:.45;letter-spacing:.08em;text-transform:uppercase;user-select:none}
@media (prefers-reduced-motion:reduce){.cap{opacity:.45}}
</style><script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/svg-animations/04-turbulent-banner.html",
 "title": "Turbulent Banner",
 "description": "Serif gradient \"TURBULENT\" ripples under animated feTurbulence heat-haze; baseFrequency and displacement scale breathe via coupled sines, dark vignette overlay.",
 "useWhen": "Dark-mode hero banners, title cards, or ambient displays needing dramatic animated text without canvas overhead.",
 "avoidWhen": "Light backgrounds (hardcoded dark navy). Contexts where legibility is critical — displacement makes text harder to read at peak swell.",
 "agentPrompt": "Change the banner word to 'VELOCITY', update the gradient stops to amber (#ffb347, #ff6b00, #a33f00), and slow the swell by changing t*0.6 to t*0.3.",
 "editableAreas": [
  "banner text content (TURBULENT)",
  "gradient stop colors (#b9a9ff, #7c5cff, #4d33c7)",
  "displacement scale range (20+12 in sc formula)",
  "noise drift speed (t+=0.016 and sine multipliers)",
  "font size and letter-spacing (74px, 2)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (still() fallback)",
  "visibilitychange pause/resume",
  "SVG filter region padding (x/y -30%, width/height 160%)"
 ],
 "knownLimitations": [
  "feTurbulence seed crawl causes micro-jitter on some renderers at high zoom",
  "Background color hardcoded in both CSS and SVG rect — must update both to change theme",
  "No touch/pointer interactivity — purely passive"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [

 ]

</head><body>
<svg id="ssa04-stage" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice"
  role="img" aria-label="Rippling banner reading TURBULENT distorted by heat-haze turbulence">
  <defs>
    <filter id="ssa04-warp" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence id="ssa04-turb" type="fractalNoise" baseFrequency="0.012 0.022"
        numOctaves="3" seed="7" result="ssa04-noise"/>
      <feDisplacementMap id="ssa04-disp" in="SourceGraphic" in2="ssa04-noise"
        scale="26" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <linearGradient id="ssa04-ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b9a9ff"/>
      <stop offset=".5" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#4d33c7"/>
    </linearGradient>
    <radialGradient id="ssa04-vig" cx=".5" cy=".5" r=".75">
      <stop offset=".55" stop-color="#0b0d12" stop-opacity="0"/>
      <stop offset="1" stop-color="#05060a" stop-opacity=".9"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="400" height="400" fill="#0b0d12"/>
  <g filter="url(#ssa04-warp)">
    <g stroke="#7c5cff" stroke-opacity=".10" stroke-width="1">
      <line x1="0" y1="118" x2="400" y2="118"/><line x1="0" y1="160" x2="400" y2="160"/>
      <line x1="0" y1="240" x2="400" y2="240"/><line x1="0" y1="282" x2="400" y2="282"/>
    </g>
    <text x="200" y="218" text-anchor="middle"
      font-family="Georgia,'Times New Roman',serif" font-weight="700"
      font-size="74" letter-spacing="2" fill="url(#ssa04-ink)">TURBULENT</text>
    <text x="200" y="252" text-anchor="middle"
      font-family="ui-monospace,Menlo,monospace" font-weight="600"
      font-size="13" letter-spacing="9" fill="#7c5cff" fill-opacity=".7">BANNER</text>
  </g>
  <rect x="0" y="0" width="400" height="400" fill="url(#ssa04-vig)"/>
</svg>
<div class="cap">Turbulent Banner</div>
<script>(function(){
  var turb=document.getElementById('ssa04-turb'),
      disp=document.getElementById('ssa04-disp'),
      reduce=matchMedia('(prefers-reduced-motion:reduce)').matches,
      raf=0,t=0,running=true;
  function frame(){
    if(!running)return;
    t+=0.016;
    // slow living drift of the noise field — two coupled sines so it never visibly loops
    var bfx=0.0115+0.0042*Math.sin(t*0.27),
        bfy=0.0205+0.0060*Math.sin(t*0.19+1.3);
    turb.setAttribute('baseFrequency',bfx.toFixed(5)+' '+bfy.toFixed(5));
    // breathing displacement: settles and swells like cloth catching wind
    var sc=20+12*(0.5+0.5*Math.sin(t*0.6));
    disp.setAttribute('scale',sc.toFixed(2));
    // seed crawls slowly for continuous re-shuffle of the texture
    turb.setAttribute('seed',(7+Math.floor(t*1.3)).toString());
    raf=requestAnimationFrame(frame);
  }
  function still(){
    turb.setAttribute('baseFrequency','0.012 0.020');
    turb.setAttribute('seed','7');
    disp.setAttribute('scale','14');
  }
  function vis(){
    if(document.hidden){running=false;if(raf)cancelAnimationFrame(raf),raf=0;}
    else if(!reduce){running=true;if(!raf)raf=requestAnimationFrame(frame);}
  }
  document.addEventListener('visibilitychange',vis);
  if(reduce){still();}else{raf=requestAnimationFrame(frame);}
})();</script>
</body></html>
