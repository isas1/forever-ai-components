<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="description" content="Three nested counter-rotating violet gradient arcs with a pulsing core and a bright racing dash, forming a glowing orbital loader.">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Orbit Spinner</title>
<style>
html,body{margin:0;height:100%;overflow:hidden}
body{background:#0b0d12;display:grid;place-items:center}
.ssa08-stage{width:min(62vmin,440px);height:min(62vmin,440px);max-width:100%;max-height:100%}
#ssa08-c{display:block;width:100%;height:100%}
/* glow lives on a static filter so spinning arcs never re-blur */
.ssa08-arc{fill:none;stroke-linecap:round;filter:url(#ssa08-glow)}
.cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
  color:#7c5cff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
@media (prefers-reduced-motion:reduce){.ssa08-arc{filter:url(#ssa08-glow)}}
</style><script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/svg-animations/08-orbit-spinner.html",
 "title": "Orbit Spinner",
 "description": "Three nested violet-gradient arcs counter-rotate at varied speeds with a glow filter; a racing bright dash and pulsing core complete the orbital loader.",
 "useWhen": "Loading states, async operation indicators, dark-themed dashboards needing a polished animated spinner.",
 "avoidWhen": "Light backgrounds (hardcoded dark navy body). Contexts where a minimal single-ring spinner suffices — this reads as decorative.",
 "agentPrompt": "Change accent to teal by replacing #7c5cff with #00c9a7 and #5b8cff with #00e5ff in all gradient stops, then slow the outer arc by changing dur=\"6.2s\" to dur=\"9s\".",
 "editableAreas": [
  "arc rotation speeds (dur on each animateTransform)",
  "gradient stop colors (#7c5cff, #5b8cff, #c4b5ff)",
  "stroke widths (3.4 / 4 / 4.6)",
  "glow blur radius (stdDeviation=2.4)",
  "racing dash length (stroke-dasharray 14 476)"
 ],
 "preserveElements": [
  "SVG glow filter (feGaussianBlur + feMerge)",
  "IIFE with pauseAnimations/unpauseAnimations visibility guard",
  "prefers-reduced-motion settle() freeze via setCurrentTime + pauseAnimations"
 ],
 "knownLimitations": [
  "Background color hardcoded dark navy — must edit body CSS to use on light themes",
  "SMIL animations may stutter on Chrome with heavy filter layers at certain viewport scales"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "loader",
  "spinner",
  "orbit",
  "svg",
  "glow",
  "gradient",
  "counter-rotate"
 ]
}
</script>
</head><body>
<div class="ssa08-stage">
<svg id="ssa08-c" viewBox="0 0 200 200" role="img" aria-label="Nested orbiting arcs loader">
  <defs>
    <filter id="ssa08-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ssa08-g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/><stop offset="1" stop-color="#c4b5ff"/>
    </linearGradient>
    <linearGradient id="ssa08-g2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b8cff"/><stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
    <linearGradient id="ssa08-g3" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#7c5cff"/><stop offset="1" stop-color="#9d7bff"/>
    </linearGradient>
  </defs>

  <!-- faint guide rings, breathing softly -->
  <g fill="none" stroke="#7c5cff" stroke-opacity=".09">
    <circle cx="100" cy="100" r="78"/><circle cx="100" cy="100" r="56"/><circle cx="100" cy="100" r="34"/>
  </g>

  <!-- OUTER: slow, wide sweep, two opposed arcs -->
  <g>
    <circle class="ssa08-arc" cx="100" cy="100" r="78" stroke="url(#ssa08-g1)" stroke-width="3.4"
      stroke-dasharray="150 340" stroke-dashoffset="0"/>
    <circle class="ssa08-arc" cx="100" cy="100" r="78" stroke="url(#ssa08-g1)" stroke-width="2"
      stroke-opacity=".5" stroke-dasharray="40 450" stroke-dashoffset="245"/>
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100"
      dur="6.2s" calcMode="spline" keyTimes="0;1" keySplines=".42 0 .58 1" repeatCount="indefinite"/>
  </g>

  <!-- MID: counter-rotating, faster, ease-in-out cadence -->
  <g>
    <circle class="ssa08-arc" cx="100" cy="100" r="56" stroke="url(#ssa08-g2)" stroke-width="4"
      stroke-dasharray="118 234" stroke-dashoffset="0"/>
    <animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100"
      dur="3.4s" calcMode="spline" keyTimes="0;1" keySplines=".5 0 .5 1" repeatCount="indefinite"/>
  </g>

  <!-- INNER: quick, confident, slight pulse -->
  <g>
    <circle class="ssa08-arc" cx="100" cy="100" r="34" stroke="url(#ssa08-g3)" stroke-width="4.6"
      stroke-dasharray="64 150" stroke-dashoffset="0"/>
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100"
      dur="2s" calcMode="spline" keyTimes="0;1" keySplines=".62 0 .38 1" repeatCount="indefinite"/>
  </g>

  <!-- core: a small steady pulse so the centre reads as a focal point -->
  <circle cx="100" cy="100" r="5" fill="url(#ssa08-g1)" filter="url(#ssa08-glow)">
    <animate attributeName="r" values="4;6.2;4" dur="2s" calcMode="spline"
      keyTimes="0;.5;1" keySplines=".4 0 .2 1;.8 0 .6 1" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values=".7;1;.7" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- dash-offset shimmer: a bright short arc that races the outer ring -->
  <circle class="ssa08-arc" cx="100" cy="100" r="78" stroke="#e9e3ff" stroke-width="2.2"
    stroke-opacity=".85" stroke-dasharray="14 476">
    <animate attributeName="stroke-dashoffset" from="0" to="-490" dur="2.6s"
      calcMode="spline" keyTimes="0;1" keySplines=".55 0 .45 1" repeatCount="indefinite"/>
  </circle>
</svg>
</div>
<div class="cap">Orbit Spinner</div>
<script>(function(){
  var svg=document.getElementById('ssa08-c');
  var reduce=matchMedia('(prefers-reduced-motion:reduce)');

  function settle(){
    // freeze SMIL on a single legible composed frame
    try{svg.setCurrentTime(1.05);}catch(e){}
    try{svg.pauseAnimations();}catch(e){}
  }
  function vis(){
    if(reduce.matches)return;            // already settled, stay put
    if(document.hidden){try{svg.pauseAnimations();}catch(e){}}
    else{try{svg.unpauseAnimations();}catch(e){}}
  }

  if(reduce.matches){settle();}
  document.addEventListener('visibilitychange',vis);
  if(reduce.addEventListener)reduce.addEventListener('change',function(){
    if(reduce.matches)settle();else{try{svg.unpauseAnimations();}catch(e){}}
  });
  vis();
})();</script>
</body></html>
