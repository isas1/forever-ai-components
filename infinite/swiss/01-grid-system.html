<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Swiss 12-column grid where ink, outline and red blocks scale in and out composing an asymmetric modular layout titled GRID SYSTEM.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grid System</title>
<style>
  :root{
    --sw01-bg:#0f0f10;
    --sw01-ink:#f2f0ea;
    --sw01-red:#e8482b;
    --sw01-grey:#2a2a2d;
    --sw01-dim:#6f6f76;
  }
  html,body{margin:0;height:100%;background:var(--sw01-bg);overflow:hidden}
  .sw01-stage{
    position:fixed;inset:0;
    display:grid;
    grid-template-columns:repeat(12,1fr);
    grid-template-rows:repeat(12,1fr);
    gap:1.2%;
    padding:5.5%;
    box-sizing:border-box;
    background:var(--sw01-bg);
    font-family:"Helvetica Neue",Helvetica,Arial,"Inter",system-ui,sans-serif;
  }
  /* baseline modular cells — static, low contrast */
  .sw01-base{
    border:1px solid var(--sw01-grey);
    opacity:.55;
  }
  /* animated blocks that compose / decompose */
  .sw01-blk{
    position:relative;
    will-change:transform,opacity;
    transform-origin:center;
    animation:sw01-pulse 9s cubic-bezier(.7,0,.2,1) infinite both;
  }
  .sw01-fill{background:var(--sw01-ink)}
  .sw01-red{background:var(--sw01-red)}
  .sw01-out{background:transparent;border:2px solid var(--sw01-ink)}

  /* typographic plate */
  .sw01-plate{
    align-self:end;
    color:var(--sw01-ink);
    line-height:.84;
    letter-spacing:-.03em;
    font-weight:700;
    user-select:none;
    overflow:hidden;
  }
  .sw01-plate b{display:block;font-size:clamp(20px,7.5vmin,72px);font-weight:800}
  .sw01-plate b em{color:var(--sw01-red);font-style:normal}
  .sw01-tag{
    color:var(--sw01-dim);
    font-size:clamp(7px,1.5vmin,12px);
    font-weight:600;
    letter-spacing:.34em;
    text-transform:uppercase;
    align-self:start;
    text-align:right;
  }
  .sw01-num{
    color:var(--sw01-dim);
    font:700 clamp(9px,1.9vmin,15px)/1 ui-monospace,Menlo,monospace;
    align-self:start;letter-spacing:.05em;
  }
  /* a single bold rule — Swiss horizontal divider */
  .sw01-rule{background:var(--sw01-ink);transform-origin:left center;animation:sw01-rule 9s cubic-bezier(.7,0,.2,1) infinite both}

  @keyframes sw01-pulse{
    0%   {transform:scale(.04);opacity:0}
    14%  {transform:scale(1);opacity:1}
    62%  {transform:scale(1);opacity:1}
    78%  {transform:scale(.04);opacity:0}
    100% {transform:scale(.04);opacity:0}
  }
  @keyframes sw01-rule{
    0%   {transform:scaleX(0)}
    16%  {transform:scaleX(1)}
    64%  {transform:scaleX(1)}
    80%  {transform:scaleX(0)}
    100% {transform:scaleX(0)}
  }

  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important;animation-delay:0ms!important}
    .sw01-blk{transform:none!important;opacity:1!important}
    .sw01-rule{transform:scaleX(1)!important}
  }
</style>

</head>
<body>
  <div class="sw01-stage" id="sw01-stage" role="img"
       aria-label="Swiss typographic modular grid composing and decomposing solid and outlined blocks with a red accent">
  </div>
  <div class="cap">Grid System</div>

  <script>
  (function(){
    "use strict";
    var stage=document.getElementById("sw01-stage");
    if(!stage)return;

    // 12x12 grid. Define modular blocks by [col,row,colSpan,rowSpan,kind,delaySlot].
    // kinds: 'fill' ink, 'red' accent, 'out' outline. Asymmetric balance.
    var blocks=[
      [1, 1, 3, 3, "fill", 0],
      [4, 1, 2, 2, "out",  3],
      [9, 1, 4, 1, "red",  1],
      [1, 4, 1, 4, "red",  4],
      [2, 5, 4, 3, "out",  2],
      [7, 3, 3, 3, "fill", 5],
      [11,3, 2, 5, "out",  6],
      [6, 7, 5, 2, "fill", 3],
      [1, 9, 5, 1, "red",  7]
    ];
    // baseline modular cells (light grid memory) — a few scattered
    var bases=[
      [4, 3, 2, 2],[10,2,1,1],[7,6,1,1],[1,8,1,1],[11,8,2,2],[6,9,2,3]
    ];

    var html="";
    var i,b;
    for(i=0;i<bases.length;i++){
      b=bases[i];
      html+='<div class="sw01-base" style="grid-column:'+b[0]+' / span '+b[2]+
            ';grid-row:'+b[1]+' / span '+b[3]+'"></div>';
    }
    var STEP=0.62; // seconds between block reveals — typographic rhythm
    for(i=0;i<blocks.length;i++){
      b=blocks[i];
      var cls= b[4]==="red" ? "sw01-red" : b[4]==="out" ? "sw01-out" : "sw01-fill";
      var d=(b[5]*STEP).toFixed(2);
      html+='<div class="sw01-blk '+cls+'" style="grid-column:'+b[0]+' / span '+b[2]+
            ';grid-row:'+b[1]+' / span '+b[3]+';animation-delay:'+d+'s"></div>';
    }

    // typographic plate: bottom-left big word, with red slash on "SYSTEM"
    html+='<div class="sw01-num" style="grid-column:1 / span 2;grid-row:1 / span 1">01 / 12</div>';
    html+='<div class="sw01-tag" style="grid-column:9 / span 4;grid-row:11 / span 1">Modul · Raster · Ordnung</div>';
    html+='<div class="sw01-rule" style="grid-column:1 / span 8;grid-row:10 / span 1;height:3px;align-self:center"></div>';
    html+='<div class="sw01-plate" style="grid-column:1 / span 9;grid-row:11 / span 2">'+
          '<b>GRID</b><b><em>SYSTEM</em></b></div>';

    stage.innerHTML=html;

    // Reduced-motion: settle to one composed frame, no looping.
    var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;

    // Pause/resume animations on tab visibility (CSS-only -> toggle play state).
    function setState(s){
      var els=stage.querySelectorAll(".sw01-blk,.sw01-rule");
      for(var j=0;j<els.length;j++){ els[j].style.animationPlayState=s; }
    }
    if(!reduce){
      document.addEventListener("visibilitychange",function(){
        setState(document.hidden ? "paused" : "running");
      });
    }
  })();
  </script>
</body>
</html>
