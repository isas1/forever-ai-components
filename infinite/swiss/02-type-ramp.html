<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Five-step type scale of weighted words drifting and fading on a baseline grid with breathing red accent rules.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Type Ramp</title>
<style>
  html,body{margin:0;height:100%;background:#0f0f10;overflow:hidden}
  .sw02-stage{position:absolute;inset:0;color:#f2f2f0;
    font-family:"Helvetica Neue",Helvetica,Arial,"Inter",system-ui,sans-serif}
  .sw02-grid{position:absolute;inset:0}
  .sw02-base{position:absolute;left:0;right:0;height:1px;background:#1d1d1f}
  .sw02-col{position:absolute;top:0;bottom:0;width:1px;background:#171718}
  .sw02-rule{position:absolute;background:#e8482b}
  .sw02-rt{left:7%;right:7%;top:9.5%;height:2px;transform-origin:left center}
  .sw02-rb{left:7%;right:7%;bottom:9%;height:2px;transform-origin:right center}
  .sw02-rows{position:absolute;left:7%;right:7%;top:16%;bottom:15%;
    display:flex;flex-direction:column;justify-content:space-between}
  .sw02-row{position:relative;display:flex;align-items:baseline;
    white-space:nowrap;will-change:transform,opacity}
  .sw02-w{font-size:11px;font-weight:400;color:#8a8a8c;letter-spacing:.14em;
    flex:0 0 auto;width:14%;text-transform:uppercase}
  .sw02-word{flex:1 1 auto;line-height:.92;letter-spacing:-.02em;color:#f2f2f0}
  .sw02-r1 .sw02-word{font-size:6.5vmin;font-weight:200}
  .sw02-r2 .sw02-word{font-size:8.5vmin;font-weight:400}
  .sw02-r3 .sw02-word{font-size:11vmin;font-weight:700;color:#e8482b}
  .sw02-r4 .sw02-word{font-size:7vmin;font-weight:500}
  .sw02-r5 .sw02-word{font-size:4.5vmin;font-weight:300;letter-spacing:.02em}
  .sw02-num{position:absolute;right:7%;font-size:11px;font-weight:400;
    color:#8a8a8c;letter-spacing:.1em;font-variant-numeric:tabular-nums}
  .sw02-meta{position:absolute;left:7%;top:11%;font-size:11px;font-weight:500;
    color:#8a8a8c;letter-spacing:.22em;text-transform:uppercase}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
    color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important}}
</style>
</head>
<body>
<div class="sw02-stage" id="sw02-stage" role="img" aria-label="Swiss typographic study: a five-step type scale animating through weights and sizes on a baseline grid, with a red accent rule.">
  <div class="sw02-grid" id="sw02-grid" aria-hidden="true"></div>
  <div class="sw02-rule sw02-rt" id="sw02-rt" aria-hidden="true"></div>
  <div class="sw02-meta" aria-hidden="true">Type Scale / 5 Steps</div>
  <div class="sw02-rows" id="sw02-rows" aria-hidden="true">
    <div class="sw02-row sw02-r1"><span class="sw02-w">Light</span><span class="sw02-word">Grid</span></div>
    <div class="sw02-row sw02-r2"><span class="sw02-w">Roman</span><span class="sw02-word">Order</span></div>
    <div class="sw02-row sw02-r3"><span class="sw02-w">Bold</span><span class="sw02-word">Ramp</span></div>
    <div class="sw02-row sw02-r4"><span class="sw02-w">Medium</span><span class="sw02-word">Rhythm</span></div>
    <div class="sw02-row sw02-r5"><span class="sw02-w">Thin</span><span class="sw02-word">Baseline</span></div>
  </div>
  <div class="sw02-rule sw02-rb" id="sw02-rb" aria-hidden="true"></div>
</div>
<div class="cap">Type Ramp</div>
<script>
(function(){
  var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  var grid=document.getElementById('sw02-grid');
  var rows=Array.prototype.slice.call(document.querySelectorAll('.sw02-row'));
  var rt=document.getElementById('sw02-rt'), rb=document.getElementById('sw02-rb');
  var N=rows.length;

  function buildGrid(){
    grid.textContent='';
    var i, frag=document.createDocumentFragment();
    for(i=1;i<8;i++){
      var c=document.createElement('div');
      c.className='sw02-col'; c.style.left=(i*12.5)+'%';
      frag.appendChild(c);
    }
    for(i=1;i<=N;i++){
      var b=document.createElement('div');
      b.className='sw02-base'; b.style.top=(15+i*13.5)+'%';
      frag.appendChild(b);
      var num=document.createElement('div');
      num.className='sw02-num'; num.style.top=(13.5+i*13.5)+'%';
      num.textContent='0'+i+' / 0'+N;
      frag.appendChild(num);
    }
    grid.appendChild(frag);
  }
  buildGrid();

  // cache per-row phase offsets (allocation-free loop)
  var phase=new Float32Array(N), amp=new Float32Array(N);
  for(var k=0;k<N;k++){ phase[k]=k*0.62; amp[k]=14-k*1.4; }

  function frame(t){
    var x=t*0.0011;
    // accent rules: scaleX breathing, opacity steady (compositor only)
    var st=0.5+0.5*Math.sin(x*0.9);
    rt.style.transform='scaleX('+(0.18+0.82*st)+')';
    rb.style.transform='scaleX('+(0.18+0.82*(1-st))+')';
    for(var i=0;i<N;i++){
      var p=Math.sin(x+phase[i]);
      var tx=p*amp[i];
      var op=0.42+0.58*(0.5+0.5*Math.sin(x*0.8+phase[i]));
      var r=rows[i];
      r.style.transform='translate3d('+tx+'px,0,0)';
      r.style.opacity=op;
    }
  }

  function drawOne(){
    rt.style.transform='scaleX(1)';
    rb.style.transform='scaleX(0.55)';
    for(var i=0;i<N;i++){ rows[i].style.transform='translate3d(0,0,0)'; rows[i].style.opacity=(i===2?1:0.78); }
  }

  if(reduce){ drawOne(); return; }

  var raf=0, running=false;
  function loop(t){ frame(t); raf=requestAnimationFrame(loop); }
  function start(){ if(!running){ running=true; raf=requestAnimationFrame(loop); } }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }
  document.addEventListener('visibilitychange',function(){ document.hidden?stop():start(); });
  window.addEventListener('resize',buildGrid);
  start();
})();
</script>
</body>
</html>
