<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Three justified columns of rectangular text-block lines flow in from the left and justify in typographic rhythm under COLUMN FLOW.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Column Flow</title>
<style>
  :root{
    --sw03-bg:#0f0f10;
    --sw03-ink:#f2f0ea;
    --sw03-red:#e8482b;
    --sw03-dim:#6f6f76;
    --sw03-grey:#26262a;
  }
  html,body{margin:0;height:100%;background:var(--sw03-bg);overflow:hidden}
  .sw03-stage{
    position:fixed;inset:0;
    display:grid;
    grid-template-columns:repeat(12,1fr);
    grid-template-rows:repeat(12,1fr);
    column-gap:1.4%;row-gap:1.2%;
    padding:6%;
    box-sizing:border-box;
    background:var(--sw03-bg);
    font-family:"Helvetica Neue",Helvetica,Arial,"Inter",system-ui,sans-serif;
  }
  /* a column field: three justified columns. each holds text-block lines. */
  .sw03-col{position:relative;display:flex;flex-direction:column;justify-content:flex-start;gap:6.5%}
  .sw03-c1{grid-column:1 / span 4;grid-row:3 / span 8}
  .sw03-c2{grid-column:5 / span 4;grid-row:3 / span 8}
  .sw03-c3{grid-column:9 / span 4;grid-row:3 / span 8}

  /* a "line" of set type = a rectangle. flows in from the left, then justifies width. */
  .sw03-ln{
    height:5.4%;
    background:var(--sw03-ink);
    transform-origin:left center;
    will-change:transform,opacity;
    animation:sw03-flow 11s cubic-bezier(.66,0,.2,1) infinite both;
  }
  .sw03-ln.r{background:var(--sw03-red)}
  .sw03-ln.s{height:2.4%;background:var(--sw03-dim)} /* short caption-weight rule */

  /* hairline column guides — the modular memory, static */
  .sw03-guide{border-left:1px solid var(--sw03-grey);opacity:.5}
  .sw03-g1{grid-column:5 / span 1;grid-row:3 / span 8}
  .sw03-g2{grid-column:9 / span 1;grid-row:3 / span 8}

  /* typographic header plate, top-left, asymmetric */
  .sw03-num{grid-column:1 / span 3;grid-row:1 / span 1;
    color:var(--sw03-dim);font:700 clamp(9px,1.9vmin,15px)/1 ui-monospace,Menlo,monospace;
    letter-spacing:.05em;align-self:start}
  .sw03-tag{grid-column:9 / span 4;grid-row:1 / span 1;
    color:var(--sw03-dim);font-size:clamp(7px,1.45vmin,12px);font-weight:600;
    letter-spacing:.32em;text-transform:uppercase;text-align:right;align-self:start}
  .sw03-rule{grid-column:1 / span 12;grid-row:2 / span 1;height:3px;
    background:var(--sw03-ink);align-self:center;
    transform-origin:left center;animation:sw03-rule 11s cubic-bezier(.66,0,.2,1) infinite both}
  .sw03-plate{grid-column:1 / span 8;grid-row:11 / span 2;align-self:end;
    color:var(--sw03-ink);line-height:.82;letter-spacing:-.03em;font-weight:800;user-select:none}
  .sw03-plate b{display:block;font-size:clamp(20px,7.6vmin,70px)}
  .sw03-plate b em{color:var(--sw03-red);font-style:normal}

  /* FLOW: enter ragged-left at small scale-x, then justify to full measure */
  @keyframes sw03-flow{
    0%   {transform:translateX(-14%) scaleX(.16);opacity:0}
    9%   {opacity:1}
    26%  {transform:translateX(0) scaleX(.62);opacity:1}   /* ragged set */
    44%  {transform:translateX(0) scaleX(1);opacity:1}      /* justified */
    78%  {transform:translateX(0) scaleX(1);opacity:1}
    90%  {transform:translateX(-14%) scaleX(.16);opacity:0}
    100% {transform:translateX(-14%) scaleX(.16);opacity:0}
  }
  @keyframes sw03-rule{
    0%{transform:scaleX(0)}10%{transform:scaleX(1)}82%{transform:scaleX(1)}
    94%{transform:scaleX(0)}100%{transform:scaleX(0)}
  }

  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important;animation-delay:0ms!important}
    .sw03-ln{transform:none!important;opacity:1!important}
    .sw03-rule{transform:scaleX(1)!important}
  }
</style>
</head>
<body>
  <div class="sw03-stage" id="sw03-stage" role="img"
       aria-label="Swiss typographic composition: rectangular text blocks flow in from the left and justify into three aligned columns, with a red accent line and a heavy rule">
    <div class="sw03-num">03 / 12</div>
    <div class="sw03-tag">Spalte · Satz · Fluss</div>
    <div class="sw03-rule"></div>
    <div class="sw03-guide sw03-g1"></div>
    <div class="sw03-guide sw03-g2"></div>
    <div class="sw03-col sw03-c1" id="sw03-cA"></div>
    <div class="sw03-col sw03-c2" id="sw03-cB"></div>
    <div class="sw03-col sw03-c3" id="sw03-cC"></div>
    <div class="sw03-plate"><b>COLUMN</b><b><em>FLOW</em></b></div>
  </div>
  <div class="cap">Column Flow</div>

  <script>
  (function(){
    "use strict";
    var stage=document.getElementById("sw03-stage");
    if(!stage)return;

    // Each column is a stack of "lines" (text-block rectangles). A few lines
    // are short (s) to read as paragraph rag, a couple are the red accent.
    // [kind, delaySlot] — delaySlot drives typographic rhythm cascade.
    var cols=[
      // column A
      [["",0],["",1],["s",2],["r",3],["",4],["",5],["s",6],["",7]],
      // column B — offset cadence, accent lower
      [["",1],["",2],["",3],["s",4],["",5],["r",6],["",7],["s",8]],
      // column C — sparser, more white space (asymmetric balance)
      [["",2],["",4],["s",5],["",6],["",8],["r",9]]
    ];
    var ids=["sw03-cA","sw03-cB","sw03-cC"];
    var STEP=0.42; // seconds per rhythm slot

    var ci,li,line,el,parent,cls,html;
    for(ci=0;ci<cols.length;ci++){
      parent=document.getElementById(ids[ci]);
      html="";
      for(li=0;li<cols[ci].length;li++){
        line=cols[ci][li];
        cls="sw03-ln"+(line[0]?(" "+line[0]):"");
        html+='<div class="'+cls+'" style="animation-delay:'+
              (line[1]*STEP).toFixed(2)+'s"></div>';
      }
      parent.innerHTML=html;
    }

    // Reduced motion: CSS settles to one justified frame; nothing else to do.
    var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
    if(reduce)return;

    // Pause/resume on tab visibility (CSS-only -> toggle play state).
    var animated=stage.querySelectorAll(".sw03-ln,.sw03-rule");
    document.addEventListener("visibilitychange",function(){
      var s=document.hidden?"paused":"running",k;
      for(k=0;k<animated.length;k++){animated[k].style.animationPlayState=s;}
    });
  })();
  </script>
</body>
</html>
