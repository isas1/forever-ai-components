<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="SVG baseline grid with a red metronome bar ticking pendulum-style across the active baseline as 'tempo' and 'measure' alternate.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Baseline Tick</title>
<style>
  :root{
    --sw04-bg:#0f0f10;
    --sw04-ink:#f2f1ee;
    --sw04-mute:#5a5a5e;
    --sw04-line:#2a2a2d;
    --sw04-red:#e8482b;
  }
  *{margin:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--sw04-bg);overflow:hidden}
  #sw04-stage{
    position:fixed;inset:0;width:100%;height:100%;
    background:var(--sw04-bg);
    font-family:"Helvetica Neue",Helvetica,Arial,"Inter",system-ui,sans-serif;
    color:var(--sw04-ink);
  }
  #sw04-svg{position:absolute;inset:0;width:100%;height:100%;display:block}
  /* baseline rules drawn in SVG; metronome tick animated via transform only */
  #sw04-tick{
    transform-box:fill-box;transform-origin:50% 50%;
    will-change:transform;
    animation:sw04-sweep 2.2s cubic-bezier(.37,0,.63,1) infinite alternate;
  }
  #sw04-bob{
    transform-box:fill-box;transform-origin:50% 50%;
    will-change:transform;
    animation:sw04-bob 2.2s cubic-bezier(.37,0,.63,1) infinite alternate;
  }
  @keyframes sw04-sweep{ from{transform:translateX(0)} to{transform:translateX(var(--sw04-span))} }
  @keyframes sw04-bob{ 0%{transform:scaleY(.86)} 50%{transform:scaleY(1.16)} 100%{transform:scaleY(.86)} }
  .sw04-ph{ opacity:0; animation:sw04-pulse 2.2s steps(1) infinite }
  @keyframes sw04-pulse{ 0%,49%{opacity:0} 50%,100%{opacity:.9} }
  .sw04-ph.b{ animation-delay:1.1s }
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
    #sw04-tick{transform:translateX(calc(var(--sw04-span)*.5))}
    #sw04-bob{transform:scaleY(1)}
    .sw04-ph.a{opacity:.9}
  }
</style>
</head>
<body>
  <div id="sw04-stage" role="img" aria-label="Swiss typographic study: a baseline grid with a red metronome marker ticking across like a pendulum, titled Baseline Tick.">
    <svg id="sw04-svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <defs>
        <clipPath id="sw04-frame"><rect x="32" y="32" width="336" height="336"/></clipPath>
      </defs>

      <g clip-path="url(#sw04-frame)">
        <!-- baseline grid: horizontal type rules -->
        <g stroke="var(--sw04-line)" stroke-width="1">
          <line x1="32" y1="92"  x2="368" y2="92"/>
          <line x1="32" y1="140" x2="368" y2="140"/>
          <line x1="32" y1="188" x2="368" y2="188"/>
          <line x1="32" y1="236" x2="368" y2="236"/>
          <line x1="32" y1="284" x2="368" y2="284"/>
        </g>

        <!-- column ticks along the active baseline (188) -->
        <g stroke="var(--sw04-mute)" stroke-width="1">
          <line x1="68"  y1="183" x2="68"  y2="193"/>
          <line x1="116" y1="183" x2="116" y2="193"/>
          <line x1="164" y1="183" x2="164" y2="193"/>
          <line x1="212" y1="183" x2="212" y2="193"/>
          <line x1="260" y1="183" x2="260" y2="193"/>
          <line x1="308" y1="183" x2="308" y2="193"/>
        </g>

        <!-- the active baseline, emphasized -->
        <line x1="32" y1="188" x2="368" y2="188" stroke="var(--sw04-ink)" stroke-width="1.5"/>

        <!-- phrase: alternates with the beat. typographic rhythm. -->
        <g font-weight="700" letter-spacing="-0.5" text-anchor="start">
          <text class="sw04-ph a" x="68" y="178" font-size="34" fill="var(--sw04-ink)">tempo</text>
          <text class="sw04-ph b" x="68" y="178" font-size="34" fill="var(--sw04-ink)">measure</text>
        </g>

        <!-- pivot anchor for the pendulum -->
        <circle cx="200" cy="188" r="2.5" fill="var(--sw04-ink)"/>

        <!-- the ticking marker: a vertical red bar that sweeps the baseline -->
        <g id="sw04-tick">
          <g id="sw04-bob">
            <rect x="-2" y="148" width="4" height="80" fill="var(--sw04-red)"/>
          </g>
          <circle cx="0" cy="232" r="5" fill="var(--sw04-red)"/>
        </g>

        <!-- index numerals: Swiss numbering -->
        <text x="36" y="58" font-size="11" font-weight="700" fill="var(--sw04-mute)" letter-spacing="1">04</text>
        <text x="364" y="58" font-size="11" font-weight="500" fill="var(--sw04-mute)" letter-spacing="1" text-anchor="end">120 BPM</text>
        <text x="36" y="352" font-size="11" font-weight="500" fill="var(--sw04-red)" letter-spacing="2">BASELINE</text>
      </g>

      <!-- frame margin -->
      <rect x="32" y="32" width="336" height="336" fill="none" stroke="var(--sw04-line)" stroke-width="1"/>
    </svg>
    <div class="cap">Baseline Tick</div>
  </div>

  <script>
  (function(){
    "use strict";
    var svg = document.getElementById('sw04-svg');
    var tick = document.getElementById('sw04-tick');
    if(!svg || !tick) return;

    // span: from leftmost column tick to rightmost, centered on pivot.
    // viewBox is fixed 400 wide, so the sweep is in viewBox units, resolution-independent.
    var SPAN = 132; // px in viewBox units; pendulum start offset
    // place start at left extreme; alternate animation carries it right.
    tick.style.transform = 'translateX(' + (-SPAN/2) + 'px)';
    svg.style.setProperty('--sw04-span', SPAN + 'px');

    var reduce = matchMedia('(prefers-reduced-motion:reduce)');

    function pauseAll(p){
      var t = ['sw04-tick','sw04-bob'];
      for(var i=0;i<t.length;i++){
        var el = document.getElementById(t[i]);
        if(el) el.style.animationPlayState = p ? 'paused' : 'running';
      }
      var ph = document.getElementsByClassName('sw04-ph');
      for(var j=0;j<ph.length;j++) ph[j].style.animationPlayState = p ? 'paused' : 'running';
    }

    if(reduce.matches){
      pauseAll(true); // static settled frame; CSS @media handles the resting pose
      return;
    }

    document.addEventListener('visibilitychange', function(){
      pauseAll(document.hidden);
    });
  })();
  </script>
</body>
</html>
