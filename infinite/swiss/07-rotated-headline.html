<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Bold black-and-white Swiss headline that rotates 90 degrees to snap up a grid column while a red accent block slides in.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rotated Headline</title>
<style>
  :root{
    --sw07-bg:#0f0f10; --sw07-ink:#f4f4f2; --sw07-red:#e8482b; --sw07-grid:#26262a;
  }
  html,body{margin:0;height:100%}
  body{background:var(--sw07-bg);overflow:hidden}
  .sw07-stage{
    position:fixed;inset:0;
    font-family:"Helvetica Neue",Helvetica,Arial,"Inter",system-ui,sans-serif;
    color:var(--sw07-ink);
    container-type:size;
  }
  /* modular grid rules — static, drawn once */
  .sw07-grid{position:absolute;inset:0;pointer-events:none}
  .sw07-grid i{position:absolute;background:var(--sw07-grid)}
  .sw07-grid .sw07-vr{top:0;bottom:0;width:1px}
  .sw07-grid .sw07-hr{left:0;right:0;height:1px}
  .sw07-v1{left:16.66%} .sw07-v2{left:50%} .sw07-v3{left:83.33%}
  .sw07-h1{top:18%} .sw07-h2{top:82%}

  /* top-left metadata block, asymmetric */
  .sw07-meta{position:absolute;left:5.5%;top:8%;
    font:600 clamp(7px,2.2cqmin,11px)/1.5 ui-monospace,Menlo,monospace;
    letter-spacing:.18em;text-transform:uppercase;color:#8d8d92}
  .sw07-meta b{color:var(--sw07-red);font-weight:700}

  /* the rotating headline — pivots about its left baseline, snaps to v1 */
  .sw07-wrap{position:absolute;left:16.66%;top:18%;height:64%;
    display:flex;align-items:flex-start}
  .sw07-head{
    transform-origin:left top;
    font-weight:800;font-size:clamp(34px,17cqmin,150px);
    line-height:.82;letter-spacing:-.03em;margin:0;white-space:nowrap;
    will-change:transform;
    animation:sw07-rot 6.4s cubic-bezier(.76,0,.18,1) infinite both;
  }
  .sw07-head em{font-style:normal;color:var(--sw07-red)}

  /* the headline starts horizontal, rotates +90 to read bottom-to-top up the column */
  @keyframes sw07-rot{
    0%   {transform:rotate(0deg) translateY(-.02em)}
    14%  {transform:rotate(0deg) translateY(-.02em)}
    50%  {transform:rotate(90deg) translateY(-.02em)}
    86%  {transform:rotate(90deg) translateY(-.02em)}
    100% {transform:rotate(0deg) translateY(-.02em)}
  }

  /* accent square that slides in to fill negative space, modular */
  .sw07-sq{position:absolute;left:50%;top:18%;width:33.33%;height:24%;
    background:var(--sw07-red);transform-origin:left top;
    will-change:transform;
    animation:sw07-sq 6.4s cubic-bezier(.76,0,.18,1) infinite both}
  @keyframes sw07-sq{
    0%{transform:scaleX(0)} 14%{transform:scaleX(0)}
    50%{transform:scaleX(1)} 86%{transform:scaleX(1)} 100%{transform:scaleX(0)}
  }
  .sw07-sqtxt{position:absolute;left:51.5%;top:19.5%;
    font:700 clamp(7px,2.4cqmin,12px)/1.3 ui-monospace,Menlo,monospace;
    letter-spacing:.22em;text-transform:uppercase;color:var(--sw07-bg);
    will-change:opacity;
    animation:sw07-fade 6.4s linear infinite both}
  @keyframes sw07-fade{
    0%,40%{opacity:0} 52%,82%{opacity:1} 92%,100%{opacity:0}
  }

  /* baseline number — Swiss page-mark, bottom right */
  .sw07-num{position:absolute;right:5.5%;bottom:6%;
    font:800 clamp(20px,9cqmin,64px)/1 "Helvetica Neue",Helvetica,Arial,sans-serif;
    color:var(--sw07-ink);letter-spacing:-.02em}
  .sw07-num span{color:var(--sw07-red)}

  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
    .sw07-head{transform:rotate(90deg) translateY(-.02em)}
    .sw07-sq{transform:scaleX(1)}
    .sw07-sqtxt{opacity:1}
  }
</style>
<script type="application/json" id="forever-agent-meta">

</head>
<body>
  <div class="sw07-stage" role="img" aria-label="A bold Swiss typographic headline rotating ninety degrees and snapping to align with a vertical grid column, with a red accent block.">
    <div class="sw07-grid" aria-hidden="true">
      <i class="sw07-vr sw07-v1"></i><i class="sw07-vr sw07-v2"></i><i class="sw07-vr sw07-v3"></i>
      <i class="sw07-hr sw07-h1"></i><i class="sw07-hr sw07-h2"></i>
    </div>

    <div class="sw07-meta" aria-hidden="true">Fig.&nbsp;07&nbsp;/&nbsp;<b>90&deg;</b><br>Grid&nbsp;Aligned</div>

    <div class="sw07-wrap" aria-hidden="true">
      <h1 class="sw07-head">Rot<em>a</em>ted</h1>
    </div>

    <div class="sw07-sq" aria-hidden="true"></div>
    <div class="sw07-sqtxt" aria-hidden="true">Set in<br>the grid</div>

    <div class="sw07-num" aria-hidden="true">07<span>.</span></div>
  </div>

  <div class="cap">Rotated Headline</div>

  <script>
  (function(){
    // CSS-only animation. Pause on hidden tab to respect the performance contract.
    var stage = document.querySelector('.sw07-stage');
    var animated = stage.querySelectorAll('.sw07-head, .sw07-sq, .sw07-sqtxt');
    function setState(state){
      for(var i=0;i<animated.length;i++){ animated[i].style.animationPlayState = state; }
    }
    document.addEventListener('visibilitychange', function(){
      setState(document.hidden ? 'paused' : 'running');
    });
  })();
  </script>
</body>
</html>
