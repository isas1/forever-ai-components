<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A single red block migrates in modular steps through a sparse neutral grid beside bold uppercase Swiss type and shifting rules.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Accent Shift</title>
<style>
  :root{
    --sw09-bg:#0f0f10;
    --sw09-ink:#f4f2ec;
    --sw09-mute:#3a3a3d;
    --sw09-grid:#1c1c1f;
    --sw09-accent:#e8482b;
  }
  html,body{height:100%;margin:0}
  body{
    background:var(--sw09-bg);
    color:var(--sw09-ink);
    font-family:"Helvetica Neue",Helvetica,Arial,"Inter",system-ui,sans-serif;
    overflow:hidden;
  }
  #sw09-stage{
    position:fixed;inset:0;
    /* 6-column modular grid, asymmetric: heavy left rail */
    display:grid;
    grid-template-columns:repeat(12,1fr);
    grid-template-rows:repeat(8,1fr);
    gap:clamp(2px,0.9vmin,7px);
    padding:clamp(10px,4.2vmin,30px);
    box-sizing:border-box;
  }
  /* neutral cells: the field the accent migrates through */
  .sw09-cell{
    background:var(--sw09-grid);
    border-radius:1px;
  }
  /* the migrating accent block — animated via transform only */
  #sw09-accent{
    grid-column:1 / span 2;
    grid-row:1 / span 2;
    position:relative;
    background:var(--sw09-accent);
    border-radius:1px;
    box-shadow:0 0 22px -6px var(--sw09-accent);
    will-change:transform;
    animation:sw09-march 11s cubic-bezier(.7,.0,.25,1) infinite;
    z-index:3;
  }
  /* the typographic rhythm: tall ranging numerals + rules */
  #sw09-type{
    grid-column:4 / span 8;
    grid-row:2 / span 5;
    position:relative;
    z-index:2;
    align-self:end;
    line-height:.82;
    pointer-events:none;
  }
  #sw09-type .sw09-h{
    margin:0;
    font-weight:700;
    font-size:clamp(26px,11vmin,96px);
    letter-spacing:-.03em;
    text-transform:uppercase;
    color:var(--sw09-ink);
  }
  #sw09-type .sw09-h em{font-style:normal;color:var(--sw09-accent)}
  #sw09-type .sw09-sub{
    margin:.55em 0 0;
    font-size:clamp(8px,1.7vmin,13px);
    font-weight:500;
    letter-spacing:.34em;
    text-transform:uppercase;
    color:var(--sw09-mute);
  }
  /* thin Swiss rules ride along the baseline */
  .sw09-rule{
    position:absolute;left:0;right:0;height:2px;
    background:var(--sw09-ink);
    opacity:.9;
  }
  #sw09-r1{top:8.5%}
  #sw09-r2{bottom:7%;background:var(--sw09-accent);opacity:1;
    transform-origin:left center;
    will-change:transform;
    animation:sw09-rule 11s cubic-bezier(.7,0,.25,1) infinite;
  }
  /* index marks bottom-right, modular tick rhythm */
  #sw09-index{
    position:fixed;right:clamp(10px,4.2vmin,30px);top:clamp(10px,4.2vmin,30px);
    font:600 clamp(7px,1.4vmin,11px)/1.7 ui-monospace,Menlo,monospace;
    letter-spacing:.22em;color:var(--sw09-mute);text-align:right;
    z-index:4;user-select:none;
  }
  #sw09-index b{color:var(--sw09-accent);font-weight:700}

  /* accent migrates across the grid as discrete modular steps */
  @keyframes sw09-march{
    0%   {transform:translate(0,0) scale(1)}
    14%  {transform:translate(0,0) scale(1)}
    24%  {transform:translate(420%,0) scale(.5,1)}
    38%  {transform:translate(420%,260%) scale(.5,1)}
    50%  {transform:translate(420%,260%) scale(1,2)}
    62%  {transform:translate(-30%,260%) scale(1,2)}
    74%  {transform:translate(-30%,40%) scale(1,2)}
    86%  {transform:translate(0,0) scale(1)}
    100% {transform:translate(0,0) scale(1)}
  }
  @keyframes sw09-rule{
    0%,14%{transform:scaleX(.18)}
    50%{transform:scaleX(1)}
    86%,100%{transform:scaleX(.18)}
  }

  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important}
    #sw09-accent{transform:translate(420%,260%) scale(1,2)}
    #sw09-r2{transform:scaleX(1)}
  }
</style>

</head>
<body>
  <main id="sw09-stage" role="img" aria-label="Swiss typographic composition: a single red block migrating in modular steps through a neutral grid against bold uppercase type.">
    <div id="sw09-accent"></div>
    <section id="sw09-type">
      <div id="sw09-r1" class="sw09-rule"></div>
      <h1 class="sw09-h">Accent<br>Shift<em>.</em></h1>
      <p class="sw09-sub">One Block / Six Stations / Modular Field</p>
      <div id="sw09-r2" class="sw09-rule"></div>
    </section>
    <div id="sw09-index">FIG. <b>09</b><br>RED · 0°</div>
  </main>
  <div class="cap">Accent Shift</div>

  <script>
  (function(){
    "use strict";
    // Build the neutral grid field once. Cells are static (no per-frame work);
    // they exist purely as the modular ground the accent traverses. We skip
    // the cells the type + accent occupy so the composition stays asymmetric.
    var stage=document.getElementById("sw09-stage");
    if(!stage)return;
    var COLS=12, ROWS=8;
    var frag=document.createDocumentFragment();
    // sparse, intentional dotting of the grid — not every cell (Swiss restraint)
    var seed=[[7,1],[9,1],[11,1],[1,4],[1,6],[3,7],[5,7],[7,7],[9,7],
              [11,4],[11,6],[11,8],[6,8],[8,8],[10,3],[12,5],[2,8]];
    for(var i=0;i<seed.length;i++){
      var c=document.createElement("div");
      c.className="sw09-cell";
      c.style.gridColumn=seed[i][0];
      c.style.gridRow=seed[i][1];
      frag.appendChild(c);
    }
    stage.insertBefore(frag, stage.firstChild);

    // Pause CSS animations when the tab is hidden — no rAF here, so just toggle
    // animationPlayState on the two animated elements. Respect reduced-motion
    // by leaving the static settled frame (handled in CSS) untouched.
    var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
    if(reduce)return;
    var animated=[document.getElementById("sw09-accent"),
                  document.getElementById("sw09-r2")];
    document.addEventListener("visibilitychange",function(){
      var s=document.hidden?"paused":"running";
      for(var k=0;k<animated.length;k++){
        if(animated[k])animated[k].style.animationPlayState=s;
      }
    });
  })();
  </script>
</body>
</html>
