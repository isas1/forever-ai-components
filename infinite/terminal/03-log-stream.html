<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<meta name="description" content="Log Stream — Terminal. A self-contained, zero-dependency animated web component."><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Log Stream</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:#0d1117;font:12px/1.65 ui-monospace,Menlo,"Courier New",monospace}
.trm-wrap{padding:10px 12px;height:100%;display:flex;flex-direction:column;overflow:hidden}
.trm-header{color:#4ade80;border-bottom:1px solid #1a2a1a;padding-bottom:4px;margin-bottom:6px;font-size:11px;opacity:.8}
.trm-log{flex:1;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;gap:1px}
.trm-entry{display:flex;gap:6px;white-space:pre;animation:trm-fadein .25s ease}
@keyframes trm-fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.trm-ts{color:#2a4a2a;flex-shrink:0}
.trm-lvl-info{color:#4ade80}
.trm-lvl-warn{color:#ffa500}
.trm-lvl-error{color:#ff5555}
.trm-lvl-debug{color:#3a6a8a}
.trm-msg{color:#c8d0c8;flex:1;overflow:hidden;text-overflow:ellipsis}
.trm-cap{position:fixed;left:8px;bottom:7px;font:600 10px ui-monospace,monospace;color:#4ade80;opacity:.35;letter-spacing:.5px;pointer-events:none;z-index:99}
</style></head><body>
<div class="trm-wrap">
  <div class="trm-header">&#x2b25; LOG STREAM — /var/log/app.log (tail -f)</div>
  <div class="trm-log" id="trm-log"></div>
</div>
<div class="trm-cap">log stream</div>
<script>(()=>{
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const log=document.getElementById('trm-log');
  const MAX=10;

  const pool=[
    {l:'INFO', m:'server listening on :3000'},
    {l:'INFO', m:'database connection established'},
    {l:'DEBUG',m:'cache hit ratio 94.2%'},
    {l:'INFO', m:'GET /api/v1/users 200 14ms'},
    {l:'INFO', m:'GET /api/v1/posts 200 22ms'},
    {l:'WARN', m:'rate limit approaching for 10.0.0.44'},
    {l:'INFO', m:'POST /api/v1/auth 200 8ms'},
    {l:'DEBUG',m:'worker pool: 4/8 threads active'},
    {l:'INFO', m:'scheduled job: cleanup ran ok'},
    {l:'WARN', m:'disk usage at 81% on /var'},
    {l:'ERROR',m:'failed to reach upstream: timeout after 5000ms'},
    {l:'INFO', m:'retry 1/3 for upstream request'},
    {l:'INFO', m:'upstream reconnected successfully'},
    {l:'DEBUG',m:'GC pause 2.1ms gen0'},
    {l:'INFO', m:'GET /healthz 200 1ms'},
    {l:'WARN', m:'slow query detected: 480ms on users table'},
    {l:'INFO', m:'config reload: signal SIGHUP received'},
    {l:'ERROR',m:'connection refused: redis:6379'},
    {l:'INFO', m:'fallback to local cache active'},
    {l:'DEBUG',m:'metrics flushed to statsd'},
  ];

  let pi=Math.floor(Math.random()*pool.length);

  function ts(){
    const n=new Date();
    return [n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');
  }

  function addLine(){
    const e=pool[pi%pool.length]; pi++;
    const row=document.createElement('div'); row.className='trm-entry';
    const t=document.createElement('span'); t.className='trm-ts'; t.textContent='['+ts()+']';
    const lv=document.createElement('span'); lv.className='trm-lvl-'+e.l.toLowerCase(); lv.textContent='['+e.l+']'+' '.repeat(5-e.l.length);
    const m=document.createElement('span'); m.className='trm-msg'; m.textContent=e.m;
    row.appendChild(t); row.appendChild(lv); row.appendChild(m);
    log.appendChild(row);
    while(log.children.length>MAX)log.removeChild(log.firstChild);
  }

  let timer=null;
  function stop(){clearInterval(timer);}
  function play(){
    if(reduce){
      for(let i=0;i<MAX;i++)addLine();
      return;
    }
    for(let i=0;i<6;i++)addLine();
    timer=setInterval(addLine,650);
  }

  document.addEventListener('visibilitychange',()=>document.hidden?stop():play());
  play();
})();</script>
</body></html>
