<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="description" content="Monospace gold word resolves out of scrambling random glyphs left-to-right with a tracking caret, then re-scrambles away on a loop.">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Scramble Decode</title>
<style>
html,body{margin:0;height:100%;overflow:hidden}
body{background:#0a0b10;display:grid;place-items:center}
#tte01-c{display:block;width:100%;height:100%}
.cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
  color:#f5d76e;opacity:.4;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style><script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/text-effects/01-scramble-decode.html",
 "title": "Scramble Decode",
 "description": "Gold monospace text resolves from random glyphs left-to-right with a tracking caret, holds with micro-flickers, then re-scrambles through a 6-phrase loop.",
 "useWhen": "Hacker/terminal aesthetic hero sections, loading screens, or reveal animations where text identity emerges from noise.",
 "avoidWhen": "Contexts requiring immediate legibility — text is unreadable during scramble. Avoid when motion-sensitive audiences are primary users.",
 "agentPrompt": "Change PHRASES to ['LAUNCH','IGNITE','DEPLOY'], set ACC to '#00ffaa', and slow decode to DEC=1.2 for a more dramatic reveal.",
 "editableAreas": [
  "PHRASES array (word list)",
  "ACC color (#f5d76e gold)",
  "DEC/HOLD/OUT timing constants",
  "GLYPHS charset string",
  "glyphSize ratio (0.22 height / 0.78 width)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion staticFrame() guard",
  "visibilitychange pause/resume",
  "DPR-aware canvas sizing"
 ],
 "knownLimitations": [
  "Phrase cycling is fully automatic — no click-to-advance",
  "BG color hardcoded in both JS constant and CSS; must change both",
  "Cell width factor (0.62) may mis-align without a true monospace system font"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "typography",
  "scramble",
  "decode",
  "monospace",
  "glitch",
  "canvas",
  "loop"
 ]
}
</script>
</head><body>
<canvas id="tte01-c" role="img" aria-label="Text resolving from scrambling glyphs: Scramble Decode"></canvas>
<div class="cap">Scramble Decode</div>
<script>(function(){
var cv=document.getElementById('tte01-c'),ctx=cv.getContext('2d');
var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
var BG='#0a0b10',ACC='#f5d76e',DIM='#3a3d4a';
var PHRASES=['DECODE','SIGNAL','ENTROPY','RESOLVE','SCRAMBLE','CLARITY'];
var GLYPHS='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#%&@$/<>*+=?';
var W=0,H=0,DPR=1,cell=0,baseY=0,glyphSize=0;
function size(){
  W=cv.clientWidth||300;H=cv.clientHeight||300;DPR=Math.min(2,window.devicePixelRatio||1);
  cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
  // size monospace cell so longest phrase fits ~74% of width
  var maxLen=0;for(var i=0;i<PHRASES.length;i++)maxLen=Math.max(maxLen,PHRASES[i].length);
  glyphSize=Math.min(H*0.22,(W*0.78)/(maxLen*0.62));
  ctx.font='700 '+glyphSize+'px ui-monospace,Menlo,Consolas,monospace';
  cell=glyphSize*0.62;baseY=H*0.5;
}
size();
// per-char state: settled time offset (left-to-right stagger), scramble seed
var chars=[],cur=0;
function loadPhrase(idx){
  var s=PHRASES[idx],n=s.length;chars.length=0;
  for(var i=0;i<n;i++)chars.push({ch:s[i],lock:i*0.052,seed:Math.random()*97});
}
loadPhrase(0);
// timeline (seconds): decode in -> hold -> scramble out
var DEC=0.78,HOLD=1.55,OUT=0.5,total=DEC+HOLD+OUT;
function rnd(t){t=(t*9301+49297)%233280;return t/233280;}
function rg(seed,t){return GLYPHS[Math.floor(rnd(seed+Math.floor(t*22))*GLYPHS.length)];}
function easeOut(x){return 1-Math.pow(1-x,3);}
var running=true,raf=0,start=0,phase=0; // phase: 0 dec,1 hold,2 out
function draw(now){
  var t=(now-start)/1000;
  ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
  var n=chars.length,totalW=n*cell,x0=(W-totalW)/2+cell*0.5;
  ctx.textAlign='center';ctx.textBaseline='middle';
  // subtle scanline tint under text — secondary motion
  var hue=Math.sin(now/1400)*0.5+0.5;
  for(var i=0;i<n;i++){
    var c=chars[i],x=x0+i*cell,settled,glyph,col,alpha,jitter=0,scale=1;
    if(phase===0){
      var p=(t-c.lock)/0.34; // each char decodes over .34s after its lock time
      if(p>=1){settled=1;}else if(p<=0){settled=-1;}else{settled=p;}
      if(settled>=1){glyph=c.ch;col=ACC;alpha=1;}
      else if(settled<0){glyph=rg(c.seed,t);col=DIM;alpha=0.55;}
      else{
        glyph=rg(c.seed,t);
        var e=easeOut(settled);
        col=mix(DIM,ACC,e);alpha=0.55+0.45*e;jitter=(1-e)*glyphSize*0.09*(rnd(c.seed+i)-0.5);
        scale=1+(1-e)*0.18; // anticipation overshoot as it locks
      }
    }else if(phase===1){
      glyph=c.ch;col=ACC;alpha=1;
      // resting micro-flicker on a couple chars: alive, not static
      if(((Math.floor(now/90)+c.seed)|0)%37===0){glyph=rg(c.seed,t);col=mix(ACC,DIM,0.4);}
    }else{ // out: re-scramble right-to-left feel via reversed lock
      var q=(t-(n-1-i)*0.03)/OUT;if(q<0)q=0;if(q>1)q=1;
      glyph=q>0.05?rg(c.seed,t):c.ch;
      col=mix(ACC,DIM,q);alpha=1-q*0.5;jitter=q*glyphSize*0.07*(rnd(c.seed+t)-0.5);
    }
    ctx.globalAlpha=alpha;ctx.fillStyle=col;
    if(scale!==1){ctx.save();ctx.translate(x,baseY+jitter);ctx.scale(scale,scale);ctx.fillText(glyph,0,0);ctx.restore();}
    else ctx.fillText(glyph,x,baseY+jitter);
  }
  // accent caret line that tracks the decode front
  ctx.globalAlpha=1;
  var frontX;
  if(phase===0){frontX=x0-cell*0.5+Math.min(1,Math.max(0,(t)/(c0lock(n))))*totalW;}
  else frontX=x0-cell*0.5+totalW;
  ctx.fillStyle=ACC;ctx.globalAlpha=0.5+0.3*Math.sin(now/130);
  ctx.fillRect(Math.min(frontX,x0-cell*0.5+totalW),baseY+glyphSize*0.62,Math.max(2,cell*0.5),Math.max(2,glyphSize*0.06));
  ctx.globalAlpha=1;
  // advance phase
  if(phase===0&&t>=DEC){phase=1;start=now;}
  else if(phase===1&&t>=HOLD){phase=2;start=now;}
  else if(phase===2&&t>=OUT){phase=0;start=now;cur=(cur+1)%PHRASES.length;loadPhrase(cur);}
  if(running)raf=requestAnimationFrame(draw);
}
function c0lock(n){return (n-1)*0.052+0.34;}
function mix(a,b,t){
  var pa=hx(a),pb=hx(b);
  return 'rgb('+Math.round(pa[0]+(pb[0]-pa[0])*t)+','+Math.round(pa[1]+(pb[1]-pa[1])*t)+','+Math.round(pa[2]+(pb[2]-pa[2])*t)+')';
}
function hx(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function staticFrame(){
  ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
  var n=chars.length,totalW=n*cell,x0=(W-totalW)/2+cell*0.5;
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=ACC;ctx.globalAlpha=1;
  for(var i=0;i<n;i++)ctx.fillText(chars[i].ch,x0+i*cell,baseY);
  ctx.fillRect(x0-cell*0.5+totalW,baseY+glyphSize*0.62,Math.max(2,cell*0.5),Math.max(2,glyphSize*0.06));
}
function begin(){if(reduce){staticFrame();return;}running=true;start=performance.now();phase=0;raf=requestAnimationFrame(draw);}
function vis(){
  if(reduce)return;
  if(document.hidden){running=false;if(raf)cancelAnimationFrame(raf);}
  else if(!running){running=true;start=performance.now();raf=requestAnimationFrame(draw);}
}
window.addEventListener('resize',function(){size();if(reduce)staticFrame();});
document.addEventListener('visibilitychange',vis);
begin();
})();</script>
</body></html>
