<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="description" content="Serif gold headline whose letters rise into view one by one from a clipped baseline, hold, then exit upward in a graceful staggered loop.">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Stagger Rise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
html,body{margin:0;height:100%;overflow:hidden}
body{background:#0a0b10;display:grid;place-items:center}
.tte02-stage{display:flex;gap:.04em;align-items:flex-end;
  font-family:"Fraunces",Georgia,serif;font-weight:600;
  font-size:clamp(34px,17vmin,116px);line-height:1;color:#f5d76e;
  letter-spacing:.01em;user-select:none}
.tte02-clip{position:relative;overflow:hidden;display:inline-block;
  padding:.12em 0 .04em}
.tte02-clip::after{content:"";position:absolute;left:-6%;right:-6%;bottom:0;height:2px;
  background:#f5d76e;opacity:.32}
.tte02-ch{display:inline-block;will-change:transform,opacity;
  transform:translateY(115%);opacity:0;
  animation:tte02-rise 4.6s infinite both;
  animation-delay:calc(var(--i)*.085s)}
.tte02-sp{width:.32em}
@keyframes tte02-rise{
  0%      {transform:translateY(115%);opacity:0}
  14%     {transform:translateY(0);opacity:1}      /* settle on a confident overshoot-free cubic */
  62%     {transform:translateY(0);opacity:1}      /* hold the word, legible */
  82%,100%{transform:translateY(-118%);opacity:0}  /* graceful upward exit */
}
.tte02-ch{animation-timing-function:cubic-bezier(.22,1,.36,1)}
@media (prefers-reduced-motion:reduce){
  .tte02-ch{animation:none!important;transform:translateY(0)!important;opacity:1!important}
}
.cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
  color:#f5d76e;opacity:.4;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style></head><body>
<div class="tte02-stage" id="tte02-c" role="img" aria-label="Stagger Rise"></div>
<div class="cap">Stagger Rise</div>
<script>(function(){
  var root=document.getElementById('tte02-c');
  var word="Stagger Rise";
  var idx=0;
  for(var k=0;k<word.length;k++){
    var c=word[k];
    if(c===' '){
      var sp=document.createElement('span');
      sp.className='tte02-sp';
      root.appendChild(sp);
      continue;
    }
    var clip=document.createElement('span');
    clip.className='tte02-clip';
    var ch=document.createElement('span');
    ch.className='tte02-ch';
    ch.style.setProperty('--i',idx++);
    ch.textContent=c;
    clip.appendChild(ch);
    root.appendChild(clip);
  }
  function vis(){
    var s=document.hidden?'paused':'running';
    var nodes=root.querySelectorAll('.tte02-ch');
    for(var i=0;i<nodes.length;i++){nodes[i].style.animationPlayState=s;}
  }
  document.addEventListener('visibilitychange',vis);
  vis();
})();</script>
</body></html>
