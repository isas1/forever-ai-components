<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="description" content="Bold sans headline rendered as dim steel with a bright gold metallic sheen band that sweeps across the glyphs, blooming as it crosses center">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Gradient Wipe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&display=swap" rel="stylesheet">
<style>
html,body{margin:0;height:100%;overflow:hidden}
body{background:#0a0b10;display:grid;place-items:center}
.tte03-stage{
  position:relative;width:100%;height:100%;display:grid;place-items:center;
  background:radial-gradient(120% 90% at 50% 38%,#13141d 0%,#0a0b10 70%);
}
/* The headline. background-clip:text reveals the moving gradient through the glyphs. */
.tte03-word{
  margin:0;padding:0 6vmin;text-align:center;line-height:.92;
  font-family:"Bricolage Grotesque",system-ui,sans-serif;font-weight:800;
  font-size:clamp(34px,17vmin,150px);letter-spacing:-.02em;
  /* base metal: cool dim steel so the sheen reads as a highlight, not the whole word */
  background:
    linear-gradient(110deg,
      #2c2f3d 0%, #4a4e60 22%, #2c2f3d 44%,
      /* bright sheen band */
      #f5d76e 49%, #fff6d6 50%, #f5d76e 51%,
      #2c2f3d 56%, #4a4e60 78%, #2c2f3d 100%);
  background-size:280% 100%;
  background-position:130% 0;
  -webkit-background-clip:text;background-clip:text;
  color:transparent;-webkit-text-fill-color:transparent;
  animation:tte03-wipe 3.6s cubic-bezier(.5,0,.18,1) infinite;
  will-change:background-position;
}
/* soft golden bloom underneath, pulses with the wipe arrival */
.tte03-word::after{
  content:attr(data-w);position:absolute;inset:0;display:grid;place-items:center;
  padding:0 6vmin;line-height:.92;letter-spacing:-.02em;
  font-family:inherit;font-weight:inherit;font-size:inherit;
  color:#f5d76e;filter:blur(14px);opacity:0;z-index:-1;
  animation:tte03-bloom 3.6s cubic-bezier(.5,0,.18,1) infinite;
}
.tte03-wrap{position:relative;display:inline-grid}
@keyframes tte03-wipe{
  0%   {background-position:130% 0}
  /* hold dim before the light arrives — anticipation */
  18%  {background-position:118% 0}
  100% {background-position:-30% 0}
}
@keyframes tte03-bloom{
  0%,30%,100%{opacity:0}
  /* bloom peaks as the sheen crosses the word's centre */
  55%{opacity:.5}
  80%{opacity:0}
}
.cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
  color:#f5d76e;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms!important;animation-iteration-count:1!important}
  /* settle on a legible frame: sheen parked over the word centre, no bloom */
  .tte03-word{background-position:50% 0;animation:none}
  .tte03-word::after{animation:none;opacity:0}
}
</style></head><body>
<div class="tte03-stage" role="img" aria-label="Gradient sheen wiping across the word METALLIC">
  <span class="tte03-wrap">
    <h1 class="tte03-word" id="tte03-w" data-w="METALLIC">METALLIC</h1>
  </span>
</div>
<div class="cap">Gradient Wipe</div>
<script>(function(){
  var word=document.getElementById('tte03-w');
  function vis(){
    // pausing the host element pauses its ::after pseudo-animation too
    word.style.animationPlayState=document.hidden?'paused':'running';
  }
  document.addEventListener('visibilitychange',vis);vis();
})();</script>
</body></html>
