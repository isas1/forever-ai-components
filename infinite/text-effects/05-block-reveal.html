<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="description" content="Stacked uppercase gold words uncovered by a solid gold block that sweeps in from the left, pauses, and retracts off the right with an underl">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Block Reveal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@800&display=swap" rel="stylesheet">
<style>
html,body{margin:0;height:100%;overflow:hidden}
body{background:#0a0b10;display:grid;place-items:center}
.tte05-stage{position:relative;display:flex;flex-direction:column;gap:.22em;
  font:800 clamp(34px,15vmin,90px)/.92 Archivo,system-ui,sans-serif;
  letter-spacing:.02em;text-transform:uppercase}
.tte05-row{position:relative;overflow:hidden}
/* the visible (revealed) text, clipped open by the block sweep */
.tte05-txt{display:block;color:#f5d76e;
  clip-path:inset(0 100% 0 0);
  animation:tte05-reveal 4.6s cubic-bezier(.76,0,.24,1) infinite}
/* the sweeping block */
.tte05-blk{position:absolute;inset:0;background:#f5d76e;transform-origin:left center;
  clip-path:inset(0 100% 0 0);
  animation:tte05-block 4.6s cubic-bezier(.76,0,.24,1) infinite}
.tte05-row:nth-child(2) .tte05-txt,.tte05-row:nth-child(2) .tte05-blk{animation-delay:.16s}
.tte05-row:nth-child(3) .tte05-txt,.tte05-row:nth-child(3) .tte05-blk{animation-delay:.32s}
/* block: sweep in from left, pause, retract off right */
@keyframes tte05-block{
  0%{clip-path:inset(0 100% 0 0)}
  18%{clip-path:inset(0 0 0 0)}
  46%{clip-path:inset(0 0 0 0)}
  72%{clip-path:inset(0 0 0 100%)}
  100%{clip-path:inset(0 0 0 100%)}}
/* text: stays hidden under block, then revealed as block retracts, then re-covered */
@keyframes tte05-reveal{
  0%,46%{clip-path:inset(0 100% 0 0)}
  72%,90%{clip-path:inset(0 0 0 0)}
  100%{clip-path:inset(0 100% 0 0)}}
.tte05-stage::after{content:"";position:absolute;left:-6%;right:-6%;height:2px;
  bottom:-.16em;background:#f5d76e;opacity:.22;
  transform:scaleX(0);transform-origin:left;
  animation:tte05-rule 4.6s cubic-bezier(.76,0,.24,1) infinite}
@keyframes tte05-rule{0%,46%{transform:scaleX(0)}72%,90%{transform:scaleX(1)}100%{transform:scaleX(0)}}
.cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
  color:#f5d76e;opacity:.4;letter-spacing:.08em;text-transform:uppercase;user-select:none}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important}
  .tte05-txt{clip-path:inset(0 0 0 0)!important}
  .tte05-blk{display:none}
  .tte05-stage::after{transform:scaleX(1)!important}}
</style></head><body>
<div class="tte05-stage" id="tte05-stage" role="img" aria-label="The word BLOCK REVEAL revealed by a sweeping colored block">
  <div class="tte05-row"><span class="tte05-txt">Block</span><span class="tte05-blk"></span></div>
  <div class="tte05-row"><span class="tte05-txt">Reveal</span><span class="tte05-blk"></span></div>
</div>
<div class="cap">Block Reveal</div>
<script>(function(){
  var stage=document.getElementById('tte05-stage');
  var nodes=stage.querySelectorAll('.tte05-txt,.tte05-blk');
  function vis(){
    var s=document.hidden?'paused':'running';
    for(var i=0;i<nodes.length;i++)nodes[i].style.animationPlayState=s;
    stage.style.animationPlayState=s;
  }
  document.addEventListener('visibilitychange',vis);vis();
})();</script>
</body></html>
