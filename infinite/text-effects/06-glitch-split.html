<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="description" content="Bold word GLITCH with red/cyan RGB channel-split, idle shimmer and periodic bursts of horizontal slice displacement and scanline glints on b">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Glitch Split</title>
<style>
html,body{margin:0;height:100%;overflow:hidden}
body{background:#0a0b10;display:grid;place-items:center}
#tte06-c{width:100%;height:100%;display:block}
.cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;
  color:#f5d76e;opacity:.45;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style></head><body>
<canvas id="tte06-c" role="img" aria-label="Word with RGB channel-split glitch effect"></canvas>
<div class="cap">Glitch Split</div>
<script>(function(){
var cv=document.getElementById('tte06-c'),ctx=cv.getContext('2d');
var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
var W=0,H=0,DPR=1,raf=0,running=true,t0=performance.now();
var WORD='GLITCH',FONT='800 #PXpx "Arial Black",Impact,sans-serif';

function size(){
  DPR=Math.min(2,window.devicePixelRatio||1);
  W=cv.clientWidth;H=cv.clientHeight;
  cv.width=Math.round(W*DPR);cv.height=Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}

// glitch burst state — calm between, occasional jitter
var burst=0;        // remaining intensity 0..1
var nextBurst=900;  // ms until next burst
var slices=[];      // active displaced slices
function fontFor(px){return FONT.replace('#PX',px);}

function fire(){
  burst=1;
  var n=2+((Math.random()*4)|0);
  slices.length=0;
  for(var i=0;i<n;i++){
    slices.push({y:Math.random(),h:.04+Math.random()*.13,dx:(Math.random()*2-1)});
  }
  // cap total slice elements well under budget
  if(slices.length>16)slices.length=16;
}

function fnt(px){ctx.font=fontFor(px);ctx.textAlign='center';ctx.textBaseline='middle';}

function draw(now){
  var dt=now-(draw._p||now);draw._p=now;
  var cx=W/2,cy=H/2;
  var px=Math.min(W*0.20,H*0.30,140);
  px=Math.max(px,22);

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0a0b10';ctx.fillRect(0,0,W,H);

  // burst scheduling
  if(burst<=0){
    nextBurst-=dt;
    if(nextBurst<=0){fire();nextBurst=1400+Math.random()*2600;}
  }else{
    burst-=dt/240; // decay ~240ms
    if(burst<0)burst=0;
  }
  var b=burst<0?0:burst;
  // ease-out the intensity so the tail is gentle
  var e=b*b*(3-2*b);

  fnt(px);
  // chromatic channel offset scales with burst, tiny idle shimmer
  var idle=Math.sin(now/900)*0.6;
  var off=idle+e*(7+Math.sin(now/40)*4);
  var jx=(Math.random()*2-1)*e*3;
  var jy=(Math.random()*2-1)*e*2;

  ctx.globalCompositeOperation='lighter';
  // R + B channels split apart, G stays as anchor for legibility
  ctx.fillStyle='#ff2d4d';ctx.fillText(WORD,cx-off+jx,cy+jy*0.5);
  ctx.fillStyle='#2dd6ff';ctx.fillText(WORD,cx+off+jx,cy-jy*0.5);
  ctx.fillStyle='#f3f6ff';ctx.fillText(WORD,cx,cy);
  ctx.globalCompositeOperation='source-over';

  // accent baseline tick — quiet structure
  ctx.strokeStyle='rgba(245,215,110,'+(0.18+e*0.5)+')';
  ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx-px*1.3,cy+px*0.62);ctx.lineTo(cx+px*1.3,cy+px*0.62);ctx.stroke();

  // slice displacement: re-stamp horizontal bands shifted sideways
  if(e>0.02){
    for(var i=0;i<slices.length;i++){
      var s=slices[i];
      var sy=(cy-px*0.7)+s.y*(px*1.4);
      var sh=s.h*px*1.4;
      var sdx=s.dx*e*26;
      ctx.save();
      ctx.beginPath();ctx.rect(0,sy,W,sh);ctx.clip();
      ctx.globalCompositeOperation='lighter';
      ctx.fillStyle='rgba(255,45,77,.9)';ctx.fillText(WORD,cx-off+sdx,cy);
      ctx.fillStyle='rgba(45,214,255,.9)';ctx.fillText(WORD,cx+off+sdx,cy);
      ctx.fillStyle='#eef2ff';ctx.fillText(WORD,cx+sdx,cy);
      ctx.restore();
    }
    // scan glints
    var gn=(e*5)|0;
    ctx.fillStyle='rgba(245,215,110,'+(e*0.5)+')';
    for(var g=0;g<gn;g++){
      var gy=cy-px*0.7+Math.random()*px*1.4;
      ctx.fillRect(0,gy,W,1);
    }
  }

  if(running&&!reduce)raf=requestAnimationFrame(draw);
}

function start(){if(!running)return;cancelAnimationFrame(raf);draw._p=0;raf=requestAnimationFrame(draw);}
function staticFrame(){
  // settle to clean, legible word — no offset, no slices
  burst=0;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#0a0b10';ctx.fillRect(0,0,W,H);
  var cx=W/2,cy=H/2,px=Math.max(Math.min(W*0.20,H*0.30,140),22);
  fnt(px);
  ctx.fillStyle='#f3f6ff';ctx.fillText(WORD,cx,cy);
  ctx.strokeStyle='rgba(245,215,110,.35)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx-px*1.3,cy+px*0.62);ctx.lineTo(cx+px*1.3,cy+px*0.62);ctx.stroke();
}

function vis(){
  if(document.hidden){running=false;cancelAnimationFrame(raf);}
  else if(!reduce){running=true;start();}
}
document.addEventListener('visibilitychange',vis);
window.addEventListener('resize',function(){size();if(reduce)staticFrame();});

size();
if(reduce){staticFrame();}
else{start();}
})();</script>
</body></html>
