<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Clickable heart icon that fills pink and bursts radial particles with an expanding ring on like, toggles off on second tap.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Like Heart Burst</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#1a1020;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  #wrap{position:fixed;inset:0;display:grid;place-items:center;cursor:pointer}
  #stage{position:relative;width:60%;max-width:200px;aspect-ratio:1;display:grid;place-items:center}
  svg{width:46%;overflow:visible}
  .heart{fill:#3a2a40;transition:fill .15s}
  .liked .heart{fill:#ff3b6b}
  .ring{position:absolute;border:2px solid #ff5c84;border-radius:50%;width:38%;aspect-ratio:1;opacity:0;pointer-events:none}
  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/ui-microinteractions/01-like-heart-burst.html",
 "title": "Like Heart Burst",
 "description": "Heart icon fills pink and radiates 10 particle dots with an expanding ring on click; second click reverses state. Auto-cycles as demo.",
 "useWhen": "Social feeds, reaction buttons, content-save interactions.",
 "avoidWhen": "Passive display contexts — delete the setTimeout auto-cycle loop before shipping in production.",
 "agentPrompt": "Remove the auto-cycle (delete loop/timer), change heart color to gold (#FBBF24), increase particle count to 16.",
 "editableAreas": [
  "particle count (n=10)",
  "heart fill color (#ff3b6b)",
  "particle hue range (330+40)",
  "animation duration (600ms)",
  "ring expansion scale (1.6)"
 ],
 "preserveElements": [
  "Web Animations API animate() calls",
  "IIFE wrapper",
  "toggle state via .liked class",
  "reduced-motion guard"
 ],
 "knownLimitations": [
  "Clickable div lacks aria role — add role=button + aria-pressed for production",
  "Auto-cycles by default"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "copy-paste-safe"
 ],
 "tags": [
  "heart",
  "like",
  "burst",
  "particles",
  "microinteraction",
  "click",
  "social-ui",
  "web-animations"
 ]
}
</script>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <div class="ring" id="ring"></div>
    <svg id="ic" viewBox="0 0 24 24"><path class="heart" d="M12 21s-7.5-4.9-10-9.6C.3 8 1.8 4.6 5.2 4.6c2 0 3.4 1.1 4.4 2.5C10.6 5.7 12 4.6 14 4.6c3.4 0 4.9 3.4 3.2 6.8C19.5 16.1 12 21 12 21z"/></svg>
  </div>
</div>
<div class="cap">Like burst</div>
<script>
const wrap=document.getElementById('wrap'),stage=document.getElementById('stage'),ic=document.getElementById('ic'),ring=document.getElementById('ring');
const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
let parts=[];
function burst(){
  ic.classList.add('liked');
  ic.animate([{transform:'scale(.7)'},{transform:'scale(1.25)'},{transform:'scale(1)'}],{duration:480,easing:'cubic-bezier(.2,1.4,.4,1)'});
  ring.animate([{opacity:.9,transform:'scale(.4)'},{opacity:0,transform:'scale(1.6)'}],{duration:560,easing:'ease-out'});
  const cx=stage.clientWidth/2,cy=stage.clientHeight/2,n=10;
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2,d=stage.clientWidth*0.42;
    const p=document.createElement('div');
    p.style.cssText='position:absolute;left:'+cx+'px;top:'+cy+'px;width:7px;height:7px;border-radius:50%;background:hsl('+(330+Math.random()*40)+',90%,'+(60+Math.random()*15)+'%);pointer-events:none';
    stage.appendChild(p);
    p.animate([{transform:'translate(-50%,-50%) scale(1)',opacity:1},{transform:'translate(calc(-50% + '+Math.cos(a)*d+'px),calc(-50% + '+Math.sin(a)*d+'px)) scale(.2)',opacity:0}],{duration:600,easing:'cubic-bezier(.1,.7,.3,1)'}).onfinish=()=>p.remove();
  }
}
function unlike(){ic.classList.remove('liked');ic.animate([{transform:'scale(1)'},{transform:'scale(.85)'},{transform:'scale(1)'}],{duration:260});}
wrap.addEventListener('click',()=>{ic.classList.contains('liked')?unlike():burst();});
let timer;
function loop(){if(reduce)return;timer=setTimeout(()=>{ic.classList.contains('liked')?unlike():burst();loop();},1900);}
function stop(){clearTimeout(timer);}
document.addEventListener('visibilitychange',()=>{document.hidden?stop():loop();});
loop();
</script>
</body>
</html>
