<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="E-commerce Add button flings a product tile in an arc into a cart icon, bumping a count badge each time.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Add to Cart</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0e1726;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  #wrap{position:fixed;inset:0;display:grid;place-items:center}
  #stage{position:relative;width:78%;max-width:240px;aspect-ratio:1.1}
  .prod{position:absolute;left:6%;top:12%;width:34%;aspect-ratio:1;border-radius:14px;background:linear-gradient(135deg,#ff9d5c,#ff5c8a);display:grid;place-items:center;box-shadow:0 8px 20px rgba(0,0,0,.35)}
  .prod span{font-size:26px}
  .cart{position:absolute;right:8%;bottom:10%;width:30%;aspect-ratio:1;display:grid;place-items:center}
  .cart svg{width:90%;fill:none;stroke:#5cc8ff;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
  .badge{position:absolute;right:4%;bottom:34%;min-width:16px;height:16px;padding:0 3px;border-radius:9px;background:#5cc8ff;color:#0e1726;font-size:11px;font-weight:700;display:grid;place-items:center}
  .btn{position:absolute;left:6%;bottom:10%;font-size:11px;letter-spacing:.05em;color:#5cc8ff;border:1px solid #2a4a66;border-radius:8px;padding:5px 9px;background:#13243a}
  .fly{position:absolute;width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,#ff9d5c,#ff5c8a);pointer-events:none}
  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase}
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <div class="prod" id="prod"><span>🎧</span></div>
    <div class="btn" id="btn">Add</div>
    <div class="cart" id="cart"><svg viewBox="0 0 24 24"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2 3h3l2.2 12h11l2-8H6"/></svg></div>
    <div class="badge" id="badge">0</div>
  </div>
</div>
<div class="cap">Add to cart</div>
<script>
const stage=document.getElementById('stage'),prod=document.getElementById('prod'),cart=document.getElementById('cart'),badge=document.getElementById('badge'),btn=document.getElementById('btn');
const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;let count=0;
function fly(){
  const a=prod.getBoundingClientRect(),b=cart.getBoundingClientRect(),s=stage.getBoundingClientRect();
  const x0=a.left-s.left+a.width/2-9,y0=a.top-s.top+a.height/2-9;
  const x1=b.left-s.left+b.width/2-9,y1=b.top-s.top+b.height/2-9;
  const f=document.createElement('div');f.className='fly';f.style.left=x0+'px';f.style.top=y0+'px';stage.appendChild(f);
  f.animate([
    {transform:'translate(0,0) scale(1)',opacity:1},
    {transform:'translate('+(x1-x0)*.5+'px,'+((y1-y0)*.5-50)+'px) scale(.8)',opacity:1,offset:.5},
    {transform:'translate('+(x1-x0)+'px,'+(y1-y0)+'px) scale(.2)',opacity:.3}
  ],{duration:680,easing:'cubic-bezier(.5,-.2,.4,1)'}).onfinish=()=>{f.remove();count++;badge.textContent=count;badge.animate([{transform:'scale(1.6)'},{transform:'scale(1)'}],{duration:300,easing:'cubic-bezier(.2,1.5,.4,1)'});cart.animate([{transform:'scale(1)'},{transform:'scale(.85)'},{transform:'scale(1)'}],{duration:260});};
  btn.animate([{transform:'scale(1)'},{transform:'scale(.9)'},{transform:'scale(1)'}],{duration:240});
}
btn.addEventListener('click',fly);
let timer;
function loop(){if(reduce)return;timer=setTimeout(()=>{if(count>=5){count=0;badge.textContent=0;}else fly();loop();},1700);}
document.addEventListener('visibilitychange',()=>{document.hidden?clearTimeout(timer):loop();});
loop();
</script>
</body>
</html>
