<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Yellow bell icon swings and rings with an expanding wave ripple while a red count badge pops into view.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Notification Bell</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#13131f;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  #wrap{position:fixed;inset:0;display:grid;place-items:center;cursor:pointer}
  #stage{position:relative;width:46%;max-width:160px;aspect-ratio:1;display:grid;place-items:center}
  svg{width:100%;overflow:visible}
  .bell{fill:#ffd45c;transform-origin:50% 14%}
  .clap{fill:#ffb13c}
  .badge{position:absolute;right:16%;top:12%;min-width:20px;height:20px;padding:0 4px;border-radius:11px;background:#ff4d6d;color:#fff;font-size:12px;font-weight:700;display:grid;place-items:center;transform:scale(0);box-shadow:0 2px 6px rgba(255,77,109,.6)}
  .wave{position:absolute;border:2px solid #ffd45c;border-radius:50%;width:30%;aspect-ratio:1;opacity:0;pointer-events:none}
  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase}
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <div class="wave" id="wave"></div>
    <svg viewBox="0 0 24 24"><path class="bell" id="bell" d="M12 2.5a2 2 0 0 1 2 2v.6a6 6 0 0 1 4 5.65V15l1.6 2.4a.8.8 0 0 1-.66 1.24H5.06A.8.8 0 0 1 4.4 17.4L6 15v-4.25a6 6 0 0 1 4-5.65v-.6a2 2 0 0 1 2-2z"/><circle class="clap" id="clap" cx="12" cy="20.4" r="1.7"/></svg>
    <div class="badge" id="badge">1</div>
  </div>
</div>
<div class="cap">Notification</div>
<script>
const bell=document.getElementById('bell'),clap=document.getElementById('clap'),badge=document.getElementById('badge'),wave=document.getElementById('wave'),wrap=document.getElementById('wrap');
const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;let n=0;
const swing=[0,-16,14,-10,7,-4,0].map((d,i,a)=>({transform:'rotate('+d+'deg)',offset:i/(a.length-1)}));
function ring(){
  bell.animate(swing,{duration:820,easing:'ease-in-out'});
  clap.animate([{transform:'translateX(0)'},{transform:'translateX(3px)'},{transform:'translateX(-2px)'},{transform:'translateX(0)'}],{duration:820,easing:'ease-in-out'});
  wave.animate([{opacity:.7,transform:'scale(.6)'},{opacity:0,transform:'scale(1.8)'}],{duration:820,easing:'ease-out'});
  n++;badge.textContent=n;
  badge.animate([{transform:'scale(0)'},{transform:'scale(1.4)'},{transform:'scale(1)'}],{duration:420,fill:'forwards',easing:'cubic-bezier(.2,1.5,.4,1)'});
}
wrap.addEventListener('click',ring);
let timer;
function loop(){if(reduce)return;timer=setTimeout(()=>{if(n>=4){n=0;badge.style.transform='scale(0)';}else ring();loop();},2000);}
document.addEventListener('visibilitychange',()=>{document.hidden?clearTimeout(timer):loop();});
loop();
</script>
</body>
</html>
