<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Monospace code snippet with a copy button that morphs to a checkmark with a drawn stroke and 'Copied!' toast on click.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Copy Confirm</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0c1412;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  #wrap{position:fixed;inset:0;display:grid;place-items:center;cursor:pointer}
  #card{display:flex;align-items:center;gap:10px;background:#11201c;border:1px solid #1e3a32;border-radius:12px;padding:11px 14px;box-shadow:0 10px 30px rgba(0,0,0,.4)}
  #code{color:#7fffd0;font-size:clamp(11px,3.4vw,15px);letter-spacing:.02em;white-space:nowrap}
  #btn{position:relative;width:30px;height:30px;flex:none;display:grid;place-items:center;border-radius:8px;background:#16322a;transition:background .2s}
  #btn.done{background:#1f8f5f}
  svg{position:absolute;width:17px;height:17px;fill:none;stroke:#7fffd0;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:opacity .2s,transform .2s}
  #copy.hide{opacity:0;transform:scale(.6)}
  #check{stroke:#eafff5;opacity:0;transform:scale(.6)}
  #check.show{opacity:1;transform:scale(1)}
  #check path{stroke-dasharray:24;stroke-dashoffset:24}
  #check.show path{transition:stroke-dashoffset .35s ease .05s;stroke-dashoffset:0}
  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase}
  .toast{position:fixed;left:50%;bottom:18%;transform:translateX(-50%) translateY(8px);background:#1f8f5f;color:#eafff5;font-size:10px;padding:4px 9px;border-radius:6px;opacity:0;transition:opacity .25s,transform .25s;font-family:system-ui}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="wrap">
  <div id="card">
    <span id="code">npm i microfx</span>
    <div id="btn">
      <svg id="copy" viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
      <svg id="check" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
    </div>
  </div>
</div>
<div class="toast" id="toast">Copied!</div>
<div class="cap">Copy confirm</div>
<script>
const wrap=document.getElementById('wrap'),btn=document.getElementById('btn'),copy=document.getElementById('copy'),check=document.getElementById('check'),toast=document.getElementById('toast');
const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;let busy=false;
function fire(){
  if(busy)return;busy=true;
  btn.classList.add('done');copy.classList.add('hide');check.classList.add('show');toast.classList.add('show');
  btn.animate([{transform:'scale(1)'},{transform:'scale(.85)'},{transform:'scale(1)'}],{duration:260});
  setTimeout(()=>{btn.classList.remove('done');copy.classList.remove('hide');check.classList.remove('show');toast.classList.remove('show');busy=false;},1400);
}
wrap.addEventListener('click',fire);
let timer;
function loop(){if(reduce)return;timer=setTimeout(()=>{fire();loop();},2600);}
document.addEventListener('visibilitychange',()=>{document.hidden?clearTimeout(timer):loop();});
loop();
</script>
</body>
</html>
