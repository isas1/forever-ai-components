<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="FAQ accordion of rounded panels that smoothly expand their height and rotate a chevron to reveal answer text.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Accordion</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#161320;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  #wrap{position:fixed;inset:0;display:grid;place-items:center}
  #acc{width:72%;max-width:230px;display:flex;flex-direction:column;gap:8px}
  .item{background:#211c33;border:1px solid #2e2745;border-radius:12px;overflow:hidden}
  .head{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;cursor:pointer}
  .head h{font-size:12px;color:#e8e2ff;font-weight:600}
  .chev{width:14px;height:14px;border-right:2px solid #a98cff;border-bottom:2px solid #a98cff;transform:rotate(45deg);transition:transform .3s}
  .item.open .chev{transform:rotate(-135deg)}
  .body{height:0;overflow:hidden;transition:height .34s cubic-bezier(.4,0,.2,1)}
  .inner{padding:0 13px 12px;font-size:11px;line-height:1.5;color:#9c92c0}
  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/ui-microinteractions/07-accordion-expand.html",
 "title": "Accordion Expand",
 "description": "Three FAQ panels smoothly expand and collapse with a CSS height transition; a chevron rotates 180 degrees to indicate open state. Auto-cycles as demo.",
 "useWhen": "FAQ sections, product detail pages, settings panels — any context needing collapsible content with clear open/closed affordance.",
 "avoidWhen": "Remove auto-cycle timer before shipping in production. Not suitable when all answers must be visible simultaneously.",
 "agentPrompt": "Change the accent color from #a98cff to #38bdf8, add a fourth FAQ item with question 'Privacy' and answer 'We never sell your data.', and increase the step interval to 3000ms.",
 "editableAreas": [
  "FAQ data array (data)",
  "chevron accent color (#a98cff)",
  "auto-cycle interval (2200ms)",
  "panel background (#211c33)",
  "transition duration (.34s cubic-bezier)"
 ],
 "preserveElements": [
  "height-to-auto trick via transitionend listener",
  "IIFE-equivalent const scoping",
  "prefers-reduced-motion guard on loop()",
  "visibilitychange pause"
 ],
 "knownLimitations": [
  "Auto-cycles by default — remove setInterval loop before production use",
  "No aria-expanded on trigger elements — add for full accessibility",
  "Panel width capped at 230px max-width; may feel narrow on desktop"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "accordion",
  "expand",
  "faq",
  "chevron",
  "ui-control",
  "microinteraction",
  "click"
 ]
}
</script>
</head>
<body>
<div id="wrap"><div id="acc"></div></div>
<div class="cap">Accordion</div>
<script>
const acc=document.getElementById('acc');
const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
const data=[['Shipping','Free worldwide over $40, 3–5 days.'],['Returns','30 days, no questions asked.'],['Support','We reply within one business day.']];
const items=data.map(d=>{
  const it=document.createElement('div');it.className='item';
  it.innerHTML='<div class="head"><h>'+d[0]+'</h><div class="chev"></div></div><div class="body"><div class="inner">'+d[1]+'</div></div>';
  const head=it.querySelector('.head'),body=it.querySelector('.body');
  head.addEventListener('click',()=>toggle(it,body));
  acc.appendChild(it);return {it,body};
});
function toggle(it,body){
  const open=it.classList.contains('open');
  if(open){body.style.height=body.scrollHeight+'px';requestAnimationFrame(()=>body.style.height='0');it.classList.remove('open');}
  else{it.classList.add('open');body.style.height=body.scrollHeight+'px';body.addEventListener('transitionend',function h(){body.style.height='auto';body.removeEventListener('transitionend',h);},{once:true});}
}
let i=0,timer;
function step(){
  const cur=items[i%items.length];
  // close all then open one
  items.forEach(o=>{if(o.it.classList.contains('open')){o.body.style.height=o.body.scrollHeight+'px';requestAnimationFrame(()=>o.body.style.height='0');o.it.classList.remove('open');}});
  setTimeout(()=>{if(!document.hidden)toggle(cur.it,cur.body);},340);
  i++;
}
function loop(){clearTimeout(timer);if(reduce)return;timer=setInterval(step,2200);}
document.addEventListener('visibilitychange',()=>{document.hidden?clearInterval(timer):loop();});
loop();
</script>
</body>
</html>
