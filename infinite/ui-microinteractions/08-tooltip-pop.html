<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Circular heart-icon button that springs a mint tooltip with arrow above it on hover with a subtle press bounce.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tooltip Pop</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#101c1a;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  #wrap{position:fixed;inset:0;display:grid;place-items:center}
  #stage{position:relative;display:grid;place-items:center}
  #btn{width:54px;height:54px;border-radius:50%;background:#1c322e;border:1px solid #2c4f48;display:grid;place-items:center;cursor:pointer}
  #btn svg{width:24px;height:24px;fill:none;stroke:#4fe0c0;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  #tip{position:absolute;bottom:calc(100% + 14px);left:50%;transform:translateX(-50%) translateY(6px) scale(.85);background:#4fe0c0;color:#06231d;font-size:11px;font-weight:600;padding:6px 11px;border-radius:8px;white-space:nowrap;opacity:0;transform-origin:bottom center;transition:opacity .2s,transform .24s cubic-bezier(.2,1.5,.4,1);box-shadow:0 8px 20px rgba(0,0,0,.4)}
  #tip::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#4fe0c0}
  #stage.on #tip{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
  #stage.on #btn{background:#264a43}
  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase}
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <div id="tip">Add to favorites</div>
    <div id="btn"><svg viewBox="0 0 24 24"><path d="M12 21s-7-4.5-9.3-9C1 8.5 2.4 5 5.5 5c1.9 0 3.2 1 4.5 2.5C11.3 6 12.6 5 14.5 5 17.6 5 19 8.5 17.3 12 15 16.5 12 21 12 21z"/></svg></div>
  </div>
</div>
<div class="cap">Tooltip</div>
<script>
const stage=document.getElementById('stage'),btn=document.getElementById('btn');
const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
function show(){stage.classList.add('on');}
function hide(){stage.classList.remove('on');}
btn.addEventListener('pointerenter',show);
btn.addEventListener('pointerleave',hide);
btn.addEventListener('click',()=>{btn.animate([{transform:'scale(1)'},{transform:'scale(.88)'},{transform:'scale(1)'}],{duration:240});});
let timer,on=false;
function loop(){clearInterval(timer);if(reduce){show();return;}timer=setInterval(()=>{on=!on;on?show():hide();},1700);}
document.addEventListener('visibilitychange',()=>{document.hidden?clearInterval(timer):loop();});
loop();
</script>
</body>
</html>
