<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Dark profile card whose shimmering skeleton placeholders sweep, then resolve into avatar, image and text content on a loop.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Skeleton Load</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0d1117;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  #wrap{position:fixed;inset:0;display:grid;place-items:center}
  #card{width:66%;max-width:210px;background:#161c26;border:1px solid #232b38;border-radius:16px;padding:14px;box-shadow:0 14px 34px rgba(0,0,0,.4)}
  .top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .ph{position:relative;overflow:hidden;background:#222a37;border-radius:8px}
  .av{width:38px;height:38px;border-radius:50%;flex:none}
  .lines{flex:1;display:flex;flex-direction:column;gap:7px}
  .l1{height:11px;width:70%}.l2{height:9px;width:45%}
  .img{height:64px;width:100%;margin-bottom:10px}
  .p{height:9px;margin-bottom:7px}.p1{width:100%}.p2{width:92%}.p3{width:60%}
  .shimmer::after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(120,150,200,.18),transparent);animation:sh 1.3s infinite}
  @keyframes sh{100%{transform:translateX(100%)}}
  /* loaded state */
  #card.loaded .ph{background:transparent;animation:none}
  #card.loaded .ph::after{display:none}
  #card.loaded .av{background:linear-gradient(135deg,#5b8cff,#9b5bff)}
  #card.loaded .img{background:linear-gradient(135deg,#ff8e5c,#ff5c9d)}
  #card.loaded .real{opacity:1}
  .real{opacity:0;transition:opacity .4s}
  .name{font-size:12px;color:#e6ebf2;font-weight:600;position:absolute;left:0;top:0}
  .sub{font-size:10px;color:#7c8aa0;position:absolute;left:0;top:16px}
  .lines{position:relative}
  .txt{font-size:10px;line-height:1.5;color:#9aa7bd;position:absolute;inset:0;padding:0}
  .pwrap{position:relative}
  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase}
</style>
</head>
<body>
<div id="wrap">
  <div id="card">
    <div class="top">
      <div class="ph av shimmer"></div>
      <div class="lines">
        <div class="ph l1 shimmer"></div>
        <div class="ph l2 shimmer"></div>
        <div class="real name">Ava Chen</div>
        <div class="real sub">Product Designer</div>
      </div>
    </div>
    <div class="ph img shimmer"></div>
    <div class="pwrap">
      <div class="ph p p1 shimmer"></div>
      <div class="ph p p2 shimmer"></div>
      <div class="ph p p3 shimmer"></div>
      <div class="real txt">Just shipped a new micro-interaction kit — buttery, tiny, delightful.</div>
    </div>
  </div>
</div>
<div class="cap">Skeleton load</div>
<script>
const card=document.getElementById('card');
const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
let timer;
function cycle(){
  card.classList.remove('loaded');
  setTimeout(()=>{if(!document.hidden)card.classList.add('loaded');},1300);
}
function loop(){clearInterval(timer);cycle();if(reduce){card.classList.add('loaded');return;}timer=setInterval(cycle,3000);}
document.addEventListener('visibilitychange',()=>{document.hidden?clearInterval(timer):loop();});
loop();
</script>
</body>
</html>
