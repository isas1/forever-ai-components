<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Green circle strokes itself closed, a checkmark draws in, a radial glow pulses and a SUCCESS label fades up on click or loop.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Success Check</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#06120e;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  #wrap{position:fixed;inset:0;display:grid;place-items:center;cursor:pointer}
  svg{width:42%;max-width:150px;overflow:visible}
  .circle{fill:none;stroke:#22d98a;stroke-width:3;stroke-linecap:round;stroke-dasharray:295;stroke-dashoffset:295}
  .check{fill:none;stroke:#22d98a;stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:48;stroke-dashoffset:48}
  .glow{position:absolute;width:42%;max-width:150px;aspect-ratio:1;border-radius:50%;background:radial-gradient(circle,rgba(34,217,138,.4),transparent 70%);opacity:0;pointer-events:none}
  .cap{position:fixed;left:8px;bottom:7px;font-size:10px;letter-spacing:.08em;color:#fff;opacity:.28;text-transform:uppercase}
  .label{position:fixed;left:50%;bottom:20%;transform:translateX(-50%);color:#22d98a;font-size:11px;letter-spacing:.14em;opacity:0;transition:opacity .3s}
  .label.on{opacity:.85}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/ui-microinteractions/10-success-checkmark.html",
 "title": "Success Checkmark Draw",
 "description": "A green circle strokes itself closed then a checkmark draws in with a radial glow pulse and a SUCCESS label fade; auto-cycles every 2.6 s or triggers on click.",
 "useWhen": "Form submission confirmations, onboarding completion steps, payment success screens, any binary success state feedback.",
 "avoidWhen": "Contexts needing immediate static feedback — the animation takes ~900 ms to complete. Avoid on light backgrounds (colors hardcoded for dark navy).",
 "agentPrompt": "Change the accent color from #22d98a to #3b82f6 (blue) by updating the stroke color on .circle and .check and the glow gradient, and slow the circle draw to 0.9s by editing circle.style.transition.",
 "editableAreas": [
  "stroke color (#22d98a in CSS)",
  "circle draw duration (.55s)",
  "checkmark draw duration (.4s)",
  "glow opacity/scale keyframes",
  "auto-cycle interval (2600ms)"
 ],
 "preserveElements": [
  "stroke-dasharray/dashoffset reset before rAF (prevents replay glitch)",
  "visibilitychange pause/resume",
  "prefers-reduced-motion still() fallback",
  "IIFE-style scoped vars"
 ],
 "knownLimitations": [
  "Background color hardcoded dark (#06120e) — must change CSS to use on light themes",
  "Auto-cycles by default — remove setInterval before shipping in production",
  "SVG circle dasharray value (295) is hardcoded; changing r=47 requires recalculating circumference"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "checkmark",
  "success",
  "svg",
  "stroke-dash",
  "draw-on",
  "microinteraction",
  "feedback"
 ]
}
</script>
</head>
<body>
<div id="wrap">
  <div class="glow" id="glow"></div>
  <svg viewBox="0 0 100 100">
    <circle class="circle" id="circle" cx="50" cy="50" r="47"/>
    <path class="check" id="check" d="M28 52 L44 67 L73 35"/>
  </svg>
</div>
<div class="label" id="label">SUCCESS</div>
<div class="cap">Success draw</div>
<script>
const circle=document.getElementById('circle'),check=document.getElementById('check'),glow=document.getElementById('glow'),label=document.getElementById('label'),wrap=document.getElementById('wrap');
const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
function draw(){
  circle.style.transition='none';check.style.transition='none';
  circle.style.strokeDashoffset=295;check.style.strokeDashoffset=48;label.classList.remove('on');
  requestAnimationFrame(()=>{
    circle.style.transition='stroke-dashoffset .55s ease';circle.style.strokeDashoffset=0;
    setTimeout(()=>{
      check.style.transition='stroke-dashoffset .4s cubic-bezier(.6,0,.3,1)';check.style.strokeDashoffset=0;
      glow.animate([{opacity:0,transform:'scale(.6)'},{opacity:1,transform:'scale(1.1)'},{opacity:0,transform:'scale(1.4)'}],{duration:700,easing:'ease-out'});
      label.classList.add('on');
    },480);
  });
}
function still(){circle.style.strokeDashoffset=0;check.style.strokeDashoffset=0;label.classList.add('on');}
wrap.addEventListener('click',()=>{if(!reduce)draw();});
let timer;
function loop(){clearInterval(timer);if(reduce){still();return;}draw();timer=setInterval(()=>{if(!document.hidden)draw();},2600);}
document.addEventListener('visibilitychange',()=>{document.hidden?clearInterval(timer):loop();});
loop();
</script>
</body>
</html>
