<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Glowing purple PRESS pill that squashes on press with white ripples while its label is magnetically pulled toward an orbiting cursor dot.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Magnetic Button Press</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#1A1024;}
  #mbp-c{display:block;width:100%;height:100%;}
  .mbp-cap{position:fixed;left:9px;bottom:8px;font:600 10px/1.2 system-ui,sans-serif;
       letter-spacing:.12em;color:#C084FC;opacity:.34;text-transform:uppercase;
       pointer-events:none;user-select:none;}
</style>
</head>
<body>
<canvas id="mbp-c"></canvas>
<div class="mbp-cap">Magnetic Button Press</div>
<script>
(function(){
  const cv=document.getElementById('mbp-c'),ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const ACC='#C084FC', BG='#1A1024';
  let W,H,DPR,cx,cy,U;
  function size(){
    DPR=Math.min(devicePixelRatio||1,2);
    W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
    cx=W/2;cy=H/2;U=Math.min(W,H)/100; // unit
  }
  addEventListener('resize',size);size();

  // cycle: 0 approach .35 | depress .50 | hold .58 | release .72 | settle 1
  const PERIOD=190; let t=0, ripples=[], pointer=null;
  function ease(x){return x<0.5?4*x*x*x:1-Math.pow(-2*x+2,3)/2;}
  function spring(x){return 1-Math.cos(x*Math.PI*3.2)*Math.exp(-x*3.6);}

  cv.addEventListener('pointermove',e=>{
    const r=cv.getBoundingClientRect();
    pointer={x:e.clientX-r.left,y:e.clientY-r.top,life:1};
  });

  function fields(p){
    // p: 0..1 phase progress. returns {press,squash,labelPull}
    let press=0;
    if(p<0.40) press=0;
    else if(p<0.50) press=ease((p-0.40)/0.10);
    else if(p<0.62) press=1;
    else if(p<0.78) press=1-spring((p-0.62)/0.16)*0; // handled via rebound below
    else press=0;
    // continuous press value via smooth pulse + spring release
    let base=0;
    if(p<0.40) base=0;
    else if(p<0.50) base=ease((p-0.40)/0.10);
    else if(p<0.62) base=1;
    else if(p<0.86){ const k=(p-0.62)/0.24; base=Math.cos(k*Math.PI*2.4)*Math.exp(-k*4.2)*0.5+0.5*(1-k); }
    else base=0;
    return base;
  }

  let lastPress=0;
  function frame(){
    t=(t+1)%PERIOD;
    const p=t/PERIOD;

    ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);

    // button geometry
    const bw=Math.min(W*0.62,H*1.5), bh=Math.min(H*0.32,bw*0.42);
    const rad=bh/2;

    // magnetic source: orbiting dot, or live pointer
    let mx,my;
    const orbR=bw*0.62, oa=p*Math.PI*2 - Math.PI*0.5;
    const odx=cx+Math.cos(oa)*orbR, ody=cy+Math.sin(oa)*orbR*0.55;
    if(pointer&&pointer.life>0){ mx=pointer.x; my=pointer.y; pointer.life-=0.012; }
    else { mx=odx; my=ody; }

    const press=fields(p); // 0..1
    // fire ripple on the depress edge
    if(press>0.55 && lastPress<=0.55 && !reduce){
      ripples.push({x:cx+(mx-cx)*0.18,y:cy,r0:rad*0.2,t:0});
    }
    lastPress=press;

    const squash=1-press*0.06;       // vertical squash 6%
    const widen=1+press*0.045;       // bulge sideways
    const sink=press*bh*0.10;        // pushes down slightly
    const by=cy+sink;

    // soft shadow that tightens on press
    ctx.save();
    ctx.translate(cx,by+bh*0.55+press*bh*0.12);
    ctx.scale(widen*(1-press*0.18),0.3);
    const sg=ctx.createRadialGradient(0,0,0,0,0,bw*0.55);
    sg.addColorStop(0,'rgba(192,132,252,'+(0.30-press*0.10)+')');
    sg.addColorStop(1,'rgba(192,132,252,0)');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(0,0,bw*0.55,0,Math.PI*2);ctx.fill();
    ctx.restore();

    // button body
    ctx.save();
    ctx.translate(cx,by);
    ctx.scale(widen,squash);
    const w=bw,h=bh;
    function pill(x,y,w,h,r){ctx.beginPath();
      ctx.moveTo(x-w/2+r,y-h/2);
      ctx.arcTo(x+w/2,y-h/2,x+w/2,y+h/2,r);
      ctx.arcTo(x+w/2,y+h/2,x-w/2,y+h/2,r);
      ctx.arcTo(x-w/2,y+h/2,x-w/2,y-h/2,r);
      ctx.arcTo(x-w/2,y-h/2,x+w/2,y-h/2,r);
      ctx.closePath();}
    const grd=ctx.createLinearGradient(0,-h/2,0,h/2);
    const lift=1-press*0.35;
    grd.addColorStop(0,'rgba(192,132,252,'+(0.98*lift)+')');
    grd.addColorStop(1,'rgba(146,84,222,'+(0.95*lift)+')');
    // outer glow (soft radial gradient instead of per-frame shadowBlur)
    const glowA=(0.55-press*0.25);
    const glowR=Math.max(w,h)*0.85;
    const gGlow=ctx.createRadialGradient(0,0,h*0.3,0,0,glowR);
    gGlow.addColorStop(0,'rgba(192,132,252,'+(glowA*0.6)+')');
    gGlow.addColorStop(0.5,'rgba(192,132,252,'+(glowA*0.32)+')');
    gGlow.addColorStop(1,'rgba(192,132,252,0)');
    ctx.fillStyle=gGlow;ctx.fillRect(-glowR,-glowR,glowR*2,glowR*2);
    ctx.fillStyle=grd;
    pill(0,0,w,h,rad);ctx.fill();

    // top sheen
    const sh=ctx.createLinearGradient(0,-h/2,0,0);
    sh.addColorStop(0,'rgba(255,255,255,'+(0.22*lift)+')');
    sh.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=sh;pill(0,-h*0.02,w*0.96,h*0.92,rad*0.9);ctx.fill();

    // clip for ripples
    ctx.save();
    pill(0,0,w,h,rad);ctx.clip();
    for(let i=ripples.length-1;i>=0;i--){
      const rp=ripples[i]; rp.t+=0.022;
      if(rp.t>=1){ripples.splice(i,1);continue;}
      const rr=rp.r0+rp.t*w*0.85;
      ctx.strokeStyle='rgba(255,255,255,'+(0.5*(1-rp.t))+')';
      ctx.lineWidth=(2.4*(1-rp.t)+0.4)*U*0.5;
      ctx.beginPath();ctx.arc((rp.x-cx),0,rr,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,'+(0.10*(1-rp.t))+')';
      ctx.beginPath();ctx.arc((rp.x-cx),0,rr*0.5,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
    ctx.restore(); // body transform

    // ---- LABEL: pulled toward magnetic dot ----
    const label='PRESS';
    const fs=bh*0.40;
    ctx.font='700 '+fs+'px system-ui,-apple-system,Segoe UI,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    // pull vector clamped inside button
    let dx=(mx-cx), dy=(my-by);
    const pullStr=press>0.3?0.04:0.10; // less drift while pressed
    let lx=cx+dx*pullStr, ly=by+dy*pullStr*0.7 + sink*0.4;
    const maxx=bw*0.16, maxy=bh*0.16;
    lx=cx+Math.max(-maxx,Math.min(maxx,lx-cx));
    ly=by+Math.max(-maxy,Math.min(maxy,ly-by));
    ctx.save();
    ctx.translate(lx,ly);
    ctx.scale(widen,squash*(1-press*0.04));
    ctx.fillStyle='rgba(26,16,36,'+(0.92)+')';
    ctx.fillText(label,0,fs*0.04);
    ctx.restore();

    // magnetic cursor dot + connecting filament
    if(!reduce){
      ctx.strokeStyle='rgba(192,132,252,'+(0.18*(press<0.3?1:0.4))+')';
      ctx.lineWidth=1.2;
      ctx.setLineDash([2,4]);
      ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(mx,my);ctx.stroke();
      ctx.setLineDash([]);
      const dotR=U*0.9+press*U*0.4;
      const dg=ctx.createRadialGradient(mx,my,0,mx,my,dotR*3);
      dg.addColorStop(0,'rgba(192,132,252,0.9)');
      dg.addColorStop(1,'rgba(192,132,252,0)');
      ctx.fillStyle=dg;ctx.beginPath();ctx.arc(mx,my,dotR*3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#F3E8FF';ctx.beginPath();ctx.arc(mx,my,dotR,0,Math.PI*2);ctx.fill();
    }

    raf=requestAnimationFrame(frame);
  }

  let raf=0;
  function start(){if(!raf&&!reduce)raf=requestAnimationFrame(frame);}
  function stop(){cancelAnimationFrame(raf);raf=0;}
  document.addEventListener('visibilitychange',()=>{document.hidden?stop():start();});
  if(reduce){ t=0; ripples=[]; frame(); } else start();
})();
</script>
</body>
</html>
