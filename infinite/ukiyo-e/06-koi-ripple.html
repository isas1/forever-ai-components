<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="A coral-marked koi turns and undulates beneath expanding concentric pond ripples with a few drifting petals in woodblock style.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Koi Ripple</title>
<style>
  html,body{margin:0;height:100%;background:#0f1822;overflow:hidden}
  #uk06-stage{position:fixed;inset:0;width:100%;height:100%;display:block}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important}}
</style>
</head>
<body>
<canvas id="uk06-stage" role="img" aria-label="A koi fish turning beneath concentric pond ripples, in Japanese woodblock style"></canvas>
<div class="cap">Koi Ripple</div>
<script>
(function(){
  "use strict";
  var cv=document.getElementById("uk06-stage"),ctx=cv.getContext("2d");
  var reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
  // palette
  var BG="#0f1822",WATER="#16324a",WATER2="#1d4666",CREAM="#e8d5b0",
      INK="#0a0f16",CORAL="#d6552f",CORAL2="#e87a4a",INDIGO="#274c6e",WHITE="#f3ead6";
  var W=0,H=0,DPR=1,cx=0,cy=0,R=0;
  function resize(){
    DPR=Math.min(2,window.devicePixelRatio||1);
    W=cv.clientWidth;H=cv.clientHeight;
    cv.width=Math.max(1,(W*DPR)|0);cv.height=Math.max(1,(H*DPR)|0);
    ctx.setTransform(DPR,0,0,DPR,0,0);
    cx=W*0.5;cy=H*0.5;R=Math.min(W,H);
  }
  resize();

  // static water backdrop: flat plane + bokashi band, painted once per resize into offscreen
  function paintWater(){
    // bokashi vertical gradient on the pond
    var g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,WATER2);g.addColorStop(.55,WATER);g.addColorStop(1,INDIGO);
    ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
    // rounded pond shape filling frame
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  }

  // four concentric ripple rings, phase-offset; drawn as stroked circles (transform-free, cheap)
  var RINGS=4;
  // koi geometry helpers — original stylised koi, not a copy
  function koi(t){
    // koi swims a slow arc and turns; body is an arched ellipse with a flicking tail
    var swim=Math.sin(t*0.55);          // -1..1 lateral sway
    var turn=t*0.32;                     // heading rotation
    var bend=Math.sin(t*1.6)*0.5;        // body undulation
    var len=R*0.30, wid=R*0.105;
    ctx.save();
    ctx.translate(cx+Math.cos(turn)*R*0.06, cy+Math.sin(turn*1.3)*R*0.05);
    ctx.rotate(turn*0.9+swim*0.25);

    // tail (cream, translucent fins) — drawn behind body
    ctx.save();
    ctx.translate(-len*0.52,0);
    ctx.rotate(bend*0.9);
    ctx.fillStyle=CREAM;ctx.globalAlpha=0.85;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.quadraticCurveTo(-len*0.34,-wid*0.9,-len*0.6,-wid*0.25);
    ctx.quadraticCurveTo(-len*0.42,0,-len*0.6,wid*0.25);
    ctx.quadraticCurveTo(-len*0.34,wid*0.9,0,0);
    ctx.fill();
    ctx.globalAlpha=1;
    ctx.restore();

    // body: arched along undulation, flat coral plane with bold ink outline
    ctx.beginPath();
    var seg=14,i,x,y,th;
    for(i=0;i<=seg;i++){
      var u=i/seg;                       // 0 head .. 1 tail
      var spineY=Math.sin(u*Math.PI*1.1+bend*Math.PI)*wid*0.55;
      var half=Math.sin(u*Math.PI)*wid*(1.0-0.15*u);
      x=len*0.5-u*len; y=spineY-half;
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    for(i=seg;i>=0;i--){
      var u2=i/seg;
      var spineY2=Math.sin(u2*Math.PI*1.1+bend*Math.PI)*wid*0.55;
      var half2=Math.sin(u2*Math.PI)*wid*(1.0-0.15*u2);
      ctx.lineTo(len*0.5-u2*len, spineY2+half2);
    }
    ctx.closePath();
    ctx.fillStyle=CREAM;ctx.fill();
    ctx.lineWidth=Math.max(1.5,R*0.011);ctx.strokeStyle=INK;
    ctx.lineJoin="round";ctx.stroke();

    // coral dorsal patches (flat planes) — kohaku markings
    ctx.fillStyle=CORAL;
    ctx.beginPath();
    ctx.ellipse(len*0.22,-wid*0.1,len*0.13,wid*0.5,0,0,6.2832);
    ctx.fill();
    ctx.fillStyle=CORAL2;
    ctx.beginPath();
    ctx.ellipse(-len*0.1,wid*0.05,len*0.1,wid*0.42,0,0,6.2832);
    ctx.fill();
    // head dot
    ctx.fillStyle=CORAL;
    ctx.beginPath();ctx.ellipse(len*0.40,-wid*0.05,len*0.07,wid*0.3,0,0,6.2832);ctx.fill();

    // pectoral fin flick
    ctx.save();
    ctx.translate(len*0.18,wid*0.5);
    ctx.rotate(0.5+bend*0.6);
    ctx.fillStyle="rgba(243,234,214,.8)";
    ctx.beginPath();ctx.moveTo(0,0);
    ctx.quadraticCurveTo(wid*0.5,wid*0.2,wid*0.7,wid*0.7);
    ctx.quadraticCurveTo(wid*0.2,wid*0.5,0,0);ctx.fill();
    ctx.restore();

    // eye
    ctx.fillStyle=INK;
    ctx.beginPath();ctx.arc(len*0.42,-wid*0.18,Math.max(1.5,wid*0.13),0,6.2832);ctx.fill();
    ctx.restore();
  }

  function drawRipples(t){
    ctx.lineWidth=Math.max(1.2,R*0.006);
    for(var i=0;i<RINGS;i++){
      var ph=(t*0.22+i/RINGS)%1;                 // 0..1 expand
      var rad=ph*R*0.52+R*0.04;
      var a=(1-ph)*0.5;
      ctx.globalAlpha=a;
      ctx.strokeStyle=i%2?CREAM:WHITE;
      ctx.beginPath();ctx.arc(cx,cy,rad,0,6.2832);ctx.stroke();
    }
    ctx.globalAlpha=1;
  }

  // a few drifting petals (capped, cheap) for ukiyo-e air
  var PET=7,pet=new Float32Array(PET*3);
  (function initPet(){for(var i=0;i<PET;i++){pet[i*3]=Math.random();pet[i*3+1]=Math.random();pet[i*3+2]=Math.random()*6.28;}})();
  function drawPetals(t){
    ctx.fillStyle=CORAL2;
    for(var i=0;i<PET;i++){
      var px=(pet[i*3]+ (Math.sin(t*0.3+i)*0.04))*W;
      var py=((pet[i*3+1]+t*0.012+i*0.07)%1)*H;
      var s=R*0.012;
      ctx.save();ctx.translate(px,py);ctx.rotate(pet[i*3+2]+t*0.4);
      ctx.globalAlpha=0.55;
      ctx.beginPath();
      ctx.moveTo(0,-s);ctx.quadraticCurveTo(s,0,0,s);ctx.quadraticCurveTo(-s,0,0,-s);
      ctx.fill();ctx.restore();
    }
    ctx.globalAlpha=1;
  }

  function frame(t){
    paintWater();
    drawRipples(t);
    drawPetals(t);
    koi(t);
  }

  var running=true,raf=0,start=0;
  function loop(now){
    if(!running)return;
    if(!start)start=now;
    var t=(now-start)/1000;
    frame(t);
    raf=requestAnimationFrame(loop);
  }
  function stop(){running=false;if(raf)cancelAnimationFrame(raf);raf=0;}
  function go(){if(running&&!raf){start=0;raf=requestAnimationFrame(loop);}}

  window.addEventListener("resize",function(){
    resize();if(reduce){frame(2.2);}
  });
  document.addEventListener("visibilitychange",function(){
    if(document.hidden){stop();}else{running=true;go();}
  });

  if(reduce){frame(2.2);return;}
  go();
})();
</script>
</body>
</html>
