<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Impasto Strokes — Vincent van Gogh. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Impasto Strokes</title>
<style>
  html,body{margin:0;height:100%;background:#0d2138;overflow:hidden}
  #vg02-stage{position:fixed;inset:0;width:100%;height:100%}
  #vg02-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .vg02-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#efe6cf;opacity:.46;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
</head>
<body>
<div id="vg02-stage" role="img" aria-label="Thick directional Van Gogh brushstrokes accumulate along a swirling noise field, building ridges of cobalt, cadmium and ochre paint, then wipe and repaint.">
  <canvas id="vg02-cv"></canvas>
</div>
<div class="vg02-cap">Impasto Strokes</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv=document.getElementById('vg02-cv'); if(!cv) return;

  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width), h=Math.max(2,r.height);
    c.width=Math.round(w*dpr); c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }
  function makeNoise(seed){
    const g=[]; let s=seed||1234;
    const rnd=()=>{ s=(s*1103515245+12345)&0x7fffffff; return s/0x7fffffff; };
    for(let i=0;i<256;i++) g.push(rnd());
    const p=[]; for(let i=0;i<256;i++) p.push(i);
    for(let i=255;i>0;i--){ const j=(rnd()*(i+1))|0; const t=p[i];p[i]=p[j];p[j]=t; }
    function fade(t){return t*t*t*(t*(t*6-15)+10);}
    function at(x,y){ return g[(p[(x&255)] + (y&255))&255]; }
    return function(x,y){
      const xi=Math.floor(x), yi=Math.floor(y);
      const xf=x-xi, yf=y-yi;
      const u=fade(xf), v=fade(yf);
      const a=at(xi,yi), b=at(xi+1,yi), c=at(xi,yi+1), d=at(xi+1,yi+1);
      const top=a+u*(b-a), bot=c+u*(d-c);
      return top+v*(bot-top);
    };
  }

  let S=fitCanvas(cv);
  const noise=makeNoise(42);
  let total=0, last=performance.now(), wipe=0;
  const cols=['#1c3f7c','#14506b','#f2c10b','#c98a2b','#f7e39a','#28432b'];
  function reset(){ total=0; wipe=0; S.ctx.fillStyle='#0d2138'; S.ctx.fillRect(0,0,S.w,S.h); }
  reset();
  function field(x,y){ return noise(x*0.004, y*0.004)*Math.PI*4; }
  function paint(){
    const x=Math.random()*S.w, y=Math.random()*S.h;
    const a=field(x,y);
    const len=10+Math.random()*22;
    const w=4+Math.random()*7;
    const c=cols[(Math.random()*cols.length)|0];
    const ctx=S.ctx;
    ctx.save();ctx.translate(x,y);ctx.rotate(a);
    ctx.fillStyle=c;ctx.globalAlpha=0.92;
    ctx.beginPath();ctx.ellipse(0,0,len,w,0,0,7);ctx.fill();
    ctx.globalAlpha=0.35;ctx.fillStyle='rgba(247,231,176,.6)';
    ctx.beginPath();ctx.ellipse(-len*0.15,-w*0.35,len*0.8,w*0.32,0,0,7);ctx.fill();
    ctx.restore();
    total++;
  }
  function draw(now){
    const dt=Math.min(0.05,(now-last)/1000); last=now;
    if(REDUCED){ if(total<700){ for(let i=0;i<8;i++) paint(); } return; }
    for(let i=0;i<14;i++) paint();
    if(total>1100){
      wipe+=dt;
      S.ctx.fillStyle='rgba(13,33,56,'+(0.05+wipe*0.04)+')';
      S.ctx.fillRect(0,0,S.w,S.h);
      if(wipe>1.4){ reset(); }
    }
  }

  let raf=0, running=false;
  function loop(){ if(!running) return; draw(performance.now()); raf=requestAnimationFrame(loop); }
  function start(){ if(running) return; running=true; last=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }

  let _rt;
  window.addEventListener('resize', ()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ S=fitCanvas(cv); reset(); if(REDUCED) draw(performance.now()); },150); }, {passive:true});
  document.addEventListener('visibilitychange', ()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });

  if(REDUCED){ draw(performance.now()); }
  else start();
})();
</script>
</body>
</html>
