<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Sunflower Radial — Vincent van Gogh. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sunflower Radial</title>
<style>
  html,body{margin:0;height:100%;background:#16331f;overflow:hidden}
  #vg04-stage{position:fixed;inset:0;width:100%;height:100%}
  #vg04-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .vg04-core{position:absolute;left:50%;top:50%;width:90px;height:90px;margin:-45px 0 0 -45px;border-radius:50%;
    background:radial-gradient(circle, #c98a2b, #6b4416);pointer-events:none;}
  @keyframes vg04-seedpulse{0%,100%{transform:scale(1);opacity:.85;}50%{transform:scale(1.12);opacity:1;}}
  .vg04-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#efe6cf;opacity:.46;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/van-gogh/04-sunflower-radial.html",
 "title": "Sunflower Radial",
 "description": "Two rings of ochre and cadmium petals rotate slowly around a phyllotactic seed-head spiral; a CSS-animated DOM core pulses at center.",
 "useWhen": "Art-themed hero backgrounds, Van Gogh / botanical aesthetics, ambient looping displays on dark canvases.",
 "avoidWhen": "Light-background layouts (background hardcoded dark green). Contexts requiring readable text overlays — petal motion competes with copy.",
 "agentPrompt": "Change petal count to 30 by setting `const petals=30`, shift outer petal color to '#e85d04', and slow rotation by changing `t*0.45` to `t*0.22`.",
 "editableAreas": [
  "petal count (petals=22)",
  "rotation speed (t*0.45)",
  "seed count (seeds=150)",
  "petal colors (#f2c10b / #c98a2b)",
  "core pulse speed (vg04-seedpulse 2.4s)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (REDUCED)",
  "visibilitychange start/stop",
  "DPR-aware fitCanvas()"
 ],
 "knownLimitations": [
  "Background color hardcoded in CSS (#16331f) — must edit to change from dark green",
  "Core DOM div sized fixed 90px — does not scale with viewport"
 ],
 "tier": "curated",
 "labels": [
  "agent-ready",
  "easy-to-modify",
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps"
 ],
 "tags": [
  "sunflower",
  "van-gogh",
  "canvas",
  "radial",
  "phyllotaxis",
  "ambient",
  "generative"
 ]
}
</script>
</head>
<body>
<div id="vg04-stage" role="img" aria-label="A Van Gogh sunflower: rings of ochre and cadmium petals turning slowly about a pulsing phyllotactic seed-head spiral.">
  <canvas id="vg04-cv"></canvas>
  <div class="vg04-core" id="vg04-core"></div>
</div>
<div class="vg04-cap">Sunflower Radial</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv=document.getElementById('vg04-cv'); if(!cv) return;
  const core=document.getElementById('vg04-core');

  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width), h=Math.max(2,r.height);
    c.width=Math.round(w*dpr); c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }

  let S=fitCanvas(cv);
  if(core && !REDUCED) core.style.animation='vg04-seedpulse 2.4s ease-in-out infinite';
  let t=0,last=performance.now();
  const GA=Math.PI*(3-Math.sqrt(5));
  function draw(now){
    const dt=Math.min(0.05,(now-last)/1000);last=now;
    if(!REDUCED) t+=dt;
    const ctx=S.ctx,W=S.w,H=S.h,cx=W/2,cy=H/2;
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*0.6);
    g.addColorStop(0,'#3a5a2e');g.addColorStop(1,'#16331f');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    const R=Math.min(W,H)*0.46;
    const ringR=R*0.92, petals=22;
    for(let ring=0;ring<2;ring++){
      const rr=ringR*(ring?0.74:1);
      for(let i=0;i<petals;i++){
        const a=(i/petals)*Math.PI*2 + t*0.45 + ring*0.14;
        const px=cx+Math.cos(a)*rr*0.30, py=cy+Math.sin(a)*rr*0.30;
        ctx.save();ctx.translate(px,py);ctx.rotate(a);
        ctx.fillStyle= ring? '#c98a2b' : '#f2c10b';
        ctx.beginPath();
        ctx.ellipse(rr*0.30,0, rr*0.34, rr*0.085, 0, 0, 7);
        ctx.fill();
        ctx.fillStyle='rgba(247,231,176,.4)';
        ctx.beginPath();ctx.ellipse(rr*0.34,-rr*0.02, rr*0.22, rr*0.03,0,0,7);ctx.fill();
        ctx.restore();
      }
    }
    const seeds=150, pulse=0.5+0.5*Math.sin(t*2.2);
    for(let i=0;i<seeds;i++){
      const r=Math.sqrt(i/seeds)*R*0.30;
      const a=i*GA - t*0.3;
      const sx=cx+Math.cos(a)*r, sy=cy+Math.sin(a)*r;
      const sz=1.6+ (1-i/seeds)*2.4;
      const warm=i%2;
      ctx.fillStyle= warm? 'rgba(107,68,22,.95)':'rgba(60,40,14,.95)';
      ctx.beginPath();ctx.arc(sx,sy,sz*(0.9+0.2*pulse),0,7);ctx.fill();
    }
    ctx.fillStyle='rgba(242,193,11,'+(0.10+0.06*pulse)+')';
    ctx.beginPath();ctx.arc(cx,cy,R*0.32,0,7);ctx.fill();
  }

  let raf=0, running=false;
  function loop(){ if(!running) return; draw(performance.now()); raf=requestAnimationFrame(loop); }
  function start(){ if(running) return; running=true; last=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }

  let _rt;
  window.addEventListener('resize', ()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ S=fitCanvas(cv); if(REDUCED) draw(performance.now()); },150); }, {passive:true});
  document.addEventListener('visibilitychange', ()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });

  if(REDUCED){ draw(performance.now()); }
  else start();
})();
</script>
</body>
</html>
