<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Stir the Sky — Post-Impressionist Night Studies. A self-contained, zero-dependency animated web component.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stir the Sky</title>
<style>
  html,body{margin:0;height:100%;background:#08111f;overflow:hidden}
  #vg06-stage{position:fixed;inset:0;width:100%;height:100%}
  #vg06-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
  .vg06-cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#efe6cf;opacity:.46;letter-spacing:.08em;text-transform:uppercase;user-select:none}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/van-gogh/06-stir-the-sky.html",
 "title": "Stir the Sky",
 "description": "Cobalt, cream, and navy particles follow a noise flow field stirred by a drifting vortex, accumulating into swirling, post-impressionist brushstroke trails.",
 "useWhen": "Dark-mode hero backgrounds, art/gallery themes, ambient looping displays evoking painterly motion.",
 "avoidWhen": "Light backgrounds (hardcoded dark navy). Low-end devices with many active tabs — persistent trail overdraw is GPU-bound.",
 "agentPrompt": "Change palette to warm sunset tones: replace the three rgba color strings with 'rgba(235,100,60,', 'rgba(255,200,80,', 'rgba(120,30,20,' and raise vortex strength from 0.55 to 0.85.",
 "editableAreas": [
  "particle count ceiling (N=360)",
  "trail fade opacity (0.14 in fillRect)",
  "vortex wander speed (t*0.31, t*0.23)",
  "vortex influence radius (90 in exp)",
  "particle palette (three rgba strings)",
  "particle speed range (0.6 + random*1.0)"
 ],
 "preserveElements": [
  "IIFE wrapper",
  "prefers-reduced-motion guard (REDUCED)",
  "visibilitychange stop/start",
  "DPR-aware fitCanvas"
 ],
 "knownLimitations": [
  "Background color hardcoded in both CSS and canvas fill — must change both",
  "No pointer interactivity — vortex is autonomous only",
  "Particle count auto-scales with viewport, capped at 360"
 ],
 "tier": "curated",
 "labels": [
  "mobile-ready",
  "accessible",
  "copy-paste-safe",
  "minimal-deps",
  "agent-ready"
 ],
 "tags": [
  "particles",
  "flow-field",
  "noise",
  "canvas",
  "ambient",
  "night-sky"
 ]
}
</script>
</head>
<body>
<div id="vg06-stage" role="img" aria-label="A post-impressionist night sky stirred by an unseen hand: streaming particles of cobalt and cream gather into slow wandering vortices that drift and settle.">
  <canvas id="vg06-cv"></canvas>
</div>
<div class="vg06-cap">Stir the Sky</div>
<script>
(function(){
  "use strict";
  const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv=document.getElementById('vg06-cv'); if(!cv) return;

  function fitCanvas(c){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const r=c.getBoundingClientRect();
    const w=Math.max(2,r.width), h=Math.max(2,r.height);
    c.width=Math.round(w*dpr); c.height=Math.round(h*dpr);
    const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h,dpr};
  }
  function makeNoise(seed){
    const g=[]; let s=seed||1234;
    const rnd=()=>{ s=(s*1103515245+12345)&0x7fffffff; return s/0x7fffffff; };
    for(let i=0;i<256;i++) g.push(rnd());
    const p=[]; for(let i=0;i<256;i++) p.push(i);
    for(let i=255;i>0;i--){ const j=(rnd()*(i+1))|0; const t=p[i];p[i]=p[j];p[j]=t; }
    function fade(t){return t*t*t*(t*(t*6-15)+10);}
    function at(x,y){ return g[(p[(x&255)] + (y&255))&255]; }
    return function(x,y){
      const xi=Math.floor(x), yi=Math.floor(y);
      const xf=x-xi, yf=y-yi;
      const u=fade(xf), v=fade(yf);
      const a=at(xi,yi), b=at(xi+1,yi), c=at(xi,yi+1), d=at(xi+1,yi+1);
      const top=a+u*(b-a), bot=c+u*(d-c);
      return top+v*(bot-top);
    };
  }

  let S=fitCanvas(cv);
  const noise=makeNoise(99);
  let parts=[], t=0, last=performance.now();
  function build(){
    parts=[];
    const N=Math.min(360, Math.round(S.w*S.h/1100));
    for(let i=0;i<N;i++){
      const q={x:Math.random()*S.w,y:Math.random()*S.h,px:0,py:0,
        c:Math.random()<0.6?'rgba(173,196,235,':(Math.random()<0.5?'rgba(247,227,154,':'rgba(28,63,124,'),
        a:0.06+Math.random()*0.16, sp:0.6+Math.random()*1.0};
      q.px=q.x;q.py=q.y;parts.push(q);
    }
  }
  build();
  function draw(now){
    const dt=Math.min(0.05,(now-last)/1000);last=now;
    if(!REDUCED) t+=dt;
    const ctx=S.ctx,W=S.w,H=S.h;
    ctx.fillStyle='rgba(8,18,33,'+(REDUCED?1:0.14)+')';ctx.fillRect(0,0,W,H);
    /* autonomous wandering stir centre; strength breathes in and out */
    const cxs=W*(0.5+0.30*Math.sin(t*0.31)+0.12*Math.cos(t*0.17));
    const cys=H*(0.5+0.26*Math.cos(t*0.23)+0.10*Math.sin(t*0.41));
    const str=REDUCED?0:0.55+0.45*Math.sin(t*0.5);
    ctx.lineWidth=1.4;
    for(const q of parts){
      const base=noise(q.x*0.005,q.y*0.005 + t*0.1)*Math.PI*4 + t*0.2;
      let a=base;
      if(str>0.01){
        const dx=q.x-cxs, dy=q.y-cys, d=Math.hypot(dx,dy)+0.01;
        const infl=Math.exp(-(d*d)/(2*90*90))*str;
        const tang=Math.atan2(dy,dx)+Math.PI*0.5;
        a = a*(1-infl) + tang*infl;
      }
      q.px=q.x;q.py=q.y;
      const sp=q.sp*(REDUCED?0:1.3);
      q.x+=Math.cos(a)*sp; q.y+=Math.sin(a)*sp;
      if(q.x<0||q.x>W||q.y<0||q.y>H){ q.x=Math.random()*W;q.y=Math.random()*H;q.px=q.x;q.py=q.y;continue; }
      ctx.strokeStyle=q.c+q.a+')';
      ctx.beginPath();ctx.moveTo(q.px,q.py);ctx.lineTo(q.x,q.y);ctx.stroke();
    }
  }

  let raf=0, running=false;
  function loop(){ if(!running) return; draw(performance.now()); raf=requestAnimationFrame(loop); }
  function start(){ if(running) return; running=true; last=performance.now(); raf=requestAnimationFrame(loop); }
  function stop(){ running=false; if(raf) cancelAnimationFrame(raf); raf=0; }

  S.ctx.fillStyle='#08111f';S.ctx.fillRect(0,0,S.w,S.h);
  let _rt;
  window.addEventListener('resize', ()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ S=fitCanvas(cv); build(); if(REDUCED) draw(performance.now()); },150); }, {passive:true});
  document.addEventListener('visibilitychange', ()=>{ if(REDUCED) return; if(document.hidden) stop(); else start(); });

  if(REDUCED){ for(let i=0;i<40;i++) draw(performance.now()); }
  else start();
})();
</script>
</body>
</html>
