<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Retro Y2K UI windows cascade down a neon perspective grid beneath a striped chrome sun and twinkling starfield.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Window Cascade</title>
<style>
  :root{--vw09-bg:#160a2a;--vw09-cyan:#22d3ee;--vw09-mag:#ff2ed1;--vw09-vio:#7b2cff}
  html,body{margin:0;height:100%;background:var(--vw09-bg);overflow:hidden}
  #vw09-stage{position:fixed;inset:0;display:grid;place-items:center;
    background:
      radial-gradient(120% 80% at 50% 118%,rgba(255,46,209,.30),transparent 60%),
      radial-gradient(90% 70% at 50% -20%,rgba(34,211,238,.16),transparent 60%),
      var(--vw09-bg);
    font-family:ui-monospace,"SF Mono",Menlo,monospace}
  #vw09-scene{position:relative;width:100%;height:100%;perspective:760px;perspective-origin:50% 42%}
  #vw09-gridwrap{position:absolute;left:-25%;right:-25%;bottom:0;height:48%;
    transform:rotateX(76deg);transform-origin:bottom;overflow:hidden;
    -webkit-mask-image:linear-gradient(transparent,#000 38%);mask-image:linear-gradient(transparent,#000 38%)}
  #vw09-grid{position:absolute;left:0;right:0;top:-22%;height:144%;
    background:
      repeating-linear-gradient(90deg,rgba(34,211,238,.55) 0 1px,transparent 1px 7%),
      repeating-linear-gradient(0deg,rgba(255,46,209,.50) 0 1px,transparent 1px 11%);
    will-change:transform;animation:vw09-roll 2.4s linear infinite}
  @keyframes vw09-roll{from{transform:translateY(0)}to{transform:translateY(11%)}}
  #vw09-deck{position:absolute;inset:0;transform-style:preserve-3d}
  .vw09-win{position:absolute;left:50%;top:50%;width:46%;max-width:300px;min-width:130px;
    border:1.5px solid var(--vw09-cyan);border-radius:5px;overflow:hidden;
    background:linear-gradient(180deg,rgba(28,12,54,.94),rgba(20,8,42,.96));
    box-shadow:0 0 0 1px rgba(255,46,209,.35),0 14px 40px rgba(0,0,0,.55),0 0 26px rgba(34,211,238,.22);
    will-change:transform,opacity;animation:vw09-fall 6s cubic-bezier(.22,.61,.36,1) infinite both}
  .vw09-bar{display:flex;align-items:center;gap:5px;height:18px;padding:0 7px;
    background:linear-gradient(90deg,var(--vw09-mag),var(--vw09-vio) 55%,var(--vw09-cyan));
    color:#fff;font-size:9px;font-weight:700;letter-spacing:.12em;text-shadow:0 1px 1px rgba(0,0,0,.5)}
  .vw09-bar b{flex:1;text-transform:uppercase;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .vw09-dot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(255,255,255,.7)}
  .vw09-body{padding:9px 9px 11px;color:#bdf6ff}
  .vw09-chip{height:6px;border-radius:3px;background:linear-gradient(90deg,rgba(34,211,238,.85),rgba(255,46,209,.55));margin-bottom:6px}
  .vw09-chip.s{width:64%}.vw09-chip.t{width:42%;background:linear-gradient(90deg,rgba(123,44,255,.8),rgba(34,211,238,.5))}
  .vw09-glyph{margin-top:8px;font-size:18px;font-weight:800;letter-spacing:.04em;
    background:linear-gradient(180deg,#fff,#9be9ff 45%,#6bb 50%,#cfa8ff);-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 10px rgba(34,211,238,.4)}
  @keyframes vw09-fall{
    0%{transform:translate3d(-50%,-50%,0) translate(var(--dx),-118%) rotate(var(--rz)) scale(.62);opacity:0}
    12%{opacity:1}
    62%,78%{transform:translate3d(-50%,-50%,0) translate(var(--dx),var(--dy)) rotate(calc(var(--rz)*.18)) scale(1);opacity:1}
    100%{transform:translate3d(-50%,-50%,0) translate(calc(var(--dx)*1.5),152%) rotate(calc(var(--rz)*-1)) scale(1.04);opacity:0}}
  #vw09-sun{position:absolute;left:50%;top:30%;width:150px;height:150px;transform:translate(-50%,-50%);
    border-radius:50%;background:linear-gradient(180deg,#fff7,transparent 8%),linear-gradient(180deg,var(--vw09-cyan),var(--vw09-mag) 70%,var(--vw09-vio));
    box-shadow:0 0 70px rgba(255,46,209,.4);opacity:.5;
    -webkit-mask-image:repeating-linear-gradient(0deg,#000 0 9px,transparent 9px 13px);mask-image:repeating-linear-gradient(0deg,#000 0 9px,transparent 9px 13px)}
  .vw09-star{position:absolute;width:2px;height:2px;border-radius:50%;background:#cdefff;opacity:.0;
    box-shadow:0 0 4px #aef;animation:vw09-tw 3.4s ease-in-out infinite}
  @keyframes vw09-tw{0%,100%{opacity:.12;transform:scale(.7)}50%{opacity:.85;transform:scale(1.15)}}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important}
    .vw09-win{opacity:1!important;transform:translate3d(-50%,-50%,0) translate(var(--dx),var(--dy)) scale(1)!important}}
</style>

<body>
<div id="vw09-stage">
  <div id="vw09-scene" role="img" aria-label="Retro Y2K user-interface windows cascading down a neon vaporwave perspective grid beneath a striped chrome sun and starfield.">
    <div id="vw09-sun" aria-hidden="true"></div>
    <div id="vw09-gridwrap" aria-hidden="true"><div id="vw09-grid"></div></div>
    <div id="vw09-deck" aria-hidden="true"></div>
  </div>
</div>
<div class="cap">Window Cascade</div>
<script>
(function(){
  var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  var scene=document.getElementById('vw09-scene');
  var deck=document.getElementById('vw09-deck');
  var TITLES=['SYSTEM','DRIVE.A','README','NETWORK','MIDI.OUT','VOID.EXE','CD-ROM','PALETTE','MODEM'];
  var DOTS=['#ff2ed1','#22d3ee','#7b2cff'];
  var N=9;
  for(var i=0;i<N;i++){
    var w=document.createElement('div');w.className='vw09-win';
    var dx=((i%3)-1)*30 + (i*5-20);     // staggered horizontal offset, %
    var dy=(i-(N-1)/2)*4 - 4;           // gentle vertical fan, %
    var rz=((i*53)%14)-7;               // -7..6 deg drift
    w.style.cssText='--dx:'+dx+'%;--dy:'+dy+'%;--rz:'+rz+'deg;z-index:'+(10+i)+';'+
      'animation-delay:'+(reduce?0:(i*0.62).toFixed(2))+'s';
    var d1=DOTS[i%3],d2=DOTS[(i+1)%3],d3=DOTS[(i+2)%3];
    w.innerHTML=
      '<div class="vw09-bar"><span class="vw09-dot" style="background:'+d1+'"></span>'+
      '<span class="vw09-dot" style="background:'+d2+'"></span>'+
      '<span class="vw09-dot" style="background:'+d3+'"></span>'+
      '<b>'+TITLES[i]+'</b><span style="opacity:.8">_ □ ✕</span></div>'+
      '<div class="vw09-body"><div class="vw09-chip"></div><div class="vw09-chip s"></div>'+
      '<div class="vw09-chip t"></div>'+(i%2? '<div class="vw09-glyph">◈ '+(100+i*11)+'%</div>':'<div class="vw09-glyph">▲ READY</div>')+
      '</div>';
    deck.appendChild(w);
  }
  // starfield
  for(var s=0;s<26;s++){
    var st=document.createElement('span');st.className='vw09-star';
    st.style.left=(Math.random()*100).toFixed(1)+'%';
    st.style.top=(Math.random()*46).toFixed(1)+'%';
    st.style.animationDelay=(Math.random()*3.4).toFixed(2)+'s';
    if(reduce)st.style.opacity='.5';
    scene.appendChild(st);
  }
  if(reduce)return;
  function vis(){
    var st=document.visibilityState==='hidden'?'paused':'running';
    var els=document.querySelectorAll('#vw09-stage [style],#vw09-grid,.vw09-win,.vw09-star');
    for(var k=0;k<els.length;k++)els[k].style.animationPlayState=st;
  }
  document.addEventListener('visibilitychange',vis);
})();
</script>
</body>
</html>
