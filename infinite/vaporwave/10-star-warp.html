<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="Canvas starfield of cyan, magenta and violet streaks warping gently outward from a glowing vanishing point.">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Star Warp</title>
<style>
  :root{--vw10-bg:#160a2a;--vw10-cy:#22d3ee;--vw10-mg:#ff2bd6;--vw10-vi:#a855f7}
  html,body{margin:0;height:100%}
  body{background:var(--vw10-bg);overflow:hidden}
  #vw10-stage{position:fixed;inset:0;background:
    radial-gradient(120% 80% at 50% 42%,rgba(168,85,247,.22),transparent 60%),
    radial-gradient(60% 40% at 50% 42%,rgba(34,211,238,.16),transparent 70%),
    var(--vw10-bg)}
  #vw10-c{position:absolute;inset:0;width:100%;height:100%;display:block}
  /* static vignette + ring glow — never repaints */
  #vw10-vig{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(closest-side,transparent 58%,rgba(11,4,24,.7) 100%);
    box-shadow:inset 0 0 90px 10px rgba(255,43,214,.10),inset 0 0 40px rgba(34,211,238,.12)}
  /* horizon vanishing-point hint, static */
  #vw10-vp{position:absolute;left:50%;top:42%;width:18px;height:18px;margin:-9px 0 0 -9px;
    border-radius:50%;pointer-events:none;
    background:radial-gradient(closest-side,rgba(255,255,255,.85),rgba(34,211,238,.35) 45%,transparent 72%);
    box-shadow:0 0 22px 4px rgba(34,211,238,.45),0 0 40px 8px rgba(255,43,214,.25)}
  .cap{position:fixed;left:8px;bottom:7px;font:600 10px/1 ui-monospace,Menlo,monospace;color:#fff;opacity:.42;letter-spacing:.08em;text-transform:uppercase;user-select:none}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important}}
</style>
<script type="application/json" id="forever-agent-meta">
{
 "file": "infinite/vaporwave/10-star-warp.html",
 "title": "Star Warp",
 "description": "110 cyan, magenta, and violet stars stream outward from a glowing vanishing point with warp-trail streaks and perspective scaling.",
 "useWhen": "Vaporwave or retro-futurist hero backgrounds, loading screens, ambient screensaver-style displays on dark UIs.",
 "avoidWhen": "Light-background layouts (background hardcoded deep purple). Contexts where motion competes with foreground text.",
 "agentPrompt": "Change SPEED from 130 to 220 for a faster warp effect, increase N from 110 to 180 stars, and shift COL[0] to '255,200,0' for a gold accent.",
 "editableAreas": [
  "star count (N=110)",
  "warp speed (SPEED=130)",
  "star color palette (COL array)",
  "vanishing point height (CY=h*0.42)",
  "perspective focal length (FOCAL=320)"
 ],
 "preserveElements": [
  "DPR-aware canvas sizing",
  "visibilitychange pause/resume",
  "reduced-motion static fallback (draw(0) early return)",
  "IIFE wrapper"
 ],
 "knownLimitations": [
  "Background gradient hardcoded in CSS — must edit --vw10-bg and radial-gradient to change color scheme",
  "No pointer interactivity — stars ignore cursor position"
 ],
 "tier": "curated",
 "labels": [
  "accessible",
  "mobile-ready",
  "copy-paste-safe",
  "minimal-deps",
  "agent-ready"
 ],
 "tags": [
  "starfield",
  "warp",
  "vaporwave",
  "canvas",
  "perspective",
  "ambient",
  "space"
 ]
}
</script>
</head>
<body>
  <div id="vw10-stage" role="img" aria-label="A vaporwave starfield gently warping toward a glowing vanishing point.">
    <canvas id="vw10-c"></canvas>
    <div id="vw10-vp"></div>
    <div id="vw10-vig"></div>
  </div>
  <div class="cap">Star Warp</div>
<script>
(function(){
  var cv=document.getElementById('vw10-c'),ctx=cv.getContext('2d');
  var reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  var DPR=Math.min(2,window.devicePixelRatio||1);
  var W=0,H=0,CX=0,CY=0,DEPTH=900;
  // vanishing point sits at 42% height (matches CSS)
  var N=110;
  var sx=new Float32Array(N),sy=new Float32Array(N),sz=new Float32Array(N);
  var hue=new Uint8Array(N); // 0 cyan,1 magenta,2 violet,3 white
  var COL=['34,211,238','255,43,214','168,85,247','235,245,255'];

  function rnd(a,b){return a+Math.random()*(b-a);}
  function spawn(i,fresh){
    // spherical-ish spread in a cone so stars stream from the vanishing point
    var a=Math.random()*6.283185,r=Math.sqrt(Math.random());
    sx[i]=Math.cos(a)*r;
    sy[i]=Math.sin(a)*r;
    sz[i]=fresh?rnd(40,DEPTH):DEPTH;
    var h=Math.random();
    hue[i]=h<0.34?0:h<0.62?1:h<0.82?2:3;
  }
  for(var i=0;i<N;i++)spawn(i,true);

  function size(){
    var w=cv.clientWidth||window.innerWidth,h=cv.clientHeight||window.innerHeight;
    W=w;H=h;CX=w*0.5;CY=h*0.42;
    cv.width=Math.round(w*DPR);cv.height=Math.round(h*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  size();
  window.addEventListener('resize',size);

  var FOCAL=320; // spread radius scaler
  function draw(dt){
    ctx.clearRect(0,0,W,H);
    var spread=Math.max(W,H)*0.62;
    for(var i=0;i<N;i++){
      var z=sz[i];
      if(dt){ z-=dt; if(z<=18){spawn(i,false);z=sz[i];} else sz[i]=z; }
      var k=FOCAL/z;            // perspective scale
      var px=CX+sx[i]*spread*k;
      var py=CY+sy[i]*spread*k;
      if(px<-30||px>W+30||py<-30||py>H+30) continue;
      var depth=1-z/DEPTH;       // 0 far .. 1 near
      var rad=0.5+depth*depth*2.4;
      var al=0.10+depth*0.9;
      var c=COL[hue[i]];
      // streak: previous (deeper) position for a warp trail, cheap line
      var z2=z+ (dt?dt:0)*3 + 26;
      var k2=FOCAL/z2;
      var qx=CX+sx[i]*spread*k2, qy=CY+sy[i]*spread*k2;
      ctx.strokeStyle='rgba('+c+','+(al*0.5)+')';
      ctx.lineWidth=rad;
      ctx.beginPath();ctx.moveTo(qx,qy);ctx.lineTo(px,py);ctx.stroke();
      ctx.fillStyle='rgba('+c+','+al+')';
      ctx.beginPath();ctx.arc(px,py,rad,0,6.283185);ctx.fill();
    }
  }

  if(reduce){ draw(0); return; }

  var running=true,raf=0,last=0,SPEED=130; // depth units / sec, gentle
  function loop(t){
    if(!running)return;
    if(!last)last=t;
    var d=(t-last)/1000; last=t;
    if(d>0.05)d=0.05;
    draw(d*SPEED);
    raf=requestAnimationFrame(loop);
  }
  function start(){ if(!running){running=true;last=0;raf=requestAnimationFrame(loop);} }
  function stop(){ running=false;if(raf)cancelAnimationFrame(raf);raf=0; }
  document.addEventListener('visibilitychange',function(){ document.hidden?stop():start(); });
  running=true;raf=requestAnimationFrame(loop);
})();
</script>
</body>
</html>
